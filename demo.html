<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Freedom Intelligence Field — DEMO</title>
<style>
  html[data-theme="dark"] {
    --bg: #080808;
    --panel: #0f0f0f;
    --panel-2: #131313;
    --sidebar-bg: #0a0a0a;
    --text: #f0ead6;
    --text-dim: rgba(240, 234, 214, 0.55);
    --text-mute: rgba(240, 234, 214, 0.28);
    --gold: #C9A84C;
    --gold-soft: rgba(201, 168, 76, 0.09);
    --gold-line: rgba(201, 168, 76, 0.16);
    --gold-strong: rgba(201, 168, 76, 0.25);
    --user-msg-bg: rgba(201, 168, 76, 0.10);
    --user-msg-border: rgba(201, 168, 76, 0.22);
    --assistant-msg-bg: rgba(240, 234, 214, 0.03);
    --assistant-msg-border: rgba(240, 234, 214, 0.07);
    --border: rgba(201, 168, 76, 0.07);
    --shadow: 0 0 80px rgba(201, 168, 76, 0.03), 0 24px 48px rgba(0,0,0,0.6);
    --demo-banner: #6B2C2C;
    --demo-banner-text: #FFD1D1;
    color-scheme: dark;
  }
  html[data-theme="light"] {
    --bg: #F7F1E1;
    --panel: #FFFFFF;
    --panel-2: #FAF6E8;
    --sidebar-bg: #EFE7CE;
    --text: #1A1612;
    --text-dim: rgba(26, 22, 18, 0.65);
    --text-mute: rgba(26, 22, 18, 0.4);
    --gold: #9A6E10;
    --gold-soft: rgba(154, 110, 16, 0.07);
    --gold-line: rgba(154, 110, 16, 0.2);
    --gold-strong: rgba(154, 110, 16, 0.35);
    --user-msg-bg: rgba(154, 110, 16, 0.10);
    --user-msg-border: rgba(154, 110, 16, 0.25);
    --assistant-msg-bg: #FFFFFF;
    --assistant-msg-border: rgba(26, 22, 18, 0.08);
    --border: rgba(26, 22, 18, 0.08);
    --shadow: 0 6px 24px rgba(26, 22, 18, 0.06), 0 1px 4px rgba(26, 22, 18, 0.04);
    --demo-banner: #C84545;
    --demo-banner-text: #FFFFFF;
    color-scheme: light;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    min-height: 100%;
  }
  button { font-family: inherit; cursor: pointer; }

  /* Demo banner */
  .demo-banner {
    background: var(--demo-banner);
    color: var(--demo-banner-text);
    padding: 8px 16px;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
    overflow: hidden;
  }
  .main-row {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 22px 18px;
    overflow-y: auto;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 22px;
  }
  .brand-mark {
    width: 48px; height: 48px;
    flex-shrink: 0;
    display: block;
  }
  .brand-mark img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
  }
  .brand-text-1 {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--gold);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    line-height: 1.2;
  }
  .brand-text-2 {
    font-size: 13px;
    color: var(--text);
    font-style: italic;
    margin-top: 3px;
  }
  .sidebar-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-mute);
    text-transform: uppercase;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .day-list {
    display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px;
  }
  .day-item {
    display: flex; align-items: center; gap: 11px;
    padding: 11px 12px; border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
    background: var(--panel);
  }
  .day-item:hover {
    border-color: var(--gold-line);
  }
  .day-item.active {
    background: var(--gold-soft);
    border-color: var(--gold-line);
  }
  .day-num {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--gold-line);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: var(--gold);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    flex-shrink: 0;
  }
  .day-item.active .day-num {
    background: var(--gold); color: var(--bg); border-color: var(--gold);
  }
  .day-info { flex: 1; min-width: 0; }
  .day-title {
    font-size: 12px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .day-theme {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 2px;
  }

  .demo-help {
    margin-top: 8px;
    padding: 12px;
    background: var(--panel);
    border: 1px dashed var(--gold-line);
    border-radius: 8px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.5;
  }

  .reset-btn {
    margin-top: 14px;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--gold-line);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s ease;
  }
  .reset-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-text {
    font-size: 10px;
    color: var(--text-mute);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.05em;
  }
  .theme-toggle {
    background: transparent;
    border: 1px solid var(--gold-line);
    color: var(--text-dim);
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .theme-toggle:hover { border-color: var(--gold); color: var(--gold); }

  /* Main */
  .main {
    flex: 1; display: flex; flex-direction: column;
    min-width: 0; min-height: 0;
    background: var(--bg);
  }
  .main-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
  }
  .main-header-title {
    font-size: 14px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 600;
  }
  .main-header-sub {
    font-size: 11px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin-top: 2px;
  }
  .day-chip {
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
    font-size: 10px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .messages-wrap {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 24px 0;
  }
  .messages-wrap::-webkit-scrollbar { width: 6px; }
  .messages-wrap::-webkit-scrollbar-thumb {
    background: var(--gold-strong); border-radius: 3px;
  }
  .messages {
    max-width: 760px; margin: 0 auto;
    padding: 0 28px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .msg-row { display: flex; animation: fadeIn 0.3s ease; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }
  .msg {
    max-width: 78%;
    padding: 13px 18px;
    color: var(--text);
    font-size: 15px;
    line-height: 1.75;
  }
  .msg-row.user .msg {
    padding: 11px 16px;
    background: var(--user-msg-bg);
    border: 1px solid var(--user-msg-border);
    border-radius: 14px 14px 3px 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    white-space: pre-wrap;
  }
  .msg-row.assistant .msg {
    background: var(--assistant-msg-bg);
    border: 1px solid var(--assistant-msg-border);
    border-radius: 14px 14px 14px 3px;
    font-family: Georgia, "Times New Roman", serif;
  }
  /* Markdown rendering inside assistant messages */
  .msg-row.assistant .msg p { margin: 0 0 0.7em 0; }
  .msg-row.assistant .msg p:last-child { margin-bottom: 0; }
  .msg-row.assistant .msg strong { font-weight: 700; color: var(--text); }
  .msg-row.assistant .msg em { font-style: italic; }
  .msg-row.assistant .msg code { background: var(--gold-soft); padding: 1px 6px; border-radius: 4px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.9em; color: var(--gold); }
  .msg-row.assistant .msg ul, .msg-row.assistant .msg ol { margin: 0.4em 0 0.7em 1.4em; padding: 0; }
  .msg-row.assistant .msg li { margin-bottom: 0.35em; line-height: 1.6; }
  .msg-row.assistant .msg li:last-child { margin-bottom: 0; }
  .msg-row.assistant .msg ul li { list-style-type: disc; }
  .msg-row.assistant .msg ol li { list-style-type: decimal; }

  .typing {
    display: flex; gap: 5px; align-items: center;
    padding: 12px 16px;
    background: var(--assistant-msg-bg);
    border-radius: 14px 14px 14px 3px;
    width: fit-content;
    border: 1px solid var(--assistant-msg-border);
  }
  .typing .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.7;
    animation: bounce 1.2s infinite;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }

  .composer-wrap {
    border-top: 1px solid var(--border);
    padding: 16px 28px 20px;
  }
  .composer {
    max-width: 760px; margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 8px 6px 14px;
    display: flex; align-items: flex-end; gap: 10px;
    position: relative;
  }
  .composer:focus-within { border-color: var(--gold-line); }
  textarea {
    flex: 1; background: transparent; border: none;
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    font-size: 15px; line-height: 1.6;
    padding: 12px 4px;
    max-height: 200px; overflow-y: auto;
    resize: none;
  }
  textarea:focus { outline: none; }
  textarea::placeholder { color: var(--text-mute); }
  .send-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--gold-soft);
    border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    color: var(--text-mute);
    cursor: default;
    margin-bottom: 4px;
  }
  .send-btn.active {
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    color: var(--bg);
    cursor: pointer;
  }

  /* Voice input */
  .mic-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    border: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--bg);
    cursor: pointer;
    margin-bottom: 4px;
    transition: filter 0.15s ease, transform 0.1s ease;
    padding: 0;
  }
  .mic-btn:hover { filter: brightness(1.1); }
  .mic-btn:active { transform: scale(0.95); }
  .mic-btn svg { width: 22px; height: 22px; display: block; }
  .mic-btn.recording {
    background: linear-gradient(135deg, #e57373, #b94a4a);
    color: var(--bg);
    animation: pulse-record 1.4s ease-in-out infinite;
  }
  .mic-btn.transcribing { cursor: wait; }
  .mic-btn.transcribing svg { display: none; }
  .mic-btn.transcribing::after {
    content: "";
    width: 14px; height: 14px;
    border: 2px solid rgba(8, 8, 8, 0.25);
    border-top-color: #080808;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes pulse-record {
    0%, 100% { box-shadow: 0 0 0 0 rgba(228, 87, 87, 0.35); }
    50% { box-shadow: 0 0 0 8px rgba(228, 87, 87, 0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .recording-indicator {
    position: absolute;
    top: -30px;
    right: 14px;
    background: var(--panel);
    border: 1px solid var(--gold-line);
    border-radius: 12px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    white-space: nowrap;
    pointer-events: none;
    z-index: 5;
  }
  .recording-indicator .red-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #e57373;
    margin-right: 5px;
    vertical-align: middle;
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Speaker (Shimrit voice playback) */
  .msg-row.assistant { flex-direction: column; align-items: flex-start; }
  .speak-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--gold);
    cursor: pointer;
    padding: 0;
    margin-top: 6px;
    margin-left: 4px;
    transition: background 0.15s ease, transform 0.1s ease, border-color 0.15s ease;
  }
  .speak-btn:hover { background: rgba(201, 168, 76, 0.18); }
  .speak-btn:active { transform: scale(0.92); }
  .speak-btn svg { width: 14px; height: 14px; display: block; }
  .speak-btn.loading svg { display: none; }
  .speak-btn.loading::after {
    content: "";
    width: 10px; height: 10px;
    border: 1.5px solid var(--gold-line);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .speak-btn.playing {
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    color: var(--bg);
    border-color: transparent;
  }
  .autoplay-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 4px;
    margin-top: 6px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    cursor: pointer;
  }
  .autoplay-toggle input { margin: 0; accent-color: var(--gold); cursor: pointer; }
  .autoplay-toggle:hover { color: var(--text); }

  /* Unlimited section in sidebar */
  .sidebar-divider { height: 1px; background: var(--gold-line); margin: 16px 4px; opacity: 0.5; }
  .unl-action-row { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; }
  .new-chat-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 12px; background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black)); color: var(--bg); border-radius: 8px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; border: none; cursor: pointer; }
  .new-chat-btn svg { width: 14px; height: 14px; }
  .magnifier-btn { width: 36px; height: 36px; flex-shrink: 0; background: var(--gold-soft); border: 1px solid var(--gold-line); color: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; }
  .magnifier-btn svg { width: 14px; height: 14px; }
  .magnifier-btn.active { background: var(--gold-line); }
  .unl-search-wrap { margin-bottom: 8px; display: none; }
  .unl-search-wrap.open { display: block; }
  .unl-search-wrap input { width: 100%; background: var(--panel); border: 1px solid var(--gold-line); color: var(--text); padding: 7px 10px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; border-radius: 6px; outline: none; }
  .unl-search-wrap input::placeholder { color: var(--text-mute); }
  .unl-chat-list { max-height: 280px; overflow-y: auto; }
  .unl-chat-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; border: 1px solid transparent; transition: background 0.15s ease, border-color 0.15s ease; }
  .unl-chat-item:hover { background: var(--gold-soft); }
  .unl-chat-item.active { background: var(--gold-soft); border-color: var(--gold-line); }
  .unl-chat-title { font-size: 11px; color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 500; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .unl-chat-time { font-size: 9px; color: var(--text-mute); margin-top: 2px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .unl-chat-empty { padding: 10px 8px; font-size: 11px; color: var(--text-mute); font-style: italic; font-family: Georgia, serif; }

  .composer-note {
    max-width: 760px; margin: 8px auto 0;
    text-align: center;
    font-size: 11px;
    color: var(--text-mute);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  /* Entry */
  .entry-screen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .entry-card {
    max-width: 460px; width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 44px 38px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .entry-label {
    font-size: 10px;
    color: var(--text-mute);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin-bottom: 22px;
  }
  .entry-title {
    font-size: 26px;
    color: var(--text);
    font-style: italic;
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .entry-sub {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.8;
    margin: 0 auto 28px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    text-align: left;
  }
  .entry-input {
    width: 100%;
    padding: 13px 17px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .entry-input:focus { outline: none; border-color: var(--gold-line); }
  .btn-primary {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    border: none;
    border-radius: 8px;
    color: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .error-text {
    color: #e57373;
    font-size: 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin-bottom: 10px;
    text-align: left;
  }

  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 720px) {
    .sidebar { width: 220px; padding: 16px 12px; }
    .messages, .composer { padding-left: 16px; padding-right: 16px; }
  }

  @media (max-width: 560px) {
    #app {
      height: auto;
      min-height: 100vh;
      overflow: visible;
    }
    .main-row {
      flex-direction: column;
      overflow: visible;
    }
    .main, .messages-wrap { min-height: 0; }
    .sidebar {
      width: 100%;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      flex-shrink: 0;
      overflow-y: visible;
    }
    .brand { padding-bottom: 12px; margin-bottom: 12px; }
    .brand-mark { width: 40px; height: 40px; }

</style>
</head>
<body>
  <div id="app"></div>

<script>
(function () {
  "use strict";

  const API_BASE = "https://myp-ascension.vercel.app/api";
  const STORAGE_KEY = "tfif_demo_session_v1";
  const ANON_KEY = "tfif_demo_anon_id";
  const THEME_KEY = "tfif_theme_v1";
  const DAY_META = [
    { label: "Day 1", theme: "State Reset" },
    { label: "Day 2", theme: "Decision" },
    { label: "Day 3", theme: "Action" }
  ];
  const PLACEHOLDERS = [
    "What feels most active right now?",
    "What are you no longer available for?",
    "What is the one move you will take in the next 24 hours?"
  ];

  const state = {
    sessionToken: null,
    currentDay: 1,
    lastCompletedDay: 0,
    timeRemainingMs: null,
    messages: [],
    loading: false,
    error: null,
    view: "entry",
    autoplay: (function () {
      try { return localStorage.getItem("tfif_autoplay_v1") === "1"; } catch (e) { return false; }
    })(),
    // ===== Unlimited demo state =====
    unlimitedSessions: [],
    activeUnlimitedId: null,
    unlimitedMessages: [],
    searchOpen: false,
    searchQuery: ""
  };

  // ===== Persistence =====
  function loadToken() { try { return localStorage.getItem(STORAGE_KEY); } catch (e) { return null; } }
  function saveToken(t) { try { localStorage.setItem(STORAGE_KEY, t); } catch (e) {} }
  function clearToken() { try { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(ANON_KEY); } catch (e) {} }
  function loadTheme() { try { return localStorage.getItem(THEME_KEY) || "dark"; } catch (e) { return "dark"; } }
  function saveTheme(t) { try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    saveTheme(theme);
  }

  function generateAnonId() {
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
      const r = Math.random() * 16 | 0;
      const v = c === "x" ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }
  function getOrCreateAnonId() {
    try {
      let id = localStorage.getItem(ANON_KEY);
      if (!id) {
        id = generateAnonId();
        localStorage.setItem(ANON_KEY, id);
      }
      return id;
    } catch (e) { return generateAnonId(); }
  }

  // ===== API =====
  async function apiStart(email, displayName) {
    const res = await fetch(API_BASE + "/start", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, displayName: displayName || null })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Could not start");
    return data;
  }
  async function apiState(token) {
    const res = await fetch(API_BASE + "/state", {
      method: "GET",
      headers: { "x-session-token": token }
    });
    if (res.status === 410) return { expired: true };
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Could not load state");
    return data;
  }
  async function apiChat(token, message) {
    const res = await fetch(API_BASE + "/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-session-token": token },
      body: JSON.stringify({ message })
    });
    if (res.status === 410) return { expired: true };
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Could not send");
    return data;
  }
  async function apiSetDay(token, day) {
    const res = await fetch(API_BASE + "/demo-set-day", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-session-token": token },
      body: JSON.stringify({ day })
    });
    if (res.status === 404) throw new Error("Demo mode not enabled on backend (set DEMO_MODE_ENABLED=true in Vercel).");
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Could not set day");
    return data;
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // Light markdown renderer for assistant messages. Supports bold (**x**),
  // italic (*x*, _x_), inline code (`x`), bullet lists (-, *), numbered
  // lists (1.), paragraphs, and line breaks. Escapes HTML first to prevent
  // injection — only the parsed markdown patterns become real HTML.
  function renderMarkdown(text) {
    let html = escapeHtml(String(text || ""));

    // Inline formatting. Order matters: bold before italic so ** doesn't
    // get partially consumed by single-asterisk italic match.
    html = html.replace(/\*\*([^\n*]+?)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/__([^\n_]+?)__/g, "<strong>$1</strong>");
    html = html.replace(/(^|[^*])\*([^\n*]+?)\*(?!\*)/g, "$1<em>$2</em>");
    html = html.replace(/(^|[^_])_([^\n_]+?)_(?!_)/g, "$1<em>$2</em>");
    html = html.replace(/`([^`\n]+?)`/g, "<code>$1</code>");

    // Block-level parsing: paragraphs, line breaks, lists.
    const lines = html.split("\n");
    const blocks = [];
    let paragraph = [];
    let listType = null;
    let listItems = [];

    function flushParagraph() {
      if (paragraph.length > 0) {
        blocks.push("<p>" + paragraph.join("<br>") + "</p>");
        paragraph = [];
      }
    }
    function flushList() {
      if (listType && listItems.length > 0) {
        blocks.push("<" + listType + ">" + listItems.map(i => "<li>" + i + "</li>").join("") + "</" + listType + ">");
        listItems = [];
        listType = null;
      }
    }

    for (const rawLine of lines) {
      const line = rawLine;
      const trimmed = line.trim();
      const ulMatch = line.match(/^\s*[-*]\s+(.+)$/);
      const olMatch = line.match(/^\s*\d+\.\s+(.+)$/);

      if (ulMatch) {
        flushParagraph();
        if (listType !== "ul") { flushList(); listType = "ul"; }
        listItems.push(ulMatch[1]);
      } else if (olMatch) {
        flushParagraph();
        if (listType !== "ol") { flushList(); listType = "ol"; }
        listItems.push(olMatch[1]);
      } else if (trimmed === "") {
        flushParagraph();
        flushList();
      } else {
        flushList();
        paragraph.push(line);
      }
    }
    flushParagraph();
    flushList();

    return blocks.join("");
  }

  // ===== Renderers =====
  function renderSidebar() {
    const currentTheme = document.documentElement.getAttribute("data-theme") || "dark";
    const themeIcon = currentTheme === "dark" ? "☀" : "☾";
    return `
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark"><img src="https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/file-uploads/themes/2161454568/settings_images/d2126ef-2bee-6f2c-8c2-d1357db52300_myp_logo.png" alt="Master Your Path" /></div>
          <div>
            <div class="brand-text-1">Master Your Path</div>
            <div class="brand-text-2">Freedom Intelligence Field</div>
          </div>
        </div>

        <div class="sidebar-label">The 72-Hour Power Reset</div>
        <div class="day-list">
          ${DAY_META.map((d, i) => {
            const dayNum = i + 1;
            const isCurrent = dayNum === state.currentDay;
            return `
              <div class="day-item ${isCurrent ? "active" : ""}" data-day="${dayNum}">
                <div class="day-num">${dayNum}</div>
                <div class="day-info">
                  <div class="day-title">${d.label}</div>
                  <div class="day-theme">${d.theme}</div>
                </div>
              </div>
            `;
          }).join("")}
        </div>

        <div class="demo-help">Click a day above to switch the AI's prompt instantly. Use the reset button to start a fresh conversation.</div>

        ${state.sessionToken ? `<button class="reset-btn" id="reset-btn">Reset conversation</button>` : ""}

        <div class="sidebar-divider"></div>
        <div class="sidebar-label">The Field — Unlimited</div>

        <div class="unl-action-row">
          <button class="new-chat-btn" id="new-chat-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New chat
          </button>
          <button class="magnifier-btn ${state.searchOpen ? "active" : ""}" id="magnifier-btn" title="Search conversations">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </div>

        <div class="unl-search-wrap ${state.searchOpen ? "open" : ""}">
          <input type="text" id="unl-search-input" placeholder="Search your conversations" value="${escapeHtml(state.searchQuery || "")}" />
        </div>

        <div class="unl-chat-list">
          ${(function () {
            const filtered = state.searchQuery
              ? state.unlimitedSessions.filter(s => (s.title || "").toLowerCase().includes(state.searchQuery.toLowerCase()))
              : state.unlimitedSessions;
            if (filtered.length === 0) {
              return '<div class="unl-chat-empty">' + (state.searchQuery ? "No matches." : "No conversations yet.") + '</div>';
            }
            return filtered.map(s => `
              <div class="unl-chat-item ${s.id === state.activeUnlimitedId ? "active" : ""}" data-unl-id="${s.id}">
                <div class="unl-chat-title">${escapeHtml(s.title || "New chat")}</div>
                <div class="unl-chat-time">${escapeHtml(formatRelativeTime(s.lastMessageAt || s.startedAt))}</div>
              </div>
            `).join("");
          })()}
        </div>

        <div class="sidebar-footer">
          <div class="footer-text">DEMO v1.0</div>
          <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">${themeIcon}</button>
        </div>
      </aside>
    `;
  }

  function formatRelativeTime(iso) {
    if (!iso) return "";
    const t = new Date(iso); const now = new Date();
    const diffMs = now - t; const diffMin = Math.floor(diffMs / 60000); const diffHr = Math.floor(diffMs / 3600000); const diffDay = Math.floor(diffMs / 86400000);
    if (diffMin < 2) return "Just now";
    if (diffMin < 60) return diffMin + "m ago";
    if (diffHr < 24) return diffHr + "h ago";
    if (diffDay < 7) return diffDay + "d ago";
    return t.toLocaleDateString();
  }

  function render() {
    const app = document.getElementById("app");

    if (state.view === "entry") {
      app.innerHTML = `
        <div class="demo-banner">⚠ Demo Mode · Internal Testing Only</div>
        <div class="main-row">
          ${renderSidebar()}
          <main class="main">
            <div class="main-header">
              <div>
                <div class="main-header-title">Begin a test conversation</div>
                <div class="main-header-sub">Demo build</div>
              </div>
            </div>
            <div class="entry-screen">
              <div class="entry-card">
                <div class="entry-label">The Freedom Intelligence Field</div>
                <div class="entry-title">Welcome to the Freedom Intelligence Field<br/>Day 1: State Reset</div>
                <div class="entry-sub">Drop your prompt and I'll guide you through a powerful process, or just tell me what's on your mind.</div>
                <form id="entry-form">
                  <input class="entry-input" id="name-input" type="text" placeholder="Your name (optional)" autocomplete="given-name" />
                  <textarea class="entry-input" id="opening-input" rows="4" placeholder="Paste your Day 1 prompt or share what's present for you..." required style="font-family: Georgia, 'Times New Roman', serif; line-height: 1.6;"></textarea>
                  ${state.error ? `<div class="error-text">${escapeHtml(state.error)}</div>` : ""}
                  <button class="btn-primary" type="submit">Begin Day 1</button>
                </form>
              </div>
            </div>
          </main>
        </div>
      `;
      document.getElementById("entry-form").addEventListener("submit", onStartSubmit);
      setTimeout(() => document.getElementById("name-input").focus(), 50);
    } else if (state.view === "chat") {
      app.innerHTML = `
        <div class="demo-banner">⚠ Demo Mode · Click any day in the sidebar to switch instantly</div>
        <div class="main-row">
          ${renderSidebar()}
          <main class="main">
            <div class="main-header">
              <div>
                <div class="main-header-title">${DAY_META[state.currentDay - 1].label} · ${DAY_META[state.currentDay - 1].theme}</div>
                <div class="main-header-sub">Demo · Backend reports current day = ${state.currentDay}</div>
              </div>
              <div>
                <div class="day-chip">${DAY_META[state.currentDay - 1].label} · ${DAY_META[state.currentDay - 1].theme}</div>
              </div>
            </div>
            <div class="messages-wrap" id="messages-wrap">
              <div class="messages" id="messages"></div>
            </div>
            <div class="composer-wrap">
              <div class="composer">
                <textarea id="input" rows="1" placeholder="${PLACEHOLDERS[state.currentDay - 1]}"></textarea>
                <button class="mic-btn" id="mic-btn" type="button" aria-label="Record voice message" title="Record voice message">
                  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <rect x="9" y="3" width="6" height="11" rx="3"/>
                    <path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.93V20H9a1 1 0 1 0 0 2h6a1 1 0 1 0 0-2h-2v-2.07A7 7 0 0 0 19 11z"/>
                  </svg>
                </button>
                <button class="send-btn" id="send-btn" type="button">↑</button>
              </div>
              <div class="composer-note">Demo mode. Conversation history is preserved across day switches.</div>
            </div>
          </main>
        </div>
      `;
      renderMessages();
      document.getElementById("input").addEventListener("input", onInputChange);
      document.getElementById("input").addEventListener("keydown", onInputKeyDown);
      document.getElementById("send-btn").addEventListener("click", onSendClick);
      const micBtn = document.getElementById("mic-btn");
      if (micBtn) {
        if (!micSupported()) micBtn.style.display = "none";
        else micBtn.addEventListener("click", onMicClick);
      }
      const messagesWrap = document.getElementById("messages-wrap");
      if (messagesWrap) messagesWrap.addEventListener("click", onSpeakerClick);
      setTimeout(() => { if (!state.searchOpen) document.getElementById("input")?.focus(); }, 50);
    } else if (state.view === "unlimited-chat") {
      const activeUnl = state.unlimitedSessions.find(s => s.id === state.activeUnlimitedId);
      const headerTitle = activeUnl ? (activeUnl.title || "New chat") : "The Field";
      const headerSub = activeUnl
        ? (activeUnl.lastMessageAt
            ? "Last active " + formatRelativeTime(activeUnl.lastMessageAt)
            : "Started " + formatRelativeTime(activeUnl.startedAt))
        : "";
      app.innerHTML = `
        <div class="demo-banner">⚠ Demo Mode · The Field — Unlimited · Click a day chip above to test Reset mode</div>
        <div class="main-row">
          ${renderSidebar()}
          <main class="main">
            <div class="main-header">
              <div>
                <div class="main-header-title">${escapeHtml(headerTitle)}</div>
                ${headerSub ? `<div class="main-header-sub">${escapeHtml(headerSub)}</div>` : ""}
              </div>
            </div>
            <div class="messages-wrap" id="messages-wrap">
              <div class="messages" id="messages"></div>
            </div>
            <div class="composer-wrap">
              <div class="composer">
                <textarea id="input" rows="1" placeholder="Bring whatever is present for you..."></textarea>
                <button class="mic-btn" id="mic-btn" type="button" aria-label="Record voice message" title="Record voice message">
                  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <rect x="9" y="3" width="6" height="11" rx="3"/>
                    <path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.93V20H9a1 1 0 1 0 0 2h6a1 1 0 1 0 0-2h-2v-2.07A7 7 0 0 0 19 11z"/>
                  </svg>
                </button>
                <button class="send-btn" id="send-btn" type="button">↑</button>
              </div>
              <div class="composer-note">Demo · The Field is using retrieval against Shimrit's full body of work.</div>
            </div>
          </main>
        </div>
      `;
      renderUnlimitedMessages();
      document.getElementById("input").addEventListener("input", onInputChange);
      document.getElementById("input").addEventListener("keydown", onUnlimitedKeyDown);
      document.getElementById("send-btn").addEventListener("click", onUnlimitedSendClick);
      const micBtn = document.getElementById("mic-btn");
      if (micBtn) {
        if (!micSupported()) micBtn.style.display = "none";
        else micBtn.addEventListener("click", onMicClick);
      }
      const messagesWrap = document.getElementById("messages-wrap");
      if (messagesWrap) messagesWrap.addEventListener("click", onUnlimitedSpeakerClick);
      setTimeout(() => { if (!state.searchOpen) document.getElementById("input")?.focus(); }, 50);
    }

    // Wire up controls present in every view.
    const themeBtn = document.getElementById("theme-toggle");
    if (themeBtn) themeBtn.addEventListener("click", onThemeToggle);
    const resetBtn = document.getElementById("reset-btn");
    if (resetBtn) resetBtn.addEventListener("click", onReset);
    const autoplayCheckbox = document.getElementById("autoplay-checkbox");
    if (autoplayCheckbox) autoplayCheckbox.addEventListener("change", onAutoplayChange);
    // Day items should be clickable in ANY view (entry, chat, unlimited-chat)
    // so users can navigate freely between days and Unlimited.
    document.querySelectorAll(".day-item").forEach(el => {
      el.addEventListener("click", () => onDayClick(parseInt(el.dataset.day, 10)));
    });
    // Unlimited sidebar wires (present whenever sidebar is rendered).
    const newChatBtn = document.getElementById("new-chat-btn");
    if (newChatBtn) newChatBtn.addEventListener("click", onNewChatClick);
    const magBtn = document.getElementById("magnifier-btn");
    if (magBtn) magBtn.addEventListener("click", onMagnifierClick);
    const unlSearch = document.getElementById("unl-search-input");
    if (unlSearch) {
      // Update ONLY the chat list as the user types — full render would
      // re-create the chat textarea and steal focus away from this input.
      unlSearch.addEventListener("input", (e) => {
        state.searchQuery = e.target.value;
        renderUnlimitedChatList();
      });
      if (state.searchOpen && document.activeElement !== unlSearch) {
        setTimeout(() => unlSearch.focus(), 30);
      }
    }
    wireUnlimitedChatItems();
  }

  // Re-render just the .unl-chat-list section. Used by search input changes
  // so the search input keeps focus while the list filters live.
  function renderUnlimitedChatList() {
    const wrap = document.querySelector(".unl-chat-list");
    if (!wrap) return;
    const filtered = state.searchQuery
      ? state.unlimitedSessions.filter(s => (s.title || "").toLowerCase().includes(state.searchQuery.toLowerCase()))
      : state.unlimitedSessions;
    if (filtered.length === 0) {
      wrap.innerHTML = '<div class="unl-chat-empty">' + (state.searchQuery ? "No matches." : "No conversations yet.") + '</div>';
    } else {
      wrap.innerHTML = filtered.map(s => `
        <div class="unl-chat-item ${s.id === state.activeUnlimitedId ? "active" : ""}" data-unl-id="${s.id}">
          <div class="unl-chat-title">${escapeHtml(s.title || "New chat")}</div>
          <div class="unl-chat-time">${escapeHtml(formatRelativeTime(s.lastMessageAt || s.startedAt))}</div>
        </div>
      `).join("");
    }
    wireUnlimitedChatItems();
  }

  function wireUnlimitedChatItems() {
    document.querySelectorAll(".unl-chat-item").forEach(el => {
      el.addEventListener("click", () => onUnlimitedChatClick(el.dataset.unlId));
    });
  }

  function renderMessages() {
    const wrap = document.getElementById("messages");
    if (!wrap) return;
    let html = state.messages.map((m, i) => {
      if (m.role === "user") {
        return `
          <div class="msg-row ${m.role}">
            <div class="msg">${escapeHtml(m.content)}</div>
          </div>
        `;
      }
      return `
        <div class="msg-row ${m.role}">
          <div class="msg">${renderMarkdown(m.content)}</div>
          <button class="speak-btn" data-msg-index="${i}" type="button" aria-label="Play in Shimrit's voice" title="Play in Shimrit's voice">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M3 9v6h4l5 5V4L7 9H3z"/>
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
              <path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          </button>
        </div>
      `;
    }).join("");
    if (state.loading) {
      html += `
        <div class="msg-row assistant">
          <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
      `;
    }
    wrap.innerHTML = html;
    const wrapper = document.getElementById("messages-wrap");
    if (wrapper) wrapper.scrollTop = wrapper.scrollHeight;
  }

  // ===== Handlers =====
  function onThemeToggle() {
    const current = document.documentElement.getAttribute("data-theme") || "dark";
    const next = current === "dark" ? "light" : "dark";
    applyTheme(next);
    render();
  }

  async function onStartSubmit(e) {
    e.preventDefault();
    const name = (document.getElementById("name-input").value || "").trim();
    const opening = (document.getElementById("opening-input").value || "").trim();
    if (!opening) return;
    state.error = null;
    try {
      const anonId = getOrCreateAnonId();
      const syntheticEmail = "demo-" + anonId + "@tfif.local";
      const data = await apiStart(syntheticEmail, name);
      state.sessionToken = data.sessionToken;
      saveToken(data.sessionToken);
      state.currentDay = data.currentDay || 1;
      state.timeRemainingMs = data.timeRemainingMs;
      state.view = "chat";
      state.messages = [{ role: "user", content: opening }];
      state.loading = true;
      render();
      const chatData = await apiChat(state.sessionToken, opening);
      if (chatData.expired) { state.view = "entry"; state.error = "Window expired."; state.loading = false; render(); return; }
      state.messages.push({ role: "assistant", content: chatData.reply });
      state.currentDay = chatData.currentDay;
      state.loading = false;
      render();
      maybeAutoplayLastAssistant();
    } catch (err) {
      state.error = err.message || "Could not start.";
      state.loading = false;
      state.view = "entry";
      render();
    }
  }

  function onInputChange(e) {
    e.target.style.height = "auto";
    e.target.style.height = Math.min(e.target.scrollHeight, 200) + "px";
    const send = document.getElementById("send-btn");
    if (e.target.value.trim() && !state.loading) send.classList.add("active");
    else send.classList.remove("active");
  }

  function onInputKeyDown(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); onSendClick(); }
  }

  async function onSendClick() {
    const inputEl = document.getElementById("input");
    if (!inputEl) return;
    const text = inputEl.value.trim();
    if (!text || state.loading) return;
    state.messages.push({ role: "user", content: text });
    inputEl.value = "";
    inputEl.style.height = "auto";
    state.loading = true;
    document.getElementById("send-btn").classList.remove("active");
    renderMessages();
    try {
      const data = await apiChat(state.sessionToken, text);
      if (data.expired) { state.error = "Window expired."; state.loading = false; render(); return; }
      state.messages.push({ role: "assistant", content: data.reply });
      state.currentDay = data.currentDay;
      state.loading = false;
      render();
      maybeAutoplayLastAssistant();
    } catch (err) {
      state.messages.push({ role: "assistant", content: "Demo error: " + (err.message || "could not send.") });
      state.loading = false;
      renderMessages();
    }
  }

  async function onDayClick(day) {
    if (!state.sessionToken) return;
    // Only skip if we're ALREADY viewing this exact day in the Reset chat
    // view. If the user is in Unlimited and clicks back to their current
    // day, we still need to switch views and reload the day's messages.
    if (day === state.currentDay && state.view === "chat") return;
    state.view = "chat";
    state.loading = true;
    state.activeUnlimitedId = null; // deactivate any unlimited chat highlight
    render();
    try {
      const data = await apiSetDay(state.sessionToken, day);
      state.currentDay = data.currentDay;
      state.lastCompletedDay = data.lastCompletedDay;
      // Replace messages with this day's own conversation history. Each day
      // is its own thread; switching loads that thread fresh.
      state.messages = data.messages || [];
      state.loading = false;
      render();
    } catch (err) {
      state.messages.push({ role: "assistant", content: "Demo error: " + (err.message || "could not switch day.") });
      state.loading = false;
      renderMessages();
    }
  }

  function onReset() {
    if (!confirm("Reset this demo conversation? A fresh anonymous user will be created on next message.")) return;
    clearToken();
    state.sessionToken = null;
    state.currentDay = 1;
    state.lastCompletedDay = 0;
    state.messages = [];
    state.view = "entry";
    render();
  }

  // ===== Voice input =====
  const MAX_RECORDING_MS = 60000;
  const voiceState = {
    mediaRecorder: null, audioChunks: [], stream: null, mimeType: "",
    startedAt: 0, timerInterval: null, autoStopTimer: null, indicatorEl: null
  };

  function micSupported() {
    return !!(typeof navigator !== "undefined" && navigator.mediaDevices &&
      navigator.mediaDevices.getUserMedia && typeof window.MediaRecorder !== "undefined");
  }

  async function onMicClick() {
    if (state.loading) return;
    if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === "recording") {
      stopRecording();
      return;
    }
    await startRecording();
  }

  async function startRecording() {
    const micBtn = document.getElementById("mic-btn");
    if (!micBtn) return;
    try {
      voiceState.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const candidates = ["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg;codecs=opus"];
      let mimeType = "";
      for (const m of candidates) {
        if (window.MediaRecorder.isTypeSupported && window.MediaRecorder.isTypeSupported(m)) {
          mimeType = m;
          break;
        }
      }
      voiceState.mimeType = mimeType || "audio/webm";
      voiceState.mediaRecorder = mimeType
        ? new MediaRecorder(voiceState.stream, { mimeType })
        : new MediaRecorder(voiceState.stream);
      voiceState.audioChunks = [];
      voiceState.mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) voiceState.audioChunks.push(e.data);
      };
      voiceState.mediaRecorder.onstop = async () => {
        cleanupRecording();
        micBtn.classList.remove("recording");
        const blob = new Blob(voiceState.audioChunks, { type: voiceState.mimeType });
        voiceState.audioChunks = [];
        if (blob.size < 1000) return;
        await transcribeBlob(blob, voiceState.mimeType);
      };
      voiceState.mediaRecorder.start();
      voiceState.startedAt = Date.now();
      micBtn.classList.add("recording");
      showRecordingIndicator();
      voiceState.timerInterval = setInterval(updateRecordingIndicator, 250);
      voiceState.autoStopTimer = setTimeout(() => {
        if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === "recording") {
          stopRecording();
        }
      }, MAX_RECORDING_MS);
    } catch (err) {
      console.error("mic_permission_or_error", err);
      cleanupRecording();
      micBtn.classList.remove("recording");
      alert("Could not access your microphone. Please allow microphone access and try again.");
    }
  }

  function stopRecording() {
    if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === "recording") {
      voiceState.mediaRecorder.stop();
    }
  }

  function cleanupRecording() {
    if (voiceState.timerInterval) { clearInterval(voiceState.timerInterval); voiceState.timerInterval = null; }
    if (voiceState.autoStopTimer) { clearTimeout(voiceState.autoStopTimer); voiceState.autoStopTimer = null; }
    if (voiceState.stream) { voiceState.stream.getTracks().forEach((t) => t.stop()); voiceState.stream = null; }
    removeRecordingIndicator();
  }

  function showRecordingIndicator() {
    const composer = document.querySelector(".composer");
    if (!composer) return;
    voiceState.indicatorEl = document.createElement("div");
    voiceState.indicatorEl.className = "recording-indicator";
    voiceState.indicatorEl.innerHTML = '<span class="red-dot"></span><span class="rec-time">0:00</span> / 1:00';
    composer.appendChild(voiceState.indicatorEl);
  }

  function updateRecordingIndicator() {
    if (!voiceState.indicatorEl) return;
    const elapsedMs = Date.now() - voiceState.startedAt;
    const totalSec = Math.floor(elapsedMs / 1000);
    const min = Math.floor(totalSec / 60);
    const sec = totalSec % 60;
    const timeEl = voiceState.indicatorEl.querySelector(".rec-time");
    if (timeEl) timeEl.textContent = `${min}:${String(sec).padStart(2, "0")}`;
  }

  function removeRecordingIndicator() {
    if (voiceState.indicatorEl) { voiceState.indicatorEl.remove(); voiceState.indicatorEl = null; }
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => {
        const result = reader.result || "";
        const idx = String(result).indexOf(",");
        resolve(idx >= 0 ? String(result).slice(idx + 1) : "");
      };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  async function transcribeBlob(blob, mimeType) {
    const micBtn = document.getElementById("mic-btn");
    if (micBtn) micBtn.classList.add("transcribing");
    try {
      const audioBase64 = await blobToBase64(blob);
      const res = await fetch(API_BASE + "/transcribe", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
        body: JSON.stringify({ audioBase64, mimeType })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "transcription_failed");
      const text = (data.text || "").trim();
      if (text) {
        const inputEl = document.getElementById("input");
        if (inputEl) {
          const existing = inputEl.value.trim();
          inputEl.value = existing ? `${existing} ${text}` : text;
          inputEl.style.height = "auto";
          inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
          inputEl.focus();
          inputEl.dispatchEvent(new Event("input", { bubbles: true }));
        }
      }
    } catch (err) {
      console.error("transcribe_failed", err);
      alert("Could not transcribe your message. Please try again or type instead.");
    } finally {
      if (micBtn) micBtn.classList.remove("transcribing");
    }
  }

  // ===== Speaker (Shimrit voice playback) =====
  const speakerState = {
    currentAudio: null,
    currentBtnEl: null,
    currentIndex: -1
  };

  function setSpeakerBtnState(btnEl, stateName) {
    if (!btnEl) return;
    btnEl.classList.remove("loading", "playing");
    if (stateName === "loading") btnEl.classList.add("loading");
    else if (stateName === "playing") btnEl.classList.add("playing");
  }

  function stopCurrentAudio() {
    if (speakerState.currentAudio) {
      try { speakerState.currentAudio.pause(); } catch (e) {}
      try { URL.revokeObjectURL(speakerState.currentAudio.src); } catch (e) {}
      speakerState.currentAudio = null;
    }
    if (speakerState.currentBtnEl) {
      setSpeakerBtnState(speakerState.currentBtnEl, "idle");
      speakerState.currentBtnEl = null;
    }
    speakerState.currentIndex = -1;
  }

  async function playMessageAudio(msgIndex, btnEl) {
    if (speakerState.currentIndex === msgIndex && speakerState.currentAudio) {
      stopCurrentAudio();
      return;
    }
    stopCurrentAudio();

    const msg = state.messages[msgIndex];
    if (!msg || msg.role !== "assistant" || !msg.content) return;

    speakerState.currentBtnEl = btnEl;
    speakerState.currentIndex = msgIndex;
    setSpeakerBtnState(btnEl, "loading");

    try {
      const res = await fetch(API_BASE + "/speak", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-session-token": state.sessionToken
        },
        body: JSON.stringify({ text: msg.content })
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || "tts_failed");
      }
      const audioBlob = await res.blob();
      const audioUrl = URL.createObjectURL(audioBlob);
      const audio = new Audio(audioUrl);
      speakerState.currentAudio = audio;
      audio.onended = () => {
        if (speakerState.currentAudio === audio) stopCurrentAudio();
      };
      audio.onerror = () => {
        if (speakerState.currentAudio === audio) stopCurrentAudio();
      };
      setSpeakerBtnState(btnEl, "playing");
      await audio.play();
    } catch (err) {
      console.error("speak_failed", err);
      setSpeakerBtnState(btnEl, "idle");
      speakerState.currentAudio = null;
      speakerState.currentBtnEl = null;
      speakerState.currentIndex = -1;
    }
  }

  function onSpeakerClick(e) {
    const btn = e.target.closest(".speak-btn");
    if (!btn) return;
    const idx = parseInt(btn.dataset.msgIndex, 10);
    if (Number.isNaN(idx)) return;
    playMessageAudio(idx, btn);
  }

  function maybeAutoplayLastAssistant() {
    if (!state.autoplay) return;
    const lastIdx = state.messages.length - 1;
    if (lastIdx < 0) return;
    const last = state.messages[lastIdx];
    if (!last || last.role !== "assistant") return;
    setTimeout(() => {
      const btn = document.querySelector(`.speak-btn[data-msg-index="${lastIdx}"]`);
      if (btn) playMessageAudio(lastIdx, btn);
    }, 50);
  }

  function onAutoplayChange(e) {
    state.autoplay = !!e.target.checked;
    try { localStorage.setItem("tfif_autoplay_v1", state.autoplay ? "1" : "0"); } catch (err) {}
  }

  // ===== Unlimited API =====
  async function apiListUnlimited() {
    const res = await fetch(API_BASE + "/unlimited/sessions", { method: "GET", headers: { "x-session-token": state.sessionToken } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_list");
    return data.sessions || [];
  }
  async function apiCreateUnlimited() {
    const res = await fetch(API_BASE + "/unlimited/sessions", { method: "POST", headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_create");
    return data.session;
  }
  async function apiLoadUnlimited(id) {
    const res = await fetch(API_BASE + "/unlimited/session?id=" + encodeURIComponent(id), { method: "GET", headers: { "x-session-token": state.sessionToken } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_load");
    return data;
  }
  async function apiUnlimitedChat(sessionId, message) {
    const res = await fetch(API_BASE + "/unlimited/chat", { method: "POST", headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken }, body: JSON.stringify({ sessionId, message }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_send");
    return data;
  }

  // ===== Unlimited handlers =====
  async function onNewChatClick() {
    try {
      const session = await apiCreateUnlimited();
      state.unlimitedSessions.unshift(session);
      state.activeUnlimitedId = session.id;
      state.unlimitedMessages = [];
      state.view = "unlimited-chat";
      render();
    } catch (e) { console.error("create_unl_failed", e); alert("Could not start a new chat. Try again."); }
  }

  function onMagnifierClick() {
    state.searchOpen = !state.searchOpen;
    if (!state.searchOpen) state.searchQuery = "";
    render();
  }

  async function onUnlimitedChatClick(sessionId) {
    if (!sessionId) return;
    if (sessionId === state.activeUnlimitedId && state.view === "unlimited-chat") return;
    try {
      const data = await apiLoadUnlimited(sessionId);
      state.activeUnlimitedId = sessionId;
      state.unlimitedMessages = data.messages || [];
      state.view = "unlimited-chat";
      const idx = state.unlimitedSessions.findIndex(s => s.id === sessionId);
      if (idx >= 0) state.unlimitedSessions[idx] = Object.assign({}, state.unlimitedSessions[idx], data.session);
      render();
    } catch (e) { console.error("load_unl_failed", e); alert("Could not load that conversation."); }
  }

  function renderUnlimitedMessages() {
    const wrap = document.getElementById("messages");
    if (!wrap) return;
    let html = state.unlimitedMessages.map((m, i) => {
      if (m.role === "user") return '<div class="msg-row user"><div class="msg">' + escapeHtml(m.content) + '</div></div>';
      return '<div class="msg-row assistant"><div class="msg">' + renderMarkdown(m.content) + '</div>'
        + '<button class="speak-btn" data-unl-msg-index="' + i + '" type="button" aria-label="Play in Shimrit\'s voice">'
        + '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/><path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>'
        + '</button></div>';
    }).join("");
    if (state.loading) html += '<div class="msg-row assistant"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
    wrap.innerHTML = html;
    const wrapper = document.getElementById("messages-wrap");
    if (wrapper) wrapper.scrollTop = wrapper.scrollHeight;
  }

  function onUnlimitedKeyDown(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); onUnlimitedSendClick(); } }

  async function onUnlimitedSendClick() {
    const inputEl = document.getElementById("input");
    if (!inputEl) return;
    const text = inputEl.value.trim();
    if (!text || state.loading || !state.activeUnlimitedId) return;
    state.unlimitedMessages.push({ role: "user", content: text });
    inputEl.value = "";
    inputEl.style.height = "auto";
    state.loading = true;
    document.getElementById("send-btn").classList.remove("active");
    renderUnlimitedMessages();
    try {
      const data = await apiUnlimitedChat(state.activeUnlimitedId, text);
      state.unlimitedMessages.push({ role: "assistant", content: data.reply });
      state.loading = false;
      const idx = state.unlimitedSessions.findIndex(s => s.id === state.activeUnlimitedId);
      if (idx >= 0) {
        const updated = Object.assign({}, state.unlimitedSessions[idx], { lastMessageAt: new Date().toISOString() });
        if (data.title) updated.title = data.title;
        state.unlimitedSessions.splice(idx, 1);
        state.unlimitedSessions.unshift(updated);
      }
      render();
      maybeAutoplayLastUnlimitedAssistant();
    } catch (err) {
      state.unlimitedMessages.push({ role: "assistant", content: "Something went wrong. Try again in a moment." });
      state.loading = false;
      renderUnlimitedMessages();
    }
  }

  function onUnlimitedSpeakerClick(e) {
    const btn = e.target.closest(".speak-btn");
    if (!btn) return;
    const idx = parseInt(btn.dataset.unlMsgIndex, 10);
    if (Number.isNaN(idx)) return;
    playUnlimitedMessageAudio(idx, btn);
  }

  async function playUnlimitedMessageAudio(idx, btnEl) {
    if (speakerState.currentIndex === idx && speakerState.currentAudio) { stopCurrentAudio(); return; }
    stopCurrentAudio();
    const msg = state.unlimitedMessages[idx];
    if (!msg || msg.role !== "assistant" || !msg.content) return;
    speakerState.currentBtnEl = btnEl;
    speakerState.currentIndex = idx;
    setSpeakerBtnState(btnEl, "loading");
    try {
      const res = await fetch(API_BASE + "/speak", { method: "POST", headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken }, body: JSON.stringify({ text: msg.content }) });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || "tts_failed"); }
      const blob = await res.blob();
      const audio = new Audio(URL.createObjectURL(blob));
      speakerState.currentAudio = audio;
      audio.onended = () => { if (speakerState.currentAudio === audio) stopCurrentAudio(); };
      audio.onerror = () => { if (speakerState.currentAudio === audio) stopCurrentAudio(); };
      setSpeakerBtnState(btnEl, "playing");
      await audio.play();
    } catch (err) {
      console.error("speak_failed", err);
      setSpeakerBtnState(btnEl, "idle");
      speakerState.currentAudio = null; speakerState.currentBtnEl = null; speakerState.currentIndex = -1;
    }
  }

  function maybeAutoplayLastUnlimitedAssistant() {
    if (!state.autoplay) return;
    const last = state.unlimitedMessages.length - 1; if (last < 0) return;
    const m = state.unlimitedMessages[last]; if (!m || m.role !== "assistant") return;
    setTimeout(() => { const btn = document.querySelector('.speak-btn[data-unl-msg-index="' + last + '"]'); if (btn) playUnlimitedMessageAudio(last, btn); }, 50);
  }

  async function loadFullState() {
    try {
      const data = await apiState(state.sessionToken);
      if (data.expired) { state.view = "entry"; render(); return; }
      state.currentDay = data.currentDay || 1;
      state.lastCompletedDay = data.lastCompletedDay || 0;
      state.timeRemainingMs = data.timeRemainingMs;
      // Filter to messages for the CURRENT day only. Each day is its own
      // thread in the demo. Falls back to all messages if no day metadata
      // is present (older sessions).
      const allMessages = data.messages || [];
      const filtered = allMessages.filter(m => {
        if (m.dayAtSend == null) return true;
        return Number(m.dayAtSend) === Number(state.currentDay);
      });
      state.messages = filtered.length > 0 ? filtered : allMessages;
      state.view = "chat";
      render();
    } catch (err) {
      clearToken();
      state.sessionToken = null;
      state.view = "entry";
      render();
    }
  }

  async function loadUnlimitedSessions() {
    try { state.unlimitedSessions = await apiListUnlimited(); }
    catch (e) { console.warn("could_not_load_unlimited_sessions", e?.message); state.unlimitedSessions = []; }
  }

  function init() {
    applyTheme(loadTheme());
    const existing = loadToken();
    if (existing) {
      state.sessionToken = existing;
      loadFullState().then(() => loadUnlimitedSessions().then(() => render()));
    } else {
      state.view = "entry";
      render();
    }
  }

  init();
})();
</script>
</body>
</html>
