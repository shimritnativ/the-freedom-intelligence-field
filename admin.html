<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Field — Members Metrics</title>
  <style>
    :root {
      --bg: #FAF5E4;
      --panel: #F4ECD0;
      --gold: #C9A84C;
      --gold-soft: rgba(201, 168, 76, 0.15);
      --gold-line: rgba(201, 168, 76, 0.35);
      --dark: #2C2416;
      --text: #1A1612;
      --text-dim: #6B5F3F;
      --text-mute: #9A8D6C;
      --border: rgba(201, 168, 76, 0.25);
      --green: #4A7C3A;
      --red: #C03A2B;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 36px 28px 80px;
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 22px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .brand-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-transform: uppercase;
    }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-size: 30px;
      color: var(--text);
      margin: 4px 0 0;
      font-weight: 400;
    }
    .viewer {
      font-size: 12px;
      color: var(--text-dim);
      text-align: right;
    }
    .viewer .v-email { color: var(--text); font-weight: 600; }

    /* Date range controls */
    .date-controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      background: #FFFFFF;
      border: 1px solid var(--gold-line);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 22px;
    }
    .date-controls-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-right: 4px;
    }
    .preset-btn {
      background: transparent;
      border: 1px solid var(--gold-line);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .preset-btn:hover { border-color: var(--gold); background: var(--gold-soft); }
    .preset-btn.active {
      background: var(--gold);
      color: var(--dark);
      border-color: var(--gold);
    }
    .date-input {
      font-family: inherit;
      font-size: 12px;
      padding: 6px 10px;
      border: 1px solid var(--gold-line);
      border-radius: 6px;
      background: #FFFFFF;
      color: var(--text);
    }
    .date-sep { color: var(--text-mute); font-size: 12px; }
    .apply-btn {
      background: var(--gold);
      border: 1px solid var(--gold);
      color: var(--dark);
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
    }
    .apply-btn:hover { background: #B89232; border-color: #B89232; }
    .range-summary {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* KPI cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 30px;
    }
    .kpi {
      background: var(--panel);
      border: 1px solid var(--gold-line);
      border-radius: 12px;
      padding: 18px 18px 16px;
      position: relative;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .kpi.clickable { cursor: pointer; }
    .kpi.clickable:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201, 168, 76, 0.18);
    }
    .kpi.clickable::after {
      content: "↓";
      position: absolute;
      top: 14px;
      right: 14px;
      color: var(--gold);
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .kpi.clickable:hover::after { opacity: 1; }
    .kpi.kpi-revenue {
      background: linear-gradient(135deg, var(--gold-soft) 0%, var(--panel) 100%);
      border-color: var(--gold);
    }
    /* Flash effect when scrolled-to via KPI card click */
    .section.flash {
      animation: section-flash 1.4s ease-out;
    }
    @keyframes section-flash {
      0% { box-shadow: 0 0 0 4px var(--gold), 0 12px 40px rgba(0, 0, 0, 0.08); }
      100% { box-shadow: 0 0 0 0 rgba(201, 168, 76, 0), 0 12px 40px rgba(0, 0, 0, 0.08); }
    }

    /* Today's Highlights strip */
    .highlights {
      background: linear-gradient(135deg, var(--gold-soft) 0%, var(--panel) 100%);
      border: 1px solid var(--gold);
      border-radius: 14px;
      padding: 18px 22px 16px;
      margin-bottom: 22px;
    }
    .highlights-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .highlights-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .highlights-title {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 17px;
      color: var(--text);
      margin: 4px 0 0;
    }
    .highlights-date {
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }
    .highlights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    .highlight {
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid var(--gold-line);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .highlight-value {
      font-family: Georgia, serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.1;
      min-width: 32px;
    }
    .highlight-label {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.35;
      flex: 1;
    }
    .highlight-label strong { color: var(--text); font-weight: 600; }
    .highlights-quiet {
      font-style: italic;
      color: var(--text-mute);
      font-size: 13px;
      padding: 8px 0;
    }
    .kpi-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .kpi-value {
      font-family: Georgia, serif;
      font-size: 32px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.1;
    }
    .kpi-sub { font-size: 11px; color: var(--text-mute); margin-top: 4px; }

    .section {
      background: #FFFFFF;
      border: 1px solid var(--gold-line);
      border-radius: 14px;
      padding: 22px 24px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
    }
    .section h2 {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      margin: 0 0 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .section h2 .h2-eyebrow {
      display: inline-block;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-style: normal;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      margin-right: 10px;
      padding: 2px 7px;
      background: var(--gold-soft);
      border-radius: 999px;
      vertical-align: middle;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
    @media (max-width: 760px) { .two-col { grid-template-columns: 1fr; } }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    th {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      color: var(--text-dim); text-transform: uppercase; background: var(--panel);
    }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    th.num { text-align: right; }
    tr:last-child td { border-bottom: none; }

    .tier-badge {
      display: inline-block;
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      padding: 2px 8px; border-radius: 999px; text-transform: uppercase;
    }
    .tier-preview { background: rgba(201, 168, 76, 0.18); color: #8B6F2F; }
    .tier-full { background: rgba(74, 124, 58, 0.18); color: var(--green); }

    .funnel-row {
      display: grid; grid-template-columns: 18px 110px 1fr 110px;
      align-items: center; gap: 12px; padding: 8px 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    /* Visually nest subset rows (Day 1/2/3 and "Didn't start") inside the
       Logged in partition so the math is obvious at a glance. */
    .funnel-row--subset {
      margin-left: 28px;
      grid-template-columns: 18px 92px 1fr 110px;
    }
    .funnel-row--subset .funnel-label::before {
      content: "└";
      color: var(--text-mute);
      margin-right: 6px;
      font-weight: 400;
    }
    .funnel-row--subset .funnel-label {
      font-size: 12.5px;
      color: var(--text-dim);
    }
    .funnel-row:hover { background: var(--panel); }
    .funnel-row.not-clickable { cursor: default; }
    .funnel-row.not-clickable:hover { background: transparent; }
    .funnel-row.dropout .funnel-bar-fill {
      background: linear-gradient(90deg, #B85C4A 0%, #8F4031 100%);
    }
    .funnel-chevron {
      color: var(--gold);
      font-size: 11px;
      transition: transform 0.2s ease;
      text-align: center;
    }
    .funnel-row.expanded .funnel-chevron { transform: rotate(90deg); }
    .funnel-row.not-clickable .funnel-chevron { color: transparent; }
    .funnel-label { font-weight: 600; font-size: 13px; }
    .funnel-bar-track {
      height: 14px; background: var(--panel); border-radius: 999px; overflow: hidden;
    }
    .funnel-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold) 0%, #B89232 100%);
      border-radius: 999px; transition: width 0.6s ease;
    }
    .funnel-stat { text-align: right; font-size: 13px; font-variant-numeric: tabular-nums; }
    .funnel-stat .pct { color: var(--text); font-weight: 600; }
    .funnel-stat .n { color: var(--text-mute); font-size: 11px; }
    .funnel-emails {
      margin: 4px 0 12px 30px;
      padding: 10px 14px;
      background: var(--panel);
      border-left: 2px solid var(--gold);
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .funnel-emails.open { display: block; }
    .funnel-emails ul { margin: 0; padding-left: 16px; }
    .funnel-emails li { margin: 2px 0; color: var(--text); }
    .funnel-emails li .email-name { color: var(--text-dim); margin-left: 6px; }
    .funnel-emails .empty {
      color: var(--text-mute); font-style: italic;
    }

    .signup-row {
      display: grid; grid-template-columns: 90px 1fr 60px;
      align-items: center; gap: 10px; padding: 4px 0; font-size: 12px;
    }
    .signup-bar-track { height: 8px; background: var(--panel); border-radius: 999px; overflow: hidden; }
    .signup-bar-fill { height: 100%; background: var(--gold); border-radius: 999px; }
    .signup-row .date { color: var(--text-dim); }
    .signup-row .n { text-align: right; font-weight: 600; }

    .gate {
      max-width: 480px; margin: 80px auto;
      padding: 36px 32px; background: #FFFFFF;
      border: 1px solid var(--gold-line); border-radius: 16px;
      text-align: center; box-shadow: var(--shadow);
    }
    .gate h1 { font-size: 22px; margin-bottom: 12px; }
    .gate p { color: var(--text-dim); margin: 8px 0; font-size: 14px; }
    .gate a { color: var(--gold); font-weight: 600; text-decoration: none; }
    .gate a:hover { text-decoration: underline; }

    .footnote {
      font-size: 11px; color: var(--text-mute);
      font-style: italic; margin-top: 12px; line-height: 1.5;
    }
    .loading {
      text-align: center; padding: 80px 24px;
      color: var(--text-dim); font-style: italic;
    }
    .note-box {
      background: var(--gold-soft); border: 1px solid var(--gold-line);
      border-radius: 10px; padding: 12px 16px;
      font-size: 12px; color: var(--text-dim); margin-top: 12px;
    }
    .note-box strong { color: var(--text); }
    .note-box code {
      background: #FFFFFF; padding: 2px 6px; border-radius: 4px;
      font-family: "SF Mono", Monaco, monospace; font-size: 11px;
    }
    .empty-state {
      text-align: center; padding: 24px 12px;
      color: var(--text-mute); font-style: italic; font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">Loading metrics…</div>
  </div>

  <script>
    const STORAGE_KEY = "tfif_session_v1";
    const RANGE_STORAGE_KEY = "tfif_admin_range_v1";
    const root = document.getElementById("root");

    // State for the date range picker. Defaults to "since launch" until the
    // user picks something else. Stored in localStorage so it survives refresh.
    const state = {
      preset: "launch", // 'launch' | '7d' | '30d' | 'custom'
      from: null,       // YYYY-MM-DD (only used when preset === 'custom')
      to: null,         // YYYY-MM-DD
      launchDate: "2026-06-15",
      data: null,
    };

    try {
      const saved = JSON.parse(localStorage.getItem(RANGE_STORAGE_KEY) || "{}");
      if (saved.preset) state.preset = saved.preset;
      if (saved.from) state.from = saved.from;
      if (saved.to) state.to = saved.to;
    } catch {}

    function persistRange() {
      try {
        localStorage.setItem(RANGE_STORAGE_KEY, JSON.stringify({
          preset: state.preset, from: state.from, to: state.to,
        }));
      } catch {}
    }

    function escapeHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function fmtNum(n) {
      if (n == null) return "0";
      return Number(n).toLocaleString();
    }

    function fmtEur(cents) {
      if (cents == null) return "€0";
      const n = Number(cents) / 100;
      return "€" + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtPct(num, denom) {
      if (!denom) return "0%";
      return ((num / denom) * 100).toFixed(1) + "%";
    }

    function fmtDate(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    // Map raw DB tier values to the user-facing names the team actually uses.
    // The CSS classes (tier-preview / tier-full) stay the same — only the
    // label text changes.
    function tierLabel(tier) {
      if (tier === "preview") return "Power Reset";
      if (tier === "full") return "Unlimited";
      return tier || "—";
    }

    function fmtRelative(iso) {
      if (!iso) return "—";
      const ms = Date.now() - new Date(iso).getTime();
      const days = Math.floor(ms / (1000 * 60 * 60 * 24));
      if (days === 0) return "today";
      if (days === 1) return "1 day ago";
      if (days < 30) return days + " days ago";
      const months = Math.floor(days / 30);
      if (months === 1) return "1 month ago";
      return months + " months ago";
    }

    function todayStr() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function daysAgoStr(n) {
      const d = new Date();
      d.setDate(d.getDate() - n);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function resolveRange() {
      // Returns { from, to } as YYYY-MM-DD strings based on current preset.
      switch (state.preset) {
        case "7d":     return { from: daysAgoStr(7), to: null };
        case "30d":    return { from: daysAgoStr(30), to: null };
        case "custom": return { from: state.from || state.launchDate, to: state.to || null };
        case "launch":
        default:       return { from: state.launchDate, to: null };
      }
    }

    function renderGate(message) {
      root.innerHTML = `
        <div class="gate">
          <div class="brand-eyebrow">The Field — Team</div>
          <h1>Team metrics</h1>
          <p>${escapeHtml(message)}</p>
          <p><a href="/app.html">Open The Field →</a></p>
        </div>
      `;
    }

    async function loadMetrics() {
      let token;
      try { token = localStorage.getItem(STORAGE_KEY); } catch { token = null; }
      if (!token) {
        renderGate("You need to log in to The Field first. Open the app, log in, then come back here.");
        return;
      }

      const { from, to } = resolveRange();
      const params = new URLSearchParams();
      if (from) params.set("from", from);
      if (to) params.set("to", to);

      try {
        const r = await fetch("/api/admin/metrics?" + params.toString(), {
          method: "GET",
          headers: { "x-session-token": token },
        });
        if (r.status === 401) {
          renderGate("Your session expired. Open The Field, log in again, then refresh this page.");
          return;
        }
        if (r.status === 403) {
          renderGate("This page is restricted to the @shimritnativ.com team.");
          return;
        }
        if (!r.ok) {
          renderGate("Something went wrong loading the metrics. Refresh and try again.");
          return;
        }
        const data = await r.json();
        state.data = data;
        if (data.dateRange && data.dateRange.launchDate) {
          state.launchDate = data.dateRange.launchDate.slice(0, 10);
        }
        renderDashboard(data);
      } catch (err) {
        renderGate("Network error. Check your connection and refresh.");
      }
    }

    function onPreset(preset) {
      state.preset = preset;
      if (preset !== "custom") {
        state.from = null; state.to = null;
      }
      persistRange();
      loadMetrics();
    }

    function onApplyCustom() {
      const fromEl = document.getElementById("from-date");
      const toEl = document.getElementById("to-date");
      state.preset = "custom";
      state.from = fromEl.value || state.launchDate;
      state.to = toEl.value || null;
      persistRange();
      loadMetrics();
    }

    function rangeLabel() {
      const { from, to } = resolveRange();
      const fromLabel = from === state.launchDate ? "launch (" + fmtDate(state.launchDate + "T00:00:00") + ")" : fmtDate(from + "T00:00:00");
      const toLabel = to ? fmtDate(to + "T00:00:00") : "now";
      return `${fromLabel} → ${toLabel}`;
    }

    function renderControls() {
      const { from, to } = resolveRange();
      const fromVal = from || "";
      const toVal = to || "";
      return `
        <div class="date-controls">
          <span class="date-controls-label">Range</span>
          <button class="preset-btn ${state.preset === 'launch' ? 'active' : ''}" onclick="onPreset('launch')">Since launch</button>
          <button class="preset-btn ${state.preset === '7d' ? 'active' : ''}" onclick="onPreset('7d')">Last 7 days</button>
          <button class="preset-btn ${state.preset === '30d' ? 'active' : ''}" onclick="onPreset('30d')">Last 30 days</button>
          <span style="margin: 0 4px; color: var(--gold-line);">|</span>
          <input type="date" id="from-date" class="date-input" value="${escapeHtml(fromVal)}" />
          <span class="date-sep">to</span>
          <input type="date" id="to-date" class="date-input" value="${escapeHtml(toVal)}" />
          <button class="apply-btn" onclick="onApplyCustom()">Apply</button>
          <span class="range-summary">Showing: ${rangeLabel()} · team excluded</span>
        </div>
      `;
    }

    function renderDashboard(d) {
      const c = d.completion || {};
      const w = d.windowState || {};
      const u = d.unlimitedEngagement || {};
      const tc = d.thrivecart || {};

      let resetTotal = 0, unlimitedTotal = 0, unlimitedMonthly = 0, unlimitedAnnual = 0, unlimitedNone = 0;
      (d.tierCounts || []).forEach(t => {
        if (t.tier === "preview") resetTotal += t.n;
        if (t.tier === "full") {
          unlimitedTotal += t.n;
          if (t.plan === "monthly") unlimitedMonthly += t.n;
          else if (t.plan === "yearly") unlimitedAnnual += t.n;
          else unlimitedNone += t.n;
        }
      });
      const totalMembers = resetTotal + unlimitedTotal;

      const maxSignup = (d.signupsByDay || []).reduce((m, r) => Math.max(m, r.n), 0) || 1;
      const signupsByDate = {};
      (d.signupsByDay || []).forEach(r => {
        if (!signupsByDate[r.day]) signupsByDate[r.day] = 0;
        signupsByDate[r.day] += r.n;
      });
      const signupDates = Object.keys(signupsByDate).sort().reverse().slice(0, 21);

      // ThriveCart KPIs
      const tcSummary = tc.summary || {};
      const grossCents = Number(tcSummary.gross_cents || 0);
      const refundCents = Number(tcSummary.refund_cents || 0);
      const netCents = grossCents - refundCents;

      root.innerHTML = `
        <div class="wrap">
          <div class="topbar">
            <div>
              <div class="brand-eyebrow">The Field — Team</div>
              <h1>Live metrics</h1>
            </div>
            <div class="viewer">
              <div>Viewing as <span class="v-email">${escapeHtml(d.viewer.email)}</span></div>

    function renderFunnel(c, details) {
      // Base = ALL Power Reset members (not just those who logged in), so
      // percentages reflect the full launch funnel from purchase → completion.
      const base = c.total_members || 0;
      const loggedIn = c.total_logged_in || 0;
      const neverLoggedIn = c.never_logged_in || 0;
      details = details || [];

      // Bucket logged-in members by their current day stage. Members with
      // first_login_at = null go in the "never_logged_in" bucket separately.
      const buckets = { 0: [], 1: [], 2: [], 3: [] };
      const neverLogged = [];
      details.forEach(u => {
        if (!u.first_login_at) {
          neverLogged.push(u);
        } else {
          const d = Math.max(0, Math.min(3, u.last_completed_day || 0));
          buckets[d].push(u);
        }
      });

      const emailsByStage = {
        "never_logged_in": neverLogged,
        "logged_in": details.filter(u => u.first_login_at),
        "stuck": buckets[0],
        "d1": buckets[1].concat(buckets[2]).concat(buckets[3]),
        "d2": buckets[2].concat(buckets[3]),
        "d3": buckets[3],
      };

      const rows = [
        // Top-level partition (sums to 7): Never logged in + Logged in
        { stage: "never_logged_in", label: "Never logged in", count: neverLoggedIn, pct: base ? (neverLoggedIn / base) * 100 : 0, dropout: true, subset: false },
        { stage: "logged_in", label: "Logged in", count: loggedIn, pct: base ? (loggedIn / base) * 100 : 0, dropout: false, subset: false },
        // Subset rows — each one slices into "Logged in" further. Indented
        // visually to show they're nested, not additive top-level rows.
        { stage: "d1", label: "Day 1", count: c.d1 || 0, pct: base ? ((c.d1 || 0) / base) * 100 : 0, dropout: false, subset: true },
        { stage: "d2", label: "Day 2", count: c.d2 || 0, pct: base ? ((c.d2 || 0) / base) * 100 : 0, dropout: false, subset: true },
        { stage: "d3", label: "Day 3", count: c.d3 || 0, pct: base ? ((c.d3 || 0) / base) * 100 : 0, dropout: false, subset: true },
        { stage: "stuck", label: "Logged in but didn't start", count: buckets[0].length, pct: base ? (buckets[0].length / base) * 100 : 0, dropout: true, subset: true },
      ];

      return rows.map((r, i) => {
        const emails = emailsByStage[r.stage] || [];
        const hasEmails = emails.length > 0;
        const rowId = `funnel-row-${r.stage}`;
        const emailsId = `funnel-emails-${r.stage}`;
        return `
          <div class="funnel-row ${r.subset ? 'funnel-row--subset' : ''} ${r.dropout ? 'dropout' : ''} ${hasEmails ? '' : 'not-clickable'}" id="${rowId}" ${hasEmails ? `onclick="toggleFunnelRow('${r.stage}')"` : ''}>
            <div class="funnel-chevron">▶</div>
            <div class="funnel-label">${escapeHtml(r.label)}</div>
            <div class="funnel-bar-track"><div class="funnel-bar-fill" style="width:${r.pct}%;"></div></div>
            <div class="funnel-stat">
              <div class="pct">${r.pct.toFixed(1)}%</div>
              <div class="n">${fmtNum(r.count)} ${r.count === 1 ? 'member' : 'members'}</div>
            </div>
          </div>
          <div class="funnel-emails" id="${emailsId}">
            ${emails.length === 0
              ? '<div class="empty">No members in this stage.</div>'
              : `<ul>${emails.map(u => `
                  <li>
                    <span>${escapeHtml(u.email)}</span>
                    ${u.display_name ? `<span class="email-name">(${escapeHtml(u.display_name)})</span>` : ''}
                  </li>
                `).join("")}</ul>`}
          </div>
        `;
      }).join("");
    }

    // Smooth-scroll to a section by ID and briefly flash a gold ring around
    // it so the user's eye lands on the right place. Triggered by clicking
    // any of the top KPI cards.
    function scrollToSection(targetId) {
      const el = document.getElementById(targetId);
      if (!el) return;
      el.scrollIntoView({ behavior: "smooth", block: "start" });
      el.classList.remove("flash"); // restart animation if already flashed
      void el.offsetWidth; // force reflow
      el.classList.add("flash");
      setTimeout(() => el.classList.remove("flash"), 1500);
    }
    window.scrollToSection = scrollToSection;

    // Render the Today's Highlights strip. Shows a snapshot of activity since
    // midnight: new signups, revenue, day completions, unlimited engagement.
    // Renders a quiet placeholder if nothing has happened yet today.
    function renderHighlights(today) {
      const t = today || {};
      const signups = Number(t.signups_today || 0);
      const revenue = Number(t.revenue_today_cents || 0);
      const orders = Number(t.orders_today || 0);
      const completions = Number(t.completions_today || 0);
      const activeUnlimited = Number(t.active_unlimited_today || 0);
      const unlimitedMessages = Number(t.unlimited_messages_today || 0);
      const nothingYet = signups === 0 && orders === 0 && completions === 0 && activeUnlimited === 0;

      const todayLabel = new Date().toLocaleDateString(undefined, {
        weekday: "long", month: "long", day: "numeric"
      });

      if (nothingYet) {
        return `
          <div class="highlights">
            <div class="highlights-header">
              <div>
                <div class="highlights-eyebrow">Today's highlights</div>
                <div class="highlights-title">A quiet start so far</div>
              </div>
              <div class="highlights-date">${escapeHtml(todayLabel)}</div>
            </div>
            <div class="highlights-quiet">No signups, sales, or completions yet today. Check back later or scroll for the live state of the launch.</div>
          </div>
        `;
      }

      const tiles = [];
      if (signups > 0) {
        const breakdown = [];
        if (Number(t.signups_today_reset) > 0) breakdown.push(`${Number(t.signups_today_reset)} Reset`);
        if (Number(t.signups_today_unlimited) > 0) breakdown.push(`${Number(t.signups_today_unlimited)} Unlimited`);
        tiles.push({ value: signups, label: `new <strong>signup${signups === 1 ? '' : 's'}</strong>${breakdown.length ? ' &middot; ' + breakdown.join(' &middot; ') : ''}`, target: "panel-roster" });
      }
      if (revenue > 0) {
        tiles.push({ value: fmtEur(revenue), label: `revenue from <strong>${orders} order${orders === 1 ? '' : 's'}</strong>`, target: "panel-revenue", isCurrency: true });
      } else if (orders > 0) {
        tiles.push({ value: orders, label: `free <strong>order${orders === 1 ? '' : 's'}</strong> today`, target: "panel-revenue" });
      }
      if (completions > 0) {
        tiles.push({ value: completions, label: `Day <strong>completion${completions === 1 ? '' : 's'}</strong> across all 3 days`, target: "panel-funnel" });
      }
      if (activeUnlimited > 0) {
        tiles.push({ value: activeUnlimited, label: `Unlimited member${activeUnlimited === 1 ? '' : 's'} active &middot; <strong>${unlimitedMessages} message${unlimitedMessages === 1 ? '' : 's'}</strong>`, target: "panel-unlimited-engagement" });
      }

      return `
        <div class="highlights">
          <div class="highlights-header">
            <div>
              <div class="highlights-eyebrow">Today's highlights</div>
              <div class="highlights-title">What's happened since midnight</div>
            </div>
            <div class="highlights-date">${escapeHtml(todayLabel)}</div>
          </div>
          <div class="highlights-grid">
            ${tiles.map(tile => `
              <div class="highlight" onclick="scrollToSection('${tile.target}')" style="cursor: pointer;">
                <div class="highlight-value">${tile.isCurrency ? tile.value : fmtNum(tile.value)}</div>
                <div class="highlight-label">${tile.label}</div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    // Toggle a funnel row's email dropdown. Closes any other open one so only
    // one is expanded at a time.
    function toggleFunnelRow(stage) {
      const allEmails = document.querySelectorAll('.funnel-emails');
      const allRows = document.querySelectorAll('.funnel-row');
      const targetEmails = document.getElementById('funnel-emails-' + stage);
      const targetRow = document.getElementById('funnel-row-' + stage);
      const wasOpen = targetEmails.classList.contains('open');
      allEmails.forEach(el => el.classList.remove('open'));
      allRows.forEach(el => el.classList.remove('expanded'));
      if (!wasOpen) {
        targetEmails.classList.add('open');
        targetRow.classList.add('expanded');
      }
    }
    window.toggleFunnelRow = toggleFunnelRow;

            Revenue data lights up the moment ThriveCart starts posting purchase webhooks to the new endpoint. Three steps:
          </p>
          <div class="note-box" style="line-height: 1.7;">
            <strong>1.</strong> In <strong>Neon</strong> (Vercel → Storage → Open in Neon → SQL Editor), paste &amp; run the <code>CREATE TABLE purchases</code> SQL block from the bottom of <code>api/webhooks/thrivecart.js</code>.
            <br>
            <strong>2.</strong> In <strong>Vercel</strong> → Project Settings → Environment Variables, add <code>THRIVECART_WEBHOOK_SECRET</code> with a long random string. Redeploy.
            <br>
            <strong>3.</strong> In <strong>ThriveCart</strong> → Settings → API &amp; Webhooks: paste <code>https://thefieldai.app/api/webhooks/thrivecart</code> as the webhook URL, paste the same secret you set in Vercel, and select all event types (order.success, order.refund, order.subscription_payment, order.subscription_cancelled).
          </div>
          <div class="footnote">Once a real order comes through, this section automatically replaces itself with live revenue, coupon breakdown, product breakdown, and top buyers.</div>
        </div>
      `;
    }

    // Trigger the day-completion backfill endpoint using the current session.
    // Used by the "Run completion backfill" / "Dry run first" buttons under
    // the funnel. Posts to /api/admin/backfill-completions with the same
    // x-session-token the dashboard already uses, so no ADMIN_TOKEN is
    // needed when running from the browser as a @shimritnativ.com viewer.
    async function runBackfill(dryRun) {
      const status = document.getElementById("backfill-status");
      const realBtn = document.getElementById("backfill-btn");
      const dryBtn = document.getElementById("backfill-dryrun-btn");
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) {
        status.textContent = "Session expired. Refresh the page and try again.";
        return;
      }
      realBtn.disabled = true;
      dryBtn.disabled = true;
      status.textContent = dryRun
        ? "Running dry-run scan of all past assistant messages…"
        : "Backfilling completions from past messages… this can take up to a minute.";
      try {
        const url = "/api/admin/backfill-completions" + (dryRun ? "?dry_run=1" : "");
        const r = await fetch(url, {
          method: "POST",
          headers: { "x-session-token": token },
        });
        if (!r.ok) {
          const errBody = await r.text().catch(() => "");
          status.textContent = "Backfill failed (HTTP " + r.status + "). " + errBody.slice(0, 200);
          return;
        }
        const data = await r.json();
        if (dryRun) {
          status.innerHTML = "Dry-run complete: <strong>" + data.candidates + " candidate messages</strong> across <strong>" + (data.details || []).length + "</strong> records. None were inserted. Click 'Run completion backfill' to do it for real.";
        } else {
          status.innerHTML = "Done. Scanned <strong>" + data.candidates + "</strong> candidate messages, recorded <strong>" + data.recorded + "</strong> new completions, skipped " + data.skipped_strict + " (didn't pass strict extraction). Reload to see updated funnel.";
        }
      } catch (err) {
        status.textContent = "Network error: " + (err.message || err);
      } finally {
        realBtn.disabled = false;
        dryBtn.disabled = false;
      }
    }
    window.runBackfill = runBackfill;

    // Expose for inline onclick handlers
    window.loadMetrics = loadMetrics;
    window.onPreset = onPreset;
    window.onApplyCustom = onApplyCustom;

    loadMetrics();
  </script>
