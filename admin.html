          <p><a href="/app.html">Open The Field →</a></p>
        </div>
      `;
    }

    // ===== Intelligence dismissals =====
    // Fetched alongside metrics so renderIntelligence can hide rows the
    // admin has dismissed (default 7-day expiry). State lives on
    // window._intelDismissalsBySegment (map of segment_key → Set of
    // user_ids) and window._intelDismissalsList (raw rows with metadata).
    async function fetchIntelDismissals() {
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) return;
      try {
        const r = await fetch("/api/admin/intelligence-dismissals", {
          method: "GET",
          headers: { "x-session-token": token },
        });
        if (!r.ok) return;
        const data = await r.json();
        const list = data.dismissals || [];
        const bySegment = {};
        for (const d of list) {
          if (!bySegment[d.segment_key]) bySegment[d.segment_key] = new Set();
          bySegment[d.segment_key].add(d.target_user_id);
        }
        window._intelDismissalsBySegment = bySegment;
        window._intelDismissalsList = list;
      } catch (e) {}
    }

    // Brief toast in the bottom-center of the screen confirming a
    // dismissal or restore action. Auto-fades after 2 seconds.
    let _toastTimer = null;
    function showIntelToast(message) {
      let el = document.getElementById("intel-toast");
      if (!el) {
        el = document.createElement("div");
        el.id = "intel-toast";
        el.className = "intel-toast";
        document.body.appendChild(el);
      }
      el.textContent = message;
      requestAnimationFrame(() => el.classList.add("is-shown"));
      if (_toastTimer) clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => el.classList.remove("is-shown"), 2200);
    }

    async function dismissIntelMember(segmentKey, userId, displayName) {
      if (!userId) return;
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) { alert("Session expired. Refresh the page."); return; }
      // Optimistic update: remove the row from view immediately, then
      // record in the DB. On failure, we re-render to put the row back.
      const card = document.querySelector(`.intel-member[data-segment="${segmentKey}"][data-user-id="${userId}"]`);
      if (card) card.style.display = "none";
      try {
        const r = await fetch("/api/admin/intelligence-dismissals", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session-token": token },
          body: JSON.stringify({ segment_key: segmentKey, target_user_id: userId }),
        });
        if (!r.ok) throw new Error("save_failed");
        showIntelToast(`Dismissed ${displayName || "member"}. Restore anytime.`);
        // Refresh dismissals state + re-render so the "X dismissed (show)"
        // count updates and the toggle appears.
        await fetchIntelDismissals();
        if (typeof renderDashboard === "function" && state.data) {
          renderDashboard(state.data);
        }
      } catch (e) {
        // Roll back the optimistic hide.
        if (card) card.style.display = "";
        showIntelToast("Couldn't save the dismissal. Try again.");
      }
    }
    window.dismissIntelMember = dismissIntelMember;

    async function restoreIntelMember(segmentKey, userId) {
      if (!userId) return;
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) return;
      try {
        const url = `/api/admin/intelligence-dismissals?segment_key=${encodeURIComponent(segmentKey)}&target_user_id=${encodeURIComponent(userId)}`;
        const r = await fetch(url, {
          method: "DELETE",
          headers: { "x-session-token": token },
        });
        if (!r.ok) throw new Error("delete_failed");
        showIntelToast("Restored. They'll show up again on next refresh.");
        await fetchIntelDismissals();
        if (typeof renderDashboard === "function" && state.data) {
          renderDashboard(state.data);
        }
      } catch (e) {
        showIntelToast("Couldn't restore. Try again.");
      }
    }
    window.restoreIntelMember = restoreIntelMember;

    // Extend a member's Reset preview window. Called by the "Extend"
    // button in the roster Actions column. Prompts for a number of days,
    // POSTs to the extend-preview endpoint (which runs the same UPDATE
    // we've been doing by hand in Neon), then updates the row's preview
    // state in memory + shows a success toast. If the API fails, we
    // surface the actual error so it's diagnosable.
    async function extendPreviewFromRoster(email, displayName) {
      if (!email) return;
      const raw = window.prompt(
        `Extend Reset preview for ${displayName || email}?\n\n` +
        `Enter how many days to add. The extension always starts FROM RIGHT NOW.\n` +
        `If their preview already expired, they get a fresh window.\n` +
        `If it's still open, the new time is added on top.\n\n` +
        `Common values: 3 (standard), 7 (generous), 30 (special case).`,
        "4"
      );
      if (raw === null) return;
      const days = parseInt(String(raw).trim(), 10);
      if (!Number.isFinite(days) || days < 1 || days > 60) {
        window.alert("Please enter a whole number of days between 1 and 60.");
        return;
      }
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) {
        window.alert("Session expired. Refresh the page and sign in again.");
        return;
      }
      const btn = document.querySelector(`.roster-action-btn[data-email="${email}"]`);
      const originalLabel = btn ? btn.textContent : "Extend";
      if (btn) {
        btn.disabled = true;
        btn.textContent = "Extending…";
      }
      try {
        const r = await fetch("/api/admin/extend-preview", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-session-token": token,
          },
          body: JSON.stringify({ email: email.toLowerCase(), days }),
        });
        const payload = await r.json().catch(() => ({}));
        if (!r.ok) {
          const reason = payload && payload.error ? payload.error : `HTTP ${r.status}`;
          showIntelToast("Extension failed: " + reason);
          if (btn) { btn.disabled = false; btn.textContent = originalLabel; }
          return;
        }
        const emailLc = email.toLowerCase();
        const newEndsAt = payload && payload.user && payload.user.preview_ends_at;
        if (state && state.data && Array.isArray(state.data.recentSignups)) {
          for (const u of state.data.recentSignups) {
            if (u && (u.email || "").toLowerCase() === emailLc) {
              u.preview_ends_at = newEndsAt;
            }
          }
        }
        showIntelToast(`Extended by ${days} day${days === 1 ? '' : 's'}. New window closes ${newEndsAt ? new Date(newEndsAt).toLocaleDateString() : 'soon'}.`);
        if (btn) { btn.disabled = false; btn.textContent = originalLabel; }
      } catch (e) {
        showIntelToast("Extension failed: network error");
        if (btn) { btn.disabled = false; btn.textContent = originalLabel; }
      }
    }
    window.extendPreviewFromRoster = extendPreviewFromRoster;

    // Delegated click handler for the roster Actions buttons. Runs from
    // body so it survives re-renders of the roster tbody.
    document.body.addEventListener("click", (e) => {
      const btn = e.target && e.target.closest && e.target.closest('.roster-action-btn');
      if (!btn) return;
      const action = btn.dataset.action;
      const email = btn.dataset.email;
      const name = btn.dataset.name;
      if (action === 'extend-preview') {
        extendPreviewFromRoster(email, name);
      }
    });

    // Inline member-name editor. The Name cell is contenteditable; click
    // it, type the correct name, hit Enter to save (or blur to save on
    // desktop). Esc reverts. Uses fetch against the admin endpoint and
    // surfaces the actual server error so we can debug 4xx/5xx cases
    // instead of a generic "save failed".
    async function saveMemberName(el) {
      if (!el || el.dataset.saving === "true") return;
      const email = (el.dataset.email || "").trim();
      const original = (el.dataset.original || "").trim();
      const next = (el.textContent || "").trim();
      if (!email) return;
      if (!next) {
        // Empty input — revert silently.
        el.textContent = original;
        return;
      }
      if (next === original) return;
      if (next.length > 120) {
        showIntelToast("Name too long (max 120 characters).");
        el.textContent = original;
        return;
      }
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) {
        showIntelToast("Session expired. Refresh + sign in again.");
        el.textContent = original;
        return;
      }
      el.dataset.saving = "true";
      el.style.opacity = "0.55";
      try {
        const r = await fetch("/api/admin/update-member-name", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-session-token": token,
          },
          body: JSON.stringify({ email: email.toLowerCase(), display_name: next }),
        });
        const payload = await r.json().catch(() => ({}));
        if (!r.ok) {
          // Surface the real reason so we can fix it fast next time
          // (unauthorized, user_not_found, invalid_display_name, etc.).
          const reason = payload && payload.error ? payload.error : `HTTP ${r.status}`;
          showIntelToast("Save failed: " + reason);
          el.textContent = original;
          return;
        }
        // Success. Patch every in-memory reference so the next time
        // renderDashboard runs (from the user hitting Refresh or from an
        // auto-fetch) it picks up the new name. But DO NOT call
        // renderDashboard here: doing so wipes the current view including
        // filter state on the Members tab and made it look like the
        // roster had disappeared. In-place text update on the cell is
        // enough for immediate visual feedback; other views pick up the
        // new name on the next natural render.
        const emailLc = email.toLowerCase();
        const patch = (list) => {
          if (!Array.isArray(list)) return;
          for (const u of list) {
            if (u && (u.email || "").toLowerCase() === emailLc) {
              u.display_name = next;
            }
          }
        };
        if (state && state.data) {
          patch(state.data.members);
          patch(state.data.perUserUnlimited);
          if (state.data.intelligence) {
            for (const key of Object.keys(state.data.intelligence)) {
              patch(state.data.intelligence[key]);
            }
          }
        }
        // Persist the new value on the editable span so subsequent edits
        // treat this as the baseline (Esc reverts to it, not to the
        // pre-edit value). Also flip the "fallback" italic class off
        // since the name is now a real DB value.
        el.dataset.original = next;
        el.classList.remove('name-editable--fallback');
        showIntelToast("Name updated.");
      } catch (e) {
        showIntelToast("Save failed: network error");
        el.textContent = original;
      } finally {
        el.dataset.saving = "false";
        el.style.opacity = "";
      }
    }
    window.saveMemberName = saveMemberName;

    // Enter to commit, Esc to revert. Prevents newlines in the
    // contenteditable span so the value stays clean.
    function handleMemberNameKey(event, el) {
      if (event.key === "Enter") {
        event.preventDefault();
        el.blur(); // triggers onblur → saveMemberName
      } else if (event.key === "Escape") {
        event.preventDefault();
        el.textContent = el.dataset.original || "";
        el.blur();
      }
    }
    window.handleMemberNameKey = handleMemberNameKey;

    // Select the whole text on focus so a fresh click lets the admin
    // just start typing over the value without needing to select first.
    function selectMemberNameOnFocus(el) {
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }
    window.selectMemberNameOnFocus = selectMemberNameOnFocus;

    function toggleDismissedList(segmentKey) {
      const el = document.getElementById(`intel-dismissed-${segmentKey}`);
      if (!el) return;
      el.classList.toggle("is-shown");
    }
    window.toggleDismissedList = toggleDismissedList;

    // Wrapper around loadMetrics that ALSO fires the ThriveCart auto-
    // reconcile first. Wired to the top-right Refresh button so one
    // click both catches any missing webhook sales AND reloads the
    // dashboard numbers — Geo doesn't have to wait for the next 10-min
    // cron tick if she spotted a missing sale and wants it in NOW.
    //
    // Reconcile runs in parallel with the metrics fetch (no await on
    // it before loadMetrics), so the dashboard doesn't get slower when
    // there's nothing to reconcile. If a placeholder gets created
    // during the reconcile, it'll show up on the NEXT refresh — but
    // most clicks are just to see fresh data, not to backfill.
    // High-end refresh UX: start/end helpers that toggle the top
    // progress bar, dim the dashboard body, and animate the Refresh
    // button spinner. All state lives on the body element so multiple
    // in-flight refreshes don't fight each other, and the same helpers
    // work for background auto-refreshes too if we ever re-enable them.
    let _refreshDepth = 0;
    let _refreshTopBarEl = null;
    function ensureTopProgressBar() {
      if (_refreshTopBarEl && document.body.contains(_refreshTopBarEl)) return _refreshTopBarEl;
      let el = document.querySelector('.top-progress');
      if (!el) {
        el = document.createElement('div');
        el.className = 'top-progress';
        el.setAttribute('aria-hidden', 'true');
        document.body.appendChild(el);
      }
      _refreshTopBarEl = el;
      return el;
    }
    function setRefreshButtonState(isLoading) {
      const btns = document.querySelectorAll('.refresh-btn');
      btns.forEach(btn => {
        if (isLoading) {
          btn.classList.add('is-loading');
          btn.disabled = true;
          btn.dataset.originalText = btn.dataset.originalText || btn.textContent;
          btn.innerHTML = '<span class="refresh-icon">↻</span> Refreshing…';
        } else {
          btn.classList.remove('is-loading');
          btn.disabled = false;
          btn.innerHTML = '<span class="refresh-icon">↻</span> Refresh';
        }
      });
    }
    function startRefresh() {
      _refreshDepth++;
      ensureTopProgressBar();
      document.body.classList.remove('refresh-completing');
      document.body.classList.add('is-refreshing');
      setRefreshButtonState(true);
    }
    function endRefresh() {
      _refreshDepth = Math.max(0, _refreshDepth - 1);
      if (_refreshDepth > 0) return;
      document.body.classList.remove('is-refreshing');
      document.body.classList.add('refresh-completing');
      setRefreshButtonState(false);
      setTimeout(() => document.body.classList.remove('refresh-completing'), 500);
    }
    window.startRefresh = startRefresh;
    window.endRefresh = endRefresh;

    async function refreshWithReconcile() {
      const token = localStorage.getItem(STORAGE_KEY);
      if (token) {
        // Fire and forget — don't block the metrics load on the
        // reconcile call. force=1 bypasses the 5-min grace window so
        // sales that JUST landed on Kajabi get a placeholder right
        // away. If reconcile creates a placeholder, we re-load metrics
        // once more so the new numbers show without another click.
        fetch("/api/admin/auto-reconcile?force=1", {
          method: "POST",
          headers: { "x-session-token": token },
        }).then(r => r.ok ? r.json() : null)
          .then(data => {
            if (data && data.placeholders_created > 0) {
              console.log("auto_reconcile_created", data.placeholders_created, "placeholder(s)");
              // Re-load metrics one more time so the just-created
              // placeholders show in the numbers without requiring
              // another click.
              setTimeout(() => loadMetrics(), 500);
            }
          })
          .catch(() => {});
      }
      // Load metrics immediately — don't wait on the reconcile.
      loadMetrics();
    }
    window.refreshWithReconcile = refreshWithReconcile;

    async function loadMetrics() {
      let token;
      try { token = localStorage.getItem(STORAGE_KEY); } catch { token = null; }
      if (!token) {
        // No token means we can't fetch anything. Skip the whole refresh
        // UX (no progress bar to end, nothing was started).
        renderGate("You need to log in to The Field first. Open the app, log in with your @shimritnativ.com email, then come back here.");
        return;
      }

      const { from, to } = resolveRange();
      const params = new URLSearchParams();
      if (from) params.set("from", from);
      if (to) params.set("to", to);
      // Cache-buster so every load hits fresh data from the DB. Without
      // this, a stale response along the path (browser, edge, CDN) could
      // stick the numbers even when the API code was updated.
      params.set("_t", Date.now().toString());

      startRefresh();
      try {
        // Fire metrics + real-profit in parallel so the Overview's Real
        // Profit card lands at the same time as everything else. The
        // real-profit endpoint does its own Meta API call + launch tracker
        // parse — slow enough to be worth parallelizing, fast enough that
        // it almost always finishes before metrics anyway.
        // Progressive rendering: fire metrics FIRST and paint the dashboard
        // as soon as it lands. Real-profit (which does the slow Meta Ads
        // API call + Anthropic Admin API + launch tracker parse) fires
        // separately and patches into state when it arrives, then re-
        // renders. Perceived load time drops from 3-6s to under 1s for
        // everything except the Real Profit KPI trio and Channel P&L
        // widgets (which show a shimmering skeleton until real-profit
        // lands). Same pattern Linear/Notion/Hubspot use.
        const rpPromise = fetch("/api/admin/real-profit?_t=" + Date.now(), {
          method: "GET",
          headers: { "x-session-token": token },
          cache: "no-store",
        }).catch(() => null);
        const r = await fetch("/api/admin/metrics?" + params.toString(), {
          method: "GET",
          headers: { "x-session-token": token },
          cache: "no-store",
        });
        if (r.status === 401) {
          renderGate("Your session expired. Open The Field, log in again, then refresh this page.");
          return;
        }
        if (r.status === 403) {
          renderGate("This page is restricted to @shimritnativ.com Field members.");
          return;
        }
        if (!r.ok) {
          renderGate("Something went wrong loading the metrics. Refresh and try again.");
          return;
        }
        const data = await r.json();
        // Mark real-profit as "still loading" so the render can show
        // skeleton placeholders where those widgets will land. Not the
        // same as null (which means "failed") — a real widget-level
        // "loading" flag.
        data.realProfit = null;
        data._realProfitLoading = true;
        // Once real-profit lands, patch it in and re-render. If it
        // failed, drop the flag and re-render to hide the skeletons.
        rpPromise.then(async (rp) => {
          try {
            if (rp && rp.ok) {
              state.data.realProfit = await rp.json();
            } else {
              state.data.realProfit = null;
            }
          } catch (_) {
            state.data.realProfit = null;
          }
          state.data._realProfitLoading = false;
          // Preserve scroll position and active tab across the re-render
          // so the second paint feels like the widgets are filling in
          // rather than a full page reload. Without this the user gets
          // yanked back to the top just as the real profit numbers land.
          const scrollY = window.scrollY || document.documentElement.scrollTop || 0;
          const activeTab = document.querySelector('[data-tab-content]:not([style*="display: none"])')?.getAttribute('data-tab-content');
          if (typeof renderDashboard === "function") renderDashboard(state.data);
          // renderDashboard rebuilds the roster shell but doesn't populate
          // the rows — renderRoster reads state.data.recentSignups and
          // paints them into the roster tbody. Without this call, the
          // re-render leaves the Members tab table empty.
          if (typeof renderRoster === "function") {
            try { renderRoster(); } catch (e) { console.warn("renderRoster_failed", e); }
          }
          if (typeof applyMobileTableLabels === "function") applyMobileTableLabels();
          // Restore tab + scroll after the re-render. Use requestAnimationFrame
          // so the browser has painted the new DOM before we scroll.
          requestAnimationFrame(() => {
            if (activeTab && typeof switchTab === "function") {
              try { switchTab(activeTab); } catch (_) {}
            }
            window.scrollTo({ top: scrollY, behavior: 'instant' });
          });
        });
        state.data = data;
        if (data.dateRange && data.dateRange.launchDate) {
          state.launchDate = data.dateRange.launchDate.slice(0, 10);
        }
        // Fetch the Intelligence dismissals state BEFORE rendering so
        // the first paint already hides anything Geo previously
        // dismissed. Non-blocking fallback: if the fetch fails we
        // render without dismissals applied (visually identical to old
        // behavior, no breakage).
        try { await fetchIntelDismissals(); } catch (e) {}
        renderDashboard(data);
        // Re-populate the filterable roster table from the freshly loaded
        // recentSignups data. renderRoster reads state.data which was
        // just updated above, applies the current filter UI values, and
        // paints the visible page of rows.
        if (typeof renderRoster === "function") {
          try { renderRoster(); } catch (e) { console.warn("renderRoster_failed", e); }
        }
        // Once the dashboard is in the DOM, walk every table and copy
        // each column header onto its corresponding <td> as a data-label
        // attribute. The mobile CSS uses ::before content: attr(data-label)
        // to render that label in front of each cell value when the table
        // is stacked into cards. Runs once here and again after any future
        // re-render that swaps tables out.
        applyMobileTableLabels();
        // Load the push subscribers list and inbox manager lazily after
        // the main dashboard paints, so the "Send a notification" panel
        // is ready to use the moment the admin clicks into it.
        setTimeout(() => {
          loadPushSubscribers();
          loadInboxNotifications();
        }, 100);
      } catch (err) {
        renderGate("Network error. Check your connection and refresh.");
      } finally {
        // End the refresh UX state regardless of success/error/gate path
        // so the progress bar and dim always resolve. Small delay so the
        // eye registers the completion animation rather than snapping.
        setTimeout(() => endRefresh(), 60);
      }
    }

                  </p>

    // Smooth-scroll to a specific Intelligence segment card. Called by the

    // ===== Intelligence tab renderer (action-first redesign) =====
    // Each segment surfaces the smallest set of members who match a specific
    // sales/marketing trigger, with a one-line action and an Email button
    // that opens the user's mail client pre-populated with subject + greeting.
    function renderIntelligence(intel) {
      const firstName = (u) => {
        const dn = (u.display_name || "").trim();
        if (dn) return dn.split(/\s+/)[0];
        return null;
      };
      const greeting = (u) => firstName(u) ? `Hi ${firstName(u)},\n\n` : "Hi,\n\n";

      // Each segment's `why` returns an array of short bullet strings — one
      // observation per bullet. Bullets are easier to scan than a paragraph,
      // and the visual rhythm makes the segment's logic obvious at a glance.
      // HTML inside the bullets (e.g. <strong>) is allowed and not escaped.
      const segments = [
        {
          key: "hot_reset_graduate",
          priority: "hot",
          priorityLabel: "Convert today",
          title: "Hot Reset graduates",
          action: "Offer <strong>Unlimited Field (€77/mo or €777/yr)</strong> within 24h. Add <strong>UNLIMITED50</strong> coupon (50% off first month) for softer nudge.",
          rows: intel.hot_reset_graduate || [],
          why: u => {
            const when = u.day3_completed_at ? `Just finished Day 3 (${fmtRelative(u.day3_completed_at)})` : "Just completed Day 3";
            // Dynamic window message. Base logic: <24h peak, 24-48h still
            // warm, older = past peak. Weekend awareness: if the person
            // finished Day 3 during Fri/Sat/Sun and today is Sat/Sun/Mon,
            // frame it as a weekend graduate whose first business-day
            // window is now, so Geo knows outreach is still timely even
            // if calendar hours look older.
            const completedAt = u.day3_completed_at ? new Date(u.day3_completed_at) : null;
            const hoursAgo = completedAt ? (Date.now() - completedAt.getTime()) / 3600000 : 0;
            const completedDow = completedAt ? completedAt.getDay() : -1; // 0=Sun, 6=Sat
            const todayDow = new Date().getDay();
            const finishedOnWeekend = [5, 6, 0].includes(completedDow); // Fri/Sat/Sun
            const nowIsPostWeekend = [6, 0, 1].includes(todayDow); // Sat/Sun/Mon
            let windowMsg;
            if (finishedOnWeekend && nowIsPostWeekend && hoursAgo < 120) {
              windowMsg = "Weekend graduate, first business-day outreach window";
            } else if (hoursAgo < 24) {
              windowMsg = "Window closes in ~24h, peak conversion moment";
            } else if (hoursAgo < 48) {
              const extra = Math.max(1, Math.round(hoursAgo - 24));
              windowMsg = `Peak window passed ~${extra}h ago, still warm`;
            } else {
              windowMsg = "Past peak window, use a softer nudge angle";
            }
            const bullets = [
              when,
              "Peak emotional state, has just felt the value",
              "Highest-intent moment in the entire funnel",
              windowMsg,

            if (u.coupon_used) bullets.push(`Came in via <strong>${escapeHtml(u.coupon_used)}</strong>`);

          },

        {
          key: "high_intent_buyer",
          priority: "hot",
          priorityLabel: "Stacked purchases",
          title: "High-intent buyers",
          action: "Personal Shimrit outreach. Pitch <strong>Business Accelerator (€5,000)</strong> or <strong>Coaching Certification (€9,999)</strong>. Under €200 total spend → <strong>Business Club (€55/mo)</strong> first.",
          rows: intel.high_intent_buyer || [],
          why: u => {
            const count = Number(u.purchase_count || 0);
            const tot = Number(u.total_cents || 0);
            return [
              `Bought <strong>${fmtNum(count)} products</strong> totaling <strong>${fmtRev(tot)}</strong>`,
              "Said yes at every checkout step of the front-end funnel",
              "Strong purchase muscle, demonstrated trust",
            ];
          },
        },
        {
          key: "at_risk_subscriber",
          priority: "hot",
          priorityLabel: "Win-back",
          title: "At-risk Unlimited subscribers",
          action: "Re-engagement note from Shimrit. If no response in 7d, offer <strong>free 15-min check-in call</strong>. Last resort: pause-subscription option.",
          rows: intel.at_risk_subscriber || [],
          why: u => {
            const days = Number(u.days_quiet || 0);
            const plan = u.subscription_plan ? escapeHtml(u.subscription_plan) : "Unlimited";
            const bullets = [
              `Paying for <strong>${plan}</strong> plan`,
              `<strong>${fmtNum(days)} days</strong> without a message`,
              u.last_message_at ? `Last activity ${fmtRelative(u.last_message_at)}` : "Never engaged after subscribing",
              "Cancellation risk rising — silence is the first symptom",

        {

          rows: intel.ready_for_upsell || [],

              `<strong>${fmtNum(msgs)} messages</strong> in the last 30 days`,

          rows: intel.stuck_reset || [],
          why: u => {
            const day = Number(u.last_completed_day || 0);

            const daysArr = Array.isArray(u.days_completed) ? u.days_completed.filter(d => d != null) : [];
            const daysCompletedLine = daysArr.length > 0
              ? `Days completed: <strong>${daysArr.map(d => `Day ${d}`).join(", ")}</strong>`
              : "Days completed: <em>none yet</em>";
            // Signup + preview window. Show absolute date + "X days ago"
            // so Geo can eyeball how long they've been sitting.

              ? `Joined <strong>${fmtDate(u.signed_up_at)}</strong> (${fmtRelative(u.signed_up_at)})`

              if (previewOpen) {
                const daysLeft = Math.max(0, Math.round(diffDays));
                windowLine = `Preview <strong>still open</strong>, closes ${fmtDate(u.preview_ends_at)} (${daysLeft}d left), urgency angle works`;
              } else {
                const daysAgo = Math.max(0, Math.round(-diffDays));
                windowLine = `Preview <strong>expired</strong> ${fmtDate(u.preview_ends_at)} (${daysAgo}d ago), offer a re-open or pitch Unlimited`;

                : "Preview expired, offer a re-open or pitch Unlimited";
            }
            return [
              "Paid for the Reset",

              windowLine,
            ];
          },
        },
        {
          // Reset alumni ready for Unlimited. Completed all 3 days, past
          // the 72h peak window (so not in Hot Reset graduates), still
          // on the preview tier. Prime upsell: they know the work, they
          // got the full experience, they just need a nudge to keep going.
          key: "reset_alumni",
          priority: "ready",
          priorityLabel: "Upgrade now",

          action: "Personal Shimrit message referencing their reset experience. Pitch <strong>Unlimited Field (€77/mo or €777/yr)</strong> with the \"you're already in the flow, keep going\" angle. Offer <strong>UNLIMITED50</strong> coupon (50% off first month) for softer nudge.",
          rows: intel.reset_alumni || [],
          why: u => {
            const daysAgo = Number(u.days_since_day3 || 0);
            const daysArr = Array.isArray(u.days_completed) ? u.days_completed.filter(d => d != null) : [];
            const daysCompletedLine = daysArr.length > 0
              ? `Days completed: <strong>${daysArr.map(d => `Day ${d}`).join(", ")}</strong>`
              : "Days completed: <strong>Day 1, Day 2, Day 3</strong>";
            const previewOpen = u.preview_still_open === true;
            const signedUpLine = u.signed_up_at
              ? `Joined <strong>${fmtDate(u.signed_up_at)}</strong> (${fmtRelative(u.signed_up_at)})`
              : "Joined date unknown";
            const finishedLine = daysAgo > 0
              ? `Finished the Reset <strong>${fmtNum(daysAgo)}d ago</strong>, past the peak window`
              : "Finished the Reset recently, past the peak window";
            let windowLine;
            if (u.preview_ends_at) {
              const ends = new Date(u.preview_ends_at);
              const diffDays = (ends.getTime() - Date.now()) / (1000 * 60 * 60 * 24);
              if (previewOpen) {
                const daysLeft = Math.max(0, Math.round(diffDays));
                windowLine = `Preview <strong>still open</strong> (${daysLeft}d left), extend into Unlimited seamlessly`;
              } else {
                const daysAgoP = Math.max(0, Math.round(-diffDays));
                windowLine = `Preview <strong>expired</strong> ${daysAgoP}d ago, Unlimited is the way back in`;
              }
            } else {
              windowLine = "Ready for the next step: Unlimited";
            }
            return [
              "Paid for the Reset",
              signedUpLine,
              daysCompletedLine,
              finishedLine,
              windowLine,
            ];
          },
        },
      ];

      // Hard filter: drop any row that has no usable email. The backend
      // query *should* never return such rows, but if it does (stale build,
      // phantom data, NULL-email demo user, anything) we'd rather show 0
      // members than a flagged "Unknown member" card that confuses Shimrit
      // and the team. Counts and sort order both use the filtered list.
      segments.forEach(s => {
        s.rows = (s.rows || []).filter(u => {
          const e = u && u.email && String(u.email).trim();
          return !!e;
        });
      });

      // Sort: actionable segments first, then key-based promotion
      // (Geo's most-used segment lives at the top regardless of its
      // priority label), then by priority (hot > ready > nurture).
      // Empty segments sink to the bottom in muted state.
      // Stuck Reset is the day-to-day re-engagement work, so it opens
      // first even though its priority label is "nurture".
      const priorityRank = { hot: 0, ready: 1, nurture: 2 };
      const keyRank = { stuck_reset: 0 };
      segments.sort((a, b) => {
        const aEmpty = a.rows.length === 0;
        const bEmpty = b.rows.length === 0;
        if (aEmpty !== bEmpty) return aEmpty ? 1 : -1;
        const ka = keyRank[a.key];
        const kb = keyRank[b.key];
        if (ka !== undefined || kb !== undefined) {
          if (ka === undefined) return 1;
          if (kb === undefined) return -1;
          return ka - kb;
        }
        return priorityRank[a.priority] - priorityRank[b.priority];
      });

      const totalActionable = segments.reduce((sum, s) => sum + s.rows.length, 0);

      if (totalActionable === 0) {
        return `
          <div class="intel-empty-state">
            <div class="intel-empty-icon">✨</div>
            <div class="intel-empty-title">No actions to take right now</div>

      const quickHtml = `

              <div class="intel-quick-count">${fmtNum(s.rows.length)}</div>
              <div class="intel-quick-label">${escapeHtml(s.title)}</div>
            </div>
          `).join("")}
        </div>

      // Pull the latest dismissals into a lookup map keyed by
      // segment_key → Set(target_user_id). Loaded once on metrics
      // refresh via fetchIntelDismissals; falls back to empty if not
      // loaded yet so the first paint isn't blocked.
      const dismissalsBySegment = window._intelDismissalsBySegment || {};
      const dismissalsList = window._intelDismissalsList || [];

      const segmentsHtml = segments.map(s => {
        const dismissedSet = dismissalsBySegment[s.key] || new Set();
        // Split rows into active (still actionable) and dismissed (hidden
        // unless the user clicks "show dismissed").
        const activeRows = s.rows.filter(u => !dismissedSet.has(u.id));
        const dismissedRows = dismissalsList.filter(d => d.segment_key === s.key);

        if (activeRows.length === 0 && dismissedRows.length === 0) {
          return `
            <div class="intel-card intel-card--empty" id="intel-seg-${s.key}">

                </div>
                <span class="intel-card-count">0 members</span>
              </div>
            </div>
          `;
        }
        const memberCards = activeRows.map(u => {
          const dbName = u.display_name && String(u.display_name).trim();
          const email = (u.email || "").trim();
          const primary = dbName || humanizeEmail(email) || "Unknown member";
          const isReal = !!dbName;
          const bullets = (s.why(u) || []).map(b => `<li>${b}</li>`).join("");
          return `
            <div class="intel-member" data-segment="${escapeHtml(s.key)}" data-user-id="${escapeHtml(u.id || '')}">
              <button type="button" class="intel-member-dismiss" title="Dismiss (permanent until you restore)"
                      onclick="dismissIntelMember('${escapeHtml(s.key)}', '${escapeHtml(u.id || '')}', '${escapeHtml(primary)}')"
                      aria-label="Dismiss this suggestion">✕</button>
              <div class="intel-member-head">
                <span class="intel-member-name ${isReal ? '' : 'intel-member-name--anon'}">${escapeHtml(primary)}</span>
                ${email ? `<span class="intel-member-email">${escapeHtml(email)}</span>` : ''}
              </div>
              <ul class="intel-member-why">${bullets}</ul>
            </div>
          `;
        }).join("");

        // "X dismissed (show)" toggle + restore list. Hidden by default;
        // clicking the toggle reveals the dismissed members with a
        // Restore button each.
        const dismissedToggleHtml = dismissedRows.length > 0
          ? `
            <span class="intel-dismissed-toggle" onclick="toggleDismissedList('${escapeHtml(s.key)}')">
              ${dismissedRows.length} dismissed (show)
            </span>
            <div class="intel-dismissed-list" id="intel-dismissed-${escapeHtml(s.key)}">
              ${dismissedRows.map(d => {
                const name = (d.display_name && d.display_name.trim()) || humanizeEmail(d.email) || d.email;
                // Dismissals no longer auto-expire. Show when the member
                // was dismissed rather than a misleading "reappears in X"
                // countdown that was baked in for the old 7-day timer.
                const dismissedIso = d.dismissed_at;
                const dismissedRel = dismissedIso ? fmtRelative(dismissedIso) : "";
                return `
                  <div class="intel-dismissed-row">
                    <span><strong>${escapeHtml(name)}</strong> <span style="color: var(--text-mute);">${dismissedRel ? '&mdash; dismissed ' + escapeHtml(dismissedRel) : ''}</span></span>
                    <button class="intel-restore-btn" onclick="restoreIntelMember('${escapeHtml(s.key)}', '${escapeHtml(d.target_user_id)}')">Restore</button>
                  </div>
                `;
              }).join("")}
            </div>
          `
          : "";

        return `
          <div class="intel-card" id="intel-seg-${s.key}">
            <div class="intel-card-head">
              <div class="intel-card-title-row">
                <span class="intel-priority-chip intel-priority-chip--${s.priority}">${escapeHtml(s.priorityLabel)}</span>
                <span class="intel-card-title">${escapeHtml(s.title)}</span>
              </div>
              <span class="intel-card-count"><strong>${fmtNum(activeRows.length)}</strong> ${activeRows.length === 1 ? 'member' : 'members'}</span>
            </div>
            <div class="intel-card-action">${s.action}</div>
            <div class="intel-member-list">${memberCards || '<div style="color: var(--text-dim); font-size: 13px; padding: 6px 2px;">All dismissed for now.</div>'}</div>
            ${dismissedToggleHtml}
          </div>
        `;
      }).join("");

      return quickHtml + segmentsHtml;
    }

          action: "Re-engagement WhatsApp/email from Shimrit referencing a recent process they could re-enter. If no response in 7 days, offer a <strong>free 15-min check-in call</strong> to identify what's blocking them. Last-resort save: pause subscription option (better than losing them entirely).",
          rows: intel.at_risk_subscriber || [],
          cols: [
            { label: "Member", key: "email", render: u => `${escapeHtml(u.email)}${u.display_name ? ` <span style="color:var(--text-dim)">(${escapeHtml(u.display_name)})</span>` : ""}` },
            { label: "Plan", key: "subscription_plan", render: u => escapeHtml(u.subscription_plan || "—") },
            { label: "Days quiet", key: "days_quiet", num: true, render: u => fmtNum(u.days_quiet || 0) + "d" },
            { label: "Last message", key: "last_message_at", num: true, render: u => u.last_message_at ? fmtRelative(u.last_message_at) : "never" },
          ],
        },
        {
          key: "stuck_reset",
          eyebrow: "Re-engagement",
          title: "Stuck Reset members",
          why: "Logged in, paid, started the 72-hour window, but stopped before Day 3. Includes members whose preview has already expired: the preview column tells you which angle to lead with (nudge if still open, re-open offer if closed).",
          action: "Personalized nudge from Shimrit (text or email) referencing where they are. If they haven't started Day 1: onboarding rescue. If they stalled midway: reference their day. If preview expired: offer to extend or pitch <strong>Unlimited Field</strong> directly. Auto push reminders are already firing; this layer adds the human touch.",
          rows: intel.stuck_reset || [],
          cols: [
            { label: "Member", key: "email", render: u => `${escapeHtml(u.email)}${u.display_name ? ` <span style="color:var(--text-dim)">(${escapeHtml(u.display_name)})</span>` : ""}` },
            { label: "On day", key: "last_completed_day", num: true, render: u => fmtNum(u.last_completed_day || 0) },
            { label: "Days since login", key: "days_since_login", num: true, render: u => fmtNum(u.days_since_login || 0) + "d" },
            { label: "Preview", key: "preview_still_open", render: u => u.preview_still_open === true ? '<span style="color: var(--green, #7AAE5E); font-weight: 600;">open</span>' : '<span style="color: var(--text-mute); font-style: italic;">expired</span>' },
          ],
        },
      ];

      const total = segments.reduce((sum, s) => sum + s.rows.length, 0);

      const intro = total === 0
        ? `<div class="intel-intro">No members currently fit any of the six segments. This will populate as your funnel matures and members start engaging across the offer ladder.</div>`
        : `<div class="intel-intro">Six segments, <strong>${fmtNum(total)} members</strong> total across all of them. Each segment maps to a specific MYP offer at its real price point. Work the top of each list first.</div>`;

      const segmentsHtml = segments.map(s => {
        const empty = s.rows.length === 0;
        const tableRows = empty
          ? `<div class="intel-empty">No members in this segment right now.</div>`
          : `
            <table class="intel-members-table">
              <thead><tr>${s.cols.map(c => `<th class="${c.num ? 'num' : ''}">${escapeHtml(c.label)}</th>`).join("")}</tr></thead>
              <tbody>
                ${s.rows.map(r => `
                  <tr>
                    ${s.cols.map(c => `<td class="${c.num ? 'num' : ''}">${c.render(r)}</td>`).join("")}
                  </tr>
                `).join("")}
              </tbody>
            </table>
          `;
        return `
          <div class="intel-segment">
            <div class="intel-segment-head">
              <div>
                <span class="intel-segment-eyebrow">${escapeHtml(s.eyebrow)}</span>
                <div class="intel-segment-title" style="margin-top: 4px;">${escapeHtml(s.title)}</div>
              </div>
              <div class="intel-segment-count"><strong>${fmtNum(s.rows.length)}</strong> ${s.rows.length === 1 ? "member" : "members"}</div>
            </div>
            <div class="intel-segment-why">${s.why}</div>
            <div class="intel-action">
              <div class="intel-action-label">Recommended action</div>
              <div class="intel-action-text">${s.action}</div>
            </div>
            ${tableRows}
          </div>
        `;
      }).join("");

      return intro + segmentsHtml;
    }

    function renderFunnel(c, details) {
      // Base = ALL Power Reset members (not just those who logged in), so
      // percentages reflect the full launch funnel from purchase → completion.
      const base = c.total_members || 0;
      const loggedIn = c.total_logged_in || 0;
      const neverLoggedIn = c.never_logged_in || 0;
      details = details || [];

      // Bucket logged-in members by their current day stage. Members with
      // first_login_at = null go in the "never_logged_in" bucket separately.
      const buckets = { 0: [], 1: [], 2: [], 3: [] };
      const neverLogged = [];
      details.forEach(u => {
        if (!u.first_login_at) {
          neverLogged.push(u);
        } else {
          const d = Math.max(0, Math.min(3, u.last_completed_day || 0));
          buckets[d].push(u);
        }
      });

      const emailsByStage = {
        "never_logged_in": neverLogged,
        "logged_in": details.filter(u => u.first_login_at),
        "stuck": buckets[0],
        "d1": buckets[1].concat(buckets[2]).concat(buckets[3]),
        "d2": buckets[2].concat(buckets[3]),
        "d3": buckets[3],
      };

      const rows = [
        // Top-level partition (sums to 7): Never logged in + Logged in
        { stage: "never_logged_in", label: "Never logged in", count: neverLoggedIn, pct: base ? (neverLoggedIn / base) * 100 : 0, dropout: true, subset: false },
        { stage: "logged_in", label: "Logged in", count: loggedIn, pct: base ? (loggedIn / base) * 100 : 0, dropout: false, subset: false },
        // Subset rows — each one slices into "Logged in" further. Indented
        // visually to show they're nested, not additive top-level rows.
        { stage: "d1", label: "Day 1", count: c.d1 || 0, pct: base ? ((c.d1 || 0) / base) * 100 : 0, dropout: false, subset: true },
        { stage: "d2", label: "Day 2", count: c.d2 || 0, pct: base ? ((c.d2 || 0) / base) * 100 : 0, dropout: false, subset: true },
        { stage: "d3", label: "Day 3", count: c.d3 || 0, pct: base ? ((c.d3 || 0) / base) * 100 : 0, dropout: false, subset: true },
        { stage: "stuck", label: "Logged in but didn't start", count: buckets[0].length, pct: base ? (buckets[0].length / base) * 100 : 0, dropout: true, subset: true },
      ];

      return rows.map((r, i) => {
        const emails = emailsByStage[r.stage] || [];
        const hasEmails = emails.length > 0;
        const rowId = `funnel-row-${r.stage}`;
        const emailsId = `funnel-emails-${r.stage}`;
        return `
          <div class="funnel-row ${r.subset ? 'funnel-row--subset' : ''} ${r.dropout ? 'dropout' : ''} ${hasEmails ? '' : 'not-clickable'}" id="${rowId}" ${hasEmails ? `onclick="toggleFunnelRow('${r.stage}')"` : ''}>
            <div class="funnel-chevron">▶</div>
            <div class="funnel-label">${escapeHtml(r.label)}</div>
            <div class="funnel-bar-track"><div class="funnel-bar-fill" style="width:${r.pct}%;"></div></div>
            <div class="funnel-stat">
              <div class="pct">${r.pct.toFixed(1)}%</div>
              <div class="n">${fmtNum(r.count)} ${r.count === 1 ? 'member' : 'members'}</div>
            </div>
          </div>
          <div class="funnel-emails" id="${emailsId}">
            ${emails.length === 0
              ? '<div class="empty">No members in this stage.</div>'
              : `<ul>${emails.map(u => {
                  // Build a meta line that shows enough context for Geo to
                  // act on the right person at the right moment:
                  //   - When they signed up (purchased the Reset)
                  //   - When they first logged in (started the clock)
                  //   - How much of the 72-hour window is left
                  //   - Which day they SHOULD be on based on time elapsed
                  // The Reset window is technically 96 hours from first
                  // login (24h/day × 3 days + 24h grace), set in
                  // grantEntitlement as preview_ends_at = login + 72h
                  // initially but extended by the unlock logic. We use
                  // preview_ends_at directly since that's what controls
                  // whether they still have access.
                  const parts = [];
                  if (u.created_at) {
                    parts.push(`Signed up ${fmtRelative(u.created_at)}`);
                  }
                  if (u.first_login_at) {
                    parts.push(`first login ${fmtRelative(u.first_login_at)}`);
                    // Compute time-since-login → which day they should
                    // be on. Days unlock progressively: Day 1 at first
                    // login, Day 2 at +24h, Day 3 at +48h.
                    const hoursSinceLogin = (Date.now() - new Date(u.first_login_at).getTime()) / 3600000;
                    let shouldBeOn;
                    if (hoursSinceLogin < 24) shouldBeOn = "Day 1";
                    else if (hoursSinceLogin < 48) shouldBeOn = "Day 2";
                    else shouldBeOn = "Day 3";
                    parts.push(`should be on ${shouldBeOn}`);
                  } else {
                    parts.push("hasn't opened the app yet");
                  }
                  // Hours remaining in the window. Negative = window
                  // already expired (shouldn't normally show here since
                  // the funnel filters on active members, but defensive).
                  if (u.preview_ends_at) {
                    const msLeft = new Date(u.preview_ends_at).getTime() - Date.now();
                    if (msLeft <= 0) {
                      parts.push("window expired");
                    } else if (msLeft < 3600000) {
                      parts.push("under 1h left");
                    } else if (msLeft < 86400000) {
                      parts.push(`${Math.round(msLeft / 3600000)}h left in window`);
                    } else {
                      const daysLeft = Math.floor(msLeft / 86400000);
                      const hoursLeftRemainder = Math.round((msLeft % 86400000) / 3600000);
                      parts.push(`${daysLeft}d ${hoursLeftRemainder}h left in window`);
                    }
                  }
                  // Add a stage-specific suffix only when it's not
                  // redundant with the time math above.
                  if (r.stage === "stuck") {
                    parts.push("hasn't started Day 1");
                  }
                  const when = parts.join(" · ");
                  return `
                    <li>
                      <span>${escapeHtml(u.email)}</span>
                      ${u.display_name ? `<span class="email-name">(${escapeHtml(u.display_name)})</span>` : ''}
                      ${when ? `<span class="email-meta">${escapeHtml(when)}</span>` : ''}
                    </li>
                  `;
                }).join("")}</ul>`}
          </div>
        `;
      }).join("");
    }

    // Smooth-scroll to a section by ID and briefly flash a gold ring around
    // it so the user's eye lands on the right place. Triggered by clicking
    // any of the top KPI cards.
    function scrollToSection(targetId) {
      const el = document.getElementById(targetId);
      if (!el) return;
      el.scrollIntoView({ behavior: "smooth", block: "start" });
      el.classList.remove("flash"); // restart animation if already flashed
      void el.offsetWidth; // force reflow
      el.classList.add("flash");
      setTimeout(() => el.classList.remove("flash"), 1500);
    }
    window.scrollToSection = scrollToSection;

    // Render the Channel P&L widget on the Overview tab, below Real Profit.
    // Three channels: Cold ads, Warm ads, WhatsApp. Revenue attribution is
    // first-touch UTM from the users table (backend function
    // loadChannelRevenueAttribution). Spend for cold/warm comes from the
    // Meta ads campaign breakdown in realProfit. WhatsApp spend combines
    // per-message costs (pre + launch, from the Launch Tracker), pre-launch
    // GHL subscription, and 2 months of the ongoing GHL monthly cost (same
    // 2-month convention Real Profit uses for opsLaunchPortion).
    //
    // Compact table layout: one row per channel with all metrics on a
    // single line and product breakdown on a muted secondary line
    // underneath. Takes about a third of the vertical space of the
    // per-channel card layout.
    //
    // "Untagged" signups (no utm_source at all) are grouped into WhatsApp
    // as a legacy heuristic per Geo's Jul 2026 decision. Google organic
    // detection is a phase-2 upgrade using landing_events.referrer.
    // ===== Skeleton renderers for progressive rendering =====
    // Shown while real-profit is still fetching. Preserve the exact
    // layout of the real widgets so the transition is a soft cross-fade
    // rather than a layout shift. Shimmer animation gives the visual
    // "actively loading" feel that Linear/Hubspot/Notion use.
