<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Field — Team Metrics</title>
  <link rel="icon" type="image/png" href="https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/file-uploads/themes/2161454568/settings_images/d2126ef-2bee-6f2c-8c2-d1357db52300_myp_logo.png" />
  <link rel="apple-touch-icon" href="https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/file-uploads/themes/2161454568/settings_images/d2126ef-2bee-6f2c-8c2-d1357db52300_myp_logo.png" />
  <style>
    :root {
      --bg: #FAF5E4;
      --bg-card: #FFFFFF;
      --panel: #F4ECD0;
      --gold: #C9A84C;
      --gold-soft: rgba(201, 168, 76, 0.15);
      --gold-line: rgba(201, 168, 76, 0.35);
      --dark: #2C2416;
      --text: #1A1612;
      --text-dim: #6B5F3F;
      --text-mute: #9A8D6C;
      --border: rgba(201, 168, 76, 0.25);
      --green: #4A7C3A;
      --red: #C03A2B;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      --kpi-bg: var(--panel);
    }
    [data-theme="dark"] {
      --bg: #1A1612;
      --bg-card: #251F18;
      --panel: #2C2416;
      --gold: #D4B864;
      --gold-soft: rgba(212, 184, 100, 0.12);
      --gold-line: rgba(212, 184, 100, 0.32);
      --dark: #FAF5E4;
      --text: #F4ECD0;
      --text-dim: #B8AB8B;
      --text-mute: #8A8064;
      --border: rgba(212, 184, 100, 0.2);
      --green: #7AAE5E;
      --red: #E08580;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      --kpi-bg: #2C2416;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 36px 28px 80px;
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 22px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .brand-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-transform: uppercase;
    }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-size: 30px;
      color: var(--text);
      margin: 4px 0 0;
      font-weight: 400;
    }
    .viewer {
      font-size: 12px;
      color: var(--text-dim);
      text-align: right;
    }
    .viewer .v-email { color: var(--text); font-weight: 600; }

    /* Date range controls */
    .date-controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      background: var(--bg-card);
      border: 1px solid var(--gold-line);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 22px;
    }
    .date-controls-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-right: 4px;
    }
    .preset-btn {
      background: transparent;
      border: 1px solid var(--gold-line);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .preset-btn:hover { border-color: var(--gold); background: var(--gold-soft); }
    .preset-btn.active {
      background: var(--gold);
      color: var(--dark);
      border-color: var(--gold);
    }
    .date-input {
      font-family: inherit;
      font-size: 12px;
      padding: 6px 10px;
      border: 1px solid var(--gold-line);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--text);
    }
    .date-sep { color: var(--text-mute); font-size: 12px; }
    .apply-btn {
      background: var(--gold);
      border: 1px solid var(--gold);
      color: var(--dark);
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
    }
    .apply-btn:hover { background: #B89232; border-color: #B89232; }
    .range-summary {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* KPI cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 30px;
    }
    .kpi {
      background: var(--kpi-bg);
      border: 1px solid var(--gold-line);
      border-radius: 12px;
      padding: 18px 18px 16px;
      position: relative;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .kpi.clickable { cursor: pointer; }
    .kpi.clickable:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201, 168, 76, 0.18);
    }
    .kpi.clickable::after {
      content: "↓";
      position: absolute;
      top: 14px;
      right: 14px;
      color: var(--gold);
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .kpi.clickable:hover::after { opacity: 1; }
    .kpi.kpi-revenue {
      background: linear-gradient(135deg, var(--gold-soft) 0%, var(--panel) 100%);
      border-color: var(--gold);
    }
    /* Flash effect when scrolled-to via KPI card click */
    .section.flash {
      animation: section-flash 1.4s ease-out;
    }
    @keyframes section-flash {
      0% { box-shadow: 0 0 0 4px var(--gold), 0 12px 40px rgba(0, 0, 0, 0.08); }
      100% { box-shadow: 0 0 0 0 rgba(201, 168, 76, 0), 0 12px 40px rgba(0, 0, 0, 0.08); }
    }

    /* Today's Highlights strip */
    .highlights {
      background: linear-gradient(135deg, var(--gold-soft) 0%, var(--panel) 100%);
      border: 1px solid var(--gold);
      border-radius: 14px;
      padding: 18px 22px 16px;
      margin-bottom: 22px;
    }
    .highlights-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .highlights-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .highlights-title {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 17px;
      color: var(--text);
      margin: 4px 0 0;
    }
    .highlights-date {
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }
    .highlights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    /* Redesigned highlight tile — stacked vertical hierarchy reads cleanly:
       small uppercase eyebrow at the top, serif value in the middle, soft
       detail line at the bottom. Balanced proportions kill the "big number
       + tiny squished label" sloppiness of the previous horizontal layout. */
    .highlight {
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid var(--gold-line);
      border-radius: 12px;
      padding: 14px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }
    .highlight:hover {
      border-color: var(--gold);
      transform: translateY(-1px);
    }
    /* Accent variant for the moment that matters most — Unlimited
       conversions get a richer gold background so they stand out from the
       rest of the row. The conversion is the win we want to celebrate. */
    .highlight--accent {
      background: linear-gradient(135deg, var(--gold-soft) 0%, rgba(255, 255, 255, 0.4) 100%);
      border-color: var(--gold);
    }
    [data-theme="dark"] .highlight {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(196, 160, 90, 0.35);
    }
    [data-theme="dark"] .highlight--accent {
      background: linear-gradient(135deg, rgba(196, 160, 90, 0.18) 0%, rgba(196, 160, 90, 0.06) 100%);
      border-color: var(--gold);
    }
    .highlight-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--gold);
      text-transform: uppercase;
      line-height: 1.2;
    }
    .highlight-value {
      font-family: Georgia, serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.1;
      margin-top: 2px;
    }
    .highlight-detail {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.4;
      margin-top: 2px;
    }
    [data-theme="dark"] .highlight-detail { color: #D4C9A8; }
    .highlights-quiet {
      font-style: italic;
      color: var(--text-mute);
      font-size: 13px;
      padding: 8px 0;
    }
    .kpi-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .kpi-value {
      font-family: Georgia, serif;
      font-size: 32px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.1;
    }
    .kpi-sub { font-size: 11px; color: var(--text-mute); margin-top: 4px; }

    .section {
      background: var(--bg-card);
      border: 1px solid var(--gold-line);
      border-radius: 14px;
      padding: 22px 24px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
    }
    .section h2 {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      margin: 0 0 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .section h2 .h2-eyebrow {
      display: inline-block;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-style: normal;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      margin-right: 10px;
      padding: 2px 7px;
      background: var(--gold-soft);
      border-radius: 999px;
      vertical-align: middle;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
    @media (max-width: 760px) { .two-col { grid-template-columns: 1fr; } }

    /* ===== Mobile (phones, ≤640px) ===== */
    @media (max-width: 640px) {
      /* Prevent any wide child from blowing out the page width. We use
         overflow-x: clip on the wrap (rather than hidden on html/body)
         because clip doesn't create a containing block for fixed/sticky
         children — important so iOS native vertical scroll stays smooth
         and the tab nav can still stick to the top of the viewport. */
      .wrap {
        max-width: 100vw;
        overflow-x: clip;
        padding: max(20px, env(safe-area-inset-top)) 14px 60px;
      }
      .section { max-width: 100%; }

      /* Section headings ALWAYS wrap on mobile — defeats any inherited
         white-space rule and ensures long parenthetical phrases like
         "By product × coupon (every SKU + coupon combination)" don't
         push past the right edge. */
      .section h2 {
        white-space: normal !important;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      /* Topbar stacks vertically; viewer info left-aligns */
      .topbar { flex-direction: column; align-items: stretch; gap: 12px; margin-bottom: 18px; }
      .viewer { text-align: left; }

      /* Date controls — compact layout: label, preset buttons, date inputs,
         and apply button all wrap cleanly. iOS 16px input prevents zoom. */
      .date-controls { padding: 10px 12px; gap: 6px; }
      .date-controls-label { width: 100%; margin-bottom: 4px; }
      .preset-btn { font-size: 11px; padding: 7px 12px; min-height: 34px; }
      .date-input { font-size: 16px; padding: 7px 10px; min-width: 0; flex: 1; }
      .range-summary {
        width: 100%; margin: 4px 0 0; text-align: left;
        font-size: 10px;
      }

      /* KPI cards — auto-fit so they adapt to screen width. On 393px
         iPhones this fits 1 column with cards using the full width;
         on slightly wider phones (430px+) it fits 2 columns. The
         minmax(180px, 1fr) guarantees each card has room for its big
         "€208.36" value and "REVENUE (EX VAT)" label without clipping. */
      .kpi-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
        margin-bottom: 22px;
      }
      .kpi { padding: 14px 14px 12px; min-width: 0; }
      .kpi-value { font-size: 24px; word-break: break-word; }
      .kpi-label { font-size: 9px; }
      .kpi-sub { font-size: 10px; }
      .kpi.clickable::after { display: none; }

      /* Today's Highlights — single column */
      .highlights { padding: 14px 16px 12px; margin-bottom: 18px; }
      .highlights-grid { grid-template-columns: 1fr; gap: 8px; }
      .highlights-title { font-size: 15px; }
      .highlight { padding: 8px 12px; }
      .highlight-value { font-size: 19px; min-width: 28px; }

      /* Sections — tighter */
      .section { padding: 16px 14px; margin-bottom: 14px; border-radius: 12px; }
      .section h2 { font-size: 15px; margin-bottom: 12px; padding-bottom: 10px; }
      .section h2 .h2-eyebrow { display: block; margin: 0 0 4px; }

      /* Tables become STACKED CARDS on mobile — same UX pattern as the
         Intelligence segments. Each row becomes a small card with each
         field as a labeled line. Eliminates horizontal scrolling entirely
         since every column is visible vertically, and avoids the squeezed
         overlap problem the table-layout: fixed approach had. The labels
         in front of each cell come from data-label attrs set by JS at
         render time (see applyMobileTableLabels). */
      .section table {
        display: block;
        max-width: 100%;
        white-space: normal;
        background: transparent !important;
      }
      .section table > thead { display: none; }
      .section table > tbody {
        display: block;
        width: 100%;
      }
      .section table > tbody > tr {
        display: block;
        background: var(--panel);
        border: 1px solid var(--gold-line);
        border-radius: 10px;
        padding: 12px 14px;
        margin-bottom: 8px;
      }
      .section table > tbody > tr:hover { background: var(--panel); }
      .section table > tbody > tr > td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 4px 0;
        border: none !important;
        font-size: 13px;
        white-space: normal;
        text-align: right;
        word-break: break-word;
        min-width: 0;
      }
      .section table > tbody > tr > td.num {
        text-align: right;
      }
      .section table > tbody > tr > td::before {
        content: attr(data-label);
        font-weight: 700;
        color: var(--text-dim);
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        flex-shrink: 0;
        text-align: left;
        min-width: 60px;
      }
      .section table > tbody > tr > td:empty,
      .section table > tbody > tr > td[data-label=""] {
        display: none;
      }
      /* Badges align to the right side of each field row. */
      .section table > tbody > tr > td .tier-badge,
      .section table > tbody > tr > td .comp-pill {
        margin-left: auto;
      }

      /* Funnel — compact grid */
      .funnel-row {
        grid-template-columns: 14px 78px 1fr 70px;
        gap: 8px; padding: 6px 4px;
      }
      .funnel-row--subset {
        margin-left: 16px;
        grid-template-columns: 14px 64px 1fr 70px;
      }
      .funnel-label { font-size: 12px; }
      .funnel-row--subset .funnel-label { font-size: 11px; }
      .funnel-bar-track { height: 10px; }
      .funnel-stat { font-size: 11px; }
      .funnel-stat .n { font-size: 10px; }

      /* Email dropdown under funnel rows */
      .funnel-emails { margin-left: 18px; padding: 8px 10px; font-size: 11px; }
      .funnel-emails ul { padding-left: 14px; }

      /* Signup bars */
      .signup-row { grid-template-columns: 76px 1fr 48px; font-size: 11px; }

      /* Note box copy on mobile */
      .note-box { font-size: 11px; padding: 10px 12px; }
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    th {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      color: var(--text-dim); text-transform: uppercase; background: var(--panel);
    }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    th.num { text-align: right; }
    tr:last-child td { border-bottom: none; }

    .tier-badge {
      display: inline-block;
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      padding: 2px 8px; border-radius: 999px; text-transform: uppercase;
    }
    .tier-preview { background: rgba(201, 168, 76, 0.18); color: #8B6F2F; }
    .tier-full { background: rgba(74, 124, 58, 0.18); color: var(--green); }
    /* Comp pill — sits inline next to emails of Unlimited users who haven't
       actually paid (team accounts, GEO100 comps, admin-granted access). */
    .comp-pill {
      display: inline-block;
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      padding: 2px 7px; border-radius: 999px; text-transform: uppercase;
      background: rgba(184, 92, 74, 0.14);
      color: #B85C4A;
      margin-left: 8px;
      vertical-align: middle;
    }

    .funnel-row {
      display: grid; grid-template-columns: 18px 110px 1fr 110px;
      align-items: center; gap: 12px; padding: 8px 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    /* Visually nest subset rows (Day 1/2/3 and "Didn't start") inside the
       Logged in partition so the math is obvious at a glance. */
    .funnel-row--subset {
      margin-left: 28px;
      grid-template-columns: 18px 92px 1fr 110px;
    }
    .funnel-row--subset .funnel-label::before {
      content: "└";
      color: var(--text-mute);
      margin-right: 6px;
      font-weight: 400;
    }
    .funnel-row--subset .funnel-label {
      font-size: 12.5px;
      color: var(--text-dim);
    }
    .funnel-row:hover { background: var(--panel); }
    .funnel-row.not-clickable { cursor: default; }
    .funnel-row.not-clickable:hover { background: transparent; }
    .funnel-row.dropout .funnel-bar-fill {
      background: linear-gradient(90deg, #B85C4A 0%, #8F4031 100%);
    }
    .funnel-chevron {
      color: var(--gold);
      font-size: 11px;
      transition: transform 0.2s ease;
      text-align: center;
    }
    .funnel-row.expanded .funnel-chevron { transform: rotate(90deg); }
    .funnel-row.not-clickable .funnel-chevron { color: transparent; }
    .funnel-label { font-weight: 600; font-size: 13px; }
    .funnel-bar-track {
      height: 14px; background: var(--panel); border-radius: 999px; overflow: hidden;
    }
    .funnel-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold) 0%, #B89232 100%);
      border-radius: 999px; transition: width 0.6s ease;
    }
    .funnel-stat { text-align: right; font-size: 13px; font-variant-numeric: tabular-nums; }
    .funnel-stat .pct { color: var(--text); font-weight: 600; }
    .funnel-stat .n { color: var(--text-mute); font-size: 11px; }
    .funnel-emails {
      margin: 4px 0 12px 30px;
      padding: 10px 14px;
      background: var(--panel);
      border-left: 2px solid var(--gold);
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .funnel-emails.open { display: block; }
    .funnel-emails ul { margin: 0; padding-left: 16px; }
    .funnel-emails li { margin: 6px 0; color: var(--text); list-style: disc; }
    .funnel-emails li .email-name { color: var(--text-dim); margin-left: 6px; }
    .funnel-emails li .email-meta {
      display: block;
      color: var(--text-mute);
      font-size: 10.5px;
      margin-top: 2px;
      font-style: italic;
    }
    .funnel-emails .empty {
      color: var(--text-mute); font-style: italic;
    }

    .signup-row {
      display: grid; grid-template-columns: 90px 1fr 60px;
      align-items: center; gap: 10px; padding: 4px 0; font-size: 12px;
    }
    .signup-bar-track { height: 8px; background: var(--panel); border-radius: 999px; overflow: hidden; }
    .signup-bar-fill { height: 100%; background: var(--gold); border-radius: 999px; }
    .signup-row .date { color: var(--text-dim); }
    .signup-row .n { text-align: right; font-weight: 600; }

    .gate {
      max-width: 480px; margin: 80px auto;
      padding: 36px 32px; background: var(--bg-card);
      border: 1px solid var(--gold-line); border-radius: 16px;
      text-align: center; box-shadow: var(--shadow);
    }
    .gate h1 { font-size: 22px; margin-bottom: 12px; }
    .gate p { color: var(--text-dim); margin: 8px 0; font-size: 14px; }
    .gate a { color: var(--gold); font-weight: 600; text-decoration: none; }
    .gate a:hover { text-decoration: underline; }

    .footnote {
      font-size: 11px; color: var(--text-mute);
      font-style: italic; margin-top: 12px; line-height: 1.5;
    }
    .loading {
      text-align: center; padding: 80px 24px;
      color: var(--text-dim); font-style: italic;
    }
    .note-box {
      background: var(--gold-soft); border: 1px solid var(--gold-line);
      border-radius: 10px; padding: 12px 16px;
      font-size: 12px; color: var(--text-dim); margin-top: 12px;
    }
    .note-box strong { color: var(--text); }
    .note-box code {
      background: var(--bg-card); padding: 2px 6px; border-radius: 4px;
      font-family: "SF Mono", Monaco, monospace; font-size: 11px;
    }
    .empty-state {
      text-align: center; padding: 24px 12px;
      color: var(--text-mute); font-style: italic; font-size: 13px;
    }
    /* ===== Intelligence tab (redesigned for clarity + action) ===== */
    .intel-empty-state {
      text-align: center;
      padding: 60px 24px;
      background: var(--panel);
      border: 1px solid var(--gold-line);
      border-radius: 14px;
    }
    .intel-empty-icon { font-size: 32px; margin-bottom: 12px; color: var(--gold); }
    .intel-empty-title {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 19px;
      color: var(--text);
      margin-bottom: 6px;
    }
    .intel-empty-sub {
      font-size: 12.5px;
      color: var(--text-dim);
      max-width: 360px;
      margin: 0 auto;
      line-height: 1.5;
    }
    /* Quick-scan strip at the top — small clickable chips per segment */
    .intel-quickscan {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }
    .intel-quick {
      background: var(--bg-card);
      border: 1px solid var(--gold-line);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .intel-quick:hover { transform: translateY(-2px); border-color: var(--gold); }
    .intel-quick-count {
      font-family: Georgia, serif;
      font-size: 24px;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }
    .intel-quick-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .intel-quick--zero { opacity: 0.4; }
    /* Positive-opportunity green for "hot" segments. Red signaled urgency
       but read as a warning, which is the wrong mental model — these aren't
       problems, they're high-value sales moments. Emerald says "ripe to
       harvest" and stays MYP-warm. */
    .intel-quick--hot {
      background: linear-gradient(135deg, rgba(63, 128, 96, 0.08), var(--bg-card));
      border-color: rgba(63, 128, 96, 0.4);
    }
    .intel-quick--hot .intel-quick-label { color: #3F8060; }
    /* Segment cards */
    .intel-card {
      background: var(--bg-card);
      border: 1px solid var(--gold-line);
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .intel-card--empty { opacity: 0.5; padding: 12px 22px; box-shadow: none; }
    .intel-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .intel-card-title-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .intel-priority-chip {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      padding: 3px 9px;
      border-radius: 999px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    /* Priority chip palette — chosen to read as positive-opportunity, not
       warning. Hot = ripe to harvest (emerald), Ready = premium ladder
       (MYP gold), Nurture = gentle attention (warm taupe). */
    .intel-priority-chip--hot { background: #3F8060; color: white; }
    .intel-priority-chip--ready { background: var(--gold); color: var(--dark); }
    .intel-priority-chip--nurture { background: #8B7B5E; color: white; }
    .intel-card-title {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 17px;
      color: var(--text);
    }
    .intel-card-count {
      font-size: 12.5px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .intel-card-count strong { color: var(--text); }
    .intel-card-action {
      font-size: 12.5px;
      color: var(--text);
      background: var(--panel);
      border-left: 3px solid var(--gold);
      padding: 8px 14px;
      border-radius: 0 6px 6px 0;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .intel-card-action strong { color: var(--text); font-weight: 600; }
    .intel-member-list { display: grid; gap: 8px; }
    .intel-member {
      padding: 12px 14px;
      background: var(--panel);
      border-radius: 8px;
      border: 1px solid transparent;
      transition: border-color 0.15s ease;
    }
    .intel-member:hover { border-color: var(--gold-line); }
    .intel-member-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .intel-member-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .intel-member-name--anon { color: var(--text-dim); font-weight: 500; }
    .intel-member-email {
      font-size: 12px;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .intel-member-why {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 4px;
    }
    .intel-member-why li {
      font-size: 12.5px;
      color: var(--text-dim);
      line-height: 1.5;
      position: relative;
      padding-left: 16px;
    }
    .intel-member-why li::before {
      content: "•";
      position: absolute;
      left: 4px;
      top: 0;
      color: var(--gold);
      font-weight: 700;
    }
    .intel-member-why strong { color: var(--text); font-weight: 600; }
    @media (max-width: 640px) {
      .intel-card { padding: 14px 16px; }
    }
    /* ===== Left-side tab navigation ===== */
    .dashboard-body {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 28px;
      align-items: start;
    }
    .tabs {
      display: flex;
      flex-direction: column;
      gap: 2px;
      background: var(--panel);
      border: 1px solid var(--gold-line);
      border-radius: 12px;
      padding: 10px;
      position: sticky;
      top: 24px;
      order: -1;
    }
    .tab-btn {
      background: transparent;
      border: 1px solid transparent;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      cursor: pointer;
      border-radius: 8px;
      transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      text-align: left;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .tab-btn:hover { color: var(--text); background: rgba(201, 168, 76, 0.08); }
    .tab-btn--active {
      color: var(--text);
      background: var(--gold-soft);
      border-color: var(--gold-line);
    }
    .tab-btn-count {
      background: var(--gold-soft);
      color: var(--gold);
      font-size: 10px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 999px;
    }
    .tab-btn--active .tab-btn-count {
      background: var(--gold);
      color: var(--dark);
    }
    /* ===== Smooth interactions =====
       Tab content fades in + lifts slightly when shown so switching tabs
       feels like a gentle reveal instead of a hard cut. Default state is
       visible (opacity 1) so initial page load has no flash. When a tab
       is about to be shown, we briefly add .is-entering to push it to
       opacity 0 + translateY(6px), then remove the class on the next
       animation frame so the transition plays back to default. */
    [data-tab-content] {
      transition: opacity 0.36s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.36s cubic-bezier(0.22, 1, 0.36, 1);
    }
    [data-tab-content].is-entering {
      opacity: 0;
      transform: translateY(6px);
    }
    /* Universal easing for the most-clicked things in the dashboard. */
    .tab-btn,
    .kpi,
    .clickable,
    .intel-card,
    .intel-member,
    .intel-quick {
      transition: background-color 0.25s ease,
                  border-color 0.25s ease,
                  transform 0.25s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.25s ease,
                  opacity 0.25s ease;
    }
    .kpi.clickable:hover, .kpi-revenue.clickable:hover {
      transform: translateY(-1px);
    }
    .intel-quick:hover {
      transform: translateY(-1px);
    }
    /* Sparkle emoji next to "Intelligence" — gives the tab a touch of
       Field-magic. Subtle pulse on hover, gentle shimmer when active. */
    /* Wraps "Intelligence ✨" so they sit together as a single flex child
       and the count badge gets pushed to the far right instead of opening
       a gap between the word and the emoji. */
    .tab-label { display: inline-flex; align-items: center; gap: 4px; }
    .tab-sparkle {
      display: inline-block;
      font-size: 0.9em;
      transition: transform 0.3s ease;
      vertical-align: middle;
    }
    .tab-btn:hover .tab-sparkle { transform: scale(1.15) rotate(8deg); }
    .tab-btn--active .tab-sparkle {
      animation: tab-sparkle-shimmer 2.4s ease-in-out infinite;
    }
    @keyframes tab-sparkle-shimmer {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.15) rotate(-6deg); }
    }
    /* Rocket variant — hover lifts it like a launch, active state wobbles
       gently as if firing thrusters. Override the sparkle's rotate-on-hover
       since rockets shouldn't tilt sideways. */
    .tab-btn:hover .tab-rocket { transform: translateY(-2px) scale(1.1); }
    .tab-btn--active .tab-rocket {
      animation: tab-rocket-ignite 2.2s ease-in-out infinite;
    }
    @keyframes tab-rocket-ignite {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-3px) scale(1.08); }
    }
    @media (max-width: 760px) {
      .dashboard-body { grid-template-columns: 1fr; gap: 0; }

      /* Tab nav becomes a sticky horizontal scroller anchored at the top of
         the viewport so the user can always reach any tab without scrolling
         back. Background matches the page so the tabs feel like they're
         floating on the same surface. */
      .tabs {
        flex-direction: row;
        position: sticky;
        top: 0;
        z-index: 50;
        overflow-x: auto;
        padding: 8px 4px;
        gap: 4px;
        -webkit-overflow-scrolling: touch;
        margin: 0 -14px 16px;
        background: var(--bg);
        border-bottom: 1px solid var(--gold-line);
        scrollbar-width: none;
      }
      .tabs::-webkit-scrollbar { display: none; }
      .tab-btn {
        white-space: nowrap;
        padding: 10px 14px;
        font-size: 12px;
        min-height: 40px;
        flex-shrink: 0;
        justify-content: center;
      }
      .tab-btn-count { margin-left: 4px; }

      /* Intelligence tab — chips become 2-up grid, cards tighten up, the
         member row drops its title/email size by a notch so long emails
         don't push the layout. */
      .intel-quickscan {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 18px;
      }
      .intel-quick { padding: 10px 12px; }
      .intel-quick-count { font-size: 20px; }
      .intel-quick-label { font-size: 9px; letter-spacing: 0.1em; }
      .intel-card { padding: 14px 14px; border-radius: 12px; }
      .intel-card-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      .intel-card-title-row { gap: 8px; }
      .intel-card-title { font-size: 15px; }
      .intel-card-count { font-size: 11px; }
      .intel-card-action { font-size: 12px; padding: 9px 12px; }
      .intel-member { padding: 10px 12px; }
      .intel-member-head { gap: 6px; row-gap: 2px; }
      .intel-member-name { font-size: 13px; }
      .intel-member-email { font-size: 11px; word-break: break-all; }
      .intel-member-why li { font-size: 11.5px; line-height: 1.45; }

      /* Revenue: VAT toggle pills wrap to 2 rows on tight viewports rather
         than forcing the row to scroll horizontally. */
      .vat-toggle {
        display: flex;
        flex-wrap: wrap;
        width: 100%;
      }
      .vat-toggle button {
        flex: 1 1 50%;
        font-size: 11px !important;
        padding: 9px 10px !important;
      }

      /* Notifications send form — recipient list reasonable height, preset
         message buttons wrap evenly, custom inputs full-width, all radios
         and inputs comfortable touch size. */
      #push-subscribers-list { max-height: 280px; padding: 8px 10px !important; }
      .push-msg-btn, .preset-btn {
        font-size: 11px;
        padding: 8px 12px;
        min-height: 36px;
      }
      #push-custom-title, #push-custom-body,
      #push-cta-destination, #push-cta-url, #push-cta-label {
        font-size: 14px !important; /* prevents iOS Safari zoom-on-focus */
      }
      /* Manage-inbox card rearranges so the Delete button sits below the
         message instead of pushing the title into a narrow column. */
      #inbox-manage-list > div {
        grid-template-columns: 1fr !important;
      }
      #inbox-manage-list button {
        justify-self: start;
      }

      /* Today's Highlights tiles align baseline differently when wrapped. */
      .highlight {
        flex-direction: row;
        align-items: center;
      }

      /* Launch tracker iframe: fill the screen on mobile and let the iframe
         handle its own scrolling. Drop the desktop min-height entirely so
         we don't get a double-scroll (page + iframe) fighting each other. */
      #launch-tracker-frame {
        height: calc(100vh - 100px);
        min-height: 0;
      }
      #panel-launch { margin: 0 -14px; }

      /* Make every link/button big enough to thumb-tap (44px target). */
      .preset-btn, .push-msg-btn, .vat-toggle button {
        min-height: 36px;
      }
    }

    /* Very small phones — sub-380px viewports get an extra pass for tighter
       padding and 1-column intelligence chips. */
    @media (max-width: 380px) {
      .wrap { padding: 16px 10px 60px; }
      .intel-quickscan { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: 1fr !important; }
      .tab-btn { padding: 9px 11px; font-size: 11px; }
    }
    /* ===== Theme toggle ===== */
    .theme-toggle {
      width: 36px; height: 36px;
      border: 1px solid var(--gold-line);
      background: transparent;
      color: var(--text);
      border-radius: 50%;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      margin-left: 8px;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .theme-toggle:hover { border-color: var(--gold); background: var(--gold-soft); }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">Loading metrics…</div>
  </div>

  <script>
    const STORAGE_KEY = "tfif_session_v1"; // Field member session
    const RANGE_STORAGE_KEY = "tfif_admin_range_v1";
    const TAB_STORAGE_KEY = "tfif_admin_tab_v1"; // Last selected dashboard tab
    const THEME_STORAGE_KEY = "tfif_admin_theme_v1";
    const root = document.getElementById("root");

    // ===== Light/dark theme =====
    // Applied via data-theme="dark" on documentElement so CSS variables flip
    // for the whole dashboard. Choice persists in localStorage. Defaults to
    // light. The toggle button in the topbar shows ☀ in dark mode and ☾ in
    // light mode (the icon represents what you'd switch TO).
    function applyTheme(theme) {
      if (theme === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
      } else {
        document.documentElement.removeAttribute("data-theme");
      }
      const btn = document.getElementById("theme-toggle-btn");
      if (btn) btn.textContent = theme === "dark" ? "☀" : "☾";
    }
    function toggleTheme() {
      const current = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
      const next = current === "dark" ? "light" : "dark";
      applyTheme(next);
      try { localStorage.setItem(THEME_STORAGE_KEY, next); } catch {}
    }
    window.toggleTheme = toggleTheme;
    // Apply saved theme immediately so the dashboard doesn't flash light first
    try {
      const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
      if (savedTheme === "dark") applyTheme("dark");
    } catch {}

    // Walk every table in the dashboard and copy each <th> text onto the
    // matching <td> as a data-label attribute. The mobile CSS uses
    // attr(data-label) on a ::before pseudo-element to render the column
    // name in front of each cell value when the table is stacked into
    // cards (no more horizontal-scroll fight on phones). Safe to call
    // repeatedly — re-setting the attribute is a no-op when the value
    // matches what's already there.
    function applyMobileTableLabels() {
      document.querySelectorAll(".section table").forEach(table => {
        const headers = Array.from(table.querySelectorAll("thead th")).map(th => th.textContent.trim());
        if (!headers.length) return;
        table.querySelectorAll("tbody tr").forEach(row => {
          row.querySelectorAll("td").forEach((cell, i) => {
            if (headers[i]) cell.setAttribute("data-label", headers[i]);
          });
        });
      });
    }
    window.applyMobileTableLabels = applyMobileTableLabels;

    // Switch the active tab. Hides all data-tab-content blocks except the
    // target, highlights the matching tab button, and saves the choice so
    // refresh restores the same tab. The is-revealing class triggers a
    // soft fade + slide-up animation so the content arrives gracefully
    // instead of snapping into place.
    function switchTab(tab) {
      document.querySelectorAll("[data-tab-content]").forEach(el => {
        const isTarget = el.dataset.tabContent === tab;
        if (isTarget) {
          // Apply the "entering" state (opacity 0 + translated), make the
          // element visible, then on the next two animation frames remove
          // the class so the transition plays back to default (opacity 1).
          // Two RAFs because the first one fires before the browser has
          // committed the display change and the class application.
          el.classList.add("is-entering");
          el.style.display = "";
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              el.classList.remove("is-entering");
            });
          });
        } else {
          el.classList.remove("is-entering");
          el.style.display = "none";
        }
      });
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.toggle("tab-btn--active", btn.dataset.tab === tab);
      });
      // On mobile the tab nav is a horizontal scroller — make sure the
      // newly-active tab is visible inside it. Without this, switching
      // to a tab off-screen leaves the active highlight invisible.
      try {
        const activeBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
        if (activeBtn && activeBtn.scrollIntoView) {
          activeBtn.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
        }
      } catch {}
      try { localStorage.setItem(TAB_STORAGE_KEY, tab); } catch {}
      // Scroll to the top of the dashboard so each tab starts cleanly.
      window.scrollTo({ top: 0, behavior: "smooth" });
      // Refresh the push subscriber list when entering Notifications — keeps
      // the recipient picker honest about who is currently subscribed. Also
      // refresh the inbox list so any new or deleted message is visible.
      if (tab === "notifications") {
        if (typeof loadPushSubscribers === "function") loadPushSubscribers();
        if (typeof loadInboxNotifications === "function") loadInboxNotifications();
      }
      // Lazy-load the Launch Tracker iframe the first time the tab opens
      // so its 1000-line page doesn't compete with the dashboard's initial
      // paint. Subsequent switches just toggle visibility; the iframe stays
      // mounted so any in-progress calculations aren't lost.
      if (tab === "launch") {
        const frame = document.getElementById("launch-tracker-frame");
        if (frame && frame.getAttribute("src") === "about:blank") {
          const realSrc = frame.getAttribute("data-real-src");
          if (realSrc) frame.setAttribute("src", realSrc);
        }
      }
    }

    // KPI click → switch to the target tab, then scroll the detail panel
    // into view inside that tab. Used by every KPI card at the top.
    function goToPanel(tab, panelId) {
      switchTab(tab);
      setTimeout(() => {
        const el = document.getElementById(panelId);
        if (el) {
          el.scrollIntoView({ behavior: "smooth", block: "start" });
          el.classList.remove("flash");
          void el.offsetWidth;
          el.classList.add("flash");
          setTimeout(() => el.classList.remove("flash"), 1500);
        }
      }, 120);
    }

    window.switchTab = switchTab;
    window.goToPanel = goToPanel;

    // State for the date range picker. Defaults to "since launch" until the
    // user picks something else. Stored in localStorage so it survives refresh.
    const state = {
      preset: "launch", // 'launch' | '7d' | '30d' | 'custom'
      from: null,       // YYYY-MM-DD (only used when preset === 'custom')
      to: null,         // YYYY-MM-DD
      launchDate: "2026-06-15",
      data: null,
    };

    try {
      const saved = JSON.parse(localStorage.getItem(RANGE_STORAGE_KEY) || "{}");
      if (saved.preset) state.preset = saved.preset;
      if (saved.from) state.from = saved.from;
      if (saved.to) state.to = saved.to;
    } catch {}

    function persistRange() {
      try {
        localStorage.setItem(RANGE_STORAGE_KEY, JSON.stringify({
          preset: state.preset, from: state.from, to: state.to,
        }));
      } catch {}
    }

    function escapeHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    // Best-effort display name from the email's local part. Used as a
    // fallback when display_name is empty in the DB — most CSV-backfilled
    // historical purchases have null raw_payload, so the ThriveCart name
    // backfill produces nothing for them. This at least gives the admin
    // tables something humanized to look at instead of just "—".
    //
    // Splits on common separators (. _ -), trims digits at the end, and
    // titlecases each piece. Examples:
    //   sofsegebarth@hotmail.com   → "Sofsegebarth"
    //   mark.j.platten@gmail.com   → "Mark J Platten"
    //   moniq_piccola@yahoo.com    → "Moniq Piccola"
    //   ge.amaral3@gmail.com       → "Ge Amaral"
    function humanizeEmail(email) {
      if (!email) return null;
      const local = String(email).split("@")[0];
      if (!local) return null;
      const parts = local
        .split(/[._-]+/)
        .map(p => p.replace(/\d+$/, "")) // strip trailing digits per part
        .filter(Boolean)
        .map(p => p.charAt(0).toUpperCase() + p.slice(1).toLowerCase());
      const name = parts.join(" ").trim();
      return name || null;
    }

    // Display the best name we have for a user — DB display_name first
    // (set by ThriveCart webhook or member's Your Account input), then a
    // humanized email fallback, then a dash placeholder.
    function nameOrFallback(u) {
      const dn = u && u.display_name && String(u.display_name).trim();
      if (dn) return dn;
      const guess = humanizeEmail(u && u.email);
      return guess || "—";
    }

    function fmtNum(n) {
      if (n == null) return "0";
      return Number(n).toLocaleString();
    }

    function fmtEur(cents) {
      if (cents == null) return "€0";
      const n = Number(cents) / 100;
      return "€" + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtPct(num, denom) {
      if (!denom) return "0%";
      return ((num / denom) * 100).toFixed(1) + "%";
    }

    function fmtDate(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    // Map raw DB tier values to the user-facing names the team actually uses.
    // The CSS classes (tier-preview / tier-full) stay the same — only the
    // label text changes.
    function tierLabel(tier) {
      if (tier === "preview") return "Power Reset";
      if (tier === "full") return "Unlimited";
      return tier || "—";
    }

    function fmtRelative(iso) {
      if (!iso) return "—";
      const ms = Date.now() - new Date(iso).getTime();
      const days = Math.floor(ms / (1000 * 60 * 60 * 24));
      if (days === 0) return "today";
      if (days === 1) return "1 day ago";
      if (days < 30) return days + " days ago";
      const months = Math.floor(days / 30);
      if (months === 1) return "1 month ago";
      return months + " months ago";
    }

    function todayStr() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function daysAgoStr(n) {
      const d = new Date();
      d.setDate(d.getDate() - n);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function resolveRange() {
      // Returns { from, to } as YYYY-MM-DD strings based on current preset.
      switch (state.preset) {
        case "7d":     return { from: daysAgoStr(7), to: null };
        case "30d":    return { from: daysAgoStr(30), to: null };
        case "custom": return { from: state.from || state.launchDate, to: state.to || null };
        case "launch":
        default:       return { from: state.launchDate, to: null };
      }
    }

    function renderGate(message) {
      root.innerHTML = `
        <div class="gate">
          <div class="brand-eyebrow">The Field — Team</div>
          <h1>Team metrics</h1>
          <p>${escapeHtml(message)}</p>
          <p><a href="/app.html">Open The Field →</a></p>
        </div>
      `;
    }

    async function loadMetrics() {
      let token;
      try { token = localStorage.getItem(STORAGE_KEY); } catch { token = null; }
      if (!token) {
        renderGate("You need to log in to The Field first. Open the app, log in with your @shimritnativ.com email, then come back here.");
        return;
      }

      const { from, to } = resolveRange();
      const params = new URLSearchParams();
      if (from) params.set("from", from);
      if (to) params.set("to", to);

      try {
        const r = await fetch("/api/admin/metrics?" + params.toString(), {
          method: "GET",
          headers: { "x-session-token": token },
        });
        if (r.status === 401) {
          renderGate("Your session expired. Open The Field, log in again, then refresh this page.");
          return;
        }
        if (r.status === 403) {
          renderGate("This page is restricted to @shimritnativ.com Field members.");
          return;
        }
        if (!r.ok) {
          renderGate("Something went wrong loading the metrics. Refresh and try again.");
          return;
        }
        const data = await r.json();
        state.data = data;
        if (data.dateRange && data.dateRange.launchDate) {
          state.launchDate = data.dateRange.launchDate.slice(0, 10);
        }
        renderDashboard(data);
        // Once the dashboard is in the DOM, walk every table and copy
        // each column header onto its corresponding <td> as a data-label
        // attribute. The mobile CSS uses ::before content: attr(data-label)
        // to render that label in front of each cell value when the table
        // is stacked into cards. Runs once here and again after any future
        // re-render that swaps tables out.
        applyMobileTableLabels();
        // Load the push subscribers list and inbox manager lazily after
        // the main dashboard paints, so the "Send a notification" panel
        // is ready to use the moment the admin clicks into it.
        setTimeout(() => {
          loadPushSubscribers();
          loadInboxNotifications();
        }, 100);
      } catch (err) {
        renderGate("Network error. Check your connection and refresh.");
      }
    }

    function onPreset(preset) {
      state.preset = preset;
      if (preset !== "custom") {
        state.from = null; state.to = null;
      }
      persistRange();
      loadMetrics();
    }

    function onApplyCustom() {
      const fromEl = document.getElementById("from-date");
      const toEl = document.getElementById("to-date");
      state.preset = "custom";
      state.from = fromEl.value || state.launchDate;
      state.to = toEl.value || null;
      persistRange();
      loadMetrics();
    }

    function rangeLabel() {
      const { from, to } = resolveRange();
      const fromLabel = from === state.launchDate ? "launch (" + fmtDate(state.launchDate + "T00:00:00") + ")" : fmtDate(from + "T00:00:00");
      const toLabel = to ? fmtDate(to + "T00:00:00") : "now";
      return `${fromLabel} → ${toLabel}`;
    }

    function renderControls() {
      const { from, to } = resolveRange();
      const fromVal = from || "";
      const toVal = to || "";
      return `
        <div class="date-controls">
          <span class="date-controls-label">Range</span>
          <button class="preset-btn ${state.preset === 'launch' ? 'active' : ''}" onclick="onPreset('launch')">Since launch</button>
          <button class="preset-btn ${state.preset === '7d' ? 'active' : ''}" onclick="onPreset('7d')">Last 7 days</button>
          <button class="preset-btn ${state.preset === '30d' ? 'active' : ''}" onclick="onPreset('30d')">Last 30 days</button>
          <span style="margin: 0 4px; color: var(--gold-line);">|</span>
          <input type="date" id="from-date" class="date-input" value="${escapeHtml(fromVal)}" />
          <span class="date-sep">to</span>
          <input type="date" id="to-date" class="date-input" value="${escapeHtml(toVal)}" />
          <button class="apply-btn" onclick="onApplyCustom()">Apply</button>
          <span class="range-summary">Showing: ${rangeLabel()} · team excluded</span>
        </div>
      `;
    }

    function renderDashboard(d) {

      const tc = d.thrivecart || {};

      let resetTotal = 0, unlimitedTotal = 0, unlimitedMonthly = 0, unlimitedAnnual = 0, unlimitedNone = 0;
      (d.tierCounts || []).forEach(t => {

        if (t.tier === "full") {
          unlimitedTotal += t.n;
          if (t.plan === "monthly") unlimitedMonthly += t.n;
          else if (t.plan === "yearly") unlimitedAnnual += t.n;

      const signupsByDate = {};

      // Intelligence tab — sum of all six segment sizes for the nav badge.

      const intelligenceTotal =

        (intel.hot_reset_graduate || []).length +
        (intel.book_launch_warmer || []).length +
        (intel.at_risk_subscriber || []).length +

                <button class="preset-btn" onclick="loadMetrics()">↻ Refresh</button>
                <button class="theme-toggle" onclick="toggleTheme()" id="theme-toggle-btn" aria-label="Toggle light/dark theme" title="Toggle light/dark theme">☾</button>
              </div>

          </div>

          ${renderControls()}

          <div class="dashboard-body">
            <div class="dashboard-main">

          <!-- ===== OVERVIEW TAB ===== -->

            <!-- KPI strip — every card switches tabs + scrolls to detail -->

                <div class="kpi-sub">${fmtNum(resetTotal)} Reset · ${fmtNum(unlimitedTotal)} Unlimited</div>
              </div>
              <div class="kpi clickable" onclick="goToPanel('overview', 'panel-tier-mix')">
                <div class="kpi-label">72-Hour Reset</div>

                <div class="kpi-sub">${fmtNum(w.active_reset || 0)} active · ${fmtNum(w.expired_reset || 0)} expired</div>
              </div>
              <div class="kpi clickable" onclick="goToPanel('engagement', 'panel-unlimited-engagement')">
                <div class="kpi-label">Unlimited Field</div>
                <div class="kpi-value">${fmtNum(unlimitedTotal)}</div>
                <div class="kpi-sub">${fmtNum(unlimitedMonthly)} mo · ${fmtNum(unlimitedAnnual)} yr · ${fmtNum(unlimitedNone)} other</div>
              </div>
              <div class="kpi clickable" onclick="goToPanel('overview', 'panel-funnel')">
                <div class="kpi-label">Day 3 Completed</div>
                <div class="kpi-value">${fmtNum(c.d3 || 0)}</div>
                <div class="kpi-sub">${fmtPct(c.d3 || 0, c.total_logged_in || 0)} of logged-in</div>
              </div>
              ${tc.connected ? `
                <div class="kpi kpi-revenue clickable" onclick="goToPanel('revenue', 'panel-revenue')">
                  <div class="kpi-label">Net Revenue (ex VAT)</div>
                  <div class="kpi-value">${fmtEur(Math.round(netCents / VAT_DIVISOR))}</div>
                  <div class="kpi-sub">${fmtNum(tcSummary.orders || 0)} orders · ${fmtNum(tcSummary.unique_buyers || 0)} paying buyers <span style="opacity:0.7;">· ${fmtEur(netCents)} gross</span></div>
                </div>
              ` : ''}
            </div>

            <!-- Completion funnel + Tier breakdown -->
          <div class="two-col">

              <h2><span class="h2-eyebrow">Funnel</span>72-Hour Power Reset completion</h2>
              ${renderFunnel(c, d.completionDetails)}
              <div class="footnote">Base = ${fmtNum(c.total_members || 0)} Power Reset members. Top-level split: Never logged in + Logged in = ${fmtNum(c.total_members || 0)}. Indented rows break down the Logged-in group further (Day 1/2/3 are cumulative subsets, "Didn't start" is the leftover). Click any row to see who's in it.</div>
              <div style="margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);">
                <button class="preset-btn" onclick="runBackfill()" id="backfill-btn" style="background: var(--gold); color: var(--dark); border-color: var(--gold);">Refresh completions</button>
                <div id="backfill-status" style="margin-top: 10px; font-size: 12px; color: var(--text-dim); font-style: italic;">Runs automatically once a day. Click any time to refresh now.</div>
              </div>
            </div>
            <div class="section" id="panel-tier-mix">
              <h2><span class="h2-eyebrow">Tier mix</span>Members by tier &amp; plan</h2>
              <table>
                <thead><tr><th>Tier</th><th>Plan</th><th class="num">Members</th></tr></thead>
                <tbody>
                  ${(d.tierCounts || []).length === 0
                    ? '<tr><td colspan="3" class="empty-state">No members in this range.</td></tr>'
                    : (d.tierCounts || []).map(t => `
                      <tr>
                        <td><span class="tier-badge ${t.tier === 'full' ? 'tier-full' : 'tier-preview'}">${escapeHtml(tierLabel(t.tier))}</span></td>
                        <td>${t.plan === 'none' ? '—' : escapeHtml(t.plan)}</td>
                        <td class="num">${fmtNum(t.n)}</td>
                      </tr>
                    `).join("")}
                </tbody>
              </table>
            </div>
          </div>

          </div>
          <!-- /end Overview tab -->

          <!-- ===== INTELLIGENCE TAB ===== -->
          <div data-tab-content="intelligence" style="display: none;">
            ${renderIntelligence(d.intelligence || {})}
          </div>
          <!-- /end Intelligence tab -->

          <!-- ===== MEMBERS TAB ===== -->
          <div data-tab-content="members" style="display: none;">
            <!-- Recent signups roster -->
            <div class="section" id="panel-roster">
              <h2><span class="h2-eyebrow">Roster</span>Most recent signups in this range (newest 25)</h2>
            <table>
              <thead>
                <tr>
                  <th>Email</th><th>Name</th><th>Tier</th><th>Plan</th>
                  <th class="num">Spent</th>
                  <th>Joined</th><th>1st login</th><th class="num">Day</th>
                </tr>
              </thead>
              <tbody>
                ${(d.recentSignups || []).length === 0
                  ? '<tr><td colspan="8" class="empty-state">No signups in this range.</td></tr>'
                  : (d.recentSignups || []).map(u => {
                      // Total spend respects the global VAT toggle — fmtRev
                      // divides by 1.19 when the admin is viewing "ex VAT".
                      // Zero spend (free members like Tomer would be here
                      // if we hadn't filtered him) renders as a dash.
                      const spent = Number(u.total_spent_cents || 0);
                      const count = Number(u.purchase_count || 0);
                      const spentCell = spent > 0
                        ? `${fmtRev(spent)}<span style="color: var(--text-mute); font-weight: 400; font-size: 11px; margin-left: 6px;">${count} order${count === 1 ? '' : 's'}</span>`
                        : '<span style="color: var(--text-mute);">—</span>';
                      return `
                        <tr>
                          <td>${escapeHtml(u.email)}</td>
                          <td>${escapeHtml(nameOrFallback(u))}</td>
                          <td><span class="tier-badge ${u.tier === 'full' ? 'tier-full' : 'tier-preview'}">${escapeHtml(tierLabel(u.tier))}</span></td>
                          <td>${escapeHtml(u.subscription_plan || "—")}</td>
                          <td class="num">${spentCell}</td>
                          <td>${fmtDate(u.created_at)}</td>
                          <td>${u.first_login_at ? fmtDate(u.first_login_at) : "—"}</td>
                          <td class="num">${u.last_completed_day || 0}</td>
                        </tr>
                      `;
                    }).join("")}
              </tbody>
            </table>
          </div>
          <!-- Signups by day -->
          <div class="section" id="panel-signups">
            <h2><span class="h2-eyebrow">Recent</span>Signups by day</h2>
            ${signupDates.length === 0
              ? '<div class="empty-state">No signups in this range.</div>'
              : signupDates.map(day => `
                <div class="signup-row">
                  <div class="date">${fmtDate(day)}</div>
                  <div class="signup-bar-track"><div class="signup-bar-fill" style="width:${(signupsByDate[day] / maxSignup) * 100}%;"></div></div>
                  <div class="n">${fmtNum(signupsByDate[day])}</div>
                </div>
              `).join("")
            }
          </div>
          </div>
          <!-- /end Members tab -->

          <!-- ===== REVENUE TAB ===== -->
          <div data-tab-content="revenue" style="display: none;">
            ${tc.connected ? renderThrivecartSection(tc) : renderThrivecartNotConnected()}
          </div>
          <!-- /end Revenue tab -->

          <!-- ===== ENGAGEMENT TAB ===== -->
          <div data-tab-content="engagement" style="display: none;">
            <!-- Top Unlimited users -->
            <div class="section" id="panel-unlimited-engagement">
              <h2><span class="h2-eyebrow">Engagement</span>Top Unlimited members by messages (last 30d, rolling)</h2>
              <table>
                <thead>
                  <tr>
                    <th>Email</th><th>Name</th><th>Plan</th>
                    <th class="num">Messages</th><th class="num">Last message</th>
                  </tr>
                </thead>
                <tbody>
                  ${(d.perUserUnlimited || []).length === 0
                    ? '<tr><td colspan="5" class="empty-state">No Unlimited messages in the last 30 days.</td></tr>'
                    : (d.perUserUnlimited || []).map(u => `
                      <tr>
                        <td>${escapeHtml(u.email)}${u.has_paid_purchase ? '' : '<span class="comp-pill" title="No paid purchase. Free access via team grant or GEO100 100%-off coupon.">free access</span>'}</td>
                        <td>${escapeHtml(nameOrFallback(u))}</td>
                        <td>${escapeHtml(u.subscription_plan || "—")}</td>
                        <td class="num">${fmtNum(u.messages_30d)}</td>
                        <td class="num">${fmtRelative(u.last_message_at)}</td>
                      </tr>
                    `).join("")}
                </tbody>
              </table>
            </div>
            <!-- Top processes used -->
            <div class="section" id="panel-processes">
              <h2><span class="h2-eyebrow">Unlimited use</span>Top processes (last 30d, rolling)</h2>
              <table>
                <thead><tr><th>Process</th><th class="num">Sessions</th><th class="num">Unique users</th></tr></thead>
                <tbody>
                  ${(d.processUsage || []).length === 0
                    ? '<tr><td colspan="3" class="empty-state">No Unlimited sessions yet.</td></tr>'
                    : (d.processUsage || []).slice(0, 12).map(p => `
                      <tr>
                        <td>${escapeHtml(p.process_key)}</td>
                        <td class="num">${fmtNum(p.sessions_started)}</td>
                        <td class="num">${fmtNum(p.unique_users)}</td>
                      </tr>
                    `).join("")}
                </tbody>

            </div>
          </div>
          <!-- /end Engagement tab -->

          <div data-tab-content="notifications" style="display: none;">

              <label style="display: flex; align-items: flex-start; gap: 8px; padding: 8px 12px; background: var(--panel); border: 1px solid var(--gold-line); border-radius: 8px; cursor: pointer;">

                  <div style="font-size: 11.5px; color: var(--text-dim);">Saves to the inbox so every member sees it via the bell icon. No push, no device pings.</div>

              "Highest-intent moment in the entire funnel",
              "Window closes in ~24h",

          priorityLabel: "Premium ladder",

      // Hard filter: drop any row that has no usable email. The backend

      // phantom data, NULL-email demo user, anything) we'd rather show 0

      // and the team. Counts and sort order both use the filtered list.
      segments.forEach(s => {

          return !!e;

      });

      // Sort: actionable segments first (by priority hot > ready > nurture),
      // empty ones to the bottom in muted state.
      const priorityRank = { hot: 0, ready: 1, nurture: 2 };
      segments.sort((a, b) => {
        const aEmpty = a.rows.length === 0;
        const bEmpty = b.rows.length === 0;
        if (aEmpty !== bEmpty) return aEmpty ? 1 : -1;
        return priorityRank[a.priority] - priorityRank[b.priority];

          // Prefer DB display name, then humanized email local part, then
          // a last-resort placeholder. The email is always shown on its own
          // line beneath so you can still copy/identify the member.
          const primary = dbName || humanizeEmail(email) || "Unknown member";
          const isReal = !!dbName;
          const bullets = (s.why(u) || []).map(b => `<li>${b}</li>`).join("");
          return `
            <div class="intel-member">
              <div class="intel-member-head">
                <span class="intel-member-name ${isReal ? '' : 'intel-member-name--anon'}">${escapeHtml(primary)}</span>
                ${email ? `<span class="intel-member-email">${escapeHtml(email)}</span>` : ''}
              </div>
              <ul class="intel-member-why">${bullets}</ul>
            </div>
          `;
        }).join("");
        return `
          <div class="intel-card" id="intel-seg-${s.key}">
            <div class="intel-card-head">
              <div class="intel-card-title-row">
                <span class="intel-priority-chip intel-priority-chip--${s.priority}">${escapeHtml(s.priorityLabel)}</span>
                <span class="intel-card-title">${escapeHtml(s.title)}</span>
              </div>
              <span class="intel-card-count"><strong>${fmtNum(s.rows.length)}</strong> ${s.rows.length === 1 ? 'member' : 'members'}</span>
            </div>
            <div class="intel-card-action">${s.action}</div>
            <div class="intel-member-list">${memberCards}</div>
          </div>
        `;
      }).join("");

      return quickHtml + segmentsHtml;
    }
