    .empty-state {
      text-align: center; padding: 24px 12px;
      color: var(--text-mute); font-style: italic; font-size: 13px;
    }
    /* ===== Intelligence tab (redesigned for clarity + action) ===== */
    .intel-empty-state {
      text-align: center;
      padding: 60px 24px;
      background: var(--panel);
      border: 1px solid var(--gold-line);
      border-radius: 14px;
    }
    .intel-empty-icon { font-size: 32px; margin-bottom: 12px; color: var(--gold); }
    .intel-empty-title {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 19px;
      color: var(--text);
      margin-bottom: 6px;
    }
    .intel-empty-sub {
      font-size: 12.5px;
      color: var(--text-dim);
      max-width: 360px;
      margin: 0 auto;
      line-height: 1.5;
    }
    /* Quick-scan strip at the top — small clickable chips per segment */
    .intel-quickscan {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }
    .intel-quick {
      background: var(--bg-card);
      border: 1px solid var(--gold-line);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .intel-quick:hover { transform: translateY(-2px); border-color: var(--gold); }
    .intel-quick-count {
      font-family: Georgia, serif;
      font-size: 24px;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }
    .intel-quick-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      text-transform: uppercase;
    }
    .intel-quick--zero { opacity: 0.4; }
    /* Positive-opportunity green for "hot" segments. Red signaled urgency
       but read as a warning, which is the wrong mental model — these aren't
       problems, they're high-value sales moments. Emerald says "ripe to
       harvest" and stays MYP-warm. */
    .intel-quick--hot {
      background: linear-gradient(135deg, rgba(63, 128, 96, 0.08), var(--bg-card));
      border-color: rgba(63, 128, 96, 0.4);
    }
    .intel-quick--hot .intel-quick-label { color: #3F8060; }
    /* Segment cards */
    .intel-card {
      background: var(--bg-card);
      border: 1px solid var(--gold-line);
      border-radius: 14px;
      padding: 18px 22px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .intel-card--empty { opacity: 0.5; padding: 12px 22px; box-shadow: none; }
    .intel-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .intel-card-title-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .intel-priority-chip {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      padding: 3px 9px;
      border-radius: 999px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    /* Priority chip palette — chosen to read as positive-opportunity, not
       warning. Hot = ripe to harvest (emerald), Ready = premium ladder
       (MYP gold), Nurture = gentle attention (warm taupe). */
    .intel-priority-chip--hot { background: #3F8060; color: white; }
    .intel-priority-chip--ready { background: var(--gold); color: var(--dark); }
    .intel-priority-chip--nurture { background: #8B7B5E; color: white; }
    .intel-card-title {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 17px;
      color: var(--text);
    }
    .intel-card-count {
      font-size: 12.5px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .intel-card-count strong { color: var(--text); }
    .intel-card-action {
      font-size: 12.5px;
      color: var(--text);
      background: var(--panel);
      border-left: 3px solid var(--gold);
      padding: 8px 14px;
      border-radius: 0 6px 6px 0;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .intel-card-action strong { color: var(--text); font-weight: 600; }
    .intel-member-list {
      display: grid;
      /* Two-column grid where each column is at least 320px wide. On
         wider screens this fits 2 (or occasionally 3) columns and cuts
         vertical scroll in half. On narrower screens it falls back to
         one column automatically via auto-fit. */
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 10px;
    }
    .intel-member {
      padding: 12px 14px;
      background: var(--panel);
      border-radius: 8px;
      border: 1px solid transparent;
      transition: border-color 0.15s ease;
      position: relative;
    }
    .intel-member:hover { border-color: var(--gold-line); }
    /* Per-row dismiss button — small X in the top-right of each card.
       Always visible (mobile has no hover) but kept small and muted so
       it never competes with the member info. Brightens on hover/focus. */
    .intel-member-dismiss {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-mute);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .intel-member-dismiss:hover,
    .intel-member-dismiss:focus {
      background: var(--gold-soft);
      color: var(--gold);
      border-color: var(--gold-line);
      outline: none;
    }
    /* Toast that confirms a dismissal — fades in then auto-dismisses. */
    .intel-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: var(--panel);
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 13px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 1000;
    }
    .intel-toast.is-shown {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    /* "X dismissed (show)" toggle under each segment header. */
    .intel-dismissed-toggle {
      display: inline-block;
      margin: 6px 0 0;
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 3px;
    }
    .intel-dismissed-toggle:hover { color: var(--gold); }
    .intel-dismissed-list {
      margin-top: 8px;
      padding: 8px 10px;
      background: var(--gold-soft);
      border: 1px dashed var(--gold-line);
      border-radius: 8px;
      font-size: 12px;
      display: none;
    }
    .intel-dismissed-list.is-shown { display: block; }
    .intel-dismissed-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 4px 0;
    }
    .intel-dismissed-row + .intel-dismissed-row {
      border-top: 1px solid var(--gold-line);
    }
    .intel-restore-btn {
      background: transparent;
      border: 1px solid var(--gold-line);
      color: var(--gold);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .intel-restore-btn:hover { background: var(--gold); color: var(--panel); }
    .intel-member-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .intel-member-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    /* Fallback names (generated from email prefix) look identical to
       real names, no italic. The email underneath is enough context to
       tell them apart. */
    .intel-member-name--anon {
      color: var(--text);
      font-weight: 700;
    }
    .intel-member-email {
      font-size: 12px;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .intel-member-why {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 4px;
    }
    .intel-member-why li {
      font-size: 12.5px;
      color: var(--text-dim);
      line-height: 1.5;
      position: relative;
      padding-left: 16px;
    }
    .intel-member-why li::before {
      content: "•";
      position: absolute;
      left: 4px;
      top: 0;
      color: var(--gold);
      font-weight: 700;
    }
    .intel-member-why strong { color: var(--text); font-weight: 600; }
    @media (max-width: 640px) {
      .intel-card { padding: 14px 16px; }
    }
    /* ===== Left-side tab navigation ===== */
    .dashboard-body {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 28px;
      align-items: start;
    }
    .tabs {
      display: flex;
      flex-direction: column;
      gap: 2px;
      background: var(--panel);
      border: 1px solid var(--gold-line);
      border-radius: 12px;
      padding: 10px;
      position: sticky;
      top: 24px;
      order: -1;
    }
    .tab-btn {
      background: transparent;
      border: 1px solid transparent;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      cursor: pointer;
      border-radius: 8px;
      transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      text-align: left;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .tab-btn:hover { color: var(--text); background: rgba(201, 168, 76, 0.08); }
    .tab-btn--active {
      color: var(--text);
      background: var(--gold-soft);
      border-color: var(--gold-line);
    }
    .tab-btn-count {
      background: var(--gold-soft);
      color: var(--gold);
      font-size: 10px;
      font-weight: 700;
      padding: 1px 7px;
      border-radius: 999px;
    }
    .tab-btn--active .tab-btn-count {
      background: var(--gold);
      color: var(--dark);
    }
    /* ===== Smooth interactions =====
       Tab content fades in + lifts slightly when shown so switching tabs
       feels like a gentle reveal instead of a hard cut. Default state is
       visible (opacity 1) so initial page load has no flash. When a tab
       is about to be shown, we briefly add .is-entering to push it to
       opacity 0 + translateY(6px), then remove the class on the next
       animation frame so the transition plays back to default. */
    [data-tab-content] {
      transition: opacity 0.36s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.36s cubic-bezier(0.22, 1, 0.36, 1);
    }
    [data-tab-content].is-entering {
      opacity: 0;
      transform: translateY(6px);
    }
    /* Universal easing for the most-clicked things in the dashboard. */
    .tab-btn,
    .kpi,
    .clickable,
    .intel-card,
    .intel-member,
    .intel-quick {
      transition: background-color 0.25s ease,
                  border-color 0.25s ease,
                  transform 0.25s cubic-bezier(0.22, 1, 0.36, 1),
                  box-shadow 0.25s ease,
                  opacity 0.25s ease;
    }
    .kpi.clickable:hover, .kpi-revenue.clickable:hover {
      transform: translateY(-1px);
    }
    .intel-quick:hover {
      transform: translateY(-1px);
    }
    /* Sparkle emoji next to "Intelligence" — gives the tab a touch of
       Field-magic. Subtle pulse on hover, gentle shimmer when active. */
    /* Wraps "Intelligence ✨" so they sit together as a single flex child
       and the count badge gets pushed to the far right instead of opening
       a gap between the word and the emoji. */
    .tab-label { display: inline-flex; align-items: center; gap: 4px; }
    .tab-sparkle {
      display: inline-block;
      font-size: 0.9em;
      transition: transform 0.3s ease;
      vertical-align: middle;
    }
    .tab-btn:hover .tab-sparkle { transform: scale(1.15) rotate(8deg); }
    .tab-btn--active .tab-sparkle {
      animation: tab-sparkle-shimmer 2.4s ease-in-out infinite;
    }
    @keyframes tab-sparkle-shimmer {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.15) rotate(-6deg); }
    }
    /* Rocket variant — hover lifts it like a launch, active state wobbles
       gently as if firing thrusters. Override the sparkle's rotate-on-hover
       since rockets shouldn't tilt sideways. */
    .tab-btn:hover .tab-rocket { transform: translateY(-2px) scale(1.1); }
    .tab-btn--active .tab-rocket {
      animation: tab-rocket-ignite 2.2s ease-in-out infinite;
    }
    @keyframes tab-rocket-ignite {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-3px) scale(1.08); }
    }
    /* ===== Ads tab range selector =====
       Same .preset-btn base styling; active variant uses gold fill. */
    .ads-range-btn--active {
      background: var(--gold) !important;
      color: var(--dark) !important;
      border-color: var(--gold) !important;
    }
    .kpi--accent {
      background: linear-gradient(135deg, var(--gold-soft) 0%, var(--panel) 100%) !important;
      border-color: var(--gold) !important;
    }
    /* Campaign chip toggles — off = ghost pill, on = filled gold. */
    .ads-campaign-chip {
      display: inline-block;
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-dim);
      font-family: inherit;
      font-size: 11.5px;
      font-weight: 500;
      cursor: pointer;
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .ads-campaign-chip:hover {
      border-color: var(--gold-line);
      color: var(--text);
    }
    .ads-campaign-chip--on {
      background: var(--gold-soft);
      border-color: var(--gold);
      color: var(--gold);
      font-weight: 600;
    }

    /* ===== Hamburger button (mobile only) =====
        Hidden by default on desktop. Visible only when the screen narrows
        below the layout breakpoint where the sidebar tabs collapse. */
    .mobile-menu-btn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border: 1px solid var(--gold-line);
      background: var(--panel);
      border-radius: 10px;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      transition: background 0.2s ease, border-color 0.2s ease;
    }
    .mobile-menu-btn:hover {
      background: var(--gold-soft);
      border-color: var(--gold);
    }
    .mobile-menu-icon {
      display: inline-flex;
      flex-direction: column;
      gap: 4px;
      width: 18px;
    }
    .mobile-menu-icon span {
      display: block;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    /* Hamburger transforms into an X when the drawer is open */
    body.mobile-menu-open .mobile-menu-icon span:nth-child(1) {
      transform: translateY(6px) rotate(45deg);
    }
    body.mobile-menu-open .mobile-menu-icon span:nth-child(2) { opacity: 0; }
    body.mobile-menu-open .mobile-menu-icon span:nth-child(3) {
      transform: translateY(-6px) rotate(-45deg);
    }
    /* Backdrop overlay shown when drawer is open */
    .mobile-menu-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(14, 11, 7, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 998;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    body.mobile-menu-open .mobile-menu-backdrop {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 760px) {
      /* Show the hamburger button */
      .mobile-menu-btn { display: inline-flex; }

      /* CRITICAL: grid children need min-width: 0 so they can shrink
         below their content's intrinsic width. Without this, anything
         inside (a wide table, a long string, an iframe) makes the
         dashboard-main column grow past the viewport — exactly the
         "wonky" overflow Geo screenshotted. */
      .dashboard-body { grid-template-columns: minmax(0, 1fr); gap: 0; }
      .dashboard-main { min-width: 0; max-width: 100%; overflow-x: hidden; }

      /* Mobile: tabs become a slide-down drawer triggered by the
         hamburger. The drawer sits as a fixed panel anchored to the
         top of the viewport, slides in from the top with a soft fade.
         Tap a tab → drawer closes + tab switches. */
      .tabs {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        flex-direction: column;
        gap: 4px;
        max-height: calc(100vh - 20px);
        overflow-y: auto;
        padding: 18px 16px 22px;
        margin: 0;
        background: var(--panel);
        border: 1px solid var(--gold-line);
        border-radius: 0 0 16px 16px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.18);
        z-index: 999;
        transform: translateY(-110%);
        transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
        opacity: 1;
      }
      body.mobile-menu-open .tabs {
        transform: translateY(0);
      }
      .tab-btn {
        white-space: normal;
        padding: 14px 16px;
        font-size: 15px;
        min-height: 48px;
        justify-content: flex-start;
        flex-shrink: 0;
        border-radius: 10px;
      }
      .tab-btn-count { margin-left: auto; }
      /* Section + cards: belt-and-braces overflow constraint */
      .section, .highlights, .kpi-grid, .grid, .two-col {
        max-width: 100%;
        min-width: 0;
      }
      /* Iframes (launch tracker, kajabi embeds) never push beyond viewport */
      iframe { max-width: 100%; display: block; }
      /* Launch tracker panel — strip any padding/border discrepancy so
         the iframe sits flush with the admin background on both sides.
         Without this the inline padding:0 didn't beat the mobile
         .section { padding: 16px 14px } override below it in cascade. */
      #panel-launch {
        padding: 0 !important;
        margin: 0 !important;
        border: none !important;
        background: transparent !important;
      }
      #panel-launch iframe {
        width: 100%;
        margin: 0;
        background: var(--bg);
      }

      /* Intelligence tab — chips become 2-up grid, cards tighten up, the
         member row drops its title/email size by a notch so long emails
         don't push the layout. */
      .intel-quickscan {
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 18px;
      }
      .intel-quick { padding: 10px 12px; }
      .intel-quick-count { font-size: 20px; }
      .intel-quick-label { font-size: 9px; letter-spacing: 0.1em; }
      .intel-card { padding: 14px 14px; border-radius: 12px; }
      .intel-card-head {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      .intel-card-title-row { gap: 8px; }
      .intel-card-title { font-size: 15px; }
      .intel-card-count { font-size: 11px; }
      .intel-card-action { font-size: 12px; padding: 9px 12px; }
      .intel-member { padding: 10px 12px; }
      .intel-member-head { gap: 6px; row-gap: 2px; }
      .intel-member-name { font-size: 13px; }
      .intel-member-email { font-size: 11px; word-break: break-all; }
      .intel-member-why li { font-size: 11.5px; line-height: 1.45; }

      /* Revenue: VAT toggle pills wrap to 2 rows on tight viewports rather
         than forcing the row to scroll horizontally. */
      .vat-toggle {
        display: flex;
        flex-wrap: wrap;
        width: 100%;
      }
      .vat-toggle button {
        flex: 1 1 50%;
        font-size: 11px !important;
        padding: 9px 10px !important;
      }

      /* Notifications send form — recipient list reasonable height, preset
         message buttons wrap evenly, custom inputs full-width, all radios
         and inputs comfortable touch size. */
      #push-subscribers-list { max-height: 280px; padding: 8px 10px !important; }
      .push-msg-btn, .preset-btn {
        font-size: 11px;
        padding: 8px 12px;
        min-height: 36px;
      }
      #push-custom-title, #push-custom-body,
      #push-cta-destination, #push-cta-url, #push-cta-label {
        font-size: 14px !important; /* prevents iOS Safari zoom-on-focus */
      }
      /* Manage-inbox card rearranges so the Delete button sits below the
         message instead of pushing the title into a narrow column. */
      #inbox-manage-list > div {
        grid-template-columns: 1fr !important;
      }
      #inbox-manage-list button {
        justify-self: start;
      }

      /* Today's Highlights tiles align baseline differently when wrapped. */
      .highlight {
        flex-direction: row;
        align-items: center;
      }

      /* Launch tracker iframe: height is driven by postMessage from the
         tracker itself so the admin page is the single scroll surface.
         We just make sure the section frame doesn't add extra chrome. */
      #panel-launch { margin: 0 -14px; }

      /* Make every link/button big enough to thumb-tap (44px target). */
      .preset-btn, .push-msg-btn, .vat-toggle button {
        min-height: 36px;
      }
    }

    /* Very small phones — sub-380px viewports get an extra pass for tighter
       padding and 1-column intelligence chips. */
    @media (max-width: 380px) {
      .wrap { padding: 16px 10px 60px; }
      .intel-quickscan { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: 1fr !important; }
      .tab-btn { padding: 9px 11px; font-size: 11px; }
    }
    /* ===== Theme toggle ===== */
    .theme-toggle {
      width: 36px; height: 36px;
      border: 1px solid var(--gold-line);
      background: transparent;
      color: var(--text);
      border-radius: 50%;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      margin-left: 8px;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .theme-toggle:hover { border-color: var(--gold); background: var(--gold-soft); }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">Loading metrics…</div>
  </div>

  <script>
    const STORAGE_KEY = "tfif_session_v1"; // Field member session
    const RANGE_STORAGE_KEY = "tfif_admin_range_v1";
    const TAB_STORAGE_KEY = "tfif_admin_tab_v1"; // Last selected dashboard tab
    const THEME_STORAGE_KEY = "tfif_admin_theme_v1";
    const root = document.getElementById("root");

    // ===== Light/dark theme =====
    // Applied via data-theme="dark" on documentElement so CSS variables flip
    // for the whole dashboard. Choice persists in localStorage. Defaults to
    // light. The toggle button in the topbar shows ☀ in dark mode and ☾ in
    // light mode (the icon represents what you'd switch TO).
    function applyTheme(theme) {
      if (theme === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
      } else {
        document.documentElement.removeAttribute("data-theme");
      }
      const btn = document.getElementById("theme-toggle-btn");
      if (btn) btn.textContent = theme === "dark" ? "☀" : "☾";
      // Sync the launch-tracker iframe so it doesn't stay light when
      // the rest of the admin goes dark (and vice versa). Safe to call
      // even if the iframe isn't loaded yet — postMessage is a no-op
      // against about:blank.
      try {
        const frame = document.getElementById("launch-tracker-frame");
        if (frame && frame.contentWindow) {
          frame.contentWindow.postMessage({ type: "set-theme", theme }, "*");
        }
      } catch {}
    }
    function toggleTheme() {
      const current = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
      const next = current === "dark" ? "light" : "dark";
      applyTheme(next);
      try { localStorage.setItem(THEME_STORAGE_KEY, next); } catch {}
    }
    window.toggleTheme = toggleTheme;
    // Apply saved theme immediately so the dashboard doesn't flash light first
    try {
      const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);
      if (savedTheme === "dark") applyTheme("dark");
    } catch {}

    // Walk every table in the dashboard and copy each <th> text onto the
    // matching <td> as a data-label attribute. The mobile CSS uses
    // attr(data-label) on a ::before pseudo-element to render the column
    // name in front of each cell value when the table is stacked into
    // cards (no more horizontal-scroll fight on phones). Safe to call
    // repeatedly — re-setting the attribute is a no-op when the value
    // matches what's already there.
    function applyMobileTableLabels() {
      document.querySelectorAll(".section table").forEach(table => {
        // Extract JUST the header label text — NOT the tooltip content.
        // Column headers now embed <span class="kpi-help"> and
        // <span class="kpi-tooltip"> for hover help; if we grab .textContent
        // naively, the mobile data-label ends up as "Email?EmailThe member's..."
        // which explodes the mobile card layout. Clone the <th>, strip out
        // the help spans, then take the text.
        const headers = Array.from(table.querySelectorAll("thead th")).map(th => {
          const clone = th.cloneNode(true);
          clone.querySelectorAll(".kpi-help, .kpi-tooltip").forEach(el => el.remove());
          return clone.textContent.trim();
        });
        if (!headers.length) return;
        table.querySelectorAll("tbody tr").forEach(row => {
          row.querySelectorAll("td").forEach((cell, i) => {
            if (headers[i]) cell.setAttribute("data-label", headers[i]);
          });
        });
      });
    }
    window.applyMobileTableLabels = applyMobileTableLabels;

    // ===== Mobile hamburger menu =====
    // The drawer is the existing .tabs element, repurposed via CSS as a
    // slide-down panel on mobile. The hamburger toggles a body class
    // that drives the open/close state. A click on the backdrop, on a
    // tab, or pressing Escape all close it.
    function openMobileMenu() {
      document.body.classList.add("mobile-menu-open");
      const btn = document.getElementById("mobileMenuBtn");
      if (btn) btn.setAttribute("aria-expanded", "true");
    }
    function closeMobileMenu() {
      document.body.classList.remove("mobile-menu-open");
      const btn = document.getElementById("mobileMenuBtn");
      if (btn) btn.setAttribute("aria-expanded", "false");
    }
    function toggleMobileMenu() {
      if (document.body.classList.contains("mobile-menu-open")) {
        closeMobileMenu();
      } else {
        openMobileMenu();
      }
    }
    window.openMobileMenu = openMobileMenu;
    window.closeMobileMenu = closeMobileMenu;

    // Delegated event listeners attached once at boot. We rely on
    // delegation because the topbar (and therefore the button) gets
    // re-rendered when refreshDashboard runs — direct .addEventListener
    // bindings would be wiped on each render.
    document.body.addEventListener("click", (e) => {
      const btn = e.target.closest("#mobileMenuBtn");
      if (btn) {
        toggleMobileMenu();
        return;
      }
      const backdrop = e.target.closest(".mobile-menu-backdrop");
      if (backdrop) {
        closeMobileMenu();
      }
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && document.body.classList.contains("mobile-menu-open")) {
        closeMobileMenu();
      }
    });
    // Inject the backdrop element once.
    if (!document.querySelector(".mobile-menu-backdrop")) {
      const bd = document.createElement("div");
      bd.className = "mobile-menu-backdrop";
      document.body.appendChild(bd);
    }

    // Switch the active tab. Hides all data-tab-content blocks except the
    // target, highlights the matching tab button, and saves the choice so
    // refresh restores the same tab. The is-revealing class triggers a
    // soft fade + slide-up animation so the content arrives gracefully
    // instead of snapping into place.
    function switchTab(tab) {
      document.querySelectorAll("[data-tab-content]").forEach(el => {
        const isTarget = el.dataset.tabContent === tab;
        if (isTarget) {
          // Apply the "entering" state (opacity 0 + translated), make the
          // element visible, then on the next two animation frames remove
          // the class so the transition plays back to default (opacity 1).
          // Two RAFs because the first one fires before the browser has
          // committed the display change and the class application.
          el.classList.add("is-entering");
          el.style.display = "";
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              el.classList.remove("is-entering");
            });
          });
        } else {
          el.classList.remove("is-entering");
          el.style.display = "none";
        }
      });
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.classList.toggle("tab-btn--active", btn.dataset.tab === tab);
      });
      // On mobile the tab nav is a horizontal scroller — center the
      // newly-active tab inside it. We compute scrollLeft directly so
      // the browser will scroll into the padding-right area (which
      // scrollIntoView(inline:"center") refuses to do, clamping at
      // natural content edge instead).
      //
      // Fired twice: once immediately, once on the next animation frame
      // after the active-class repaint settles. The first call usually
      // wins; the second is insurance for cases where offsetLeft is
      // briefly off because the active class shifts the tab's painted
      // position by 1px (the active border).
      const centerActiveTab = () => {
        try {
          const activeBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
          const tabsContainer = document.querySelector(".tabs");
          if (!activeBtn || !tabsContainer) return;
          const tabCenter = activeBtn.offsetLeft + activeBtn.offsetWidth / 2;
          const viewportCenter = tabsContainer.clientWidth / 2;
          const target = Math.max(0, tabCenter - viewportCenter);
          tabsContainer.scrollTo({ left: target, behavior: "smooth" });
        } catch {}
      };
      centerActiveTab();
      requestAnimationFrame(() => requestAnimationFrame(centerActiveTab));
      try { localStorage.setItem(TAB_STORAGE_KEY, tab); } catch {}
      // Mobile: close the hamburger drawer after picking a tab so the
      // user lands on the new content immediately (no extra tap).
      if (typeof closeMobileMenu === "function") closeMobileMenu();
      // Scroll to the top of the dashboard so each tab starts cleanly.
      window.scrollTo({ top: 0, behavior: "smooth" });
      // Refresh the push subscriber list when entering Notifications — keeps
      // the recipient picker honest about who is currently subscribed. Also
      // refresh the inbox list so any new or deleted message is visible.
      if (tab === "notifications") {
        if (typeof loadPushSubscribers === "function") loadPushSubscribers();
        if (typeof loadInboxNotifications === "function") loadInboxNotifications();
      }
      // Ads tab: fetch on first entry, refresh on subsequent entries so
      // overnight spend changes are visible without manual refresh.
      if (tab === "ads") {
        if (typeof loadAdsMetrics === "function") loadAdsMetrics();
      }
      // Lazy-load the Launch Tracker iframe the first time the tab opens
      // so its 1000-line page doesn't compete with the dashboard's initial
      // paint. Subsequent switches just toggle visibility; the iframe stays
      // mounted so any in-progress calculations aren't lost. After it
      // loads, push the live data via postMessage so the "Actual" fields
      // auto-fill from real purchases.
      if (tab === "launch") {
        const frame = document.getElementById("launch-tracker-frame");
        if (frame && frame.getAttribute("src") === "about:blank") {
          const realSrc = frame.getAttribute("data-real-src");
          if (realSrc) {
            // Cache-bust the iframe load. iOS Safari was holding onto a
            // stale launch-tracker.html for days even after deploys —
            // appending a per-session token forces a fresh fetch every
            // time the admin page itself loads. The token is the admin
            // page's load time so reloading admin.html gives a new one.
            const bust = window._launchTrackerBust
              || (window._launchTrackerBust = Date.now());
            // Pass the current admin theme so the iframe boots with
            // matching colors instead of a flash of light mode first.
            const adminTheme = document.documentElement.getAttribute("data-theme") === "dark"
              ? "dark" : "light";
            const sep = realSrc.includes("?") ? "&" : "?";
            const url = realSrc + sep + "v=" + bust + "&theme=" + adminTheme;
            frame.setAttribute("src", url);
            // First load — wait for the iframe to finish loading before
            // posting the sync message. After that, every tab re-entry
            // also re-syncs so updated metrics flow through.
            frame.addEventListener("load", () => syncLaunchTracker(), { once: true });
          }
        } else {
          // Already loaded — just push the latest data.
          syncLaunchTracker();
        }
      }
    }

    // ===== Monthly cost snapshot =====
    // Single source of truth for what each tool costs us per month. Read
    // from state.data.monthlyCosts (delivered with /api/admin/metrics so
    // there's no extra round trip on tab open). Editable inline, saved
    // via POST /api/admin/monthly-costs.
    // All costs are stored in EUR. For services billed in USD (most of
    // them), convert before entering. Anthropic is billed in EUR
    // directly so no conversion is needed.
    const COST_SERVICES = [
      { key: "ghl",        label: "GHL",                hint: "WhatsApp, workflows · billed USD — enter EUR" },
      { key: "anthropic",  label: "Anthropic Claude",   hint: "Reset + Unlimited AI · billed in EUR" },
      { key: "elevenlabs", label: "ElevenLabs",         hint: "Voice synthesis · billed USD — enter EUR" },
      { key: "whisper",    label: "OpenAI Whisper",     hint: "Transcription · billed USD — enter EUR" },
      { key: "neon",       label: "Neon",               hint: "Postgres database · billed USD — enter EUR" },
      { key: "vercel",     label: "Vercel",             hint: "Hosting + functions · billed USD — enter EUR" },
      { key: "resend",     label: "Resend",             hint: "Transactional email · billed USD — enter EUR" },
      { key: "other",      label: "Other tools",        hint: "Anything not listed" },
      { key: "domain",     label: "Domain",             hint: "Annual fee amortized monthly" },
    ];

    function toggleCostSnapshot() {
      const body = document.getElementById("cost-snapshot-body");
      const btn = document.getElementById("cost-snapshot-toggle");
      if (!body) return;
      const opening = body.style.display === "none";
      body.style.display = opening ? "block" : "none";
      if (btn) btn.textContent = opening ? "Collapse" : "Expand";
      if (opening) renderCostSnapshot();
    }
    window.toggleCostSnapshot = toggleCostSnapshot;

    function renderCostSnapshot() {
      const rows = document.getElementById("cost-snapshot-rows");
      const status = document.getElementById("cost-snapshot-status");
      if (!rows) return;
      const costs = (state && state.data && state.data.monthlyCosts) || [];
      const byKey = {};
      costs.forEach(c => { byKey[c.service_key] = c; });

      rows.innerHTML = COST_SERVICES.map(svc => {
        const existing = byKey[svc.key];
        const amount = existing ? Number(existing.amount || 0) : 0;
        // Always render labels as EUR — that's the canonical unit for the
        // company. The DB might still hold "USD" from before the switch,
        // but the value itself has been re-entered in EUR (or is about to
        // be), so the UI shouldn't lie about the unit.
        const currency = "EUR";
        // For Anthropic, surface the live Admin API value (if available)
        // as an extra hint below the input so the admin can compare what
        // they typed vs. what the API actually reports. Doesn't override
        // the input — that's still manual so the admin can use a custom
        // figure if needed.
        let extraHint = "";
        if (svc.key === "anthropic") {
          const rp = state?.data?.realProfit;
          const apiEur = Number(rp?.breakdown?.anthropic?.totalEur);
          const apiSource = rp?.breakdown?.anthropic?.source;
          if (apiSource === "anthropic_admin_api" && Number.isFinite(apiEur)) {
            extraHint = `<span style="display: block; font-size: 10.5px; color: var(--success, #2e7d32); font-weight: 600; margin-top: 2px;">Live API: €${apiEur.toFixed(2)} (lifetime)</span>`;
          } else if (apiSource && apiSource !== "anthropic_admin_api") {
            extraHint = `<span style="display: block; font-size: 10.5px; color: var(--text-mute); font-style: italic; margin-top: 2px;">Live API unavailable — using manual value</span>`;
          }
        }
        return `
          <label style="display: flex; flex-direction: column; gap: 4px;">
            <span style="font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase;">${escapeHtml(svc.label)} <span style="font-weight: 400; color: var(--text-mute); letter-spacing: 0;">(${currency})</span></span>
            <input type="number" min="0" step="0.01" value="${amount}" data-cost-key="${escapeHtml(svc.key)}" data-cost-currency="${escapeHtml(currency)}" style="padding: 8px 10px; border: 1px solid var(--gold-line); border-radius: 6px; font-family: inherit; font-size: 14px; background: var(--bg-card); color: var(--text);" />
            <span style="font-size: 10.5px; color: var(--text-mute);">${escapeHtml(svc.hint)}</span>
            ${extraHint}
          </label>
        `;
      }).join("");

      // Auto-synced Ads spend card. Read-only, populated from /api/admin/real-profit
      // which itself pulls lifetime Field-campaign spend from Meta. Sits at the
      // end of the grid so it's clearly distinct from the manually-editable cards.
      const rp = state?.data?.realProfit;
      const adsEur = Number(rp?.adsSpend);
      if (Number.isFinite(adsEur)) {
        const adsHtml = `
          <label style="display: flex; flex-direction: column; gap: 4px; border: 1px dashed var(--success, #2e7d32); border-radius: 8px; padding: 8px; background: rgba(46, 125, 50, 0.04);">
            <span style="font-size: 11px; font-weight: 700; letter-spacing: 0.12em; color: var(--success, #2e7d32); text-transform: uppercase;">Meta Ads <span style="font-weight: 400; color: var(--text-mute); letter-spacing: 0;">(EUR · auto)</span></span>
            <input type="number" value="${adsEur.toFixed(2)}" readonly style="padding: 8px 10px; border: 1px solid var(--success, #2e7d32); border-radius: 6px; font-family: inherit; font-size: 14px; background: var(--bg-card); color: var(--text); cursor: not-allowed;" />
            <span style="font-size: 10.5px; color: var(--success, #2e7d32); font-weight: 500;">Auto-synced lifetime Field campaigns · refreshes on every dashboard load</span>
          </label>
        `;
        rows.insertAdjacentHTML("beforeend", adsHtml);
      }

      // Status line — show the most recent update across all services so
      // the admin knows how stale the snapshot is at a glance.
      const mostRecent = costs.reduce((m, c) => {
        if (!c.updated_at) return m;
        return (!m || c.updated_at > m) ? c.updated_at : m;
      }, null);
      if (status) {
        status.textContent = mostRecent
          ? "Last updated " + fmtRelative(mostRecent)
          : "No snapshot saved yet — fill in the numbers and click Save.";
      }
    }
    window.renderCostSnapshot = renderCostSnapshot;

    async function saveCostSnapshot(btnEl) {
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) return;
      const inputs = Array.from(document.querySelectorAll("#cost-snapshot-rows input[data-cost-key]"));
      const items = inputs.map(input => ({
        service_key: input.dataset.costKey,
        amount: Number(input.value || 0),
        currency: input.dataset.costCurrency,
      }));
      const status = document.getElementById("cost-snapshot-status");
      if (btnEl) { btnEl.disabled = true; btnEl.textContent = "Saving…"; }
      try {
        const r = await fetch("/api/admin/monthly-costs", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session-token": token },
          body: JSON.stringify({ costs: items }),
        });
        if (!r.ok) {
          if (status) status.textContent = "Save failed — try again.";
          return;
        }
        const data = await r.json();
        // Replace the in-memory snapshot so subsequent renders + the
        // launch tracker sync see the new values without a full reload.
        if (state && state.data && Array.isArray(data.costs)) {
          state.data.monthlyCosts = data.costs;
        }
        if (status) status.textContent = "Saved · just now";
        // Re-sync the launch tracker so its op-* fields update.
        if (typeof syncLaunchTracker === "function") syncLaunchTracker();
      } catch (err) {
        if (status) status.textContent = "Network error — try again.";
      } finally {
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = "Save snapshot"; }
      }
    }
    window.saveCostSnapshot = saveCostSnapshot;

    // Listen for height reports from the launch tracker iframe and resize
    // it to match. Eliminates the nested scrollbar — the admin page is the
    // only scroll surface, the tracker grows to show all its content
    // inline. A small buffer prevents a thin vertical scroll inside the
    // iframe from sub-pixel rounding.
    window.addEventListener("message", (ev) => {
      const msg = ev && ev.data;
      if (!msg || typeof msg !== "object") return;
      if (msg.type !== "launch-tracker-height") return;
      const frame = document.getElementById("launch-tracker-frame");
      if (!frame) return;
      const h = Math.max(800, Math.ceil(Number(msg.height) || 0) + 8);
      frame.style.height = h + "px";
    });

    // Computes the launch-tracker sync payload from the latest metrics
    // response (state.data) and posts it to the iframe. Breaks purchases
    // into cohorts:
    //   pre-launch  = LAUNCHTEAM / LAUNCHTEAMUNLIMITED coupons
    //   public      = POWER50 / full-price / any other paid coupon
    // The tracker's listener auto-fills its fields and marks them with
    // a gold "synced" dot. Manual override stays possible — typing in
    // any field flips its dot to muted amber.
    function syncLaunchTracker() {
      const frame = document.getElementById("launch-tracker-frame");
      if (!frame || !frame.contentWindow) return;
      const d = (state && state.data) || {};
      const tc = d.thrivecart || {};
      const rows = (tc.byProductCoupon || []);
      const isNet = getRevenueVatMode() === "net";
      // Stored amount_cents is already NET (what ThriveCart sends).
      // Net mode returns it as-is. Gross mode multiplies by 1.19 to
      // approximate what the customer paid including VAT.
      const toMoney = c => {
        const euros = Number(c) / 100;
        return isNet ? euros : (euros * VAT_DIVISOR);
      };

      // Filter helper: a row matches if its product name contains the
      // term AND its coupon is in the cohort. Case-insensitive.
      const matchProduct = (row, term) =>
        String(row.product || "").toLowerCase().includes(term.toLowerCase());
      // Pre-launch Reset coupon. Only POWER50 (current-clients 50% off,
      // €4.50). LAUNCHTEAM is a team/testing coupon — it should NOT
      // appear in customer-facing cohort stats, otherwise team orders
      // inflate the pre-launch buyer count (this was Geo's "why 7 if
      // only 6 used POWER50?" report). LAUNCHTEAMUNLIMITED is the
      // upgrade-side coupon and is matched explicitly in the upgrade
      // filter below — it would never appear on a Reset purchase.
      const isPreLaunchResetCoupon = c => c === "POWER50";
      // Public launch = ONLY full-price buyers (no coupon at all). The
      // metrics endpoint coerces a NULL coupon_code into the literal
      // string "(full price)", so that's the marker we match here.
      // Anything with a real coupon code goes into pre-launch (or, if it
      // isn't a known pre-launch code, gets ignored from both buckets to
      // avoid silently inflating public launch numbers).
      const isFullPriceCoupon = c =>
        !c || c === "(full price)" || c === "";

      // Pre-launch Reset cohort
      const preResetRows = rows.filter(r =>
        matchProduct(r, "Reset") && isPreLaunchResetCoupon(r.coupon)
      );
      const preResetBuyers = preResetRows.reduce((s, r) => s + Number(r.orders || 0), 0);
      // We don't use the actual paid average for the price field — ThriveCart
      // reports €3.63/order due to processing fees, but the LIST price the
      // customer was charged is €4.50 gross (POWER50 = 50% off €9). The
      // launch tracker is a planning tool, so we want the price the offer
      // actually carried, not the post-fee net we kept. toMoney handles
      // the gross→net flip based on the VAT toggle (€4.50 gross, €3.78 net).
      const PRE_LAUNCH_RESET_PRICE_CENTS = 450;
      const preResetAvg = toMoney(PRE_LAUNCH_RESET_PRICE_CENTS);

      // Public launch Reset cohort — strictly full-price, no coupons.
      const pubResetRows = rows.filter(r =>
        matchProduct(r, "Reset") && isFullPriceCoupon(r.coupon)
      );
      const pubResetBuyers = pubResetRows.reduce((s, r) => s + Number(r.orders || 0), 0);
      const pubResetCents = pubResetRows.reduce((s, r) => s + Number(r.revenue_cents || 0), 0);
      const pubResetAvg = pubResetBuyers > 0 ? toMoney(pubResetCents) / pubResetBuyers : 0;

      // Pre-launch Unlimited upgrades (LAUNCHTEAMUNLIMITED). We split by
      // billing plan so the tracker can apply the right discounted price
      // to each cohort — yearly upgraders pay 75%-off €777 up front,
      // monthly upgraders pay 75%-off €77/month recurring. The split is
      // detected from the product name (ThriveCart names them like
      // "Unlimited - Yearly" / "Unlimited - Monthly"). Anything we can't
      // classify falls into "yearly" by default since yearly was the
      // primary upgrade path advertised in the LAUNCHTEAM sequence.
      const preUpgradesRows = rows.filter(r =>
        matchProduct(r, "Unlimited") && r.coupon === "LAUNCHTEAMUNLIMITED"
      );
      const isMonthlyProduct = (name) =>
        /month/i.test(String(name || ""));
      const isYearlyProduct = (name) =>
        /year|annual/i.test(String(name || ""));
      let preUpgradesMonthly = 0;
      let preUpgradesYearly = 0;
      // Track cents per cohort so we can compute the actual paid-price
      // average and sync it back to the tracker — no more typing the
      // discounted yearly/monthly price by hand.
      let preUpgradesMonthlyCents = 0;
      let preUpgradesYearlyCents = 0;
      preUpgradesRows.forEach(r => {
        const orders = Number(r.orders || 0);
        const cents = Number(r.revenue_cents || 0);
        if (isMonthlyProduct(r.product)) {
          preUpgradesMonthly += orders;
          preUpgradesMonthlyCents += cents;
        } else if (isYearlyProduct(r.product)) {
          preUpgradesYearly += orders;
          preUpgradesYearlyCents += cents;
        } else {
          preUpgradesYearly += orders;
          preUpgradesYearlyCents += cents;
        }
      });
      // List prices for the LAUNCHTEAMUNLIMITED-discounted upgrades.
      // These match what ThriveCart actually charges — Sofie and Maria
      // each paid €160 net on the yearly plan (€190.40 gross), and the
      // monthly plan is €48.52 net (€57.74 gross) per Geo's spec.
      // Stored in gross cents so toMoney() can flip them to net based
      // on the admin VAT toggle just like the Reset price above.
      const PRE_LAUNCH_UPGRADE_YEARLY_PRICE_CENTS  = 19040;
      const PRE_LAUNCH_UPGRADE_MONTHLY_PRICE_CENTS = 5774;
      const preUpgradeYearlyAvg = toMoney(PRE_LAUNCH_UPGRADE_YEARLY_PRICE_CENTS);
      const preUpgradeMonthlyAvg = toMoney(PRE_LAUNCH_UPGRADE_MONTHLY_PRICE_CENTS);

      // Public launch Unlimited upgrades — strictly full-price (no coupon).
      // Same logic as the Reset cohort: anything with a coupon belongs to
      // a discount cohort, not the full-price public launch.
      const pubUpgradesRows = rows.filter(r =>
        matchProduct(r, "Unlimited") && isFullPriceCoupon(r.coupon)
      );
      const pubUpgrades = pubUpgradesRows.reduce((s, r) => s + Number(r.orders || 0), 0);

      // Total Unlimited monthly / yearly from the tier-mix counts.
      const tiers = (d.tierCounts || []);
      const unlimitedMonthly = tiers
        .filter(t => t.tier === "full" && t.plan === "monthly")
        .reduce((s, t) => s + Number(t.n || 0), 0);
      const unlimitedYearly = tiers
        .filter(t => t.tier === "full" && t.plan === "yearly")
        .reduce((s, t) => s + Number(t.n || 0), 0);

      // Active members for the per-user economics view. Sum of all tier
      // counts gives total members (Reset + paid Unlimited) — exactly
      // what the launch tracker needs to compute cost-per-user math.
      const activeMembers = tiers.reduce((s, t) => s + Number(t.n || 0), 0);

      // Monthly cost snapshot — flatten to a service_key → amount map
      // so the launch tracker can apply each value to its matching op-*
      // field. Currency is preserved on the receiving side via op-fx.
      const costsArray = (d.monthlyCosts || []);
      const monthlyCostsMap = {};
      costsArray.forEach(c => {
        monthlyCostsMap[c.service_key] = Number(c.amount || 0);
      });

      // Intelligence segment counts — drives the Path-from-Intelligence
      // section in the launch tracker. Each count is the # of members
      // currently in that segment on the live admin.
      const intel = d.intelligence || {};
      const intelCounts = {
        hot_reset_graduate: (intel.hot_reset_graduate || []).length,
        ready_for_upsell: (intel.ready_for_upsell || []).length,
        high_intent_buyer: (intel.high_intent_buyer || []).length,
        stuck_reset: (intel.stuck_reset || []).length,
        at_risk_subscriber: (intel.at_risk_subscriber || []).length,
      };

      // Actual revenue from ThriveCart — matches the admin's Net Revenue
      // (ex VAT) KPI exactly so the launch tracker can show "real money
      // in so far" alongside its LTV projection. Sums every event_type
      // we surface in the dashboard.
      const grossCents = Number((tc.summary && tc.summary.gross_cents) || 0);
      const refundCents = Number((tc.summary && tc.summary.refund_cents) || 0);
      const netCents = grossCents - refundCents;
      const actualRevenue = Number(toMoney(netCents).toFixed(2));

      const payload = {
        type: "launch-tracker-sync",
        asOf: new Date().toISOString(),
        data: {
          preLaunchResetBuyers: preResetBuyers,
          preLaunchResetAvgPrice: Number(preResetAvg.toFixed(2)),
          preLaunchUpgradesMonthly: preUpgradesMonthly,
          preLaunchUpgradesYearly: preUpgradesYearly,
          // List prices for the discounted yearly/monthly upgrade
          // cohorts. Always sent — these are the actual offer prices
          // (computed from list × discount × VAT mode), not rolling
          // averages, so they're meaningful even when zero buyers have
          // upgraded yet.
          preLaunchUpgradeYearlyPrice: Number(preUpgradeYearlyAvg.toFixed(2)),
          preLaunchUpgradeMonthlyPrice: Number(preUpgradeMonthlyAvg.toFixed(2)),
          publicLaunchResetBuyers: pubResetBuyers,
          publicLaunchResetAvgPrice: Number(pubResetAvg.toFixed(2)),
          publicLaunchUpgrades: pubUpgrades,
          unlimitedMonthly: unlimitedMonthly,
          unlimitedYearly: unlimitedYearly,
          activeMembers: activeMembers,
          actualRevenue: actualRevenue,
          intel: intelCounts,
          monthlyCosts: monthlyCostsMap,
        },
      };

      try { frame.contentWindow.postMessage(payload, "*"); } catch (err) {
        console.warn("launch_sync_failed", err);
      }
    }

    // KPI click → switch to the target tab, then scroll the detail panel
    // into view inside that tab. Used by every KPI card at the top.
    function goToPanel(tab, panelId) {
      switchTab(tab);
      setTimeout(() => {
        const el = document.getElementById(panelId);
        if (el) {
          el.scrollIntoView({ behavior: "smooth", block: "start" });
          el.classList.remove("flash");
          void el.offsetWidth;
          el.classList.add("flash");
          setTimeout(() => el.classList.remove("flash"), 1500);
        }
      }, 120);
    }

    window.switchTab = switchTab;
    window.goToPanel = goToPanel;

    // State for the date range picker. Defaults to "since launch" until the
    // user picks something else. Stored in localStorage so it survives refresh.
    const state = {
      preset: "launch", // 'launch' | '7d' | '30d' | 'custom'
      from: null,       // YYYY-MM-DD (only used when preset === 'custom')
      to: null,         // YYYY-MM-DD
      launchDate: "2026-06-15",
      data: null,
    };

    try {
      const saved = JSON.parse(localStorage.getItem(RANGE_STORAGE_KEY) || "{}");
      if (saved.preset) state.preset = saved.preset;
      if (saved.from) state.from = saved.from;

        localStorage.setItem(RANGE_STORAGE_KEY, JSON.stringify({
          preset: state.preset, from: state.from, to: state.to,

    function escapeHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    // Helper that returns the HTML for a "?" hover-tooltip on a KPI card.
    // Usage: <div class="kpi-label">Net Revenue ${help('Net Revenue', 'plain description', 'optional action')}</div>
    // The tooltip is positioned above the card and triggered on card hover.
    // Globally available so renderDashboard, renderAdsContent, and any
    // future renderers can use the same pattern.
    function help(title, body, action) {
      return `<span class="kpi-help" aria-label="${escapeHtml(title)} explanation">?</span>` +
        `<span class="kpi-tooltip">` +
          `<span class="kpi-tooltip-title">${escapeHtml(title)}</span>` +
          `<span class="kpi-tooltip-body">${escapeHtml(body)}</span>` +
          (action ? `<span class="kpi-tooltip-action">→ ${escapeHtml(action)}</span>` : '') +
        `</span>`;
    }

    // Best-effort display name from the email's local part. Used as a
    // fallback when display_name is empty in the DB — most CSV-backfilled
    // historical purchases have null raw_payload, so the ThriveCart name
    // backfill produces nothing for them. This at least gives the admin
    // tables something humanized to look at instead of just "—".
    //
    // Splits on common separators (. _ -), trims digits at the end, and
    // titlecases each piece. Examples:
    //   sofsegebarth@hotmail.com   → "Sofsegebarth"
    //   mark.j.platten@gmail.com   → "Mark J Platten"
    //   moniq_piccola@yahoo.com    → "Moniq Piccola"
    //   ge.amaral3@gmail.com       → "Ge Amaral"
    function humanizeEmail(email) {
      if (!email) return null;
      const local = String(email).split("@")[0];
      if (!local) return null;
      const parts = local
        .split(/[._-]+/)
        .map(p => p.replace(/\d+$/, "")) // strip trailing digits per part
        .filter(Boolean)
        .map(p => p.charAt(0).toUpperCase() + p.slice(1).toLowerCase());
      const name = parts.join(" ").trim();
      return name || null;
    }

    // Display the best name we have for a user — DB display_name first
    // (set by ThriveCart webhook or member's Your Account input), then a
    // humanized email fallback, then a dash placeholder.
    function nameOrFallback(u) {
      const dn = u && u.display_name && String(u.display_name).trim();
      if (dn) return dn;
      const guess = humanizeEmail(u && u.email);
      return guess || "—";
    }

    function fmtNum(n) {
      if (n == null) return "0";
      return Number(n).toLocaleString();
    }

    function fmtEur(cents) {
      if (cents == null) return "€0";
      const n = Number(cents) / 100;
      return "€" + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    // Whole-euro format for headline KPI values so big numbers (€3,146.07)
    // don't chew up horizontal space with cents. Uses banker rounding via
    // Math.round which is fine for display: the underlying analytics still
    // use the exact cent value.
    function fmtEurWhole(cents) {
      if (cents == null) return "€0";
      const euros = Math.round(Number(cents) / 100);
      return "€" + euros.toLocaleString();
    }

    function fmtPct(num, denom) {
      if (!denom) return "0%";
      return ((num / denom) * 100).toFixed(1) + "%";
    }

    function fmtDate(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    // Map raw DB tier values to the user-facing names the team actually uses.
    // The CSS classes (tier-preview / tier-full) stay the same — only the
    // label text changes.
    function tierLabel(tier) {
      if (tier === "preview") return "Power Reset";
      if (tier === "full") return "Unlimited";
      return tier || "—";
    }

    function fmtRelative(iso) {
      if (!iso) return "—";
      const ms = Date.now() - new Date(iso).getTime();
      const days = Math.floor(ms / (1000 * 60 * 60 * 24));
      if (days === 0) return "today";
      if (days === 1) return "1 day ago";
      if (days < 30) return days + " days ago";
      const months = Math.floor(days / 30);
      if (months === 1) return "1 month ago";
      return months + " months ago";
    }

    function todayStr() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function daysAgoStr(n) {
      const d = new Date();
      d.setDate(d.getDate() - n);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function resolveRange() {
      // Returns { from, to } as YYYY-MM-DD strings based on current preset.
      switch (state.preset) {
        case "7d":     return { from: daysAgoStr(7), to: null };
        case "30d":    return { from: daysAgoStr(30), to: null };
        case "custom": return { from: state.from || state.launchDate, to: state.to || null };
        case "launch":
        default:       return { from: state.launchDate, to: null };
      }
    }

    function renderGate(message) {
      root.innerHTML = `
        <div class="gate">
          <div class="brand-eyebrow">The Field — Team</div>
          <h1>Team metrics</h1>
