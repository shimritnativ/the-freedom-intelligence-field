    function renderChannelPnl(attribution, realProfit, monthlyCosts) {
      if (!attribution) return '';
      // Show skeleton while real-profit is still fetching. Same layout
      // as the real widget so the transition from placeholder to real
      // data is a soft cross-fade rather than a jump.
      if (!realProfit) return renderChannelPnlSkeleton();
      const ops = realProfit.breakdown && realProfit.breakdown.ops;
      const ads = realProfit.breakdown && realProfit.breakdown.ads;
      if (!ops || !ads) return '';
      // Split ad spend into cold vs warm by campaign name substring. Same
      // convention we use across the dashboard (Meta campaign names contain
      // "Cold Audience" / "Warm Audience").
      let coldSpendEur = 0;
      let warmSpendEur = 0;
      for (const c of (ads.campaigns || [])) {
        const lower = String(c.name || '').toLowerCase();
        const spend = Number(c.spend || 0);
        if (lower.includes('cold')) coldSpendEur += spend;
        else if (lower.includes('warm')) warmSpendEur += spend;
      }
      // GHL monthly subscription from monthly_costs table, attributed
      // entirely to WhatsApp since GHL's primary use in this business is
      // WhatsApp outreach. Uses the same 2-month launch-portion convention
      // as Real Profit's opsLaunchPortion so channel totals reconcile.
      const ghlRow = (monthlyCosts || []).find(mc =>
        String(mc.service_key || '').toLowerCase() === 'ghl'
      );
      const opGhlMonthlyEur = ghlRow ? Number(ghlRow.amount || 0) : 0;
      const opGhlLifetimeEur = opGhlMonthlyEur * 2;
      const whatsappSpendEur = Number(ops.preGhl || 0)
        + Number(ops.preWhatsApp || 0)
        + Number(ops.launchWhatsApp || 0)
        + opGhlLifetimeEur;

      const channelData = [
        {
          label: 'WhatsApp',
          sub: 'GHL outreach + campaigns',
          spendEur: whatsappSpendEur,
          data: attribution.whatsapp || {},
        },
        {
          label: 'Cold ads',
          sub: 'Meta · cold audience',
          spendEur: coldSpendEur,
          data: attribution.cold || {},
        },
        {
          label: 'Warm ads',
          sub: 'Meta · warm audience',
          spendEur: warmSpendEur,
          data: attribution.warm || {},
        },
      ];

      const cards = channelData.map(ch => {
        const revenueCents = Number(ch.data.total_revenue_cents || 0);
        const revenueEur = revenueCents / 100;
        const spend = ch.spendEur;
        const netEur = revenueEur - spend;
        const roas = spend > 0 ? (revenueEur / spend) : (revenueEur > 0 ? Infinity : 0);
        const roasStr = spend > 0 ? roas.toFixed(2) + '×' : (revenueEur > 0 ? '∞' : '0.00×');
        const netColor = netEur > 0 ? 'var(--green, #4A7C3A)'
          : (netEur < 0 ? 'var(--red, #C03A2B)' : 'var(--text-mute)');
        const roasColor = spend > 0 && roas >= 1 ? 'var(--green, #4A7C3A)'
          : spend > 0 ? 'var(--red, #C03A2B)'
          : 'var(--text-mute)';
        const netPill = `<span style="font-size: 11px; padding: 3px 10px; background: ${netEur >= 0 ? 'rgba(74,124,58,0.14)' : 'rgba(192,58,43,0.12)'}; color: ${netColor}; border-radius: 999px; font-weight: 700; white-space: nowrap;">${netEur >= 0 ? '+' : '−'}${fmtEurWhole(Math.abs(Math.round(netEur * 100)))} net</span>`;
        const buyers = Number(ch.data.buyers || 0);
        const upgraded = Number(ch.data.upgraded || 0);
        const resetCents = Number(ch.data.reset_revenue_cents || 0);
        const activationCents = Number(ch.data.activation_revenue_cents || 0);
        const unlimitedCents = Number(ch.data.unlimited_revenue_cents || 0);
        const breakdownLine = revenueCents > 0
          ? `Reset ${fmtEurWhole(resetCents)} &middot; Activation ${fmtEurWhole(activationCents)} &middot; Unlimited ${fmtEurWhole(unlimitedCents)} <span style="color: var(--text-mute);">(${upgraded} upgraded)</span>`
          : `No revenue yet &middot; ${buyers} buyer${buyers === 1 ? '' : 's'}`;

        return `
          <div style="background: var(--bg-card, #FFFFFF); border: 1px solid var(--gold-line, rgba(201, 168, 76, 0.28)); border-radius: 12px; padding: 12px 16px;">
            <div style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; gap: 12px; flex-wrap: wrap;">
              <div style="display: flex; align-items: baseline; gap: 10px; min-width: 0;">
                <span style="font-weight: 700; font-size: 15px; color: var(--text);">${escapeHtml(ch.label)}</span>
                <span style="font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim);">${escapeHtml(ch.sub)}</span>
              </div>
              ${netPill}
            </div>
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 6px;">
              <div>
                <div style="font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-mute);">Spend</div>
                <div style="font-size: 17px; font-weight: 700; margin-top: 2px; color: var(--text); font-variant-numeric: tabular-nums;">${fmtEurWhole(Math.round(spend * 100))}</div>
              </div>
              <div>
                <div style="font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-mute);">Revenue</div>
                <div style="font-size: 17px; font-weight: 700; margin-top: 2px; color: ${revenueEur > 0 ? 'var(--green, #4A7C3A)' : 'var(--text)'}; font-variant-numeric: tabular-nums;">${fmtEurWhole(revenueCents)}</div>
              </div>
              <div>
                <div style="font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-mute);">Buyers</div>
                <div style="font-size: 17px; font-weight: 700; margin-top: 2px; color: var(--text); font-variant-numeric: tabular-nums;">${fmtNum(buyers)}</div>
              </div>
              <div>
                <div style="font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-mute);">ROAS</div>
                <div style="font-size: 17px; font-weight: 700; margin-top: 2px; color: ${roasColor}; font-variant-numeric: tabular-nums;">${roasStr}</div>
              </div>
            </div>
            <div style="font-size: 11.5px; color: var(--text-dim); border-top: 1px solid rgba(201, 168, 76, 0.15); padding-top: 6px; margin-top: 2px;">
              ${breakdownLine}
            </div>
          </div>
        `;
      }).join('');

      return `
        <div style="background: var(--bg-warm, #F4ECD0); border: 1px solid var(--gold-line); border-radius: 12px; padding: 16px 20px; margin-bottom: 18px;">
          <div style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;">
            <div style="font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 18px; color: var(--text);">Channel P&amp;L</div>
            <div style="font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim);">Lifetime &middot; Ex VAT</div>
          </div>
          <div style="font-size: 12px; color: var(--text-dim); margin-bottom: 12px;">Full sales cycle: spend vs revenue including Reset + Activation + Unlimited upgrades, attributed to first-touch channel.</div>
          <div style="display: grid; grid-template-columns: 1fr; gap: 10px;">
            ${cards}
          </div>
          <div style="margin-top: 10px; font-size: 10.5px; color: var(--text-mute); font-style: italic;">WhatsApp bucket includes untagged signups from before per-channel tagging. Tag new WhatsApp campaigns with utm_source=whatsapp so future attribution stays clean. GHL monthly cost pulls from your Monthly Costs snapshot (2-month launch portion).</div>
        </div>
      `;
    }

    // Render the Channel Deep Dive on the Revenue tab. Extended per-channel
    // analytics: unit economics (CAC, LTV, payback), product mix, and
    // conversion funnels. Same three channels as Channel P&L on Overview
    // (WhatsApp / Cold ads / Warm ads) with the same first-touch UTM
    // attribution and the same spend sources (Meta campaigns + monthly
    // GHL cost). Intended as the "you sit down to think about channel
    // strategy" surface, whereas the Overview widget is the at-a-glance.
    function renderChannelDeepDive(attribution, realProfit, monthlyCosts) {
      if (!attribution) return '';
      if (!realProfit) return renderChannelDeepDiveSkeleton();
      const ops = realProfit.breakdown && realProfit.breakdown.ops;
      const ads = realProfit.breakdown && realProfit.breakdown.ads;
      if (!ops || !ads) return '';
      // Same spend calculation as renderChannelPnl so the two widgets
      // reconcile exactly. Kept inline (rather than DRY'd into a helper)
      // so this function is self-contained and easy to reason about.
      let coldSpendEur = 0;
      let warmSpendEur = 0;
      for (const c of (ads.campaigns || [])) {
        const lower = String(c.name || '').toLowerCase();
        const spend = Number(c.spend || 0);
        if (lower.includes('cold')) coldSpendEur += spend;
        else if (lower.includes('warm')) warmSpendEur += spend;
      }
      const ghlRow = (monthlyCosts || []).find(mc =>
        String(mc.service_key || '').toLowerCase() === 'ghl'
      );
      const opGhlMonthlyEur = ghlRow ? Number(ghlRow.amount || 0) : 0;
      const whatsappSpendEur = Number(ops.preGhl || 0)
        + Number(ops.preWhatsApp || 0)
        + Number(ops.launchWhatsApp || 0)
        + (opGhlMonthlyEur * 2);

      const channelData = [
        { label: 'WhatsApp', sub: 'GHL outreach + campaigns', spendEur: whatsappSpendEur, data: attribution.whatsapp || {} },
        { label: 'Cold ads', sub: 'Meta · cold audience',      spendEur: coldSpendEur,     data: attribution.cold     || {} },
        { label: 'Warm ads', sub: 'Meta · warm audience',      spendEur: warmSpendEur,     data: attribution.warm     || {} },
      ];

      // Precompute the metrics we need for all three sections.
      const enriched = channelData.map(ch => {
        const revenueCents = Number(ch.data.total_revenue_cents || 0);
        const revenueEur = revenueCents / 100;
        const signups = Number(ch.data.signups || 0);
        const buyers = Number(ch.data.buyers || 0);
        const upgraded = Number(ch.data.upgraded || 0);
        const resetCents = Number(ch.data.reset_revenue_cents || 0);
        const activationCents = Number(ch.data.activation_revenue_cents || 0);
        const unlimitedCents = Number(ch.data.unlimited_revenue_cents || 0);
        const cac = buyers > 0 ? ch.spendEur / buyers : null;
        const ltv = buyers > 0 ? revenueEur / buyers : null;
        const paybackRatio = (cac !== null && cac > 0 && ltv !== null) ? ltv / cac : null;
        const signupToBuyPct = signups > 0 ? (buyers / signups) * 100 : null;
        const buyToUpgradePct = buyers > 0 ? (upgraded / buyers) * 100 : null;
        return {
          ...ch,
          revenueEur, revenueCents, signups, buyers, upgraded,
          resetCents, activationCents, unlimitedCents,
          cac, ltv, paybackRatio, signupToBuyPct, buyToUpgradePct,
        };
      });

      // ---- Section 1: Unit economics per channel ----
      const goodColor = 'var(--green, #4A7C3A)';
      const badColor = 'var(--red, #C03A2B)';
      const muted = 'var(--text-mute)';
      const eur0 = (n) => (n == null) ? '—' : ('€' + Math.round(n).toLocaleString());
      const pct1 = (n) => (n == null) ? '—' : (n.toFixed(1) + '%');
      const paybackPill = (p) => {
        if (p == null) return `<span style="font-size: 11px; padding: 2px 8px; background: rgba(154,141,108,0.15); color: ${muted}; border-radius: 999px; font-weight: 700; margin-left: auto;">No buyers yet</span>`;
        const good = p >= 1;
        return `<span style="font-size: 11px; padding: 2px 8px; background: ${good ? 'rgba(74,124,58,0.16)' : 'rgba(192,58,43,0.12)'}; color: ${good ? goodColor : badColor}; border-radius: 999px; font-weight: 700; margin-left: auto; white-space: nowrap;">${p.toFixed(2)}× payback</span>`;
      };
      const unitCards = enriched.map(e => {
        const cacColor = (e.cac != null && e.ltv != null && e.cac > e.ltv) ? badColor : 'var(--text)';
        const ltvColor = (e.ltv != null && e.ltv > 0) ? goodColor : 'var(--text)';
        const s2bColor = e.signupToBuyPct == null ? muted
          : (e.signupToBuyPct >= 30 ? goodColor : e.signupToBuyPct < 10 ? badColor : 'var(--text)');
        const b2uColor = e.buyToUpgradePct == null ? muted
          : (e.buyToUpgradePct >= 20 ? goodColor : e.buyToUpgradePct < 5 ? badColor : 'var(--text)');
        const paybackText = e.paybackRatio == null ? '—' : (e.paybackRatio >= 1 ? 'Immediate' : 'Not yet');
        const paybackColor = e.paybackRatio == null ? muted : (e.paybackRatio >= 1 ? goodColor : badColor);
        return `
          <div style="background: var(--bg-card, #FFFFFF); border: 1px solid var(--gold-line, rgba(201, 168, 76, 0.28)); border-radius: 12px; padding: 14px 16px;">
            <div style="display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; flex-wrap: wrap;">
              <span style="font-weight: 700; font-size: 15px; color: var(--text);">${escapeHtml(e.label)}</span>
              <span style="font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim);">${escapeHtml(e.sub)}</span>
              ${paybackPill(e.paybackRatio)}
            </div>
            <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
              <div>
                <div style="font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: ${muted};">CAC</div>
                <div style="font-size: 15px; font-weight: 700; margin-top: 2px; color: ${cacColor}; font-variant-numeric: tabular-nums;">${eur0(e.cac)}</div>
              </div>
              <div>
                <div style="font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: ${muted};">LTV / buyer</div>
                <div style="font-size: 15px; font-weight: 700; margin-top: 2px; color: ${ltvColor}; font-variant-numeric: tabular-nums;">${eur0(e.ltv)}</div>
              </div>
              <div>
                <div style="font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: ${muted};">Signup → buy</div>
                <div style="font-size: 15px; font-weight: 700; margin-top: 2px; color: ${s2bColor}; font-variant-numeric: tabular-nums;">${pct1(e.signupToBuyPct)}</div>
              </div>
              <div>
                <div style="font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: ${muted};">Buy → upgrade</div>
                <div style="font-size: 15px; font-weight: 700; margin-top: 2px; color: ${b2uColor}; font-variant-numeric: tabular-nums;">${pct1(e.buyToUpgradePct)}</div>
              </div>
              <div>
                <div style="font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: ${muted};">Payback</div>
                <div style="font-size: 15px; font-weight: 700; margin-top: 2px; color: ${paybackColor};">${paybackText}</div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      // ---- Section 2: Product mix per channel (stacked bars) ----
      const resetSwatch = '#C9A84C';
      const activationSwatch = '#7A6B3F';
      const unlimitedSwatch = '#4A7C3A';
      const mixRows = enriched.map(e => {
        const total = e.resetCents + e.activationCents + e.unlimitedCents;
        if (total === 0) {
          return `
            <div style="margin-bottom: 12px;">
              <div style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px;">
                <span style="font-size: 13px; font-weight: 600; color: var(--text);">${escapeHtml(e.label)}</span>
                <span style="font-size: 11px; color: var(--text-dim);">€0</span>
              </div>
              <div style="display: flex; height: 20px; border-radius: 4px; overflow: hidden; background: var(--bg-warm, #F4ECD0);"></div>
              <div style="font-size: 11px; color: ${muted}; margin-top: 4px;">No revenue yet</div>
            </div>
          `;
        }
        const resetPct = (e.resetCents / total) * 100;
        const actPct = (e.activationCents / total) * 100;
        const unlPct = (e.unlimitedCents / total) * 100;
        return `
          <div style="margin-bottom: 12px;">
            <div style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px;">
              <span style="font-size: 13px; font-weight: 600; color: var(--text);">${escapeHtml(e.label)}</span>
              <span style="font-size: 11px; color: var(--text-dim);">${eur0(e.revenueEur)}</span>
            </div>
            <div style="display: flex; height: 20px; border-radius: 4px; overflow: hidden;">
              ${resetPct > 0 ? `<div style="width: ${resetPct}%; background: ${resetSwatch};" title="Reset ${eur0(e.resetCents/100)}"></div>` : ''}
              ${actPct > 0 ? `<div style="width: ${actPct}%; background: ${activationSwatch};" title="Activation ${eur0(e.activationCents/100)}"></div>` : ''}
              ${unlPct > 0 ? `<div style="width: ${unlPct}%; background: ${unlimitedSwatch};" title="Unlimited ${eur0(e.unlimitedCents/100)}"></div>` : ''}
            </div>
            <div style="font-size: 11px; color: ${muted}; margin-top: 4px;">${resetPct.toFixed(0)}% Reset · ${actPct.toFixed(0)}% Activation · ${unlPct.toFixed(0)}% Unlimited${unlPct === 0 ? ' (no upgrades yet)' : ''}</div>
          </div>
        `;
      }).join('');

      // ---- Section 3: Conversion funnel per channel ----
      const funnels = enriched.map(e => {
        const maxSignups = Math.max(1, e.signups);
        const buyerBarPct = e.signups > 0 ? (e.buyers / maxSignups) * 100 : 0;
        const upgradedBarPct = e.signups > 0 ? (e.upgraded / maxSignups) * 100 : 0;
        const s2bColor = e.signupToBuyPct == null ? muted
          : (e.signupToBuyPct >= 30 ? goodColor : e.signupToBuyPct < 10 ? badColor : muted);
        const b2uColor = e.buyToUpgradePct == null ? muted
          : (e.buyToUpgradePct >= 20 ? goodColor : e.buyToUpgradePct < 5 ? badColor : muted);
        return `
          <div>
            <div style="font-size: 13px; font-weight: 700; margin-bottom: 10px; color: var(--text);">${escapeHtml(e.label)}</div>
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
              <div style="flex: 1; height: 22px; background: var(--bg-warm, #F4ECD0); border-radius: 3px; position: relative;">
                <div style="height: 100%; width: 100%; background: rgba(201, 168, 76, 0.5); border-radius: 3px;"></div>
                <span style="position: absolute; left: 6px; top: 4px; font-size: 11px; font-weight: 600; color: var(--text);">${fmtNum(e.signups)} signup${e.signups === 1 ? '' : 's'}</span>
              </div>
            </div>
            <div style="font-size: 10px; color: ${s2bColor}; margin-bottom: 6px;">↓ ${pct1(e.signupToBuyPct)} convert</div>
            <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
              <div style="flex: 1; height: 22px; background: var(--bg-warm, #F4ECD0); border-radius: 3px; position: relative;">
                <div style="height: 100%; width: ${Math.max(0, buyerBarPct)}%; background: rgba(201, 168, 76, 0.75); border-radius: 3px;"></div>
                <span style="position: absolute; left: 6px; top: 4px; font-size: 11px; font-weight: 600; color: ${e.buyers > 0 ? 'var(--text)' : muted};">${fmtNum(e.buyers)} buyer${e.buyers === 1 ? '' : 's'}</span>
              </div>
            </div>
            <div style="font-size: 10px; color: ${b2uColor}; margin-bottom: 6px;">↓ ${pct1(e.buyToUpgradePct)} upgrade</div>
            <div style="display: flex; align-items: center; gap: 8px;">
              <div style="flex: 1; height: 22px; background: var(--bg-warm, #F4ECD0); border-radius: 3px; position: relative;">
                <div style="height: 100%; width: ${Math.max(0, upgradedBarPct)}%; background: ${goodColor}; border-radius: 3px;"></div>
                <span style="position: absolute; left: 6px; top: 4px; font-size: 11px; font-weight: 600; color: ${e.upgraded > 0 ? 'var(--text)' : muted};">${fmtNum(e.upgraded)} upgraded</span>
              </div>
            </div>
          </div>
        `;
      }).join('');

      // ---- Compose the widget ----
      const sectionHeader = (n, title) => `
        <div style="font-size: 11px; color: var(--gold); letter-spacing: 0.16em; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; margin-top: 6px;">${n} &middot; ${title}</div>
      `;
      return `
        <div class="section" style="background: var(--bg-warm, #F4ECD0); border: 1px solid var(--gold-line); border-radius: 12px; padding: 20px 22px; margin-bottom: 22px;">
          <div style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; flex-wrap: wrap; gap: 8px;">
            <div style="font-family: Georgia, 'Times New Roman', serif; font-style: italic; font-size: 22px; color: var(--text);">Channel deep dive</div>
            <div style="font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim);">Lifetime &middot; Ex VAT</div>
          </div>
          <div style="font-size: 12px; color: var(--text-dim); margin-bottom: 16px;">Extended per-channel breakdown of unit economics, product mix, and conversion funnels.</div>

          ${sectionHeader('1', 'Unit economics per channel')}
          <div style="display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 22px;">
            ${unitCards}
          </div>

          ${sectionHeader('2', 'Product mix per channel')}
          <div style="background: var(--bg-card, #FFFFFF); border: 1px solid var(--gold-line, rgba(201, 168, 76, 0.28)); border-radius: 12px; padding: 14px 16px; margin-bottom: 22px;">
            <div style="display: flex; align-items: center; margin-bottom: 12px; gap: 12px; flex-wrap: wrap;">
              <span style="font-size: 11px; display: inline-flex; align-items: center; gap: 5px; color: var(--text);"><span style="display: inline-block; width: 10px; height: 10px; background: ${resetSwatch}; border-radius: 2px;"></span>Reset</span>
              <span style="font-size: 11px; display: inline-flex; align-items: center; gap: 5px; color: var(--text);"><span style="display: inline-block; width: 10px; height: 10px; background: ${activationSwatch}; border-radius: 2px;"></span>Activation</span>
              <span style="font-size: 11px; display: inline-flex; align-items: center; gap: 5px; color: var(--text);"><span style="display: inline-block; width: 10px; height: 10px; background: ${unlimitedSwatch}; border-radius: 2px;"></span>Unlimited (upgrades)</span>
            </div>
            ${mixRows}
          </div>

          ${sectionHeader('3', 'Conversion funnel per channel')}
          <div style="background: var(--bg-card, #FFFFFF); border: 1px solid var(--gold-line, rgba(201, 168, 76, 0.28)); border-radius: 12px; padding: 14px 16px;">
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
              ${funnels}
            </div>
          </div>

          <div style="margin-top: 14px; font-size: 10.5px; color: var(--text-mute); font-style: italic;">Unit economics use lifetime spend and revenue. Payback: LTV / CAC ≥ 1 means one average buyer covers the acquisition cost. Funnel is signups → paying buyers → Unlimited upgraders per channel.</div>
        </div>
      `;
    }

    // Render the Today's Highlights strip. Shows a snapshot of activity since
    // midnight: new signups, revenue, day completions, unlimited engagement.
    // Renders a quiet placeholder if nothing has happened yet today.
    function renderHighlights(today) {
      const t = today || {};
      const signups = Number(t.signups_today || 0);
      const revenue = Number(t.revenue_today_cents || 0);
      const orders = Number(t.orders_today || 0);
      const completions = Number(t.completions_today || 0);
      const day1Today = Number(t.day1_today || 0);
      const day2Today = Number(t.day2_today || 0);
      const day3Today = Number(t.day3_today || 0);
      const activeUnlimited = Number(t.active_unlimited_today || 0);
      const unlimitedMessages = Number(t.unlimited_messages_today || 0);
      // Catches Unlimited conversions today — including returning customers
      // who upgraded from Reset (like Maria), which signups_today misses.
      const unlimitedBuyers = Number(t.unlimited_buyers_today || 0);
      const unlimitedYearly = Number(t.unlimited_yearly_today || 0);
      const unlimitedMonthly = Number(t.unlimited_monthly_today || 0);
      const nothingYet = signups === 0 && orders === 0 && completions === 0 && activeUnlimited === 0 && unlimitedBuyers === 0;

      const todayLabel = new Date().toLocaleDateString(undefined, {
        weekday: "long", month: "long", day: "numeric"
      });

      if (nothingYet) {
        return `
          <div class="highlights">
            <div class="highlights-header">
              <div>
                <div class="highlights-eyebrow">Today's highlights</div>
                <div class="highlights-title">A quiet start so far</div>
              </div>
              <div class="highlights-date">${escapeHtml(todayLabel)}</div>
            </div>
            <div class="highlights-quiet">No signups, sales, or completions yet today. Check back later or scroll for the live state of the launch.</div>
          </div>
        `;
      }

      const tiles = [];
      if (signups > 0) {
        const breakdown = [];
        if (Number(t.signups_today_reset) > 0) breakdown.push(`${Number(t.signups_today_reset)} Reset`);
        if (Number(t.signups_today_unlimited) > 0) breakdown.push(`${Number(t.signups_today_unlimited)} Unlimited`);
        tiles.push({
          value: signups,
          eyebrow: "New signups",
          detail: breakdown.length ? breakdown.join(" · ") : (signups === 1 ? "1 new member" : signups + " new members"),
          target: "panel-roster",
        });
      }
      if (unlimitedBuyers > 0) {
        // Celebrate Unlimited conversions today — separate from "signups"
        // because returning Reset buyers who upgrade aren't new accounts.
        const planParts = [];
        if (unlimitedYearly > 0) planParts.push(unlimitedYearly + " yearly");
        if (unlimitedMonthly > 0) planParts.push(unlimitedMonthly + " monthly");
        tiles.push({
          value: unlimitedBuyers,
          eyebrow: "Unlimited conversions",
          detail: planParts.length ? planParts.join(" · ") : (unlimitedBuyers === 1 ? "1 member chose Unlimited" : unlimitedBuyers + " members chose Unlimited"),
          target: "panel-revenue",
          accent: true,
        });
      }
      if (revenue > 0) {
        const isNet = getRevenueVatMode() === "net";
        tiles.push({
          value: fmtRev(revenue),
          eyebrow: isNet ? "Revenue (ex VAT)" : "Revenue",
          detail: orders === 1 ? "from 1 order" : "from " + orders + " orders",
          target: "panel-revenue",
          isCurrency: true,
        });
      } else if (orders > 0) {
        tiles.push({
          value: orders,
          eyebrow: "Free orders",
          detail: orders === 1 ? "1 free order processed" : orders + " free orders processed",
          target: "panel-revenue",
        });
      }
      // Day completions — broken out by which day was reached. Each one is
      // a meaningful milestone in the 72-Hour Reset arc:
      //   Day 1 = ignition (people started the practice)
      //   Day 2 = deepening (they kept going through the dip)
      //   Day 3 = the full Reset (the launch goal — accent tile)
      if (day3Today > 0) {
        tiles.push({
          value: day3Today,
          eyebrow: "Day 3 completed",
          detail: day3Today === 1
            ? "1 member finished the full 72-Hour Reset"
            : day3Today + " members finished the full 72-Hour Reset",
          target: "panel-funnel",
          accent: true,
        });
      }
      if (day2Today > 0) {
        tiles.push({
          value: day2Today,
          eyebrow: "Day 2 reached",
          detail: day2Today === 1
            ? "1 member deepened the practice"
            : day2Today + " members deepened the practice",
          target: "panel-funnel",
        });
      }
      if (day1Today > 0) {
        tiles.push({
          value: day1Today,
          eyebrow: "Day 1 started",
          detail: day1Today === 1
            ? "1 member began the Reset"
            : day1Today + " members began the Reset",
          target: "panel-funnel",
        });
      }
      if (activeUnlimited > 0) {
        tiles.push({
          value: activeUnlimited,
          eyebrow: "Unlimited active today",
          detail: unlimitedMessages + " message" + (unlimitedMessages === 1 ? "" : "s") + " sent",
          target: "panel-unlimited-engagement",
        });
      }

      return `
        <div class="highlights">
          <div class="highlights-header">
            <div>
              <div class="highlights-eyebrow">Today's highlights</div>
              <div class="highlights-title">What's happened since midnight</div>
            </div>
            <div class="highlights-date">${escapeHtml(todayLabel)}</div>
          </div>
          <div class="highlights-grid">
            ${tiles.map(tile => {
              // Plain-language tooltip per tile type — explained once for
              // the curious / new viewer.
              const tooltips = {
                "New signups": { body: "Brand new members who joined The Field today. Counts only first-time signups (not returning logins).", action: "Click to jump to the member roster." },
                "Unlimited conversions": { body: "Existing Reset buyers who upgraded to Unlimited today. These are the highest-value events of the day — recurring revenue starts here.", action: "Click to see Revenue tab for the order details." },
                "Revenue (ex VAT)": { body: "Money The Field actually earned today after VAT (19% tax) is removed. The number you can spend.", action: "Click to see the per-order breakdown." },
                "Revenue": { body: "Money The Field earned today (with VAT included). Toggle the VAT switch to see ex-VAT.", action: "Click to see the per-order breakdown." },
                "Free orders": { body: "Orders processed today at €0 (team comps using LAUNCHTEAM). Not real revenue but tracks team adoption.", action: "" },
                "Day 3 completed": { body: "Members who finished the entire 72-Hour Reset today. The strongest engagement signal — they got real value.", action: "These are your best Unlimited upsell candidates." },
                "Day 2 reached": { body: "Members who completed Day 2 of the Reset today. They pushed through the harder middle — high intent.", action: "" },
                "Day 1 started": { body: "Members who began the Reset today. Top of the funnel — first engagement signal.", action: "" },
              };
              const t = tooltips[tile.eyebrow];
              const tip = t ? help(tile.eyebrow, t.body, t.action) : '';
              return `
              <div class="highlight ${tile.accent ? 'highlight--accent' : ''} kpi" onclick="scrollToSection('${tile.target}')" style="position: relative;">
                <div class="highlight-eyebrow">${escapeHtml(tile.eyebrow || '')}${tip}</div>
                <div class="highlight-value">${tile.isCurrency ? tile.value : fmtNum(tile.value)}</div>
                <div class="highlight-detail">${tile.detail || ''}</div>
              </div>
            `;}).join("")}
          </div>
        </div>
      `;
    }

    // Toggle a funnel row's email dropdown. Closes any other open one so only
    // one is expanded at a time.
    function toggleFunnelRow(stage) {
      const allEmails = document.querySelectorAll('.funnel-emails');
      const allRows = document.querySelectorAll('.funnel-row');
      const targetEmails = document.getElementById('funnel-emails-' + stage);
      const targetRow = document.getElementById('funnel-row-' + stage);
      const wasOpen = targetEmails.classList.contains('open');
      allEmails.forEach(el => el.classList.remove('open'));
      allRows.forEach(el => el.classList.remove('expanded'));
      if (!wasOpen) {
        targetEmails.classList.add('open');
        targetRow.classList.add('expanded');
      }
    }
    window.toggleFunnelRow = toggleFunnelRow;

    // VAT rate applied to ThriveCart amount_cents to derive what we actually
    // keep. Most launch orders are EU buyers paying 19% German VAT — a few
    // (Mark in the US, Doruk with NL business exemption) had no VAT charged,
    // so for those rows the net = gross and dividing slightly understates.
    // Acceptable for at-a-glance — the gross column is one toggle away.
    const VAT_RATE_PCT = 19;
    const VAT_DIVISOR = 1 + VAT_RATE_PCT / 100;

    // Whether the revenue tables should display amounts net of VAT. Stored
    // in localStorage so the choice persists across reloads.
    function getRevenueVatMode() {
      try {
        const v = localStorage.getItem("tfif_admin_vat_mode");
        return v === "gross" ? "gross" : "net"; // default: net (Geo's ask)
      } catch { return "net"; }
    }
    function setRevenueVatMode(mode) {
      try { localStorage.setItem("tfif_admin_vat_mode", mode); } catch {}
      // Re-render the dashboard so all the numbers flip at once. The admin
      // app uses renderDashboard(data) — there's no shorthand render() —
      // so we replay the last metrics response we stashed in state.data.
      // Preserve the current tab so the user stays where they were instead
      // of bouncing back to Overview.
      if (typeof renderDashboard === "function" && state && state.data) {
        const currentTab = (() => {
          try { return localStorage.getItem(TAB_STORAGE_KEY) || "overview"; }
          catch { return "overview"; }
        })();
        renderDashboard(state.data);
        // renderDashboard rebuilds the DOM, so re-apply the active tab
        // (which sets display + the active-button highlight).
        setTimeout(() => switchTab(currentTab), 0);
      }
    }
    window.setRevenueVatMode = setRevenueVatMode;

    // Apply the active VAT mode to a cents amount.
    //
    // Convention: every amount_cents in the DB is the NET amount the
    // merchant receives (what ThriveCart sends in its webhooks). The
    // old code divided by 1.19 here, assuming stored values were gross,
    // which broke for everything ThriveCart-driven (Malin showing €6.35
    // instead of €7.56 etc). Now: "net" returns as-is, "gross" multiplies
    // by 1.19 to estimate what the customer paid including VAT.
    function applyVat(cents) {
      const c = Number(cents || 0);
      if (getRevenueVatMode() === "gross") return Math.round(c * VAT_DIVISOR);
      return c;
    }
    // Convenience wrapper so the rendering code reads cleanly.
    function fmtRev(cents) { return fmtEur(applyVat(cents)); }

                    <td class="num">${fmtNum(r.orders)}</td>

          </table>

          <div class="two-col" style="margin-top: 22px;">
            <div>
              <h2 style="font-size: 14px; margin-bottom: 10px;">By coupon</h2>
              <table>
                <thead><tr><th>Coupon</th><th class="num">Orders</th><th class="num">Revenue</th><th class="num">Avg</th></tr></thead>
                <tbody>
                  ${(tc.byCoupon || []).length === 0
                    ? '<tr><td colspan="4" class="empty-state">No orders yet.</td></tr>'
                    : (tc.byCoupon || []).map(c => `
                      <tr>
                        <td>${escapeHtml(c.coupon)}</td>
                        <td class="num">${fmtNum(c.orders)}</td>

              <table>
                <thead><tr><th>Product</th><th class="num">Orders</th><th class="num">Revenue</th></tr></thead>
                <tbody>

                    ? '<tr><td colspan="3" class="empty-state">No orders yet.</td></tr>'

    function renderThrivecartNotConnected() {
      return `
        <div class="section" id="panel-revenue">
          <h2><span class="h2-eyebrow">Setup needed</span>Connect ThriveCart for live revenue</h2>
          <p style="color: var(--text-dim); font-size: 13px;">
            Revenue data lights up the moment ThriveCart starts posting purchase webhooks to the new endpoint. Three steps:
          </p>
          <div class="note-box" style="line-height: 1.7;">
            <strong>1.</strong> In <strong>Neon</strong> (Vercel → Storage → Open in Neon → SQL Editor), paste &amp; run the <code>CREATE TABLE purchases</code> SQL block from the bottom of <code>api/webhooks/thrivecart.js</code>.
            <br>
            <strong>2.</strong> In <strong>Vercel</strong> → Project Settings → Environment Variables, add <code>THRIVECART_WEBHOOK_SECRET</code> with a long random string. Redeploy.
            <br>
            <strong>3.</strong> In <strong>ThriveCart</strong> → Settings → API &amp; Webhooks: paste <code>https://thefieldai.app/api/webhooks/thrivecart</code> as the webhook URL, paste the same secret you set in Vercel, and select all event types (order.success, order.refund, order.subscription_payment, order.subscription_cancelled).
          </div>
          <div class="footnote">Once a real order comes through, this section automatically replaces itself with live revenue, coupon breakdown, product breakdown, and top buyers.</div>
        </div>
      `;
    }

    // Trigger the day-completion backfill endpoint using the current session.
    // Used by the "Run completion backfill" / "Dry run first" buttons under
    // the funnel. Posts to /api/admin/backfill-completions with the same
    // x-session-token the dashboard already uses, so no ADMIN_TOKEN is
    // needed when running from the browser as a @shimritnativ.com viewer.
    async function runBackfill() {
      const status = document.getElementById("backfill-status");
      const btn = document.getElementById("backfill-btn");
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) {
        status.textContent = "Session expired. Refresh the page and try again.";
        return;
      }
      btn.disabled = true;
      status.textContent = "Refreshing… scanning chat messages for new Day completions.";
      try {
        const r = await fetch("/api/admin/backfill-completions", {
          method: "POST",
          headers: { "x-session-token": token },
        });
        if (!r.ok) {
          const errBody = await r.text().catch(() => "");
          status.textContent = "Refresh failed (HTTP " + r.status + "). " + errBody.slice(0, 200);
          return;
        }
        const data = await r.json();
        status.innerHTML = "Done. Scanned <strong>" + data.candidates + "</strong> messages, recorded <strong>" + data.recorded + "</strong> new completions. Reloading…";
        setTimeout(() => loadMetrics(), 1500);
      } catch (err) {
        status.textContent = "Network error: " + (err.message || err);
      } finally {
        btn.disabled = false;
      }
    }
    window.runBackfill = runBackfill;

    // Trigger the memory backfill endpoint. Loops chunks until the
    // server reports `complete: true` so even multi-thousand-message
    // histories finish without hitting Vercel's 5-minute function cap.
    // Each chunk is resumable thanks to messages.memory_extracted_at —
    // if the browser closes mid-loop, the next click picks up where it
    // stopped instead of starting over.
    async function runMemoryBackfill(dryRun) {
      const status = document.getElementById("memory-backfill-status");
      const btn = document.getElementById("memory-backfill-btn");
      const previewBtn = document.getElementById("memory-backfill-preview-btn");
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) {
        status.textContent = "Session expired. Refresh the page and try again.";
        return;
      }
      if (!dryRun) {
        const ok = confirm("Run the real memory backfill? Extracts facts from every past chat — typically takes a few minutes for the whole history. Safe to run multiple times.");
        if (!ok) return;
      }
      btn.disabled = true;
      previewBtn.disabled = true;

      // Running totals across all chunks. The preview path only calls
      // once so these collapse to a single chunk's numbers; the real
      // path accumulates as it loops.
      const totals = {
        chunks: 0,
        messages: 0,
        heuristic_hits: 0,
        extractions: 0,
        facts_saved_new: 0,
        facts_skipped_duplicate: 0,
        users_touched_max: 0,
        errors: 0,
      };

      try {
        if (dryRun) {
          // Single call — server scans the next chunk without writing.
          // For a true total estimate the user could re-click after each
          // batch, but the first chunk is usually a representative read
          // (server reports `remaining_before` so we show the real total).
          status.textContent = "Counting how many past messages would be processed…";
          const r = await fetch("/api/admin/backfill-memory?dry_run=1&chunk=1000", {
            method: "POST",
            headers: { "x-session-token": token },
          });
          if (!r.ok) {
            const errBody = await r.text().catch(() => "");
            status.textContent = "Preview failed (HTTP " + r.status + "). " + errBody.slice(0, 200);
            return;
          }
          const data = await r.json();
          status.innerHTML = "Preview: <strong>" + data.remaining_before + "</strong> past messages still to process, "
            + "of which <strong>" + data.heuristic_hits + "</strong> in the first chunk look like they contain durable facts "
            + "(roughly €" + (Math.round(data.remaining_before * 0.2 * 0.001 * 100) / 100) + " in Haiku calls if the rest follow the same ratio). "
            + "Click <em>Refresh memory</em> to run for real.";
          return;
        }

        // Real run — loop until the server says complete. Each call is
        // a chunk of up to 300 messages processed with parallelism=8 on
        // the server, taking 30-90s.
        let safetyMax = 500; // sanity cap: 500 chunks × 300 = 150,000 messages
        let lastUsers = 0;
        while (safetyMax-- > 0) {
          totals.chunks++;
          status.textContent = "Working chunk " + totals.chunks
            + (totals.messages > 0 ? " — " + totals.facts_saved_new + " facts saved so far across " + lastUsers + " members" : "")
            + " — keep this tab open…";

          const r = await fetch("/api/admin/backfill-memory?chunk=300", {
            method: "POST",
            headers: { "x-session-token": token },
          });
          if (!r.ok) {
            const errBody = await r.text().catch(() => "");
            status.innerHTML = "Stopped after " + totals.chunks + " chunk(s). HTTP " + r.status + ": "
              + errBody.slice(0, 200) + ". Click <em>Refresh memory</em> again to resume from where it stopped.";
            return;
          }
          const data = await r.json();
          totals.messages += data.messages_in_this_chunk || 0;
          totals.heuristic_hits += data.heuristic_hits || 0;
          totals.extractions += data.extraction_calls || 0;
          totals.facts_saved_new += data.facts_saved_new || 0;
          totals.facts_skipped_duplicate += data.facts_skipped_duplicate || 0;
          totals.errors += data.errors || 0;
          if (typeof data.users_touched === "number" && data.users_touched > totals.users_touched_max) {
            totals.users_touched_max = data.users_touched;
            lastUsers = data.users_touched;
          }

          if (data.complete) break;
          if (!data.messages_in_this_chunk) break; // safety — nothing in this chunk and not complete? bail
        }

        status.innerHTML = "Done. Processed <strong>" + totals.messages + "</strong> messages across "
          + totals.chunks + " chunk(s), "
          + "fired <strong>" + totals.extractions + "</strong> extractions, "
          + "saved <strong>" + totals.facts_saved_new + "</strong> new facts "
          + "(skipped " + totals.facts_skipped_duplicate + " duplicates)."
          + (totals.errors > 0 ? " <strong>" + totals.errors + " errors</strong> (see Vercel logs)." : "");
      } catch (err) {
        status.innerHTML = "Network error after " + totals.chunks + " chunk(s): " + (err.message || err)
          + ". Click <em>Refresh memory</em> again to resume.";
      } finally {
        btn.disabled = false;
        previewBtn.disabled = false;
      }
    }
    window.runMemoryBackfill = runMemoryBackfill;

    // ===== Ads tab — Meta Ads metrics + UTM attribution =====
    // Fetches /api/admin/ads-metrics for the selected range. The raw
    // response is cached so the campaign-filter UI can re-render the
    // KPI cards and per-campaign table client-side without re-hitting
    // Meta on every checkbox toggle.
    // Default matches the visually-active preset button in the HTML
    // ("Since launch" — see ads-range-btn--active class). If these two
    // drift apart, the UI shows one range as selected while the data
    // reflects a different range, which is exactly the mismatch that
    // hid Krishma from the Purchased count (she signed up 2026-06-25,
    // one day outside a 7-day window, so a stale "7d" default made
    // her invisible even though the "Since launch" chip was highlighted).
    let _adsRange = "since_launch";
    let _adsCustomFrom = null;
    let _adsCustomTo = null;
    let _adsLastData = null;          // last successful API response
    let _adsSelectedCampaigns = null; // Set of campaign IDs to include; null = all

    async function loadAdsMetrics() {
      const content = document.getElementById("ads-content");
      const filterRow = document.getElementById("ads-campaign-filter");
      if (!content) return;
      content.innerHTML = '<div class="empty-state">Loading ad metrics…</div>';
      if (filterRow) filterRow.style.display = "none";
      const token = localStorage.getItem(STORAGE_KEY);

      // Build the query string. Custom dates win over preset range.
      const params = new URLSearchParams();
      if (_adsCustomFrom && _adsCustomTo) {
        params.set("from", _adsCustomFrom);
        params.set("to", _adsCustomTo);
      } else {
        params.set("range", _adsRange);
      }
      // Cache-buster. Vercel + browser + intermediaries have been
      // occasionally serving a stale response even with no-cache headers.
      // Appending a millisecond timestamp forces a unique URL every time
      // so nothing along the path can hand us the previous payload.
      params.set("_t", Date.now().toString());

      try {
        const r = await fetch(`/api/admin/ads-metrics?${params.toString()}`, {
          headers: { "x-session-token": token },
          cache: "no-store",
        });
        const data = await r.json();
        if (!r.ok) {
          if (data.error === "ads_not_configured") {
            content.innerHTML = `
              <div class="empty-state" style="text-align: left; padding: 20px; line-height: 1.7;">
                <strong>Meta Ads not configured yet.</strong><br>
                Set these in Vercel → Project Settings → Environment Variables:
                <ul style="margin: 10px 0; padding-left: 22px;">
                  <li><code>META_ADS_ACCESS_TOKEN</code> — long-lived token with <code>ads_read</code> scope</li>
                  <li><code>META_ADS_ACCOUNT_ID</code> — e.g. <code>act_1234567890</code> (include the <code>act_</code> prefix)</li>
                </ul>
                After saving, Vercel auto-redeploys (~30s), then click Refresh.
              </div>`;
            return;
          }
          content.innerHTML = `<div class="empty-state" style="color: var(--red);">Couldn't load ads: ${escapeHtml(data.message || data.error || "unknown error")}</div>`;
          return;
        }
        _adsLastData = data;
        // Reset filter to "all selected" whenever new data lands — the
        // set of available campaigns may have changed with the date range.
        _adsSelectedCampaigns = new Set((data.campaigns || []).map(c => c.id));
        renderAdsCampaignFilter(data.campaigns || []);
        rerenderAdsContent();
      } catch (err) {
        content.innerHTML = `<div class="empty-state" style="color: var(--red);">Network error: ${escapeHtml(err.message)}</div>`;
      }
    }
    window.loadAdsMetrics = loadAdsMetrics;

    // Renders the campaign chip row. Each chip is a toggle; clicking
    // it adds/removes the campaign from the selected set. Re-render
    // the body so totals recalculate immediately.
    function renderAdsCampaignFilter(campaigns) {
      const filterRow = document.getElementById("ads-campaign-filter");
      const chipsBox = document.getElementById("ads-campaign-chips");
      if (!filterRow || !chipsBox) return;
      if (!campaigns || campaigns.length === 0) {
        filterRow.style.display = "none";
        return;
      }
      filterRow.style.display = "flex";
      chipsBox.innerHTML = campaigns.map(c => {
        const isOn = _adsSelectedCampaigns && _adsSelectedCampaigns.has(c.id);
        const cls = isOn ? "ads-campaign-chip ads-campaign-chip--on" : "ads-campaign-chip";
        const safeName = escapeHtml(c.name || c.id);
        return `<button type="button" class="${cls}" data-campaign-id="${escapeHtml(c.id)}" title="${safeName}">${safeName}</button>`;
      }).join("");
    }

    // Rebuild the KPI / table / daily section based on the current
    // _adsSelectedCampaigns filter. No re-fetch. Falls back to the full
    // dataset if no filter is active.
    function rerenderAdsContent() {
      const content = document.getElementById("ads-content");
      if (!content || !_adsLastData) return;
      const data = _adsLastData;

      // If no selection (or all selected), use the original payload.
      // Otherwise, filter campaigns + recompute totals client-side.
      const selected = _adsSelectedCampaigns;
      const allIds = new Set((data.campaigns || []).map(c => c.id));
      const isAll = !selected || (selected.size === allIds.size && Array.from(allIds).every(id => selected.has(id)));
      const filteredCampaigns = isAll
        ? data.campaigns
        : (data.campaigns || []).filter(c => selected.has(c.id));

      // Recompute totals from the filtered subset
      const totalSpend = filteredCampaigns.reduce((s, c) => s + (c.spend || 0), 0);
      const totalImpressions = filteredCampaigns.reduce((s, c) => s + (c.impressions || 0), 0);
      const totalClicks = filteredCampaigns.reduce((s, c) => s + (c.clicks || 0), 0);
      // Per-campaign attribution sum (used in the by-campaign table). Each
      // campaign's signups_attributed comes from utm_campaign-substring
      // matching against the Meta campaign name, so this can under-count
      // when Zaps hardcode generic utm_campaign values (like meta_ads)
      // that don't appear in the actual Meta campaign names.
      const totalSignupsAttributed = filteredCampaigns.reduce((s, c) => s + (c.signups_attributed || 0), 0);
      // Broad ads-signup count from the Members-tab classifier. This is
      // what the funnel widget's "Purchased" headline should show — every
      // buyer who came from ads, regardless of campaign-name matching.
      // Only reliable when the user is looking at all campaigns; when
      // they've filtered to a specific campaign, fall back to per-campaign.
      const totalSignups = isAll
        ? (data.totals?.total_ads_signups ?? totalSignupsAttributed)
        : totalSignupsAttributed;
      const totalRevenueCents = filteredCampaigns.reduce((s, c) => s + (c.revenue_attributed_cents || 0), 0);
      // Funnel totals were missing from the recomputation, so when a
      // single campaign was selected the top "Abandoned cart" KPI
      // always rendered as 0 even when the per-campaign table clearly
      // showed real abandoned numbers. Include them now.
      const totalVisits = filteredCampaigns.reduce((s, c) => s + (c.visits || 0), 0);
      const totalCheckoutScrolls = filteredCampaigns.reduce((s, c) => s + (c.checkout_scrolls || 0), 0);
      const totalCtaClicks = filteredCampaigns.reduce((s, c) => s + (c.cta_clicks || 0), 0);
      // Abandoned cart prefers CTA clicks (new) over checkout scrolls (legacy).
      // Falls back to scrolls only when no CTA data exists for the selection.
      const abandonedBase = totalCtaClicks > 0 ? totalCtaClicks : totalCheckoutScrolls;
      const totalAbandoned = Math.max(0, abandonedBase - totalSignups);

      const adjustedTotals = isAll ? data.totals : {
        spend: totalSpend,
        impressions: totalImpressions,
        clicks: totalClicks,
        ctr: totalImpressions > 0 ? (totalClicks / totalImpressions) * 100 : 0,
        cpc: totalClicks > 0 ? totalSpend / totalClicks : 0,
        cpm: totalImpressions > 0 ? (totalSpend / totalImpressions) * 1000 : 0,
        signups_attributed: totalSignups,
        cost_per_signup: totalSignups > 0 ? totalSpend / totalSignups : null,
        revenue_attributed_cents: totalRevenueCents,
        roas: totalSpend > 0 ? (totalRevenueCents / 100) / totalSpend : null,
        visits: totalVisits,
        cta_clicks: totalCtaClicks,
        checkout_scrolls: totalCheckoutScrolls,
        abandoned_cart: totalAbandoned,
        cta_to_visit_rate: totalVisits > 0 ? (totalCtaClicks / totalVisits) * 100 : null,
        purchase_to_cta_rate: totalCtaClicks > 0 ? (totalSignups / totalCtaClicks) * 100 : null,
        scroll_to_visit_rate: totalVisits > 0 ? (totalCheckoutScrolls / totalVisits) * 100 : null,
        purchase_to_scroll_rate: totalCheckoutScrolls > 0 ? (totalSignups / totalCheckoutScrolls) * 100 : null,
      };

      const adjustedData = {
        ...data,
        totals: adjustedTotals,
        campaigns: filteredCampaigns,
        _filtered: !isAll,
        _filtered_count: filteredCampaigns.length,
        _total_count: (data.campaigns || []).length,
      };
      content.innerHTML = renderAdsContent(adjustedData);
    }

    function renderAdsContent(data) {
      const t = data.totals;
      const cur = (n) => "€" + (Number(n) || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const num = (n) => Number(n || 0).toLocaleString("en-US");
      const pct = (n) => (Number(n) || 0).toFixed(2) + "%";
      const orDash = (v, formatter) => (v === null || v === undefined || isNaN(v)) ? '<span style="color: var(--text-mute);">—</span>' : formatter(v);

      // KPI strip — gold-accented cards on top are the decision-making
      // numbers (cost per signup, ROAS, abandoned cart, CTA-click rate).
      // CTA clicks = unique sessions that tapped a "Buy now"-style button
      // on the GHL landing page (tracked by our snippet, separate from
      // Meta's "clicks" which is the ad-to-LP click count).
      //
      // Use total_ads_signups (broader: any Meta-ish utm_source counts)
      // for headline KPIs. signups_attributed (strict per-campaign name
      // match) is kept for the per-campaign breakdown table below where
      // per-campaign accuracy actually matters. Reconciled 2026-07-02
      // after Geo caught the top card showing 2 signups while the funnel
      // widget showed 3 — the mismatch made the whole tab feel wrong.
      const totalAdsSignups = Number(t.total_ads_signups ?? t.signups_attributed ?? 0);
      const spend = Number(t.spend || 0);
      const costPerAdsSignup = totalAdsSignups > 0 ? spend / totalAdsSignups : null;
      const ctaClicksCount = Number(t.cta_clicks || 0);
      const ctaConvRate = ctaClicksCount > 0
        ? ((totalAdsSignups / ctaClicksCount) * 100).toFixed(1) + "%"
        : "—";
      const kpis = `
        <div class="kpi-grid" style="margin-bottom: 22px;">
          <div class="kpi kpi--accent">
            <div class="kpi-label">Cost per signup${help(
              'Cost per signup',
              "How many euros of ad spend it took to get one new paying member. Total ad spend ÷ every buyer whose UTM tags them as coming from Meta (utm_source in meta/facebook/instagram/power-reset, or utm_campaign in cold/warm).",
              "Lower is better. Compare to LTV — if cost per signup > what the customer pays back over time, ads are unprofitable."
            )}</div>
            <div class="kpi-value">${orDash(costPerAdsSignup, cur)}</div>
            <div class="kpi-sub">${num(totalAdsSignups)} signup${totalAdsSignups === 1 ? '' : 's'} from ads</div>
          </div>
          <div class="kpi kpi--accent">
            <div class="kpi-label">ROAS${help(
              'ROAS (Return on Ad Spend)',
              "How many euros of revenue you earned per euro of ad spend. Attributed revenue ÷ total spend. Above 1× = ads paying for themselves; below 1× = losing money on ads.",
              "Below 1× is normal for short windows because Unlimited LTV is recurring. Look at lifetime ROAS over time, not just last 7 days."
            )}</div>
            <div class="kpi-value">${orDash(t.roas, (v) => v.toFixed(2) + "×")}</div>
            <div class="kpi-sub">${cur((t.revenue_attributed_cents || 0) / 100)} attributed revenue</div>
          </div>
          <div class="kpi kpi--accent">
            <div class="kpi-label">CTA clicks${help(
              'CTA clicks',
              "Unique people who tapped a 'Buy now' button on the landing page. Captured by our tracking snippet, separate from Meta's ad-clicks. Tells you how many visitors took action toward checkout.",
              "Watch the CTA-to-Purchase ratio in the funnel below. If many click but few buy, fix the checkout page."
            )}</div>
            <div class="kpi-value">${num(ctaClicksCount)}</div>
            <div class="kpi-sub">${ctaClicksCount > 0 ? `${ctaConvRate} bought` : 'tapped "Buy now" on LP'}</div>
          </div>
          <div class="kpi kpi--accent">
            <div class="kpi-label">Abandoned cart${help(
              'Abandoned cart',
              "People who clicked a 'Buy now' CTA but never completed the purchase. CTA clicks − actual buyers. These are warm leads who lost interest at checkout.",
              "Common reasons: checkout page friction, surprise fees, payment-method mismatch. Test the cart on mobile in incognito."
            )}</div>
            <div class="kpi-value">${num(t.abandoned_cart)}</div>
            <div class="kpi-sub">clicked CTA, didn't buy</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Total spend${help(
              'Total ad spend',
              "Total money paid to Meta for ads in this period. Filtered to Field campaigns only (cold + warm) — excludes any unrelated campaigns on the same ad account.",
              "Watch this vs Net Revenue at the top. Spend should grow proportional to revenue."
            )}</div>
            <div class="kpi-value">${cur(t.spend)}</div>
            <div class="kpi-sub">${data.range.label}</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Ad clicks (LP)${help(
              'Ad clicks (landing page)',
              "How many people clicked the AD and reached the landing page. This is Meta's 'Link clicks' metric — not all-clicks like profile views or reactions. CPC = Cost per Link Click.",
              "If this is high but CTA clicks are low, the LP needs work. If both are low, the ad creative needs work."
            )}</div>
            <div class="kpi-value">${num(t.clicks)}</div>
            <div class="kpi-sub">CPC ${cur(t.cpc)} · ad → landing</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Impressions${help(
              'Impressions',
              "How many times the ad was shown to anyone (same person counted multiple times). CTR = Click-through Rate = link clicks ÷ impressions. Industry healthy CTR is 1-3%.",
              "Low CTR means the ad isn't compelling enough. Test new creative or copy. High CTR but low conversions = wrong audience."
            )}</div>
            <div class="kpi-value">${num(t.impressions)}</div>
            <div class="kpi-sub">CTR ${pct(t.ctr)}</div>
          </div>
        </div>`;

      // Funnel strip — three equally-sized cards showing Visits → CTA clicks → Bought.
      // The CTA clicks step replaces the legacy "scrolled to checkout" step, since
      // the GHL landing CTAs now link out to a ThriveCart page instead of opening
      // an embedded checkout section. CTA clicks counts unique visitors who tapped
      // any "Buy now / I'm in / Start the 72-hour reset" button.
      const funnelCardBase = "text-align: center; padding: 14px; border-radius: 10px; box-sizing: border-box; min-height: 110px; display: flex; flex-direction: column; justify-content: center;";
      // Prefer CTA-clicks for the middle card; fall back to scrolls only if the
      // campaign has zero CTA data yet (old landing pages without the click tracker).
      const useCtaStep = (t.cta_clicks || 0) > 0 || (t.checkout_scrolls || 0) === 0;
      const middleCount = useCtaStep ? (t.cta_clicks || 0) : (t.checkout_scrolls || 0);
      const middleLabel = useCtaStep ? "CTA clicks" : "Scrolled to checkout";
      const middleRateOfVisits = useCtaStep ? t.cta_to_visit_rate : t.scroll_to_visit_rate;
      const purchaseRateLabel = useCtaStep ? "of CTA clicks" : "of scrolls";
      const purchaseRate = useCtaStep ? t.purchase_to_cta_rate : t.purchase_to_scroll_rate;
      const funnelBlock = (t.visits > 0 || t.cta_clicks > 0 || t.checkout_scrolls > 0)
        ? `
          <div style="background: var(--bg-warm); border: 1px solid var(--gold-line); border-radius: 12px; padding: 18px 22px; margin-bottom: 22px;">
            <div style="font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px;">Landing page funnel</div>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; align-items: stretch;">
              <div class="kpi" style="${funnelCardBase} background: var(--panel); border: 1px solid var(--border);">
                <div style="font-family: Georgia, serif; font-size: 28px; font-weight: 600; color: var(--text); line-height: 1.1;">${num(t.visits)}</div>
                <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px;">Page visits${help(
                  'Page visits',
                  "Top of the funnel. Counts unique people who reached the landing page after clicking your ad. Same as Meta's link-click count.",
                  "If this is low, your ad isn't getting clicks — improve creative or audience."
                )}</div>
                <div style="font-size: 11px; color: transparent; margin-top: 2px;">&nbsp;</div>
              </div>
              <div class="kpi" style="${funnelCardBase} background: var(--panel); border: 1px solid var(--border);">
                <div style="font-family: Georgia, serif; font-size: 28px; font-weight: 600; color: var(--text); line-height: 1.1;">${num(middleCount)}</div>
                <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px;">${middleLabel}${help(
                  'CTA clicks',
                  "Middle of the funnel. Visitors who clicked a 'Buy now' button after landing on the page. Shows whether the LP message resonates enough to make them act.",
                  "The % of visits is your LP conversion rate. Healthy is 20-50% for warm; 10-25% for cold."
                )}</div>
                <div style="font-size: 11px; color: var(--gold); margin-top: 2px;">${orDash(middleRateOfVisits, pct)} of visits</div>
              </div>
              <div class="kpi" style="${funnelCardBase} background: var(--gold-soft); border: 1px solid var(--gold);">
                <div style="font-family: Georgia, serif; font-size: 28px; font-weight: 600; color: var(--text); line-height: 1.1;">${num(t.total_ads_signups ?? t.signups_attributed)}</div>
                <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px;">Purchased${help(
                  'Purchased',
                  "Bottom of the funnel. Every buyer whose UTM tags them as coming from Meta (utm_source in meta/facebook/instagram/power-reset, or utm_campaign in cold/warm).",
                  "% of CTA clicks is your checkout conversion. Low % = something on the cart page is blocking buyers."
                )}</div>
                <div style="font-size: 11px; color: var(--gold); margin-top: 2px;">${orDash(purchaseRate, pct)} ${purchaseRateLabel}</div>
              </div>
            </div>
          </div>`
        : '';

      // Shared CTA breakdown renderer — used for both ads (above) and
      // organic (below). Bd is an array of {label, clicks}. Backfill rows
      // get bucketed into one "Historical (pre-tracking)" entry; real
      // button labels stay individual. Star (★) marks the top REAL button.
      function renderCtaBreakdown(bd) {
        bd = bd || [];
        const totalClicks = bd.reduce((s, r) => s + (r.clicks || 0), 0);
        if (totalClicks === 0) return '';

        // Partition into "real button" rows and "historical backfill" rows
        const isBackfillLabel = (label) => {
          if (!label) return true;
          const l = String(label).toLowerCase();
          return l === 'untagged' || l === 'cta' || l.includes('backfill');
        };
        const realButtons = bd.filter(r => !isBackfillLabel(r.label));
        const backfills   = bd.filter(r => isBackfillLabel(r.label));
        const historicalClicks = backfills.reduce((s, r) => s + (r.clicks || 0), 0);

        // Prettify a real-button slug: top_ready_to_reset → "Top Ready To Reset"
        const prettify = (label) => label
          .split('_')
          .map(w => w.charAt(0).toUpperCase() + w.slice(1))
          .join(' ');

        // Find the widest bar baseline (the largest row, real or historical)
        const allDisplayRows = [
          ...realButtons.map(r => ({ ...r, isHistorical: false })),
          ...(historicalClicks > 0 ? [{ label: 'Historical (pre-tracking)', clicks: historicalClicks, isHistorical: true }] : []),
        ];
        const maxClicks = allDisplayRows.reduce((m, r) => Math.max(m, r.clicks), 0) || 1;

        // Render real buttons first, then the historical bucket at the bottom
        const sortedReal = realButtons.sort((a, b) => b.clicks - a.clicks);
        const rowsHtml = [];
        sortedReal.forEach((r, i) => {
          const widthPct = (r.clicks / maxClicks) * 100;
          const sharePct = totalClicks > 0 ? (r.clicks / totalClicks) * 100 : 0;
          const isTop = i === 0;
          const accent = isTop ? 'var(--gold)' : 'var(--text)';
          rowsHtml.push(`
            <div style="display: grid; grid-template-columns: minmax(0, 1.5fr) minmax(60px, 1fr) 50px 44px; gap: 12px; padding: 8px 0; font-size: 12.5px; color: var(--text); align-items: center; border-bottom: 1px solid var(--border);">
              <span style="font-weight: ${isTop ? '600' : '500'}; color: ${isTop ? 'var(--gold)' : 'var(--text)'};">
                ${isTop ? '★ ' : ''}${escapeHtml(prettify(r.label))}
              </span>
              <div style="height: 10px; background: var(--bg-warm); border-radius: 5px; overflow: hidden;">
                <div style="height: 100%; width: ${widthPct}%; background: ${accent}; border-radius: 5px;"></div>
              </div>
              <span style="text-align: right; font-variant-numeric: tabular-nums; font-weight: 600;">${num(r.clicks)}</span>
              <span style="text-align: right; font-size: 11px; color: var(--text-mute);">${sharePct.toFixed(1)}%</span>
            </div>`);
        });
        if (historicalClicks > 0) {
          const widthPct = (historicalClicks / maxClicks) * 100;
          const sharePct = totalClicks > 0 ? (historicalClicks / totalClicks) * 100 : 0;
          rowsHtml.push(`
            <div style="display: grid; grid-template-columns: minmax(0, 1.5fr) minmax(60px, 1fr) 50px 44px; gap: 12px; padding: 8px 0; font-size: 12.5px; color: var(--text-mute); align-items: center; border-bottom: 1px solid var(--border); font-style: italic;">
              <span title="Synthetic clicks added to fill the gap when CTA tracking was broken (cold + warm backfills). Not real button clicks.">Historical (pre-tracking)</span>
              <div style="height: 10px; background: var(--bg-warm); border-radius: 5px; overflow: hidden;">
                <div style="height: 100%; width: ${widthPct}%; background: var(--text-mute); border-radius: 5px; opacity: 0.5;"></div>
              </div>
              <span style="text-align: right; font-variant-numeric: tabular-nums;">${num(historicalClicks)}</span>
              <span style="text-align: right; font-size: 11px;">${sharePct.toFixed(1)}%</span>
            </div>`);
        }

        // Subtitle reflects what's actually being analyzed
        const realClicks = totalClicks - historicalClicks;
        const subtitle = realClicks > 0
          ? `${num(realClicks)} real button click${realClicks === 1 ? '' : 's'}${historicalClicks > 0 ? ` · ${num(historicalClicks)} historical (pre-tracking)` : ''}`
          : `${num(historicalClicks)} historical clicks · real button data starts accumulating from now`;

        return `
          <div style="background: var(--bg-warm); border: 1px solid var(--gold-line); border-radius: 12px; padding: 18px 22px; margin-bottom: 22px;">
            <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px;">
              <span class="kpi" style="font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); padding: 4px 8px; background: transparent; border: none; box-shadow: none;">CTA breakdown${help(
                'CTA breakdown',
                "Which button on the landing page drives the most CTA clicks. Each row is a button identified by its section (top/upper/lower/bottom/sticky) and its label. The ★ marks the top performer.",
                "Use this to A/B which CTAs work best. If top hero dominates, move pricing higher. If sticky mobile wins, optimize mobile UX first."
              )}</span>
              <span style="font-size: 11px; color: var(--text-mute);">${subtitle}</span>
            </div>
            <div style="display: grid; grid-template-columns: minmax(0, 1.5fr) minmax(60px, 1fr) 50px 44px; gap: 12px; padding: 6px 0; font-size: 10.5px; color: var(--text-mute); letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 1px solid var(--gold-line);">
              <span>Button</span>
              <span>Share</span>
              <span style="text-align: right;">Clicks</span>
              <span style="text-align: right;">%</span>
            </div>
            ${rowsHtml.join('')}
          </div>`;
      }
      // Render the ads-side CTA breakdown block now
      const ctaBreakdownBlock = renderCtaBreakdown(data.cta_breakdown);

      // Per-ad performance breakdown. Groups by utm_content so each ad
      // (identified by the "utm_content=<ad_name>" tag Geo puts on Meta
      // ad URLs) shows LP visits → CTA clicks → purchases with two
      // conversion rates. Shows the top-performing creative at a glance.
      // Rows with no visits AND no clicks are hidden — those are usually
      // historical backfill artifacts.
      function renderPerAdTable(perAd) {
        // Split into real ads vs synthetic backfill tags. Backfill entries
        // (`historical_backfill`, `ads-purchase-backfill`, anything matching
        // /backfill/i) exist so ads purchases from before per-ad tagging still
        // count in totals, but they aren't real ads and would mislead anyone
        // scanning the per-ad performance table. We hide them from the main
        // table and summarize them in a footer line so totals still reconcile.
        const isBackfillTag = (name) => /backfill/i.test(name || '');
        const isUntaggedTag = (name) => /^untagged/i.test(name || '');
        const activeRows = (perAd || []).filter(a => (a.visits || 0) > 0 || (a.cta_clicks || 0) > 0 || (a.purchases || 0) > 0);
        const backfillRows = activeRows.filter(a => isBackfillTag(a.ad_name));
        const untaggedRows = activeRows.filter(a => isUntaggedTag(a.ad_name));
        const rows = activeRows.filter(a => !isBackfillTag(a.ad_name) && !isUntaggedTag(a.ad_name));
        if (rows.length === 0 && backfillRows.length === 0 && untaggedRows.length === 0) return '';
        // Sort real ads by CTA clicks desc so the winner sits at the top.
        // Untagged (pre-tracking) rows are appended at the bottom regardless
        // of their click count so they don't compete for the gold star or
        // visually dominate what should read as real per-ad performance.
        rows.sort((a, b) => (b.cta_clicks || 0) - (a.cta_clicks || 0));
        const topClicks = rows.length > 0 ? (rows[0].cta_clicks || 0) : 0;
        // Backfill footer summary: total purchases and revenue from synthetic
        // tags, shown as a small note so numbers reconcile with the KPI cards.
        const backfillCount = backfillRows.reduce((s, a) => s + (a.purchases || 0), 0);
        const backfillRevenue = backfillRows.reduce((s, a) => s + (a.revenue_cents || 0), 0);
        const backfillFooter = backfillCount > 0
          ? `<div style="margin-top: 10px; font-size: 11px; color: var(--text-mute); font-style: italic;">Not shown in table: ${backfillCount} backfilled ads purchase${backfillCount === 1 ? '' : 's'} (${cur(backfillRevenue / 100)}). These come from tracking tags added retroactively, not from a specific ad creative.</div>`
          : '';
        const rowsHtml = rows.map(a => {
          const isTop = (a.cta_clicks || 0) === topClicks && topClicks > 0;
          const ctaRateFmt = a.cta_rate == null ? '<span style="color: var(--text-mute);">—</span>' : pct(a.cta_rate);
          const purchRateFmt = a.purchase_rate == null ? '<span style="color: var(--text-mute);">—</span>' : pct(a.purchase_rate);
          const campaignBadge = a.campaign
            ? `<span class="tier-badge" style="background: rgba(201, 168, 76, 0.12); color: var(--gold); border-color: rgba(201, 168, 76, 0.3); font-size: 10px;">${escapeHtml(a.campaign)}</span>`
            : '';
          return `
            <tr>
              <td data-label="Ad">${isTop ? '<span style="color: var(--gold);">★</span> ' : ''}<strong>${escapeHtml(a.ad_name)}</strong> ${campaignBadge}</td>
              <td data-label="LP visits" class="num">${num(a.visits)}</td>
              <td data-label="CTA clicks" class="num">${num(a.cta_clicks)}</td>
              <td data-label="CTR" class="num">${ctaRateFmt}</td>
              <td data-label="Purchases" class="num">${num(a.purchases)}</td>
              <td data-label="Conv %" class="num">${purchRateFmt}</td>
              <td data-label="Revenue" class="num">${cur((a.revenue_cents || 0) / 100)}</td>
            </tr>`;
        }).join('');
        // Untagged (pre-tracking) rows: rendered after the real ads, muted
        // and italicised so they read as a reconciliation row rather than
        // a real ad. No gold star, no campaign badge (we don't know which),
        // and Conv % stays as em-dash since attribution to a specific ad
        // is impossible here.
        const untaggedHtml = untaggedRows.map(a => {
          const ctaRateFmt = a.cta_rate == null ? '<span style="color: var(--text-mute);">—</span>' : pct(a.cta_rate);
          return `
            <tr style="color: var(--text-mute); font-style: italic;">
              <td data-label="Ad">${escapeHtml(a.ad_name)}</td>
              <td data-label="LP visits" class="num">${num(a.visits)}</td>
              <td data-label="CTA clicks" class="num">${num(a.cta_clicks)}</td>
              <td data-label="CTR" class="num">${ctaRateFmt}</td>
              <td data-label="Purchases" class="num">${num(a.purchases)}</td>
              <td data-label="Conv %" class="num"><span style="color: var(--text-mute);">—</span></td>
              <td data-label="Revenue" class="num">${cur((a.revenue_cents || 0) / 100)}</td>
            </tr>`;
        }).join('');
        return `
          <div style="background: var(--bg-warm); border: 1px solid var(--gold-line); border-radius: 12px; padding: 18px 22px; margin-bottom: 22px;">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px;">
              <div class="has-help" style="font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold);">Per-ad performance${help(
                'Per-ad performance',
                "Which specific ad drove the most LP visits, CTA clicks, and purchases. Groups by the utm_content value on your Meta ad URLs. Top-performing ad by CTA clicks gets a gold star. Backfilled synthetic tags (historical/ads-purchase backfill) are excluded and summarised in the footer. Ads-LP clicks from before per-ad tracking was live are shown as an italic 'untagged (pre-tracking)' row so LP funnel totals reconcile.",
                "Compare CTR (CTA-clicks-per-visit) across ads to find the strongest hook. Compare Conv % (purchases-per-CTA-click) to find the strongest offer messaging."
              )}</div>
              <div style="font-size: 11px; color: var(--text-dim);">${rows.length} ad${rows.length === 1 ? '' : 's'} tracked</div>
            </div>
            <div style="overflow-x: auto;">
              <table class="data-table" style="min-width: 640px;">
                <thead>
                  <tr>
                    <th>Ad</th>
                    <th class="num">LP visits</th>
                    <th class="num">CTA clicks</th>
                    <th class="num">CTR</th>
                    <th class="num">Purchases</th>
                    <th class="num">Conv %</th>
                    <th class="num">Revenue</th>
                  </tr>
                </thead>
                <tbody>${rowsHtml}${untaggedHtml}</tbody>
              </table>
            </div>
            ${backfillFooter}
          </div>`;
      }
      const perAdBlock = renderPerAdTable(data.per_ad);

      // Per-campaign table — funnel columns added when we have any
      // landing-event data, so the table stays compact pre-tracking.
      const showFunnelCols = (data.campaigns || []).some(c => (c.visits || 0) > 0);
      const campaignRows = (data.campaigns || []).map((c) => {
        const statusBadge = c.status === "ACTIVE"
          ? '<span class="tier-badge" style="background: rgba(122, 174, 94, 0.15); color: var(--success, #2D6B3A); border-color: rgba(122, 174, 94, 0.3);">ACTIVE</span>'
          : `<span class="tier-badge" style="background: var(--bg-warm); color: var(--text-mute); border-color: var(--border);">${escapeHtml(c.status || "")}</span>`;
