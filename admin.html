    // State for the date range picker. Defaults to "since launch" until the
    // user picks something else. Stored in localStorage so it survives refresh.
    const state = {
      preset: "launch", // 'launch' | '7d' | '30d' | 'custom'
      from: null,       // YYYY-MM-DD (only used when preset === 'custom')
      to: null,         // YYYY-MM-DD
      launchDate: "2026-06-15",
      data: null,
    };

    try {
      const saved = JSON.parse(localStorage.getItem(RANGE_STORAGE_KEY) || "{}");
      if (saved.preset) state.preset = saved.preset;
      if (saved.from) state.from = saved.from;
      if (saved.to) state.to = saved.to;
    } catch {}

    function persistRange() {
      try {
        localStorage.setItem(RANGE_STORAGE_KEY, JSON.stringify({
          preset: state.preset, from: state.from, to: state.to,
        }));
      } catch {}
    }

    function escapeHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    // Best-effort display name from the email's local part. Used as a
    // fallback when display_name is empty in the DB — most CSV-backfilled
    // historical purchases have null raw_payload, so the ThriveCart name
    // backfill produces nothing for them. This at least gives the admin
    // tables something humanized to look at instead of just "—".
    //
    // Splits on common separators (. _ -), trims digits at the end, and
    // titlecases each piece. Examples:
    //   sofsegebarth@hotmail.com   → "Sofsegebarth"
    //   mark.j.platten@gmail.com   → "Mark J Platten"
    //   moniq_piccola@yahoo.com    → "Moniq Piccola"
    //   ge.amaral3@gmail.com       → "Ge Amaral"
    function humanizeEmail(email) {
      if (!email) return null;
      const local = String(email).split("@")[0];
      if (!local) return null;
      const parts = local
        .split(/[._-]+/)
        .map(p => p.replace(/\d+$/, "")) // strip trailing digits per part
        .filter(Boolean)
        .map(p => p.charAt(0).toUpperCase() + p.slice(1).toLowerCase());
      const name = parts.join(" ").trim();
      return name || null;
    }

    // Display the best name we have for a user — DB display_name first
    // (set by ThriveCart webhook or member's Your Account input), then a
    // humanized email fallback, then a dash placeholder.
    function nameOrFallback(u) {
      const dn = u && u.display_name && String(u.display_name).trim();
      if (dn) return dn;
      const guess = humanizeEmail(u && u.email);
      return guess || "—";
    }

    function fmtNum(n) {
      if (n == null) return "0";
      return Number(n).toLocaleString();
    }

    function fmtEur(cents) {
      if (cents == null) return "€0";
      const n = Number(cents) / 100;
      return "€" + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function fmtPct(num, denom) {
      if (!denom) return "0%";
      return ((num / denom) * 100).toFixed(1) + "%";
    }

    function fmtDate(iso) {
      if (!iso) return "—";
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
    }

    // Map raw DB tier values to the user-facing names the team actually uses.
    // The CSS classes (tier-preview / tier-full) stay the same — only the
    // label text changes.
    function tierLabel(tier) {
      if (tier === "preview") return "Power Reset";
      if (tier === "full") return "Unlimited";
      return tier || "—";
    }

    function fmtRelative(iso) {
      if (!iso) return "—";
      const ms = Date.now() - new Date(iso).getTime();
      const days = Math.floor(ms / (1000 * 60 * 60 * 24));
      if (days === 0) return "today";
      if (days === 1) return "1 day ago";
      if (days < 30) return days + " days ago";
      const months = Math.floor(days / 30);
      if (months === 1) return "1 month ago";
      return months + " months ago";
    }

    function todayStr() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function daysAgoStr(n) {
      const d = new Date();
      d.setDate(d.getDate() - n);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function resolveRange() {
      // Returns { from, to } as YYYY-MM-DD strings based on current preset.
      switch (state.preset) {
        case "7d":     return { from: daysAgoStr(7), to: null };
        case "30d":    return { from: daysAgoStr(30), to: null };
        case "custom": return { from: state.from || state.launchDate, to: state.to || null };
        case "launch":
        default:       return { from: state.launchDate, to: null };
      }
    }

    function renderGate(message) {
      root.innerHTML = `
        <div class="gate">
          <div class="brand-eyebrow">The Field — Team</div>
          <h1>Team metrics</h1>
          <p>${escapeHtml(message)}</p>
          <p><a href="/app.html">Open The Field →</a></p>
        </div>
      `;
    }

    // ===== Intelligence dismissals =====
    // Fetched alongside metrics so renderIntelligence can hide rows the
    // admin has dismissed (default 7-day expiry). State lives on
    // window._intelDismissalsBySegment (map of segment_key → Set of
    // user_ids) and window._intelDismissalsList (raw rows with metadata).
    async function fetchIntelDismissals() {
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) return;
      try {
        const r = await fetch("/api/admin/intelligence-dismissals", {
          method: "GET",
          headers: { "x-session-token": token },
        });
        if (!r.ok) return;
        const data = await r.json();
        const list = data.dismissals || [];
        const bySegment = {};
        for (const d of list) {
          if (!bySegment[d.segment_key]) bySegment[d.segment_key] = new Set();
          bySegment[d.segment_key].add(d.target_user_id);
        }
        window._intelDismissalsBySegment = bySegment;
        window._intelDismissalsList = list;
      } catch (e) {}
    }

    // Brief toast in the bottom-center of the screen confirming a
    // dismissal or restore action. Auto-fades after 2 seconds.
    let _toastTimer = null;
    function showIntelToast(message) {
      let el = document.getElementById("intel-toast");
      if (!el) {
        el = document.createElement("div");
        el.id = "intel-toast";
        el.className = "intel-toast";
        document.body.appendChild(el);
      }
      el.textContent = message;
      requestAnimationFrame(() => el.classList.add("is-shown"));
      if (_toastTimer) clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => el.classList.remove("is-shown"), 2200);
    }

    async function dismissIntelMember(segmentKey, userId, displayName) {
      if (!userId) return;
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) { alert("Session expired. Refresh the page."); return; }
      // Optimistic update: remove the row from view immediately, then
      // record in the DB. On failure, we re-render to put the row back.
      const card = document.querySelector(`.intel-member[data-segment="${segmentKey}"][data-user-id="${userId}"]`);
      if (card) card.style.display = "none";
      try {
        const r = await fetch("/api/admin/intelligence-dismissals", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session-token": token },
          body: JSON.stringify({ segment_key: segmentKey, target_user_id: userId }),
        });
        if (!r.ok) throw new Error("save_failed");
        showIntelToast(`Dismissed ${displayName || "member"} for 7 days`);
        // Refresh dismissals state + re-render so the "X dismissed (show)"
        // count updates and the toggle appears.
        await fetchIntelDismissals();
        if (typeof renderDashboard === "function" && state.data) {
          renderDashboard(state.data);
        }
      } catch (e) {
        // Roll back the optimistic hide.
        if (card) card.style.display = "";
        showIntelToast("Couldn't save the dismissal. Try again.");
      }
    }
    window.dismissIntelMember = dismissIntelMember;

    async function restoreIntelMember(segmentKey, userId) {
      if (!userId) return;
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) return;
      try {
        const url = `/api/admin/intelligence-dismissals?segment_key=${encodeURIComponent(segmentKey)}&target_user_id=${encodeURIComponent(userId)}`;
        const r = await fetch(url, {
          method: "DELETE",
          headers: { "x-session-token": token },
        });
        if (!r.ok) throw new Error("delete_failed");
        showIntelToast("Restored. They'll show up again on next refresh.");
        await fetchIntelDismissals();
        if (typeof renderDashboard === "function" && state.data) {
          renderDashboard(state.data);
        }
      } catch (e) {
        showIntelToast("Couldn't restore. Try again.");
      }
    }

    function toggleDismissedList(segmentKey) {

    // Wrapper around loadMetrics that ALSO fires the ThriveCart auto-
    // reconcile first. Wired to the top-right Refresh button so one
    // click both catches any missing webhook sales AND reloads the
    // dashboard numbers — Geo doesn't have to wait for the next 10-min
    // cron tick if she spotted a missing sale and wants it in NOW.
    //
    // Reconcile runs in parallel with the metrics fetch (no await on
    // it before loadMetrics), so the dashboard doesn't get slower when
    // there's nothing to reconcile. If a placeholder gets created
    // during the reconcile, it'll show up on the NEXT refresh — but
    // most clicks are just to see fresh data, not to backfill.
    async function refreshWithReconcile() {
      const token = localStorage.getItem(STORAGE_KEY);
      if (token) {
        // Fire and forget — don't block the metrics load on the
        // reconcile call. force=1 bypasses the 5-min grace window so
        // sales that JUST landed on Kajabi get a placeholder right
        // away. If reconcile creates a placeholder, we re-load metrics
        // once more so the new numbers show without another click.
        fetch("/api/admin/auto-reconcile?force=1", {
          method: "POST",
          headers: { "x-session-token": token },
        }).then(r => r.ok ? r.json() : null)
          .then(data => {
            if (data && data.placeholders_created > 0) {
              console.log("auto_reconcile_created", data.placeholders_created, "placeholder(s)");
              // Re-load metrics one more time so the just-created
              // placeholders show in the numbers without requiring
              // another click.
              setTimeout(() => loadMetrics(), 500);
            }
          })
          .catch(() => {});
      }
      // Load metrics immediately — don't wait on the reconcile.
      loadMetrics();
    }
    window.refreshWithReconcile = refreshWithReconcile;

    async function loadMetrics() {
      let token;
      try { token = localStorage.getItem(STORAGE_KEY); } catch { token = null; }
      if (!token) {
        renderGate("You need to log in to The Field first. Open the app, log in with your @shimritnativ.com email, then come back here.");
        return;
      }

      const { from, to } = resolveRange();
      const params = new URLSearchParams();
      if (from) params.set("from", from);
      if (to) params.set("to", to);

      try {
        const r = await fetch("/api/admin/metrics?" + params.toString(), {
          method: "GET",
          headers: { "x-session-token": token },
        });
        if (r.status === 401) {
          renderGate("Your session expired. Open The Field, log in again, then refresh this page.");
          return;
        }
        if (r.status === 403) {
          renderGate("This page is restricted to @shimritnativ.com Field members.");
          return;
        }
        if (!r.ok) {
          renderGate("Something went wrong loading the metrics. Refresh and try again.");
          return;
        }
        const data = await r.json();
        state.data = data;
        if (data.dateRange && data.dateRange.launchDate) {
          state.launchDate = data.dateRange.launchDate.slice(0, 10);
        }
        // Fetch the Intelligence dismissals state BEFORE rendering so
        // the first paint already hides anything Geo previously
        // dismissed. Non-blocking fallback: if the fetch fails we
        // render without dismissals applied (visually identical to old
        // behavior, no breakage).
        try { await fetchIntelDismissals(); } catch (e) {}
        renderDashboard(data);
        // Re-populate the filterable roster table from the freshly loaded
        // recentSignups data. renderRoster reads state.data which was
        // just updated above, applies the current filter UI values, and
        // paints the visible page of rows.
        if (typeof renderRoster === "function") {
          try { renderRoster(); } catch (e) { console.warn("renderRoster_failed", e); }
        }
        // Once the dashboard is in the DOM, walk every table and copy
        // each column header onto its corresponding <td> as a data-label
        // attribute. The mobile CSS uses ::before content: attr(data-label)
        // to render that label in front of each cell value when the table
        // is stacked into cards. Runs once here and again after any future
        // re-render that swaps tables out.
        applyMobileTableLabels();
        // Load the push subscribers list and inbox manager lazily after
        // the main dashboard paints, so the "Send a notification" panel
        // is ready to use the moment the admin clicks into it.
        setTimeout(() => {
          loadPushSubscribers();
          loadInboxNotifications();
        }, 100);
      } catch (err) {
        renderGate("Network error. Check your connection and refresh.");
      }
    }

    function onPreset(preset) {

    // ===== Intelligence tab renderer (action-first redesign) =====
    // Each segment surfaces the smallest set of members who match a specific
    // sales/marketing trigger, with a one-line action and an Email button
    // that opens the user's mail client pre-populated with subject + greeting.
    function renderIntelligence(intel) {
      const firstName = (u) => {

        if (dn) return dn.split(/\s+/)[0];
        return null;
      };

      // Each segment's `why` returns an array of short bullet strings — one
      // observation per bullet. Bullets are easier to scan than a paragraph,
      // and the visual rhythm makes the segment's logic obvious at a glance.
      // HTML inside the bullets (e.g. <strong>) is allowed and not escaped.
      const segments = [
        {
          key: "hot_reset_graduate",
          priority: "hot",
          priorityLabel: "Convert today",
          title: "Hot Reset graduates",
          action: "Offer <strong>Unlimited Field (€77/mo or €777/yr)</strong> within 24h. Add <strong>UNLIMITED50</strong> coupon (50% off first month) for softer nudge.",
          rows: intel.hot_reset_graduate || [],
          why: u => {

              when,
              "Peak emotional state — has just felt the value",
              "Highest-intent moment in the entire funnel",
              "Window closes in ~24h",
            ];
            if (u.coupon_used) bullets.push(`Came in via <strong>${escapeHtml(u.coupon_used)}</strong>`);
            return bullets;
          },
        },
        {
          key: "high_intent_buyer",
          priority: "hot",
          priorityLabel: "Stacked purchases",
          title: "High-intent buyers",
          action: "Personal Shimrit outreach. Pitch <strong>Business Accelerator (€5,000)</strong> or <strong>Coaching Certification (€9,999)</strong>. Under €200 total spend → <strong>Business Club (€55/mo)</strong> first.",
          rows: intel.high_intent_buyer || [],
          why: u => {
            const count = Number(u.purchase_count || 0);
            const tot = Number(u.total_cents || 0);
            return [
              `Bought <strong>${fmtNum(count)} products</strong> totaling <strong>${fmtRev(tot)}</strong>`,
              "Said yes at every checkout step of the front-end funnel",
              "Strong purchase muscle, demonstrated trust",
            ];
          },
        },
        {
          key: "at_risk_subscriber",
          priority: "hot",
          priorityLabel: "Win-back",
          title: "At-risk Unlimited subscribers",
          action: "Re-engagement note from Shimrit. If no response in 7d, offer <strong>free 15-min check-in call</strong>. Last resort: pause-subscription option.",
          rows: intel.at_risk_subscriber || [],
          why: u => {
            const days = Number(u.days_quiet || 0);
            const plan = u.subscription_plan ? escapeHtml(u.subscription_plan) : "Unlimited";
            const bullets = [
              `Paying for <strong>${plan}</strong> plan`,
              `<strong>${fmtNum(days)} days</strong> without a message`,
              u.last_message_at ? `Last activity ${fmtRelative(u.last_message_at)}` : "Never engaged after subscribing",
              "Cancellation risk rising — silence is the first symptom",
            ];
            return bullets;
          },
        },
        {
          key: "ready_for_upsell",
          priority: "ready",
          priorityLabel: "Premium ladder",
          title: "Ready for higher-ticket offers",
          action: "Book 15-min Shimrit consult. Natural ladder: <strong>Business Club (€55/mo)</strong> → <strong>Business Accelerator (€5,000)</strong> → <strong>Coaching Certification (€9,999)</strong>.",
          rows: intel.ready_for_upsell || [],
          why: u => {
            const msgs = Number(u.messages_30d || 0);
            return [
              `<strong>${fmtNum(msgs)} messages</strong> in the last 30 days`,

          title: "Stuck Reset members",

          why: u => {

      segments.forEach(s => {

          return !!e;
        });
      });

      // Sort: actionable segments first (by priority hot > ready > nurture),
      // empty ones to the bottom in muted state.
      const priorityRank = { hot: 0, ready: 1, nurture: 2 };
      segments.sort((a, b) => {
        const aEmpty = a.rows.length === 0;
        const bEmpty = b.rows.length === 0;
        if (aEmpty !== bEmpty) return aEmpty ? 1 : -1;
        return priorityRank[a.priority] - priorityRank[b.priority];
      });

      const totalActionable = segments.reduce((sum, s) => sum + s.rows.length, 0);

        return `

      // Pull the latest dismissals into a lookup map keyed by
      // segment_key → Set(target_user_id). Loaded once on metrics
      // refresh via fetchIntelDismissals; falls back to empty if not
      // loaded yet so the first paint isn't blocked.
      const dismissalsBySegment = window._intelDismissalsBySegment || {};
      const dismissalsList = window._intelDismissalsList || [];

      // Segment cards
      const segmentsHtml = segments.map(s => {
        const dismissedSet = dismissalsBySegment[s.key] || new Set();
        // Split rows into active (still actionable) and dismissed (hidden
        // unless the user clicks "show dismissed").
        const activeRows = s.rows.filter(u => !dismissedSet.has(u.id));
        const dismissedRows = dismissalsList.filter(d => d.segment_key === s.key);

        if (activeRows.length === 0 && dismissedRows.length === 0) {

            <div class="intel-card intel-card--empty" id="intel-seg-${s.key}">
              <div class="intel-card-head">
                <div class="intel-card-title-row">
                  <span class="intel-priority-chip intel-priority-chip--${s.priority}">${escapeHtml(s.priorityLabel)}</span>
                  <span class="intel-card-title">${escapeHtml(s.title)}</span>
                </div>
                <span class="intel-card-count">0 members</span>
              </div>
            </div>
          `;
        }
        const memberCards = activeRows.map(u => {
          const dbName = u.display_name && String(u.display_name).trim();
          const email = (u.email || "").trim();
          const primary = dbName || humanizeEmail(email) || "Unknown member";
          const isReal = !!dbName;
          const bullets = (s.why(u) || []).map(b => `<li>${b}</li>`).join("");
          return `
            <div class="intel-member" data-segment="${escapeHtml(s.key)}" data-user-id="${escapeHtml(u.id || '')}">
              <button type="button" class="intel-member-dismiss" title="Dismiss for 7 days"
                      onclick="dismissIntelMember('${escapeHtml(s.key)}', '${escapeHtml(u.id || '')}', '${escapeHtml(primary)}')"
                      aria-label="Dismiss this suggestion">✕</button>
              <div class="intel-member-head">
                <span class="intel-member-name ${isReal ? '' : 'intel-member-name--anon'}">${escapeHtml(primary)}</span>
                ${email ? `<span class="intel-member-email">${escapeHtml(email)}</span>` : ''}
              </div>
              <ul class="intel-member-why">${bullets}</ul>
            </div>
          `;
        }).join("");

        // "X dismissed (show)" toggle + restore list. Hidden by default;
        // clicking the toggle reveals the dismissed members with a
        // Restore button each.
        const dismissedToggleHtml = dismissedRows.length > 0
          ? `
            <span class="intel-dismissed-toggle" onclick="toggleDismissedList('${escapeHtml(s.key)}')">
              ${dismissedRows.length} dismissed (show)
            </span>
            <div class="intel-dismissed-list" id="intel-dismissed-${escapeHtml(s.key)}">
              ${dismissedRows.map(d => {
                const name = (d.display_name && d.display_name.trim()) || humanizeEmail(d.email) || d.email;
                const expIso = d.expires_at;
                const expRel = expIso ? fmtRelative(expIso) : "soon";
                return `
                  <div class="intel-dismissed-row">
                    <span><strong>${escapeHtml(name)}</strong> <span style="color: var(--text-mute);">— reappears ${escapeHtml(expRel)}</span></span>
                    <button class="intel-restore-btn" onclick="restoreIntelMember('${escapeHtml(s.key)}', '${escapeHtml(d.target_user_id)}')">Restore</button>
                  </div>
                `;
              }).join("")}
            </div>
          `
          : "";

        return `
          <div class="intel-card" id="intel-seg-${s.key}">
            <div class="intel-card-head">
              <div class="intel-card-title-row">
                <span class="intel-priority-chip intel-priority-chip--${s.priority}">${escapeHtml(s.priorityLabel)}</span>
                <span class="intel-card-title">${escapeHtml(s.title)}</span>
              </div>
              <span class="intel-card-count"><strong>${fmtNum(activeRows.length)}</strong> ${activeRows.length === 1 ? 'member' : 'members'}</span>
            </div>
            <div class="intel-card-action">${s.action}</div>
            <div class="intel-member-list">${memberCards || '<div style="color: var(--text-dim); font-size: 13px; padding: 6px 2px;">All dismissed for now.</div>'}</div>
            ${dismissedToggleHtml}
          </div>
        `;
      }).join("");

      return quickHtml + segmentsHtml;
    }

    function renderFunnel(c, details) {
      // Base = ALL Power Reset members (not just those who logged in), so
      // percentages reflect the full launch funnel from purchase → completion.
      const base = c.total_members || 0;
      const loggedIn = c.total_logged_in || 0;
      const neverLoggedIn = c.never_logged_in || 0;
      details = details || [];

      // Bucket logged-in members by their current day stage. Members with
      // first_login_at = null go in the "never_logged_in" bucket separately.
      const buckets = { 0: [], 1: [], 2: [], 3: [] };
      const neverLogged = [];
      details.forEach(u => {
        if (!u.first_login_at) {
          neverLogged.push(u);
        } else {
          const d = Math.max(0, Math.min(3, u.last_completed_day || 0));
          buckets[d].push(u);
        }
      });

      const emailsByStage = {
        "never_logged_in": neverLogged,
        "logged_in": details.filter(u => u.first_login_at),
        "stuck": buckets[0],
        "d1": buckets[1].concat(buckets[2]).concat(buckets[3]),
        "d2": buckets[2].concat(buckets[3]),
        "d3": buckets[3],
      };

      const rows = [
        // Top-level partition (sums to 7): Never logged in + Logged in
        { stage: "never_logged_in", label: "Never logged in", count: neverLoggedIn, pct: base ? (neverLoggedIn / base) * 100 : 0, dropout: true, subset: false },
        { stage: "logged_in", label: "Logged in", count: loggedIn, pct: base ? (loggedIn / base) * 100 : 0, dropout: false, subset: false },
        // Subset rows — each one slices into "Logged in" further. Indented
        // visually to show they're nested, not additive top-level rows.
        { stage: "d1", label: "Day 1", count: c.d1 || 0, pct: base ? ((c.d1 || 0) / base) * 100 : 0, dropout: false, subset: true },
        { stage: "d2", label: "Day 2", count: c.d2 || 0, pct: base ? ((c.d2 || 0) / base) * 100 : 0, dropout: false, subset: true },
        { stage: "d3", label: "Day 3", count: c.d3 || 0, pct: base ? ((c.d3 || 0) / base) * 100 : 0, dropout: false, subset: true },
        { stage: "stuck", label: "Logged in but didn't start", count: buckets[0].length, pct: base ? (buckets[0].length / base) * 100 : 0, dropout: true, subset: true },
      ];

      return rows.map((r, i) => {
        const emails = emailsByStage[r.stage] || [];
        const hasEmails = emails.length > 0;
        const rowId = `funnel-row-${r.stage}`;
        const emailsId = `funnel-emails-${r.stage}`;
        return `
          <div class="funnel-row ${r.subset ? 'funnel-row--subset' : ''} ${r.dropout ? 'dropout' : ''} ${hasEmails ? '' : 'not-clickable'}" id="${rowId}" ${hasEmails ? `onclick="toggleFunnelRow('${r.stage}')"` : ''}>
            <div class="funnel-chevron">▶</div>
            <div class="funnel-label">${escapeHtml(r.label)}</div>
            <div class="funnel-bar-track"><div class="funnel-bar-fill" style="width:${r.pct}%;"></div></div>
            <div class="funnel-stat">
              <div class="pct">${r.pct.toFixed(1)}%</div>
              <div class="n">${fmtNum(r.count)} ${r.count === 1 ? 'member' : 'members'}</div>
            </div>
          </div>
          <div class="funnel-emails" id="${emailsId}">
            ${emails.length === 0
              ? '<div class="empty">No members in this stage.</div>'
              : `<ul>${emails.map(u => {
                  // Build a meta line that shows enough context for Geo to
                  // act on the right person at the right moment:
                  //   - When they signed up (purchased the Reset)
                  //   - When they first logged in (started the clock)
                  //   - How much of the 72-hour window is left
                  //   - Which day they SHOULD be on based on time elapsed
                  // The Reset window is technically 96 hours from first
                  // login (24h/day × 3 days + 24h grace), set in
                  // grantEntitlement as preview_ends_at = login + 72h
                  // initially but extended by the unlock logic. We use
                  // preview_ends_at directly since that's what controls
                  // whether they still have access.
                  const parts = [];
                  if (u.created_at) {
                    parts.push(`Signed up ${fmtRelative(u.created_at)}`);
                  }
                  if (u.first_login_at) {
                    parts.push(`first login ${fmtRelative(u.first_login_at)}`);
                    // Compute time-since-login → which day they should
                    // be on. Days unlock progressively: Day 1 at first
                    // login, Day 2 at +24h, Day 3 at +48h.
                    const hoursSinceLogin = (Date.now() - new Date(u.first_login_at).getTime()) / 3600000;
                    let shouldBeOn;
                    if (hoursSinceLogin < 24) shouldBeOn = "Day 1";
                    else if (hoursSinceLogin < 48) shouldBeOn = "Day 2";
                    else shouldBeOn = "Day 3";
                    parts.push(`should be on ${shouldBeOn}`);
                  } else {
                    parts.push("hasn't opened the app yet");
                  }
                  // Hours remaining in the window. Negative = window
                  // already expired (shouldn't normally show here since
                  // the funnel filters on active members, but defensive).
                  if (u.preview_ends_at) {
                    const msLeft = new Date(u.preview_ends_at).getTime() - Date.now();
                    if (msLeft <= 0) {
                      parts.push("window expired");
                    } else if (msLeft < 3600000) {
                      parts.push("under 1h left");
                    } else if (msLeft < 86400000) {
                      parts.push(`${Math.round(msLeft / 3600000)}h left in window`);
                    } else {
                      const daysLeft = Math.floor(msLeft / 86400000);
                      const hoursLeftRemainder = Math.round((msLeft % 86400000) / 3600000);
                      parts.push(`${daysLeft}d ${hoursLeftRemainder}h left in window`);
                    }
                  }
                  // Add a stage-specific suffix only when it's not
                  // redundant with the time math above.
                  if (r.stage === "stuck") {
                    parts.push("hasn't started Day 1");
                  }
                  const when = parts.join(" · ");
                  return `
                    <li>
                      <span>${escapeHtml(u.email)}</span>
                      ${u.display_name ? `<span class="email-name">(${escapeHtml(u.display_name)})</span>` : ''}
                      ${when ? `<span class="email-meta">${escapeHtml(when)}</span>` : ''}
                    </li>
                  `;
                }).join("")}</ul>`}
          </div>
        `;
      }).join("");
    }

    // Smooth-scroll to a section by ID and briefly flash a gold ring around

    function scrollToSection(targetId) {
      const el = document.getElementById(targetId);
      if (!el) return;
      el.scrollIntoView({ behavior: "smooth", block: "start" });
      el.classList.remove("flash"); // restart animation if already flashed
      void el.offsetWidth; // force reflow
      el.classList.add("flash");
      setTimeout(() => el.classList.remove("flash"), 1500);
    }
    window.scrollToSection = scrollToSection;

    // Render the Today's Highlights strip. Shows a snapshot of activity since

      const unlimitedBuyers = Number(t.unlimited_buyers_today || 0);
      const unlimitedYearly = Number(t.unlimited_yearly_today || 0);
      const unlimitedMonthly = Number(t.unlimited_monthly_today || 0);

        if (Number(t.signups_today_unlimited) > 0) breakdown.push(`${Number(t.signups_today_unlimited)} Unlimited`);
        tiles.push({

      }
      if (unlimitedBuyers > 0) {

        tiles.push({

      // a meaningful milestone in the 72-Hour Reset arc:
      //   Day 1 = ignition (people started the practice)
      //   Day 2 = deepening (they kept going through the dip)
      //   Day 3 = the full Reset (the launch goal — accent tile)
      if (day3Today > 0) {
        tiles.push({
          value: day3Today,
          eyebrow: "Day 3 completed",

            ? "1 member finished the full 72-Hour Reset"

      allEmails.forEach(el => el.classList.remove('open'));
      allRows.forEach(el => el.classList.remove('expanded'));

    // VAT rate applied to ThriveCart amount_cents to derive what we actually
    // keep. Most launch orders are EU buyers paying 19% German VAT — a few
    // (Mark in the US, Doruk with NL business exemption) had no VAT charged,
    // so for those rows the net = gross and dividing slightly understates.
    // Acceptable for at-a-glance — the gross column is one toggle away.
    const VAT_RATE_PCT = 19;
    const VAT_DIVISOR = 1 + VAT_RATE_PCT / 100;

    // Whether the revenue tables should display amounts net of VAT. Stored
    // in localStorage so the choice persists across reloads.
    function getRevenueVatMode() {
      try {
        const v = localStorage.getItem("tfif_admin_vat_mode");
        return v === "gross" ? "gross" : "net"; // default: net (Geo's ask)
      } catch { return "net"; }
    }
    function setRevenueVatMode(mode) {
      try { localStorage.setItem("tfif_admin_vat_mode", mode); } catch {}
      // Re-render the dashboard so all the numbers flip at once. The admin
      // app uses renderDashboard(data) — there's no shorthand render() —
      // so we replay the last metrics response we stashed in state.data.
      // Preserve the current tab so the user stays where they were instead
      // of bouncing back to Overview.
      if (typeof renderDashboard === "function" && state && state.data) {
        const currentTab = (() => {
          try { return localStorage.getItem(TAB_STORAGE_KEY) || "overview"; }
          catch { return "overview"; }
        })();
        renderDashboard(state.data);
        // renderDashboard rebuilds the DOM, so re-apply the active tab
        // (which sets display + the active-button highlight).
        setTimeout(() => switchTab(currentTab), 0);
      }
    }
    window.setRevenueVatMode = setRevenueVatMode;

    // Apply the active VAT mode to a cents amount. In "net" mode, divides
    // by 1.19. In "gross" mode, returns the raw value.
    function applyVat(cents) {
      const c = Number(cents || 0);
      if (getRevenueVatMode() === "net") return Math.round(c / VAT_DIVISOR);
      return c;
    }
    // Convenience wrapper so the rendering code reads cleanly.
    function fmtRev(cents) { return fmtEur(applyVat(cents)); }

              <table>
                <thead><tr><th>Product</th><th class="num">Orders</th><th class="num">Revenue</th></tr></thead>
                <tbody>
                  ${(tc.byProduct || []).length === 0

                      <tr>
                        <td>${escapeHtml(p.product)}</td>
                        <td class="num">${fmtNum(p.orders)}</td>
                        <td class="num">${fmtRev(p.revenue_cents)}</td>

                <div class="n">${fmtRev(r.revenue_cents)}</div>

    function renderThrivecartNotConnected() {
      return `

    // Trigger the day-completion backfill endpoint using the current session.
    // Used by the "Run completion backfill" / "Dry run first" buttons under
    // the funnel. Posts to /api/admin/backfill-completions with the same
    // x-session-token the dashboard already uses, so no ADMIN_TOKEN is
    // needed when running from the browser as a @shimritnativ.com viewer.
    async function runBackfill() {
      const status = document.getElementById("backfill-status");
      const btn = document.getElementById("backfill-btn");
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) {
        status.textContent = "Session expired. Refresh the page and try again.";
        return;
      }
      btn.disabled = true;
      status.textContent = "Refreshing… scanning chat messages for new Day completions.";
      try {
        const r = await fetch("/api/admin/backfill-completions", {
          method: "POST",
          headers: { "x-session-token": token },
        });
        if (!r.ok) {
          const errBody = await r.text().catch(() => "");
          status.textContent = "Refresh failed (HTTP " + r.status + "). " + errBody.slice(0, 200);
          return;
        }
        const data = await r.json();
        status.innerHTML = "Done. Scanned <strong>" + data.candidates + "</strong> messages, recorded <strong>" + data.recorded + "</strong> new completions. Reloading…";
        setTimeout(() => loadMetrics(), 1500);
      } catch (err) {
        status.textContent = "Network error: " + (err.message || err);
      } finally {
        btn.disabled = false;
      }
    }
    window.runBackfill = runBackfill;

    // Trigger the memory backfill endpoint. Loops chunks until the
    // server reports `complete: true` so even multi-thousand-message
    // histories finish without hitting Vercel's 5-minute function cap.
    // Each chunk is resumable thanks to messages.memory_extracted_at —
    // if the browser closes mid-loop, the next click picks up where it
    // stopped instead of starting over.
    async function runMemoryBackfill(dryRun) {
      const status = document.getElementById("memory-backfill-status");
      const btn = document.getElementById("memory-backfill-btn");
      const previewBtn = document.getElementById("memory-backfill-preview-btn");
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) {
        status.textContent = "Session expired. Refresh the page and try again.";
        return;
      }
      if (!dryRun) {
        const ok = confirm("Run the real memory backfill? Extracts facts from every past chat — typically takes a few minutes for the whole history. Safe to run multiple times.");
        if (!ok) return;
      }
      btn.disabled = true;
      previewBtn.disabled = true;

      // Running totals across all chunks. The preview path only calls
      // once so these collapse to a single chunk's numbers; the real
      // path accumulates as it loops.
      const totals = {
        chunks: 0,
        messages: 0,
        heuristic_hits: 0,
        extractions: 0,
        facts_saved_new: 0,
        facts_skipped_duplicate: 0,
        users_touched_max: 0,
        errors: 0,
      };

      try {
        if (dryRun) {
          // Single call — server scans the next chunk without writing.
          // For a true total estimate the user could re-click after each
          // batch, but the first chunk is usually a representative read
          // (server reports `remaining_before` so we show the real total).
          status.textContent = "Counting how many past messages would be processed…";
          const r = await fetch("/api/admin/backfill-memory?dry_run=1&chunk=1000", {
            method: "POST",
            headers: { "x-session-token": token },
          });
          if (!r.ok) {
            const errBody = await r.text().catch(() => "");
            status.textContent = "Preview failed (HTTP " + r.status + "). " + errBody.slice(0, 200);
            return;
          }
          const data = await r.json();
          status.innerHTML = "Preview: <strong>" + data.remaining_before + "</strong> past messages still to process, "
            + "of which <strong>" + data.heuristic_hits + "</strong> in the first chunk look like they contain durable facts "
            + "(roughly €" + (Math.round(data.remaining_before * 0.2 * 0.001 * 100) / 100) + " in Haiku calls if the rest follow the same ratio). "
            + "Click <em>Refresh memory</em> to run for real.";
          return;
        }

        // Real run — loop until the server says complete. Each call is
        // a chunk of up to 300 messages processed with parallelism=8 on
        // the server, taking 30-90s.
        let safetyMax = 500; // sanity cap: 500 chunks × 300 = 150,000 messages
        let lastUsers = 0;
        while (safetyMax-- > 0) {
          totals.chunks++;
          status.textContent = "Working chunk " + totals.chunks
            + (totals.messages > 0 ? " — " + totals.facts_saved_new + " facts saved so far across " + lastUsers + " members" : "")
            + " — keep this tab open…";

          const r = await fetch("/api/admin/backfill-memory?chunk=300", {
            method: "POST",
            headers: { "x-session-token": token },
          });
          if (!r.ok) {
            const errBody = await r.text().catch(() => "");
            status.innerHTML = "Stopped after " + totals.chunks + " chunk(s). HTTP " + r.status + ": "
              + errBody.slice(0, 200) + ". Click <em>Refresh memory</em> again to resume from where it stopped.";
            return;
          }
          const data = await r.json();
          totals.messages += data.messages_in_this_chunk || 0;
          totals.heuristic_hits += data.heuristic_hits || 0;
          totals.extractions += data.extraction_calls || 0;
          totals.facts_saved_new += data.facts_saved_new || 0;
          totals.facts_skipped_duplicate += data.facts_skipped_duplicate || 0;
          totals.errors += data.errors || 0;
          if (typeof data.users_touched === "number" && data.users_touched > totals.users_touched_max) {
            totals.users_touched_max = data.users_touched;
            lastUsers = data.users_touched;
          }

          if (data.complete) break;
          if (!data.messages_in_this_chunk) break; // safety — nothing in this chunk and not complete? bail
        }

        status.innerHTML = "Done. Processed <strong>" + totals.messages + "</strong> messages across "
          + totals.chunks + " chunk(s), "
          + "fired <strong>" + totals.extractions + "</strong> extractions, "
          + "saved <strong>" + totals.facts_saved_new + "</strong> new facts "
          + "(skipped " + totals.facts_skipped_duplicate + " duplicates)."
          + (totals.errors > 0 ? " <strong>" + totals.errors + " errors</strong> (see Vercel logs)." : "");
      } catch (err) {
        status.innerHTML = "Network error after " + totals.chunks + " chunk(s): " + (err.message || err)
          + ". Click <em>Refresh memory</em> again to resume.";
      } finally {
        btn.disabled = false;
        previewBtn.disabled = false;
      }
    }
    window.runMemoryBackfill = runMemoryBackfill;

    // ===== Ads tab — Meta Ads metrics + UTM attribution =====
    // Fetches /api/admin/ads-metrics for the selected range and renders
    // the KPI strip, per-campaign table, and (text-only) daily series.
    // Empty/error states inline so the user always sees what's wrong.
    let _adsRange = "7d";
    async function loadAdsMetrics() {
      const content = document.getElementById("ads-content");
      if (!content) return;
      content.innerHTML = '<div class="empty-state">Loading ad metrics…</div>';
      const token = localStorage.getItem(STORAGE_KEY);
      try {
        const r = await fetch(`/api/admin/ads-metrics?range=${encodeURIComponent(_adsRange)}`, {
          headers: { "x-session-token": token },
        });
        const data = await r.json();
        if (!r.ok) {
          if (data.error === "ads_not_configured") {
            content.innerHTML = `
              <div class="empty-state" style="text-align: left; padding: 20px; line-height: 1.7;">
                <strong>Meta Ads not configured yet.</strong><br>
                Set these in Vercel → Project Settings → Environment Variables:
                <ul style="margin: 10px 0; padding-left: 22px;">
                  <li><code>META_ADS_ACCESS_TOKEN</code> — long-lived token with <code>ads_read</code> scope</li>
                  <li><code>META_ADS_ACCOUNT_ID</code> — e.g. <code>act_1234567890</code> (include the <code>act_</code> prefix)</li>
                </ul>
                After saving, Vercel auto-redeploys (~30s), then click Refresh.
              </div>`;
            return;
          }
          content.innerHTML = `<div class="empty-state" style="color: var(--red);">Couldn't load ads: ${escapeHtml(data.message || data.error || "unknown error")}</div>`;
          return;
        }
        content.innerHTML = renderAdsContent(data);
      } catch (err) {
        content.innerHTML = `<div class="empty-state" style="color: var(--red);">Network error: ${escapeHtml(err.message)}</div>`;
      }
    }
    window.loadAdsMetrics = loadAdsMetrics;

    function renderAdsContent(data) {
      const t = data.totals;
      const cur = (n) => "€" + (Number(n) || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const num = (n) => Number(n || 0).toLocaleString("en-US");
      const pct = (n) => (Number(n) || 0).toFixed(2) + "%";
      const orDash = (v, formatter) => (v === null || v === undefined || isNaN(v)) ? '<span style="color: var(--text-mute);">—</span>' : formatter(v);

      // KPI strip — 6 cards, the two attribution ones flagged with a
      // gold halo since they're the decision-making numbers.
      const kpis = `
        <div class="kpi-grid" style="margin-bottom: 22px;">
          <div class="kpi kpi--accent">
            <div class="kpi-label">Cost per signup</div>
            <div class="kpi-value">${orDash(t.cost_per_signup, cur)}</div>
            <div class="kpi-sub">${num(t.signups_attributed)} signup${t.signups_attributed === 1 ? '' : 's'} from ads</div>
          </div>
          <div class="kpi kpi--accent">
            <div class="kpi-label">ROAS</div>
            <div class="kpi-value">${orDash(t.roas, (v) => v.toFixed(2) + "×")}</div>
            <div class="kpi-sub">${cur((t.revenue_attributed_cents || 0) / 100)} attributed revenue</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Total spend</div>
            <div class="kpi-value">${cur(t.spend)}</div>
            <div class="kpi-sub">${data.range.label}</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Clicks</div>
            <div class="kpi-value">${num(t.clicks)}</div>
            <div class="kpi-sub">CPC ${cur(t.cpc)}</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">Impressions</div>
            <div class="kpi-value">${num(t.impressions)}</div>
            <div class="kpi-sub">CTR ${pct(t.ctr)}</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">CPM</div>
            <div class="kpi-value">${cur(t.cpm)}</div>
            <div class="kpi-sub">per 1k impressions</div>
          </div>
        </div>`;

      // Per-campaign table
      const campaignRows = (data.campaigns || []).map((c) => {
        const statusBadge = c.status === "ACTIVE"
          ? '<span class="tier-badge" style="background: rgba(122, 174, 94, 0.15); color: var(--success, #2D6B3A); border-color: rgba(122, 174, 94, 0.3);">ACTIVE</span>'
          : `<span class="tier-badge" style="background: var(--bg-warm); color: var(--text-mute); border-color: var(--border);">${escapeHtml(c.status || "")}</span>`;
        return `
          <tr>
            <td data-label="Campaign">${escapeHtml(c.name)}</td>
            <td data-label="Status">${statusBadge}</td>
            <td data-label="Spend" class="num">${cur(c.spend)}</td>
            <td data-label="Clicks" class="num">${num(c.clicks)}</td>
            <td data-label="CTR" class="num">${pct(c.ctr)}</td>
            <td data-label="CPC" class="num">${cur(c.cpc)}</td>
            <td data-label="Signups" class="num">${num(c.signups_attributed)}</td>
            <td data-label="Cost/signup" class="num">${orDash(c.cost_per_signup, cur)}</td>
            <td data-label="ROAS" class="num">${orDash(c.roas, (v) => v.toFixed(2) + "×")}</td>
          </tr>`;
      }).join("");

      const campaignTable = data.campaigns && data.campaigns.length > 0
        ? `<div style="overflow-x: auto;">
            <table>
              <thead>
                <tr>
                  <th>Campaign</th>
                  <th>Status</th>
                  <th class="num">Spend</th>
                  <th class="num">Clicks</th>
                  <th class="num">CTR</th>
                  <th class="num">CPC</th>
                  <th class="num">Signups</th>
                  <th class="num">Cost/signup</th>
                  <th class="num">ROAS</th>
                </tr>
              </thead>
              <tbody>${campaignRows}</tbody>
            </table>
          </div>`
        : '<div class="empty-state">No campaign data for this range.</div>';

      // Daily series — text bars, since adding a chart lib is overkill
      // for this MVP. Each day shows spend + signups side by side with
      // proportional bar widths.
      const dailyMaxSpend = Math.max(1, ...(data.daily || []).map((d) => d.spend));
      const dailyMaxSignups = Math.max(1, ...(data.daily || []).map((d) => d.signups));
      const dailyRows = (data.daily || []).slice().reverse().map((d) => {
        const spendPct = (d.spend / dailyMaxSpend) * 100;
        const signupPct = (d.signups / dailyMaxSignups) * 100;
        return `
          <div style="display: grid; grid-template-columns: 90px 1fr 80px 1fr 50px; gap: 10px; align-items: center; padding: 6px 0; border-top: 1px solid var(--border); font-size: 12.5px;">
            <span style="color: var(--text-dim);">${escapeHtml(d.date)}</span>
            <span style="position: relative; height: 16px; background: var(--bg-warm); border-radius: 4px; overflow: hidden;">
              <span style="position: absolute; inset: 0; width: ${spendPct}%; background: var(--gold-soft);"></span>
              <span style="position: relative; padding-left: 6px; font-size: 11px; line-height: 16px; color: var(--text);">${cur(d.spend)}</span>
            </span>
            <span style="color: var(--text-mute); font-size: 11px;">${num(d.clicks)} clicks</span>
            <span style="position: relative; height: 16px; background: var(--bg-warm); border-radius: 4px; overflow: hidden;">
              <span style="position: absolute; inset: 0; width: ${signupPct}%; background: rgba(122, 174, 94, 0.25);"></span>
              <span style="position: relative; padding-left: 6px; font-size: 11px; line-height: 16px; color: var(--text);">${num(d.signups)}</span>
            </span>
            <span style="color: var(--text-mute); font-size: 11px;">signups</span>
          </div>`;
      }).join("");

      const dailyBlock = data.daily && data.daily.length > 0
        ? `<h3 style="font-family: Georgia, serif; font-style: italic; font-weight: 500; font-size: 16px; margin: 24px 0 12px;">Daily breakdown</h3>${dailyRows}`
        : '';

      const accountNote = `<div style="margin-top: 18px; font-size: 11px; color: var(--text-mute); font-style: italic;">Meta account ${escapeHtml(data.meta.account_id)} · fetched ${new Date(data.meta.fetched_at).toLocaleTimeString()}</div>`;

      return kpis + campaignTable + dailyBlock + accountNote;
    }

    // Range selector + refresh — delegated so listeners survive admin re-renders.
    document.body.addEventListener("click", (e) => {
      const rangeBtn = e.target.closest(".ads-range-btn");
      if (rangeBtn) {
        _adsRange = rangeBtn.dataset.range || "7d";
        document.querySelectorAll(".ads-range-btn").forEach((b) => b.classList.toggle("ads-range-btn--active", b === rangeBtn));
        loadAdsMetrics();
        return;
      }
      if (e.target.closest("#ads-refresh-btn")) {
        loadAdsMetrics();
      }
    });

    // Submit the manual purchase form to /api/admin/manual-purchase.
    // Used to log a ThriveCart payment that never reached our webhook,
    // so the dashboard's revenue numbers catch up immediately.
    async function runManualPurchase() {
      const status = document.getElementById("mp-status");
      const btn = document.getElementById("mp-btn");
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) {
        status.textContent = "Session expired. Refresh the page and try again.";
        return;
      }
      const thrivecartId = (document.getElementById("mp-thrivecart-id").value || "").trim();
      const email = (document.getElementById("mp-email").value || "").trim().toLowerCase();
      const productName = (document.getElementById("mp-product").value || "").trim();
      const amountEuros = Number(document.getElementById("mp-amount").value || 0);
      const couponCode = (document.getElementById("mp-coupon").value || "").trim() || null;
      const eventType = document.getElementById("mp-event-type").value || "order.success";

      if (!thrivecartId) { status.textContent = "Invoice ID is required."; return; }
      if (!email || !email.includes("@")) { status.textContent = "Valid email is required."; return; }
      if (!productName) { status.textContent = "Product name is required."; return; }
      if (!isFinite(amountEuros) || amountEuros < 0) { status.textContent = "Amount must be a positive number."; return; }

      btn.disabled = true;
      status.textContent = "Saving…";
      try {
        const r = await fetch("/api/admin/manual-purchase", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session-token": token },
          body: JSON.stringify({
            thrivecart_id: thrivecartId,
            event_type: eventType,
            email,
            product_name: productName,
            amount_cents: Math.round(amountEuros * 100),
            currency: "EUR",
            coupon_code: couponCode,
            notes: "Entered via admin manual-purchase form",
          }),
        });
        if (!r.ok) {
          const errBody = await r.text().catch(() => "");
          status.textContent = "Save failed (HTTP " + r.status + "). " + errBody.slice(0, 200);
          return;
        }
        const data = await r.json();
        if (data.already_existed) {
          status.innerHTML = "This purchase was already on file (idempotent skip). Existing row: <strong>"
            + thrivecartId + "</strong> · " + email + ".";
        } else {
          status.innerHTML = "Saved. Revenue numbers will pick this up on the next refresh.";
          // Clear form so a second entry doesn't accidentally re-submit the same one.
          document.getElementById("mp-thrivecart-id").value = "";
          document.getElementById("mp-email").value = "";
          document.getElementById("mp-product").value = "";
          document.getElementById("mp-amount").value = "";
          document.getElementById("mp-coupon").value = "";
          // Refresh metrics so the new total shows immediately.
          setTimeout(() => loadMetrics(), 1200);
        }
      } catch (err) {
        status.textContent = "Network error: " + (err.message || err);
      } finally {
        btn.disabled = false;
      }
    }
    window.runManualPurchase = runManualPurchase;

    // ===== Members roster filtering + pagination =====
    // The backend (metrics.js) now returns ALL members in this range
    // (no LIMIT 25). We filter and paginate entirely client-side so
    // every keystroke in the search box feels instant. For thousands of
    // members this stays fast — filtering an array of a few thousand
    // objects is sub-millisecond in any browser.
    const ROSTER_PAGE_SIZE = 25;
    let rosterPage = 0;
    function readRosterFilters() {
      return {
        q: (document.getElementById("roster-search")?.value || "").trim().toLowerCase(),
        tier: document.getElementById("roster-filter-tier")?.value || "",
        plan: document.getElementById("roster-filter-plan")?.value || "",
        spent: document.getElementById("roster-filter-spent")?.value || "",
        day: document.getElementById("roster-filter-day")?.value || "",
        login: document.getElementById("roster-filter-login")?.value || "",
      };
    }
    function applyRosterFilters(rows, f) {
      return rows.filter(u => {
        if (f.q) {
          const hay = ((u.email || "") + " " + (u.display_name || "")).toLowerCase();
          if (!hay.includes(f.q)) return false;
        }
        if (f.tier && u.tier !== f.tier) return false;
        if (f.plan) {
          const plan = u.subscription_plan || "none";
          if (plan !== f.plan) return false;
        }
        if (f.spent === "paid" && !(Number(u.total_spent_cents || 0) > 0)) return false;
        if (f.spent === "unpaid" && Number(u.total_spent_cents || 0) > 0) return false;
        if (f.day !== "" && String(u.last_completed_day || 0) !== f.day) return false;
        if (f.login === "logged_in" && !u.first_login_at) return false;
        if (f.login === "never" && u.first_login_at) return false;
        return true;
      });
    }
    function renderRoster() {
      const tbody = document.getElementById("roster-tbody");
      const pager = document.getElementById("roster-pagination");
      const title = document.getElementById("roster-title");
      if (!tbody) return;
      const all = (state.data && state.data.recentSignups) || [];
      const filtered = applyRosterFilters(all, readRosterFilters());

      // Reset to page 0 if the current page would be empty after a filter change.
      const totalPages = Math.max(1, Math.ceil(filtered.length / ROSTER_PAGE_SIZE));
      if (rosterPage >= totalPages) rosterPage = 0;
      const start = rosterPage * ROSTER_PAGE_SIZE;
      const slice = filtered.slice(start, start + ROSTER_PAGE_SIZE);

      if (title) {
        if (filtered.length === all.length) {
          title.textContent = `Every member in this range (${all.length})`;
        } else {
          title.textContent = `Showing ${filtered.length} of ${all.length} members`;
        }
      }

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty-state">No members match these filters.</td></tr>';
        pager.innerHTML = "";
        return;
      }

      tbody.innerHTML = slice.map(u => {
        const spent = Number(u.total_spent_cents || 0);
        const count = Number(u.purchase_count || 0);
        const spentCell = spent > 0
          ? `${fmtRev(spent)}<span style="color: var(--text-mute); font-weight: 400; font-size: 11px; margin-left: 6px;">${count} order${count === 1 ? '' : 's'}</span>`
          : '<span style="color: var(--text-mute);">—</span>';
        // Each <td> has an explicit data-label so the mobile stacked-card
        // layout shows the column name in front of each value. (Without
        // this, the CSS ::before { content: attr(data-label) } renders
        // empty and the flex justify-content: space-between pushes all
        // data right, leaving a blank left side — the "weird member list"
        // bug Geo reported.)
        return `
          <tr>
            <td data-label="Email">${escapeHtml(u.email)}</td>
            <td data-label="Name">${escapeHtml(nameOrFallback(u))}</td>
            <td data-label="Tier"><span class="tier-badge ${u.tier === 'full' ? 'tier-full' : 'tier-preview'}">${escapeHtml(tierLabel(u.tier))}</span></td>
            <td data-label="Plan">${escapeHtml(u.subscription_plan || "—")}</td>
            <td class="num" data-label="Spent">${spentCell}</td>
            <td class="date-cell" data-label="Joined">${fmtDate(u.created_at)}</td>
            <td class="date-cell" data-label="1st login">${u.first_login_at ? fmtDate(u.first_login_at) : "—"}</td>
            <td class="num" data-label="Day">${u.last_completed_day || 0}</td>
          </tr>
        `;
      }).join("");

      // Safety net: also fire applyMobileTableLabels in case JS-rendered
      // tables elsewhere were missed. Cheap re-run, idempotent.
      if (typeof window.applyMobileTableLabels === 'function') {
        try { window.applyMobileTableLabels(); } catch {}
      }

      // Pagination footer. Shows "1-25 of 138 · Prev | Page X of N | Next"
      // and disables prev/next at the boundaries.
      const from = start + 1;
      const to = Math.min(start + ROSTER_PAGE_SIZE, filtered.length);
      pager.innerHTML = `
        <span>Showing <strong>${from}-${to}</strong> of <strong>${filtered.length}</strong></span>
        <span style="display: flex; gap: 6px;">
          <button class="preset-btn" id="roster-prev" style="font-size: 11px; padding: 6px 12px;" ${rosterPage === 0 ? 'disabled' : ''}>‹ Prev</button>
          <span style="padding: 6px 4px;">Page ${rosterPage + 1} of ${totalPages}</span>
          <button class="preset-btn" id="roster-next" style="font-size: 11px; padding: 6px 12px;" ${rosterPage + 1 >= totalPages ? 'disabled' : ''}>Next ›</button>
        </span>
      `;
      const prev = document.getElementById("roster-prev");
      const next = document.getElementById("roster-next");
      if (prev) prev.onclick = () => { rosterPage = Math.max(0, rosterPage - 1); renderRoster(); };
      if (next) next.onclick = () => { rosterPage = Math.min(totalPages - 1, rosterPage + 1); renderRoster(); };
    }
    window.renderRoster = renderRoster;

    // Wire up the filter inputs via DELEGATED listeners on document.body.
    // Why delegation: renderDashboard rebuilds the entire dashboard DOM
    // on every metrics refresh, which destroys per-element listeners
    // attached on initial load. Delegated listeners survive DOM rebuilds
    // because they live on document.body, not on the inputs themselves.
    // This was the bug Geo hit — filters appeared to do nothing after
    // the first Refresh because their listeners were attached to
    // elements that no longer existed.
    const ROSTER_FILTER_IDS = [
      "roster-search", "roster-filter-tier", "roster-filter-plan",
      "roster-filter-spent", "roster-filter-day", "roster-filter-login",
    ];
    document.body.addEventListener("input", (e) => {
      if (e.target && e.target.id === "roster-search") {
        rosterPage = 0;
        renderRoster();
      }
    });
    document.body.addEventListener("change", (e) => {
      if (e.target && ROSTER_FILTER_IDS.includes(e.target.id) && e.target.id !== "roster-search") {
        rosterPage = 0;
        renderRoster();
      }
    });
    document.body.addEventListener("click", (e) => {
      if (e.target && e.target.id === "roster-clear") {
        ROSTER_FILTER_IDS.forEach(id => {
          const el = document.getElementById(id);
          if (el) el.value = "";
        });
        rosterPage = 0;
        renderRoster();
      }
    });

    // Send a pasted ThriveCart CSV to the reconciliation endpoint and
    // render the list of missing purchases with one-click import buttons
    // per row. Surfaces every paid order that didn't reach our DB.
    let recMissingCache = []; // keep parsed rows in scope for the import-row handlers
    async function runReconcile() {
      const status = document.getElementById("rec-status");
      const results = document.getElementById("rec-results");
      const btn = document.getElementById("rec-btn");
      const csv = document.getElementById("rec-csv").value || "";
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) { status.textContent = "Session expired. Refresh and try again."; return; }
      if (!csv.trim()) { status.textContent = "Paste a ThriveCart CSV first."; return; }
      btn.disabled = true;
      status.textContent = "Diffing CSV against the database…";
      results.innerHTML = "";
      try {
        const r = await fetch("/api/admin/reconcile-thrivecart", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session-token": token },
          body: JSON.stringify({ csv }),
        });
        if (!r.ok) {
          const errBody = await r.text().catch(() => "");
          status.textContent = "Reconcile failed (HTTP " + r.status + "). " + errBody.slice(0, 200);
          return;
        }
        const data = await r.json();
        recMissingCache = data.missing || [];
        const warnLine = (data.parse_warnings && data.parse_warnings.length > 0)
          ? '<div style="color: var(--warning); margin-bottom: 8px;">Parse warnings: ' + escapeHtml(data.parse_warnings.join("; ")) + '</div>'
          : "";
        status.innerHTML = "Found <strong>" + data.total_csv_rows + "</strong> rows in CSV. "
          + "<strong>" + data.in_db + "</strong> already on file. "
          + "<strong>" + data.missing_count + "</strong> missing.";
        if (recMissingCache.length === 0) {
          results.innerHTML = warnLine + '<div style="color: var(--success); font-size: 12px;">All ThriveCart orders are accounted for. Nothing to backfill.</div>';
          return;
        }
        const rowsHtml = recMissingCache.map((m, idx) => {
          const amtEur = (m.amount_cents / 100).toFixed(2);
          return '<tr>'
            + '<td style="padding: 4px 6px; font-family: monospace; font-size: 11px;">' + escapeHtml(m.thrivecart_id) + '</td>'
            + '<td style="padding: 4px 6px; font-size: 11px;">' + escapeHtml(m.email) + '</td>'
            + '<td style="padding: 4px 6px; font-size: 11px;">' + escapeHtml(m.product_name || "—") + '</td>'
            + '<td style="padding: 4px 6px; font-size: 11px; text-align: right;">€' + amtEur + '</td>'
            + '<td style="padding: 4px 6px; font-size: 11px;">' + escapeHtml(m.coupon_code || "—") + '</td>'
            + '<td style="padding: 4px 6px;"><button class="preset-btn" style="font-size: 10px; padding: 4px 8px;" onclick="importMissing(' + idx + ')" id="rec-import-' + idx + '">Import</button></td>'
            + '</tr>';
        }).join("");
        results.innerHTML = warnLine
          + '<div style="margin-bottom: 6px;">'
          + '<button class="preset-btn" onclick="importAllMissing()" id="rec-import-all-btn" style="background: var(--gold); color: var(--dark); border-color: var(--gold);">Import all ' + recMissingCache.length + ' missing</button>'
          + '</div>'
          + '<table style="width: 100%; border-collapse: collapse;">'
          + '<thead><tr style="border-bottom: 1px solid var(--border); text-align: left; font-size: 10px; color: var(--text-dim);">'
          + '<th style="padding: 4px 6px;">Invoice</th><th style="padding: 4px 6px;">Email</th><th style="padding: 4px 6px;">Product</th><th style="padding: 4px 6px; text-align: right;">Amount</th><th style="padding: 4px 6px;">Coupon</th><th></th>'
          + '</tr></thead>'
          + '<tbody>' + rowsHtml + '</tbody></table>';
      } catch (err) {
        status.textContent = "Network error: " + (err.message || err);
      } finally {
        btn.disabled = false;
      }
    }
    window.runReconcile = runReconcile;

    // Import one missing row from the reconcile results. Posts to the
    // same manual-purchase endpoint so the audit trail stays consistent
    // (raw_payload marked as manual entry with the actor email).
    async function importMissing(idx) {
      const m = recMissingCache[idx];
      if (!m) return;
      const btn = document.getElementById("rec-import-" + idx);
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token || !btn) return;
      btn.disabled = true;
      btn.textContent = "Saving…";
      try {
        const r = await fetch("/api/admin/manual-purchase", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session-token": token },
          body: JSON.stringify({
            thrivecart_id: m.thrivecart_id,
            event_type: "order.success",
            email: m.email,
            product_name: m.product_name || "Unknown",
            amount_cents: m.amount_cents,
            currency: m.currency || "EUR",
            coupon_code: m.coupon_code,
            notes: "Imported via ThriveCart CSV reconciliation",
          }),
        });
        if (!r.ok) { btn.textContent = "Failed"; return; }
        const data = await r.json();
        btn.textContent = data.already_existed ? "Already exists" : "Saved ✓";
        btn.style.background = "var(--success-soft)";
        btn.style.color = "var(--success)";
        btn.style.borderColor = "var(--success-soft)";
      } catch (err) {
        btn.textContent = "Error";
      }
    }
    window.importMissing = importMissing;

    // Loop through every missing row sequentially. Sequential rather
    // than parallel so we don't hammer the DB with simultaneous inserts
    // and to keep the per-row button feedback meaningful.
    async function importAllMissing() {
      const btn = document.getElementById("rec-import-all-btn");
      if (!btn) return;
      btn.disabled = true;
      btn.textContent = "Importing…";
      for (let i = 0; i < recMissingCache.length; i++) {
        btn.textContent = "Importing " + (i + 1) + "/" + recMissingCache.length + "…";
        await importMissing(i);
      }
      btn.textContent = "Done — reloading…";
      setTimeout(() => loadMetrics(), 1500);
    }
    window.importAllMissing = importAllMissing;

    // ===== Push notification sender =====
    // Loads subscribers on demand, lets admin pick recipients (one, many, all),
    // pick a prepared reminder OR write custom copy, and fire it.
    const REMINDER_COPY_CLIENT = {
      day2_unlocked: { title: "Day 2 is open ✨", body: "Your Day 1 work is done. Day 2 — Decision & Action — is ready when you are." },
      day2_nudge: { title: "Day 2 is waiting", body: "You started yesterday. The clarity from Day 1 deepens when Day 2 lands today." },
      day3_unlocked: { title: "Day 3 is open ✨", body: "The peak of your Reset. Today the Field takes you into Frequency Calibration — living inside the frequency of what you decided." },
      day3_nudge: { title: "Day 3 is waiting", body: "Frequency Calibration is the last piece. Show up today." },
      window_closing: { title: "Your Reset window closes soon", body: "Less than 12 hours left to complete the 72-Hour Power Reset. The Field is here when you are." },
    };

    let pushSubscribers = [];
    let selectedPushKey = null;
    async function loadPushSubscribers() {
      const list = document.getElementById("push-subscribers-list");
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token || !list) return;
      try {
        const r = await fetch("/api/push?action=subscribers", {
          method: "POST",
          headers: { "x-session-token": token },
        });
        if (!r.ok) {
          list.innerHTML = '<div style="font-size: 12px; color: var(--text-mute); font-style: italic; text-align: center; padding: 8px 0;">Could not load subscribers (HTTP ' + r.status + ').</div>';

        }
        const data = await r.json();
        pushSubscribers = data.subscribers || [];
        // Expose globally so the engagement panel can render from it.
        window._pushSubscribers = pushSubscribers;
        if (typeof renderNotificationEngagement === "function") renderNotificationEngagement();
        if (pushSubscribers.length === 0) {
          list.innerHTML = '<div style="font-size: 12px; color: var(--text-mute); font-style: italic; text-align: center; padding: 12px 0;">No members have enabled notifications yet.</div>';
          return;
        }
        list.innerHTML = pushSubscribers.map(s => `
          <label style="display: flex; align-items: center; gap: 10px; padding: 6px 4px; cursor: pointer; border-radius: 4px;">
            <input type="checkbox" class="push-recipient" value="${escapeHtml(s.id)}" data-email="${escapeHtml(s.email)}" />
            <div style="flex: 1; min-width: 0;">
              <div style="font-size: 12.5px; color: var(--text); font-weight: 500;">${escapeHtml(s.email)}${s.display_name ? ' <span style="color: var(--text-dim); font-weight: 400;">(' + escapeHtml(s.display_name) + ')</span>' : ''}</div>
              <div style="font-size: 11px; color: var(--text-mute);">${s.devices} device${s.devices === 1 ? '' : 's'} · ${s.tier === 'full' ? 'Unlimited' : 'Power Reset'}${s.last_sent ? ' · last sent ' + fmtRelative(s.last_sent) : ''}</div>
            </div>

        `).join("");
      } catch (err) {
