<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- iOS Safari was aggressively caching this whole admin page on
       mobile, so deploys reached desktop within seconds but never
       reached the phone — the browser kept serving the old admin.html
       which in turn loaded the old launch-tracker.html. Force-revalidate
       every load so a deploy is visible the moment the page refreshes. -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>The Field — Team Metrics</title>
  <script>
    // Self-heal against a stale cached admin.html. iOS Safari held on
    // to the un-cache-controlled version of this page for days even
    // after we shipped cache-control headers. This script runs at the
    // very top of <head>: if the URL has no cache-bust query param,
    // add one once per session and reload. The next navigation then
    // pulls a fresh copy from the server.
    //
    // Why not also compare build versions: an earlier attempt to fetch
    // a server build SHA and force-reload on mismatch caused an
    // infinite reload loop (the embedded version never matched the
    // VERCEL_GIT_COMMIT_SHA, so every load thought it was stale and
    // reloaded forever, leaving the page stuck on "Loading metrics...").
    // The simple one-time cache-bust below is enough for the use case.
    (function () {
      try {
        var params = new URLSearchParams(location.search);
        if (!params.has("v") && !sessionStorage.getItem("admin_v_reload")) {
          // First load in this session: force a cache-bust reload so a
          // fresh deploy is picked up even if the browser cached the old
          // HTML. Uses ?v=timestamp because location.reload(true) isn't
          // reliable across browsers.
          sessionStorage.setItem("admin_v_reload", "1");
          location.replace(location.pathname + "?v=" + Date.now() + location.hash);
        } else if (params.has("v")) {
          // Second load (post cache-bust): strip the ?v= param from the
          // URL so the address bar shows the clean /admin URL. Uses
          // history.replaceState so no navigation happens (no scroll
          // jump, no reload, just an in-place URL rewrite).
          params.delete("v");
          var clean = location.pathname + (params.toString() ? "?" + params.toString() : "") + location.hash;
          history.replaceState({}, "", clean);
        }
      } catch {}
    })();
  </script>

  <style>
    :root {
      --bg: #F7F1E1;
      --bg-card: #FFFFFF;
      --panel: #F4ECD0;
      --gold: #C9A84C;
      --gold-soft: rgba(201, 168, 76, 0.15);
      --gold-line: rgba(201, 168, 76, 0.35);
      --dark: #2C2416;
      --text: #1A1612;
      --text-dim: #6B5F3F;
      --text-mute: #9A8D6C;
      --border: rgba(201, 168, 76, 0.25);
      --green: #4A7C3A;
      --red: #C03A2B;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      --kpi-bg: var(--panel);
    }
    [data-theme="dark"] {
      /* Warm dark palette tuned to feel like the Field itself: deep sepia
         base with clear 3-tier surface hierarchy so cards visibly lift off
         the page. Bright saturated gold for accents. Cream text reads warm
         rather than glaring. Cards, borders, and hovers all get bolder
         values than the initial pass so the theme feels intentional. */
      --bg: #100C08;
      --bg-card: #241C13;
      --bg-warm: #2E2519;
      --panel: #2E2519;
      --gold: #EFC670;
      --gold-soft: rgba(239, 198, 112, 0.16);
      --gold-line: rgba(239, 198, 112, 0.42);
      --dark: #FAF5E4;
      --text: #F7F0DA;
      --text-dim: #CFC29C;
      --text-mute: #8F8567;
      --border: rgba(239, 198, 112, 0.22);
      --green: #8FCB6E;
      --red: #EA958E;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.6), 0 2px 10px rgba(0, 0, 0, 0.4);
      --kpi-bg: #241C13;
    }
    /* Warm radial glow across the top so the page feels dim-lit from
       above rather than uniformly dark. More pronounced than the first
       pass so it actually registers visually. */
    [data-theme="dark"] body {
      background:
        radial-gradient(ellipse 1200px 800px at 50% -100px, rgba(239, 198, 112, 0.08), transparent 65%),
        radial-gradient(ellipse at bottom, rgba(239, 198, 112, 0.03), transparent 55%),
        var(--bg);
      background-attachment: fixed;
    }
    /* KPI + section cards get a warm gradient surface + soft gold ring
       so they feel lifted and lit rather than pasted onto a black plate.
       The gradient is a 1-2% shift so it's subtle but the ring makes the
       edge feel intentional. */
    [data-theme="dark"] .kpi,
    [data-theme="dark"] .section {
      background:
        linear-gradient(180deg, rgba(239, 198, 112, 0.03), rgba(239, 198, 112, 0.01)),
        var(--bg-card);
      border-color: rgba(239, 198, 112, 0.22);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(239, 198, 112, 0.06);
    }
    [data-theme="dark"] .kpi.kpi-revenue {
      /* Money hero card: a slightly stronger warm gradient so revenue reads
         as the primary anchor of the page. */
      background:
        linear-gradient(180deg, rgba(239, 198, 112, 0.06), rgba(239, 198, 112, 0.015)),
        var(--bg-card);
    }
    /* Table rows in dark mode alternate very subtly so long lists scan
       cleanly. Too much difference reads as banded/loud; the values here
       are near-invisible individually but make each row easy to track. */
    [data-theme="dark"] .section table > tbody > tr:nth-child(even) > td {
      background: rgba(224, 190, 104, 0.025);
    }
    [data-theme="dark"] .section table > tbody > tr:hover > td {
      background: rgba(224, 190, 104, 0.06);
    }
    /* Tier badges are hardcoded to a light-mode brown that turns unreadable
       against the dark bg. Override with warm on-dark values so POWER RESET
       reads as a warm pill and full-tier as a soft green pill. */
    [data-theme="dark"] .tier-preview {
      background: rgba(224, 190, 104, 0.14);
      color: #E5C878;
    }
    [data-theme="dark"] .tier-full {
      background: rgba(134, 190, 104, 0.14);
      color: #A0D080;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }
    .wrap {
      /* 1600px is the "goldilocks" width tested against the roster + new
         Actions column: everything fits without wrapping, and other tabs
         (Overview, Revenue, Ads) still read nicely without lines getting
         so long they hurt scannability. 1480 was too tight for the new
         column; 1800 was too wide and made KPI rows look sparse. */
      max-width: 1600px;
      margin: 0 auto;
      padding: 36px 32px 80px;
    }
    /* ===== High-end refresh experience =====
       Three coordinated pieces that fire together on any data reload:
       (1) a subtle gold progress bar that crawls across the top of the
       viewport, (2) a soft opacity dim on the content so members know
       they're looking at stale data being updated, and (3) a spinning
       icon on the Refresh button that stays disabled until done. Nothing
       jumps, nothing scrolls, no flashes. Matches how Linear, Notion,
       and Hubspot handle background updates. */
    .top-progress {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: transparent;
      z-index: 9999;
      pointer-events: none;
    }
    .top-progress::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 0%;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 25%, var(--gold) 75%, transparent 100%);
      transition: width 0.35s ease-out, opacity 0.25s ease-out;
      opacity: 0;
    }
    body.is-refreshing .top-progress::after {
      opacity: 1;
      width: 85%;
      transition: width 8s cubic-bezier(0.1, 0.5, 0.2, 0.95), opacity 0.15s ease-in;
    }
    body.refresh-completing .top-progress::after {
      opacity: 0;
      width: 100%;
      transition: width 0.2s ease-out, opacity 0.4s ease-out 0.15s;
    }
    /* Dim the dashboard body while refreshing so it's clear the data is
       being updated. Top bar and Refresh button stay bright so the user
       can still interact. Content fades back up smoothly on completion.
       Desktop only: on mobile the opacity change on a tall scroll
       container caused a visible twitch during the transition, so we
       drop the dim there and let the top progress bar + pull-to-refresh
       indicator carry the "we're loading" signal on their own. */
    @media (min-width: 641px) {
      .dashboard-body,
      [data-tab-content] {
        transition: opacity 0.28s ease-out;
      }
      body.is-refreshing .dashboard-body,
      body.is-refreshing [data-tab-content] {
        opacity: 0.55;
        pointer-events: none;
      }
    }
    /* Refresh button state: spinner replaces ↻ while loading. Uses a
       small keyframe rotation so the icon feels alive rather than
       swapped-out mid-motion. */
    @keyframes refresh-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .refresh-btn[disabled] {
      cursor: wait;
      opacity: 0.8;
    }
    .refresh-btn.is-loading .refresh-icon {
      display: inline-block;
      animation: refresh-spin 0.9s linear infinite;
    }
    /* Skeleton shimmer for progressive rendering. Widgets that depend on
       the slow real-profit endpoint render as skeleton placeholders on
       first paint, then swap in the real content as it arrives. */
    @keyframes skel-shimmer {
      0%   { background-position: -200px 0; }
      100% { background-position: calc(200px + 100%) 0; }
    }
    .skel-line {
      display: block;
      border-radius: 4px;
      background: rgba(201, 168, 76, 0.14);
      background-image: linear-gradient(
        90deg,
        rgba(201, 168, 76, 0.10) 0%,
        rgba(201, 168, 76, 0.24) 50%,
        rgba(201, 168, 76, 0.10) 100%
      );
      background-size: 200px 100%;
      background-repeat: no-repeat;
      animation: skel-shimmer 1.4s ease-in-out infinite;
    }
    [data-theme="dark"] .skel-line {
      background-color: rgba(239, 198, 112, 0.10);
      background-image: linear-gradient(
        90deg,
        rgba(239, 198, 112, 0.06) 0%,
        rgba(239, 198, 112, 0.20) 50%,
        rgba(239, 198, 112, 0.06) 100%
      );
    }
    .is-loading { transition: opacity 0.32s ease-out; }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 22px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .brand-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-transform: uppercase;
    }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-size: 30px;
      color: var(--text);
      margin: 4px 0 0;
      font-weight: 400;
    }
    .viewer {
      font-size: 12px;
      color: var(--text-dim);
      text-align: right;
    }
    .viewer .v-email { color: var(--text); font-weight: 600; }

    /* Date range controls */
    .date-controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      background: var(--bg-card);
      border: 1px solid var(--gold-line);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 22px;
    }
    .date-controls-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-right: 4px;
    }
    .preset-btn {
      background: transparent;
      border: 1px solid var(--gold-line);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .preset-btn:hover { border-color: var(--gold); background: var(--gold-soft); }
    .preset-btn.active {
      background: var(--gold);
      color: var(--dark);
      border-color: var(--gold);
    }
    .date-input {
      font-family: inherit;
      font-size: 12px;
      padding: 6px 10px;
      border: 1px solid var(--gold-line);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--text);
    }
    /* In dark mode, the browser's calendar-picker icon on <input type="date">
       defaults to dark and becomes invisible against the dark background.
       Invert it so it shows as a light-colored icon. */
    [data-theme="dark"] .date-input::-webkit-calendar-picker-indicator {
      filter: invert(1) opacity(0.6);
    }
    [data-theme="dark"] .date-input::-webkit-calendar-picker-indicator:hover {
      filter: invert(1) opacity(1);
    }
    .date-sep { color: var(--text-mute); font-size: 12px; }
    .apply-btn {
      background: var(--gold);
      border: 1px solid var(--gold);
      color: var(--dark);
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
    }
    .apply-btn:hover { background: #B89232; border-color: #B89232; }
    .range-summary {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* KPI cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 30px;
    }
    .kpi {
      background: var(--kpi-bg);
      border: 1px solid var(--gold-line);
      border-radius: 12px;
      padding: 18px 18px 16px;
      position: relative;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .kpi.clickable { cursor: pointer; }
    .kpi.clickable:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(201, 168, 76, 0.18);
    }
    .kpi.clickable::after {
      content: "↓";
      position: absolute;
      top: 14px;
      right: 14px;
      color: var(--gold);
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.15s ease;
    }
    .kpi.clickable:hover::after { opacity: 1; }
    .kpi.kpi-revenue {
      background: linear-gradient(135deg, var(--gold-soft) 0%, var(--panel) 100%);
      border-color: var(--gold);
    }
    /* Flash effect when scrolled-to via KPI card click */
    .section.flash {
      animation: section-flash 1.4s ease-out;
    }
    @keyframes section-flash {
      0% { box-shadow: 0 0 0 4px var(--gold), 0 12px 40px rgba(0, 0, 0, 0.08); }
      100% { box-shadow: 0 0 0 0 rgba(201, 168, 76, 0), 0 12px 40px rgba(0, 0, 0, 0.08); }
    }

    /* Today's Highlights strip */
    .highlights {
      background: linear-gradient(135deg, var(--gold-soft) 0%, var(--panel) 100%);
      border: 1px solid var(--gold);
      border-radius: 14px;
      padding: 18px 22px 16px;
      margin-bottom: 22px;
    }
    .highlights-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .highlights-eyebrow {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-transform: uppercase;
    }
    .highlights-title {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 17px;
      color: var(--text);
      margin: 4px 0 0;
    }
    .highlights-date {
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }
    .highlights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }
    /* Redesigned highlight tile — stacked vertical hierarchy reads cleanly:
       small uppercase eyebrow at the top, serif value in the middle, soft
       detail line at the bottom. Balanced proportions kill the "big number
       + tiny squished label" sloppiness of the previous horizontal layout. */
    .highlight {
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid var(--gold-line);
      border-radius: 12px;
      padding: 14px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }
    .highlight:hover {
      border-color: var(--gold);
      transform: translateY(-1px);
    }
    /* Accent variant for the moment that matters most — Unlimited
       conversions get a richer gold background so they stand out from the
       rest of the row. The conversion is the win we want to celebrate. */
    .highlight--accent {
      background: linear-gradient(135deg, var(--gold-soft) 0%, rgba(255, 255, 255, 0.4) 100%);
      border-color: var(--gold);
    }
    [data-theme="dark"] .highlight {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(196, 160, 90, 0.35);
    }
    [data-theme="dark"] .highlight--accent {
      background: linear-gradient(135deg, rgba(196, 160, 90, 0.18) 0%, rgba(196, 160, 90, 0.06) 100%);
      border-color: var(--gold);
    }
    .highlight-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--gold);
      text-transform: uppercase;
      line-height: 1.2;
    }
    .highlight-value {
      font-family: Georgia, serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.1;
      margin-top: 2px;
    }
    .highlight-detail {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.4;
      margin-top: 2px;
    }
    [data-theme="dark"] .highlight-detail { color: #D4C9A8; }
    .highlights-quiet {
      font-style: italic;
      color: var(--text-mute);
      font-size: 13px;
      padding: 8px 0;
    }
    .kpi-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    /* Help tooltip system: a small "?" pill next to a label that reveals
       a styled tooltip on hover. The tooltip explains in plain language
       what the metric is, how it's calculated, and (optionally) what
       action it enables. Used on the Overview tab's main KPIs.
       Hover on EITHER the icon OR the card body triggers the tooltip. */
    .kpi-help {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--bg-warm);
      color: var(--text-mute);
      font-size: 9px;
      font-weight: 700;
      line-height: 1;
      margin-left: 5px;
      cursor: help;
      vertical-align: middle;
      border: 1px solid var(--border);
      transition: all 0.15s;
      letter-spacing: 0;
      text-transform: none;
      user-select: none;
    }
    .kpi-help:hover {
      background: var(--gold);
      color: var(--dark, #1a1a1a);
      border-color: var(--gold);
    }
    .kpi, .has-help {
      position: relative;
    }
    .kpi-tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      min-width: 240px;
      max-width: 320px;
      background: #1a1a1a;
      color: white;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 11.5px;
      line-height: 1.55;
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
      z-index: 100;
      text-align: left;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }
    .kpi-tooltip::after {
      /* Little arrow pointing down at the card */
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #1a1a1a;
    }
    /* Tooltip shows ONLY when the user actively hovers the "?" icon.
       Hovering the card body does NOT trigger it — less intrusive.
       The "?" icon and the tooltip are adjacent siblings, so the `+`
       sibling combinator targets the tooltip from the icon hover. */
    .kpi-help:hover + .kpi-tooltip {
      opacity: 1;
      transform: translateX(-50%) translateY(-2px);
    }
    /* For table headers, slightly smaller and tighter so they don't blow
       out the table layout. */
    th .kpi-help {
      margin-left: 3px;
      width: 12px;
      height: 12px;
      font-size: 8px;
    }
    .kpi-tooltip-title {
      display: block;
      font-weight: 600;
      margin-bottom: 5px;
      color: var(--gold);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .kpi-tooltip-body {
      display: block;
      color: rgba(255,255,255,0.88);
    }
    .kpi-tooltip-action {
      display: block;
      margin-top: 7px;
      padding-top: 7px;
      border-top: 1px solid rgba(255,255,255,0.15);
      color: #e6c896;
      font-style: italic;
    }
    /* Dark theme: tooltip needs a slight background tweak so it's still
       distinguishable from the page bg. */
    [data-theme="dark"] .kpi-tooltip {
      background: #0a0a0a;
      border: 1px solid rgba(255,255,255,0.1);
    }
    [data-theme="dark"] .kpi-tooltip::after {
      border-top-color: #0a0a0a;
    }
    .kpi-value {
      font-family: Georgia, serif;
      font-size: 32px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.1;
    }
    .kpi-sub { font-size: 11px; color: var(--text-mute); margin-top: 4px; }

    .section {
      background: var(--bg-card);
      border: 1px solid var(--gold-line);
      border-radius: 14px;
      padding: 22px 24px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
    }
    .section h2 {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      margin: 0 0 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .section h2 .h2-eyebrow {
      display: inline-block;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-style: normal;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
      margin-right: 10px;
      padding: 2px 7px;
      background: var(--gold-soft);
      border-radius: 999px;
      vertical-align: middle;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
    @media (max-width: 760px) { .two-col { grid-template-columns: 1fr; } }

    /* ===== Mobile (phones, ≤640px) ===== */
    @media (max-width: 640px) {
      /* Prevent any wide child from blowing out the page width. We use
         overflow-x: clip on the wrap (rather than hidden on html/body)
         because clip doesn't create a containing block for fixed/sticky
         children — important so iOS native vertical scroll stays smooth
         and the tab nav can still stick to the top of the viewport. */
      .wrap {
        max-width: 100vw;
        overflow-x: clip;
        padding: max(20px, env(safe-area-inset-top)) 14px 60px;
      }
      .section { max-width: 100%; }

      /* Section headings ALWAYS wrap on mobile — defeats any inherited
         white-space rule and ensures long parenthetical phrases like
         "By product × coupon (every SKU + coupon combination)" don't
         push past the right edge. */
      .section h2 {
        white-space: normal !important;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      /* Topbar: hamburger sits inline with the title block; viewer info
         drops to its own row below for breathing room. */
      .topbar {
        flex-direction: row;
        align-items: flex-start;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 18px;
      }
      .topbar > div:first-of-type {
        flex: 1;
        min-width: 0;
      }
      .topbar .viewer {
        flex: 1 0 100%;
        text-align: left;
      }

      /* Date controls — compact layout: label, preset buttons, date inputs,
         and apply button all wrap cleanly. iOS 16px input prevents zoom. */
      .date-controls { padding: 10px 12px; gap: 6px; }
      .date-controls-label { width: 100%; margin-bottom: 4px; }
      .preset-btn { font-size: 11px; padding: 7px 12px; min-height: 34px; }
      .date-input { font-size: 16px; padding: 7px 10px; min-width: 0; flex: 1; }
      .range-summary {
        width: 100%; margin: 4px 0 0; text-align: left;
        font-size: 10px;
      }

      /* KPI cards — auto-fit so they adapt to screen width. On 393px
         iPhones this fits 1 column with cards using the full width;
         on slightly wider phones (430px+) it fits 2 columns. The
         minmax(180px, 1fr) guarantees each card has room for its big
         "€208.36" value and "REVENUE (EX VAT)" label without clipping. */
      .kpi-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
        margin-bottom: 22px;
      }
      .kpi { padding: 14px 14px 12px; min-width: 0; }
      /* Values shrink to fit and NEVER mid-break a currency like €3,146.07.
         Use !important because the three big Overview KPIs (Net Revenue,
         Costs, Profit) have inline `font-size: 32px` that overrides the
         mobile default and was fragmenting the amount across three lines. */
      .kpi-value {
        font-size: 22px !important;
        word-break: normal;
        overflow-wrap: normal;
        white-space: nowrap;
        letter-spacing: -0.01em;
      }
      .kpi-label { font-size: 9px; }
      .kpi-sub { font-size: 10px; word-break: normal; overflow-wrap: anywhere; }
      .kpi.clickable::after { display: none; }

      /* Today's Highlights — single column, fully constrained so neither
         the wrapper nor any tile can blow out the viewport width. The
         previous version let tile content stay horizontal which was
         clipping past the right edge on narrow phones. */
      .highlights {
        padding: 14px 16px 12px;
        margin-bottom: 18px;
        max-width: 100%;
        overflow: hidden;
      }
      .highlights-grid {
        grid-template-columns: 1fr;
        gap: 8px;
        max-width: 100%;
      }
      .highlights-header { flex-wrap: wrap; gap: 8px; }
      .highlights-title { font-size: 15px; word-break: break-word; }
      .highlight {
        padding: 12px 14px;
        max-width: 100%;
        min-width: 0;
        flex-direction: column !important;
        align-items: flex-start;
      }
      .highlight-eyebrow { font-size: 9px; }
      .highlight-value {
        font-size: 22px;
        min-width: 0;
        word-break: break-word;
      }
      .highlight-detail { font-size: 11px; word-break: break-word; }

      /* Sections — tighter */
      .section { padding: 16px 14px; margin-bottom: 14px; border-radius: 12px; }
      .section h2 { font-size: 15px; margin-bottom: 12px; padding-bottom: 10px; }
      .section h2 .h2-eyebrow { display: block; margin: 0 0 4px; }

      /* Tables become STACKED CARDS on mobile — same UX pattern as the
         Intelligence segments. Each row becomes a small card with each
         field as a labeled line. Eliminates horizontal scrolling entirely
         since every column is visible vertically, and avoids the squeezed
         overlap problem the table-layout: fixed approach had. The labels
         in front of each cell come from data-label attrs set by JS at
         render time (see applyMobileTableLabels). */
      .section table {
        display: block;
        max-width: 100%;
        white-space: normal;
        background: transparent !important;
      }
      .section table > thead { display: none; }
      .section table > tbody {
        display: block;
        width: 100%;
      }
      /* Any data-table rendered inside an overflow-x wrapper (like per-ad
         performance and campaign tables) must also stack on mobile,
         otherwise the inline min-width: 640px + overflow-x: auto forces
         horizontal scrolling and pushes half of each row's content off
         screen. Kill the min-width and free the wrapper's overflow so the
         same stacked-card rules apply. */
      .data-table {
        min-width: 0 !important;
        width: 100%;
      }
      /* Wrappers that use overflow-x: auto for horizontal scroll on desktop
         should release that constraint on mobile. Matches inline style so
         no HTML changes needed. */
      div[style*="overflow-x: auto"] {
        overflow-x: visible !important;
      }
      /* Data tables not inside a `.section` also need the stacked-card
         treatment. Duplicated rule set targeting .data-table directly so
         both patterns work regardless of parent structure. */
      .data-table,
      .data-table > tbody {
        display: block;
        max-width: 100%;
        white-space: normal;
        background: transparent !important;
      }
      .data-table > thead { display: none; }
      .data-table > tbody > tr {
        display: block;
        background: var(--bg-card);
        border: 1px solid var(--gold-line);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }
      [data-theme="dark"] .data-table > tbody > tr {
        background: var(--bg-card);
        border: 1px solid rgba(224, 190, 104, 0.18);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.28);
      }
      .data-table > tbody > tr > td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 7px 0;
        border: none !important;
        border-bottom: 1px solid rgba(201, 168, 76, 0.08) !important;
        font-size: 13px;
        white-space: normal;
        text-align: right;
        word-break: break-word;
        min-width: 0;
        color: var(--text);
      }
      [data-theme="dark"] .data-table > tbody > tr > td {
        border-bottom: 1px solid rgba(224, 190, 104, 0.09) !important;
      }
      .data-table > tbody > tr > td:last-child {
        border-bottom: none !important;
      }
      .data-table > tbody > tr > td::before {
        content: attr(data-label);
        font-weight: 700;
        color: var(--text-mute);
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        flex-shrink: 0;
        text-align: left;
        min-width: 60px;
      }
      .data-table > tbody > tr > td:empty,
      .data-table > tbody > tr > td[data-label=""] {
        display: none;
      }
      /* Field-brand stacked card treatment for mobile tables. Each row is
         its own card with softer surfaces, subtle gold divider between
         fields, and a compact rhythm so more members fit on-screen without
         feeling cramped. Labels are muted and small; values carry the
         weight. Reads more like a Field pane than a database dump. */
      .section table > tbody > tr {
        display: block;
        background: var(--bg-card);
        border: 1px solid var(--gold-line);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      }
      [data-theme="dark"] .section table > tbody > tr {
        background: var(--bg-card);
        border: 1px solid rgba(224, 190, 104, 0.18);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.28);
      }
      .section table > tbody > tr:hover { background: var(--bg-card); }
      .section table > tbody > tr > td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding: 7px 0;
        border: none !important;
        border-bottom: 1px solid rgba(201, 168, 76, 0.08) !important;
        font-size: 13px;
        white-space: normal;
        text-align: right;
        word-break: break-word;
        min-width: 0;
        color: var(--text);
      }
      [data-theme="dark"] .section table > tbody > tr > td {
        border-bottom: 1px solid rgba(224, 190, 104, 0.09) !important;
      }
      .section table > tbody > tr > td:last-child {
        border-bottom: none !important;
      }
      .section table > tbody > tr > td.num {
        text-align: right;
      }
      .section table > tbody > tr > td::before {
        content: attr(data-label);
        font-weight: 700;
        color: var(--text-mute);
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        flex-shrink: 0;
        text-align: left;
        min-width: 60px;
      }
      .section table > tbody > tr > td:empty,
      .section table > tbody > tr > td[data-label=""] {
        display: none;
      }
      /* Badges align to the right side of each field row. */
      .section table > tbody > tr > td .tier-badge,
      .section table > tbody > tr > td .comp-pill {
        margin-left: auto;
      }

      /* Funnel — compact grid */
      .funnel-row {
        grid-template-columns: 14px 78px 1fr 70px;
        gap: 8px; padding: 6px 4px;
      }
      .funnel-row--subset {
        margin-left: 16px;
        grid-template-columns: 14px 64px 1fr 70px;
      }
      .funnel-label { font-size: 12px; }
      .funnel-row--subset .funnel-label { font-size: 11px; }
      .funnel-bar-track { height: 10px; }
      .funnel-stat { font-size: 11px; }
      .funnel-stat .n { font-size: 10px; }

      /* Email dropdown under funnel rows */
      .funnel-emails { margin-left: 18px; padding: 8px 10px; font-size: 11px; }
      .funnel-emails ul { padding-left: 14px; }

      /* Signup bars */
      .signup-row { grid-template-columns: 76px 1fr 48px; font-size: 11px; }

      /* Note box copy on mobile */
      .note-box { font-size: 11px; padding: 10px 12px; }
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    /* Dates and money cells stay on a single line. Long values like "Jun 17,
       2026" or "€163.78 2 orders" were wrapping into two lines and making
       every row taller than necessary. */
    .section table td.num,
    .section table td.date-cell {
      white-space: nowrap;
    }
    th {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      color: var(--text-dim); text-transform: uppercase; background: var(--panel);
    }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    th.num { text-align: right; }
    tr:last-child td { border-bottom: none; }

    .tier-badge {
      display: inline-block;
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      padding: 2px 8px; border-radius: 999px; text-transform: uppercase;
      white-space: nowrap;
    }
    /* Small "Extend" action button in the roster Actions column.
       Subtle by default so the roster stays scannable; brightens on
       hover to signal it's clickable. Disabled while an extension is
       being saved to prevent double-clicks. */
    .roster-action-btn {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .roster-action-btn:hover:not(:disabled) {
      background: var(--gold-soft);
      color: var(--text);
      border-color: var(--gold);
    }
    .roster-action-btn:disabled {
      cursor: wait;
      opacity: 0.6;
    }
    /* Inline name editor. The Name cell in the Members roster is
       contenteditable so clicking it puts the caret in place and typing
       replaces the value. Enter saves. Esc reverts. Fallback names
       (generated from email prefix) show in muted italic so the ones
       that need real names are easy to spot. */
    .name-editable {
      cursor: text;
      display: inline-block;
      padding: 2px 6px;
      margin: -2px -6px;
      border-radius: 4px;
      border-bottom: 1px dotted transparent;
      transition: background 0.15s, border-color 0.15s;
      outline: none;
    }
    .name-editable:hover {
      background: var(--gold-soft);
      border-bottom-color: var(--gold-line);
    }
    .name-editable:focus {
      background: var(--bg-warm);
      border-bottom-color: var(--gold);
      box-shadow: 0 0 0 2px var(--gold-soft);
    }
    /* Marker class for names that came from the email-prefix fallback
       rather than a real DB value. No italic. Left as a hook in case
       we want a different visual marker later (e.g. muted color) but
       currently renders identically to real names so nothing jumps out
       as "wrong" in the roster. */
    .name-editable--fallback {
      color: var(--text);
    }
    /* Make the Tier column wide enough that "POWER RESET" doesn't wrap.
       Also pin Plan + Day to their minimum so the new Source column
       has room to breathe instead of crushing everything together. */
    .section table > thead > tr > th:nth-child(3),
    .section table > tbody > tr > td:nth-child(3) {
      white-space: nowrap;
      min-width: 110px;
    }
    /* Hover tooltip on the "X orders" badge — shows the list of
       products the member purchased. Pure CSS, no JS framework. */
    .orders-hover {
      position: relative;
      cursor: help;
      border-bottom: 1px dotted var(--text-mute, #8B7E66);
    }
    .orders-hover .orders-tooltip {
      visibility: hidden;
      opacity: 0;
      position: absolute;
      bottom: calc(100% + 6px);
      right: 0;
      background: var(--bg-dark, #1A1612);
      color: var(--text-inverse, #F7F1E1);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 400;
      line-height: 1.45;
      letter-spacing: 0;
      text-transform: none;
      white-space: nowrap;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
      z-index: 100;
      transition: opacity 0.12s ease, visibility 0.12s ease;
      pointer-events: none;
      min-width: 180px;
      text-align: left;
    }
    .orders-hover:hover .orders-tooltip,
    .orders-hover:focus .orders-tooltip {
      visibility: visible;
      opacity: 1;
    }
    .orders-tooltip-item {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 2px 0;
    }
    .orders-tooltip-item-product { opacity: 0.9; }
    .orders-tooltip-item-amount { font-weight: 600; opacity: 1; }
    .orders-tooltip-item-coupon {
      font-size: 9.5px;
      opacity: 0.6;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .orders-tooltip-divider {
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin: 6px 0;
    }
    .tier-preview { background: rgba(201, 168, 76, 0.18); color: #8B6F2F; }
    .tier-full { background: rgba(74, 124, 58, 0.18); color: var(--green); }
    /* Comp pill — sits inline next to emails of Unlimited users who haven't
       actually paid (team accounts, GEO100 comps, admin-granted access). */
    .comp-pill {
      display: inline-block;
      font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
      padding: 2px 7px; border-radius: 999px; text-transform: uppercase;
      background: rgba(184, 92, 74, 0.14);
      color: #B85C4A;
      margin-left: 8px;
      vertical-align: middle;
    }

    .funnel-row {
      display: grid; grid-template-columns: 18px 110px 1fr 110px;
      align-items: center; gap: 12px; padding: 8px 6px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    /* Visually nest subset rows (Day 1/2/3 and "Didn't start") inside the
       Logged in partition so the math is obvious at a glance. */
    .funnel-row--subset {
      margin-left: 28px;
      grid-template-columns: 18px 92px 1fr 110px;
    }
    .funnel-row--subset .funnel-label::before {
      content: "└";
      color: var(--text-mute);
      margin-right: 6px;
      font-weight: 400;
    }
    .funnel-row--subset .funnel-label {
      font-size: 12.5px;
      color: var(--text-dim);
    }
    .funnel-row:hover { background: var(--panel); }
    .funnel-row.not-clickable { cursor: default; }
    .funnel-row.not-clickable:hover { background: transparent; }
    .funnel-row.dropout .funnel-bar-fill {
      background: linear-gradient(90deg, #B85C4A 0%, #8F4031 100%);
    }
    .funnel-chevron {
      color: var(--gold);
      font-size: 11px;
      transition: transform 0.2s ease;
      text-align: center;
    }
    .funnel-row.expanded .funnel-chevron { transform: rotate(90deg); }
    .funnel-row.not-clickable .funnel-chevron { color: transparent; }
    .funnel-label { font-weight: 600; font-size: 13px; }
    .funnel-bar-track {
      height: 14px; background: var(--panel); border-radius: 999px; overflow: hidden;
    }
    .funnel-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold) 0%, #B89232 100%);
      border-radius: 999px; transition: width 0.6s ease;
    }
    .funnel-stat { text-align: right; font-size: 13px; font-variant-numeric: tabular-nums; }
    .funnel-stat .pct { color: var(--text); font-weight: 600; }
    .funnel-stat .n { color: var(--text-mute); font-size: 11px; }
    .funnel-emails {
      margin: 4px 0 12px 30px;
      padding: 10px 14px;
      background: var(--panel);
      border-left: 2px solid var(--gold);
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .funnel-emails.open { display: block; }
    .funnel-emails ul { margin: 0; padding-left: 16px; }
    .funnel-emails li { margin: 6px 0; color: var(--text); list-style: disc; }
    .funnel-emails li .email-name { color: var(--text-dim); margin-left: 6px; }
    .funnel-emails li .email-meta {
      display: block;
      color: var(--text-mute);
      font-size: 10.5px;
      margin-top: 2px;
      font-style: italic;
    }
    .funnel-emails .empty {
      color: var(--text-mute); font-style: italic;
    }

    .signup-row {
      display: grid; grid-template-columns: 90px 1fr 60px;
      align-items: center; gap: 10px; padding: 4px 0; font-size: 12px;
    }
    .signup-bar-track { height: 8px; background: var(--panel); border-radius: 999px; overflow: hidden; }
    .signup-bar-fill { height: 100%; background: var(--gold); border-radius: 999px; }
    .signup-row .date { color: var(--text-dim); }
    .signup-row .n { text-align: right; font-weight: 600; }

    .gate {
      max-width: 480px; margin: 80px auto;
      padding: 36px 32px; background: var(--bg-card);
      border: 1px solid var(--gold-line); border-radius: 16px;
      text-align: center; box-shadow: var(--shadow);
    }
    .gate h1 { font-size: 22px; margin-bottom: 12px; }
    .gate p { color: var(--text-dim); margin: 8px 0; font-size: 14px; }
    .gate a { color: var(--gold); font-weight: 600; text-decoration: none; }
    .gate a:hover { text-decoration: underline; }

    .footnote {
      font-size: 11px; color: var(--text-mute);

    }
    .loading {
      text-align: center; padding: 80px 24px;
      color: var(--text-dim); font-style: italic;
    }
    .note-box {
      background: var(--gold-soft); border: 1px solid var(--gold-line);
      border-radius: 10px; padding: 12px 16px;
      font-size: 12px; color: var(--text-dim); margin-top: 12px;

    .note-box strong { color: var(--text); }
    .note-box code {
      background: var(--bg-card); padding: 2px 6px; border-radius: 4px;
