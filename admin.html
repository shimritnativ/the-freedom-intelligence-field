        ? `<div class="intel-intro">No members currently fit any of the six segments. This will populate as your funnel matures and members start engaging across the offer ladder.</div>`
        : `<div class="intel-intro">Six segments, <strong>${fmtNum(total)} members</strong> total across all of them. Each segment maps to a specific MYP offer at its real price point. Work the top of each list first.</div>`;

      const segmentsHtml = segments.map(s => {
        const empty = s.rows.length === 0;
        const tableRows = empty
          ? `<div class="intel-empty">No members in this segment right now.</div>`
          : `
            <table class="intel-members-table">
              <thead><tr>${s.cols.map(c => `<th class="${c.num ? 'num' : ''}">${escapeHtml(c.label)}</th>`).join("")}</tr></thead>
              <tbody>
                ${s.rows.map(r => `
                  <tr>
                    ${s.cols.map(c => `<td class="${c.num ? 'num' : ''}">${c.render(r)}</td>`).join("")}
                  </tr>
                `).join("")}
              </tbody>
            </table>
          `;
        return `
          <div class="intel-segment">
            <div class="intel-segment-head">
              <div>
                <span class="intel-segment-eyebrow">${escapeHtml(s.eyebrow)}</span>
                <div class="intel-segment-title" style="margin-top: 4px;">${escapeHtml(s.title)}</div>
              </div>
              <div class="intel-segment-count"><strong>${fmtNum(s.rows.length)}</strong> ${s.rows.length === 1 ? "member" : "members"}</div>
            </div>
            <div class="intel-segment-why">${s.why}</div>
            <div class="intel-action">
              <div class="intel-action-label">Recommended action</div>
              <div class="intel-action-text">${s.action}</div>
            </div>
            ${tableRows}
          </div>
        `;
      }).join("");

      return intro + segmentsHtml;
    }

    function renderFunnel(c, details) {
      // Base = ALL Power Reset members (not just those who logged in), so
      // percentages reflect the full launch funnel from purchase → completion.
      const base = c.total_members || 0;
      const loggedIn = c.total_logged_in || 0;
      const neverLoggedIn = c.never_logged_in || 0;
      details = details || [];

      // Bucket logged-in members by their current day stage. Members with
      // first_login_at = null go in the "never_logged_in" bucket separately.
      const buckets = { 0: [], 1: [], 2: [], 3: [] };
      const neverLogged = [];
      details.forEach(u => {
        if (!u.first_login_at) {
          neverLogged.push(u);
        } else {
          const d = Math.max(0, Math.min(3, u.last_completed_day || 0));
          buckets[d].push(u);
        }
      });

      const emailsByStage = {
        "never_logged_in": neverLogged,
        "logged_in": details.filter(u => u.first_login_at),
        "stuck": buckets[0],
        "d1": buckets[1].concat(buckets[2]).concat(buckets[3]),
        "d2": buckets[2].concat(buckets[3]),
        "d3": buckets[3],
      };

      const rows = [
        // Top-level partition (sums to 7): Never logged in + Logged in
        { stage: "never_logged_in", label: "Never logged in", count: neverLoggedIn, pct: base ? (neverLoggedIn / base) * 100 : 0, dropout: true, subset: false },
        { stage: "logged_in", label: "Logged in", count: loggedIn, pct: base ? (loggedIn / base) * 100 : 0, dropout: false, subset: false },
        // Subset rows — each one slices into "Logged in" further. Indented
        // visually to show they're nested, not additive top-level rows.
        { stage: "d1", label: "Day 1", count: c.d1 || 0, pct: base ? ((c.d1 || 0) / base) * 100 : 0, dropout: false, subset: true },
        { stage: "d2", label: "Day 2", count: c.d2 || 0, pct: base ? ((c.d2 || 0) / base) * 100 : 0, dropout: false, subset: true },
        { stage: "d3", label: "Day 3", count: c.d3 || 0, pct: base ? ((c.d3 || 0) / base) * 100 : 0, dropout: false, subset: true },
        { stage: "stuck", label: "Logged in but didn't start", count: buckets[0].length, pct: base ? (buckets[0].length / base) * 100 : 0, dropout: true, subset: true },
      ];

      return rows.map((r, i) => {
        const emails = emailsByStage[r.stage] || [];
        const hasEmails = emails.length > 0;
        const rowId = `funnel-row-${r.stage}`;
        const emailsId = `funnel-emails-${r.stage}`;
        return `
          <div class="funnel-row ${r.subset ? 'funnel-row--subset' : ''} ${r.dropout ? 'dropout' : ''} ${hasEmails ? '' : 'not-clickable'}" id="${rowId}" ${hasEmails ? `onclick="toggleFunnelRow('${r.stage}')"` : ''}>
            <div class="funnel-chevron">▶</div>
            <div class="funnel-label">${escapeHtml(r.label)}</div>
            <div class="funnel-bar-track"><div class="funnel-bar-fill" style="width:${r.pct}%;"></div></div>
            <div class="funnel-stat">
              <div class="pct">${r.pct.toFixed(1)}%</div>
              <div class="n">${fmtNum(r.count)} ${r.count === 1 ? 'member' : 'members'}</div>
            </div>
          </div>
          <div class="funnel-emails" id="${emailsId}">
            ${emails.length === 0
              ? '<div class="empty">No members in this stage.</div>'
              : `<ul>${emails.map(u => {
                  // Pick the right "when did this start" line per stage so
                  // Geo can see how long each person has been stuck.
                  let when;
                  if (r.stage === "never_logged_in") {
                    when = u.created_at
                      ? `Joined ${fmtRelative(u.created_at)}, hasn't opened the app`
                      : "Hasn't opened the app";
                  } else if (r.stage === "stuck") {
                    when = u.first_login_at
                      ? `Logged in ${fmtRelative(u.first_login_at)}, hasn't started Day 1`
                      : "Hasn't started Day 1";
                  } else {
                    when = u.first_login_at
                      ? `Started Reset ${fmtRelative(u.first_login_at)}`
                      : (u.created_at ? `Joined ${fmtRelative(u.created_at)}` : "");
                  }
                  return `
                    <li>
                      <span>${escapeHtml(u.email)}</span>
                      ${u.display_name ? `<span class="email-name">(${escapeHtml(u.display_name)})</span>` : ''}
                      ${when ? `<span class="email-meta">${escapeHtml(when)}</span>` : ''}
                    </li>
                  `;
                }).join("")}</ul>`}
          </div>
        `;
      }).join("");
    }

    // Smooth-scroll to a section by ID and briefly flash a gold ring around
    // it so the user's eye lands on the right place. Triggered by clicking
    // any of the top KPI cards.
    function scrollToSection(targetId) {
      const el = document.getElementById(targetId);
      if (!el) return;
      el.scrollIntoView({ behavior: "smooth", block: "start" });
      el.classList.remove("flash"); // restart animation if already flashed
      void el.offsetWidth; // force reflow
      el.classList.add("flash");
      setTimeout(() => el.classList.remove("flash"), 1500);
    }
    window.scrollToSection = scrollToSection;

    // Render the Today's Highlights strip. Shows a snapshot of activity since
    // midnight: new signups, revenue, day completions, unlimited engagement.
    // Renders a quiet placeholder if nothing has happened yet today.
    function renderHighlights(today) {
      const t = today || {};
      const signups = Number(t.signups_today || 0);
      const revenue = Number(t.revenue_today_cents || 0);
      const orders = Number(t.orders_today || 0);
      const completions = Number(t.completions_today || 0);
      const day1Today = Number(t.day1_today || 0);
      const day2Today = Number(t.day2_today || 0);
      const day3Today = Number(t.day3_today || 0);
      const activeUnlimited = Number(t.active_unlimited_today || 0);
      const unlimitedMessages = Number(t.unlimited_messages_today || 0);
      // Catches Unlimited conversions today — including returning customers
      // who upgraded from Reset (like Maria), which signups_today misses.
      const unlimitedBuyers = Number(t.unlimited_buyers_today || 0);
      const unlimitedYearly = Number(t.unlimited_yearly_today || 0);
      const unlimitedMonthly = Number(t.unlimited_monthly_today || 0);
      const nothingYet = signups === 0 && orders === 0 && completions === 0 && activeUnlimited === 0 && unlimitedBuyers === 0;

      const todayLabel = new Date().toLocaleDateString(undefined, {
        weekday: "long", month: "long", day: "numeric"
      });

      if (nothingYet) {
        return `
          <div class="highlights">
            <div class="highlights-header">
              <div>
                <div class="highlights-eyebrow">Today's highlights</div>
                <div class="highlights-title">A quiet start so far</div>
              </div>
              <div class="highlights-date">${escapeHtml(todayLabel)}</div>
            </div>
            <div class="highlights-quiet">No signups, sales, or completions yet today. Check back later or scroll for the live state of the launch.</div>
          </div>
        `;
      }

      const tiles = [];
      if (signups > 0) {
        const breakdown = [];
        if (Number(t.signups_today_reset) > 0) breakdown.push(`${Number(t.signups_today_reset)} Reset`);
        if (Number(t.signups_today_unlimited) > 0) breakdown.push(`${Number(t.signups_today_unlimited)} Unlimited`);
        tiles.push({
          value: signups,
          eyebrow: "New signups",
          detail: breakdown.length ? breakdown.join(" · ") : (signups === 1 ? "1 new member" : signups + " new members"),
          target: "panel-roster",
        });
      }
      if (unlimitedBuyers > 0) {
        // Celebrate Unlimited conversions today — separate from "signups"
        // because returning Reset buyers who upgrade aren't new accounts.
        const planParts = [];
        if (unlimitedYearly > 0) planParts.push(unlimitedYearly + " yearly");
        if (unlimitedMonthly > 0) planParts.push(unlimitedMonthly + " monthly");
        tiles.push({
          value: unlimitedBuyers,
          eyebrow: "Unlimited conversions",
          detail: planParts.length ? planParts.join(" · ") : (unlimitedBuyers === 1 ? "1 member chose Unlimited" : unlimitedBuyers + " members chose Unlimited"),
          target: "panel-revenue",
          accent: true,
        });
      }
      if (revenue > 0) {
        const isNet = getRevenueVatMode() === "net";
        tiles.push({
          value: fmtRev(revenue),
          eyebrow: isNet ? "Revenue (ex VAT)" : "Revenue",
          detail: orders === 1 ? "from 1 order" : "from " + orders + " orders",
          target: "panel-revenue",
          isCurrency: true,
        });
      } else if (orders > 0) {
        tiles.push({
          value: orders,
          eyebrow: "Free orders",
          detail: orders === 1 ? "1 free order processed" : orders + " free orders processed",
          target: "panel-revenue",
        });
      }
      // Day completions — broken out by which day was reached. Each one is
      // a meaningful milestone in the 72-Hour Reset arc:
      //   Day 1 = ignition (people started the practice)
      //   Day 2 = deepening (they kept going through the dip)
      //   Day 3 = the full Reset (the launch goal — accent tile)
      if (day3Today > 0) {
        tiles.push({
          value: day3Today,
          eyebrow: "Day 3 completed",
          detail: day3Today === 1
            ? "1 member finished the full 72-Hour Reset"
            : day3Today + " members finished the full 72-Hour Reset",
          target: "panel-funnel",
          accent: true,
        });
      }
      if (day2Today > 0) {
        tiles.push({
          value: day2Today,
          eyebrow: "Day 2 reached",
          detail: day2Today === 1
            ? "1 member deepened the practice"
            : day2Today + " members deepened the practice",
          target: "panel-funnel",
        });
      }
      if (day1Today > 0) {
        tiles.push({
          value: day1Today,
          eyebrow: "Day 1 started",
          detail: day1Today === 1
            ? "1 member began the Reset"
            : day1Today + " members began the Reset",
          target: "panel-funnel",
        });
      }
      if (activeUnlimited > 0) {
        tiles.push({
          value: activeUnlimited,
          eyebrow: "Unlimited active today",
          detail: unlimitedMessages + " message" + (unlimitedMessages === 1 ? "" : "s") + " sent",
          target: "panel-unlimited-engagement",
        });
      }

      return `
        <div class="highlights">
          <div class="highlights-header">
            <div>
              <div class="highlights-eyebrow">Today's highlights</div>
              <div class="highlights-title">What's happened since midnight</div>
            </div>
            <div class="highlights-date">${escapeHtml(todayLabel)}</div>
          </div>
          <div class="highlights-grid">
            ${tiles.map(tile => `
              <div class="highlight ${tile.accent ? 'highlight--accent' : ''}" onclick="scrollToSection('${tile.target}')">
                <div class="highlight-eyebrow">${escapeHtml(tile.eyebrow || '')}</div>
                <div class="highlight-value">${tile.isCurrency ? tile.value : fmtNum(tile.value)}</div>
                <div class="highlight-detail">${tile.detail || ''}</div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    // Toggle a funnel row's email dropdown. Closes any other open one so only
    // one is expanded at a time.
    function toggleFunnelRow(stage) {
      const allEmails = document.querySelectorAll('.funnel-emails');
      const allRows = document.querySelectorAll('.funnel-row');
      const targetEmails = document.getElementById('funnel-emails-' + stage);
      const targetRow = document.getElementById('funnel-row-' + stage);
      const wasOpen = targetEmails.classList.contains('open');
      allEmails.forEach(el => el.classList.remove('open'));
      allRows.forEach(el => el.classList.remove('expanded'));
      if (!wasOpen) {
        targetEmails.classList.add('open');
        targetRow.classList.add('expanded');
      }
    }
    window.toggleFunnelRow = toggleFunnelRow;

    // VAT rate applied to ThriveCart amount_cents to derive what we actually
    // keep. Most launch orders are EU buyers paying 19% German VAT — a few
    // (Mark in the US, Doruk with NL business exemption) had no VAT charged,
    // so for those rows the net = gross and dividing slightly understates.
    // Acceptable for at-a-glance — the gross column is one toggle away.
    const VAT_RATE_PCT = 19;
    const VAT_DIVISOR = 1 + VAT_RATE_PCT / 100;

    // Whether the revenue tables should display amounts net of VAT. Stored
    // in localStorage so the choice persists across reloads.
    function getRevenueVatMode() {
      try {
        const v = localStorage.getItem("tfif_admin_vat_mode");
        return v === "gross" ? "gross" : "net"; // default: net (Geo's ask)
      } catch { return "net"; }
    }
    function setRevenueVatMode(mode) {
      try { localStorage.setItem("tfif_admin_vat_mode", mode); } catch {}
      // Re-render the dashboard so all the numbers flip at once. The admin
      // app uses renderDashboard(data) — there's no shorthand render() —
      // so we replay the last metrics response we stashed in state.data.
      // Preserve the current tab so the user stays where they were instead
      // of bouncing back to Overview.
      if (typeof renderDashboard === "function" && state && state.data) {
        const currentTab = (() => {
          try { return localStorage.getItem(TAB_STORAGE_KEY) || "overview"; }
          catch { return "overview"; }
        })();
        renderDashboard(state.data);
        // renderDashboard rebuilds the DOM, so re-apply the active tab
        // (which sets display + the active-button highlight).
        setTimeout(() => switchTab(currentTab), 0);
      }
    }
    window.setRevenueVatMode = setRevenueVatMode;

    // Apply the active VAT mode to a cents amount. In "net" mode, divides
    // by 1.19. In "gross" mode, returns the raw value.
    function applyVat(cents) {
      const c = Number(cents || 0);
      if (getRevenueVatMode() === "net") return Math.round(c / VAT_DIVISOR);
      return c;
    }
    // Convenience wrapper so the rendering code reads cleanly.
    function fmtRev(cents) { return fmtEur(applyVat(cents)); }

    function renderThrivecartSection(tc) {

      const grossCents = Number(summary.gross_cents || 0);
      const refundCents = Number(summary.refund_cents || 0);

      const aovCents = summary.orders ? Math.round(grossCents / summary.orders) : 0;
      const mode = getRevenueVatMode();
      const isNet = mode === "net";

      const maxByDay = (tc.byDay || []).reduce((m, r) => Math.max(m, Number(r.revenue_cents || 0)), 0) || 1;

      return `

            <button onclick="setRevenueVatMode('gross')" style="border: 0; padding: 8px 14px; font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; background: ${!isNet ? 'var(--gold)' : 'transparent'}; color: ${!isNet ? 'var(--dark)' : 'var(--text-dim)'}; border-left: 1px solid var(--gold-line);">Incl. VAT (gross)</button>

          </div>

          <div class="kpi-grid" style="margin-bottom: 18px;">
            <div class="kpi kpi-revenue">
              <div class="kpi-label">${isNet ? 'Revenue (ex VAT)' : 'Gross Revenue'}</div>
              <div class="kpi-value">${fmtRev(grossCents)}</div>
              <div class="kpi-sub">${fmtNum(summary.orders || 0)} orders</div>
            </div>
            <div class="kpi">
              <div class="kpi-label">Refunds</div>
              <div class="kpi-value">${fmtRev(refundCents)}</div>
              <div class="kpi-sub">refunded back</div>
            </div>
            <div class="kpi kpi-revenue">
              <div class="kpi-label">${isNet ? 'After refunds (ex VAT)' : 'Net Revenue'}</div>
              <div class="kpi-value">${fmtRev(netCents)}</div>
              <div class="kpi-sub">revenue − refunds</div>
            </div>
            <div class="kpi">
              <div class="kpi-label">Avg Order Value</div>
              <div class="kpi-value">${fmtRev(aovCents)}</div>
              <div class="kpi-sub">per order</div>
            </div>
            <div class="kpi">
              <div class="kpi-label">Unique Buyers</div>
              <div class="kpi-value">${fmtNum(summary.unique_buyers || 0)}</div>
              <div class="kpi-sub">distinct emails</div>
            </div>
          </div>

          <h2 style="font-size: 14px; margin: 8px 0 10px;">By product × coupon (every SKU + coupon combination)</h2>
          <table>
            <thead><tr><th>Product</th><th>Coupon</th><th class="num">Orders</th><th class="num">Revenue</th><th class="num">Avg / order</th></tr></thead>
            <tbody>
              ${(tc.byProductCoupon || []).length === 0
                ? '<tr><td colspan="5" class="empty-state">No orders yet.</td></tr>'
                : (tc.byProductCoupon || []).map(r => `
                  <tr>
                    <td>${escapeHtml(r.product)}</td>
                    <td><span class="tier-badge ${r.coupon === '(full price)' ? '' : 'tier-preview'}" style="${r.coupon === '(full price)' ? 'background: transparent; color: var(--text-mute);' : ''}">${escapeHtml(r.coupon)}</span></td>
                    <td class="num">${fmtNum(r.orders)}</td>
                    <td class="num">${fmtRev(r.revenue_cents)}</td>
                    <td class="num">${fmtRev(r.avg_cents)}</td>
                  </tr>
                `).join("")}
            </tbody>
          </table>

          <div class="two-col" style="margin-top: 22px;">
            <div>
              <h2 style="font-size: 14px; margin-bottom: 10px;">By coupon</h2>
              <table>
                <thead><tr><th>Coupon</th><th class="num">Orders</th><th class="num">Revenue</th><th class="num">Avg</th></tr></thead>
                <tbody>
                  ${(tc.byCoupon || []).length === 0
                    ? '<tr><td colspan="4" class="empty-state">No orders yet.</td></tr>'
                    : (tc.byCoupon || []).map(c => `
                      <tr>
                        <td>${escapeHtml(c.coupon)}</td>
                        <td class="num">${fmtNum(c.orders)}</td>
                        <td class="num">${fmtRev(c.revenue_cents)}</td>
                        <td class="num">${fmtRev(c.avg_cents)}</td>
                      </tr>
                    `).join("")}
                </tbody>
              </table>
            </div>
            <div>
              <h2 style="font-size: 14px; margin-bottom: 10px;">By product</h2>
              <table>
                <thead><tr><th>Product</th><th class="num">Orders</th><th class="num">Revenue</th></tr></thead>
                <tbody>
                  ${(tc.byProduct || []).length === 0
                    ? '<tr><td colspan="3" class="empty-state">No orders yet.</td></tr>'
                    : (tc.byProduct || []).map(p => `
                      <tr>
                        <td>${escapeHtml(p.product)}</td>
                        <td class="num">${fmtNum(p.orders)}</td>
                        <td class="num">${fmtRev(p.revenue_cents)}</td>
                      </tr>
                    `).join("")}
                </tbody>
              </table>
            </div>
          </div>

          ${(tc.byDay || []).length > 0 ? `
            <h2 style="font-size: 14px; margin: 22px 0 10px;">Revenue by day</h2>
            ${(tc.byDay || []).slice(0, 21).map(r => `
              <div class="signup-row">

                <div class="n">${fmtRev(r.revenue_cents)}</div>

          ${(tc.topBuyers || []).length > 0 ? `
            <h2 style="font-size: 14px; margin: 22px 0 10px;">Top buyers</h2>

    function renderThrivecartNotConnected() {
      return `
        <div class="section" id="panel-revenue">
          <h2><span class="h2-eyebrow">Setup needed</span>Connect ThriveCart for live revenue</h2>
          <p style="color: var(--text-dim); font-size: 13px;">
            Revenue data lights up the moment ThriveCart starts posting purchase webhooks to the new endpoint. Three steps:
          </p>
          <div class="note-box" style="line-height: 1.7;">
            <strong>1.</strong> In <strong>Neon</strong> (Vercel → Storage → Open in Neon → SQL Editor), paste &amp; run the <code>CREATE TABLE purchases</code> SQL block from the bottom of <code>api/webhooks/thrivecart.js</code>.

            <strong>2.</strong> In <strong>Vercel</strong> → Project Settings → Environment Variables, add <code>THRIVECART_WEBHOOK_SECRET</code> with a long random string. Redeploy.

            <strong>3.</strong> In <strong>ThriveCart</strong> → Settings → API &amp; Webhooks: paste <code>https://thefieldai.app/api/webhooks/thrivecart</code> as the webhook URL, paste the same secret you set in Vercel, and select all event types (order.success, order.refund, order.subscription_payment, order.subscription_cancelled).
          </div>
          <div class="footnote">Once a real order comes through, this section automatically replaces itself with live revenue, coupon breakdown, product breakdown, and top buyers.</div>
        </div>
      `;
    }

    // Trigger the day-completion backfill endpoint using the current session.
    // Used by the "Run completion backfill" / "Dry run first" buttons under
    // the funnel. Posts to /api/admin/backfill-completions with the same
    // x-session-token the dashboard already uses, so no ADMIN_TOKEN is
    // needed when running from the browser as a @shimritnativ.com viewer.
    async function runBackfill() {
      const status = document.getElementById("backfill-status");
      const btn = document.getElementById("backfill-btn");
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) {
        status.textContent = "Session expired. Refresh the page and try again.";
        return;
      }
      btn.disabled = true;
      status.textContent = "Refreshing… scanning chat messages for new Day completions.";
      try {
        const r = await fetch("/api/admin/backfill-completions", {
          method: "POST",
          headers: { "x-session-token": token },
        });
        if (!r.ok) {
          const errBody = await r.text().catch(() => "");
          status.textContent = "Refresh failed (HTTP " + r.status + "). " + errBody.slice(0, 200);
          return;
        }
        const data = await r.json();
        status.innerHTML = "Done. Scanned <strong>" + data.candidates + "</strong> messages, recorded <strong>" + data.recorded + "</strong> new completions. Reloading…";
        setTimeout(() => loadMetrics(), 1500);
      } catch (err) {
        status.textContent = "Network error: " + (err.message || err);
      } finally {
        btn.disabled = false;
      }
    }
    window.runBackfill = runBackfill;

    // ===== Push notification sender =====
    // Loads subscribers on demand, lets admin pick recipients (one, many, all),
    // pick a prepared reminder OR write custom copy, and fire it.
    const REMINDER_COPY_CLIENT = {
      day2_unlocked: { title: "Day 2 is open ✨", body: "Your Day 1 work is done. Day 2 — Decision and Action Alignment — is ready when you are." },
      day2_nudge: { title: "Day 2 is waiting", body: "You started yesterday. The clarity from Day 1 deepens when Day 2 lands today." },
      day3_unlocked: { title: "Day 3 is open ✨", body: "The peak of your Reset. Today the Field takes you inside the frequency of what you decided." },
      day3_nudge: { title: "Day 3 is waiting", body: "The frequency calibration is the last piece. Show up today." },
      window_closing: { title: "Your Reset window closes soon", body: "Less than 12 hours left to complete the 72-Hour Power Reset. The Field is here when you are." },
    };

    let pushSubscribers = [];
    let selectedPushKey = null;
    async function loadPushSubscribers() {
      const list = document.getElementById("push-subscribers-list");
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token || !list) return;
      try {
        const r = await fetch("/api/push?action=subscribers", {
          method: "POST",
          headers: { "x-session-token": token },
        });
        if (!r.ok) {
          list.innerHTML = '<div style="font-size: 12px; color: var(--text-mute); font-style: italic; text-align: center; padding: 8px 0;">Could not load subscribers (HTTP ' + r.status + ').</div>';
          return;
        }
        const data = await r.json();
        pushSubscribers = data.subscribers || [];
        if (pushSubscribers.length === 0) {
          list.innerHTML = '<div style="font-size: 12px; color: var(--text-mute); font-style: italic; text-align: center; padding: 12px 0;">No members have enabled notifications yet.</div>';
          return;
        }
        list.innerHTML = pushSubscribers.map(s => `
          <label style="display: flex; align-items: center; gap: 10px; padding: 6px 4px; cursor: pointer; border-radius: 4px;">
            <input type="checkbox" class="push-recipient" value="${escapeHtml(s.id)}" data-email="${escapeHtml(s.email)}" />
            <div style="flex: 1; min-width: 0;">
              <div style="font-size: 12.5px; color: var(--text); font-weight: 500;">${escapeHtml(s.email)}${s.display_name ? ' <span style="color: var(--text-dim); font-weight: 400;">(' + escapeHtml(s.display_name) + ')</span>' : ''}</div>
              <div style="font-size: 11px; color: var(--text-mute);">${s.devices} device${s.devices === 1 ? '' : 's'} · ${s.tier === 'full' ? 'Unlimited' : 'Power Reset'}${s.last_sent ? ' · last sent ' + fmtRelative(s.last_sent) : ''}</div>
            </div>
          </label>
        `).join("");
      } catch (err) {
        list.innerHTML = '<div style="font-size: 12px; color: var(--text-mute); font-style: italic; text-align: center; padding: 8px 0;">Network error loading subscribers.</div>';
      }
    }

    function togglePushSelectAll() {
      const checked = document.getElementById("push-select-all").checked;
      document.querySelectorAll(".push-recipient").forEach(cb => { cb.checked = checked; });
    }

    function selectPushMessage(key) {
      selectedPushKey = key;
      // Highlight the chosen button
      document.querySelectorAll(".push-msg-btn").forEach(btn => {
        if (btn.dataset.key === key) {
          btn.style.background = "var(--gold)";
          btn.style.color = "var(--dark)";
          btn.style.borderColor = "var(--gold)";
        } else {
          btn.style.background = "";
          btn.style.color = "";
          btn.style.borderColor = "";
        }
      });
      const customForm = document.getElementById("push-custom-form");
      if (key === "custom") {
        customForm.style.display = "";
        updateCustomPreview();
      } else {
        customForm.style.display = "none";
        const copy = REMINDER_COPY_CLIENT[key];
        if (copy) {
          document.getElementById("push-preview-title").textContent = copy.title;
          document.getElementById("push-preview-body").textContent = copy.body;
        }
      }
    }

    function updateCustomPreview() {
      const title = document.getElementById("push-custom-title").value || "(no title)";
      const body = document.getElementById("push-custom-body").value || "(no body)";
      document.getElementById("push-preview-title").textContent = title;
      document.getElementById("push-preview-body").textContent = body;
    }

    // ===== Tap-to-go CTA helpers =====
    // The destination dropdown encodes the chosen action as "type:value":
    //   process:<key>   → /app.html?process=<key>
    //   day:<n>         → /app.html?day=<n>
    //   continue:last   → /app.html?continue=last
    //   url:            → custom external URL (shows the URL input)
    //   (empty)         → no action
    // Show/hide the URL + label inputs based on what's picked.
    function updateCtaForm() {
      const dest = (document.getElementById("push-cta-destination") || {}).value || "";
      const urlEl = document.getElementById("push-cta-url");
      const labelEl = document.getElementById("push-cta-label");
      if (!urlEl || !labelEl) return;
      if (!dest) {
        urlEl.style.display = "none";
        labelEl.style.display = "none";
        return;
      }
      // URL input shown only for the "External URL" option; label is shown
      // for every non-empty destination so the admin can override "Open".
      urlEl.style.display = dest === "url:" ? "" : "none";
      labelEl.style.display = "";
    }
    window.updateCtaForm = updateCtaForm;

    // Resolves the dropdown selection + URL input into the final cta_url
    // string we'll store on the notification. Returns null when no action
    // is set or the input is invalid.
    function buildCtaUrl() {
      const dest = (document.getElementById("push-cta-destination") || {}).value || "";
      if (!dest) return null;
      const [type, value] = dest.split(":");
      if (type === "process") return "/app.html?process=" + encodeURIComponent(value);
      if (type === "day") return "/app.html?day=" + encodeURIComponent(value);
      if (type === "continue") return "/app.html?continue=" + encodeURIComponent(value);
      if (type === "url") {
        const u = (document.getElementById("push-cta-url") || {}).value || "";
        const trimmed = u.trim();
        if (!trimmed) return null;
        // Require https or http to avoid javascript: shenanigans.
        if (!/^https?:\/\//i.test(trimmed)) return null;
        return trimmed;
      }
      return null;
    }

    function buildCtaLabel() {
      const l = (document.getElementById("push-cta-label") || {}).value || "";
      return l.trim() || null; // null lets the Field default to "Open"
    }

    // ===== Manage inbox =====
    // Loads the recent inbox notifications and renders them with delete
    // buttons. Called when the Notifications tab is entered and after a
    // successful send so the new message shows up immediately.
    async function loadInboxNotifications() {
      const container = document.getElementById("inbox-manage-list");
      if (!container) return;
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) return;
      try {
        const r = await fetch("/api/notifications?action=admin-list", {
          headers: { "x-session-token": token },
        });
        if (!r.ok) {
          container.innerHTML = '<div style="color: var(--text-dim); font-style: italic; font-size: 13px;">Couldn\'t load inbox messages.</div>';
          return;
        }
        const data = await r.json();
        const items = data.notifications || [];
        if (items.length === 0) {
          container.innerHTML = '<div style="color: var(--text-dim); font-style: italic; font-size: 13px;">No notifications saved to the inbox yet.</div>';
          return;
        }
        container.innerHTML = items.map(n => {
          // Render the CTA info inline if present. The display label is
          // either the explicit cta_label or "Open"; the URL gives the
          // admin a quick at-a-glance of where the button leads.
          const ctaChip = n.cta_url
            ? `<span style="display: inline-block; background: var(--gold-soft); color: var(--gold); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px; margin-left: 6px; letter-spacing: 0.04em;">→ ${escapeHtml(n.cta_label || "Open")}</span>`
            : "";
          const ctaUrlLine = n.cta_url
            ? `<div style="font-size: 11px; color: var(--text-mute); margin-top: 2px; word-break: break-all;">${escapeHtml(n.cta_url)}</div>`
            : "";
          return `
            <div style="background: var(--panel); border: 1px solid var(--gold-line); border-radius: 8px; padding: 12px 14px; display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start;">
              <div style="min-width: 0;">
                <div style="font-weight: 600; color: var(--text); font-size: 13.5px; margin-bottom: 2px;">${escapeHtml(n.title || '')}${ctaChip}</div>
                ${n.body ? `<div style="font-size: 12px; color: var(--text-dim); line-height: 1.45; margin-bottom: 4px;">${escapeHtml(n.body)}</div>` : ''}
                ${ctaUrlLine}
                <div style="font-size: 11px; color: var(--text-mute);">
                  ${fmtRelative(n.created_at)} · read by <strong>${fmtNum(n.read_count || 0)}</strong> member${(n.read_count || 0) === 1 ? '' : 's'}${n.sent_by_email ? ' · from ' + escapeHtml(n.sent_by_email) : ''}
                </div>
              </div>
              <button onclick="deleteInboxNotification('${escapeHtml(n.id)}', this)"
                      style="background: transparent; border: 1px solid var(--gold-line); color: var(--text-dim); padding: 5px 10px; border-radius: 6px; font-family: inherit; font-size: 11px; cursor: pointer; font-weight: 600; white-space: nowrap;"
                      title="Remove this from every member's inbox">
                Delete
              </button>
            </div>
          `;
        }).join("");
      } catch (err) {
        container.innerHTML = '<div style="color: var(--text-dim); font-style: italic; font-size: 13px;">Network error loading inbox.</div>';
      }
    }
    window.loadInboxNotifications = loadInboxNotifications;

    async function deleteInboxNotification(id, btnEl) {
      if (!id) return;
      if (!confirm("Delete this notification from every member's inbox? This can't be undone.")) return;
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) return;
      if (btnEl) { btnEl.disabled = true; btnEl.textContent = "Deleting…"; }
      try {
        const r = await fetch("/api/notifications?action=admin-delete", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session-token": token },
          body: JSON.stringify({ id }),
        });
        if (!r.ok) {
          if (btnEl) { btnEl.disabled = false; btnEl.textContent = "Delete"; }
          alert("Couldn't delete. Try again.");
          return;
        }
        // Reload the list so the deleted row disappears immediately.
        loadInboxNotifications();
      } catch (err) {
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = "Delete"; }
        alert("Network error. Try again.");
      }
    }
    window.deleteInboxNotification = deleteInboxNotification;

    // Returns the currently chosen delivery mode: "push" (push + inbox) or
    // "inbox" (inbox only, no phone interruption). Falls back to "push"
    // so the form's default behavior is unchanged for old admins.
    function getPushMode() {
      const inbox = document.getElementById("push-mode-inbox");
      return (inbox && inbox.checked) ? "inbox" : "push";
    }

    // Hide/show the recipients picker based on the chosen delivery mode.
    // Inbox-only mode doesn't need recipients since the inbox is visible to
    // every member by design. Also updates the send button label so it
    // reflects what the click will actually do.
    function updatePushMode() {
      const mode = getPushMode();
      const recipientsEl = document.getElementById("push-recipients-section");
      const sendBtn = document.getElementById("push-send-btn");
      if (recipientsEl) recipientsEl.style.display = mode === "inbox" ? "none" : "";
      if (sendBtn) sendBtn.textContent = mode === "inbox" ? "Save to inbox" : "Send notification";
    }
    window.updatePushMode = updatePushMode;

    async function sendBulkPush() {
      const status = document.getElementById("push-test-status");
      const token = localStorage.getItem(STORAGE_KEY);
      const sendBtn = document.getElementById("push-send-btn");
      if (!token) {
        status.textContent = "Session expired. Refresh the page and try again.";
        return;
      }
      const mode = getPushMode();
      const checked = Array.from(document.querySelectorAll(".push-recipient:checked"));
      // Inbox-only mode skips the recipients check entirely — the inbox is
      // visible to every member regardless of push subscription state.
      if (mode === "push" && checked.length === 0) {
        status.textContent = "Pick at least one recipient first.";
        return;
      }
      if (!selectedPushKey) {
        status.textContent = "Pick a message above.";
        return;
      }
      const body = {
        userIds: mode === "inbox" ? [] : checked.map(cb => cb.value),
        // Always save to inbox — that's the whole point of these team
        // announcements being durable. Inbox-only mode skips push;
        // push+inbox mode does both.
        alsoSaveToInbox: true,
        // Optional tap-to-go destination. null when no action is chosen.
        ctaUrl: buildCtaUrl(),
        ctaLabel: buildCtaLabel(),
      };
      if (selectedPushKey === "custom") {
        const title = document.getElementById("push-custom-title").value.trim();
        const bodyText = document.getElementById("push-custom-body").value.trim();
        if (!title) { status.textContent = "Custom title is required."; return; }
        body.payload = { title, body: bodyText };
      } else {
        body.key = selectedPushKey;
      }
      sendBtn.disabled = true;
      status.textContent = mode === "inbox"
        ? "Saving to inbox…"
        : "Sending to " + checked.length + " recipient" + (checked.length === 1 ? "" : "s") + "…";
      try {
        const r = await fetch("/api/push?action=send", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session-token": token },
          body: JSON.stringify(body),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          status.textContent = "Send failed: " + (data.error || ("HTTP " + r.status));
          return;
        }
        if (mode === "inbox") {
          status.innerHTML = "Saved to inbox. Every member will see it next time they open the bell icon in the Field.";
          loadInboxNotifications(); // refresh the manage list so the new row is visible immediately
        } else {
          const reached = data.usersReached || 0;
          const noDevices = data.usersWithNoDevices || 0;
          let msg = "Sent to <strong>" + (data.totalSent || 0) + "</strong> device" + ((data.totalSent || 0) === 1 ? "" : "s") + " across <strong>" + reached + "</strong> member" + (reached === 1 ? "" : "s") + ".";
          if (noDevices > 0) msg += " " + noDevices + " selected member" + (noDevices === 1 ? "" : "s") + " had no active subscriptions.";
          if (data.savedToInbox) msg += " <span style=\"color: var(--text-mute); font-style: italic;\">Also saved to the inbox for everyone.</span>";
          status.innerHTML = msg;
          loadPushSubscribers(); // refresh last-sent timestamps
        }
      } catch (err) {
        status.textContent = "Network error: " + (err.message || err);
      } finally {
        sendBtn.disabled = false;
      }
    }

    window.togglePushSelectAll = togglePushSelectAll;
    window.selectPushMessage = selectPushMessage;
    window.updateCustomPreview = updateCustomPreview;
    window.sendBulkPush = sendBulkPush;

    // Expose for inline onclick handlers
    window.loadMetrics = loadMetrics;
    window.onPreset = onPreset;
    window.onApplyCustom = onApplyCustom;

    loadMetrics();
  </script>
</body>
</html>
