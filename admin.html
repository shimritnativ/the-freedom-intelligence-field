        // Prefer CTA clicks column when we have CTA data; fall back to
        // scrolled-to-checkout for old data from before the click tracker.
        const useCtaCol = (c.cta_clicks || 0) > 0 || (c.checkout_scrolls || 0) === 0;
        const middleColValue = useCtaCol ? (c.cta_clicks || 0) : (c.checkout_scrolls || 0);
        const funnelCells = showFunnelCols ? `
            <td data-label="Visits" class="num">${num(c.visits)}</td>
            <td data-label="${useCtaCol ? 'CTA clicks' : 'Scrolled'}" class="num">${num(middleColValue)}</td>
            <td data-label="Abandoned" class="num">${num(c.abandoned_cart)}</td>` : '';
        return `
          <tr>
            <td data-label="Campaign">${escapeHtml(c.name)}</td>
            <td data-label="Status">${statusBadge}</td>
            <td data-label="Spend" class="num">${cur(c.spend)}</td>
            <td data-label="Clicks" class="num">${num(c.clicks)}</td>
            <td data-label="CTR" class="num">${pct(c.ctr)}</td>
            <td data-label="CPC" class="num">${cur(c.cpc)}</td>${funnelCells}
            <td data-label="Signups" class="num">${num(c.signups_attributed)}</td>
            <td data-label="Cost/signup" class="num">${orDash(c.cost_per_signup, cur)}</td>
            <td data-label="ROAS" class="num">${orDash(c.roas, (v) => v.toFixed(2) + "×")}</td>
          </tr>`;
      }).join("");
      // Pick the header label based on whether any campaign has CTA data.
      const anyCtaData = (data.campaigns || []).some(c => (c.cta_clicks || 0) > 0);
      const middleColHeader = anyCtaData ? "CTA clicks" : "Scrolled";
      const funnelHeaders = showFunnelCols ? `
                  <th class="num">Visits</th>
                  <th class="num">${middleColHeader}</th>
                  <th class="num">Abandoned</th>` : '';

      // Footnote when the ads-LP headline (which counts real ads-LP activity
      // regardless of utm_campaign) exceeds the sum of per-campaign attribution.
      // The gap represents ads-LP clicks with no utm_campaign in the URL —
      // usually direct navigation, bookmarks, or ads where the passthrough
      // dropped the campaign param. Shown so headline + attribution reconcile.
      const unattributedClicks = (data.totals && data.totals.unattributed_cta_clicks) || 0;
      const unattributedVisits = (data.totals && data.totals.unattributed_visits) || 0;
      const unattributedFooter = (unattributedClicks > 0 || unattributedVisits > 0)
        ? `<div style="margin-top: 8px; font-size: 11px; color: var(--text-mute); font-style: italic;">Not shown per campaign: ${num(unattributedVisits)} visit${unattributedVisits === 1 ? '' : 's'} and ${num(unattributedClicks)} CTA click${unattributedClicks === 1 ? '' : 's'} that reached the ads LP without a utm_campaign tag (direct navigation, bookmarks, or dropped ad passthrough).</div>`
        : '';
      const campaignTable = data.campaigns && data.campaigns.length > 0
        ? `<div style="overflow-x: auto;">
            <table>
              <thead>
                <tr>
                  <th>Campaign</th>
                  <th>Status</th>
                  <th class="num">Spend</th>
                  <th class="num">Clicks</th>
                  <th class="num">CTR</th>
                  <th class="num">CPC</th>${funnelHeaders}
                  <th class="num">Signups</th>
                  <th class="num">Cost/signup</th>
                  <th class="num">ROAS</th>
                </tr>
              </thead>
              <tbody>${campaignRows}</tbody>
            </table>
          </div>${unattributedFooter}`
        : '<div class="empty-state">No campaign data for this range.</div>';

      // Daily series — text bars, since adding a chart lib is overkill
      // for this MVP. Each day shows spend + signups side by side with
      // proportional bar widths.
      const dailyMaxSpend = Math.max(1, ...(data.daily || []).map((d) => d.spend));
      const dailyMaxSignups = Math.max(1, ...(data.daily || []).map((d) => d.signups));
      const dailyRows = (data.daily || []).slice().reverse().map((d) => {
        const spendPct = (d.spend / dailyMaxSpend) * 100;
        const signupPct = (d.signups / dailyMaxSignups) * 100;
        return `
          <div style="display: grid; grid-template-columns: 90px 1fr 80px 1fr 50px; gap: 10px; align-items: center; padding: 6px 0; border-top: 1px solid var(--border); font-size: 12.5px;">
            <span style="color: var(--text-dim);">${escapeHtml(d.date)}</span>
            <span style="position: relative; height: 16px; background: var(--bg-warm); border-radius: 4px; overflow: hidden;">
              <span style="position: absolute; inset: 0; width: ${spendPct}%; background: var(--gold-soft);"></span>
              <span style="position: relative; padding-left: 6px; font-size: 11px; line-height: 16px; color: var(--text);">${cur(d.spend)}</span>
            </span>
            <span style="color: var(--text-mute); font-size: 11px;">${num(d.clicks)} clicks</span>
            <span style="position: relative; height: 16px; background: var(--bg-warm); border-radius: 4px; overflow: hidden;">
              <span style="position: absolute; inset: 0; width: ${signupPct}%; background: rgba(122, 174, 94, 0.25);"></span>
              <span style="position: relative; padding-left: 6px; font-size: 11px; line-height: 16px; color: var(--text);">${num(d.signups)}</span>
            </span>
            <span style="color: var(--text-mute); font-size: 11px;">signups</span>
          </div>`;
      }).join("");

      const dailyBlock = data.daily && data.daily.length > 0
        ? `<h3 style="font-family: Georgia, serif; font-style: italic; font-weight: 500; font-size: 16px; margin: 24px 0 12px;">Daily breakdown</h3>${dailyRows}`
        : '';

      const filterNote = data._filtered
        ? `<span style="color: var(--gold); font-weight: 600; font-style: normal;">Filtered: ${data._filtered_count} of ${data._total_count} campaigns</span> · `
        : '';
      const accountNote = `<div style="margin-top: 18px; font-size: 11px; color: var(--text-mute); font-style: italic;">${filterNote}${escapeHtml(data.range.label)} (${escapeHtml(data.range.from)} → ${escapeHtml(data.range.to)}) · Meta account ${escapeHtml(data.meta.account_id)} · fetched ${new Date(data.meta.fetched_at).toLocaleTimeString()}</div>`;

      // Soft warning if some Meta API calls failed but others worked.
      let warningBlock = '';
      if (Array.isArray(data.partial_errors) && data.partial_errors.length > 0) {
        const items = data.partial_errors.map(e =>
          `<li><strong>${escapeHtml(e.label)}:</strong> ${escapeHtml(e.message || 'unknown')}</li>`
        ).join('');
        warningBlock = `
          <div class="empty-state" style="text-align: left; padding: 14px 18px; background: rgba(217, 163, 90, 0.08); border-color: rgba(217, 163, 90, 0.3); color: var(--text); font-size: 12.5px; line-height: 1.6; margin-bottom: 18px;">
            <strong style="color: var(--warning, #9A5A10);">Heads up:</strong> some Meta API calls didn't return.
            <ul style="margin: 8px 0 0; padding-left: 22px;">${items}</ul>
          </div>`;
      }

      // Organic landing-page section. Same shape as the Meta funnel
      // above but pulled from the organic LP only (no ad spend, no
      // impressions/CPC/CTR — just visits → CTA clicks → purchases).
      // Hidden when no organic data exists in the date range.
      const organicBlock = (function() {
        const o = data.organic;
        if (!o) return '';
        const hasData = (o.visits || 0) > 0 || (o.cta_clicks || 0) > 0 || (o.purchases || 0) > 0;
        if (!hasData) return '';
        const orgRevenue = (o.revenue_cents || 0) / 100;
        const dailyOrgRows = (o.daily || [])
          .filter(d => (d.visits || 0) > 0 || (d.cta_clicks || 0) > 0 || (d.purchases || 0) > 0)
          .map(d => `
            <div style="display: grid; grid-template-columns: 90px 1fr 90px 90px 90px; gap: 12px; padding: 6px 0; font-size: 12px; color: var(--text); align-items: center;">
              <span style="color: var(--text-dim); font-family: monospace;">${escapeHtml(d.date)}</span>
              <span style="color: var(--text-mute); font-size: 11px;">${num(d.visits)} visits</span>
              <span style="color: var(--text); font-size: 11px;">${num(d.cta_clicks)} CTA</span>
              <span style="color: var(--text); font-size: 11px;">${num(d.purchases)} sales</span>
              <span style="color: var(--gold); font-size: 11px;">${cur((d.revenue_cents || 0) / 100)}</span>
            </div>`).join('');

        return `
          <div style="margin-top: 36px; padding-top: 24px; border-top: 1px solid var(--gold-line);">
            <div style="display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px;">
              <span style="font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold);">Organic Landing Page</span>
            </div>
            <h2 style="font-family: Georgia, serif; font-style: italic; font-weight: 500; margin: 0 0 18px;">Free traffic to /the-power-reset</h2>

            <div class="kpi-grid" style="margin-bottom: 22px;">
              <div class="kpi">
                <div class="kpi-label">Page visits${help(
                  'Organic page visits',
                  "Unique people who landed on the organic Power Reset page (no ad paid for them). Comes from email, word-of-mouth, social shares, or direct URL.",
                  "This is your 'free' traffic. Growing it = building audience without paid spend."
                )}</div>
                <div class="kpi-value">${num(o.visits)}</div>
                <div class="kpi-sub">organic traffic</div>
              </div>
              <div class="kpi kpi--accent">
                <div class="kpi-label">CTA clicks${help(
                  'Organic CTA clicks',
                  "Visitors who clicked a 'Buy now' button on the organic landing page. Tracks how engaged your warm/organic audience is with the offer.",
                  "Organic CTAs usually convert higher than ad CTAs because they're warmer leads."
                )}</div>
                <div class="kpi-value">${num(o.cta_clicks)}</div>
                <div class="kpi-sub">${o.cta_to_visit_rate !== null ? pct(o.cta_to_visit_rate) + ' of visits' : '—'}</div>
              </div>
              <div class="kpi kpi--accent">
                <div class="kpi-label">Purchases${help(
                  'Organic purchases',
                  "Actual Power Reset sales from the organic LP. Real money in. Each buyer is your most engaged audience — they came without ad influence.",
                  "These buyers convert to Unlimited at higher rates than ad-driven buyers. Worth personal outreach."
                )}</div>
                <div class="kpi-value">${num(o.purchases)}</div>
                <div class="kpi-sub">${o.purchase_to_visit_rate !== null ? pct(o.purchase_to_visit_rate) + ' of visits' : '—'}</div>
              </div>
              <div class="kpi kpi--accent">
                <div class="kpi-label">Abandoned cart${help(
                  'Organic abandoned cart',
                  "Organic visitors who clicked CTA but didn't buy. Often happens when there's payment friction or surprise pricing on the checkout page.",
                  "Less common in organic than paid. If high, the cart page itself is the problem."
                )}</div>
                <div class="kpi-value">${num(o.abandoned_cart)}</div>
                <div class="kpi-sub">clicked CTA, didn't buy</div>
              </div>
              <div class="kpi">
                <div class="kpi-label">Revenue (ex VAT)${help(
                  'Organic revenue',
                  "Total money The Field earned from organic Power Reset buyers (excluding VAT). This is recurring with no ongoing cost — your highest-margin channel.",
                  "Grow this with email nurture, content marketing, and referral programs."
                )}</div>
                <div class="kpi-value">${cur(orgRevenue)}</div>
                <div class="kpi-sub">net, organic only</div>
              </div>
              <div class="kpi">
                <div class="kpi-label">CTA → purchase${help(
                  'Organic CTA → Purchase rate',
                  "Of organic visitors who clicked a CTA, what % actually bought? This is the strongest signal of how good your offer is for warm audiences.",
                  "Healthy organic CTA→Purchase is 30-50%+. Below 15% means the checkout flow is broken."
                )}</div>
                <div class="kpi-value">${o.purchase_to_cta_rate !== null ? pct(o.purchase_to_cta_rate) : '—'}</div>
                <div class="kpi-sub">of CTA clicks bought</div>
              </div>
            </div>

            <div style="background: var(--bg-warm); border: 1px solid var(--gold-line); border-radius: 12px; padding: 18px 22px; margin-bottom: 22px;">
              <div style="font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px;">Organic funnel</div>
              <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; align-items: stretch;">
                <div style="text-align: center; padding: 14px; border-radius: 10px; box-sizing: border-box; min-height: 110px; display: flex; flex-direction: column; justify-content: center; background: var(--panel); border: 1px solid var(--border);">
                  <div style="font-family: Georgia, serif; font-size: 28px; font-weight: 600; color: var(--text); line-height: 1.1;">${num(o.visits)}</div>
                  <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px;">Page visits</div>
                  <div style="font-size: 11px; color: transparent; margin-top: 2px;">&nbsp;</div>
                </div>
                <div style="text-align: center; padding: 14px; border-radius: 10px; box-sizing: border-box; min-height: 110px; display: flex; flex-direction: column; justify-content: center; background: var(--panel); border: 1px solid var(--border);">
                  <div style="font-family: Georgia, serif; font-size: 28px; font-weight: 600; color: var(--text); line-height: 1.1;">${num(o.cta_clicks)}</div>
                  <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px;">CTA clicks</div>
                  <div style="font-size: 11px; color: var(--gold); margin-top: 2px;">${o.cta_to_visit_rate !== null ? pct(o.cta_to_visit_rate) + ' of visits' : '—'}</div>
                </div>
                <div style="text-align: center; padding: 14px; border-radius: 10px; box-sizing: border-box; min-height: 110px; display: flex; flex-direction: column; justify-content: center; background: var(--gold-soft); border: 1px solid var(--gold);">
                  <div style="font-family: Georgia, serif; font-size: 28px; font-weight: 600; color: var(--text); line-height: 1.1;">${num(o.purchases)}</div>
                  <div style="font-size: 11px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px;">Purchased</div>
                  <div style="font-size: 11px; color: var(--gold); margin-top: 2px;">${o.purchase_to_cta_rate !== null ? pct(o.purchase_to_cta_rate) + ' of CTA clicks' : '—'}</div>
                </div>
              </div>
            </div>

            ${renderCtaBreakdown(o.cta_breakdown)}

            ${dailyOrgRows ? `
              <h3 style="font-family: Georgia, serif; font-style: italic; font-weight: 500; font-size: 16px; margin: 24px 0 12px;">Daily breakdown (organic)</h3>
              ${dailyOrgRows}` : ''}
          </div>`;
      })();

      return warningBlock + kpis + funnelBlock + ctaBreakdownBlock + perAdBlock + campaignTable + dailyBlock + organicBlock + accountNote;
    }

    // Range / refresh / dates / campaign chips — all delegated so the
    // listeners survive admin re-renders (the topbar gets re-rendered
    // every time refreshDashboard runs, which would wipe direct binds).
    document.body.addEventListener("click", (e) => {
      // Preset range buttons → clear custom dates, reload
      const rangeBtn = e.target.closest(".ads-range-btn");
      if (rangeBtn) {
        _adsRange = rangeBtn.dataset.range || "7d";
        _adsCustomFrom = null;
        _adsCustomTo = null;
        document.querySelectorAll(".ads-range-btn").forEach((b) => b.classList.toggle("ads-range-btn--active", b === rangeBtn));
        const fromInput = document.getElementById("ads-date-from");
        const toInput = document.getElementById("ads-date-to");
        if (fromInput) fromInput.value = "";
        if (toInput) toInput.value = "";
        loadAdsMetrics();
        return;
      }
      // Custom date "Apply" button
      if (e.target.closest("#ads-apply-dates")) {
        const fromInput = document.getElementById("ads-date-from");
        const toInput = document.getElementById("ads-date-to");
        const from = fromInput && fromInput.value;
        const to = toInput && toInput.value;
        if (!from || !to) {
          alert("Pick both a 'from' and a 'to' date.");
          return;
        }
        if (from > to) {
          alert("'From' date must be on or before 'to' date.");
          return;
        }
        _adsCustomFrom = from;
        _adsCustomTo = to;
        // Clear preset highlight since custom is now active
        document.querySelectorAll(".ads-range-btn").forEach((b) => b.classList.remove("ads-range-btn--active"));
        loadAdsMetrics();
        return;
      }
      if (e.target.closest("#ads-refresh-btn")) {
        loadAdsMetrics();
        return;
      }
      // Campaign chip toggle
      const chip = e.target.closest(".ads-campaign-chip");
      if (chip) {
        const id = chip.dataset.campaignId;
        if (!_adsSelectedCampaigns) _adsSelectedCampaigns = new Set();
        if (_adsSelectedCampaigns.has(id)) {
          _adsSelectedCampaigns.delete(id);
        } else {
          _adsSelectedCampaigns.add(id);
        }
        chip.classList.toggle("ads-campaign-chip--on");
        rerenderAdsContent();
        return;
      }
      // "All" / "None" campaign quick-toggles
      if (e.target.closest("#ads-campaign-all") && _adsLastData) {
        _adsSelectedCampaigns = new Set((_adsLastData.campaigns || []).map(c => c.id));
        renderAdsCampaignFilter(_adsLastData.campaigns || []);
        rerenderAdsContent();
        return;
      }
      if (e.target.closest("#ads-campaign-none") && _adsLastData) {
        _adsSelectedCampaigns = new Set();
        renderAdsCampaignFilter(_adsLastData.campaigns || []);
        rerenderAdsContent();
        return;
      }
    });

    // Submit the manual purchase form to /api/admin/manual-purchase.
    // Used to log a ThriveCart payment that never reached our webhook,
    // so the dashboard's revenue numbers catch up immediately.
    async function runManualPurchase() {
      const status = document.getElementById("mp-status");
      const btn = document.getElementById("mp-btn");
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) {
        status.textContent = "Session expired. Refresh the page and try again.";
        return;
      }
      const thrivecartId = (document.getElementById("mp-thrivecart-id").value || "").trim();
      const email = (document.getElementById("mp-email").value || "").trim().toLowerCase();
      const productName = (document.getElementById("mp-product").value || "").trim();
      const amountEuros = Number(document.getElementById("mp-amount").value || 0);
      const couponCode = (document.getElementById("mp-coupon").value || "").trim() || null;
      const eventType = document.getElementById("mp-event-type").value || "order.success";

      if (!thrivecartId) { status.textContent = "Invoice ID is required."; return; }
      if (!email || !email.includes("@")) { status.textContent = "Valid email is required."; return; }
      if (!productName) { status.textContent = "Product name is required."; return; }
      if (!isFinite(amountEuros) || amountEuros < 0) { status.textContent = "Amount must be a positive number."; return; }

      btn.disabled = true;
      status.textContent = "Saving…";
      try {
        const r = await fetch("/api/admin/manual-purchase", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session-token": token },
          body: JSON.stringify({
            thrivecart_id: thrivecartId,
            event_type: eventType,
            email,
            product_name: productName,
            amount_cents: Math.round(amountEuros * 100),
            currency: "EUR",
            coupon_code: couponCode,
            notes: "Entered via admin manual-purchase form",
          }),
        });
        if (!r.ok) {
          const errBody = await r.text().catch(() => "");
          status.textContent = "Save failed (HTTP " + r.status + "). " + errBody.slice(0, 200);
          return;
        }
        const data = await r.json();
        if (data.already_existed) {
          status.innerHTML = "This purchase was already on file (idempotent skip). Existing row: <strong>"
            + thrivecartId + "</strong> · " + email + ".";
        } else {
          status.innerHTML = "Saved. Revenue numbers will pick this up on the next refresh.";
          // Clear form so a second entry doesn't accidentally re-submit the same one.
          document.getElementById("mp-thrivecart-id").value = "";
          document.getElementById("mp-email").value = "";
          document.getElementById("mp-product").value = "";
          document.getElementById("mp-amount").value = "";
          document.getElementById("mp-coupon").value = "";
          // Refresh metrics so the new total shows immediately.
          setTimeout(() => loadMetrics(), 1200);
        }
      } catch (err) {
        status.textContent = "Network error: " + (err.message || err);
      } finally {
        btn.disabled = false;
      }
    }
    window.runManualPurchase = runManualPurchase;

    // ===== Members roster filtering + pagination =====
    // The backend (metrics.js) now returns ALL members in this range
    // (no LIMIT 25). We filter and paginate entirely client-side so
    // every keystroke in the search box feels instant. For thousands of
    // members this stays fast — filtering an array of a few thousand
    // objects is sub-millisecond in any browser.
    const ROSTER_PAGE_SIZE = 25;
    let rosterPage = 0;
    function readRosterFilters() {
      return {
        q: (document.getElementById("roster-search")?.value || "").trim().toLowerCase(),
        tier: document.getElementById("roster-filter-tier")?.value || "",
        plan: document.getElementById("roster-filter-plan")?.value || "",
        spent: document.getElementById("roster-filter-spent")?.value || "",
        day: document.getElementById("roster-filter-day")?.value || "",
        login: document.getElementById("roster-filter-login")?.value || "",
      };
    }
    function applyRosterFilters(rows, f) {
      return rows.filter(u => {
        if (f.q) {
          const hay = ((u.email || "") + " " + (u.display_name || "")).toLowerCase();
          if (!hay.includes(f.q)) return false;
        }
        if (f.tier && u.tier !== f.tier) return false;
        if (f.plan) {
          const plan = u.subscription_plan || "none";
          if (plan !== f.plan) return false;
        }
        if (f.spent === "paid" && !(Number(u.total_spent_cents || 0) > 0)) return false;
        if (f.spent === "unpaid" && Number(u.total_spent_cents || 0) > 0) return false;
        if (f.day !== "" && String(u.last_completed_day || 0) !== f.day) return false;
        if (f.login === "logged_in" && !u.first_login_at) return false;
        if (f.login === "never" && u.first_login_at) return false;
        return true;
      });
    }
    function renderRoster() {
      const tbody = document.getElementById("roster-tbody");
      const pager = document.getElementById("roster-pagination");
      const title = document.getElementById("roster-title");
      if (!tbody) return;
      const all = (state.data && state.data.recentSignups) || [];
      const filtered = applyRosterFilters(all, readRosterFilters());

      // Reset to page 0 if the current page would be empty after a filter change.
      const totalPages = Math.max(1, Math.ceil(filtered.length / ROSTER_PAGE_SIZE));
      if (rosterPage >= totalPages) rosterPage = 0;
      const start = rosterPage * ROSTER_PAGE_SIZE;
      const slice = filtered.slice(start, start + ROSTER_PAGE_SIZE);

      if (title) {
        if (filtered.length === all.length) {
          title.textContent = `Every member in this range (${all.length})`;
        } else {
          title.textContent = `Showing ${filtered.length} of ${all.length} members`;
        }
      }

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty-state">No members match these filters.</td></tr>';
        pager.innerHTML = "";
        return;
      }

      // Format a member's traffic source from their utm fields. Output is
      // short and human-readable (e.g., "Meta · cold · reel3", "Email",
      // "Organic / Direct"). Hover tooltip carries the full breakdown.
      const formatSource = (u) => {
        const src = (u.utm_source || "").toLowerCase();
        const camp = (u.utm_campaign || "").toLowerCase();
        const content = u.utm_content || "";
        // Meta ad detection: known campaign tags from the live ad URLs.
        if (camp === "cold" || camp === "warm" || src === "power-reset" || src === "meta" || src === "facebook" || src === "instagram") {
          let label = "Meta · " + (camp || src);
          if (content) label += " · " + content;
          return `<span title="${escapeHtml('utm_source=' + (u.utm_source || '') + ', utm_campaign=' + (u.utm_campaign || '') + ', utm_content=' + (u.utm_content || ''))}" style="color: var(--gold); font-weight: 600;">${escapeHtml(label)}</span>`;
        }
        // Email
        if (src.includes("email") || src.includes("newsletter") || src.includes("klaviyo") || src.includes("mailchimp") || src.includes("kajabi")) {
          return `<span title="${escapeHtml('utm_source=' + (u.utm_source || '') + ', utm_campaign=' + (u.utm_campaign || ''))}" style="color: var(--text);">Email${camp ? ' · ' + escapeHtml(camp) : ''}</span>`;
        }
        // Other tracked
        if (src || camp) {
          return `<span title="${escapeHtml('utm_source=' + (u.utm_source || '') + ', utm_campaign=' + (u.utm_campaign || ''))}" style="color: var(--text);">${escapeHtml(src || camp)}</span>`;
        }
        // Organic / Direct
        return `<span style="color: var(--text-mute);">Organic</span>`;
      };

      // Build the hover tooltip body for a member's purchases. Returns
      // an HTML string containing one row per purchase with product +
      // paid amount + coupon code if any. Empty string if no purchases
      // (the orders count is 0 anyway in that case).
      const buildOrdersTooltip = (u) => {
        let purchases = u.purchases_json;
        if (!purchases) return "";
        if (typeof purchases === "string") {
          try { purchases = JSON.parse(purchases); } catch { return ""; }
        }
        if (!Array.isArray(purchases) || purchases.length === 0) return "";
        const items = purchases.map(p => {
          const product = escapeHtml(p.product || "Unknown");
          const amount = Number(p.amount_cents || 0);
          const eur = amount > 0 ? `€${(amount / 100).toFixed(2)}` : "Free";
          const coupon = p.coupon ? `<div class="orders-tooltip-item-coupon">${escapeHtml(p.coupon)}</div>` : "";
          return `<div class="orders-tooltip-item"><div><div class="orders-tooltip-item-product">${product}</div>${coupon}</div><div class="orders-tooltip-item-amount">${eur}</div></div>`;
        }).join('<div class="orders-tooltip-divider"></div>');
        return `<div class="orders-tooltip">${items}</div>`;
      };

      tbody.innerHTML = slice.map(u => {
        const spent = Number(u.total_spent_cents || 0);
        const refunded = Number(u.total_refund_cents || 0);
        const count = Number(u.purchase_count || 0);
        const tooltipHtml = buildOrdersTooltip(u);
        const ordersBadge = tooltipHtml
          ? `<span class="orders-hover" style="color: var(--text-mute); font-weight: 400; font-size: 11px; margin-left: 6px;">${count} order${count === 1 ? '' : 's'}${tooltipHtml}</span>`
          : `<span style="color: var(--text-mute); font-weight: 400; font-size: 11px; margin-left: 6px;">${count} order${count === 1 ? '' : 's'}</span>`;
        // REFUNDED pill: show whenever the member has ANY refund on file.
        // Full refund (refunded >= spent) → strong red pill and struck-
        // through spent amount. Partial refund → softer amber pill so Geo
        // can see the member still has non-refunded revenue.
        const isFullRefund = refunded > 0 && refunded >= spent;
        const isPartialRefund = refunded > 0 && refunded < spent;
        const refundPill = isFullRefund
          ? `<span style="display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; background: rgba(192,58,43,0.14); color: var(--red, #C03A2B); margin-left: 6px; white-space: nowrap;" title="All purchases refunded. Net revenue: €0.">Refunded</span>`
          : isPartialRefund
            ? `<span style="display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; background: rgba(234,158,64,0.16); color: #B27510; margin-left: 6px; white-space: nowrap;" title="Partial refund of ${fmtRev(refunded)}.">Partial refund</span>`
            : '';
        const spentDisplay = spent > 0
          ? (isFullRefund
              ? `<span style="text-decoration: line-through; color: var(--text-mute);">${fmtRev(spent)}</span>`
              : fmtRev(spent))
          : null;
        const spentCell = spentDisplay
          ? `${spentDisplay}${ordersBadge}${refundPill}`
          : '<span style="color: var(--text-mute);">—</span>';
        // Each <td> has an explicit data-label so the mobile stacked-card
        // layout shows the column name in front of each value. (Without
        // this, the CSS ::before { content: attr(data-label) } renders
        // empty and the flex justify-content: space-between pushes all
        // data right, leaving a blank left side — the "weird member list"
        // bug Geo reported.)
        return `
          <tr>
            <td data-label="Email">${escapeHtml(u.email)}</td>
            <td data-label="Name">${(() => {
              const dbName = u.display_name && String(u.display_name).trim();
              const shown = nameOrFallback(u);
              const isFallback = !dbName; // came from email-prefix humanization
              // Contenteditable inline editor. Click to focus, type,
              // Enter to save (or click away). Esc reverts. All the
              // handlers live on window.* so onclick/onblur can reach
              // them from generated HTML.
              return `<span
                class="name-editable ${isFallback ? 'name-editable--fallback' : ''}"
                contenteditable="true"
                spellcheck="false"
                title="Click to edit, Enter to save, Esc to cancel"
                data-email="${escapeHtml(u.email || '')}"
                data-original="${escapeHtml(shown || '')}"
                onfocus="selectMemberNameOnFocus(this)"
                onblur="saveMemberName(this)"
                onkeydown="handleMemberNameKey(event, this)"
              >${escapeHtml(shown)}</span>`;
            })()}</td>
            <td data-label="Tier"><span class="tier-badge ${u.tier === 'full' ? 'tier-full' : 'tier-preview'}">${escapeHtml(tierLabel(u.tier))}</span></td>
            <td class="num" data-label="Spent">${spentCell}</td>
            <td data-label="Source">${formatSource(u)}</td>
            <td class="date-cell" data-label="Joined">${fmtDate(u.created_at)}</td>
            <td class="date-cell" data-label="1st login">${u.first_login_at ? fmtDate(u.first_login_at) : "—"}</td>
            <td class="num" data-label="Day">${u.last_completed_day || 0}</td>
            <td class="roster-actions-cell" data-label="Actions" style="text-align: right; white-space: nowrap;">
              ${u.tier === 'preview'
                ? `<button type="button" class="roster-action-btn" title="Extend Reset preview window" data-action="extend-preview" data-email="${escapeHtml(u.email || '')}" data-name="${escapeHtml(nameOrFallback(u) || '')}">Extend</button>`
                : '<span style="color: var(--text-mute); font-size: 11px;">—</span>'
              }
            </td>
          </tr>
        `;
      }).join("");

      // Safety net: also fire applyMobileTableLabels in case JS-rendered
      // tables elsewhere were missed. Cheap re-run, idempotent.
      if (typeof window.applyMobileTableLabels === 'function') {
        try { window.applyMobileTableLabels(); } catch {}
      }

      // Pagination footer. Shows "1-25 of 138 · Prev | Page X of N | Next"
      // and disables prev/next at the boundaries.
      const from = start + 1;
      const to = Math.min(start + ROSTER_PAGE_SIZE, filtered.length);
      pager.innerHTML = `
        <span>Showing <strong>${from}-${to}</strong> of <strong>${filtered.length}</strong></span>
        <span style="display: flex; gap: 6px;">
          <button class="preset-btn" id="roster-prev" style="font-size: 11px; padding: 6px 12px;" ${rosterPage === 0 ? 'disabled' : ''}>‹ Prev</button>
          <span style="padding: 6px 4px;">Page ${rosterPage + 1} of ${totalPages}</span>
          <button class="preset-btn" id="roster-next" style="font-size: 11px; padding: 6px 12px;" ${rosterPage + 1 >= totalPages ? 'disabled' : ''}>Next ›</button>
        </span>
      `;
      const prev = document.getElementById("roster-prev");
      const next = document.getElementById("roster-next");
      if (prev) prev.onclick = () => { rosterPage = Math.max(0, rosterPage - 1); renderRoster(); };
      if (next) next.onclick = () => { rosterPage = Math.min(totalPages - 1, rosterPage + 1); renderRoster(); };
    }
    window.renderRoster = renderRoster;

    // Wire up the filter inputs via DELEGATED listeners on document.body.
    // Why delegation: renderDashboard rebuilds the entire dashboard DOM
    // on every metrics refresh, which destroys per-element listeners
    // attached on initial load. Delegated listeners survive DOM rebuilds
    // because they live on document.body, not on the inputs themselves.
    // This was the bug Geo hit — filters appeared to do nothing after
    // the first Refresh because their listeners were attached to
    // elements that no longer existed.
    const ROSTER_FILTER_IDS = [
      "roster-search", "roster-filter-tier", "roster-filter-plan",
      "roster-filter-spent", "roster-filter-day", "roster-filter-login",
    ];
    document.body.addEventListener("input", (e) => {
      if (e.target && e.target.id === "roster-search") {
        rosterPage = 0;
        renderRoster();
      }
    });
    document.body.addEventListener("change", (e) => {
      if (e.target && ROSTER_FILTER_IDS.includes(e.target.id) && e.target.id !== "roster-search") {
        rosterPage = 0;
        renderRoster();
      }
    });
    document.body.addEventListener("click", (e) => {
      if (e.target && e.target.id === "roster-clear") {
        ROSTER_FILTER_IDS.forEach(id => {
          const el = document.getElementById(id);
          if (el) el.value = "";
        });
        rosterPage = 0;
        renderRoster();
      }
    });

    // Send a pasted ThriveCart CSV to the reconciliation endpoint and
    // render the list of missing purchases with one-click import buttons
    // per row. Surfaces every paid order that didn't reach our DB.
    let recMissingCache = []; // keep parsed rows in scope for the import-row handlers
    async function runReconcile() {
      const status = document.getElementById("rec-status");
      const results = document.getElementById("rec-results");
      const btn = document.getElementById("rec-btn");
      const csv = document.getElementById("rec-csv").value || "";
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) { status.textContent = "Session expired. Refresh and try again."; return; }
      if (!csv.trim()) { status.textContent = "Paste a ThriveCart CSV first."; return; }
      btn.disabled = true;
      status.textContent = "Diffing CSV against the database…";
      results.innerHTML = "";
      try {
        const r = await fetch("/api/admin/reconcile-thrivecart", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session-token": token },
          body: JSON.stringify({ csv }),
        });
        if (!r.ok) {
          const errBody = await r.text().catch(() => "");
          status.textContent = "Reconcile failed (HTTP " + r.status + "). " + errBody.slice(0, 200);
          return;
        }
        const data = await r.json();
        recMissingCache = data.missing || [];
        const warnLine = (data.parse_warnings && data.parse_warnings.length > 0)
          ? '<div style="color: var(--warning); margin-bottom: 8px;">Parse warnings: ' + escapeHtml(data.parse_warnings.join("; ")) + '</div>'
          : "";
        status.innerHTML = "Found <strong>" + data.total_csv_rows + "</strong> rows in CSV. "
          + "<strong>" + data.in_db + "</strong> already on file. "
          + "<strong>" + data.missing_count + "</strong> missing.";
        if (recMissingCache.length === 0) {
          results.innerHTML = warnLine + '<div style="color: var(--success); font-size: 12px;">All ThriveCart orders are accounted for. Nothing to backfill.</div>';
          return;
        }
        const rowsHtml = recMissingCache.map((m, idx) => {
          const amtEur = (m.amount_cents / 100).toFixed(2);
          return '<tr>'
            + '<td style="padding: 4px 6px; font-family: monospace; font-size: 11px;">' + escapeHtml(m.thrivecart_id) + '</td>'
            + '<td style="padding: 4px 6px; font-size: 11px;">' + escapeHtml(m.email) + '</td>'
            + '<td style="padding: 4px 6px; font-size: 11px;">' + escapeHtml(m.product_name || "—") + '</td>'
            + '<td style="padding: 4px 6px; font-size: 11px; text-align: right;">€' + amtEur + '</td>'
            + '<td style="padding: 4px 6px; font-size: 11px;">' + escapeHtml(m.coupon_code || "—") + '</td>'
            + '<td style="padding: 4px 6px;"><button class="preset-btn" style="font-size: 10px; padding: 4px 8px;" onclick="importMissing(' + idx + ')" id="rec-import-' + idx + '">Import</button></td>'
            + '</tr>';
        }).join("");
        results.innerHTML = warnLine
          + '<div style="margin-bottom: 6px;">'
          + '<button class="preset-btn" onclick="importAllMissing()" id="rec-import-all-btn" style="background: var(--gold); color: var(--dark); border-color: var(--gold);">Import all ' + recMissingCache.length + ' missing</button>'
          + '</div>'
          + '<table style="width: 100%; border-collapse: collapse;">'
          + '<thead><tr style="border-bottom: 1px solid var(--border); text-align: left; font-size: 10px; color: var(--text-dim);">'
          + '<th style="padding: 4px 6px;">Invoice</th><th style="padding: 4px 6px;">Email</th><th style="padding: 4px 6px;">Product</th><th style="padding: 4px 6px; text-align: right;">Amount</th><th style="padding: 4px 6px;">Coupon</th><th></th>'
          + '</tr></thead>'
          + '<tbody>' + rowsHtml + '</tbody></table>';
      } catch (err) {
        status.textContent = "Network error: " + (err.message || err);
      } finally {
        btn.disabled = false;
      }
    }
    window.runReconcile = runReconcile;

    // Import one missing row from the reconcile results. Posts to the
    // same manual-purchase endpoint so the audit trail stays consistent
    // (raw_payload marked as manual entry with the actor email).
    async function importMissing(idx) {
      const m = recMissingCache[idx];
      if (!m) return;
      const btn = document.getElementById("rec-import-" + idx);
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token || !btn) return;
      btn.disabled = true;
      btn.textContent = "Saving…";
      try {
        const r = await fetch("/api/admin/manual-purchase", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session-token": token },
          body: JSON.stringify({
            thrivecart_id: m.thrivecart_id,
            event_type: "order.success",
            email: m.email,
            product_name: m.product_name || "Unknown",
            amount_cents: m.amount_cents,
            currency: m.currency || "EUR",
            coupon_code: m.coupon_code,
            notes: "Imported via ThriveCart CSV reconciliation",
          }),
        });
        if (!r.ok) { btn.textContent = "Failed"; return; }
        const data = await r.json();
        btn.textContent = data.already_existed ? "Already exists" : "Saved ✓";
        btn.style.background = "var(--success-soft)";
        btn.style.color = "var(--success)";
        btn.style.borderColor = "var(--success-soft)";
      } catch (err) {
        btn.textContent = "Error";
      }
    }
    window.importMissing = importMissing;

    // Loop through every missing row sequentially. Sequential rather
    // than parallel so we don't hammer the DB with simultaneous inserts
    // and to keep the per-row button feedback meaningful.
    async function importAllMissing() {
      const btn = document.getElementById("rec-import-all-btn");
      if (!btn) return;
      btn.disabled = true;
      btn.textContent = "Importing…";
      for (let i = 0; i < recMissingCache.length; i++) {
        btn.textContent = "Importing " + (i + 1) + "/" + recMissingCache.length + "…";
        await importMissing(i);
      }
      btn.textContent = "Done — reloading…";
      setTimeout(() => loadMetrics(), 1500);
    }
    window.importAllMissing = importAllMissing;

    // ===== Push notification sender =====
    // Loads subscribers on demand, lets admin pick recipients (one, many, all),
    // pick a prepared reminder OR write custom copy, and fire it.
    const REMINDER_COPY_CLIENT = {
      day2_unlocked: { title: "Day 2 is open ✨", body: "Your Day 1 work is done. Day 2 — Decision & Action — is ready when you are." },
      day2_nudge: { title: "Day 2 is waiting", body: "You started yesterday. The clarity from Day 1 deepens when Day 2 lands today." },
      day3_unlocked: { title: "Day 3 is open ✨", body: "The peak of your Reset. Today the Field takes you into Frequency Calibration — living inside the frequency of what you decided." },
      day3_nudge: { title: "Day 3 is waiting", body: "Frequency Calibration is the last piece. Show up today." },
      window_closing: { title: "Your Reset window closes soon", body: "Less than 12 hours left to complete the 72-Hour Power Reset. The Field is here when you are." },
    };

    let pushSubscribers = [];
    let selectedPushKey = null;
    async function loadPushSubscribers() {
      const list = document.getElementById("push-subscribers-list");
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token || !list) return;
      try {
        const r = await fetch("/api/push?action=subscribers", {
          method: "POST",
          headers: { "x-session-token": token },
        });
        if (!r.ok) {
          list.innerHTML = '<div style="font-size: 12px; color: var(--text-mute); font-style: italic; text-align: center; padding: 8px 0;">Could not load subscribers (HTTP ' + r.status + ').</div>';
          return;
        }
        const data = await r.json();
        pushSubscribers = data.subscribers || [];
        // Expose globally so the engagement panel can render from it.
        window._pushSubscribers = pushSubscribers;
        if (typeof renderNotificationEngagement === "function") renderNotificationEngagement();
        if (pushSubscribers.length === 0) {
          list.innerHTML = '<div style="font-size: 12px; color: var(--text-mute); font-style: italic; text-align: center; padding: 12px 0;">No members have enabled notifications yet.</div>';
          return;
        }
        list.innerHTML = pushSubscribers.map(s => `
          <label style="display: flex; align-items: center; gap: 10px; padding: 6px 4px; cursor: pointer; border-radius: 4px;">
            <input type="checkbox" class="push-recipient" value="${escapeHtml(s.id)}" data-email="${escapeHtml(s.email)}" />
            <div style="flex: 1; min-width: 0;">
              <div style="font-size: 12.5px; color: var(--text); font-weight: 500;">${escapeHtml(s.email)}${s.display_name ? ' <span style="color: var(--text-dim); font-weight: 400;">(' + escapeHtml(s.display_name) + ')</span>' : ''}</div>
              <div style="font-size: 11px; color: var(--text-mute);">${s.devices} device${s.devices === 1 ? '' : 's'} · ${s.tier === 'full' ? 'Unlimited' : 'Power Reset'}${s.last_sent ? ' · last sent ' + fmtRelative(s.last_sent) : ''}</div>
            </div>
          </label>
        `).join("");
      } catch (err) {
        list.innerHTML = '<div style="font-size: 12px; color: var(--text-mute); font-style: italic; text-align: center; padding: 8px 0;">Network error loading subscribers.</div>';
      }
    }

    function togglePushSelectAll() {
      const checked = document.getElementById("push-select-all").checked;
      document.querySelectorAll(".push-recipient").forEach(cb => { cb.checked = checked; });
    }

    function selectPushMessage(key) {
      selectedPushKey = key;
      // Highlight the chosen button
      document.querySelectorAll(".push-msg-btn").forEach(btn => {
        if (btn.dataset.key === key) {
          btn.style.background = "var(--gold)";
          btn.style.color = "var(--dark)";
          btn.style.borderColor = "var(--gold)";
        } else {
          btn.style.background = "";
          btn.style.color = "";
          btn.style.borderColor = "";
        }
      });
      const customForm = document.getElementById("push-custom-form");
      if (key === "custom") {
        customForm.style.display = "";
        updateCustomPreview();
      } else {
        customForm.style.display = "none";
        const copy = REMINDER_COPY_CLIENT[key];
        if (copy) {
          document.getElementById("push-preview-title").textContent = copy.title;
          document.getElementById("push-preview-body").textContent = copy.body;
        }
      }
    }

    function updateCustomPreview() {
      const title = document.getElementById("push-custom-title").value || "(no title)";
      const body = document.getElementById("push-custom-body").value || "(no body)";
      document.getElementById("push-preview-title").textContent = title;
      document.getElementById("push-preview-body").textContent = body;
    }

    // ===== Tap-to-go CTA helpers =====
    // The destination dropdown encodes the chosen action as "type:value":
    //   process:<key>   → /app.html?process=<key>
    //   day:<n>         → /app.html?day=<n>
    //   continue:last   → /app.html?continue=last
    //   url:            → custom external URL (shows the URL input)
    //   (empty)         → no action
    // Show/hide the URL + label inputs based on what's picked.
    function updateCtaForm() {
      const dest = (document.getElementById("push-cta-destination") || {}).value || "";
      const urlEl = document.getElementById("push-cta-url");
      const labelEl = document.getElementById("push-cta-label");
      if (!urlEl || !labelEl) return;
      if (!dest) {
        urlEl.style.display = "none";
        labelEl.style.display = "none";
        return;
      }
      // URL input shown only for the "External URL" option; label is shown
      // for every non-empty destination so the admin can override "Open".
      urlEl.style.display = dest === "url:" ? "" : "none";
      labelEl.style.display = "";
    }
    window.updateCtaForm = updateCtaForm;

    // Resolves the dropdown selection + URL input into the final cta_url
    // string we'll store on the notification. Returns null when no action
    // is set or the input is invalid.
    function buildCtaUrl() {
      const dest = (document.getElementById("push-cta-destination") || {}).value || "";
      if (!dest) return null;
      const [type, value] = dest.split(":");
      if (type === "process") return "/app.html?process=" + encodeURIComponent(value);
      if (type === "day") return "/app.html?day=" + encodeURIComponent(value);
      if (type === "continue") return "/app.html?continue=" + encodeURIComponent(value);
      if (type === "url") {
        const u = (document.getElementById("push-cta-url") || {}).value || "";
        const trimmed = u.trim();
        if (!trimmed) return null;
        // Require https or http to avoid javascript: shenanigans.
        if (!/^https?:\/\//i.test(trimmed)) return null;
        return trimmed;
      }
      return null;
    }

    function buildCtaLabel() {
      const l = (document.getElementById("push-cta-label") || {}).value || "";
      return l.trim() || null; // null lets the Field default to "Open"
    }

    // ===== Manage inbox =====
    // Loads the recent inbox notifications and renders them with delete
    // buttons. Called when the Notifications tab is entered and after a
    // successful send so the new message shows up immediately.
    // ===== Notification engagement =====
    // Renders the engagement panel using the inbox manage list + push
    // subscribers we already loaded. Stats: subscriber count, average
    // read rate across recent notifications, today's activity. Per-row
    // read rate is shown as a bar so the most-engaged messages stand out.
    function renderNotificationEngagement() {
      const stats = document.getElementById("notification-engagement-stats");
      const list = document.getElementById("notification-engagement-list");
      if (!stats || !list) return;

      // Total members for the denominator. Use the same logic as the
      // tier-count KPI so the "X of 13 members read" math is consistent.
      const d = (state && state.data) || {};
      const totalMembers = (d.tierCounts || []).reduce((s, t) => s + Number(t.n || 0), 0) || 1;
      const subscribers = window._pushSubscribers || [];
      const inboxItems = window._inboxNotifications || [];

      // Average read rate across the most recent 10 inbox notifications.
      const recent = inboxItems.slice(0, 10);
      const readRates = recent
        .filter(n => Number(n.read_count) >= 0)
        .map(n => Math.min(100, (Number(n.read_count) / totalMembers) * 100));
      const avgReadRate = readRates.length > 0
        ? readRates.reduce((s, r) => s + r, 0) / readRates.length
        : 0;

      // How many distinct members opened the bell today (proxy: read
      // activity in the last 24h from the notifications list).
      const oneDayAgoMs = Date.now() - 24 * 60 * 60 * 1000;
      const todayReads = inboxItems
        .filter(n => n.created_at && new Date(n.created_at).getTime() >= oneDayAgoMs)
        .reduce((s, n) => s + Number(n.read_count || 0), 0);

      // Stat tiles
      stats.innerHTML = `
        <div style="background: var(--panel); border: 1px solid var(--gold-line); border-radius: 10px; padding: 14px;">
          <div style="font-size: 10px; font-weight: 700; letter-spacing: 0.16em; color: var(--gold); text-transform: uppercase;">Push subscribers</div>
          <div style="font-family: Georgia, serif; font-size: 26px; color: var(--text); margin-top: 4px;">${fmtNum(subscribers.length)}</div>
          <div style="font-size: 11.5px; color: var(--text-dim); margin-top: 2px;">members with push enabled</div>
        </div>
        <div style="background: var(--panel); border: 1px solid var(--gold-line); border-radius: 10px; padding: 14px;">
          <div style="font-size: 10px; font-weight: 700; letter-spacing: 0.16em; color: var(--gold); text-transform: uppercase;">Avg read rate</div>
          <div style="font-family: Georgia, serif; font-size: 26px; color: var(--text); margin-top: 4px;">${avgReadRate.toFixed(0)}%</div>
          <div style="font-size: 11.5px; color: var(--text-dim); margin-top: 2px;">across last ${readRates.length} message${readRates.length === 1 ? '' : 's'}</div>
        </div>
        <div style="background: var(--panel); border: 1px solid var(--gold-line); border-radius: 10px; padding: 14px;">
          <div style="font-size: 10px; font-weight: 700; letter-spacing: 0.16em; color: var(--gold); text-transform: uppercase;">Reads today</div>
          <div style="font-family: Georgia, serif; font-size: 26px; color: var(--text); margin-top: 4px;">${fmtNum(todayReads)}</div>
          <div style="font-size: 11.5px; color: var(--text-dim); margin-top: 2px;">across notifications sent in 24h</div>
        </div>
      `;

      // Per-notification read rate list
      if (recent.length === 0) {
        list.innerHTML = '<div style="color: var(--text-dim); font-style: italic; font-size: 13px;">No notifications saved yet — once you send one to the inbox, engagement stats will appear here.</div>';
        return;
      }
      list.innerHTML = recent.map(n => {
        const reads = Number(n.read_count || 0);
        const pct = totalMembers > 0 ? Math.min(100, (reads / totalMembers) * 100) : 0;
        const barColor = pct >= 70 ? "var(--gold)" : pct >= 40 ? "rgba(154,110,16,0.5)" : "rgba(154,110,16,0.25)";
        return `
          <div style="background: var(--panel); border: 1px solid var(--gold-line); border-radius: 8px; padding: 10px 14px; display: grid; grid-template-columns: 1fr 100px 90px; gap: 12px; align-items: center;">
            <div>
              <div style="font-weight: 600; color: var(--text); font-size: 13px;">${escapeHtml(n.title || "(untitled)")}</div>
              <div style="font-size: 11px; color: var(--text-mute); margin-top: 2px;">${fmtRelative(n.created_at)}</div>
            </div>
            <div style="height: 6px; background: var(--gold-soft); border-radius: 3px; overflow: hidden;">
              <div style="height: 100%; width: ${pct}%; background: ${barColor};"></div>
            </div>
            <div style="text-align: right; font-variant-numeric: tabular-nums;">
              <div style="font-size: 14px; font-weight: 600; color: var(--text);">${pct.toFixed(0)}%</div>
              <div style="font-size: 10.5px; color: var(--text-mute);">${reads}/${totalMembers} read</div>
            </div>
          </div>
        `;
      }).join("");
    }
    window.renderNotificationEngagement = renderNotificationEngagement;

    async function loadInboxNotifications() {
      const container = document.getElementById("inbox-manage-list");
      if (!container) return;
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) return;
      try {
        const r = await fetch("/api/notifications?action=admin-list", {
          headers: { "x-session-token": token },
        });
        if (!r.ok) {
          container.innerHTML = '<div style="color: var(--text-dim); font-style: italic; font-size: 13px;">Couldn\'t load inbox messages.</div>';
          return;
        }
        const data = await r.json();
        const items = data.notifications || [];
        // Expose for the engagement panel.
        window._inboxNotifications = items;
        if (typeof renderNotificationEngagement === "function") renderNotificationEngagement();
        if (items.length === 0) {
          container.innerHTML = '<div style="color: var(--text-dim); font-style: italic; font-size: 13px;">No notifications saved to the inbox yet.</div>';
          return;
        }
        container.innerHTML = items.map(n => {
          // Render the CTA info inline if present. The display label is
          // either the explicit cta_label or "Open"; the URL gives the
          // admin a quick at-a-glance of where the button leads.
          const ctaChip = n.cta_url
            ? `<span style="display: inline-block; background: var(--gold-soft); color: var(--gold); font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px; margin-left: 6px; letter-spacing: 0.04em;">→ ${escapeHtml(n.cta_label || "Open")}</span>`
            : "";
          const ctaUrlLine = n.cta_url
            ? `<div style="font-size: 11px; color: var(--text-mute); margin-top: 2px; word-break: break-all;">${escapeHtml(n.cta_url)}</div>`
            : "";
          return `
            <div style="background: var(--panel); border: 1px solid var(--gold-line); border-radius: 8px; padding: 12px 14px; display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: start;">
              <div style="min-width: 0;">
                <div style="font-weight: 600; color: var(--text); font-size: 13.5px; margin-bottom: 2px;">${escapeHtml(n.title || '')}${ctaChip}</div>
                ${n.body ? `<div style="font-size: 12px; color: var(--text-dim); line-height: 1.45; margin-bottom: 4px;">${escapeHtml(n.body)}</div>` : ''}
                ${ctaUrlLine}
                <div style="font-size: 11px; color: var(--text-mute);">
                  ${fmtRelative(n.created_at)} · read by <strong>${fmtNum(n.read_count || 0)}</strong> member${(n.read_count || 0) === 1 ? '' : 's'}${n.sent_by_email ? ' · from ' + escapeHtml(n.sent_by_email) : ''}
                </div>
              </div>
              <button onclick="deleteInboxNotification('${escapeHtml(n.id)}', this)"
                      style="background: transparent; border: 1px solid var(--gold-line); color: var(--text-dim); padding: 5px 10px; border-radius: 6px; font-family: inherit; font-size: 11px; cursor: pointer; font-weight: 600; white-space: nowrap;"
                      title="Remove this from every member's inbox">
                Delete
              </button>
            </div>
          `;
        }).join("");
      } catch (err) {
        container.innerHTML = '<div style="color: var(--text-dim); font-style: italic; font-size: 13px;">Network error loading inbox.</div>';
      }
    }
    window.loadInboxNotifications = loadInboxNotifications;

    async function deleteInboxNotification(id, btnEl) {
      if (!id) return;
      if (!confirm("Delete this notification from every member's inbox? This can't be undone.")) return;
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) return;
      if (btnEl) { btnEl.disabled = true; btnEl.textContent = "Deleting…"; }
      try {
        const r = await fetch("/api/notifications?action=admin-delete", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session-token": token },
          body: JSON.stringify({ id }),
        });
        if (!r.ok) {
          if (btnEl) { btnEl.disabled = false; btnEl.textContent = "Delete"; }
          alert("Couldn't delete. Try again.");
          return;
        }
        // Reload the list so the deleted row disappears immediately.
        loadInboxNotifications();
      } catch (err) {
        if (btnEl) { btnEl.disabled = false; btnEl.textContent = "Delete"; }
        alert("Network error. Try again.");
      }
    }
    window.deleteInboxNotification = deleteInboxNotification;

    // Returns the currently chosen delivery mode: "push" (push + inbox) or
    // "inbox" (inbox only, no phone interruption). Falls back to "push"
    // so the form's default behavior is unchanged for old admins.
    function getPushMode() {
      const inbox = document.getElementById("push-mode-inbox");
      return (inbox && inbox.checked) ? "inbox" : "push";
    }

    // Hide/show the recipients picker based on the chosen delivery mode.
    // Inbox-only mode doesn't need recipients since the inbox is visible to
    // every member by design. Also updates the send button label so it
    // reflects what the click will actually do.
    function updatePushMode() {
      const mode = getPushMode();
      const recipientsEl = document.getElementById("push-recipients-section");
      const sendBtn = document.getElementById("push-send-btn");
      if (recipientsEl) recipientsEl.style.display = mode === "inbox" ? "none" : "";
      if (sendBtn) sendBtn.textContent = mode === "inbox" ? "Save to inbox" : "Send notification";
    }
    window.updatePushMode = updatePushMode;

    async function sendBulkPush() {
      const status = document.getElementById("push-test-status");
      const token = localStorage.getItem(STORAGE_KEY);
      const sendBtn = document.getElementById("push-send-btn");
      if (!token) {
        status.textContent = "Session expired. Refresh the page and try again.";
        return;
      }
      const mode = getPushMode();
      const checked = Array.from(document.querySelectorAll(".push-recipient:checked"));
      // Inbox-only mode skips the recipients check entirely — the inbox is
      // visible to every member regardless of push subscription state.
      if (mode === "push" && checked.length === 0) {
        status.textContent = "Pick at least one recipient first.";
        return;
      }
      if (!selectedPushKey) {
        status.textContent = "Pick a message above.";
        return;
      }
      const body = {
        userIds: mode === "inbox" ? [] : checked.map(cb => cb.value),
        // Always save to inbox — that's the whole point of these team
        // announcements being durable. Inbox-only mode skips push;
        // push+inbox mode does both.
        alsoSaveToInbox: true,
        // Optional tap-to-go destination. null when no action is chosen.
        ctaUrl: buildCtaUrl(),
        ctaLabel: buildCtaLabel(),
      };
      if (selectedPushKey === "custom") {
        const title = document.getElementById("push-custom-title").value.trim();
        const bodyText = document.getElementById("push-custom-body").value.trim();
        if (!title) { status.textContent = "Custom title is required."; return; }
        body.payload = { title, body: bodyText };
      } else {
        body.key = selectedPushKey;
      }
      sendBtn.disabled = true;
      status.textContent = mode === "inbox"
        ? "Saving to inbox…"
        : "Sending to " + checked.length + " recipient" + (checked.length === 1 ? "" : "s") + "…";
      try {
        const r = await fetch("/api/push?action=send", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session-token": token },
          body: JSON.stringify(body),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          status.textContent = "Send failed: " + (data.error || ("HTTP " + r.status));
          return;
        }
        if (mode === "inbox") {
          status.innerHTML = "Saved to inbox. Every member will see it next time they open the bell icon in the Field.";
          loadInboxNotifications(); // refresh the manage list so the new row is visible immediately
        } else {
          const reached = data.usersReached || 0;
          const noDevices = data.usersWithNoDevices || 0;
          let msg = "Sent to <strong>" + (data.totalSent || 0) + "</strong> device" + ((data.totalSent || 0) === 1 ? "" : "s") + " across <strong>" + reached + "</strong> member" + (reached === 1 ? "" : "s") + ".";
          if (noDevices > 0) msg += " " + noDevices + " selected member" + (noDevices === 1 ? "" : "s") + " had no active subscriptions.";
          if (data.savedToInbox) msg += " <span style=\"color: var(--text-mute); font-style: italic;\">Also saved to the inbox for everyone.</span>";
          status.innerHTML = msg;
          loadPushSubscribers(); // refresh last-sent timestamps
        }
      } catch (err) {
        status.textContent = "Network error: " + (err.message || err);
      } finally {
        sendBtn.disabled = false;
      }
    }

    window.togglePushSelectAll = togglePushSelectAll;
    window.selectPushMessage = selectPushMessage;
    window.updateCustomPreview = updateCustomPreview;
    window.sendBulkPush = sendBulkPush;

    // Expose for inline onclick handlers
    window.loadMetrics = loadMetrics;
    window.onPreset = onPreset;
    window.onApplyCustom = onApplyCustom;

    loadMetrics();

    // ===== Auto-refresh =====
    // Silent background refresh so numbers stay live without clicking
    // Refresh after every new signup.
    //
    // Cadence rules (July 2026, tuned after Geo reported slow loading):
    //   • Overview (loadMetrics)   → every 90 seconds
    //   • Ads (loadAdsMetrics)     → every 3 minutes ONLY (Meta API is
    //     the slow part; server-side caches it 60s already, but the
    //     round-trip on mobile still costs 2-4s each time)
    //   • Both trigger IMMEDIATELY on tab focus, so switching back
    //     from another tab shows fresh numbers within one round-trip
    //   • Both pause when the tab is hidden (no wasted API calls)
    // Periodic auto-refresh disabled: Geo flagged that the page jumping
    // to top every 90s while she's in the middle of scrolling / editing
    // felt buggy. She has a big manual Refresh button in the top bar,
    // and the visibilitychange listener below still refreshes when she
    // returns to the tab, which is enough freshness for daily use.
    // If we ever want this back, use a partial-update approach that
    // patches KPIs in place instead of re-rendering the whole dashboard.
    let _autoOverviewTimer = null;
    let _autoAdsTimer = null;
    function scheduleAutoRefresh() { /* intentionally noop */ }
    scheduleAutoRefresh();
    // Refresh on tab focus, but only if it's been at least 5 minutes
    // since the last load. Was firing every time Geo clicked back to the
    // dashboard tab (even after a 30-second detour), causing the same
    // "page jumped and reset scroll" complaint as the interval timer.
    // 5min threshold gives a safe balance between "fresh enough" and
    // "not disruptive when I just tabbed away for a second."
    let _lastMetricsLoadAt = Date.now();
    const originalLoadMetrics = typeof loadMetrics === "function" ? loadMetrics : null;
    if (originalLoadMetrics) {
      window.loadMetrics = async function () {
        _lastMetricsLoadAt = Date.now();
        return originalLoadMetrics.apply(this, arguments);
      };
    }
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        const staleMs = Date.now() - _lastMetricsLoadAt;
        if (staleMs < 5 * 60 * 1000) return; // less than 5 min, skip
        try { loadMetrics(); } catch (e) { /* ignore */ }
        try { if (typeof loadAdsMetrics === "function") loadAdsMetrics(); } catch (e) { /* ignore */ }
      }
    });

    // ===== Pull-to-refresh (mobile) =====
    // Native-style pull-to-refresh: circular spinner drops down from
    // the top as the user pulls, snaps into "spinning" state on release
    // past the threshold, and calls loadMetrics() in place (no full
    // page reload). Matches iOS/Android/Instagram/Twitter conventions.
    // The refresh itself uses the standard refresh UX (top progress bar
    // and content fade on desktop, progress bar only on mobile), so once
    // the spinner disappears the top gold bar takes over.
    (function setupPullToRefresh() {
      // Skip on non-touch devices — desktop has the Refresh button.
      if (!('ontouchstart' in window)) return;

      const THRESHOLD = 70;         // px past which release triggers refresh
      const RESISTANCE = 0.5;       // pull distance × this = indicator movement
      const MAX_PULL = 90;          // clamp so it doesn't run off screen

      // Inject the spinner keyframes once so the arc icon can rotate.
      // Kept inline to avoid touching the main <style> block.
      if (!document.getElementById('ptr-styles')) {
        const s = document.createElement('style');
        s.id = 'ptr-styles';
        s.textContent =
          '@keyframes ptr-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }' +
          '.ptr-indicator { position: fixed; top: 0; left: 50%; transform: translate(-50%, -60px); width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.98); box-shadow: 0 4px 14px rgba(0,0,0,0.18); display: flex; align-items: center; justify-content: center; z-index: 10000; transition: transform 0.22s ease, opacity 0.22s ease; pointer-events: none; }' +
          '.ptr-indicator svg { width: 22px; height: 22px; }' +
          '.ptr-indicator .ptr-arc { stroke: var(--gold, #C9A84C); stroke-width: 2.5; fill: none; stroke-linecap: round; transition: stroke-dashoffset 0.1s linear; }' +
          '.ptr-indicator.is-spinning svg { animation: ptr-spin 0.85s linear infinite; }';
        document.head.appendChild(s);
      }

      let touchStartY = 0;
      let pulling = false;
      let indicator = null;
      let refreshing = false;

      function ensureIndicator() {
        if (indicator) return indicator;
        indicator = document.createElement('div');
        indicator.className = 'ptr-indicator';
        indicator.setAttribute('aria-hidden', 'true');
        // Circular arc SVG. stroke-dasharray/offset let us draw more of
        // the circle as the user pulls, so the arc grows visually.
        indicator.innerHTML =
          '<svg viewBox="0 0 24 24" aria-hidden="true">' +
          '  <circle class="ptr-arc" cx="12" cy="12" r="9" stroke-dasharray="56.55" stroke-dashoffset="56.55" />' +
          '</svg>';
        document.body.appendChild(indicator);
        return indicator;
      }

      document.addEventListener('touchstart', function (e) {
        if (refreshing) return;
        // Only start pulling from the very top of the page.
        if ((window.scrollY || document.documentElement.scrollTop) > 0) {
          pulling = false;
          return;
        }
        touchStartY = e.touches[0].clientY;
        pulling = true;
      }, { passive: true });

      document.addEventListener('touchmove', function (e) {
        if (!pulling || refreshing) return;
        const dy = e.touches[0].clientY - touchStartY;
        if (dy <= 0) {
          if (indicator) indicator.style.transform = 'translate(-50%, -60px)';
          return;
        }
        const el = ensureIndicator();
        const shown = Math.min(dy * RESISTANCE, MAX_PULL);
        // Move the circular indicator down proportionally.
        el.style.transform = 'translate(-50%, ' + (shown + 4) + 'px)';
        // Fill the arc progressively as we approach the threshold.
        const progress = Math.min(1, dy / THRESHOLD);
        const arc = el.querySelector('.ptr-arc');
        if (arc) arc.setAttribute('stroke-dashoffset', String(56.55 * (1 - progress)));
      }, { passive: true });

      document.addEventListener('touchend', function (e) {
        if (!pulling || refreshing) return;
        pulling = false;
        const dy = e.changedTouches[0].clientY - touchStartY;
        const el = indicator;
        if (dy >= THRESHOLD) {
          refreshing = true;
          if (el) {
            el.classList.add('is-spinning');
            el.style.transform = 'translate(-50%, 12px)';
          }
          // Kick off the standard refresh flow (top progress bar,
          // desktop dim, endRefresh on completion). We poll for the
          // refresh state to end so we can retract the spinner.
          try { refreshWithReconcile(); } catch (err) { /* ignore */ }
          const watch = setInterval(function () {
            if (!document.body.classList.contains('is-refreshing')) {
              clearInterval(watch);
              if (el) {
                el.classList.remove('is-spinning');
                el.style.transform = 'translate(-50%, -60px)';
              }
              // Reset the arc so the next pull starts empty.
              const arc = el && el.querySelector('.ptr-arc');
              if (arc) arc.setAttribute('stroke-dashoffset', '56.55');
              refreshing = false;
            }
          }, 120);
        } else if (el) {
          el.style.transform = 'translate(-50%, -60px)';
          const arc = el.querySelector('.ptr-arc');
          if (arc) arc.setAttribute('stroke-dashoffset', '56.55');
        }
      }, { passive: true });
    })();
  </script>
</body>
</html>
