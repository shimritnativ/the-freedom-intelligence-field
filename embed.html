<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Freedom Intelligence Field</title>
<link rel="icon" type="image/png" href="https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/file-uploads/themes/2161454568/settings_images/d2126ef-2bee-6f2c-8c2-d1357db52300_myp_logo.png" />
<link rel="apple-touch-icon" href="https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/file-uploads/themes/2161454568/settings_images/d2126ef-2bee-6f2c-8c2-d1357db52300_myp_logo.png" />

<style>
  html[data-theme="dark"] {
    --bg: #080808;
    --panel: #0f0f0f;
    --panel-2: #131313;
    --sidebar-bg: #0a0a0a;
    --text: #f0ead6;
    --text-dim: rgba(240, 234, 214, 0.55);
    --text-mute: rgba(240, 234, 214, 0.28);
    --gold: #C9A84C;
    --gold-soft: rgba(201, 168, 76, 0.09);
    --gold-line: rgba(201, 168, 76, 0.16);
    --gold-strong: rgba(201, 168, 76, 0.25);
    --user-msg-bg: rgba(201, 168, 76, 0.10);
    --user-msg-border: rgba(201, 168, 76, 0.22);
    --assistant-msg-bg: rgba(240, 234, 214, 0.03);
    --assistant-msg-border: rgba(240, 234, 214, 0.07);
    --border: rgba(201, 168, 76, 0.07);
    --shadow: 0 0 80px rgba(201, 168, 76, 0.03), 0 24px 48px rgba(0,0,0,0.6);
    color-scheme: dark;
  }

  html[data-theme="light"] {
    --bg: #F7F1E1;
    --panel: #FFFFFF;
    --panel-2: #FAF6E8;
    --sidebar-bg: #EFE7CE;
    --text: #1A1612;
    --text-dim: rgba(26, 22, 18, 0.65);
    --text-mute: rgba(26, 22, 18, 0.4);
    --gold: #9A6E10;
    --gold-soft: rgba(154, 110, 16, 0.07);
    --gold-line: rgba(154, 110, 16, 0.2);
    --gold-strong: rgba(154, 110, 16, 0.35);
    --user-msg-bg: rgba(154, 110, 16, 0.10);
    --user-msg-border: rgba(154, 110, 16, 0.25);
    --assistant-msg-bg: #FFFFFF;
    --assistant-msg-border: rgba(26, 22, 18, 0.08);
    --border: rgba(26, 22, 18, 0.08);
    --shadow: 0 6px 24px rgba(26, 22, 18, 0.06), 0 1px 4px rgba(26, 22, 18, 0.04);
    color-scheme: light;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    min-height: 100%;
  }

  button { font-family: inherit; cursor: pointer; }

  /* ============================================================
     Layout. Desktop = row. Mobile = column (see media query).
     ============================================================ */
  #app {
    display: flex;
    flex-direction: row;
    height: 100vh;
    width: 100%;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 22px 18px;
    overflow-y: auto;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 22px;
  }
  .brand-mark {
    width: 48px; height: 48px;
    flex-shrink: 0;
    display: block;
  }
  .brand-mark img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
  }
  .brand-text-1 {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--gold);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    line-height: 1.2;
  }
  .brand-text-2 {
    font-size: 13px;
    color: var(--text);
    font-style: italic;
    margin-top: 3px;
  }

  .sidebar-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-mute);
    text-transform: uppercase;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    margin-bottom: 12px;
    padding: 0 4px;
  }

  .day-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 24px;
  }

  .day-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 11px 12px;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: background 0.15s ease, border-color 0.15s ease;
  }
  .day-item.active {
    background: var(--gold-soft);
    border-color: var(--gold-line);
  }
  .day-item.completed { opacity: 0.65; }
  .day-item.locked { opacity: 0.35; }

  .day-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--gold-line);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: var(--gold);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    flex-shrink: 0;
  }
  .day-num svg { width: 11px; height: 11px; display: block; }
  .day-item.active .day-num {
    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
  }
  .day-item.completed .day-num {
    background: var(--gold-strong);
    color: var(--text);
    border-color: transparent;
  }

  .day-info { flex: 1; min-width: 0; }
  .day-title {
    font-size: 12px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .day-theme {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 2px;
  }

  .time-block {
    padding: 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .time-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--text-mute);
    text-transform: uppercase;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
  }
  .time-value {
    font-size: 22px;
    color: var(--gold);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    margin-top: 4px;
    letter-spacing: 0.04em;
  }
  .time-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 4px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  /* Unlimited (locked) upsell section */
  .sidebar-divider {
    height: 1px;
    background: var(--gold-line);
    margin: 20px 4px;
    opacity: 0.6;
  }
  .unlimited-card {
    border: 1px solid var(--gold-line);
    background: var(--gold-soft);
    border-radius: 14px;
    padding: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .unlimited-lock {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-bottom: 14px;
  }
  .unlimited-lock svg { width: 20px; height: 20px; display: block; }
  .unlimited-title {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-size: 16px;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .unlimited-desc {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .unlimited-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 11px 20px;
    background: var(--gold);
    color: var(--bg);
    border-radius: 999px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    text-decoration: none;
    transition: opacity 0.15s ease, transform 0.05s ease;
  }
  .unlimited-btn:hover { opacity: 0.88; }
  .unlimited-btn:active { transform: scale(0.98); }
  .unlimited-btn-arrow { font-size: 13px; line-height: 1; }

  .sidebar-footer {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-text {
    font-size: 10px;
    color: var(--text-mute);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.05em;
  }

  /* Footer cluster: font-size controls + theme toggle. */
  .footer-actions { display: flex; align-items: center; gap: 6px; }
  .font-btn {
    background: transparent;
    border: 1px solid var(--gold-line);
    color: var(--text-dim);
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 0;
    line-height: 1;
  }
  .font-btn:hover { border-color: var(--gold); color: var(--gold); }
  .font-btn:disabled { opacity: 0.35; cursor: not-allowed; border-color: var(--gold-line); color: var(--text-mute); }
  .font-btn.font-larger { font-size: 13px; } /* slightly larger "A+" reads better */

  .theme-toggle {
    background: transparent;
    border: 1px solid var(--gold-line);
    color: var(--text-dim);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .theme-toggle:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Main */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    background: var(--bg);
  }

  .main-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .main-header-title {
    font-size: 14px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .main-header-sub {
    font-size: 11px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin-top: 2px;
    letter-spacing: 0.05em;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .day-chip {
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
    font-size: 10px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .messages-wrap {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 24px 0;
  }
  .messages-wrap::-webkit-scrollbar { width: 6px; }
  .messages-wrap::-webkit-scrollbar-thumb {
    background: var(--gold-strong);
    border-radius: 3px;
  }
  .messages-wrap::-webkit-scrollbar-track { background: transparent; }

  .messages {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .msg-row { display: flex; animation: fadeIn 0.3s ease; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }

  .msg {
    max-width: 78%;
    padding: 13px 18px;
    color: var(--text);
    /* Reader scale — adjustable via the A−/A+ buttons in the sidebar footer. */
    font-size: calc(15px * var(--msg-scale, 1));
    line-height: 1.75;
  }
  .msg-row.user .msg {
    padding: 11px 16px;
    background: var(--user-msg-bg);
    border: 1px solid var(--user-msg-border);
    border-radius: 14px 14px 3px 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    white-space: pre-wrap;
  }
  .msg-row.assistant .msg {
    background: var(--assistant-msg-bg);
    border: 1px solid var(--assistant-msg-border);
    border-radius: 14px 14px 14px 3px;
    font-family: Georgia, "Times New Roman", serif;
  }
  /* Markdown rendering inside assistant messages */
  .msg-row.assistant .msg p { margin: 0 0 0.7em 0; }
  .msg-row.assistant .msg p:last-child { margin-bottom: 0; }
  .msg-row.assistant .msg strong { font-weight: 700; color: var(--text); }
  .msg-row.assistant .msg em { font-style: italic; }
  .msg-row.assistant .msg code { background: var(--gold-soft); padding: 1px 6px; border-radius: 4px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.9em; color: var(--gold); }
  .msg-row.assistant .msg ul, .msg-row.assistant .msg ol { margin: 0.4em 0 0.7em 1.4em; padding: 0; }
  .msg-row.assistant .msg li { margin-bottom: 0.35em; line-height: 1.6; }
  .msg-row.assistant .msg li:last-child { margin-bottom: 0; }
  .msg-row.assistant .msg ul li { list-style-type: disc; }
  .msg-row.assistant .msg ol li { list-style-type: decimal; }
  /* In-brand CTA button, rendered from [[button:Label|url]] in AI messages. */
  .msg-cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0 2px;
    padding: 11px 22px;
    background: var(--gold);
    color: var(--bg);
    border-radius: 999px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    transition: opacity 0.15s ease, transform 0.05s ease;
  }
  .msg-cta-btn:hover { opacity: 0.88; }
  .msg-cta-btn:active { transform: scale(0.98); }
  .msg-cta-arrow { font-size: 14px; line-height: 1; }

  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 12px 16px;
    background: var(--assistant-msg-bg);
    border-radius: 14px 14px 14px 3px;
    width: fit-content;
    border: 1px solid var(--assistant-msg-border);
  }
  .typing .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.7;
    animation: bounce 1.2s infinite;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }

  /* Skeleton lines shown while a chat's messages are loading. Mimics the
     paragraph shape of incoming content so the wait reads as "filling in"
     rather than "stuck". Width values are inlined per-line below. */
  .chat-loading {
    display: flex;
    flex-direction: column;
    gap: 11px;
    padding: 20px 8px;
    max-width: 760px;
    margin: 0 auto;
    width: 100%;
  }
  .skeleton-line {
    height: 10px;
    background: var(--text);
    opacity: 0.08;
    border-radius: 999px;
    animation: skeleton-pulse 1.4s ease-in-out infinite;
  }
  .skeleton-line.skel-title { height: 14px; opacity: 0.10; margin-bottom: 10px; }
  .skeleton-line.skel-gap { margin-top: 18px; }
  @keyframes skeleton-pulse {
    0%, 100% { opacity: 0.06; }
    50% { opacity: 0.18; }
  }

  .composer-wrap {
    border-top: 1px solid var(--border);
    padding: 16px 28px 20px;
  }
  .composer {
    max-width: 760px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 8px 6px 14px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    transition: border-color 0.15s ease;
  }
  .composer:focus-within {
    border-color: var(--gold-line);
  }
  textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    font-size: 15px;
    line-height: 1.6;
    padding: 12px 4px;
    max-height: 200px;
    overflow-y: auto;
    resize: none;
  }
  textarea:focus { outline: none; }
  textarea::placeholder { color: var(--text-mute); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--gold-soft);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    transition: all 0.2s ease;
    color: var(--text-mute);
    cursor: default;
    margin-bottom: 4px;
  }
  .send-btn.active {
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    color: var(--bg);
    cursor: pointer;
  }

  /* Voice input */
  .composer { position: relative; }
  .mic-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    border: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--bg);
    cursor: pointer;
    margin-bottom: 4px;
    transition: filter 0.15s ease, transform 0.1s ease;
    padding: 0;
  }
  .mic-btn:hover { filter: brightness(1.1); }
  .mic-btn:active { transform: scale(0.95); }
  .mic-btn svg { width: 22px; height: 22px; display: block; }
  .mic-btn.recording {
    background: linear-gradient(135deg, #e57373, #b94a4a);
    color: var(--bg);
    animation: pulse-record 1.4s ease-in-out infinite;
  }
  .mic-btn.transcribing { cursor: wait; }
  .mic-btn.transcribing svg { display: none; }
  .mic-btn.transcribing::after {
    content: "";
    width: 14px; height: 14px;
    border: 2px solid rgba(8, 8, 8, 0.25);
    border-top-color: #080808;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes pulse-record {
    0%, 100% { box-shadow: 0 0 0 0 rgba(228, 87, 87, 0.35); }
    50% { box-shadow: 0 0 0 8px rgba(228, 87, 87, 0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .recording-indicator {
    position: absolute;
    top: -30px;
    right: 14px;
    background: var(--panel);
    border: 1px solid var(--gold-line);
    border-radius: 12px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    white-space: nowrap;
    pointer-events: none;
    z-index: 5;
  }
  .recording-indicator .red-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #e57373;
    margin-right: 5px;
    vertical-align: middle;
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Speaker (Shimrit voice playback) */
  .msg-row.assistant { flex-direction: column; align-items: flex-start; }
  .speak-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--gold);
    cursor: pointer;
    padding: 0;
    margin-top: 6px;
    margin-left: 4px;
    transition: background 0.15s ease, transform 0.1s ease, border-color 0.15s ease;
  }
  .speak-btn:hover { background: rgba(201, 168, 76, 0.18); }
  .speak-btn:active { transform: scale(0.92); }
  .speak-btn svg { width: 14px; height: 14px; display: block; }
  .speak-btn.loading svg { display: none; }
  .speak-btn.loading::after {
    content: "";
    width: 10px; height: 10px;
    border: 1.5px solid var(--gold-line);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .speak-btn.playing {
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    color: var(--bg);
    border-color: transparent;
  }

  .composer-note {
    max-width: 760px;
    margin: 8px auto 0;
    text-align: center;
    font-size: 11px;
    color: var(--text-mute);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.02em;
  }

  /* Read-only notice — replaces the composer once the 72h window has closed. */
  .readonly-notice {
    max-width: 760px;
    margin: 0 auto;
    padding: 16px 20px;
    border: 1px solid var(--gold-line);
    background: var(--gold-soft);
    border-radius: 12px;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
  }
  .readonly-notice strong {
    color: var(--text);
    font-weight: 700;
  }

  /* Entry */
  .entry-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .entry-card {
    max-width: 460px;
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 44px 38px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .entry-label {
    font-size: 10px;
    color: var(--text-mute);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin-bottom: 22px;
  }
  .entry-title {
    font-size: 26px;
    color: var(--text);
    font-style: italic;
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .entry-sub {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.8;
    margin: 0 auto 32px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .entry-input {
    width: 100%;
    padding: 13px 17px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .entry-input:focus { outline: none; border-color: var(--gold-line); }
  .entry-input::placeholder { color: var(--text-mute); }
  .btn-primary {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    border: none;
    border-radius: 8px;
    color: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .btn-primary:disabled { opacity: 0.5; cursor: default; }
  .entry-note {
    font-size: 11px;
    color: var(--text-mute);
    margin-top: 14px;
    line-height: 1.7;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .error-text {
    color: #e57373;
    font-size: 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin-bottom: 10px;
    text-align: left;
  }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ============================================================
     Tablet
     ============================================================ */
  @media (max-width: 720px) {
    .sidebar { width: 220px; padding: 16px 12px; }
    .day-item { padding: 9px 10px; }
    .main-header { padding: 14px 18px; }
    .messages, .composer { padding-left: 16px; padding-right: 16px; }
    .composer-wrap { padding: 12px 16px 16px; }
  }

  /* ===== Mobile chrome (hidden on desktop) =====
     Top bar with hamburger + section pill + brand + theme toggle, and a
     slide-out drawer for the full sidebar. */
  .mobile-top-bar,
  .mobile-overlay { display: none; }

  /* ============================================================
     Mobile — Option B chrome. Top bar + drawer sidebar.
     ============================================================ */
  @media (max-width: 560px) {
    #app {
      flex-direction: column;
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
    }
    .main, .messages-wrap { min-height: 0; }

    /* Sidebar becomes a slide-in drawer from the left */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 86%;
      max-width: 320px;
      border-right: 1px solid var(--gold-line);
      border-bottom: none;
      padding: 18px 16px;
      overflow-y: auto;
      z-index: 70;
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(0.22, 0.61, 0.36, 1);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
    }
    .sidebar.mobile-open { transform: translateX(0); }
    .brand { padding-bottom: 12px; margin-bottom: 12px; }
    .brand-mark { width: 40px; height: 40px; }
    .day-list { flex-direction: column; gap: 6px; margin-bottom: 12px; overflow-x: visible; }
    .day-item { padding: 10px 12px; gap: 10px; }

    /* Overlay backdrop behind drawer */
    .mobile-overlay {
      display: block;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 65;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .mobile-overlay.open { opacity: 1; pointer-events: auto; }

    /* Top bar (always visible on mobile) */
    .mobile-top-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 52px;
    }
    .mobile-menu-btn,
    .mobile-theme-btn {
      width: 36px; height: 36px;
      background: transparent;
      border: 1px solid var(--gold-line);
      border-radius: 9px;
      color: var(--gold);
      font-size: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
    }
    .mobile-menu-btn:active,
    .mobile-theme-btn:active { background: var(--gold-soft); }

    /* At-a-glance section indicator: DAY 1 / 2 / 3 or RESET COMPLETE. */
    .mobile-section-pill {
      flex-shrink: 0;
      padding: 5px 10px;
      border-radius: 999px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid var(--gold-strong);
      background: var(--gold-soft);
      color: var(--gold);
      white-space: nowrap;
      line-height: 1;
      display: inline-flex;
      align-items: center;
    }

    .mobile-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }
    .mobile-brand img {
      width: 26px; height: 26px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .mobile-brand-text {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 0.03em;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1;
    }
    .mobile-brand-text .mobile-brand-sub {
      display: block;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: var(--text-mute);
      text-transform: uppercase;
      margin-top: 2px;
      font-family: -apple-system, sans-serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .main-header { display: none; } /* replaced by mobile chrome */
    .day-chip { display: none; }

    .messages-wrap { padding: 14px 0; }
    .messages { padding: 0 14px; gap: 14px; }
    .msg { font-size: calc(14px * var(--msg-scale, 1)); max-width: 88%; }
    .composer-wrap { padding: 10px 14px 12px; }
    .composer-note { font-size: 10px; }
    .chat-loading { padding: 16px 6px; gap: 10px; }
    .skeleton-line { height: 9px; }
    .skeleton-line.skel-title { height: 12px; }
    textarea, .entry-input { font-size: 16px; }
  }

</style>
</head>
<body>
  <div id="app"></div>

<script>
(function () {
  "use strict";

  const API_BASE = "https://myp-ascension.vercel.app/api";
  const STORAGE_KEY = "tfif_session_v1";
  const THEME_KEY = "tfif_theme_v1";
  const UNLIMITED_URL = "http://shimritnativ.com/the-freedom-intelligence-field";
  const DAY_META = [
    { label: "Day 1", theme: "State Reset" },
    { label: "Day 2", theme: "Decision" },
    { label: "Day 3", theme: "Action" }
  ];

  const state = {
    sessionToken: null,
    currentDay: 1,
    lastCompletedDay: 0,
    tier: "preview",
    timeRemainingMs: null,
    messages: [],
    loading: false,
    error: null,
    view: "entry",
    readOnly: false,
    starting: false,
    mobileDrawerOpen: false,
    autoplay: (function () {
      try { return localStorage.getItem("tfif_autoplay_v1") === "1"; } catch (e) { return false; }
    })(),
    // ===== Reader font scale (1 = default; 0.85 = small; 1.3 = large) =====
    fontScale: (function () {
      try {
        const v = parseFloat(localStorage.getItem("tfif_font_scale_v1"));
        if (isNaN(v) || v < 0.7 || v > 1.5) return 1;
        return v;
      } catch (e) { return 1; }
    })()
  };

  function loadToken() { try { return localStorage.getItem(STORAGE_KEY); } catch (e) { return null; } }
  function saveToken(t) { try { localStorage.setItem(STORAGE_KEY, t); } catch (e) {} }
  function clearToken() { try { localStorage.removeItem(STORAGE_KEY); } catch (e) {} }
  function loadTheme() { try { return localStorage.getItem(THEME_KEY) || "dark"; } catch (e) { return "dark"; } }
  function saveTheme(t) { try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    saveTheme(theme);
  }

  // ===== Composer draft persistence =====
  // The embed has ONE continuous thread, so a single draft key suffices.
  // If a user types but doesn't send, the text survives reloads.
  function currentContextKey() { return "embed_reset"; }
  function draftStorageKey(context) { return "tfif_draft_" + context; }
  function loadDraft(context) {
    try { return localStorage.getItem(draftStorageKey(context)) || ""; } catch (e) { return ""; }
  }
  function saveDraft(context, text) {
    try {
      if (!text) localStorage.removeItem(draftStorageKey(context));
      else localStorage.setItem(draftStorageKey(context), text);
    } catch (e) {}
  }
  function clearDraft(context) {
    try { localStorage.removeItem(draftStorageKey(context)); } catch (e) {}
  }
  // Restore saved draft into the textarea and recalc its auto-height + send
  // button active state. Called from render() after the textarea exists.
  function restoreDraftIntoInput() {
    const inputEl = document.getElementById("input");
    if (!inputEl) return;
    const draft = loadDraft(currentContextKey());
    if (!draft) return;
    inputEl.value = draft;
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
    const send = document.getElementById("send-btn");
    if (send && draft.trim() && !state.loading) send.classList.add("active");
  }

  // ===== Reader font scale =====
  // Applies a CSS custom property used by .msg font-size calc(). Persisted to
  // localStorage so the user's preference carries across sessions.
  function applyFontScale(scale) {
    state.fontScale = scale;
    document.documentElement.style.setProperty("--msg-scale", String(scale));
    try { localStorage.setItem("tfif_font_scale_v1", String(scale)); } catch (e) {}
  }
  const FONT_SCALE_MIN = 0.85;
  const FONT_SCALE_MAX = 1.30;
  const FONT_SCALE_STEP = 0.10;
  function onFontSmaller() {
    const next = Math.max(FONT_SCALE_MIN, Math.round((state.fontScale - FONT_SCALE_STEP) * 100) / 100);
    if (next === state.fontScale) return;
    applyFontScale(next);
    // Refresh the footer so disabled state on min/max updates without a full
    // app re-render.
    const smaller = document.getElementById("font-smaller");
    const larger = document.getElementById("font-larger");
    if (smaller) smaller.disabled = next <= FONT_SCALE_MIN;
    if (larger) larger.disabled = next >= FONT_SCALE_MAX;
  }
  function onFontLarger() {
    const next = Math.min(FONT_SCALE_MAX, Math.round((state.fontScale + FONT_SCALE_STEP) * 100) / 100);
    if (next === state.fontScale) return;
    applyFontScale(next);
    const smaller = document.getElementById("font-smaller");
    const larger = document.getElementById("font-larger");
    if (smaller) smaller.disabled = next <= FONT_SCALE_MIN;
    if (larger) larger.disabled = next >= FONT_SCALE_MAX;
  }

  function generateAnonId() {
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
      const r = Math.random() * 16 | 0;
      const v = c === "x" ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }
  function getOrCreateAnonId() {
    try {
      let id = localStorage.getItem("tfif_anon_id");
      if (!id) {
        id = generateAnonId();
        localStorage.setItem("tfif_anon_id", id);
      }
      return id;
    } catch (e) { return generateAnonId(); }
  }

  async function apiStart(email, displayName) {
    const res = await fetch(API_BASE + "/start", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email, displayName: displayName || null })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Could not start");
    return data;
  }
  async function apiState(token) {
    const res = await fetch(API_BASE + "/state", {
      method: "GET",
      headers: { "x-session-token": token }
    });
    if (res.status === 410) return { expired: true };
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Could not load state");
    return data;
  }
  async function apiChat(token, message) {
    const res = await fetch(API_BASE + "/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-session-token": token },
      body: JSON.stringify({ message })
    });
    if (res.status === 410) return { expired: true };
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Could not send");
    return data;
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // Light markdown renderer for assistant messages. Supports bold (**x**),
  // italic (*x*, _x_), inline code (`x`), bullet lists (-, *), numbered
  // lists (1.), paragraphs, line breaks, and the [[button:Label|url]] CTA.
  // Escapes HTML first to prevent injection.
  function renderMarkdown(text) {
    let html = escapeHtml(String(text || ""));

    // CTA button syntax: [[button:Label|https://url]] -> in-brand gold button.
    html = html.replace(/\[\[button:([^|\]]+)\|([^\]]+)\]\]/g, function (m, label, url) {
      const u = String(url).trim();
      if (!/^https?:\/\//i.test(u)) return label.trim();
      const safeHref = u.replace(/"/g, "%22");
      return '<a class="msg-cta-btn" href="' + safeHref + '" target="_blank" rel="noopener noreferrer">'
        + label.trim()
        + '<span class="msg-cta-arrow" aria-hidden="true">→</span></a>';
    });

    html = html.replace(/\*\*([^\n*]+?)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/__([^\n_]+?)__/g, "<strong>$1</strong>");
    html = html.replace(/(^|[^*])\*([^\n*]+?)\*(?!\*)/g, "$1<em>$2</em>");
    html = html.replace(/(^|[^_])_([^\n_]+?)_(?!_)/g, "$1<em>$2</em>");
    html = html.replace(/`([^`\n]+?)`/g, "<code>$1</code>");

    const lines = html.split("\n");
    const blocks = [];
    let paragraph = [];
    let listType = null;
    let listItems = [];

    function flushParagraph() {
      if (paragraph.length > 0) {
        blocks.push("<p>" + paragraph.join("<br>") + "</p>");
        paragraph = [];
      }
    }
    function flushList() {
      if (listType && listItems.length > 0) {
        blocks.push("<" + listType + ">" + listItems.map(i => "<li>" + i + "</li>").join("") + "</" + listType + ">");
        listItems = [];
        listType = null;
      }
    }

    for (const rawLine of lines) {
      const line = rawLine;
      const trimmed = line.trim();
      const ulMatch = line.match(/^\s*[-*]\s+(.+)$/);
      const olMatch = line.match(/^\s*\d+\.\s+(.+)$/);

      if (ulMatch) {
        flushParagraph();
        if (listType !== "ul") { flushList(); listType = "ul"; }
        listItems.push(ulMatch[1]);
      } else if (olMatch) {
        flushParagraph();
        if (listType !== "ol") { flushList(); listType = "ol"; }
        listItems.push(olMatch[1]);
      } else if (trimmed === "") {
        flushParagraph();
        flushList();
      } else {
        flushList();
        paragraph.push(line);
      }
    }
    flushParagraph();
    flushList();

    return blocks.join("");
  }

  function formatTime(ms) {
    if (!ms || ms <= 0) return { h: 0, m: 0 };
    return { h: Math.floor(ms / 3600000), m: Math.floor((ms % 3600000) / 60000) };
  }

  // Small gold padlock icon, used in the sidebar Unlimited card and in
  // locked day items.
  function lockIconSvg(sizeClass) {
    return '<svg viewBox="0 0 24 24" fill="var(--gold)" aria-hidden="true">'
      + '<path d="M12 2a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7a5 5 0 0 0-5-5zm-3 8V7a3 3 0 0 1 6 0v3H9zm3 4a2 2 0 0 1 1 3.73V19a1 1 0 0 1-2 0v-1.27A2 2 0 0 1 12 14z"/>'
      + '</svg>';
  }

  function renderSidebar() {
    const t = formatTime(state.timeRemainingMs || 0);
    const currentTheme = document.documentElement.getAttribute("data-theme") || "dark";
    const themeIcon = currentTheme === "dark" ? "☀" : "☾";
    return `
      <aside class="sidebar${state.mobileDrawerOpen ? " mobile-open" : ""}">
        <div class="brand">
          <div class="brand-mark"><img src="https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/file-uploads/themes/2161454568/settings_images/d2126ef-2bee-6f2c-8c2-d1357db52300_myp_logo.png" alt="Master Your Path" /></div>
          <div>
            <div class="brand-text-1">Master Your Path</div>
            <div class="brand-text-2">Freedom Intelligence Field</div>
          </div>
        </div>
        <div class="sidebar-label">Your 72-Hour Reset</div>
        <div class="day-list">
          ${DAY_META.map((d, i) => {
            const dayNum = i + 1;
            // In read-only mode, every day reads as completed.
            const isCompleted = state.readOnly || dayNum < state.currentDay;
            const isCurrent = !state.readOnly && dayNum === state.currentDay;
            const isLocked = !state.readOnly && !isCompleted && dayNum > state.currentDay;
            const cls = isCurrent ? "active" : isCompleted ? "completed" : isLocked ? "locked" : "";
            let numContent = String(dayNum);
            if (isCompleted) numContent = "✓";
            else if (isLocked) numContent = lockIconSvg();
            return `
              <div class="day-item ${cls}">
                <div class="day-num">${numContent}</div>
                <div class="day-info">
                  <div class="day-title">${d.label}</div>
                  <div class="day-theme">${d.theme}</div>
                </div>
              </div>
            `;
          }).join("")}
        </div>
        ${state.sessionToken && !state.readOnly && state.timeRemainingMs > 0 ? `
          <div class="time-block">
            <div class="time-label">Time Remaining</div>
            <div class="time-value">${t.h}h ${t.m}m</div>
            <div class="time-sub">until the reset closes</div>
          </div>
        ` : ""}
        <div class="sidebar-divider"></div>
        <div class="sidebar-label">The Field — Unlimited</div>
        <div class="unlimited-card">
          <div class="unlimited-lock">${lockIconSvg()}</div>
          <div class="unlimited-title">Continue the work.</div>
          <div class="unlimited-desc">Unlimited conversations with the Field. Mind, heart, and body, anytime. Voice and memory included.</div>
          <a class="unlimited-btn" href="${UNLIMITED_URL}" target="_blank" rel="noopener noreferrer">
            Open The Field
            <span class="unlimited-btn-arrow" aria-hidden="true">↗</span>
          </a>
        </div>
        <div style="flex:1"></div>
        <div class="sidebar-footer">
          <div class="footer-text">v1.0</div>
          <div class="footer-actions">
            <button class="font-btn font-smaller" id="font-smaller" type="button" title="Smaller text" aria-label="Smaller text"${state.fontScale <= FONT_SCALE_MIN ? " disabled" : ""}>A−</button>
            <button class="font-btn font-larger" id="font-larger" type="button" title="Larger text" aria-label="Larger text"${state.fontScale >= FONT_SCALE_MAX ? " disabled" : ""}>A+</button>
            <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">${themeIcon}</button>
          </div>
        </div>
      </aside>
    `;
  }

  // ===== Mobile chrome =====
  // Top bar: hamburger (always visible — opens drawer = full sidebar) + section
  // pill (DAY 1 / 2 / 3 or RESET COMPLETE) + brand text + theme toggle.
  function renderMobileTopBar() {
    const currentTheme = document.documentElement.getAttribute("data-theme") || "dark";
    const themeIcon = currentTheme === "dark" ? "☀" : "☾";

    let title = "Day 1: State Reset";
    let subtitle = "72-Hour Power Reset";
    let pillLabel = "DAY 1";

    if (state.readOnly) {
      title = "Reset Complete";
      subtitle = "72-Hour Power Reset";
      pillLabel = "RESET COMPLETE";
    } else if (state.view === "chat") {
      const d = DAY_META[state.currentDay - 1];
      title = `Day ${state.currentDay} · ${d.theme}`;
      subtitle = "72-Hour Power Reset";
      pillLabel = `DAY ${state.currentDay}`;
    }

    return `
      <div class="mobile-top-bar">
        <button class="mobile-menu-btn" id="mobile-menu-btn" type="button" aria-label="Open menu">☰</button>
        <span class="mobile-section-pill">${escapeHtml(pillLabel)}</span>
        <div class="mobile-brand">
          <img src="https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/file-uploads/themes/2161454568/settings_images/d2126ef-2bee-6f2c-8c2-d1357db52300_myp_logo.png" alt="Master Your Path" />
          <div class="mobile-brand-text">
            ${escapeHtml(title)}
            <span class="mobile-brand-sub">${escapeHtml(subtitle)}</span>
          </div>
        </div>
        <button class="mobile-theme-btn" id="mobile-theme-btn" type="button" aria-label="Toggle theme">${themeIcon}</button>
      </div>
    `;
  }

  function renderMobileOverlay() {
    return `<div class="mobile-overlay${state.mobileDrawerOpen ? " open" : ""}" id="mobile-overlay"></div>`;
  }

  function render() {
    const app = document.getElementById("app");

    if (state.view === "entry") {
      app.innerHTML = `
        ${renderMobileTopBar()}
        ${renderSidebar()}
        <main class="main">
          <div class="main-header">
            <div>
              <div class="main-header-title">Begin the 72-Hour Power Reset</div>
              <div class="main-header-sub">A 3-day guided experience</div>
            </div>
          </div>
          <div class="entry-screen">
            <div class="entry-card">
              <div class="entry-label">The Freedom Intelligence Field</div>
              <div class="entry-title">Welcome to Day 1: State Reset</div>
              <div class="entry-sub" style="margin-bottom: 28px; text-align: left;">Today we are not solving everything. We are locating what is currently active, what has been directing you, and how to return to yourself.</div>
              <form id="entry-form">
                <input class="entry-input" id="name-input" type="text" placeholder="First name (optional)" autocomplete="given-name" />
                <textarea class="entry-input" id="opening-input" rows="4" placeholder="Start with one sentence. What is happening right now?" required style="font-family: Georgia, 'Times New Roman', serif; line-height: 1.6;"></textarea>
                ${state.error ? `<div class="error-text">${escapeHtml(state.error)}</div>` : ""}
                <button class="btn-primary" type="submit">Begin Day 1</button>
                <div class="entry-note">Your conversation is private and persists across the 72 hours.</div>
              </form>
            </div>
          </div>
        </main>
        ${renderMobileOverlay()}
      `;
      document.getElementById("entry-form").addEventListener("submit", onStartSubmit);
      // Restore + persist drafts on the entry form too.
      const nameInput = document.getElementById("name-input");
      const openingInput = document.getElementById("opening-input");
      if (nameInput) {
        const savedName = loadDraft("entry_name");
        if (savedName) nameInput.value = savedName;
        nameInput.addEventListener("input", (e) => saveDraft("entry_name", e.target.value));
      }
      if (openingInput) {
        const savedOpening = loadDraft("entry");
        if (savedOpening) openingInput.value = savedOpening;
        openingInput.addEventListener("input", (e) => saveDraft("entry", e.target.value));
      }
      setTimeout(() => document.getElementById("name-input").focus(), 50);
    } else if (state.view === "chat") {
      const day = DAY_META[Math.min(Math.max(state.currentDay, 1), 3) - 1];
      const headerTitle = state.readOnly ? "Reset Complete" : `${day.label} · ${day.theme}`;
      const headerSub = state.readOnly ? "The 72 hours have ended" : "The 72-Hour Power Reset";
      app.innerHTML = `
        ${renderMobileTopBar()}
        ${renderSidebar()}
        <main class="main">
          <div class="main-header">
            <div>
              <div class="main-header-title">${escapeHtml(headerTitle)}</div>
              <div class="main-header-sub">${escapeHtml(headerSub)}</div>
            </div>
            ${state.readOnly ? "" : `
            <div class="header-right">
              <div class="day-chip">${day.label} · ${day.theme}</div>
            </div>`}
          </div>
          <div class="messages-wrap" id="messages-wrap">
            <div class="messages" id="messages"></div>
          </div>
          <div class="composer-wrap">
            ${state.readOnly ? `
              <div class="readonly-notice">
                <strong>Your 72-Hour Power Reset is complete.</strong> You can still read your conversation below.
              </div>
            ` : `
              <div class="composer">
                <textarea id="input" rows="1" placeholder="Chat with The Field"></textarea>
                <button class="mic-btn" id="mic-btn" type="button" aria-label="Record voice message" title="Record voice message">
                  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <rect x="9" y="3" width="6" height="11" rx="3"/>
                    <path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.93V20H9a1 1 0 1 0 0 2h6a1 1 0 1 0 0-2h-2v-2.07A7 7 0 0 0 19 11z"/>
                  </svg>
                </button>
                <button class="send-btn" id="send-btn" type="button">↑</button>
              </div>
              <div class="composer-note">Your conversation is private. No one else has access to it.</div>
            `}
          </div>
        </main>
        ${renderMobileOverlay()}
      `;
      renderMessages();
      const inputEl = document.getElementById("input");
      if (inputEl) {
        inputEl.addEventListener("input", onInputChange);
        inputEl.addEventListener("keydown", onInputKeyDown);
      }
      const sendBtn = document.getElementById("send-btn");
      if (sendBtn) sendBtn.addEventListener("click", onSendClick);
      const micBtn = document.getElementById("mic-btn");
      if (micBtn) {
        if (!micSupported()) micBtn.style.display = "none";
        else micBtn.addEventListener("click", onMicClick);
      }
      const messagesWrap = document.getElementById("messages-wrap");
      if (messagesWrap) messagesWrap.addEventListener("click", onSpeakerClick);
      if (!state.readOnly) {
        restoreDraftIntoInput();
        setTimeout(() => { const el = document.getElementById("input"); if (el) el.focus(); }, 50);
      }
    }

    // Wire up controls present in every view.
    const themeBtn = document.getElementById("theme-toggle");
    if (themeBtn) themeBtn.addEventListener("click", onThemeToggle);
    const fontSmallerBtn = document.getElementById("font-smaller");
    if (fontSmallerBtn) fontSmallerBtn.addEventListener("click", onFontSmaller);
    const fontLargerBtn = document.getElementById("font-larger");
    if (fontLargerBtn) fontLargerBtn.addEventListener("click", onFontLarger);
    const autoplayCheckbox = document.getElementById("autoplay-checkbox");
    if (autoplayCheckbox) autoplayCheckbox.addEventListener("change", onAutoplayChange);

    // ===== Mobile chrome wiring =====
    const mobileMenuBtn = document.getElementById("mobile-menu-btn");
    if (mobileMenuBtn) mobileMenuBtn.addEventListener("click", onMobileMenuClick);
    const mobileThemeBtn = document.getElementById("mobile-theme-btn");
    if (mobileThemeBtn) mobileThemeBtn.addEventListener("click", onThemeToggle);
    const mobileOverlay = document.getElementById("mobile-overlay");
    if (mobileOverlay) mobileOverlay.addEventListener("click", onMobileOverlayClick);
  }

  // Skeleton placeholder shown while the conversation's messages stream in.
  // Widths vary to feel like incoming paragraphs rather than a static block.
  function renderSkeletonLoading() {
    return `
      <div class="chat-loading" aria-label="Loading conversation" role="status">
        <div class="skeleton-line skel-title" style="width: 32%"></div>
        <div class="skeleton-line" style="width: 88%"></div>
        <div class="skeleton-line" style="width: 94%"></div>
        <div class="skeleton-line" style="width: 76%"></div>
        <div class="skeleton-line" style="width: 64%"></div>
        <div class="skeleton-line skel-gap" style="width: 70%"></div>
        <div class="skeleton-line" style="width: 86%"></div>
        <div class="skeleton-line" style="width: 80%"></div>
        <div class="skeleton-line" style="width: 50%"></div>
      </div>
    `;
  }

  function renderMessages() {
    const wrap = document.getElementById("messages");
    if (!wrap) return;
    // Empty + loading = the conversation's messages haven't arrived yet.
    // Render skeleton lines that mimic paragraph shapes so the wait reads as
    // "content filling in" rather than "stuck".
    if (state.loading && state.messages.length === 0) {
      wrap.innerHTML = renderSkeletonLoading();
      return;
    }
    let html = state.messages.map((m, i) => {
      if (m.role === "user") {
        return `
          <div class="msg-row ${m.role}">
            <div class="msg">${escapeHtml(m.content)}</div>
          </div>
        `;
      }
      return `
        <div class="msg-row ${m.role}">
          <div class="msg">${renderMarkdown(m.content)}</div>
          <button class="speak-btn" data-msg-index="${i}" type="button" aria-label="Play in Shimrit's voice" title="Play in Shimrit's voice">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M3 9v6h4l5 5V4L7 9H3z"/>
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
              <path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          </button>
        </div>
      `;
    }).join("");
    if (state.loading) {
      html += `
        <div class="msg-row assistant">
          <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
      `;
    }
    wrap.innerHTML = html;
    const wrapper = document.getElementById("messages-wrap");
    if (wrapper) wrapper.scrollTop = wrapper.scrollHeight;
  }

  // ===== Mobile chrome handlers =====
  // Toggle the drawer by mutating classes on the existing DOM nodes — calling
  // render() would replace the sidebar element, and the browser only animates
  // CSS transitions on elements that already exist when a property changes.
  function onMobileMenuClick() {
    state.mobileDrawerOpen = true;
    const sidebar = document.querySelector(".sidebar");
    const overlay = document.getElementById("mobile-overlay");
    if (sidebar) sidebar.classList.add("mobile-open");
    if (overlay) overlay.classList.add("open");
  }
  function onMobileOverlayClick() {
    state.mobileDrawerOpen = false;
    const sidebar = document.querySelector(".sidebar");
    const overlay = document.getElementById("mobile-overlay");
    if (sidebar) sidebar.classList.remove("mobile-open");
    if (overlay) overlay.classList.remove("open");
  }

  function onThemeToggle() {
    const current = document.documentElement.getAttribute("data-theme") || "dark";
    const next = current === "dark" ? "light" : "dark";
    applyTheme(next);
    render();
  }

  async function onStartSubmit(e) {
    e.preventDefault();
    // Re-entry guard. The first await below is apiStart — without this flag,
    // a fast double-tap on "Begin Day 1" fires onStartSubmit twice before
    // either render() runs, producing two apiChat calls and a duplicated
    // opening exchange in the database. Set synchronously, before any await.
    if (state.starting) return;
    const name = (document.getElementById("name-input").value || "").trim();
    const opening = (document.getElementById("opening-input").value || "").trim();
    if (!opening) return;
    state.starting = true;
    state.error = null;
    // Visually disable the submit button for the brief window before render().
    const submitBtn = e.target && e.target.querySelector(".btn-primary");
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = "Beginning…"; }
    try {
      const anonId = getOrCreateAnonId();
      const syntheticEmail = "anon-" + anonId + "@tfif.local";
      const data = await apiStart(syntheticEmail, name);
      state.sessionToken = data.sessionToken;
      saveToken(data.sessionToken);
      state.currentDay = data.currentDay || 1;
      state.tier = data.tier;
      state.timeRemainingMs = data.timeRemainingMs;
      state.view = "chat";
      state.readOnly = false;
      state.messages = [{ role: "user", content: opening }];
      state.loading = true;
      clearDraft("entry");
      clearDraft("entry_name");
      render();
      const chatData = await apiChat(state.sessionToken, opening);
      if (chatData.expired) {
        state.readOnly = true;
        state.loading = false;
        render();
        return;
      }
      state.messages.push({ role: "assistant", content: chatData.reply });
      state.currentDay = chatData.currentDay;
      state.timeRemainingMs = chatData.timeRemainingMs;
      state.loading = false;
      render();
      maybeAutoplayLastAssistant();
    } catch (err) {
      state.error = err.message || "Could not start. Please try again.";
      state.loading = false;
      state.view = "entry";
      render();
    } finally {
      state.starting = false;
    }
  }

  function onInputChange(e) {
    e.target.style.height = "auto";
    e.target.style.height = Math.min(e.target.scrollHeight, 200) + "px";
    const send = document.getElementById("send-btn");
    if (send) {
      if (e.target.value.trim() && !state.loading) send.classList.add("active");
      else send.classList.remove("active");
    }
    saveDraft(currentContextKey(), e.target.value);
  }

  function onInputKeyDown(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      onSendClick();
    }
  }

  async function onSendClick() {
    const inputEl = document.getElementById("input");
    if (!inputEl) return;
    const text = inputEl.value.trim();
    if (!text || state.loading) return;
    state.messages.push({ role: "user", content: text });
    inputEl.value = "";
    inputEl.style.height = "auto";
    clearDraft(currentContextKey());
    state.loading = true;
    const sendBtn = document.getElementById("send-btn");
    if (sendBtn) sendBtn.classList.remove("active");
    renderMessages();
    try {
      const data = await apiChat(state.sessionToken, text);
      if (data.expired) {
        state.readOnly = true;
        state.loading = false;
        render();
        return;
      }
      state.messages.push({ role: "assistant", content: data.reply });
      state.currentDay = data.currentDay;
      state.timeRemainingMs = data.timeRemainingMs;
      state.loading = false;
      render();
      maybeAutoplayLastAssistant();
    } catch (err) {
      state.messages.push({ role: "assistant", content: "Something went wrong. Try again in a moment." });
      state.loading = false;
      renderMessages();
    }
  }

  // ===== Voice input =====
  const MAX_RECORDING_MS = 60000;
  const voiceState = {
    mediaRecorder: null, audioChunks: [], stream: null, mimeType: "",
    startedAt: 0, timerInterval: null, autoStopTimer: null, indicatorEl: null
  };

  function micSupported() {
    return !!(typeof navigator !== "undefined" && navigator.mediaDevices &&
      navigator.mediaDevices.getUserMedia && typeof window.MediaRecorder !== "undefined");
  }

  async function onMicClick() {
    if (state.loading) return;
    if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === "recording") {
      stopRecording();
      return;
    }
    await startRecording();
  }

  async function startRecording() {
    const micBtn = document.getElementById("mic-btn");
    if (!micBtn) return;
    try {
      voiceState.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const candidates = ["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg;codecs=opus"];
      let mimeType = "";
      for (const m of candidates) {
        if (window.MediaRecorder.isTypeSupported && window.MediaRecorder.isTypeSupported(m)) {
          mimeType = m;
          break;
        }
      }
      voiceState.mimeType = mimeType || "audio/webm";
      voiceState.mediaRecorder = mimeType
        ? new MediaRecorder(voiceState.stream, { mimeType })
        : new MediaRecorder(voiceState.stream);
      voiceState.audioChunks = [];
      voiceState.mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) voiceState.audioChunks.push(e.data);
      };
      voiceState.mediaRecorder.onstop = async () => {
        cleanupRecording();
        micBtn.classList.remove("recording");
        const blob = new Blob(voiceState.audioChunks, { type: voiceState.mimeType });
        voiceState.audioChunks = [];
        if (blob.size < 1000) return;
        await transcribeBlob(blob, voiceState.mimeType);
      };
      voiceState.mediaRecorder.start();
      voiceState.startedAt = Date.now();
      micBtn.classList.add("recording");
      showRecordingIndicator();
      voiceState.timerInterval = setInterval(updateRecordingIndicator, 250);
      voiceState.autoStopTimer = setTimeout(() => {
        if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === "recording") {
          stopRecording();
        }
      }, MAX_RECORDING_MS);
    } catch (err) {
      console.error("mic_permission_or_error", err);
      cleanupRecording();
      micBtn.classList.remove("recording");
      alert("Could not access your microphone. Please allow microphone access and try again.");
    }
  }

  function stopRecording() {
    if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === "recording") {
      voiceState.mediaRecorder.stop();
    }
  }

  function cleanupRecording() {
    if (voiceState.timerInterval) { clearInterval(voiceState.timerInterval); voiceState.timerInterval = null; }
    if (voiceState.autoStopTimer) { clearTimeout(voiceState.autoStopTimer); voiceState.autoStopTimer = null; }
    if (voiceState.stream) { voiceState.stream.getTracks().forEach((t) => t.stop()); voiceState.stream = null; }
    removeRecordingIndicator();
  }

  function showRecordingIndicator() {
    const composer = document.querySelector(".composer");
    if (!composer) return;
    voiceState.indicatorEl = document.createElement("div");
    voiceState.indicatorEl.className = "recording-indicator";
    voiceState.indicatorEl.innerHTML = '<span class="red-dot"></span><span class="rec-time">0:00</span> / 1:00';
    composer.appendChild(voiceState.indicatorEl);
  }

  function updateRecordingIndicator() {
    if (!voiceState.indicatorEl) return;
    const elapsedMs = Date.now() - voiceState.startedAt;
    const totalSec = Math.floor(elapsedMs / 1000);
    const min = Math.floor(totalSec / 60);
    const sec = totalSec % 60;
    const timeEl = voiceState.indicatorEl.querySelector(".rec-time");
    if (timeEl) timeEl.textContent = `${min}:${String(sec).padStart(2, "0")}`;
  }

  function removeRecordingIndicator() {
    if (voiceState.indicatorEl) { voiceState.indicatorEl.remove(); voiceState.indicatorEl = null; }
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => {
        const result = reader.result || "";
        const idx = String(result).indexOf(",");
        resolve(idx >= 0 ? String(result).slice(idx + 1) : "");
      };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  async function transcribeBlob(blob, mimeType) {
    const micBtn = document.getElementById("mic-btn");
    if (micBtn) micBtn.classList.add("transcribing");
    try {
      const audioBase64 = await blobToBase64(blob);
      const res = await fetch(API_BASE + "/transcribe", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
        body: JSON.stringify({ audioBase64, mimeType })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "transcription_failed");
      const text = (data.text || "").trim();
      if (text) {
        const inputEl = document.getElementById("input");
        if (inputEl) {
          const existing = inputEl.value.trim();
          inputEl.value = existing ? `${existing} ${text}` : text;
          inputEl.style.height = "auto";
          inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
          inputEl.focus();
          inputEl.dispatchEvent(new Event("input", { bubbles: true }));
        }
      }
    } catch (err) {
      console.error("transcribe_failed", err);
      alert("Could not transcribe your message. Please try again or type instead.");
    } finally {
      if (micBtn) micBtn.classList.remove("transcribing");
    }
  }

  // ===== Speaker (Shimrit voice playback) =====
  const speakerState = {
    currentAudio: null,
    currentBtnEl: null,
    currentIndex: -1
  };

  function setSpeakerBtnState(btnEl, stateName) {
    if (!btnEl) return;
    btnEl.classList.remove("loading", "playing");
    if (stateName === "loading") btnEl.classList.add("loading");
    else if (stateName === "playing") btnEl.classList.add("playing");
  }

  function stopCurrentAudio() {
    if (speakerState.currentAudio) {
      try { speakerState.currentAudio.pause(); } catch (e) {}
      try { URL.revokeObjectURL(speakerState.currentAudio.src); } catch (e) {}
      speakerState.currentAudio = null;
    }
    if (speakerState.currentBtnEl) {
      setSpeakerBtnState(speakerState.currentBtnEl, "idle");
      speakerState.currentBtnEl = null;
    }
    speakerState.currentIndex = -1;
  }

  async function playMessageAudio(msgIndex, btnEl) {
    // If the same message is already playing, stop it.
    if (speakerState.currentIndex === msgIndex && speakerState.currentAudio) {
      stopCurrentAudio();
      return;
    }
    // Stop anything currently playing first.
    stopCurrentAudio();

    const msg = state.messages[msgIndex];
    if (!msg || msg.role !== "assistant" || !msg.content) return;

    speakerState.currentBtnEl = btnEl;
    speakerState.currentIndex = msgIndex;
    setSpeakerBtnState(btnEl, "loading");

    try {
      const res = await fetch(API_BASE + "/speak", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-session-token": state.sessionToken
        },
        body: JSON.stringify({ text: msg.content })
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || "tts_failed");
      }
      const audioBlob = await res.blob();
      const audioUrl = URL.createObjectURL(audioBlob);
      const audio = new Audio(audioUrl);
      speakerState.currentAudio = audio;
      audio.onended = () => {
        if (speakerState.currentAudio === audio) stopCurrentAudio();
      };
      audio.onerror = () => {
        if (speakerState.currentAudio === audio) stopCurrentAudio();
      };
      setSpeakerBtnState(btnEl, "playing");
      await audio.play();
    } catch (err) {
      console.error("speak_failed", err);
      setSpeakerBtnState(btnEl, "idle");
      speakerState.currentAudio = null;
      speakerState.currentBtnEl = null;
      speakerState.currentIndex = -1;
    }
  }

  function onSpeakerClick(e) {
    const btn = e.target.closest(".speak-btn");
    if (!btn) return;
    const idx = parseInt(btn.dataset.msgIndex, 10);
    if (Number.isNaN(idx)) return;
    playMessageAudio(idx, btn);
  }

  function maybeAutoplayLastAssistant() {
    if (!state.autoplay) return;
    const lastIdx = state.messages.length - 1;
    if (lastIdx < 0) return;
    const last = state.messages[lastIdx];
    if (!last || last.role !== "assistant") return;
    // Defer a tick so the DOM has the button rendered.
    setTimeout(() => {
      const btn = document.querySelector(`.speak-btn[data-msg-index="${lastIdx}"]`);
      if (btn) playMessageAudio(lastIdx, btn);
    }, 50);
  }

  function onAutoplayChange(e) {
    state.autoplay = !!e.target.checked;
    try { localStorage.setItem("tfif_autoplay_v1", state.autoplay ? "1" : "0"); } catch (err) {}
  }

  async function loadFullState() {
    try {
      const data = await apiState(state.sessionToken);
      if (data.expired) {
        // Window closed — keep the conversation visible in read-only mode.
        state.readOnly = true;
        state.view = "chat";
        render();
        return;
      }
      state.currentDay = data.currentDay || 1;
      state.lastCompletedDay = data.lastCompletedDay || 0;
      state.tier = data.tier;
      state.timeRemainingMs = data.timeRemainingMs;
      state.messages = data.messages || [];
      // 72h window is over if there is no current day, or no time left.
      state.readOnly = !data.currentDay || (state.timeRemainingMs !== null && state.timeRemainingMs <= 0);
      state.view = "chat";
      render();
    } catch (err) {
      clearToken();
      state.sessionToken = null;
      state.error = "Session expired. Please start again.";
      state.view = "entry";
      render();
    }
  }

  function init() {
    applyTheme(loadTheme());
    applyFontScale(state.fontScale);
    const existing = loadToken();
    if (existing) {
      state.sessionToken = existing;
      loadFullState();
    } else {
      state.view = "entry";
      render();
    }
    setInterval(() => {
      if (state.timeRemainingMs && state.timeRemainingMs > 0) {
        state.timeRemainingMs = Math.max(0, state.timeRemainingMs - 60000);
        if (state.view === "chat" && !state.readOnly) {
          const tb = document.querySelector(".time-value");
          if (tb) {
            const t = formatTime(state.timeRemainingMs);
            tb.textContent = `${t.h}h ${t.m}m`;
          }
          // The countdown just hit zero — flip into read-only mode.
          if (state.timeRemainingMs <= 0) {
            state.readOnly = true;
            render();
          }
        }
      }
    }, 60000);
  }

  init();
})();
</script>
</body>
</html>
