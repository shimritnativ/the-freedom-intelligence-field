  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // Minimal renderer for USER-typed messages. Supports bullets (- or *),
  // numbered lists (1.), and paragraph breaks from blank lines, but
  // deliberately NOT inline tokens (no [[button:...]] / [[mp3:...]] /
  // [[download:...]]), NOT links, NOT bold/italic — user-controlled
  // content must never be able to inject CTAs, audio cards, or HTML.
  // escapeHtml runs first; only the block-level list/paragraph patterns
  // become real HTML.
  function renderUserMessage(text) {
    const safe = escapeHtml(String(text || ""));
    const lines = safe.split("\n");
    const blocks = [];
    let paragraph = [];
    let listType = null;
    let listItems = [];

    function flushParagraph() {
      if (paragraph.length > 0) {
        blocks.push("<p>" + paragraph.join("<br>") + "</p>");
        paragraph = [];
      }
    }
    function flushList() {
      if (listType && listItems.length > 0) {
        blocks.push("<" + listType + ">" + listItems.map(i => "<li>" + i + "</li>").join("") + "</" + listType + ">");
        listItems = [];
        listType = null;
      }
    }

    for (const rawLine of lines) {
      const ulMatch = rawLine.match(/^\s*[-*]\s+(.+)$/);
      const olMatch = rawLine.match(/^\s*\d+\.\s+(.+)$/);
      const trimmed = rawLine.trim();

      if (ulMatch) {
        flushParagraph();
        if (listType !== "ul") { flushList(); listType = "ul"; }
        listItems.push(ulMatch[1]);
      } else if (olMatch) {
        flushParagraph();
        if (listType !== "ol") { flushList(); listType = "ol"; }
        listItems.push(olMatch[1]);
      } else if (trimmed === "") {
        flushParagraph();
        flushList();
      } else {
        flushList();
        paragraph.push(rawLine);
      }
    }
    flushParagraph();
    flushList();

    return blocks.join("");
  }

  // Light markdown renderer for assistant messages. Supports bold (**x**),
  // italic (*x*, _x_), inline code (`x`), bullet lists (-, *), numbered
  // lists (1.), paragraphs, and line breaks. Escapes HTML first to prevent
  // injection — only the parsed markdown patterns become real HTML.
  function renderMarkdown(text) {
    let html = escapeHtml(String(text || ""));

    // Direct download syntax: [[download:Label|URL|filename.pdf]] -> gold
    // button with HTML5 `download` attribute so the file saves straight to
    // the user's Downloads folder instead of opening inline in a tab. URL
    // can be absolute (https://...) or relative (/downloads/foo.pdf). The
    // download attribute only fires for same-origin URLs in modern browsers;
    // prefer relative paths or absolute URLs to the same Vercel domain.
    // Order matters: process [[download:...]] BEFORE [[button:...]] so the
    // three-part token is not partially matched by the two-part button regex.
    html = html.replace(/\[\[download:([^|\]]+)\|([^|\]]+)\|([^\]]+)\]\]/g, function (m, label, url, filename) {
      const u = String(url).trim();
      if (!/^(https?:\/\/|\/)/i.test(u)) return label.trim();
      const safeHref = u.replace(/"/g, "%22");
      const safeName = String(filename).trim().replace(/"/g, "");
      return '<a class="msg-cta-btn" href="' + safeHref + '" download="' + safeName + '">'
        + label.trim()
        + '<span class="msg-cta-arrow" aria-hidden="true">↓</span></a>';
    });

    // CTA button syntax: [[button:Label|https://url]] -> in-brand gold button.
    // escapeHtml has already run, so Label/URL arrive as safe text. Only
    // http(s) destinations are allowed; quotes are encoded before the href.
    html = html.replace(/\[\[button:([^|\]]+)\|([^\]]+)\]\]/g, function (m, label, url) {
      const u = String(url).trim();
      if (!/^https?:\/\//i.test(u)) return label.trim();
      const safeHref = u.replace(/"/g, "%22");
      return '<a class="msg-cta-btn" href="' + safeHref + '" target="_blank" rel="noopener noreferrer">'
        + label.trim()
        + '<span class="msg-cta-arrow" aria-hidden="true">→</span></a>';
    });

    // MP3 audio download syntax: [[mp3:Title|Text to speak]] -> audio card.
    // Renders a loading card that auto-fires generation via /api/speak (which
    // uses Shimrit's ElevenLabs cloned voice). The text portion may span
    // multiple lines; we stash it in a data-attr (base64) so newlines and
    // quotes survive the DOM. processMp3Cards() picks the card up after
    // render and starts the actual audio generation.
    html = html.replace(/\[\[mp3:([^|\]]+)\|([\s\S]+?)\]\]/g, function (m, title, text) {
      const t = title.trim();
      const txt = text.trim();
      if (!t || !txt) return "";
      try {
        const b64Text = btoa(unescape(encodeURIComponent(txt)));
        return '<div class="mp3-card" data-mp3-title="' + t.replace(/"/g, "&quot;") + '" data-mp3-text-b64="' + b64Text + '">'
          + '<div class="mp3-card-inner">'
          + '<div class="mp3-orb loading" aria-hidden="true"></div>'
          + '<div class="mp3-info">'
          + '<div class="mp3-title">Generating in Shimrit’s voice…</div>'
          + '<div class="mp3-meta">about 3 seconds</div>'
          + '</div></div></div>';
      } catch (e) {
        return "";
      }
    });

    // Inline formatting. Order matters: bold before italic so ** doesn't
    // get partially consumed by single-asterisk italic match.
    html = html.replace(/\*\*([^\n*]+?)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/__([^\n_]+?)__/g, "<strong>$1</strong>");
    html = html.replace(/(^|[^*])\*([^\n*]+?)\*(?!\*)/g, "$1<em>$2</em>");
    html = html.replace(/(^|[^_])_([^\n_]+?)_(?!_)/g, "$1<em>$2</em>");
    html = html.replace(/`([^`\n]+?)`/g, "<code>$1</code>");

    // Block-level parsing: paragraphs, line breaks, lists.
    const lines = html.split("\n");
    const blocks = [];
    let paragraph = [];
    let listType = null;
    let listItems = [];

    function flushParagraph() {
      if (paragraph.length > 0) {
        blocks.push("<p>" + paragraph.join("<br>") + "</p>");
        paragraph = [];
      }
    }
    function flushList() {
      if (listType && listItems.length > 0) {
        blocks.push("<" + listType + ">" + listItems.map(i => "<li>" + i + "</li>").join("") + "</" + listType + ">");
        listItems = [];
        listType = null;
      }
    }

    for (const rawLine of lines) {
      const line = rawLine;
      const trimmed = line.trim();
      const ulMatch = line.match(/^\s*[-*]\s+(.+)$/);
      const olMatch = line.match(/^\s*\d+\.\s+(.+)$/);

      if (ulMatch) {
        flushParagraph();
        if (listType !== "ul") { flushList(); listType = "ul"; }
        listItems.push(ulMatch[1]);
      } else if (olMatch) {
        flushParagraph();
        if (listType !== "ol") { flushList(); listType = "ol"; }
        listItems.push(olMatch[1]);
      } else if (trimmed === "") {
        flushParagraph();
        flushList();
      } else {
        flushList();
        paragraph.push(line);
      }
    }
    flushParagraph();
    flushList();

    return blocks.join("");
  }

  // ===== MP3 audio card generation =====
  // Each [[mp3:Title|Text]] token renders as a loading card. After
  // renderMessages() runs we scan for any cards that haven't been processed
  // yet and fire /api/speak to generate the audio in Shimrit's voice. Once
  // the audio arrives we swap the card from loading state into the inline
  // player UI.
  //
  // CRITICAL: renderMessages() replaces wrap.innerHTML wholesale on every
  // new message, which DESTROYS any "ready" cards built in renderMp3CardReady
  // along with the rest of the DOM. To survive re-renders, we cache the
  // generated blob URL and duration keyed by the token's base64 text (which
  // is stable across renders for the same token). When processMp3Cards
  // re-mounts a card after a re-render, it checks the cache first and
  // restores the player immediately, never re-firing /api/speak. We also
  // dedupe simultaneous in-flight fetches via mp3InFlight so two cards
  // pointing at the same text share one request.
  const mp3BlobCache = new Map(); // b64Text -> { url, duration, title }
  const mp3InFlight = new Map(); // b64Text -> Promise<{ url, duration, title }>

  function processMp3Cards() {
    document.querySelectorAll(".mp3-card:not(.mp3-processed)").forEach(card => {
      card.classList.add("mp3-processed");
      const title = card.getAttribute("data-mp3-title") || "Your audio";
      const b64 = card.getAttribute("data-mp3-text-b64") || "";

      // Cache hit: this exact text was generated already. Render the player
      // straight away from the cached blob — no /api/speak call needed.
      const cached = b64 ? mp3BlobCache.get(b64) : null;
      if (cached) {
        renderMp3CardReady(card, cached.title || title, cached.url, cached.duration);
        return;
      }

      let text = "";
      try {
        text = decodeURIComponent(escape(atob(b64)));
      } catch (e) {
        text = "";
      }
      if (!text || !state.sessionToken) {
        renderMp3CardError(card, title);
        return;
      }
      generateMp3Audio(card, title, text, b64);
    });
  }

  async function generateMp3Audio(card, title, text, cacheKey) {
    try {
      // If another card is already generating this same audio, await its
      // promise instead of firing a duplicate request. This protects against
      // the common case where renderMessages re-mounts the same MP3 token
      // before the first /api/speak call has come back.
      let inflight = cacheKey ? mp3InFlight.get(cacheKey) : null;
      if (!inflight) {
        inflight = (async () => {
          const res = await fetch(API_BASE + "/speak", {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
            body: JSON.stringify({ text })
          });
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.error || ("speak_" + res.status));
          }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);

          // Probe duration via a hidden Audio element. The 4-second timeout
          // protects against browsers that never fire loadedmetadata.
          const probe = new Audio();
          probe.preload = "metadata";
          const durationSec = await new Promise(resolve => {
            const onLoaded = () => resolve(Math.round(probe.duration || 0));
            const onErr = () => resolve(0);
            probe.addEventListener("loadedmetadata", onLoaded, { once: true });
            probe.addEventListener("error", onErr, { once: true });
            probe.src = url;
            setTimeout(() => resolve(Math.round(probe.duration || 0)), 4000);
          });
          return { url, duration: durationSec, title };
        })();
        if (cacheKey) mp3InFlight.set(cacheKey, inflight);
      }

      const result = await inflight;

      // Save into the long-lived cache so future re-renders skip the API.
      if (cacheKey) mp3BlobCache.set(cacheKey, result);

      renderMp3CardReady(card, result.title || title, result.url, result.duration);
    } catch (err) {
      console.error("mp3_generation_failed", err);
      // Allow a future card mount to retry by clearing the in-flight marker.
      if (cacheKey) mp3InFlight.delete(cacheKey);
      renderMp3CardError(card, title);
    } finally {
      // Once the in-flight promise resolves, clear it so the long-lived
      // mp3BlobCache becomes the single source of truth from here on.
      if (cacheKey && mp3InFlight.get(cacheKey) && mp3BlobCache.has(cacheKey)) {
        mp3InFlight.delete(cacheKey);
      }
    }
  }

  function renderMp3CardReady(card, title, url, durationSec) {
    const filename = (title || "audio").replace(/[^a-z0-9-_]+/gi, "-").replace(/^-+|-+$/g, "") + ".mp3";
    const totalLabel = formatMp3Time(durationSec);
    // Inline player layout: top row = play button + title + download.
    // Middle row = scrubber + time. Bottom row = speed pills.
    card.innerHTML =
      '<div class="mp3-player">' +
        '<div class="mp3-player-top">' +
          '<button type="button" class="mp3-play-btn" aria-label="Play">' +
            '<svg class="mp3-icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>' +
            '<svg class="mp3-icon-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>' +
          '</button>' +
          '<div class="mp3-player-title">' + escapeHtml(title) + '</div>' +
          '<button type="button" class="mp3-download-btn">Download</button>' +
        '</div>' +
        '<div class="mp3-scrubber-row">' +
          '<input type="range" class="mp3-scrubber" min="0" max="1000" value="0" step="1" aria-label="Seek" />' +
          '<div class="mp3-time"><span class="mp3-time-cur">0:00</span> / <span class="mp3-time-total">' + escapeHtml(totalLabel) + '</span></div>' +
        '</div>' +
        '<div class="mp3-speed-row">' +
          '<div class="mp3-speed-group" role="group" aria-label="Playback speed">' +
            '<button type="button" class="mp3-speed-btn active" data-speed="1">1×</button>' +
            '<button type="button" class="mp3-speed-btn" data-speed="1.5">1.5×</button>' +
            '<button type="button" class="mp3-speed-btn" data-speed="2">2×</button>' +
          '</div>' +
          '<div class="mp3-voice-label" style="font-size:11px;color:var(--text-dim);letter-spacing:0.02em;">MP3</div>' +
        '</div>' +
        '<audio class="mp3-audio" src="' + url + '" preload="metadata"></audio>' +
      '</div>';

    wireMp3Player(card, url, filename);
  }

  function formatMp3Time(sec) {
    sec = Math.max(0, Math.floor(sec || 0));
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return m + ":" + (s < 10 ? "0" : "") + s;
  }

  function wireMp3Player(card, url, filename) {
    const audio = card.querySelector(".mp3-audio");
    const playBtn = card.querySelector(".mp3-play-btn");
    const iconPlay = card.querySelector(".mp3-icon-play");
    const iconPause = card.querySelector(".mp3-icon-pause");
    const scrubber = card.querySelector(".mp3-scrubber");
    const curEl = card.querySelector(".mp3-time-cur");
    const totalEl = card.querySelector(".mp3-time-total");
    const downloadBtn = card.querySelector(".mp3-download-btn");
    const speedBtns = card.querySelectorAll(".mp3-speed-btn");

    if (!audio) return;

    // Play / pause toggle.
    playBtn.addEventListener("click", () => {
      if (audio.paused) {
        // Pause any other audio elements that may be playing.
        document.querySelectorAll(".mp3-audio").forEach(a => { if (a !== audio) a.pause(); });
        audio.play();
      } else {
        audio.pause();
      }
    });
    audio.addEventListener("play", () => {
      iconPlay.style.display = "none";
      iconPause.style.display = "block";
      playBtn.setAttribute("aria-label", "Pause");
    });
    audio.addEventListener("pause", () => {
      iconPlay.style.display = "block";
      iconPause.style.display = "none";
      playBtn.setAttribute("aria-label", "Play");
    });
    audio.addEventListener("ended", () => {
      iconPlay.style.display = "block";
      iconPause.style.display = "none";
      playBtn.setAttribute("aria-label", "Play");
      scrubber.value = 0;
      curEl.textContent = "0:00";
    });

    // Update scrubber + time as audio plays.
    audio.addEventListener("loadedmetadata", () => {
      if (audio.duration && isFinite(audio.duration)) {
        totalEl.textContent = formatMp3Time(audio.duration);
      }
    });
    audio.addEventListener("timeupdate", () => {
      if (!audio.duration || !isFinite(audio.duration)) return;
      const pct = (audio.currentTime / audio.duration) * 1000;
      scrubber.value = Math.round(pct);
      curEl.textContent = formatMp3Time(audio.currentTime);
    });
    // Scrub.
    scrubber.addEventListener("input", () => {
      if (!audio.duration || !isFinite(audio.duration)) return;
      const pct = Number(scrubber.value) / 1000;
      audio.currentTime = pct * audio.duration;
    });

    // Speed pills.
    speedBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        const rate = parseFloat(btn.getAttribute("data-speed")) || 1;
        audio.playbackRate = rate;
        speedBtns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });

    // Download.
    if (downloadBtn) {
      downloadBtn.addEventListener("click", () => {
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      });
    }
  }

  // Create a hidden iframe, write the branded HTML into it, wait for it to
  // load, then trigger the browser's print dialog from inside the iframe.
  // The document.title becomes the default filename the browser suggests
  // when the user picks "Save as PDF".
  function openPrintDialog(htmlString, docTitle) {
    return new Promise((resolve) => {
      const iframe = document.createElement("iframe");
      iframe.style.position = "fixed";
      iframe.style.right = "0";
      iframe.style.bottom = "0";
      iframe.style.width = "0";
      iframe.style.height = "0";
      iframe.style.border = "0";
      document.body.appendChild(iframe);

      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open();
      doc.write(
        "<!DOCTYPE html><html><head><meta charset=\"utf-8\"><title>" +
        escapeHtml(docTitle) +
        "</title><style>" +
        "@page { size: A4; margin: 15mm 15mm 18mm 15mm; }" +
        "body { margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }" +
        "</style></head><body>" +
        htmlString +
        "</body></html>"
      );
      doc.close();

      // Wait for the iframe content (and any fonts) to be fully ready
      // before calling print(), otherwise the first call may render blank.
      let cleaned = false;
      const cleanup = () => {
        if (cleaned) return;
        cleaned = true;
        if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
        resolve();
      };
      const triggerPrint = () => {
        try {
          // Listen for afterprint so we keep the iframe alive for the entire
          // duration of the print dialog. iOS Safari shows an "Allow auto-
          // print?" warning on repeated exports; if we remove the iframe on
          // a fixed timer, by the time the user taps Allow the iframe is
          // already gone and the preview shows blank.
          try {
            iframe.contentWindow.addEventListener("afterprint", cleanup, { once: true });
          } catch (err) { /* iframe may not support events; rely on timeout */ }
          iframe.contentWindow.focus();
          iframe.contentWindow.print();
        } catch (err) {
          console.error("print_failed", err);
        }
        // Safety net: remove the iframe after 60s no matter what, so it
        // doesn't leak if afterprint never fires (some browsers don't fire
        // it when the user cancels the print dialog).
        setTimeout(cleanup, 60000);
      };
      if (doc.readyState === "complete") {
        setTimeout(triggerPrint, 200);
      } else {
        iframe.addEventListener("load", () => setTimeout(triggerPrint, 200), { once: true });
        // Safety timeout in case load never fires.
        setTimeout(triggerPrint, 1200);
      }
    });
  }

    const effectiveTier = tier || state.tier;

    const owner = displayName ? escapeHtml(displayName) + "'s" : "Your";

    // into inline-styled HTML appropriate for PDF rendering. Mirrors the
    // in-app renderMarkdown logic so PDF output matches the chat exactly.
    function renderMessageBodyHtml(content) {
      let html = escapeHtml(content);
      // Inline marks. Order matters: bold before italic so ** isn't partially
      // consumed by single-asterisk italic.
      html = html.replace(/\*\*([^\n*]+?)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/__([^\n_]+?)__/g, "<strong>$1</strong>");
      html = html.replace(/(^|[^*])\*([^\n*]+?)\*(?!\*)/g, "$1<em>$2</em>");
      html = html.replace(/(^|[^_])_([^\n_]+?)_(?!_)/g, "$1<em>$2</em>");
      html = html.replace(/`([^`\n]+?)`/g, '<code style="background:rgba(201,168,76,0.12); padding:1px 5px; border-radius:3px; font-family:Menlo,Consolas,monospace; font-size:0.92em;">$1</code>');

      // Block parsing: paragraphs, line breaks, bullet & numbered lists.
      const lines = html.split("\n");
      const blocks = [];
      let para = [];
      let listType = null;
      let listItems = [];
      const flushPara = () => {
        if (para.length > 0) {
          blocks.push('<p style="margin:0 0 8px 0;">' + para.join("<br/>") + '</p>');
          para = [];
        }
      };
      const flushList = () => {
        if (listType && listItems.length > 0) {
          const tag = listType === "ul" ? "ul" : "ol";
          blocks.push('<' + tag + ' style="margin:6px 0 10px 0; padding-left:22px;">' +
            listItems.map(i => '<li style="margin-bottom:4px;">' + i + '</li>').join("") +
            '</' + tag + '>');
          listItems = [];
          listType = null;
        }
      };
      for (const rawLine of lines) {
        const trimmed = rawLine.trim();
        const ulMatch = rawLine.match(/^\s*[-*]\s+(.+)$/);
        const olMatch = rawLine.match(/^\s*\d+\.\s+(.+)$/);
        if (ulMatch) {
          flushPara();
          if (listType !== "ul") { flushList(); listType = "ul"; }
          listItems.push(ulMatch[1]);
        } else if (olMatch) {
          flushPara();
          if (listType !== "ol") { flushList(); listType = "ol"; }
          listItems.push(olMatch[1]);
        } else if (trimmed === "") {
          flushPara();
          flushList();
        } else {
          flushList();
          para.push(rawLine);
        }
      }
      flushPara();
      flushList();
      return blocks.join("");
    }

    function messageBlock(m) {
      const speaker = m.role === "user" ? "You" : "The Field";
      const speakerColor = m.role === "user" ? "#1A1612" : "#9A6E10";
      let content = String(m.content || "")
        .replace(/\[\[button:[^\]]+\]\]/g, "")
        .replace(/\[\[mp3:[^|\]]+\|[\s\S]+?\]\]/g, "")
        .trim();
      if (!content) return "";
      const body = renderMessageBodyHtml(content);
      return `
        <div style="margin:0 0 18px 0; page-break-inside:avoid;">
          <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-weight:700; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:${speakerColor}; margin-bottom:5px;">${speaker}</div>
          <div style="font-family:Georgia,'Times New Roman',serif; font-size:13px; line-height:1.65; color:#1A1612;">${body}</div>
        </div>`;
    }

    let daysHtml = "";
    let anyContent = false;
    for (const d of [1, 2, 3]) {
      if (byDay[d].length === 0) continue;
      anyContent = true;
      const msgsHtml = byDay[d].map(messageBlock).join("");
      daysHtml += `
        <div style="${d === 1 ? "" : "page-break-before:always;"} padding-top:${d === 1 ? "8px" : "20px"};">
          <div style="border-bottom:1.5px solid #C9A84C; padding-bottom:10px; margin-bottom:22px;">
            <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.22em; color:#C9A84C; text-transform:uppercase;">Day ${d}</div>
            <div style="font-family:Georgia,'Times New Roman',serif; font-style:italic; font-size:26px; color:#1A1612; margin-top:4px;">${RESET_DAY_TITLES[d]}</div>
          </div>
          ${msgsHtml}
        </div>`;
    }

    const emptyBlock = `<div style="text-align:center; color:rgba(26,22,18,0.55); padding:60px 20px; font-family:Georgia,'Times New Roman',serif; font-style:italic;">No conversations recorded yet. Come back after a session.</div>`;

    // Upsell to Unlimited — preview tier only. Full-tier members already
    // have unlimited access; showing them this would be confusing. The URL
    // is displayed on a separate line so it works on paper, and wrapped in
    // an anchor so PDF readers can make it tappable on phones.
    const upsellBlock = (effectiveTier === "preview") ? `
      <div style="margin:36px 0 18px; padding:26px 24px; background:rgba(201,168,76,0.06); border:1.5px solid #C9A84C; border-radius:12px; text-align:center; page-break-inside:avoid;">
        <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.22em; color:#C9A84C; text-transform:uppercase; margin-bottom:12px;">The Field — Unlimited</div>
        <div style="font-family:Georgia,'Times New Roman',serif; font-style:italic; font-size:24px; color:#1A1612; margin-bottom:10px;">Continue the work.</div>
        <div style="font-family:Georgia,'Times New Roman',serif; font-size:14px; color:rgba(26,22,18,0.75); line-height:1.6; max-width:480px; margin:0 auto 18px;">Unlimited conversations with the Field, plus the six guided processes &mdash; mind, heart, and body, anytime.</div>
        <a href="${escapeHtml(UNLIMITED_URL)}" style="display:inline-block; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.12em; color:#1A1612; text-transform:uppercase; text-decoration:none; padding:11px 22px; background:#C9A84C; border-radius:8px;">Unlock The Field</a>
        <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:11px; color:rgba(26,22,18,0.55); margin-top:14px; word-break:break-all;">${escapeHtml(UNLIMITED_URL.replace(/^https?:\/\//, ""))}</div>
      </div>` : "";

    return `
      <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#1A1612; background:#FFFFFF;">
        <div style="text-align:center; padding:24px 20px 28px;">
          <div style="font-size:10px; font-weight:700; letter-spacing:0.22em; color:#C9A84C; text-transform:uppercase;">Master Your Path</div>
          <div style="font-family:Georgia,'Times New Roman',serif; font-style:italic; font-size:30px; color:#1A1612; margin-top:10px; line-height:1.25;">${owner}<br/>Freedom Intelligence Field</div>
          <div style="font-size:13px; color:rgba(26,22,18,0.65); margin-top:14px;">72-Hour Power Reset</div>
          <div style="font-size:11px; color:rgba(26,22,18,0.4); margin-top:6px; letter-spacing:0.04em;">Saved ${escapeHtml(dateStr)}</div>
        </div>
        ${anyContent ? daysHtml : emptyBlock}
        ${upsellBlock}
        <div style="text-align:center; padding:28px 20px 14px; margin-top:${effectiveTier === "preview" ? "20" : "30"}px; border-top:1px solid rgba(26,22,18,0.15);">
          <div style="font-family:Georgia,'Times New Roman',serif; font-size:11px; color:rgba(26,22,18,0.5); font-style:italic; line-height:1.6;">A record of your work with the Freedom Intelligence Field<br/>Master Your Path</div>
        </div>
      </div>`;
  }

  // ===== Unlimited export — single chat and all conversations =====
  // Mirrors the Reset export pattern: build branded HTML, drop it into a
  // hidden iframe, trigger window.print(). Browser renders to PDF natively.
  // We reuse the markdown-to-HTML conversion and the [[token:...]] stripping
  // from the Reset export so PDF output matches the chat exactly.

  // Shared helpers extracted so both single-chat and all-conversations
  // builders can render messages identically.
  function unlimitedExportRenderMessageBody(content) {
    let html = escapeHtml(content);
    html = html.replace(/\*\*([^\n*]+?)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/__([^\n_]+?)__/g, "<strong>$1</strong>");
    html = html.replace(/(^|[^*])\*([^\n*]+?)\*(?!\*)/g, "$1<em>$2</em>");
    html = html.replace(/(^|[^_])_([^\n_]+?)_(?!_)/g, "$1<em>$2</em>");
    html = html.replace(/`([^`\n]+?)`/g, '<code style="background:rgba(201,168,76,0.12); padding:1px 5px; border-radius:3px; font-family:Menlo,Consolas,monospace; font-size:0.92em;">$1</code>');
    const lines = html.split("\n");
    const blocks = [];
    let para = [];
    let listType = null;
    let listItems = [];
    const flushPara = () => {
      if (para.length > 0) { blocks.push('<p style="margin:0 0 8px 0;">' + para.join("<br/>") + '</p>'); para = []; }
    };
    const flushList = () => {
      if (listType && listItems.length > 0) {
        const tag = listType === "ul" ? "ul" : "ol";
        blocks.push('<' + tag + ' style="margin:6px 0 10px 0; padding-left:22px;">' +
          listItems.map(i => '<li style="margin-bottom:4px;">' + i + '</li>').join("") + '</' + tag + '>');
        listItems = []; listType = null;
      }
    };
    for (const rawLine of lines) {
      const trimmed = rawLine.trim();
      const ulMatch = rawLine.match(/^\s*[-*]\s+(.+)$/);
      const olMatch = rawLine.match(/^\s*\d+\.\s+(.+)$/);
      if (ulMatch) {
        flushPara();
        if (listType !== "ul") { flushList(); listType = "ul"; }
        listItems.push(ulMatch[1]);
      } else if (olMatch) {
        flushPara();
        if (listType !== "ol") { flushList(); listType = "ol"; }
        listItems.push(olMatch[1]);
      } else if (trimmed === "") {
        flushPara(); flushList();
      } else {
        flushList(); para.push(rawLine);
      }
    }
    flushPara(); flushList();
    return blocks.join("");
  }

  function unlimitedExportMessageBlock(m) {
    const speaker = m.role === "user" ? "You" : "The Field";
    const speakerColor = m.role === "user" ? "#1A1612" : "#9A6E10";
    let content = String(m.content || "")
      .replace(/\[\[button:[^\]]+\]\]/g, "")
      .replace(/\[\[download:[^\]]+\]\]/g, "")
      .replace(/\[\[mp3:[^|\]]+\|[\s\S]+?\]\]/g, "")
      .trim();
    if (!content) return "";
    const body = unlimitedExportRenderMessageBody(content);
    return `
      <div style="margin:0 0 18px 0; page-break-inside:avoid;">
        <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-weight:700; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:${speakerColor}; margin-bottom:5px;">${speaker}</div>
        <div style="font-family:Georgia,'Times New Roman',serif; font-size:13px; line-height:1.65; color:#1A1612;">${body}</div>
      </div>`;
  }

  function unlimitedExportChatHeader(session) {
    // Render the chat title + dates as a section divider. Matches the Day
    // dividers in the Reset export visually so the two PDFs feel like one
    // family of documents.
    const title = (session && session.title) || "Conversation";
    const startedAt = session && session.startedAt
      ? new Date(session.startedAt).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })
      : "";
    const lastAt = session && session.lastMessageAt
      ? new Date(session.lastMessageAt).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })
      : "";
    const dateLine = (startedAt && lastAt && startedAt !== lastAt)
      ? `${startedAt} to ${lastAt}`
      : (startedAt || lastAt);
    return `
      <div style="border-bottom:1.5px solid #C9A84C; padding-bottom:10px; margin-bottom:22px;">
        <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.22em; color:#C9A84C; text-transform:uppercase;">The Field — Unlimited</div>
        <div style="font-family:Georgia,'Times New Roman',serif; font-style:italic; font-size:22px; color:#1A1612; margin-top:4px; line-height:1.25;">${escapeHtml(title)}</div>
        ${dateLine ? `<div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:11px; color:rgba(26,22,18,0.55); margin-top:6px; letter-spacing:0.04em;">${escapeHtml(dateLine)}</div>` : ""}
      </div>`;
  }

  function unlimitedExportDocumentWrapper(innerHtml, displayName, subtitle) {
    const owner = displayName ? escapeHtml(displayName) + "'s" : "Your";
    const dateStr = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    return `
      <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#1A1612; background:#FFFFFF;">
        <div style="text-align:center; padding:24px 20px 28px;">
          <div style="font-size:10px; font-weight:700; letter-spacing:0.22em; color:#C9A84C; text-transform:uppercase;">Master Your Path</div>
          <div style="font-family:Georgia,'Times New Roman',serif; font-style:italic; font-size:30px; color:#1A1612; margin-top:10px; line-height:1.25;">${owner}<br/>Freedom Intelligence Field</div>
          <div style="font-size:13px; color:rgba(26,22,18,0.65); margin-top:14px;">${escapeHtml(subtitle)}</div>
          <div style="font-size:11px; color:rgba(26,22,18,0.4); margin-top:6px; letter-spacing:0.04em;">Saved ${escapeHtml(dateStr)}</div>
        </div>
        ${innerHtml}
        <div style="text-align:center; padding:28px 20px 14px; margin-top:30px; border-top:1px solid rgba(26,22,18,0.15);">
          <div style="font-family:Georgia,'Times New Roman',serif; font-size:11px; color:rgba(26,22,18,0.5); font-style:italic; line-height:1.6;">A record of your work with the Freedom Intelligence Field<br/>Master Your Path</div>
        </div>
      </div>`;
  }

  function buildUnlimitedSingleChatExportHtml(session, messages, displayName) {
    const msgsHtml = (messages || []).map(unlimitedExportMessageBlock).join("");
    const emptyBlock = `<div style="text-align:center; color:rgba(26,22,18,0.55); padding:60px 20px; font-family:Georgia,'Times New Roman',serif; font-style:italic;">This conversation has no messages yet.</div>`;
    const inner = `
      <div style="padding-top:8px;">
        ${unlimitedExportChatHeader(session)}
        ${msgsHtml || emptyBlock}
      </div>`;
    return unlimitedExportDocumentWrapper(inner, displayName, "The Field — Unlimited");
  }

  function buildUnlimitedAllExportHtml(chats, displayName) {
    if (!chats || chats.length === 0) {
      const inner = `<div style="text-align:center; color:rgba(26,22,18,0.55); padding:60px 20px; font-family:Georgia,'Times New Roman',serif; font-style:italic;">No conversations recorded yet.</div>`;
      return unlimitedExportDocumentWrapper(inner, displayName, "The Field — Unlimited");
    }
    // Each chat gets its own page-break so they read as separate sections.
    // Pinned chats first, then recent — same ordering the sidebar uses.
    const ordered = chats.slice().sort((a, b) => {
      const ap = a.session && a.session.pinnedAt;
      const bp = b.session && b.session.pinnedAt;
      if (ap && !bp) return -1;
      if (!ap && bp) return 1;
      if (ap && bp) return new Date(bp).getTime() - new Date(ap).getTime();
      const aT = new Date((a.session && (a.session.lastMessageAt || a.session.startedAt)) || 0).getTime();
      const bT = new Date((b.session && (b.session.lastMessageAt || b.session.startedAt)) || 0).getTime();
      return bT - aT;
    });
    const sections = ordered.map((chat, i) => {
      const msgsHtml = (chat.messages || []).map(unlimitedExportMessageBlock).join("");
      if (!msgsHtml) return ""; // skip empty chats
      return `
        <div style="${i === 0 ? "" : "page-break-before:always;"} padding-top:${i === 0 ? "8px" : "20px"};">
          ${unlimitedExportChatHeader(chat.session)}
          ${msgsHtml}
        </div>`;
    }).join("");
    return unlimitedExportDocumentWrapper(sections, displayName, "The Field — Unlimited");
  }

  async function onExportUnlimitedChatClick(sessionId) {
    if (!state.sessionToken || !sessionId) return;
    const session = state.unlimitedSessions.find(s => s.id === sessionId);
    if (!session) return;
    state.openChatMenuId = null;
    state.openChatMenuOrigin = null;
    render();
    try {
      // If this is the currently active chat, use the in-memory messages so
      // the export reflects exactly what the user sees on screen (including
      // anything they just sent). Otherwise fetch fresh from the API.
      let messages;
      if (state.activeUnlimitedId === sessionId && state.unlimitedMessages.length > 0) {
        messages = state.unlimitedMessages;
      } else {
        const data = await apiLoadUnlimited(sessionId);
        messages = data.messages || [];
      }
      const htmlString = buildUnlimitedSingleChatExportHtml(session, messages, state.displayName);
      const safeTitle = String(session.title || "conversation").replace(/[^a-z0-9-_]+/gi, "-").replace(/^-+|-+$/g, "").toLowerCase();
      const dateSuffix = new Date().toISOString().slice(0, 10);
      const docTitle = "field-" + (safeTitle || "conversation") + "-" + dateSuffix;
      await openPrintDialog(htmlString, docTitle);
    } catch (err) {
      console.error("export_unlimited_chat_failed", err);
      alert("Could not export this conversation right now. Please try again in a moment.");
    }
  }

  async function onExportAllUnlimitedClick(e) {
    if (e && e.preventDefault) e.preventDefault();
    if (!state.sessionToken) return;
    if (!state.unlimitedSessions || state.unlimitedSessions.length === 0) {
      alert("No conversations to export yet. Start one first.");
      return;
    }
    const btn = e && e.currentTarget;
    const originalLabel = btn ? btn.innerHTML : null;
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = "Preparing…";
    }
    try {
      // Fetch messages for every chat sequentially. This is intentionally
      // simple — for the typical user (5-30 chats) it completes in a few
      // seconds. If a future heavy user complains about wait time, we can
      // add a server-side "/api/unlimited/export-all" that returns
      // everything in one round-trip.
      const chats = [];
      for (const session of state.unlimitedSessions) {
        try {
          const data = await apiLoadUnlimited(session.id);
          chats.push({ session: Object.assign({}, session, data.session || {}), messages: data.messages || [] });
        } catch (err) {
          // Skip chats that fail to load rather than failing the whole export.
          console.warn("export_skip_chat", session.id, err && err.message);
        }
      }
      const htmlString = buildUnlimitedAllExportHtml(chats, state.displayName);
      const dateSuffix = new Date().toISOString().slice(0, 10);
      const docTitle = "field-unlimited-conversations-" + dateSuffix;
      await openPrintDialog(htmlString, docTitle);
    } catch (err) {
      console.error("export_all_unlimited_failed", err);
      alert("Could not export your conversations right now. Please try again in a moment.");
    } finally {
      if (btn && originalLabel != null) { btn.disabled = false; btn.innerHTML = originalLabel; }
    }
  }

  // ===== Mobile chrome =====
  // Top bar: hamburger (always visible — opens drawer = full sidebar) + section
  // pill (DAY 1 / 2 / 3 or UNLIMITED — at-a-glance "you are here") + brand text
  // (active section title + product subtitle) + theme toggle.
  function renderMobileTopBar() {
    // Theme now follows the device's system preference automatically (see
    // subscribeSystemTheme), so the mobile top bar no longer needs its own
    // toggle button. We reuse that slot for the 3-dot chat menu when the
    // user is viewing an Unlimited chat.

    // Default = entry view (about to start Day 1).
    let title = "Day 1: State Reset";
    let subtitle = "72-Hour Power Reset";
    let pillLabel = "DAY 1";
    let pillStyle = "reset";

    if (state.view === "chat") {
      const d = DAY_META[state.currentDay - 1];
      title = `Day ${state.currentDay} · ${d.theme}`;
      subtitle = "72-Hour Power Reset";
      pillLabel = `DAY ${state.currentDay}`;
      pillStyle = "reset";
    } else if (state.view === "unlimited-chat") {
      const active = state.unlimitedSessions.find(s => s.id === state.activeUnlimitedId);
      title = active ? (active.title || "New chat") : "The Field";
      subtitle = "The Field — Unlimited";
      pillLabel = "UNLIMITED";
      pillStyle = "unlimited";
    } else if (state.view === "welcome") {
      // Welcome view is the calm landing for Unlimited members. No day pill,
      // no Reset framing — just the brand. The session pill stays empty so
      // the top bar reads cleanly: hamburger, brand, nothing else.
      title = "The Freedom Intelligence Field";
      subtitle = "Master Your Path";
      pillLabel = "";
      pillStyle = "";
    } else if (state.view === "category") {
      // Category view shows one section of the library. The pill becomes
      // "LIBRARY" (unlimited-coloured) and the title becomes the category
      // name so the participant always sees where they are.
      const cat = PROCESS_CATEGORIES.find(c => c.key === state.activeCategoryKey);
      title = cat ? cat.name : "The Field Library";
      subtitle = "The Field — Library";
      pillLabel = "LIBRARY";
      pillStyle = "unlimited";
    } else if (state.view === "library") {
      // Library hub — the all-categories landing page. Different pill text
      // ("THE LIBRARY") so the member knows they're at the overview, not
      // already inside a category.
      title = "Start a guided process";
      subtitle = "The Field — Library";
      pillLabel = "THE LIBRARY";
      pillStyle = "unlimited";
    }

    // Day 3 only: show a small download icon in the mobile top bar that
    // triggers the same Export flow as the desktop pill. Keeps the in-context
    // discovery moment without crowding the mobile chrome on other days.
    const showMobileExport = state.view === "chat" && state.currentDay === 3;
    const exportBtn = showMobileExport
      ? `<button class="mobile-export-btn" id="mobile-export-btn" type="button" aria-label="Export your conversations" title="Export your conversations">
           <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
             <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
             <polyline points="7 10 12 15 17 10"/>
             <line x1="12" y1="15" x2="12" y2="3"/>
           </svg>
         </button>`
      : "";

    return `
      <div class="mobile-top-bar">
        <button class="mobile-menu-btn" id="mobile-menu-btn" type="button" aria-label="Open menu">☰</button>
        ${pillLabel ? `<span class="mobile-section-pill mobile-section-${pillStyle}">${escapeHtml(pillLabel)}</span>` : ""}
        <div class="mobile-brand">
          <img src="https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/file-uploads/themes/2161454568/settings_images/d2126ef-2bee-6f2c-8c2-d1357db52300_myp_logo.png" alt="Master Your Path" />
          <div class="mobile-brand-text">
            ${escapeHtml(title)}
            <span class="mobile-brand-sub">${escapeHtml(subtitle)}</span>
          </div>
        </div>
        ${exportBtn}
        ${(function () {
          // When the user is in an Unlimited chat, the top-bar slot becomes
          // a 3-dot menu for Rename / Pin / Delete on the active chat. The
          // chat-header version of this button is hidden on mobile via CSS
          // because the top bar is the more thumb-reachable surface.
          if (state.view !== "unlimited-chat") return "";
          const active = state.unlimitedSessions.find(s => s.id === state.activeUnlimitedId);
          if (!active) return "";
          return `
            <button class="mobile-chat-menu-btn" data-chat-menu-id="${active.id}" data-chat-menu-origin="header" type="button" aria-label="Chat options">
              ${dotsIconSvg()}
            </button>
          `;
        })()}
      </div>
    `;
  }

  // Day chips (Reset view) OR active chat title + new-chat button (Unlimited view).
  // Suppressed on the entry screen.
  function renderMobileNavStrip() {
    if (state.view === "entry") return "";
    if (state.view === "unlimited-chat") {
      const active = state.unlimitedSessions.find(s => s.id === state.activeUnlimitedId);

    // Default: Reset day chips
    return `

            return `<button class="mobile-day-chip locked" type="button" disabled aria-disabled="true">Day ${n} · 🔒</button>`;
          }

  function renderMobileOverlay() {
    return `<div class="mobile-overlay${state.mobileDrawerOpen ? " open" : ""}" id="mobile-overlay"></div>`;
  }

  function formatRelativeTime(iso) {
    if (!iso) return "";
    const t = new Date(iso); const now = new Date();
    const diffMs = now - t; const diffMin = Math.floor(diffMs / 60000); const diffHr = Math.floor(diffMs / 3600000); const diffDay = Math.floor(diffMs / 86400000);
    if (diffMin < 2) return "Just now";
    if (diffMin < 60) return diffMin + "m ago";
    if (diffHr < 24) return diffHr + "h ago";
    if (diffDay < 7) return diffDay + "d ago";
    return t.toLocaleDateString();
  }
