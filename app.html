<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Freedom Intelligence Field</title>
<link rel="icon" type="image/png" href="https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/file-uploads/themes/2161454568/settings_images/d2126ef-2bee-6f2c-8c2-d1357db52300_myp_logo.png" />
<link rel="apple-touch-icon" href="https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/file-uploads/themes/2161454568/settings_images/d2126ef-2bee-6f2c-8c2-d1357db52300_myp_logo.png" />

<style>
  html[data-theme="dark"] {
    --bg: #080808;
    --panel: #0f0f0f;
    --panel-2: #131313;
    --sidebar-bg: #0a0a0a;
    --text: #f0ead6;
    --text-dim: rgba(240, 234, 214, 0.55);
    --text-mute: rgba(240, 234, 214, 0.28);
    --gold: #C9A84C;
    --gold-soft: rgba(201, 168, 76, 0.09);
    --gold-line: rgba(201, 168, 76, 0.16);
    --gold-strong: rgba(201, 168, 76, 0.25);
    --user-msg-bg: rgba(201, 168, 76, 0.10);
    --user-msg-border: rgba(201, 168, 76, 0.22);
    --assistant-msg-bg: rgba(240, 234, 214, 0.03);
    --assistant-msg-border: rgba(240, 234, 214, 0.07);
    --border: rgba(201, 168, 76, 0.07);
    --shadow: 0 0 80px rgba(201, 168, 76, 0.03), 0 24px 48px rgba(0,0,0,0.6);
    --demo-banner: #6B2C2C;
    --demo-banner-text: #FFD1D1;
    color-scheme: dark;
  }
  html[data-theme="light"] {
    --bg: #F7F1E1;
    --panel: #FFFFFF;
    --panel-2: #FAF6E8;
    --sidebar-bg: #EFE7CE;
    --text: #1A1612;
    --text-dim: rgba(26, 22, 18, 0.65);
    --text-mute: rgba(26, 22, 18, 0.4);
    --gold: #9A6E10;
    --gold-soft: rgba(154, 110, 16, 0.07);
    --gold-line: rgba(154, 110, 16, 0.2);
    --gold-strong: rgba(154, 110, 16, 0.35);
    --user-msg-bg: rgba(154, 110, 16, 0.10);
    --user-msg-border: rgba(154, 110, 16, 0.25);
    --assistant-msg-bg: #FFFFFF;
    --assistant-msg-border: rgba(26, 22, 18, 0.08);
    --border: rgba(26, 22, 18, 0.08);
    --shadow: 0 6px 24px rgba(26, 22, 18, 0.06), 0 1px 4px rgba(26, 22, 18, 0.04);
    --demo-banner: #C84545;
    --demo-banner-text: #FFFFFF;
    color-scheme: light;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    min-height: 100%;
  }
  button { font-family: inherit; cursor: pointer; }

  /* Demo banner */
  .demo-banner {
    background: var(--demo-banner);
    color: var(--demo-banner-text);
    padding: 8px 16px;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
    overflow: hidden;
  }
  .main-row {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 22px 18px;
    overflow-y: auto;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 22px;
  }
  .brand-mark {
    width: 48px; height: 48px;
    flex-shrink: 0;
    display: block;
  }
  .brand-mark img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
  }
  .brand-text-1 {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--gold);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    line-height: 1.2;
  }
  .brand-text-2 {
    font-size: 13px;
    color: var(--text);
    font-style: italic;
    margin-top: 3px;
  }
  .sidebar-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-mute);
    text-transform: uppercase;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .day-list {
    display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px;
  }
  .day-item {
    display: flex; align-items: center; gap: 11px;
    padding: 11px 12px; border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
    background: var(--panel);
  }
  .day-item:hover {
    border-color: var(--gold-line);
  }
  .day-item.active {
    background: var(--gold-soft);
    border-color: var(--gold-line);
  }
  .day-num {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--gold-line);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: var(--gold);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    flex-shrink: 0;
  }
  .day-item.active .day-num {
    background: var(--gold); color: var(--bg); border-color: var(--gold);
  }
  .day-info { flex: 1; min-width: 0; }
  .day-title {
    font-size: 12px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .day-theme {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 2px;
  }
  /* Locked day: progressive-unlock state for Reset Day 2 / Day 3. Reduced
     opacity + crisp lock icon + small countdown line below the theme. */
  .day-item.locked {
    cursor: default;
    opacity: 0.6;
  }
  .day-item.locked:hover { border-color: transparent; }
  .day-item.locked .day-num {
    background: transparent;
    color: var(--text-dim);
    border-style: dashed;
  }
  .day-item .day-lock {
    width: 14px; height: 14px;
    color: var(--text-dim);
    flex-shrink: 0;
    margin-left: auto;
  }
  .day-countdown {
    font-size: 10px;
    color: var(--gold);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-top: 3px;
  }

  .demo-help {
    margin-top: 8px;
    padding: 12px;
    background: var(--panel);
    border: 1px dashed var(--gold-line);
    border-radius: 8px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.5;
  }

  .reset-btn {
    margin-top: 14px;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--gold-line);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s ease;
  }
  .reset-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Persistent CTA buttons pinned above the sidebar footer. */
  .sidebar-cta { margin-top: auto; display: flex; flex-direction: column; gap: 6px; padding-top: 4px; }
  .sidebar-cta-btn { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 9px 12px; background: var(--gold-soft); border: 1px solid var(--gold-line); border-radius: 8px; color: var(--text); text-decoration: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; transition: border-color 0.15s ease, background 0.15s ease; }
  .sidebar-cta-btn:hover { border-color: var(--gold); }
  .sidebar-cta-arrow { color: var(--gold); font-size: 11px; line-height: 1; flex-shrink: 0; }
  /* Sidebar auxiliary actions — log out / reset */
  .sidebar-aux { display: flex; gap: 14px; padding: 10px 4px 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; color: var(--text-dim); }
  .sidebar-aux button { background: none; border: none; padding: 0; color: inherit; font-family: inherit; font-size: inherit; cursor: pointer; text-align: left; }
  .sidebar-aux button:hover { color: var(--text); text-decoration: underline; }

  .sidebar-footer {
    margin-top: 12px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-text {
    font-size: 10px;
    color: var(--text-mute);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.05em;
  }
  .theme-toggle {
    background: transparent;
    border: 1px solid var(--gold-line);
    color: var(--text-dim);
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .theme-toggle:hover { border-color: var(--gold); color: var(--gold); }

  /* Footer cluster: font-size controls + theme toggle. */
  .footer-actions { display: flex; align-items: center; gap: 6px; }
  .font-btn {
    background: transparent;
    border: 1px solid var(--gold-line);
    color: var(--text-dim);
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 0;
    line-height: 1;
  }
  .font-btn:hover { border-color: var(--gold); color: var(--gold); }
  .font-btn:disabled { opacity: 0.35; cursor: not-allowed; border-color: var(--gold-line); color: var(--text-mute); }
  .font-btn.font-larger { font-size: 13px; } /* slightly larger "A+" reads better */

  /* Main */
  .main {
    flex: 1; display: flex; flex-direction: column;
    min-width: 0; min-height: 0;
    background: var(--bg);
  }
  .main-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
  }
  .main-header-title {
    font-size: 14px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 600;
  }
  .main-header-sub {
    font-size: 11px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin-top: 2px;
  }
  .day-chip {
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
    font-size: 10px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .messages-wrap {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 24px 0;
  }
  .messages-wrap::-webkit-scrollbar { width: 6px; }
  .messages-wrap::-webkit-scrollbar-thumb {
    background: var(--gold-strong); border-radius: 3px;
  }
  .messages {
    max-width: 760px; margin: 0 auto;
    padding: 0 28px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .msg-row { display: flex; animation: fadeIn 0.3s ease; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }
  .msg {
    max-width: 78%;
    padding: 13px 18px;
    color: var(--text);
    /* Reader scale — adjustable via the A−/A+ buttons in the sidebar footer. */
    font-size: calc(15px * var(--msg-scale, 1));
    line-height: 1.75;
  }
  .msg-row.user .msg {
    padding: 11px 16px;
    background: var(--user-msg-bg);
    border: 1px solid var(--user-msg-border);
    border-radius: 14px 14px 3px 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    white-space: pre-wrap;
  }
  .msg-row.assistant .msg {
    background: var(--assistant-msg-bg);
    border: 1px solid var(--assistant-msg-border);
    border-radius: 14px 14px 14px 3px;
    font-family: Georgia, "Times New Roman", serif;
  }
  /* Markdown rendering inside assistant messages */
  .msg-row.assistant .msg p { margin: 0 0 0.7em 0; }
  .msg-row.assistant .msg p:last-child { margin-bottom: 0; }
  .msg-row.assistant .msg strong { font-weight: 700; color: var(--text); }
  .msg-row.assistant .msg em { font-style: italic; }
  .msg-row.assistant .msg code { background: var(--gold-soft); padding: 1px 6px; border-radius: 4px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.9em; color: var(--gold); }
  .msg-row.assistant .msg ul, .msg-row.assistant .msg ol { margin: 0.4em 0 0.7em 1.4em; padding: 0; }
  .msg-row.assistant .msg li { margin-bottom: 0.35em; line-height: 1.6; }
  .msg-row.assistant .msg li:last-child { margin-bottom: 0; }
  .msg-row.assistant .msg ul li { list-style-type: disc; }
  .msg-row.assistant .msg ol li { list-style-type: decimal; }
  /* In-brand CTA button, rendered from [[button:Label|url]] in AI messages. */
  .msg-cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0 2px;
    padding: 11px 22px;
    background: var(--gold);
    color: var(--bg);
    border-radius: 999px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    transition: opacity 0.15s ease, transform 0.05s ease;
  }
  .msg-cta-btn:hover { opacity: 0.88; }
  .msg-cta-btn:active { transform: scale(0.98); }
  .msg-cta-arrow { font-size: 14px; line-height: 1; }

  .typing {
    display: flex; gap: 5px; align-items: center;
    padding: 12px 16px;
    background: var(--assistant-msg-bg);
    border-radius: 14px 14px 14px 3px;
    width: fit-content;
    border: 1px solid var(--assistant-msg-border);
  }

  /* Skeleton lines shown while a chat's messages are loading. Mimics the
     paragraph shape of incoming content so the wait reads as "filling in"
     rather than "stuck". Width values are inlined per-line below. */
  .chat-loading {
    display: flex;
    flex-direction: column;
    gap: 11px;
    padding: 20px 8px;
    max-width: 760px;
    margin: 0 auto;
    width: 100%;
  }
  .skeleton-line {
    height: 10px;
    background: var(--text);
    opacity: 0.08;
    border-radius: 999px;
    animation: skeleton-pulse 1.4s ease-in-out infinite;
  }
  .skeleton-line.skel-title { height: 14px; opacity: 0.10; margin-bottom: 10px; }
  .skeleton-line.skel-gap { margin-top: 18px; }
  @keyframes skeleton-pulse {
    0%, 100% { opacity: 0.06; }
    50% { opacity: 0.18; }
  }
  @media (max-width: 560px) {
    .chat-loading { padding: 16px 6px; gap: 10px; }
    .skeleton-line { height: 9px; }
    .skeleton-line.skel-title { height: 12px; }
  }
  .typing .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.7;
    animation: bounce 1.2s infinite;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }

  .composer-wrap {
    border-top: 1px solid var(--border);
    padding: 16px 28px 20px;
  }
  .composer {
    max-width: 760px; margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 8px 6px 14px;
    display: flex; align-items: flex-end; gap: 10px;
    position: relative;
  }
  .composer:focus-within { border-color: var(--gold-line); }
  textarea {
    flex: 1; background: transparent; border: none;
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    font-size: 15px; line-height: 1.6;
    padding: 12px 4px;
    max-height: 200px; overflow-y: auto;
    resize: none;
  }
  textarea:focus { outline: none; }
  textarea::placeholder { color: var(--text-mute); }
  .send-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--gold-soft);
    border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    color: var(--text-mute);
    cursor: default;
    margin-bottom: 4px;
  }
  .send-btn.active {
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    color: var(--bg);
    cursor: pointer;
  }

  /* Voice input */
  .mic-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    border: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--bg);
    cursor: pointer;
    margin-bottom: 4px;
    transition: filter 0.15s ease, transform 0.1s ease;
    padding: 0;
  }
  .mic-btn:hover { filter: brightness(1.1); }
  .mic-btn:active { transform: scale(0.95); }
  .mic-btn svg { width: 22px; height: 22px; display: block; }
  .mic-btn.recording {
    background: linear-gradient(135deg, #e57373, #b94a4a);
    color: var(--bg);
    animation: pulse-record 1.4s ease-in-out infinite;
  }
  .mic-btn.transcribing { cursor: wait; }
  .mic-btn.transcribing svg { display: none; }
  .mic-btn.transcribing::after {
    content: "";
    width: 14px; height: 14px;
    border: 2px solid rgba(8, 8, 8, 0.25);
    border-top-color: #080808;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes pulse-record {
    0%, 100% { box-shadow: 0 0 0 0 rgba(228, 87, 87, 0.35); }
    50% { box-shadow: 0 0 0 8px rgba(228, 87, 87, 0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .recording-indicator {
    position: absolute;
    top: -30px;
    right: 14px;
    background: var(--panel);
    border: 1px solid var(--gold-line);
    border-radius: 12px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    white-space: nowrap;
    pointer-events: none;
    z-index: 5;
  }
  .recording-indicator .red-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #e57373;
    margin-right: 5px;
    vertical-align: middle;
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Speaker (Shimrit voice playback) */
  .msg-row.assistant { flex-direction: column; align-items: flex-start; }
  .speak-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--gold);
    cursor: pointer;
    padding: 0;
    margin-top: 6px;
    margin-left: 4px;
    transition: background 0.15s ease, transform 0.1s ease, border-color 0.15s ease;
  }
  .speak-btn:hover { background: rgba(201, 168, 76, 0.18); }
  .speak-btn:active { transform: scale(0.92); }
  .speak-btn svg { width: 14px; height: 14px; display: block; }
  .speak-btn.loading svg { display: none; }
  .speak-btn.loading::after {
    content: "";
    width: 10px; height: 10px;
    border: 1.5px solid var(--gold-line);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .speak-btn.playing {
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    color: var(--bg);
    border-color: transparent;
  }
  .autoplay-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 4px;
    margin-top: 6px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    cursor: pointer;
  }
  .autoplay-toggle input { margin: 0; accent-color: var(--gold); cursor: pointer; }
  .autoplay-toggle:hover { color: var(--text); }

  /* Unlimited section in sidebar */
  .sidebar-divider { height: 1px; background: var(--gold-line); margin: 16px 4px; opacity: 0.5; }
  .unl-action-row { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; }

<body>
  <div id="app"></div>

<script>
(function () {
  "use strict";

  const API_BASE = "/api";
  const STORAGE_KEY = "tfif_demo_session_v1";
  const ANON_KEY = "tfif_demo_anon_id";
  const THEME_KEY = "tfif_theme_v1";
  const DAY_META = [
    { label: "Day 1", theme: "State Reset" },
    { label: "Day 2", theme: "Decision" },
    { label: "Day 3", theme: "Action" }
  ];
  const PLACEHOLDERS = [
    "What feels most active right now?",
    "What are you no longer available for?",
    "What is the one move you will take in the next 24 hours?"
  ];
  // Upgrade destination for Reset-tier members — the Field Unlimited offer.
  const UNLIMITED_URL = "http://shimritnativ.com/the-freedom-intelligence-field";

  // Entitlement tier passed in by the Kajabi page via ?tier=full|preview.
  // When present it wins over the backend tier and the review toggle — this is
  // how a Kajabi page sets the member's tier until the webhook sync is wired.
  const URL_TIER = (function () {
    try {
      const t = new URLSearchParams(location.search).get("tier");
      return (t === "full" || t === "preview") ? t : null;
    } catch (e) { return null; }
  })();

  // Origins permitted to hand the app a verified member identity — your Kajabi
  // site. In embed mode a member is ONLY accepted from a postMessage sent by one
  // of these origins; the browser stamps the origin and it cannot be forged.
  // EDIT THIS if your Kajabi member area is served from a different domain.
  const KAJABI_ALLOWED_ORIGINS = ["https://shimritnativ.com", "https://www.shimritnativ.com"];

  // Embed mode: the app is running inside the Kajabi page iframe (?embed=kajabi).
  // In this mode identity must arrive via a verified postMessage — URL params are
  // ignored and there is no anonymous fallback, so a shared URL cannot be used.
  const EMBED_MODE = (function () {
    try { return new URLSearchParams(location.search).get("embed") === "kajabi"; }
    catch (e) { return false; }
  })();

  // Set only by a verified postMessage from an allowed Kajabi origin.
  let KAJABI_IDENTITY = null; // { kajabiId, tier, name }

  // The six guided processes. The `prompt` is the exact client activation
  // prompt from the FIF client-prompt docs — sent verbatim when a process is
  // picked, so the Field receives the same instruction a participant would
  // paste themselves. Keys must match lib/prompts/processes/index.js.
  const DEMO_PROCESSES = [
    { key: "decision-alignment", name: "Decision Alignment", prompt: `Freedom Intelligence Field, I am entering the Decision Alignment process.
I am here to bring my mind, heart, and body into alignment around a decision, goal, or area of resistance that is active in my instrument right now. I will leave with a clear and aligned decision and one action I will take within 24 hours.
Guide me through the Decision Alignment now.
Begin.` },
    { key: "desired-outcome-snapshot", name: "Desired Outcome Snapshot", prompt: `Freedom Intelligence Field, I am entering the Desired Outcome Snapshot process.
Something is active in my instrument right now. I am here to see the current pattern clearly and reverse-engineer the desired outcome — the thoughts, feelings, and behaviors that belong to where I am choosing to go.
Guide me through the Desired Outcome Snapshot now.
Begin.` },
    { key: "dream-reading", name: "Dream Reading", prompt: `Freedom Intelligence Field, I am entering the Dream Reading process.
I have a dream I want to bring. I am here to receive what this dream is showing me through my own associations and with the Field as my guide.
Guide me through the Dream Reading now.
Begin.` },
    { key: "frequency-calibration", name: "Frequency Calibration", prompt: `Freedom Intelligence Field, I am entering the Frequency Calibration process.
I know what I want to create. I am here to identify the frequency my instrument is currently running, name the frequency of my desired reality, and build the daily practice that trains the new frequency until it becomes the default.
Guide me through the Frequency Calibration now.
Begin.` },
    { key: "identity-upgrade", name: "Identity Upgrade", prompt: `Freedom Intelligence Field, I am entering the Identity Upgrade process.
I am here to name what has been protecting the old identity, resign it consciously, and define and anchor the new identity that is already trying to come online. I want to leave this process with a clear definition of my new identity, its name, and a daily practice to install it.
Guide me through the Identity Upgrade now.
Begin.` },
    { key: "root-pattern-release", name: "Root Pattern Release", prompt: `Freedom Intelligence Field, I am entering the Root Pattern Release process.
A pattern keeps repeating in my instrument even after surface work. I am ready to trace it back to its root, release the charge held there, receive the wisdom inside it, and welcome back the part of myself that separated.
Guide me through the Root Pattern Release now.
Begin.` },
  ];

  const state = {
    sessionToken: null,
    currentDay: 1,
    lastCompletedDay: 0,
    timeRemainingMs: null,
    // Progressive day-unlock map. Day 1 always null (unlocked). Day 2 / 3

  // If a user types but doesn't send, the text survives view-switches and

  }

  // Restore saved draft into the textarea and recalc its auto-height + send

  function restoreDraftIntoInput() {

  // ===== Reader font scale =====
  // Applies a CSS custom property used by .msg font-size calc(). Persisted to
  // localStorage so the user's preference carries across sessions.
  function applyFontScale(scale) {
    state.fontScale = scale;
    document.documentElement.style.setProperty("--msg-scale", String(scale));
    try { localStorage.setItem("tfif_font_scale_v1", String(scale)); } catch (e) {}
  }
  const FONT_SCALE_MIN = 0.85;
  const FONT_SCALE_MAX = 1.30;
  const FONT_SCALE_STEP = 0.10;
  function onFontSmaller() {
    const next = Math.max(FONT_SCALE_MIN, Math.round((state.fontScale - FONT_SCALE_STEP) * 100) / 100);
    if (next === state.fontScale) return;
    applyFontScale(next);
    // Refresh the footer so disabled state on min/max updates without a full
    // app re-render.
    const smaller = document.getElementById("font-smaller");
    const larger = document.getElementById("font-larger");
    if (smaller) smaller.disabled = next <= FONT_SCALE_MIN;
    if (larger) larger.disabled = next >= FONT_SCALE_MAX;
  }
  function onFontLarger() {
    const next = Math.min(FONT_SCALE_MAX, Math.round((state.fontScale + FONT_SCALE_STEP) * 100) / 100);
    if (next === state.fontScale) return;
    applyFontScale(next);
    const smaller = document.getElementById("font-smaller");
    const larger = document.getElementById("font-larger");
    if (smaller) smaller.disabled = next <= FONT_SCALE_MIN;
    if (larger) larger.disabled = next >= FONT_SCALE_MAX;
  }

  function generateAnonId() {
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
      const r = Math.random() * 16 | 0;
      const v = c === "x" ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }
  function getOrCreateAnonId() {
    try {
      let id = localStorage.getItem(ANON_KEY);
      if (!id) {
        id = generateAnonId();
        localStorage.setItem(ANON_KEY, id);
      }
      return id;
    } catch (e) { return generateAnonId(); }
  }

  // ===== API =====
  // Identity for a Kajabi member arrives in the page URL (?email=&kajabiId=&name=),
  // injected by the Kajabi page's Liquid. When those params are absent the app
  // falls back to an anonymous demo identity so it still works standalone.
  function resolveIdentity() {
    // Embed mode: identity comes only from the verified Kajabi postMessage that
    // the gate captured before the app started. URL params are not trusted here.
    if (EMBED_MODE && KAJABI_IDENTITY && KAJABI_IDENTITY.kajabiId) {
      return {
        email: "kajabi-" + KAJABI_IDENTITY.kajabiId + "@tfif.local",
        displayName: KAJABI_IDENTITY.name || "",
        kajabiMemberId: String(KAJABI_IDENTITY.kajabiId)
      };
    }
    let email = "", kajabiId = "", name = "";
    try {
      const p = new URLSearchParams(location.search);
      email = (p.get("email") || "").trim().toLowerCase();
      kajabiId = (p.get("kajabiId") || p.get("kajabiMemberId") || "").trim();
      name = (p.get("name") || "").trim();
    } catch (e) {}
    if (email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      return { email: email, displayName: name, kajabiMemberId: kajabiId || null };
    }
    // Kajabi member identified by member ID only (Kajabi.currentSiteUser.id,
    // passed as ?kajabiId=). The Kajabi member ID is stable and unique, so a
    // synthetic email keyed to it gives the member one consistent account
    // without needing their real email passed through.
    if (kajabiId && /^[0-9A-Za-z_-]{1,64}$/.test(kajabiId)) {
      return { email: "kajabi-" + kajabiId + "@tfif.local", displayName: name, kajabiMemberId: kajabiId };
    }
    return { email: "demo-" + getOrCreateAnonId() + "@tfif.local", displayName: name, kajabiMemberId: null };
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // Light markdown renderer for assistant messages. Supports bold (**x**),
  // italic (*x*, _x_), inline code (`x`), bullet lists (-, *), numbered
  // lists (1.), paragraphs, and line breaks. Escapes HTML first to prevent
  // injection — only the parsed markdown patterns become real HTML.
  function renderMarkdown(text) {
    let html = escapeHtml(String(text || ""));

    // CTA button syntax: [[button:Label|https://url]] -> in-brand gold button.
    // escapeHtml has already run, so Label/URL arrive as safe text. Only
    // http(s) destinations are allowed; quotes are encoded before the href.
    html = html.replace(/\[\[button:([^|\]]+)\|([^\]]+)\]\]/g, function (m, label, url) {
      const u = String(url).trim();
      if (!/^https?:\/\//i.test(u)) return label.trim();
      const safeHref = u.replace(/"/g, "%22");
      return '<a class="msg-cta-btn" href="' + safeHref + '" target="_blank" rel="noopener noreferrer">'
        + label.trim()
        + '<span class="msg-cta-arrow" aria-hidden="true">→</span></a>';
    });

    // Inline formatting. Order matters: bold before italic so ** doesn't
    // get partially consumed by single-asterisk italic match.
    html = html.replace(/\*\*([^\n*]+?)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/__([^\n_]+?)__/g, "<strong>$1</strong>");
    html = html.replace(/(^|[^*])\*([^\n*]+?)\*(?!\*)/g, "$1<em>$2</em>");
    html = html.replace(/(^|[^_])_([^\n_]+?)_(?!_)/g, "$1<em>$2</em>");
    html = html.replace(/`([^`\n]+?)`/g, "<code>$1</code>");

    // Block-level parsing: paragraphs, line breaks, lists.
    const lines = html.split("\n");
    const blocks = [];
    let paragraph = [];
    let listType = null;
    let listItems = [];

    function flushParagraph() {
      if (paragraph.length > 0) {
        blocks.push("<p>" + paragraph.join("<br>") + "</p>");
        paragraph = [];
      }
    }
    function flushList() {
      if (listType && listItems.length > 0) {
        blocks.push("<" + listType + ">" + listItems.map(i => "<li>" + i + "</li>").join("") + "</" + listType + ">");
        listItems = [];
        listType = null;
      }
    }

    for (const rawLine of lines) {
      const line = rawLine;
      const trimmed = line.trim();
      const ulMatch = line.match(/^\s*[-*]\s+(.+)$/);
      const olMatch = line.match(/^\s*\d+\.\s+(.+)$/);

      if (ulMatch) {
        flushParagraph();
        if (listType !== "ul") { flushList(); listType = "ul"; }
        listItems.push(ulMatch[1]);
      } else if (olMatch) {
        flushParagraph();
        if (listType !== "ol") { flushList(); listType = "ol"; }
        listItems.push(olMatch[1]);
      } else if (trimmed === "") {
        flushParagraph();
        flushList();
      } else {
        flushList();
        paragraph.push(line);
      }
    }
    flushParagraph();
    flushList();

    return blocks.join("");
  }

  // ===== Renderers =====
  // Unlimited is unlocked only for full-tier (Unlimited) members. Reset-tier
  // members see the locked upgrade card in its place.
  function unlimitedUnlocked() { return state.tier === "full"; }
  function lockIconSvg() {
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>';
  }

  // ===== Progressive day unlock helpers =====
  // dayUnlocks comes from /auth/verify-code and /api/state. Map shape:
  //   { 1: null, 2: ISOString | null, 3: ISOString | null }
  // null means "unlocked now". A timestamp means "unlocks at that time".
  // Unlimited (full-tier) members are exempt — Reset gating doesn't apply.
  function isDayUnlocked(dayNum) {
    if (state.tier === "full") return true;
    const unlocks = state.dayUnlocks || {};
    const at = unlocks[dayNum];
    if (!at) return true;
    return new Date(at).getTime() <= Date.now();
  }
  // Friendly "Unlocks in 14h 32m" formatter. Less than a minute -> "any
  // moment now" (avoids the awkward "0m" state on the verge of unlock).
  function formatUnlockCountdown(isoString) {
    if (!isoString) return "";
    const remaining = new Date(isoString).getTime() - Date.now();
    if (remaining <= 60 * 1000) return "Unlocks any moment now";
    const totalMinutes = Math.floor(remaining / 60000);
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;
    if (hours >= 24) {
      const days = Math.floor(hours / 24);
      const remHours = hours % 24;
      return `Unlocks in ${days}d ${remHours}h`;
    }
    if (hours > 0) return `Unlocks in ${hours}h ${minutes}m`;
    return `Unlocks in ${minutes}m`;
  }

      <div class="mobile-nav-strip">
        ${DAY_META.map((d, i) => {
          const n = i + 1;

            return `<button class="mobile-day-chip locked" type="button" disabled aria-disabled="true">Day ${n} · 🔒</button>`;
          }
          const isActive = n === state.currentDay && state.view === "chat";
          return `<button class="mobile-day-chip ${isActive ? "active" : ""}" data-mobile-day="${n}" type="button">Day ${n} · ${escapeHtml(d.theme)}</button>`;

  function renderMobileOverlay() {

  function formatRelativeTime(iso) {
    if (!iso) return "";
    const t = new Date(iso); const now = new Date();
    const diffMs = now - t; const diffMin = Math.floor(diffMs / 60000); const diffHr = Math.floor(diffMs / 3600000); const diffDay = Math.floor(diffMs / 86400000);
    if (diffMin < 2) return "Just now";
    if (diffMin < 60) return diffMin + "m ago";
    if (diffHr < 24) return diffHr + "h ago";
    if (diffDay < 7) return diffDay + "d ago";
    return t.toLocaleDateString();
  }

  // Re-render just the .unl-chat-list section. Used by search input changes
  // so the search input keeps focus while the list filters live.
  function renderUnlimitedChatList() {
    const wrap = document.querySelector(".unl-chat-list");
    if (!wrap) return;
    const filtered = state.searchQuery
      ? state.unlimitedSessions.filter(s => (s.title || "").toLowerCase().includes(state.searchQuery.toLowerCase()))
      : state.unlimitedSessions;
    if (filtered.length === 0) {
      wrap.innerHTML = '<div class="unl-chat-empty">' + (state.searchQuery ? "No matches." : "No conversations yet.") + '</div>';
    } else {
      wrap.innerHTML = filtered.map(s => `
        <div class="unl-chat-item ${s.id === state.activeUnlimitedId ? "active" : ""}" data-unl-id="${s.id}">
          <div class="unl-chat-title">${escapeHtml(s.title || "New chat")}</div>
          <div class="unl-chat-time">${escapeHtml(formatRelativeTime(s.lastMessageAt || s.startedAt))}</div>
        </div>
      `).join("");
    }
    wireUnlimitedChatItems();
  }

  function wireUnlimitedChatItems() {
    document.querySelectorAll(".unl-chat-item").forEach(el => {
      el.addEventListener("click", () => onUnlimitedChatClick(el.dataset.unlId));
    });
  }

  // Skeleton placeholder shown while a chat's messages stream in. Widths
  // vary to feel like incoming paragraphs rather than a static block.
  function renderSkeletonLoading() {
    return `
      <div class="chat-loading" aria-label="Loading conversation" role="status">
        <div class="skeleton-line skel-title" style="width: 32%"></div>
        <div class="skeleton-line" style="width: 88%"></div>
        <div class="skeleton-line" style="width: 94%"></div>
        <div class="skeleton-line" style="width: 76%"></div>
        <div class="skeleton-line" style="width: 64%"></div>
        <div class="skeleton-line skel-gap" style="width: 70%"></div>
        <div class="skeleton-line" style="width: 86%"></div>
        <div class="skeleton-line" style="width: 80%"></div>
        <div class="skeleton-line" style="width: 50%"></div>
      </div>
    `;
  }

  function renderMessages() {
    const wrap = document.getElementById("messages");
    if (!wrap) return;
    // Empty + loading = switched into a chat whose messages haven't arrived
    // yet. Render skeleton lines that mimic paragraph shapes so the wait
    // reads as "content filling in" rather than "stuck".
    if (state.loading && state.messages.length === 0) {
      wrap.innerHTML = renderSkeletonLoading();
      return;
    }
    let html = state.messages.map((m, i) => {
      if (m.role === "user") {
        return `
          <div class="msg-row ${m.role}">
            <div class="msg">${escapeHtml(m.content)}</div>
          </div>
        `;
      }
      return `
        <div class="msg-row ${m.role}">
          <div class="msg">${renderMarkdown(m.content)}</div>
          <button class="speak-btn" data-msg-index="${i}" type="button" aria-label="Play in Shimrit's voice" title="Play in Shimrit's voice">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M3 9v6h4l5 5V4L7 9H3z"/>
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
              <path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          </button>
        </div>
      `;
    }).join("");
    if (state.loading) {
      html += `
        <div class="msg-row assistant">
          <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
      `;
    }
    wrap.innerHTML = html;
    const wrapper = document.getElementById("messages-wrap");
    if (wrapper) wrapper.scrollTop = wrapper.scrollHeight;
  }

  // ===== Mobile chrome handlers =====
  // Toggle the drawer by mutating classes on the existing DOM nodes — calling
  // render() would replace the sidebar element, and the browser only animates
  // CSS transitions on elements that already exist when a property changes.
  function onMobileMenuClick() {
    state.mobileDrawerOpen = true;
    const sidebar = document.querySelector(".sidebar");
    const overlay = document.getElementById("mobile-overlay");
    if (sidebar) sidebar.classList.add("mobile-open");
    if (overlay) overlay.classList.add("open");
  }
  function onMobileOverlayClick() {
    state.mobileDrawerOpen = false;
    const sidebar = document.querySelector(".sidebar");
    const overlay = document.getElementById("mobile-overlay");
    if (sidebar) sidebar.classList.remove("mobile-open");
    if (overlay) overlay.classList.remove("open");
  }
  // Bottom-tab navigation. Reset → switch to current day's Reset chat.
  // Unlimited → open the most recent chat, or start a new one if none exist.
  function onMobileTabClick(tab) {
    state.mobileDrawerOpen = false; // close drawer if it happened to be open
    if (tab === "reset") {
      if (state.view === "chat") { render(); return; }
      onDayClick(state.currentDay || 1);
      return;
    }
    if (tab === "unlimited") {
      if (!unlimitedUnlocked()) { state.view = "unlimited-chat"; render(); return; }
      if (state.view === "unlimited-chat") { render(); return; }
      if (state.unlimitedSessions.length > 0) {
        onUnlimitedChatClick(state.unlimitedSessions[0].id);
      } else {
        onNewChatClick();
      }
    }
  }

  // ===== Handlers =====
  function onThemeToggle() {
    const current = document.documentElement.getAttribute("data-theme") || "dark";
    const next = current === "dark" ? "light" : "dark";
    applyTheme(next);
    render();
  }

  // ===== Login (email + 6-digit code) =====
  function loginErrorMessage(code) {
    switch (code) {
      case "not_a_member":
        return "We couldn't find a Master Your Path membership for that email. Use the email from your purchase.";
      case "too_many_requests":
        return "Too many code requests. Please wait a few minutes, then try again.";
      case "too_many_attempts":
        return "Too many incorrect tries. Request a new code.";
      case "wrong_code":
        return "That code isn't right. Check your email and try again.";
      case "code_expired":
        return "That code has expired. Request a new one.";
      case "invalid_email":
        return "Please enter a valid email address.";
      default:
        return "Something went wrong. Please try again in a moment.";
    }
  }

  async function onRequestCode(e) {
    if (e) e.preventDefault();
    if (state.loginLoading) return;
    const input = document.getElementById("login-email-input");
    const email = ((input && input.value) || "").trim().toLowerCase();
    if (!email) return;
    state.loginEmail = email;
    state.loginError = "";
    state.loginLoading = true;
    render();
    try {
      await apiRequestCode(email);
      state.loginLoading = false;
      state.loginStep = "code";
      render();
    } catch (err) {
      state.loginLoading = false;
      state.loginError = loginErrorMessage(err && err.message);
      render();
    }
  }

  async function onVerifyCode(e) {
    if (e) e.preventDefault();
    if (state.loginLoading) return;
    const input = document.getElementById("login-code-input");
    const code = ((input && input.value) || "").trim();
    if (!/^[0-9]{6}$/.test(code)) {
      state.loginError = "Enter the 6-digit code from your email.";
      render();
      return;
    }
    state.loginError = "";
    state.loginLoading = true;
    render();
    try {
      const data = await apiVerifyCode(state.loginEmail, code);
      state.sessionToken = data.sessionToken;
      saveToken(data.sessionToken);
      state.tier = data.tier || "preview";
      state.dayUnlocks = data.dayUnlocks || state.dayUnlocks;
      state.firstLoginAt = data.firstLoginAt || null;
      state.previewEndsAt = data.previewEndsAt || null;
      state.displayName = data.displayName || "";
      state.timeRemainingMs = data.timeRemainingMs;
      state.loginLoading = false;
      state.loginStep = "email";
      state.loginError = "";
      loadFullState().then(() => loadUnlimitedSessions().then(() => render()));
    } catch (err) {
      state.loginLoading = false;
      state.loginError = loginErrorMessage(err && err.message);
      render();
    }
  }

  function onLoginBack() {
    state.loginStep = "email";
    state.loginError = "";
    state.loginLoading = false;
    render();
  }

  // Clear the session and return the visitor to the login screen.
  function onLogout() {
    if (!confirm("Sign out of The Field?")) return;
    clearToken();
    state.sessionToken = null;
    state.messages = [];
    state.unlimitedSessions = [];
    state.activeUnlimitedId = null;
    state.unlimitedMessages = [];
    state.searchOpen = false;
    state.searchQuery = "";
    state.processMenuOpen = false;
    state.view = "login";
    state.loginStep = "email";
    state.loginEmail = "";
    state.loginError = "";
    state.loginLoading = false;
    render();
  }

  async function onStartSubmit(e) {
    e.preventDefault();
    // Re-entry guard. The first await below is apiStart — without this flag,
    // a fast double-tap on "Begin Day 1" fires onStartSubmit twice before
    // either render() runs, producing two apiChat calls and a duplicated
    // opening exchange in the database. Set synchronously, before any await.
    if (state.starting) return;
    const name = (document.getElementById("name-input").value || "").trim();
    const opening = (document.getElementById("opening-input").value || "").trim();
    if (!opening) return;
    state.starting = true;
    state.error = null;
    // Visually disable the submit button for the brief window before render().
    const submitBtn = e.target && e.target.querySelector(".btn-primary");
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = "Beginning…"; }
    try {
      const ident = resolveIdentity();
      const data = await apiStart(ident.email, ident.displayName || name, ident.kajabiMemberId);
      state.sessionToken = data.sessionToken;
      saveToken(data.sessionToken);
      state.currentDay = data.currentDay || 1;
      state.timeRemainingMs = data.timeRemainingMs;
      if (EMBED_MODE) {
        // Tier was set from the verified Kajabi message; a 'full' from the
        // backend (once the webhook feeds it) also promotes.
        if (data.tier === "full") state.tier = "full";
      } else {
        state.tier = URL_TIER || data.tier || "preview";
      }
      state.view = "chat";
      state.messages = [{ role: "user", content: opening }];
      state.loading = true;
      clearDraft("entry");
      clearDraft("entry_name");
      render();
      const chatData = await apiChat(state.sessionToken, opening);
      if (chatData.expired) { state.view = "entry"; state.error = "Window expired."; state.loading = false; render(); return; }
      state.messages.push({ role: "assistant", content: chatData.reply });
      state.currentDay = chatData.currentDay;
      state.loading = false;
      render();
      maybeAutoplayLastAssistant();
    } catch (err) {
      state.error = err.message || "Could not start.";
      state.loading = false;
      state.view = "entry";
      render();
    } finally {
      state.starting = false;
    }
  }

  function onInputChange(e) {
    e.target.style.height = "auto";
    e.target.style.height = Math.min(e.target.scrollHeight, 200) + "px";
    const send = document.getElementById("send-btn");
    if (e.target.value.trim() && !state.loading) send.classList.add("active");
    else send.classList.remove("active");
    // Persist draft so the text survives view changes / reloads.
    saveDraft(currentContextKey(), e.target.value);
  }

  function onInputKeyDown(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); onSendClick(); }
  }

  async function onSendClick() {
    const inputEl = document.getElementById("input");
    if (!inputEl) return;
    const text = inputEl.value.trim();
    if (!text || state.loading) return;
    state.messages.push({ role: "user", content: text });
    inputEl.value = "";
    inputEl.style.height = "auto";
    state.loading = true;
    document.getElementById("send-btn").classList.remove("active");
    clearDraft(currentContextKey());
    renderMessages();
    try {
      const data = await apiChat(state.sessionToken, text);
      if (data.expired) { state.error = "Window expired."; state.loading = false; render(); return; }
      state.messages.push({ role: "assistant", content: data.reply });
      state.currentDay = data.currentDay;
      state.loading = false;
      render();
      maybeAutoplayLastAssistant();
    } catch (err) {
      state.messages.push({ role: "assistant", content: "Something went wrong: " + (err.message || "could not send.") });
      state.loading = false;
      renderMessages();
    }
  }

  async function onDayClick(day) {
    if (!state.sessionToken) return;
    // Defensive: locked days should not be clickable (we don't wire the
    // listener on them) but if a stale state ever calls this, no-op.
    if (!isDayUnlocked(day)) return;
    state.mobileDrawerOpen = false; // close mobile drawer once a day is picked
    // Only skip if we're ALREADY viewing this exact day in the Reset chat
    // view. If the user is in Unlimited and clicks back to their current
    // day, we still need to switch views and reload the day's messages.
    if (day === state.currentDay && state.view === "chat") return;
    // Optimistic switch — header (day pill + title) and message area update
    // instantly so the click feels responsive; real messages stream in after.
    state.currentDay = day;
    state.messages = [];
    state.view = "chat";
    state.loading = true;
    state.activeUnlimitedId = null; // deactivate any unlimited chat highlight
    render();
    try {
      const data = await apiSetDay(state.sessionToken, day);
      state.currentDay = data.currentDay;
      state.lastCompletedDay = data.lastCompletedDay;
      // Replace messages with this day's own conversation history. Each day
      // is its own thread; switching loads that thread fresh.
      state.messages = data.messages || [];
      state.loading = false;
      render();
    } catch (err) {
      // 423 Locked from the server (race condition: clock changed mid-click).
      // Refresh state so the sidebar re-renders with the latest unlock map.
      if (err && err.message === "day_locked") {
        state.loading = false;
        loadFullState();
        return;
      }
      state.messages.push({ role: "assistant", content: "Something went wrong: " + (err.message || "could not switch day.") });
      state.loading = false;
      renderMessages();
    }
  }

  function onReset() {
    if (!confirm("Reset this demo conversation? A fresh anonymous user will be created on next message.")) return;
    clearToken();
    state.sessionToken = null;
    state.currentDay = 1;
    state.lastCompletedDay = 0;
    state.messages = [];
    state.view = "entry";
    // Purge any saved drafts so the fresh session starts clean.
    try {
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && k.indexOf("tfif_draft_") === 0) localStorage.removeItem(k);
      }
    } catch (e) {}
    render();
  }

  // ===== Voice input =====
  const MAX_RECORDING_MS = 60000;
  const voiceState = {
    mediaRecorder: null, audioChunks: [], stream: null, mimeType: "",
    startedAt: 0, timerInterval: null, autoStopTimer: null, indicatorEl: null
  };

  function micSupported() {
    return !!(typeof navigator !== "undefined" && navigator.mediaDevices &&
      navigator.mediaDevices.getUserMedia && typeof window.MediaRecorder !== "undefined");
  }

  async function onMicClick() {
    if (state.loading) return;
    if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === "recording") {
      stopRecording();
      return;
    }
    await startRecording();
  }

  async function startRecording() {
    const micBtn = document.getElementById("mic-btn");
    if (!micBtn) return;
    try {
      voiceState.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const candidates = ["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg;codecs=opus"];
      let mimeType = "";
      for (const m of candidates) {
        if (window.MediaRecorder.isTypeSupported && window.MediaRecorder.isTypeSupported(m)) {
          mimeType = m;
          break;
        }
      }
      voiceState.mimeType = mimeType || "audio/webm";
      voiceState.mediaRecorder = mimeType
        ? new MediaRecorder(voiceState.stream, { mimeType })
        : new MediaRecorder(voiceState.stream);
      voiceState.audioChunks = [];
      voiceState.mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) voiceState.audioChunks.push(e.data);
      };
      voiceState.mediaRecorder.onstop = async () => {
        cleanupRecording();
        micBtn.classList.remove("recording");
        const blob = new Blob(voiceState.audioChunks, { type: voiceState.mimeType });
        voiceState.audioChunks = [];
        if (blob.size < 1000) return;
        await transcribeBlob(blob, voiceState.mimeType);
      };
      voiceState.mediaRecorder.start();
      voiceState.startedAt = Date.now();
      micBtn.classList.add("recording");
      showRecordingIndicator();
      voiceState.timerInterval = setInterval(updateRecordingIndicator, 250);
      voiceState.autoStopTimer = setTimeout(() => {
        if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === "recording") {
          stopRecording();
        }
      }, MAX_RECORDING_MS);
    } catch (err) {
      console.error("mic_permission_or_error", err);
      cleanupRecording();
      micBtn.classList.remove("recording");
      alert("Could not access your microphone. Please allow microphone access and try again.");
    }
  }

  function stopRecording() {
    if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === "recording") {
      voiceState.mediaRecorder.stop();
    }
  }

  function cleanupRecording() {
    if (voiceState.timerInterval) { clearInterval(voiceState.timerInterval); voiceState.timerInterval = null; }
    if (voiceState.autoStopTimer) { clearTimeout(voiceState.autoStopTimer); voiceState.autoStopTimer = null; }
    if (voiceState.stream) { voiceState.stream.getTracks().forEach((t) => t.stop()); voiceState.stream = null; }
    removeRecordingIndicator();
  }

  function showRecordingIndicator() {
    const composer = document.querySelector(".composer");
    if (!composer) return;
    voiceState.indicatorEl = document.createElement("div");
    voiceState.indicatorEl.className = "recording-indicator";
    voiceState.indicatorEl.innerHTML = '<span class="red-dot"></span><span class="rec-time">0:00</span> / 1:00';
    composer.appendChild(voiceState.indicatorEl);
  }

  function updateRecordingIndicator() {
    if (!voiceState.indicatorEl) return;
    const elapsedMs = Date.now() - voiceState.startedAt;
    const totalSec = Math.floor(elapsedMs / 1000);
    const min = Math.floor(totalSec / 60);
    const sec = totalSec % 60;
    const timeEl = voiceState.indicatorEl.querySelector(".rec-time");
    if (timeEl) timeEl.textContent = `${min}:${String(sec).padStart(2, "0")}`;
  }

  function removeRecordingIndicator() {
    if (voiceState.indicatorEl) { voiceState.indicatorEl.remove(); voiceState.indicatorEl = null; }
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => {
        const result = reader.result || "";
        const idx = String(result).indexOf(",");
        resolve(idx >= 0 ? String(result).slice(idx + 1) : "");
      };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  async function transcribeBlob(blob, mimeType) {
    const micBtn = document.getElementById("mic-btn");
    if (micBtn) micBtn.classList.add("transcribing");
    try {
      const audioBase64 = await blobToBase64(blob);
      const res = await fetch(API_BASE + "/transcribe", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
        body: JSON.stringify({ audioBase64, mimeType })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "transcription_failed");
      const text = (data.text || "").trim();
      if (text) {
        const inputEl = document.getElementById("input");
        if (inputEl) {
          const existing = inputEl.value.trim();
          inputEl.value = existing ? `${existing} ${text}` : text;
          inputEl.style.height = "auto";
          inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
          inputEl.focus();
          inputEl.dispatchEvent(new Event("input", { bubbles: true }));
        }
      }
    } catch (err) {
      console.error("transcribe_failed", err);
      alert("Could not transcribe your message. Please try again or type instead.");
    } finally {
      if (micBtn) micBtn.classList.remove("transcribing");
    }
  }

  // ===== Speaker (Shimrit voice playback) =====
  const speakerState = {
    currentAudio: null,
    currentBtnEl: null,
    currentIndex: -1
  };

  function setSpeakerBtnState(btnEl, stateName) {
    if (!btnEl) return;
    btnEl.classList.remove("loading", "playing");
    if (stateName === "loading") btnEl.classList.add("loading");
    else if (stateName === "playing") btnEl.classList.add("playing");
  }

  function stopCurrentAudio() {
    if (speakerState.currentAudio) {
      try { speakerState.currentAudio.pause(); } catch (e) {}
      try { URL.revokeObjectURL(speakerState.currentAudio.src); } catch (e) {}
      speakerState.currentAudio = null;
    }
    if (speakerState.currentBtnEl) {
      setSpeakerBtnState(speakerState.currentBtnEl, "idle");
      speakerState.currentBtnEl = null;
    }
    speakerState.currentIndex = -1;
  }

  async function playMessageAudio(msgIndex, btnEl) {
    if (speakerState.currentIndex === msgIndex && speakerState.currentAudio) {
      stopCurrentAudio();
      return;
    }
    stopCurrentAudio();

    const msg = state.messages[msgIndex];
    if (!msg || msg.role !== "assistant" || !msg.content) return;

    speakerState.currentBtnEl = btnEl;
    speakerState.currentIndex = msgIndex;
    setSpeakerBtnState(btnEl, "loading");

    try {
      const res = await fetch(API_BASE + "/speak", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-session-token": state.sessionToken
        },
        body: JSON.stringify({ text: msg.content })
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || "tts_failed");
      }
      const audioBlob = await res.blob();
      const audioUrl = URL.createObjectURL(audioBlob);
      const audio = new Audio(audioUrl);
      speakerState.currentAudio = audio;
      audio.onended = () => {
        if (speakerState.currentAudio === audio) stopCurrentAudio();
      };
      audio.onerror = () => {
        if (speakerState.currentAudio === audio) stopCurrentAudio();
      };
      setSpeakerBtnState(btnEl, "playing");
      await audio.play();
    } catch (err) {
      console.error("speak_failed", err);
      setSpeakerBtnState(btnEl, "idle");
      speakerState.currentAudio = null;
      speakerState.currentBtnEl = null;
      speakerState.currentIndex = -1;
    }
  }

  function onSpeakerClick(e) {
    const btn = e.target.closest(".speak-btn");
    if (!btn) return;
    const idx = parseInt(btn.dataset.msgIndex, 10);
    if (Number.isNaN(idx)) return;
    playMessageAudio(idx, btn);
  }

  function maybeAutoplayLastAssistant() {
    if (!state.autoplay) return;
    const lastIdx = state.messages.length - 1;
    if (lastIdx < 0) return;
    const last = state.messages[lastIdx];
    if (!last || last.role !== "assistant") return;
    setTimeout(() => {
      const btn = document.querySelector(`.speak-btn[data-msg-index="${lastIdx}"]`);
      if (btn) playMessageAudio(lastIdx, btn);
    }, 50);
  }

  function onAutoplayChange(e) {
    state.autoplay = !!e.target.checked;
    try { localStorage.setItem("tfif_autoplay_v1", state.autoplay ? "1" : "0"); } catch (err) {}
  }

  // ===== Unlimited API =====
  async function apiListUnlimited() {
    const res = await fetch(API_BASE + "/unlimited/sessions", { method: "GET", headers: { "x-session-token": state.sessionToken } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_list");
    return data.sessions || [];
  }
  async function apiCreateUnlimited(processKey) {
    const res = await fetch(API_BASE + "/unlimited/sessions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
      body: JSON.stringify(processKey ? { process: processKey } : {})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_create");
    return data.session;
  }
  async function apiLoadUnlimited(id) {
    const res = await fetch(API_BASE + "/unlimited/session?id=" + encodeURIComponent(id), { method: "GET", headers: { "x-session-token": state.sessionToken } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_load");
    return data;
  }
  async function apiUnlimitedChat(sessionId, message) {
    const res = await fetch(API_BASE + "/unlimited/chat", { method: "POST", headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken }, body: JSON.stringify({ sessionId, message }) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_send");
    return data;
  }

  // ===== Unlimited handlers =====
  // Silently bootstrap a demo session if one doesn't exist yet — this lets a
  // visitor preview The Field — Unlimited without first completing the Day 1
  // entry form. Same anonymous identity flow as onStartSubmit.
  async function ensureDemoSession() {
    if (state.sessionToken) return true;
    try {
      const ident = resolveIdentity();
      const data = await apiStart(ident.email, ident.displayName, ident.kajabiMemberId);
      state.sessionToken = data.sessionToken;
      saveToken(data.sessionToken);
      state.currentDay = data.currentDay || 1;
      state.timeRemainingMs = data.timeRemainingMs;
      return true;
    } catch (e) {
      console.error("auto_start_failed", e);
      return false;
    }
  }

  // Cross-deploy recovery: if a request fails because the token is stale (DB
  // was reset, schema changed, session expired), purge the token, mint a fresh
  // anonymous session, and retry once.
  async function createUnlimitedWithRetry(processKey) {
    try {
      return await apiCreateUnlimited(processKey);
    } catch (e) {
      console.warn("create_unl_first_try_failed_resetting_session", e?.message);
      clearToken();
      state.sessionToken = null;
      state.unlimitedSessions = [];
      const ok = await ensureDemoSession();
      if (!ok) throw new Error("could_not_bootstrap_session");
      return await apiCreateUnlimited(processKey);
    }
  }

  async function onNewChatClick() {
    // Re-entry guard — a double-tap on "+ New chat" would otherwise create
    // two empty Unlimited sessions. Set synchronously, before any await.
    if (state.creatingChat) return;
    state.creatingChat = true;
    state.mobileDrawerOpen = false;
    // Optimistic switch: jump to the Unlimited chat view with a loading state
    // the instant the button is clicked, instead of waiting for the API to
    // create the session. The click registers immediately.
    const prevView = state.view;
    const prevActiveId = state.activeUnlimitedId;
    state.view = "unlimited-chat";
    state.activeUnlimitedId = null;
    state.unlimitedMessages = [];
    state.loading = true;
    render();
    try {
      const ok = await ensureDemoSession();
      if (!ok) throw new Error("could_not_bootstrap_session");
      const session = await createUnlimitedWithRetry();
      state.unlimitedSessions.unshift(session);
      state.activeUnlimitedId = session.id;
      state.unlimitedMessages = [];
      state.loading = false;
      render();
    } catch (e) {
      console.error("create_unl_failed", e);
      // Restore the view the user came from so they aren't stranded.
      state.loading = false;
      state.view = prevView;
      state.activeUnlimitedId = prevActiveId;
      render();
      alert("Could not start a new chat. Try again.");
    } finally {
      state.creatingChat = false;
    }
  }

  // Toggle the guided-process dropdown by mutating the class on the existing
  // DOM node — same pattern as onMobileMenuClick. A full render() would steal
  // focus from the chat textarea and rebuild the whole sidebar needlessly.
  function onProcessMenuToggle() {
    state.processMenuOpen = !state.processMenuOpen;
    const menu = document.querySelector(".process-menu");
    if (menu) menu.classList.toggle("open", state.processMenuOpen);
    const caret = menu && menu.querySelector(".process-menu-caret");
    if (caret) caret.textContent = state.processMenuOpen ? "▴" : "▾";
  }

  // Start a new Unlimited chat already bound to a guided process. Mirrors
  // onNewChatClick, then auto-sends an activation message so The Field
  // delivers the process opening.
  async function onProcessPick(processKey) {
    if (state.creatingChat) return;
    const proc = DEMO_PROCESSES.find(p => p.key === processKey);
    if (!proc) return;
    state.creatingChat = true;
    // Close the process menu and the mobile drawer.
    state.processMenuOpen = false;
    state.mobileDrawerOpen = false;
    // Optimistic switch to the Unlimited chat view with a loading state.
    const prevView = state.view;
    const prevActiveId = state.activeUnlimitedId;
    state.view = "unlimited-chat";
    state.activeUnlimitedId = null;
    state.unlimitedMessages = [];
    state.loading = true;
    render();
    try {
      const ok = await ensureDemoSession();
      if (!ok) throw new Error("could_not_bootstrap_session");
      const session = await createUnlimitedWithRetry(processKey);
      state.unlimitedSessions.unshift(session);
      state.activeUnlimitedId = session.id;
      // Auto-send a first message so The Field opens the process.
      const activationMessage = proc.prompt || ("I am entering the " + proc.name + " process. Begin.");
      state.unlimitedMessages = [{ role: "user", content: activationMessage }];
      state.loading = true;
      render();
      const data = await apiUnlimitedChat(session.id, activationMessage);
      state.unlimitedMessages.push({ role: "assistant", content: data.reply });
      state.loading = false;
      const idx = state.unlimitedSessions.findIndex(s => s.id === session.id);
      if (idx >= 0) {
        const updated = Object.assign({}, state.unlimitedSessions[idx], { lastMessageAt: new Date().toISOString() });
        if (data.title) updated.title = data.title;
        state.unlimitedSessions[idx] = updated;
      }
      render();
      maybeAutoplayLastUnlimitedAssistant();
    } catch (e) {
      console.error("start_process_failed", e);
      state.loading = false;
      state.view = prevView;
      state.activeUnlimitedId = prevActiveId;
      render();
      alert("Could not start the process. Try again.");
    } finally {
      state.creatingChat = false;
    }
  }

  function onMagnifierClick() {
    state.searchOpen = !state.searchOpen;
    if (!state.searchOpen) state.searchQuery = "";
    render();
  }

  async function onUnlimitedChatClick(sessionId) {
    if (!sessionId) return;
    state.mobileDrawerOpen = false;
    if (sessionId === state.activeUnlimitedId && state.view === "unlimited-chat") return;
    // Optimistic switch — header + chat-list highlight + loading visual update
    // immediately so the click feels instant. Messages stream in after fetch.
    state.activeUnlimitedId = sessionId;
    state.unlimitedMessages = [];
    state.view = "unlimited-chat";
    state.loading = true;
    render();
    try {
      const data = await apiLoadUnlimited(sessionId);
      state.unlimitedMessages = data.messages || [];
      state.loading = false;
      const idx = state.unlimitedSessions.findIndex(s => s.id === sessionId);
      if (idx >= 0) state.unlimitedSessions[idx] = Object.assign({}, state.unlimitedSessions[idx], data.session);
      render();
    } catch (e) {
      console.error("load_unl_failed", e);
      state.loading = false;
      render();
      alert("Could not load that conversation.");
    }
  }

  function renderUnlimitedMessages() {
    const wrap = document.getElementById("messages");
    if (!wrap) return;
    if (state.loading && state.unlimitedMessages.length === 0) {
      wrap.innerHTML = renderSkeletonLoading();
      return;
    }
    let html = state.unlimitedMessages.map((m, i) => {
      if (m.role === "user") return '<div class="msg-row user"><div class="msg">' + escapeHtml(m.content) + '</div></div>';
      return '<div class="msg-row assistant"><div class="msg">' + renderMarkdown(m.content) + '</div>'
        + '<button class="speak-btn" data-unl-msg-index="' + i + '" type="button" aria-label="Play in Shimrit\'s voice">'
        + '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/><path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>'
        + '</button></div>';
    }).join("");
    if (state.loading) html += '<div class="msg-row assistant"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
    wrap.innerHTML = html;
    const wrapper = document.getElementById("messages-wrap");
    if (wrapper) wrapper.scrollTop = wrapper.scrollHeight;
  }

  function onUnlimitedKeyDown(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); onUnlimitedSendClick(); } }

  async function onUnlimitedSendClick() {
    const inputEl = document.getElementById("input");
    if (!inputEl) return;
    const text = inputEl.value.trim();
    if (!text || state.loading || !state.activeUnlimitedId) return;
    state.unlimitedMessages.push({ role: "user", content: text });
    inputEl.value = "";
    inputEl.style.height = "auto";
    state.loading = true;
    document.getElementById("send-btn").classList.remove("active");
    clearDraft(currentContextKey());
    renderUnlimitedMessages();
    try {
      const data = await apiUnlimitedChat(state.activeUnlimitedId, text);
      state.unlimitedMessages.push({ role: "assistant", content: data.reply });
      state.loading = false;
      const idx = state.unlimitedSessions.findIndex(s => s.id === state.activeUnlimitedId);
      if (idx >= 0) {
        const updated = Object.assign({}, state.unlimitedSessions[idx], { lastMessageAt: new Date().toISOString() });
        if (data.title) updated.title = data.title;
        state.unlimitedSessions.splice(idx, 1);
        state.unlimitedSessions.unshift(updated);
      }
      render();
      maybeAutoplayLastUnlimitedAssistant();
    } catch (err) {
      state.unlimitedMessages.push({ role: "assistant", content: "Something went wrong. Try again in a moment." });
      state.loading = false;
      renderUnlimitedMessages();
    }
  }

  function onUnlimitedSpeakerClick(e) {
    const btn = e.target.closest(".speak-btn");
    if (!btn) return;
    const idx = parseInt(btn.dataset.unlMsgIndex, 10);
    if (Number.isNaN(idx)) return;
    playUnlimitedMessageAudio(idx, btn);
  }

  async function playUnlimitedMessageAudio(idx, btnEl) {
    if (speakerState.currentIndex === idx && speakerState.currentAudio) { stopCurrentAudio(); return; }
    stopCurrentAudio();
    const msg = state.unlimitedMessages[idx];
    if (!msg || msg.role !== "assistant" || !msg.content) return;
    speakerState.currentBtnEl = btnEl;
    speakerState.currentIndex = idx;
    setSpeakerBtnState(btnEl, "loading");
    try {
      const res = await fetch(API_BASE + "/speak", { method: "POST", headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken }, body: JSON.stringify({ text: msg.content }) });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || "tts_failed"); }
      const blob = await res.blob();
      const audio = new Audio(URL.createObjectURL(blob));
      speakerState.currentAudio = audio;
      audio.onended = () => { if (speakerState.currentAudio === audio) stopCurrentAudio(); };
      audio.onerror = () => { if (speakerState.currentAudio === audio) stopCurrentAudio(); };
      setSpeakerBtnState(btnEl, "playing");
      await audio.play();
    } catch (err) {
      console.error("speak_failed", err);
      setSpeakerBtnState(btnEl, "idle");
      speakerState.currentAudio = null; speakerState.currentBtnEl = null; speakerState.currentIndex = -1;
    }
  }

  function maybeAutoplayLastUnlimitedAssistant() {
    if (!state.autoplay) return;
    const last = state.unlimitedMessages.length - 1; if (last < 0) return;
    const m = state.unlimitedMessages[last]; if (!m || m.role !== "assistant") return;
    setTimeout(() => { const btn = document.querySelector('.speak-btn[data-unl-msg-index="' + last + '"]'); if (btn) playUnlimitedMessageAudio(last, btn); }, 50);
  }

  async function loadFullState() {
    try {
      const data = await apiState(state.sessionToken);
      if (data.expired) { state.view = "entry"; render(); return; }
      state.currentDay = data.currentDay || 1;
      state.lastCompletedDay = data.lastCompletedDay || 0;
      state.timeRemainingMs = data.timeRemainingMs;
      state.dayUnlocks = data.dayUnlocks || state.dayUnlocks;
      state.firstLoginAt = data.firstLoginAt || state.firstLoginAt;
      state.previewEndsAt = data.previewEndsAt || state.previewEndsAt;
      state.displayName = data.displayName || state.displayName;
      // Filter to messages for the CURRENT day only. Each day is its own
      // thread in the demo. Falls back to all messages if no day metadata
      // is present (older sessions).
      const allMessages = data.messages || [];
      const filtered = allMessages.filter(m => {
        if (m.dayAtSend == null) return true;
        return Number(m.dayAtSend) === Number(state.currentDay);
      });
      state.messages = filtered.length > 0 ? filtered : allMessages;
      state.view = "chat";
      render();
    } catch (err) {
      clearToken();
      state.sessionToken = null;
      state.view = "login";
      state.loginStep = "email";
      render();
    }
  }

  async function loadUnlimitedSessions() {
    try { state.unlimitedSessions = await apiListUnlimited(); }
    catch (e) { console.warn("could_not_load_unlimited_sessions", e?.message); state.unlimitedSessions = []; }
  }

  // The normal app startup. In embed mode this runs only AFTER the identity
  // gate has verified the member.
  function initApp() {
    // Embed mode never resumes a saved token — identity is always re-established
    // from the verified Kajabi member, so one browser cannot carry another
    // member's session.
    const existing = EMBED_MODE ? null : loadToken();
    if (existing) {
      state.sessionToken = existing;
      loadFullState().then(() => loadUnlimitedSessions().then(() => render()));
    } else {
      state.view = "login";
      state.loginStep = "email";
      render();
    }
    startUnlockTicker();
  }

  // ===== Locked-day countdown ticker =====
  // Refreshes the "Unlocks in 14h 32m" text every 30s. When a day flips from
  // locked to unlocked we trigger a full render() so the lock styling, click
  // wiring, and chip status all update at once. Only one timer is ever live.
  let unlockTickerId = null;
  function startUnlockTicker() {
    if (unlockTickerId) clearInterval(unlockTickerId);
    unlockTickerId = setInterval(refreshUnlockUI, 30 * 1000);
  }
  function refreshUnlockUI() {
    const unlocks = state.dayUnlocks || {};
    let flippedToUnlocked = false;
    // Update each visible countdown line in place. If any locked day's
    // unlock time has now passed, mark for full re-render at the end.
    document.querySelectorAll("[data-day-countdown]").forEach(el => {
      const dayNum = Number(el.getAttribute("data-day-countdown"));
      const at = unlocks[dayNum];
      if (!at) {
        // Already unlocked or no clock yet — schedule a full re-render so
        // the locked state disappears entirely.
        flippedToUnlocked = true;
        return;
      }
      const remaining = new Date(at).getTime() - Date.now();
      if (remaining <= 0) {
        flippedToUnlocked = true;
        return;
      }
      el.textContent = formatUnlockCountdown(at);
    });
    if (flippedToUnlocked) render();
  }

  // ===== Kajabi embed identity gate =====
  // In embed mode the app will not start until it receives the member's
  // identity in a postMessage from an allowed Kajabi origin. A visitor who opens
  // the app URL outside Kajabi never receives that message and sees a locked
  // screen instead — this is what makes a shared URL useless.
  function renderEmbedGate(message) {
    const app = document.getElementById("app");
    if (!app) return;
    app.innerHTML = `
      <div class="embed-gate">
        <div class="embed-gate-card">
          <div class="embed-gate-mark"><img src="https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/file-uploads/themes/2161454568/settings_images/d2126ef-2bee-6f2c-8c2-d1357db52300_myp_logo.png" alt="Master Your Path" /></div>
          <div class="embed-gate-title">${escapeHtml(message)}</div>
        </div>
      </div>`;
  }

  function startEmbedGate() {
    renderEmbedGate("Connecting to your member area…");
    let settled = false;

    window.addEventListener("message", function (event) {
      if (settled) return;
      // Only a message from your Kajabi site is trusted. The browser sets
      // event.origin; the sender cannot forge it.
      if (KAJABI_ALLOWED_ORIGINS.indexOf(event.origin) === -1) return;
      const d = event.data || {};
      if (!d || d.type !== "tfif-identity") return;
      const kajabiId = String(d.kajabiId == null ? "" : d.kajabiId).trim();
      if (!/^[0-9A-Za-z_-]{1,64}$/.test(kajabiId)) return;
      settled = true;
      KAJABI_IDENTITY = {
        kajabiId: kajabiId,
        tier: d.tier === "full" ? "full" : "preview",
        name: typeof d.name === "string" ? d.name.slice(0, 80) : ""
      };
      state.tier = KAJABI_IDENTITY.tier;
      initApp();
    });

    // Tell the Kajabi parent page the app is loaded and ready for the identity.
    try { window.parent.postMessage({ type: "tfif-ready" }, "*"); } catch (e) {}

    // If no valid identity arrives, lock the screen. Fails closed by design.
    setTimeout(function () {
      if (settled) return;
      settled = true;
      renderEmbedGate("Please open The Field from your Master Your Path member area.");
    }, 8000);
  }

  function init() {
    applyTheme(loadTheme());
    applyFontScale(state.fontScale);
    if (EMBED_MODE) { startEmbedGate(); return; }
    initApp();
  }

  init();
})();
</script>
</body>
</html>
