    document.removeEventListener("click", outsideNotifClickHandler);
    document.removeEventListener("keydown", notifEscHandler);
  }

  function outsideNotifClickHandler(ev) {
    const panel = document.getElementById("notif-panel");
    const btn = document.getElementById("notif-btn");
    if (!panel) return;
    if (panel.contains(ev.target)) return;
    if (btn && btn.contains(ev.target)) return;
    closeNotifPanel();
  }

  function notifEscHandler(ev) {
    if (ev.key === "Escape") closeNotifPanel();
  }

  // ===== Account modal handlers =====
  function onAccountOpen() {
    state.accountMenuOpen = true;
    state.accountSavedFlash = false;
    state.mobileDrawerOpen = false; // close drawer if it was open
    // accountJustOpened controls whether the modal entrance animation plays
    // on this render. We set it true here so the first render shows the
    // slide-in animation, then flip it to false immediately after, so any
    // subsequent render triggered by the silent background refresh below
    // does NOT re-trigger the animation. That re-trigger was the visible
    // 1-second flicker users were noticing every time they opened the modal.
    state.accountJustOpened = true;
    render();
    state.accountJustOpened = false;
    // Silent background refresh so the modal always shows the current tier,
    // subscription plan, and reset window. Without this, a user who just
    // upgraded from monthly to yearly would still see the old plan label
    // until they reloaded the page. Failures are swallowed on purpose.
    if (state.sessionToken) {
      loadFullState().catch(function () { /* swallow */ });
    }
  }
  function onAccountClose() {
    state.accountMenuOpen = false;
    state.accountSavingName = false;
    state.accountSavedFlash = false;
    render();
  }
  async function onAccountSaveName(e) {
    if (e) e.preventDefault();
    if (state.accountSavingName) return;
    const input = document.getElementById("acct-name-input");
    const name = input ? String(input.value || "").trim().slice(0, 80) : "";
    state.accountSavingName = true;
    state.accountSavedFlash = false;
    render();
    try {
      const data = await apiSaveAccount(state.sessionToken, { displayName: name });
      // Server is the source of truth — it returns the saved value.
      state.displayName = (data && data.displayName) || name;
      state.accountSavingName = false;
      state.accountSavedFlash = true;
      render();
      // Drop the "Saved" flash back to "Save" after a moment.
      setTimeout(() => {
        if (!state.accountMenuOpen) return;
        state.accountSavedFlash = false;
        render();
      }, 1800);
    } catch (err) {
      state.accountSavingName = false;
      state.accountSavedFlash = false;
      alert("Could not save your name. Please try again.");
      render();
    }
  }

  // Clear the session and return the visitor to the login screen.
  function onLogout() {
    if (!confirm("Sign out of The Field?")) return;
    clearToken();
    state.sessionToken = null;
    state.messages = [];
    state.unlimitedSessions = [];
    state.activeUnlimitedId = null;
    state.unlimitedMessages = [];
    state.searchOpen = false;
    state.searchQuery = "";
    state.processMenuOpen = false;
    state.view = "login";
    state.loginStep = "email";
    state.loginEmail = "";
    state.loginError = "";
    state.loginLoading = false;
    render();
  }

  async function onStartSubmit(e) {
    e.preventDefault();
    // Re-entry guard. The first await below is apiStart — without this flag,
    // a fast double-tap on "Begin Day 1" fires onStartSubmit twice before
    // either render() runs, producing two apiChat calls and a duplicated
    // opening exchange in the database. Set synchronously, before any await.
    if (state.starting) return;
    const name = (document.getElementById("name-input").value || "").trim();
    const opening = (document.getElementById("opening-input").value || "").trim();
    if (!opening) return;
    state.starting = true;
    state.error = null;
    // Visually disable the submit button for the brief window before render().
    const submitBtn = e.target && e.target.querySelector(".btn-primary");
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = "Beginning…"; }
    try {
      const ident = resolveIdentity();
      const data = await apiStart(ident.email, ident.displayName || name, ident.kajabiMemberId);
      state.sessionToken = data.sessionToken;
      saveToken(data.sessionToken);
      state.currentDay = data.currentDay || 1;
      state.timeRemainingMs = data.timeRemainingMs;
      if (EMBED_MODE) {
        // Tier was set from the verified Kajabi message; a 'full' from the
        // backend (once the webhook feeds it) also promotes.
        if (data.tier === "full") state.tier = "full";
      } else {
        state.tier = URL_TIER || data.tier || "preview";
      }
      state.view = "chat";
      state.messages = [{ role: "user", content: opening }];
      state.loading = true;
      clearDraft("entry");
      clearDraft("entry_name");
      render();
      const chatData = await apiChat(state.sessionToken, opening);
      if (chatData.expired) { state.view = "login"; state.error = "Window expired."; state.loading = false; render(); return; }
      state.messages.push({ role: "assistant", content: chatData.reply });
      state.currentDay = chatData.currentDay;
      state.loading = false;
      render();
      maybeAutoplayLastAssistant();
    } catch (err) {
      state.error = err.message || "Could not start.";
      state.loading = false;
      state.view = "login";
      render();
    } finally {
      state.starting = false;
    }
  }

  function onInputChange(e) {
    e.target.style.height = "auto";
    e.target.style.height = Math.min(e.target.scrollHeight, 200) + "px";
    const send = document.getElementById("send-btn");
    if (e.target.value.trim() && !state.loading) send.classList.add("active");
    else send.classList.remove("active");
    // Persist draft so the text survives view changes / reloads.
    saveDraft(currentContextKey(), e.target.value);
  }

  function onInputKeyDown(e) {
    if (e.key !== "Enter" || e.shiftKey) return;
    // On mobile (touch devices with no fine pointer), Enter inserts a line
    // break — matches user expectations from iMessage / WhatsApp where the
    // Return key newlines and the send arrow sends. On desktop, Enter still
    // sends (the explicit pattern people learn from chat apps).
    const isMobile = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
    if (isMobile) return; // let the browser insert a newline naturally
    e.preventDefault();
    onSendClick();
  }

  async function onSendClick() {
    const inputEl = document.getElementById("input");
    if (!inputEl) return;
    const text = inputEl.value.trim();
    if (!text || state.loading) return;
    state.messages.push({ role: "user", content: text });
    inputEl.value = "";
    inputEl.style.height = "auto";
    state.loading = true;
    document.getElementById("send-btn").classList.remove("active");
    clearDraft(currentContextKey());
    renderMessages();
    try {
      const data = await apiChat(state.sessionToken, text);
      if (data.expired) { state.error = "Window expired."; state.loading = false; render(); return; }
      state.messages.push({ role: "assistant", content: data.reply });
      state.currentDay = data.currentDay;
      state.loading = false;
      render();
      maybeAutoplayLastAssistant();
    } catch (err) {
      state.messages.push({ role: "assistant", content: chatErrorMessage(err) });
      state.loading = false;
      renderMessages();
    }
  }

  async function onDayClick(day) {
    if (!state.sessionToken) return;
    // Defensive: locked days should not be clickable (we don't wire the
    // listener on them) but if a stale state ever calls this, no-op.
    if (!isDayUnlocked(day)) return;
    state.mobileDrawerOpen = false; // close mobile drawer once a day is picked
    // Only skip if we're ALREADY viewing this exact day in the Reset chat
    // view. If the user is in Unlimited and clicks back to their current
    // day, we still need to switch views and reload the day's messages.
    if (day === state.currentDay && state.view === "chat") return;
    // Optimistic switch — header (day pill + title) and message area update
    // instantly so the click feels responsive; real messages stream in after.
    state.currentDay = day;
    state.messages = [];
    state.view = "chat";
    state.loading = true;
    state.activeUnlimitedId = null; // deactivate any unlimited chat highlight
    render();
    try {
      const data = await apiSetDay(state.sessionToken, day);
      state.currentDay = data.currentDay;
      state.lastCompletedDay = data.lastCompletedDay;
      // Replace messages with this day's own conversation history. Each day
      // is its own thread; switching loads that thread fresh.
      state.messages = data.messages || [];
      state.loading = false;
      render();
    } catch (err) {
      // 423 Locked from the server (race condition: clock changed mid-click).
      // Refresh state so the sidebar re-renders with the latest unlock map.
      if (err && err.message === "day_locked") {
        state.loading = false;
        loadFullState();
        return;
      }
      state.messages.push({ role: "assistant", content: "Something went wrong: " + (err.message || "could not switch day.") });
      state.loading = false;
      renderMessages();
    }
  }

  function onReset() {
    if (!confirm("Reset this demo conversation? A fresh anonymous user will be created on next message.")) return;
    clearToken();
    state.sessionToken = null;
    state.currentDay = 1;
    state.lastCompletedDay = 0;
    state.messages = [];
    state.view = "login";
    // Purge any saved drafts so the fresh session starts clean.
    try {
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && k.indexOf("tfif_draft_") === 0) localStorage.removeItem(k);
      }
    } catch (e) {}
    render();
  }

  // ===== Voice input =====
  // 5 minutes. Whisper-1 cost is ~$0.006/min so a max clip is still <4¢.
  // The transcribe endpoint's bodyParser is 10mb; a 5-minute Opus clip
  // base64-encoded is roughly 1.5mb, well within the cap.
  const MAX_RECORDING_MS = 5 * 60 * 1000;
  // Whisper rarely takes more than ~30s for a 5-min clip, but slow
  // mobile networks can stretch this. 90s cap stops a hung request
  // from making the UI feel permanently frozen.
  const TRANSCRIBE_TIMEOUT_MS = 90 * 1000;
  const voiceState = {
    mediaRecorder: null, audioChunks: [], stream: null, mimeType: "",
    startedAt: 0, timerInterval: null, autoStopTimer: null, indicatorEl: null,
    // Preserved audio when transcription fails so the user can retry
    // or download it instead of losing the whole recording. Cleared
    // on successful transcription or user dismiss.
    lastFailedAudio: null,
    // AbortController for the in-flight fetch so the timeout can cancel
    // it cleanly without leaking sockets / blocking the UI.
    transcribeController: null
  };

  function micSupported() {
    return !!(typeof navigator !== "undefined" && navigator.mediaDevices &&
      navigator.mediaDevices.getUserMedia && typeof window.MediaRecorder !== "undefined");
  }

  async function onMicClick() {
    // ALWAYS allow stopping a recording. Previously this checked
    // state.loading FIRST, which meant: if the AI was still streaming
    // a response while the user was recording, tapping the red mic
    // button to stop did nothing and the recording got stuck. That
    // was the "red button doesn't work, everything is frozen" bug.
    // Now stop is unconditional; only START is blocked when busy.
    if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === "recording") {
      stopRecording();
      return;
    }
    if (state.loading) return;
    await startRecording();
  }

  async function startRecording() {
    const micBtn = document.getElementById("mic-btn");
    if (!micBtn) return;
    try {
      voiceState.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const candidates = ["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg;codecs=opus"];
      let mimeType = "";
      for (const m of candidates) {
        if (window.MediaRecorder.isTypeSupported && window.MediaRecorder.isTypeSupported(m)) {
          mimeType = m;
          break;
        }
      }
      voiceState.mimeType = mimeType || "audio/webm";
      voiceState.mediaRecorder = mimeType
        ? new MediaRecorder(voiceState.stream, { mimeType })
        : new MediaRecorder(voiceState.stream);
      voiceState.audioChunks = [];
      voiceState.mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) voiceState.audioChunks.push(e.data);
      };
      voiceState.mediaRecorder.onstop = async () => {
        cleanupRecording();
        micBtn.classList.remove("recording");
        const blob = new Blob(voiceState.audioChunks, { type: voiceState.mimeType });
        voiceState.audioChunks = [];
        if (blob.size < 1000) {
          // Recording too short — typical when the user taps the mic
          // by accident or releases immediately. Tell them so it
          // doesn't feel like the mic silently swallowed the press.
          showTranscribingMessage("Recording too short. Hold the mic to record, then tap again to stop.", "warning");
          setTimeout(removeTranscribingIndicator, 3500);
          return;
        }
        await transcribeBlob(blob, voiceState.mimeType);
      };
      voiceState.mediaRecorder.start();
      voiceState.startedAt = Date.now();
      micBtn.classList.add("recording");
      showRecordingIndicator();
      voiceState.timerInterval = setInterval(updateRecordingIndicator, 250);
      voiceState.autoStopTimer = setTimeout(() => {
        if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === "recording") {
          stopRecording();
        }
      }, MAX_RECORDING_MS);
    } catch (err) {
      console.error("mic_permission_or_error", err);
      cleanupRecording();
      micBtn.classList.remove("recording");
      alert("Could not access your microphone. Please allow microphone access and try again.");
    }
  }

  function stopRecording() {
    if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === "recording") {
      voiceState.mediaRecorder.stop();
    }
  }

  function cleanupRecording() {
    if (voiceState.timerInterval) { clearInterval(voiceState.timerInterval); voiceState.timerInterval = null; }
    if (voiceState.autoStopTimer) { clearTimeout(voiceState.autoStopTimer); voiceState.autoStopTimer = null; }
    if (voiceState.stream) { voiceState.stream.getTracks().forEach((t) => t.stop()); voiceState.stream = null; }
    removeRecordingIndicator();
  }

  function showRecordingIndicator() {
    const composer = document.querySelector(".composer");
    if (!composer) return;
    voiceState.indicatorEl = document.createElement("div");
    voiceState.indicatorEl.className = "recording-indicator";
    voiceState.indicatorEl.innerHTML = '<span class="red-dot"></span><span class="rec-time">0:00</span> / 5:00';
    composer.appendChild(voiceState.indicatorEl);
  }

  function updateRecordingIndicator() {
    if (!voiceState.indicatorEl) return;
    const elapsedMs = Date.now() - voiceState.startedAt;
    const totalSec = Math.floor(elapsedMs / 1000);
    const min = Math.floor(totalSec / 60);
    const sec = totalSec % 60;
    const timeEl = voiceState.indicatorEl.querySelector(".rec-time");
    if (timeEl) timeEl.textContent = `${min}:${String(sec).padStart(2, "0")}`;
  }

  function removeRecordingIndicator() {
    if (voiceState.indicatorEl) { voiceState.indicatorEl.remove(); voiceState.indicatorEl = null; }
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => {
        const result = reader.result || "";
        const idx = String(result).indexOf(",");
        resolve(idx >= 0 ? String(result).slice(idx + 1) : "");
      };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  async function transcribeBlob(blob, mimeType) {
    const micBtn = document.getElementById("mic-btn");
    if (micBtn) micBtn.classList.add("transcribing");
    // Clear any previous failure UI before starting a fresh attempt
    // (the user may be retrying the same audio).
    removeFailedAudioUI();
    showTranscribingMessage("Transcribing your recording…");

    // Abort the fetch if Whisper takes too long. Without this, a hung
    // request would leave the mic button stuck in "transcribing" state
    // forever, which is what users were describing as "frozen".
    voiceState.transcribeController = new AbortController();
    const timeoutId = setTimeout(() => {
      try { voiceState.transcribeController.abort(); } catch (e) {}
    }, TRANSCRIBE_TIMEOUT_MS);

    try {
      const audioBase64 = await blobToBase64(blob);
      const res = await fetch(API_BASE + "/transcribe", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
        body: JSON.stringify({ audioBase64, mimeType }),
        signal: voiceState.transcribeController.signal
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        // Preserve the server-provided error so the user sees something
        // actionable instead of a generic "failed".
        const e = new Error(data.error || ("HTTP " + res.status));
        e.statusCode = res.status;
        throw e;
      }
      const text = (data.text || "").trim();
      if (!text) {
        throw new Error("transcription_empty");
      }
      const inputEl = document.getElementById("input");
      if (inputEl) {
        const existing = inputEl.value.trim();
        inputEl.value = existing ? `${existing} ${text}` : text;
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
        inputEl.focus();
        inputEl.dispatchEvent(new Event("input", { bubbles: true }));
      }
      // Success — drop any previously preserved failed audio.
      voiceState.lastFailedAudio = null;
      removeTranscribingIndicator();
    } catch (err) {
      console.error("transcribe_failed", err);
      // Critical: preserve the audio blob so the user can retry or
      // download it. Previously the blob was lost the moment transcription
      // failed, which was the single worst part of the bug.
      voiceState.lastFailedAudio = { blob: blob, mimeType: mimeType };
      const friendlyMessage = describeTranscribeError(err);
      removeTranscribingIndicator();
      showFailedAudioUI(blob, mimeType, friendlyMessage);
    } finally {
      clearTimeout(timeoutId);
      voiceState.transcribeController = null;
      if (micBtn) micBtn.classList.remove("transcribing");
    }
  }

  // Turn an error into a one-line message that explains what happened
  // without exposing internal details. Helps the user decide whether
  // retry will work or they should download and try later.
  function describeTranscribeError(err) {
    if (!err) return "Something went wrong.";
    if (err.name === "AbortError") return "Took too long. Your network may be slow — your recording is saved.";
    if (err.message === "transcription_empty") return "We didn't pick up any speech. Try again, or check the recording.";
    if (err.statusCode === 401) return "Your session expired. Refresh the page and try again — your recording is saved.";
    if (err.statusCode === 413) return "Recording is too large. Try a shorter clip.";
    if (err.statusCode >= 500) return "Our transcription service hiccupped. Your recording is saved — try again in a moment.";
    if (err.message && err.message.includes("Failed to fetch")) return "Couldn't reach the server. Check your connection — your recording is saved.";
    return "Couldn't transcribe. Your recording is saved — try again, or download it.";
  }

  // Inline progress message shown in the composer area while
  // transcription is in flight. Replaces the silent waiting period.
  function showTranscribingMessage(text, variant) {
    removeTranscribingIndicator();
    const composer = document.querySelector(".composer");
    if (!composer) return;
    const el = document.createElement("div");
    el.className = "transcribing-indicator";
    el.id = "transcribing-indicator";
    const showSpinner = variant !== "warning";
    el.innerHTML = (showSpinner ? '<span class="transcribing-spinner"></span>' : '') +
      '<span class="transcribing-text"></span>';
    const textEl = el.querySelector(".transcribing-text");
    if (textEl) textEl.textContent = text;
    composer.appendChild(el);
  }

  function removeTranscribingIndicator() {
    const el = document.getElementById("transcribing-indicator");
    if (el) el.remove();
  }

  // Show recovery UI: keep the failed recording accessible, offer
  // Retry / Download / Discard. The blob is held in memory (and via
  // an object URL for the download link) until the user dismisses.
  function showFailedAudioUI(blob, mimeType, errorMessage) {
    removeFailedAudioUI();
    const composer = document.querySelector(".composer");
    if (!composer) return;

    const wrapper = document.createElement("div");
    wrapper.className = "voice-recovery";
    wrapper.id = "voice-recovery";

    const msg = document.createElement("div");
    msg.className = "voice-recovery-msg";
    msg.textContent = errorMessage || "Couldn't transcribe — your recording is saved.";

    const actions = document.createElement("div");
    actions.className = "voice-recovery-actions";

    const retryBtn = document.createElement("button");
    retryBtn.type = "button";
    retryBtn.className = "voice-recovery-btn";
    retryBtn.textContent = "Try again";
    retryBtn.onclick = () => {
      removeFailedAudioUI();
      transcribeBlob(blob, mimeType);
    };

    // Download link uses an object URL so the user can save the audio
    // file to their device if transcription keeps failing. Extension
    // picked from the mime type so common players can open it.
    const downloadBtn = document.createElement("a");
    downloadBtn.className = "voice-recovery-btn voice-recovery-btn-secondary";
    downloadBtn.href = URL.createObjectURL(blob);
    let ext = "webm";
    if (mimeType.includes("mp4")) ext = "m4a";
    else if (mimeType.includes("ogg")) ext = "ogg";
    downloadBtn.download = `field-recording-${Date.now()}.${ext}`;
    downloadBtn.textContent = "Download audio";

    const dismissBtn = document.createElement("button");
    dismissBtn.type = "button";
    dismissBtn.className = "voice-recovery-btn voice-recovery-btn-secondary";
    dismissBtn.textContent = "Discard";
    dismissBtn.onclick = () => {
      removeFailedAudioUI();
      voiceState.lastFailedAudio = null;
    };

    actions.appendChild(retryBtn);
    actions.appendChild(downloadBtn);
    actions.appendChild(dismissBtn);
    wrapper.appendChild(msg);
    wrapper.appendChild(actions);
    composer.appendChild(wrapper);
  }

  function removeFailedAudioUI() {
    const existing = document.getElementById("voice-recovery");
    if (existing) {
      // Revoke any object URLs we created so the browser can release
      // the audio bytes once the user is done with the recovery card.
      const link = existing.querySelector("a.voice-recovery-btn");
      if (link && link.href && link.href.startsWith("blob:")) {
        try { URL.revokeObjectURL(link.href); } catch (e) {}
      }
      existing.remove();
    }
  }

  // ===== Speaker (Shimrit voice playback) =====
  const speakerState = {
    currentAudio: null,
    currentBtnEl: null,
    currentIndex: -1
  };

  function setSpeakerBtnState(btnEl, stateName) {
    if (!btnEl) return;
    btnEl.classList.remove("loading", "playing");
    if (stateName === "loading") btnEl.classList.add("loading");
    else if (stateName === "playing") btnEl.classList.add("playing");
  }

  function stopCurrentAudio() {
    if (speakerState.currentAudio) {
      try { speakerState.currentAudio.pause(); } catch (e) {}
      try { URL.revokeObjectURL(speakerState.currentAudio.src); } catch (e) {}
      speakerState.currentAudio = null;
    }
    if (speakerState.currentBtnEl) {
      setSpeakerBtnState(speakerState.currentBtnEl, "idle");
      speakerState.currentBtnEl = null;
    }
    speakerState.currentIndex = -1;
  }

  async function playMessageAudio(msgIndex, btnEl) {
    if (speakerState.currentIndex === msgIndex && speakerState.currentAudio) {
      stopCurrentAudio();
      return;
    }
    stopCurrentAudio();

    const msg = state.messages[msgIndex];
    if (!msg || msg.role !== "assistant" || !msg.content) return;

    speakerState.currentBtnEl = btnEl;
    speakerState.currentIndex = msgIndex;
    setSpeakerBtnState(btnEl, "loading");

    try {
      const res = await fetch(API_BASE + "/speak", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-session-token": state.sessionToken
        },
        body: JSON.stringify({ text: msg.content })
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || "tts_failed");
      }
      const audioBlob = await res.blob();
      const audioUrl = URL.createObjectURL(audioBlob);
      const audio = new Audio(audioUrl);
      speakerState.currentAudio = audio;
      audio.onended = () => {
        if (speakerState.currentAudio === audio) stopCurrentAudio();
      };
      audio.onerror = (e) => {
        // Fires when the audio element can't play the decoded blob (rare —
        // usually a codec issue or browser autoplay policy). Surface it so
        // the user isn't left staring at a silent speaker button.
        console.error("speak_audio_element_error", e);
        showTtsError("Your browser couldn't play the audio. Try tapping again.");
        if (speakerState.currentAudio === audio) stopCurrentAudio();
      };
      setSpeakerBtnState(btnEl, "playing");
      // Wrap audio.play() so autoplay policy rejections (Safari/iOS) get
      // surfaced instead of silently failing. Play returns a promise that
      // rejects when the browser blocks playback, which is one of the two
      // silent-failure modes members reported.
      try {
        await audio.play();
      } catch (playErr) {
        console.error("speak_play_blocked", playErr);
        showTtsError("Tap the speaker again to allow the audio to play.");
        setSpeakerBtnState(btnEl, "idle");
        speakerState.currentAudio = null;
      }
    } catch (err) {
      console.error("speak_failed", err);
      // Give the user visible feedback instead of silently resetting the
      // button. Message maps common server errors to plain language so
      // members know why the speak icon didn't do anything.
      const msg = String(err && err.message || "");
      if (msg.includes("text_too_long")) {
        showTtsError("This message is too long to read aloud. Try a shorter section.");
      } else if (msg.includes("tts_unavailable")) {
        showTtsError("Voice reading is temporarily unavailable.");
      } else if (msg.includes("tts_failed")) {
        showTtsError("Voice reading failed. Please try again.");
      } else if (msg.includes("unauthorized")) {
        showTtsError("Your session expired. Refresh the page and sign in again.");
      } else {
        showTtsError("Couldn't read this message aloud. Please try again.");
      }
      setSpeakerBtnState(btnEl, "idle");
      speakerState.currentAudio = null;
      speakerState.currentBtnEl = null;
      speakerState.currentIndex = -1;
    }
  }

  // Small transient toast at the bottom of the screen so TTS failures are
  // visible without hijacking the whole conversation with a blocking alert.
  // Auto-dismisses after 4 seconds. Reuses the same DOM node on repeat
  // errors so we don't stack them.
  function showTtsError(text) {
    try {
      let el = document.getElementById("tts-error-toast");
      if (!el) {
        el = document.createElement("div");
        el.id = "tts-error-toast";
        el.setAttribute("role", "status");
        el.setAttribute("aria-live", "polite");
        el.style.cssText = [
          "position: fixed",
          "bottom: 24px",
          "left: 50%",
          "transform: translateX(-50%)",
          "background: rgba(20, 20, 20, 0.95)",
          "color: #f0ead6",
          "font-family: Georgia, serif",
          "font-size: 14px",
          "line-height: 1.4",
          "padding: 12px 18px",
          "border: 1px solid rgba(201, 168, 76, 0.35)",
          "border-radius: 10px",
          "box-shadow: 0 8px 22px rgba(0, 0, 0, 0.28)",
          "z-index: 9999",
          "max-width: 320px",
          "text-align: center",
          "opacity: 0",
          "transition: opacity 0.25s ease",
          "pointer-events: none",
        ].join(";");
        document.body.appendChild(el);
      }
      el.textContent = text;
      requestAnimationFrame(() => { el.style.opacity = "1"; });
      clearTimeout(showTtsError._t);
      showTtsError._t = setTimeout(() => { el.style.opacity = "0"; }, 4000);
    } catch (e) { /* swallow — toast is best-effort */ }
  }

  function onSpeakerClick(e) {
    const btn = e.target.closest(".speak-btn");
    if (!btn) return;
    const idx = parseInt(btn.dataset.msgIndex, 10);
    if (Number.isNaN(idx)) return;
    playMessageAudio(idx, btn);
  }

  function maybeAutoplayLastAssistant() {
    if (!state.autoplay) return;
    const lastIdx = state.messages.length - 1;
    if (lastIdx < 0) return;
    const last = state.messages[lastIdx];
    if (!last || last.role !== "assistant") return;
    setTimeout(() => {
      const btn = document.querySelector(`.speak-btn[data-msg-index="${lastIdx}"]`);
      if (btn) playMessageAudio(lastIdx, btn);
    }, 50);
  }

  function onAutoplayChange(e) {
    state.autoplay = !!e.target.checked;
    try { localStorage.setItem("tfif_autoplay_v1", state.autoplay ? "1" : "0"); } catch (err) {}
  }

  // ===== Unlimited API =====
  async function apiListUnlimited() {
    const res = await fetch(API_BASE + "/unlimited/sessions", { method: "GET", headers: { "x-session-token": state.sessionToken } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_list");
    return data.sessions || [];
  }
  async function apiCreateUnlimited(processKey) {
    const res = await fetch(API_BASE + "/unlimited/sessions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
      body: JSON.stringify(processKey ? { process: processKey } : {})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_create");
    return data.session;
  }
  async function apiLoadUnlimited(id) {
    const res = await fetch(API_BASE + "/unlimited/session?id=" + encodeURIComponent(id), { method: "GET", headers: { "x-session-token": state.sessionToken } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_load");
    return data;
  }
  // Rename a chat. `title` is the new title; trimmed and validated server-side.
  async function apiRenameUnlimited(id, title) {
    const res = await fetch(API_BASE + "/unlimited/session?id=" + encodeURIComponent(id), {
      method: "PATCH",
      headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
      body: JSON.stringify({ title: title })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_rename");
    return data.session;
  }
  // Pin (true) or unpin (false) a chat. Server enforces the 5-pin limit and
  // returns 409 pin_limit_reached if you try to pin a 6th.
  async function apiPinUnlimited(id, pin) {
    const res = await fetch(API_BASE + "/unlimited/session?id=" + encodeURIComponent(id), {
      method: "PATCH",
      headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
      body: JSON.stringify({ pin: !!pin })
    });
    const data = await res.json();
    if (!res.ok) {
      const err = new Error(data.error || "could_not_pin");
      err.code = data.error;
      err.limit = data.limit;
      throw err;
    }
    return data.session;
  }
  async function apiDeleteUnlimited(id) {
    const res = await fetch(API_BASE + "/unlimited/session?id=" + encodeURIComponent(id), {
      method: "DELETE",
      headers: { "x-session-token": state.sessionToken }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_delete");
    return data;
  }
  async function apiUnlimitedChat(sessionId, message) {
    const res = await chatFetchWithRetry(() => fetch(API_BASE + "/unlimited/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
      body: JSON.stringify({ sessionId, message })
    }));
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || ("server_" + res.status));
    return data;
  }

  // ===== Unlimited handlers =====
  // Silently bootstrap a demo session if one doesn't exist yet — this lets a
  // visitor preview The Field — Unlimited without first completing the Day 1
  // entry form. Same anonymous identity flow as onStartSubmit.
  async function ensureDemoSession() {
    if (state.sessionToken) return true;
    try {
      const ident = resolveIdentity();
      const data = await apiStart(ident.email, ident.displayName, ident.kajabiMemberId);
      state.sessionToken = data.sessionToken;
      saveToken(data.sessionToken);
      state.currentDay = data.currentDay || 1;
      state.timeRemainingMs = data.timeRemainingMs;
      return true;
    } catch (e) {
      console.error("auto_start_failed", e);
      return false;
    }
  }

  // Cross-deploy recovery: if a request fails because the token is stale (DB
  // was reset, schema changed, session expired), purge the token, mint a fresh
  // anonymous session, and retry once.
  async function createUnlimitedWithRetry(processKey) {
    try {
      return await apiCreateUnlimited(processKey);
    } catch (e) {
      console.warn("create_unl_first_try_failed_resetting_session", e?.message);
      clearToken();
      state.sessionToken = null;
      state.unlimitedSessions = [];
      const ok = await ensureDemoSession();
      if (!ok) throw new Error("could_not_bootstrap_session");
      return await apiCreateUnlimited(processKey);
    }
  }

  async function onNewChatClick() {
    // Re-entry guard — a double-tap on "+ New chat" would otherwise create
    // two empty Unlimited sessions. Set synchronously, before any await.
    if (state.creatingChat) return;
    state.creatingChat = true;
    state.mobileDrawerOpen = false;
    // Optimistic switch: jump to the Unlimited chat view with a loading state
    // the instant the button is clicked, instead of waiting for the API to
    // create the session. The click registers immediately.
    const prevView = state.view;
    const prevActiveId = state.activeUnlimitedId;
    state.view = "unlimited-chat";
    state.activeUnlimitedId = null;
    state.unlimitedMessages = [];
    state.loading = true;
    render();
    try {
      const ok = await ensureDemoSession();
      if (!ok) throw new Error("could_not_bootstrap_session");
      const session = await createUnlimitedWithRetry();
      state.unlimitedSessions.unshift(session);
      state.activeUnlimitedId = session.id;
      state.unlimitedMessages = [];
      state.loading = false;
      render();
    } catch (e) {
      console.error("create_unl_failed", e);
      // Restore the view the user came from so they aren't stranded.
      state.loading = false;
      state.view = prevView;
      state.activeUnlimitedId = prevActiveId;
      render();
      alert("Could not start a new chat. Try again.");
    } finally {
      state.creatingChat = false;
    }
  }

  // ===== Push notifications =====
  // Day 2 & Day 3 unlock reminders, plus a 12-hour-before-expiry nudge.
  // Works on iOS 16.4+ when the PWA is installed via "Add to Home Screen"
  // (the modal above), on Android Chrome, and on desktop browsers.
  //
  // Flow:
  //   1. registerServiceWorker() runs once on app load — installs /sw.js
  //   2. Sidebar "Get reminders" button calls enablePushNotifications()
  //   3. Browser shows the native permission prompt
  //   4. If granted, subscribe via the Push API and POST the subscription
  //      to /api/push?action=subscribe so the server can fire reminders
  //   5. Button label updates to "Reminders enabled" and stays for context
  //
  // The button visibility is managed by updatePushButtonState() which runs
  // after each render. It hides on devices that don't support push.
  function pushSupported() {
    return (
      "serviceWorker" in navigator &&
      "PushManager" in window &&
      "Notification" in window
    );
  }

  async function registerServiceWorker() {
    if (!("serviceWorker" in navigator)) return null;
    try {
      const reg = await navigator.serviceWorker.register("/sw.js", { scope: "/" });
      return reg;
    } catch (err) {
      console.warn("sw_register_failed", err);
      return null;
    }
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
    const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
    const raw = atob(base64);
    const out = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
    return out;
  }

  // Silently push the existing browser subscription up to the server. Called
  // on every app load when permission is already granted. Self-heals cases
  // where the initial subscription save failed (VAPID not yet configured,
  // migration not yet run, network blip, etc.) — next load tries again.
  async function syncPushSubscription() {
    if (!pushSupported() || !state.sessionToken) return;
    if (Notification.permission !== "granted") return;
    try {
      const reg = await navigator.serviceWorker.ready;
      let existing = await reg.pushManager.getSubscription();
      if (!existing) {
        // Browser doesn't have a subscription either — do the full flow.
        const keyRes = await fetch("/api/push?action=public-key");
        if (!keyRes.ok) {
          console.warn("push_sync_vapid_unavailable");
          return;
        }
        const { publicKey } = await keyRes.json();
        if (!publicKey) {
          console.warn("push_sync_no_vapid_key");
          return;
        }
        existing = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(publicKey),
        });
      }
      const saveRes = await fetch("/api/push?action=subscribe", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-session-token": state.sessionToken,
        },
        body: JSON.stringify({ subscription: existing.toJSON() }),
      });
      if (!saveRes.ok) {
        const body = await saveRes.text().catch(() => "");
        console.warn("push_sync_save_failed", saveRes.status, body.slice(0, 200));
      } else {
        console.log("push_sync_ok");
      }
    } catch (err) {
      console.warn("push_sync_error", err?.message || err);
    }
  }

  async function enablePushNotifications() {
    if (!pushSupported() || !state.sessionToken) return;

    let permission = Notification.permission;
    if (permission === "default") {
      permission = await Notification.requestPermission();
    }
    if (permission !== "granted") {
      // User said no in the OS prompt — sync the card to show the new state.
      updatePushButtonState();
      return;
    }

    try {
      const reg = await navigator.serviceWorker.ready;
      // Pull the VAPID public key from the server (it's set once via env vars
      // — we don't hardcode it on the client so rotation is server-only).
      const keyRes = await fetch("/api/push?action=public-key");
      if (!keyRes.ok) throw new Error("vapid_key_unavailable");
      const { publicKey } = await keyRes.json();

      const existing = await reg.pushManager.getSubscription();
      const sub = existing || (await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(publicKey),
      }));

      // Push subscription up so the server can target this device.
      const saveRes = await fetch("/api/push?action=subscribe", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-session-token": state.sessionToken,
        },
        body: JSON.stringify({ subscription: sub.toJSON() }),
      });
      if (!saveRes.ok) throw new Error("subscription_save_failed");

      // Refresh the Preferences card so it shows "✓ Enabled" immediately.
      updatePushButtonState();
    } catch (err) {
      console.warn("enable_push_failed", err);
    }
  }

  // Decide whether to auto-show the notif opt-in pre-prompt.
  // Conditions: push is supported, browser hasn't been asked yet
  // (permission === "default"), AND we haven't already shown this user
  // the prompt (tracked in localStorage so reload doesn't re-prompt).
  // Bumped to v2 when the prompt copy was generalized from "Day 2/3 reminders"
  // to "notifications from The Field."
  const NOTIF_PROMPT_KEY = "tfif_notif_prompt_shown_v2";

  // The "already prompted" flag is scoped per-account email so team members
  // on a shared browser (very common during testing — Geo logs in as
  // multiple shimritnativ.com accounts on the same browser) each see the
  // prompt once. For anonymous demo state, falls back to the global key.
  function notifPromptKeyForAccount() {
    const email = (state.userEmail || "").toLowerCase().trim();
    return email ? `${NOTIF_PROMPT_KEY}__${email}` : NOTIF_PROMPT_KEY;
  }

  function maybeShowNotifPrompt() {
    if (!pushSupported()) return;
    if (!state.sessionToken) return; // wait until logged in

    // ?show_notif_prompt=1 forces the prompt regardless of any check.
    // ?reset_notif_prompt=1 clears the per-account dismiss flag so the
    //   prompt can be re-tested cleanly. Both combine with the normal logic
    //   below — first reset, then re-evaluate whether to show.
    let forced = false;
    try {
      const url = new URL(window.location.href);
      forced = url.searchParams.get("show_notif_prompt") === "1";
      if (url.searchParams.get("reset_notif_prompt") === "1") {
        try { localStorage.removeItem(notifPromptKeyForAccount()); } catch {}
      }
    } catch {}

    // Defer the actual decision so state.userEmail has time to populate from
    // /api/state on PWA resume. The check inside the setTimeout uses the
    // *current* state, not a snapshot from when this was first called.
    setTimeout(() => {
      const email = (state.userEmail || "").toLowerCase().trim();
      const isTeam = email.endsWith("@shimritnativ.com");

      if (!forced) {
        // Team accounts bypass the Notification.permission check. They've
        // often already granted permission at the origin level (from prior
        // testing), which would normally block the prompt — but for demoing
        // the UX to Shimrit and the team, we want the prompt to actually
        // show. Click "Yes" is a no-op for already-subscribed accounts;
        // click "Maybe later" sets the per-account flag.
        if (!isTeam && Notification.permission !== "default") return;
        try {
          if (localStorage.getItem(notifPromptKeyForAccount())) return;
        } catch {}
      }
      state.notifPromptOpen = true;
      render();
    }, 1500);
  }

  function onNotifPromptAccept() {
    try { localStorage.setItem(notifPromptKeyForAccount(), String(Date.now())); } catch {}
    state.notifPromptOpen = false;
    render();
    enablePushNotifications();
  }

  function onNotifPromptDismiss() {
    try { localStorage.setItem(notifPromptKeyForAccount(), String(Date.now())); } catch {}
    state.notifPromptOpen = false;
    render();
  }

  // The Preferences toggle reflects PER-ACCOUNT subscription state, not the
  // browser's permission alone. We confirm with the server whether THIS user
  // currently has a saved subscription — that closes the bug where switching
  // accounts in the same browser made the card lie about "Enabled".
  let pushUserHasSubscription = false;
  let pushStateRefreshing = false;

  async function refreshPushServerState() {
    if (!state.sessionToken || !pushSupported()) {
      pushUserHasSubscription = false;
      return;
    }
    try {
      const r = await fetch("/api/push?action=my-subscription", {
        method: "POST",
        headers: { "x-session-token": state.sessionToken },
      });
      if (!r.ok) { pushUserHasSubscription = false; return; }
      const data = await r.json();
      pushUserHasSubscription = !!data.hasSubscription;
    } catch {
      pushUserHasSubscription = false;
    }
  }

  function updatePushButtonState() {
    const card = document.getElementById("pref-notif-card");
    const section = document.getElementById("acct-section-prefs");
    const desc = document.getElementById("pref-notif-desc");
    const toggle = document.getElementById("pref-notif-toggle");
    if (!card || !section || !toggle) return;

    if (!pushSupported()) {
      section.style.display = "none";
      return;
    }
    section.style.display = "";

    toggle.classList.remove("pref-toggle--on", "pref-toggle--disabled", "pref-toggle--loading");
    if (pushStateRefreshing) toggle.classList.add("pref-toggle--loading");

    if (Notification.permission === "denied") {
      if (desc) desc.textContent = "Notifications are blocked. Unblock thefieldai.app in your browser settings, then come back to turn this on.";
      toggle.classList.add("pref-toggle--disabled");
      toggle.setAttribute("aria-checked", "false");
      return;
    }

    // Treat "ON" as: permission granted AND this user has a server-side
    // subscription record. Anything else is OFF.
    const isOn = Notification.permission === "granted" && pushUserHasSubscription;
    if (isOn) {
      if (desc) desc.textContent = "You're set to receive Reset milestones, new features, and the occasional update from The Field. Toggle off any time.";
      toggle.classList.add("pref-toggle--on");
      toggle.setAttribute("aria-checked", "true");
    } else {
      if (desc) desc.textContent = "Reset milestones, new features, and the occasional update from The Field. Toggle on whenever you want them.";
      toggle.setAttribute("aria-checked", "false");
    }
  }

  // Click handler for the toggle. Subscribes if OFF, unsubscribes if ON.
  // Blocks the click if the permission is denied at the browser level (only
  // the user can unblock that, from browser settings).
  async function onPushTogglePress() {
    if (!pushSupported()) return;
    if (Notification.permission === "denied") return;
    if (pushStateRefreshing) return;

    const currentlyOn = Notification.permission === "granted" && pushUserHasSubscription;
    pushStateRefreshing = true;
    updatePushButtonState();

    try {
      if (currentlyOn) {
        // Toggle OFF: remove this user's subscription from the server.
        // We don't revoke the browser permission (can't programmatically),
        // we just stop sending pushes to this account.
        await fetch("/api/push?action=unsubscribe", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
          body: JSON.stringify({}),
        });
        pushUserHasSubscription = false;
      } else {
        // Toggle ON: request permission (no-op if already granted) and
        // save the subscription under THIS account's user_id.
        await enablePushNotifications();
        await refreshPushServerState();
      }
    } finally {
      pushStateRefreshing = false;
      updatePushButtonState();
    }
  }

  async function onProcessPick(processKey) {
    if (state.creatingChat) return;
    const proc = DEMO_PROCESSES.find(p => p.key === processKey);
    if (!proc) return;
    state.creatingChat = true;
    // Close the process menu and the mobile drawer.
    state.processMenuOpen = false;
    state.mobileDrawerOpen = false;
    // Optimistic switch to the Unlimited chat view with a loading state.
    const prevView = state.view;
    const prevActiveId = state.activeUnlimitedId;
    state.view = "unlimited-chat";
    state.activeUnlimitedId = null;
    state.unlimitedMessages = [];
    state.loading = true;
    render();
    try {
      const ok = await ensureDemoSession();
      if (!ok) throw new Error("could_not_bootstrap_session");
      const session = await createUnlimitedWithRetry(processKey);
      state.unlimitedSessions.unshift(session);
      state.activeUnlimitedId = session.id;
      // Auto-send a first message so The Field opens the process.
      const activationMessage = proc.prompt || ("I am entering the " + proc.name + " process. Begin.");
      state.unlimitedMessages = [{ role: "user", content: activationMessage }];
      state.loading = true;
      render();
      const data = await apiUnlimitedChat(session.id, activationMessage);
      state.unlimitedMessages.push({ role: "assistant", content: data.reply });
      state.loading = false;
      const idx = state.unlimitedSessions.findIndex(s => s.id === session.id);
      if (idx >= 0) {
        const updated = Object.assign({}, state.unlimitedSessions[idx], { lastMessageAt: new Date().toISOString() });
        if (data.title) updated.title = data.title;
        state.unlimitedSessions[idx] = updated;
      }
      render();
      maybeAutoplayLastUnlimitedAssistant();
    } catch (e) {
      console.error("start_process_failed", e);
      state.loading = false;
      state.view = prevView;
      state.activeUnlimitedId = prevActiveId;
      render();
      alert("Could not start the process. Try again.");
    } finally {
      state.creatingChat = false;
    }
  }

  function onMagnifierClick() {
    state.searchOpen = !state.searchOpen;
    if (!state.searchOpen) state.searchQuery = "";
    render();
  }

  // ===== Reset section collapse/expand (Unlimited members only) =====
  function onResetSectionToggle() {
    state.resetSectionExpanded = !state.resetSectionExpanded;
    render();
  }

  // ===== Chat 3-dot menu open/close =====
  // Clicking the dots toggles the dropdown. Clicking anywhere else closes it.
  // triggerEl is the button that was clicked; used to position the floating
  // dropdown next to it using getBoundingClientRect().
  function onChatMenuToggle(chatId, origin, evt, triggerEl) {
    if (evt) { evt.stopPropagation(); evt.preventDefault(); }
    if (state.openChatMenuId === chatId && state.openChatMenuOrigin === origin) {
      state.openChatMenuId = null;
      state.openChatMenuOrigin = null;
    } else {
      state.openChatMenuId = chatId;
      state.openChatMenuOrigin = origin;
      // Calculate where to anchor the floating dropdown.
      const btn = triggerEl || (evt && evt.currentTarget);
      if (btn && btn.getBoundingClientRect) {
        const rect = btn.getBoundingClientRect();
        const menuWidth = 180;
        const menuHeight = 144; // approx — 3 items at ~48px each
        // Default: drop below + align right edge of menu with right edge of trigger
        let top = rect.bottom + 4;
        let left = rect.right - menuWidth;
        // Flip up if too close to viewport bottom
        if (top + menuHeight > window.innerHeight - 10) {
          top = rect.top - menuHeight - 4;
        }
        // Clamp left so menu never bleeds off-screen
        if (left < 10) left = 10;
        if (left + menuWidth > window.innerWidth - 10) left = window.innerWidth - menuWidth - 10;
        state.menuPosition = { top: top, left: left };
      }
    }
    render();
  }
  function closeAllChatMenus() {
    if (state.openChatMenuId || state.openChatMenuOrigin) {
      state.openChatMenuId = null;
      state.openChatMenuOrigin = null;
      render();
    }
  }

  // ===== Rename (modal) =====
  // Inline edit kept losing the rename war with browser focus quirks and
  // touch event noise, so we use a small, calm modal instead. Same warm
  // cream and gold styling as the rest of the Field — feels less like a
  // system dialog and more like a quiet pause.
  function onChatRenameStart(chatId) {
    const session = state.unlimitedSessions.find(s => s.id === chatId);
    if (!session) return;
    state.openChatMenuId = null;
    state.openChatMenuOrigin = null;
    state.renamingChatId = chatId;
    state.renamingChatDraft = session.title || "";
    render();
    // Synchronous focus + select on the modal input. No setTimeout needed
    // because render() is sync and the input is unambiguously the only
    // interactive surface on screen.
    const input = document.getElementById("rename-modal-input");
    if (input) { input.focus(); input.select(); }
  }
  async function onChatRenameSubmit(chatId, newTitle) {
    const trimmed = (newTitle || "").trim();
    const original = state.unlimitedSessions.find(s => s.id === chatId);
    if (trimmed.length === 0 || !original || trimmed === (original.title || "")) {
      onChatRenameCancel();
      return;
    }
    const idx = state.unlimitedSessions.findIndex(s => s.id === chatId);
    if (idx >= 0) {
      state.unlimitedSessions[idx] = Object.assign({}, state.unlimitedSessions[idx], { title: trimmed });
    }
    state.renamingChatId = null;
    state.renamingChatDraft = "";
    render();
    try {
      const updated = await apiRenameUnlimited(chatId, trimmed);
      if (idx >= 0) state.unlimitedSessions[idx] = Object.assign({}, state.unlimitedSessions[idx], updated);
      render();
    } catch (e) {
      console.error("rename_failed", e);
      if (idx >= 0 && original) {
        state.unlimitedSessions[idx] = Object.assign({}, state.unlimitedSessions[idx], { title: original.title });
        render();
      }
    }
  }
  function onChatRenameCancel() {
    state.renamingChatId = null;
    state.renamingChatDraft = "";
    render();
  }

  // ===== Pin / Unpin =====
  async function onChatPinToggle(chatId, pin) {
    state.openChatMenuId = null;
    state.openChatMenuOrigin = null;
    render();
    try {
      const updated = await apiPinUnlimited(chatId, pin);
      const idx = state.unlimitedSessions.findIndex(s => s.id === chatId);
      if (idx >= 0) state.unlimitedSessions[idx] = Object.assign({}, state.unlimitedSessions[idx], updated);
      // Re-sort: pinned (newest first) then unpinned (most recent first)
      state.unlimitedSessions.sort(function (a, b) {
        if (a.pinnedAt && !b.pinnedAt) return -1;
        if (!a.pinnedAt && b.pinnedAt) return 1;
        if (a.pinnedAt && b.pinnedAt) return new Date(b.pinnedAt) - new Date(a.pinnedAt);
        const aT = new Date(a.lastMessageAt || a.startedAt).getTime();
        const bT = new Date(b.lastMessageAt || b.startedAt).getTime();
        return bT - aT;
      });
      state.pinLimitError = "";
      render();
    } catch (e) {
      if (e && e.code === "pin_limit_reached") {
        state.pinLimitError = "You can pin up to " + (e.limit || 5) + " chats. Unpin one first.";
        render();
        setTimeout(function () {
          if (state.pinLimitError) { state.pinLimitError = ""; render(); }
        }, 4000);
      } else {
        console.error("pin_failed", e);
      }
    }
  }

  // ===== Delete: open confirmation, then commit on confirm =====
  function onChatDeleteRequest(chatId) {
    state.deleteConfirmChatId = chatId;
    state.openChatMenuId = null;
    state.openChatMenuOrigin = null;
    render();
  }
  function onChatDeleteCancel() {
    state.deleteConfirmChatId = null;
    render();
  }
  async function onChatDeleteConfirm() {
    const chatId = state.deleteConfirmChatId;
    if (!chatId) return;
    state.deleteConfirmChatId = null;
    render();
    try {
      await apiDeleteUnlimited(chatId);
      // Remove from local list. If the deleted chat was active, fall back to
      // the new most-recent chat (if any) or back to the unlimited landing.
      const wasActive = state.activeUnlimitedId === chatId;
      state.unlimitedSessions = state.unlimitedSessions.filter(s => s.id !== chatId);
      if (wasActive) {
        if (state.unlimitedSessions.length > 0) {
          await onUnlimitedChatClick(state.unlimitedSessions[0].id);
        } else {
          state.activeUnlimitedId = null;
          state.unlimitedMessages = [];
          render();
        }
      } else {
        render();
      }
    } catch (e) {
      console.error("delete_failed", e);
      alert("Could not delete that conversation. Try again.");
    }
  }

  async function onUnlimitedChatClick(sessionId) {
    if (!sessionId) return;
    state.mobileDrawerOpen = false;
    if (sessionId === state.activeUnlimitedId && state.view === "unlimited-chat") return;
    // Optimistic switch — header + chat-list highlight + loading visual update
    // immediately so the click feels instant. Messages stream in after fetch.
    state.activeUnlimitedId = sessionId;
    state.unlimitedMessages = [];
    state.view = "unlimited-chat";
    state.loading = true;
    render();
    try {
      const data = await apiLoadUnlimited(sessionId);
      state.unlimitedMessages = data.messages || [];
      state.loading = false;
      const idx = state.unlimitedSessions.findIndex(s => s.id === sessionId);
      if (idx >= 0) state.unlimitedSessions[idx] = Object.assign({}, state.unlimitedSessions[idx], data.session);
      render();
    } catch (e) {
      console.error("load_unl_failed", e);
      state.loading = false;
      render();
      alert("Could not load that conversation.");
    }
  }

  function renderUnlimitedMessages() {
    const wrap = document.getElementById("messages");
    if (!wrap) return;
    if (state.loading && state.unlimitedMessages.length === 0) {
      wrap.innerHTML = renderSkeletonLoading();
      return;
    }
    let html = state.unlimitedMessages.map((m, i) => {
      if (m.role === "user") return '<div class="msg-row user"><div class="msg">' + renderUserMessage(m.content) + '</div></div>';
      return '<div class="msg-row assistant"><div class="msg">' + renderMarkdown(m.content) + '</div>'
        + '<button class="speak-btn" data-unl-msg-index="' + i + '" type="button" aria-label="Play in Shimrit\'s voice">'
        + '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/><path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>'
        + '</button></div>';
    }).join("");
    if (state.loading) html += '<div class="msg-row assistant"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
    wrap.innerHTML = html;
    const wrapper = document.getElementById("messages-wrap");
    if (wrapper) wrapper.scrollTop = wrapper.scrollHeight;
    // Scan any newly rendered [[mp3:...]] cards and start audio generation.
    // Frequency Calibration, Desired Outcome Snapshot, Root Pattern Release
    // and any future Unlimited process that emits an MP3 token relies on this
    // call to actually fire /api/speak — without it the card sits in loading
    // state forever.
    processMp3Cards();
  }

  function onUnlimitedKeyDown(e) {
    if (e.key !== "Enter" || e.shiftKey) return;
    // On mobile (touch devices with no fine pointer), Enter inserts a line
    // break — matches user expectations from iMessage and WhatsApp where the
    // Return key newlines and the send arrow sends. On desktop, Enter still
    // sends (the explicit pattern people learn from chat apps).
    const isMobile = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
    if (isMobile) return; // let the browser insert a newline naturally
    e.preventDefault();
    onUnlimitedSendClick();
  }

  async function onUnlimitedSendClick() {
    const inputEl = document.getElementById("input");
    if (!inputEl) return;
    const text = inputEl.value.trim();
    if (!text || state.loading || !state.activeUnlimitedId) return;
    state.unlimitedMessages.push({ role: "user", content: text });
    inputEl.value = "";
    inputEl.style.height = "auto";
    state.loading = true;
    document.getElementById("send-btn").classList.remove("active");
    clearDraft(currentContextKey());
    renderUnlimitedMessages();
    try {
      const data = await apiUnlimitedChat(state.activeUnlimitedId, text);
      state.unlimitedMessages.push({ role: "assistant", content: data.reply });
      state.loading = false;
      const idx = state.unlimitedSessions.findIndex(s => s.id === state.activeUnlimitedId);
      if (idx >= 0) {
        const updated = Object.assign({}, state.unlimitedSessions[idx], { lastMessageAt: new Date().toISOString() });
        if (data.title) updated.title = data.title;
        state.unlimitedSessions.splice(idx, 1);
        state.unlimitedSessions.unshift(updated);
      }
      render();
      maybeAutoplayLastUnlimitedAssistant();
    } catch (err) {
      state.unlimitedMessages.push({ role: "assistant", content: chatErrorMessage(err) });
      state.loading = false;
      renderUnlimitedMessages();
    }
  }

  function onUnlimitedSpeakerClick(e) {
    const btn = e.target.closest(".speak-btn");
    if (!btn) return;
    const idx = parseInt(btn.dataset.unlMsgIndex, 10);
    if (Number.isNaN(idx)) return;
    playUnlimitedMessageAudio(idx, btn);
  }

  async function playUnlimitedMessageAudio(idx, btnEl) {
    if (speakerState.currentIndex === idx && speakerState.currentAudio) { stopCurrentAudio(); return; }
    stopCurrentAudio();
    const msg = state.unlimitedMessages[idx];
    if (!msg || msg.role !== "assistant" || !msg.content) return;
    speakerState.currentBtnEl = btnEl;
    speakerState.currentIndex = idx;
    setSpeakerBtnState(btnEl, "loading");
    try {
      const res = await fetch(API_BASE + "/speak", { method: "POST", headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken }, body: JSON.stringify({ text: msg.content }) });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || "tts_failed"); }
      const blob = await res.blob();
      const audio = new Audio(URL.createObjectURL(blob));
      speakerState.currentAudio = audio;
      audio.onended = () => { if (speakerState.currentAudio === audio) stopCurrentAudio(); };
      audio.onerror = () => { if (speakerState.currentAudio === audio) stopCurrentAudio(); };
      setSpeakerBtnState(btnEl, "playing");
      await audio.play();
    } catch (err) {
      console.error("speak_failed", err);
      setSpeakerBtnState(btnEl, "idle");
      speakerState.currentAudio = null; speakerState.currentBtnEl = null; speakerState.currentIndex = -1;
    }
  }

  function maybeAutoplayLastUnlimitedAssistant() {
    if (!state.autoplay) return;
    const last = state.unlimitedMessages.length - 1; if (last < 0) return;
    const m = state.unlimitedMessages[last]; if (!m || m.role !== "assistant") return;
    setTimeout(() => { const btn = document.querySelector('.speak-btn[data-unl-msg-index="' + last + '"]'); if (btn) playUnlimitedMessageAudio(last, btn); }, 50);
  }

  async function loadFullState() {
    try {
      const data = await apiState(state.sessionToken);
      if (data.expired) { state.view = "login"; render(); return; }
      state.currentDay = data.currentDay || 1;
      state.lastCompletedDay = data.lastCompletedDay || 0;
      state.timeRemainingMs = data.timeRemainingMs;
      state.dayUnlocks = data.dayUnlocks || state.dayUnlocks;
      state.firstLoginAt = data.firstLoginAt || state.firstLoginAt;
      state.previewEndsAt = data.previewEndsAt || state.previewEndsAt;
      state.displayName = data.displayName || state.displayName;
      state.userEmail = data.email || state.userEmail;
      // CRITICAL: rehydrate tier from the server on every page open.
      // Without this, state.tier resets to its default ("preview") on every
      // page load and never reflects entitlement changes (e.g. a customer
      // who buys Unlimited after their first login would keep seeing the
      // expired Reset state until they manually logged out and back in).
      // Trust whatever the server says: if data.tier is missing, fall back
      // to the existing client value rather than silently downgrading.
      if (data.tier === "full" || data.tier === "preview") {
        state.tier = data.tier;
      }
      // Same rehydration discipline for subscription plan so the Your
      // Account modal shows the right copy after a monthly to yearly upgrade.
      if (data.subscriptionPlan === "monthly" || data.subscriptionPlan === "yearly") {
        state.subscriptionPlan = data.subscriptionPlan;
      }
      // Reset section default: collapsed for Unlimited members (the Reset is
      // behind them, the Field library is the daily work), expanded for
      // preview members (the Reset IS their current practice). User toggling
      // overrides on next click.
      state.resetSectionExpanded = state.tier !== "full";
      // Filter to messages for the CURRENT day only. Each day is its own
      // thread in the demo. Falls back to all messages if no day metadata
      // is present (older sessions).
      const allMessages = data.messages || [];
      const filtered = allMessages.filter(m => {
        if (m.dayAtSend == null) return true;
        return Number(m.dayAtSend) === Number(state.currentDay);
      });
      state.messages = filtered.length > 0 ? filtered : allMessages;
      // Landing view by tier:
      //   full:    Welcome view (quote of the day + action cards). They
      //            actively pick what to do — no auto-resume of a stale chat.
      //   preview: Direct to Day 1/2/3 of the Reset (their current practice).
      state.view = state.tier === "full" ? "welcome" : "chat";
      render();
    } catch (err) {
      clearToken();
      state.sessionToken = null;
      state.view = "login";
      state.loginStep = "email";
      render();
    }
  }

  async function loadUnlimitedSessions() {
    try { state.unlimitedSessions = await apiListUnlimited(); }
    catch (e) { console.warn("could_not_load_unlimited_sessions", e?.message); state.unlimitedSessions = []; }
  }

  // The normal app startup. In embed mode this runs only AFTER the identity
  // gate has verified the member.
  function initApp() {
    // Register the push notification service worker. Fire-and-forget — this
    // is the only thing the SW does in this app, so failing silently is fine.
    // The "Get reminders" button in the sidebar handles permission + subscribe.
    if (pushSupported()) {
      registerServiceWorker();
    }
    // Embed mode never resumes a saved token — identity is always re-established
    // from the verified Kajabi member, so one browser cannot carry another
    // member's session.
    const existing = EMBED_MODE ? null : loadToken();
    if (existing) {
      state.sessionToken = existing;
      loadFullState().then(() => loadUnlimitedSessions().then(() => {
        render();
        // After the dashboard is loaded, decide whether to show the
        // notification opt-in pre-prompt. No-op for members who've already
        // granted, blocked, or dismissed it.
        maybeShowNotifPrompt();
        // Self-heal: if permission is already granted but the server may not
        // have a record of this device, silently re-save the subscription.
        syncPushSubscription();
        // Pull the inbox so the bell badge shows the unread count from
        // the very first paint. Errors are swallowed inside.
        fetchNotifications();
        // If the URL carries a tap-to-go param (?process= / ?day= /
        // ?continue=) — usually from a notification CTA opened externally
        // — dispatch the action once everything's loaded.
        setTimeout(() => maybeHandleBootCtaParam(), 200);
      }));
    } else {
      state.view = "login";
      state.loginStep = "email";
      render();
    }
    startUnlockTicker();
  }

  // ===== Locked-day countdown ticker =====
  // Refreshes the "Unlocks in 14h 32m" text every 30s. When a day flips from
  // locked to unlocked we trigger a full render() so the lock styling, click
  // wiring, and chip status all update at once. Only one timer is ever live.
  let unlockTickerId = null;
  function startUnlockTicker() {
    if (unlockTickerId) clearInterval(unlockTickerId);
    unlockTickerId = setInterval(refreshUnlockUI, 30 * 1000);
  }
  function refreshUnlockUI() {
    const unlocks = state.dayUnlocks || {};
    let flippedToUnlocked = false;
    // Update each visible countdown line in place. If any locked day's
    // unlock time has now passed, mark for full re-render at the end.
    document.querySelectorAll("[data-day-countdown]").forEach(el => {
      const dayNum = Number(el.getAttribute("data-day-countdown"));
      const at = unlocks[dayNum];
      if (!at) {
        // Already unlocked or no clock yet — schedule a full re-render so
        // the locked state disappears entirely.
        flippedToUnlocked = true;
        return;
      }
      const remaining = new Date(at).getTime() - Date.now();
      if (remaining <= 0) {
        flippedToUnlocked = true;
        return;
      }
      el.textContent = formatUnlockCountdown(at);
    });
    if (flippedToUnlocked) render();
    // Also refresh the "X remaining" text inside the Your Account modal if open.
    const remEl = document.getElementById("acct-remaining");
    if (remEl && state.previewEndsAt) {
      const ms = new Date(state.previewEndsAt).getTime() - Date.now();
      remEl.textContent = formatTimeRemaining(Math.max(0, ms));
    }
    // Refresh every window-countdown chip (sidebar + main header). Same
    // source (state.previewEndsAt) so all chips stay in sync.
    if (state.previewEndsAt) {
      const wms = Math.max(0, new Date(state.previewEndsAt).getTime() - Date.now());
      const text = formatTimeRemaining(wms);
      document.querySelectorAll("[data-window-countdown]").forEach(el => {
        el.textContent = text;
      });
    }
  }

  // ===== Kajabi embed identity gate =====
  // In embed mode the app will not start until it receives the member's
  // identity in a postMessage from an allowed Kajabi origin. A visitor who opens
  // the app URL outside Kajabi never receives that message and sees a locked
  // screen instead — this is what makes a shared URL useless.
  function renderEmbedGate(message) {
    const app = document.getElementById("app");
    if (!app) return;
    app.innerHTML = `
      <div class="embed-gate">
        <div class="embed-gate-card">
          <div class="embed-gate-mark"><img src="https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/file-uploads/themes/2161454568/settings_images/d2126ef-2bee-6f2c-8c2-d1357db52300_myp_logo.png" alt="Master Your Path" /></div>
          <div class="embed-gate-title">${escapeHtml(message)}</div>
        </div>
      </div>`;
  }

  function startEmbedGate() {
    renderEmbedGate("Connecting to your member area…");
    let settled = false;

    window.addEventListener("message", function (event) {
      if (settled) return;
      // Only a message from your Kajabi site is trusted. The browser sets
      // event.origin; the sender cannot forge it.
      if (KAJABI_ALLOWED_ORIGINS.indexOf(event.origin) === -1) return;
      const d = event.data || {};
      if (!d || d.type !== "tfif-identity") return;
      const kajabiId = String(d.kajabiId == null ? "" : d.kajabiId).trim();
      if (!/^[0-9A-Za-z_-]{1,64}$/.test(kajabiId)) return;
      settled = true;
      KAJABI_IDENTITY = {
        kajabiId: kajabiId,
        tier: d.tier === "full" ? "full" : "preview",
        name: typeof d.name === "string" ? d.name.slice(0, 80) : ""
      };
      state.tier = KAJABI_IDENTITY.tier;
      initApp();
    });

    // Tell the Kajabi parent page the app is loaded and ready for the identity.
    try { window.parent.postMessage({ type: "tfif-ready" }, "*"); } catch (e) {}

    // If no valid identity arrives, lock the screen. Fails closed by design.
    setTimeout(function () {
      if (settled) return;
      settled = true;
      renderEmbedGate("Please open The Field from your Master Your Path member area.");
    }, 8000);
  }

  function init() {
    // Initial theme = stored preference (if any) → system preference → dark.
    // persist:false so we don't accidentally lock in the system value as a
    // "user preference" the user never actually made.
    applyTheme(loadTheme(), { persist: false });
    subscribeSystemTheme();
    applyFontScale(state.fontScale);
    if (EMBED_MODE) { startEmbedGate(); return; }
    initApp();
  }

  init();
})();

// ===========================================================================
// Support widget — runs independently of the main app's render lifecycle.
// Mounts a floating bottom-right help button + chat panel that triages
// common questions via /api/support-chat (Haiku) and offers WhatsApp

// outside the main app() closure so it survives all render() rebuilds.
// ===========================================================================
(function supportWidget() {
