<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Freedom Intelligence Field</title>
<link rel="icon" type="image/png" href="https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/file-uploads/themes/2161454568/settings_images/d2126ef-2bee-6f2c-8c2-d1357db52300_myp_logo.png" />
<link rel="apple-touch-icon" href="https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/file-uploads/themes/2161454568/settings_images/d2126ef-2bee-6f2c-8c2-d1357db52300_myp_logo.png" />

<style>
  html[data-theme="dark"] {
    --bg: #080808;
    --panel: #0f0f0f;
    --panel-2: #131313;
    --sidebar-bg: #0a0a0a;
    --text: #f0ead6;
    --text-dim: rgba(240, 234, 214, 0.55);
    --text-mute: rgba(240, 234, 214, 0.28);
    --gold: #C9A84C;
    --gold-soft: rgba(201, 168, 76, 0.09);
    --gold-line: rgba(201, 168, 76, 0.16);
    --gold-strong: rgba(201, 168, 76, 0.25);
    --user-msg-bg: rgba(201, 168, 76, 0.10);
    --user-msg-border: rgba(201, 168, 76, 0.22);
    --assistant-msg-bg: rgba(240, 234, 214, 0.03);
    --assistant-msg-border: rgba(240, 234, 214, 0.07);
    --border: rgba(201, 168, 76, 0.07);
    --shadow: 0 0 80px rgba(201, 168, 76, 0.03), 0 24px 48px rgba(0,0,0,0.6);
    --demo-banner: #6B2C2C;
    --demo-banner-text: #FFD1D1;
    color-scheme: dark;
  }
  html[data-theme="light"] {
    --bg: #F7F1E1;
    --panel: #FFFFFF;
    --panel-2: #FAF6E8;
    --sidebar-bg: #EFE7CE;
    --text: #1A1612;
    --text-dim: rgba(26, 22, 18, 0.65);
    --text-mute: rgba(26, 22, 18, 0.4);
    --gold: #9A6E10;
    --gold-soft: rgba(154, 110, 16, 0.07);
    --gold-line: rgba(154, 110, 16, 0.2);
    --gold-strong: rgba(154, 110, 16, 0.35);
    --user-msg-bg: rgba(154, 110, 16, 0.10);
    --user-msg-border: rgba(154, 110, 16, 0.25);
    --assistant-msg-bg: #FFFFFF;
    --assistant-msg-border: rgba(26, 22, 18, 0.08);
    --border: rgba(26, 22, 18, 0.08);
    --shadow: 0 6px 24px rgba(26, 22, 18, 0.06), 0 1px 4px rgba(26, 22, 18, 0.04);
    --demo-banner: #C84545;
    --demo-banner-text: #FFFFFF;
    color-scheme: light;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    min-height: 100%;
  }
  button { font-family: inherit; cursor: pointer; }

  /* Demo banner */
  .demo-banner {
    background: var(--demo-banner);
    color: var(--demo-banner-text);
    padding: 8px 16px;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  html, body { height: 100%; overflow: hidden; }
  #app {
    display: flex;
    flex-direction: column;
    /* 100vh on iOS Safari includes the URL bar area, so the layout becomes
       taller than the visible region and the top bar scrolls off-screen. The
       dvh (dynamic viewport) unit adjusts as the browser chrome shows/hides.
       Older browsers fall back to vh. */
    height: 100vh;
    height: 100dvh;
    width: 100%;
    overflow: hidden;
  }
  .main-row {
    display: flex;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 22px 18px;
    overflow-y: auto;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 22px;
  }
  .brand-mark {
    width: 48px; height: 48px;
    flex-shrink: 0;
    display: block;
  }
  .brand-mark img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
  }
  .brand-text-1 {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--gold);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    line-height: 1.2;
  }
  .brand-text-2 {
    font-size: 13px;
    color: var(--text);
    font-style: italic;
    margin-top: 3px;
  }
  .sidebar-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-mute);
    text-transform: uppercase;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .day-list {
    display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px;
  }
  .day-item {
    display: flex; align-items: center; gap: 11px;
    padding: 11px 12px; border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.15s ease, border-color 0.15s ease;
    background: var(--panel);
  }
  .day-item:hover {
    border-color: var(--gold-line);
  }
  .day-item.active {
    background: var(--gold-soft);
    border-color: var(--gold-line);
  }
  .day-num {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--gold-line);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    color: var(--gold);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    flex-shrink: 0;
  }
  .day-item.active .day-num {
    background: var(--gold); color: var(--bg); border-color: var(--gold);
  }
  .day-info { flex: 1; min-width: 0; }
  .day-title {
    font-size: 12px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .day-theme {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    margin-top: 2px;
  }
  /* Locked day: progressive-unlock state for Reset Day 2 / Day 3. Reduced
     opacity + crisp lock icon + small countdown line below the theme. */
  .day-item.locked {
    cursor: default;
    opacity: 0.6;
  }
  .day-item.locked:hover { border-color: transparent; }
  .day-item.locked .day-num {
    background: transparent;
    color: var(--text-dim);
    border-style: dashed;
  }
  .day-item .day-lock {
    width: 14px; height: 14px;
    color: var(--text-dim);
    flex-shrink: 0;
    margin-left: auto;
  }
  .day-countdown {
    font-size: 10px;
    color: var(--gold);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-top: 3px;
  }

  /* ===== Your Account modal ===== */
  .acct-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.55);
    /* Anchor modal to top so when the content is taller than viewport the
       close button (top-right of modal) stays in view and the overflow
       scrolls DOWN intuitively rather than getting clipped at the top. */
    display: flex; align-items: flex-start; justify-content: center;
    padding: 32px 24px;
    z-index: 1000;
    overflow-y: auto;
    animation: acctFadeIn 0.24s ease-out;
  }
  .acct-modal {
    background: #0a0a0a;
    color: #f0ead6;
    border-radius: 16px;
    border: 1px solid rgba(201, 168, 76, 0.2);
    max-width: 520px;
    width: 100%;
    padding: 26px 28px 22px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    position: relative;
    box-shadow: 0 18px 48px rgba(0,0,0,0.5);
    animation: acctSlideUp 0.32s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes acctFadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes acctSlideUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .acct-overlay, .acct-modal { animation: none; }
  }
  /* Signed-in line + sign-out footer */
  .acct-signed-in {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: rgba(240, 234, 214, 0.6);
    margin-top: 14px;
  }
  .acct-signed-in-email { color: rgba(240, 234, 214, 0.85); font-weight: 600; word-break: break-all; }
  .acct-signout-row { display: flex; justify-content: center; margin-top: 8px; }
  .acct-signout-btn {
    background: transparent;
    color: rgba(240, 234, 214, 0.7);
    border: 1px solid rgba(201, 168, 76, 0.25);
    border-radius: 10px;
    padding: 11px 22px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .acct-signout-btn:hover { color: #f0ead6; border-color: #C9A84C; }
  .acct-close {
    position: absolute; top: 14px; right: 14px;
    width: 30px; height: 30px;
    background: rgba(10, 10, 10, 0.85);
    border: 1px solid rgba(201, 168, 76, 0.35);
    color: #f0ead6;
    border-radius: 50%;
    font-size: 13px; line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .acct-close:hover { border-color: #C9A84C; }
  .acct-eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 0.15em;
    color: #C9A84C; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .acct-title {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-size: 24px;
    color: #f0ead6;
    margin-bottom: 20px;
  }
  .acct-section-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
    color: rgba(240, 234, 214, 0.55);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .acct-section { margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid rgba(201, 168, 76, 0.12); }
  .acct-section:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
  .acct-name-row { display: flex; gap: 10px; align-items: stretch; }
  .acct-name-input {
    flex: 1;
    background: #050505;
    border: 1px solid rgba(201, 168, 76, 0.25);
    border-radius: 10px;
    color: #f0ead6;
    padding: 12px 14px;
    font-size: 15px;
    font-family: inherit;
  }
  .acct-name-input:focus { outline: none; border-color: #C9A84C; }
  .acct-save-btn {
    background: #C9A84C; color: #0a0a0a;
    border: none; border-radius: 10px;
    padding: 0 22px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.12em;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }
  .acct-save-btn:hover { opacity: 0.9; }
  .acct-save-btn[disabled] { opacity: 0.45; cursor: default; }
  .acct-name-help {
    font-size: 12px; color: rgba(240, 234, 214, 0.55);
    margin-top: 10px;
    font-style: italic;
  }
  .acct-card {
    background: rgba(201, 168, 76, 0.04);
    border: 1px solid rgba(201, 168, 76, 0.25);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 10px;
  }
  .acct-card:last-child { margin-bottom: 0; }
  .acct-card-title {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-size: 18px;
    color: #f0ead6;
    margin-bottom: 6px;
  }
  .acct-card-meta {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px;
    color: rgba(240, 234, 214, 0.7);
  }
  .acct-status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
  .acct-status-dot.expired { background: rgba(240, 234, 214, 0.35); }
  .acct-remaining { color: #C9A84C; font-weight: 700; }
  .acct-card-actions { display: flex; gap: 10px; margin-top: 16px; }
  .acct-btn {
    flex: 1;
    background: transparent;
    color: #f0ead6;
    border: 1px solid rgba(201, 168, 76, 0.4);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    text-align: center;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .acct-btn:hover { border-color: #C9A84C; background: rgba(201, 168, 76, 0.05); }
  .acct-btn.subtle { flex: 0 0 auto; padding: 12px 20px; }
  .acct-card-desc {
    font-size: 14px;
    color: rgba(240, 234, 214, 0.7);
    line-height: 1.55;
    margin: 10px 0 16px;
  }
  .acct-link {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 14px;
    background: rgba(201, 168, 76, 0.04);
    border: 1px solid rgba(201, 168, 76, 0.18);
    border-radius: 10px;
    color: #f0ead6;
    text-decoration: none;
    font-size: 14px; font-weight: 600;
    margin-bottom: 6px;
    transition: border-color 0.15s ease;
  }
  .acct-link:last-child { margin-bottom: 0; }
  .acct-link:hover { border-color: #C9A84C; }
  .acct-link-arrow { color: #C9A84C; }
  /* Light theme overrides — match the existing sidebar light variant. */
  :root[data-theme="light"] .acct-overlay { background: rgba(26, 22, 18, 0.5); }
  :root[data-theme="light"] .acct-modal { background: #1A1612; color: #f0ead6; border-color: rgba(201, 168, 76, 0.3); }

  .demo-help {
    margin-top: 8px;
    padding: 12px;
    background: var(--panel);
    border: 1px dashed var(--gold-line);
    border-radius: 8px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.5;
  }

  .reset-btn {
    margin-top: 14px;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--gold-line);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s ease;
  }
  .reset-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* Persistent CTA buttons pinned above the sidebar footer. */
  .sidebar-cta { margin-top: auto; display: flex; flex-direction: column; gap: 6px; padding-top: 4px; }
  .sidebar-cta-btn { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 9px 12px; background: var(--gold-soft); border: 1px solid var(--gold-line); border-radius: 8px; color: var(--text); text-decoration: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; transition: border-color 0.15s ease, background 0.15s ease; }
  .sidebar-cta-btn:hover { border-color: var(--gold); }
  .sidebar-cta-arrow { color: var(--gold); font-size: 11px; line-height: 1; flex-shrink: 0; }
  /* Sidebar auxiliary actions — log out / reset */
  /* Account + Log out — centered pill buttons. Gold-filled "Your account"
     reads as a primary action; dark-filled "Log out" reads as secondary +
     destructive so accidental logouts are less likely. */
  .sidebar-aux {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 14px 4px 0;
    flex-wrap: wrap;
  }
  .sidebar-aux button {
    padding: 8px 18px;
    border-radius: 999px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
    border: 1px solid transparent;
    white-space: nowrap;
    transition: opacity 0.15s ease, border-color 0.15s ease, background 0.15s ease;
  }
  .sidebar-aux button#account-btn {
    background: var(--gold);
    color: var(--bg);
    font-weight: 700;
  }
  .sidebar-aux button#account-btn:hover { opacity: 0.9; }
  .sidebar-aux button#logout-btn,
  .sidebar-aux button#reset-conv-btn {
    background: rgba(0, 0, 0, 0.5);
    color: var(--text);
    border: 1px solid var(--gold-line);
  }
  .sidebar-aux button#logout-btn:hover,
  .sidebar-aux button#reset-conv-btn:hover {
    border-color: var(--gold);
    background: rgba(0, 0, 0, 0.65);
  }
  :root[data-theme="light"] .sidebar-aux button#logout-btn,
  :root[data-theme="light"] .sidebar-aux button#reset-conv-btn {
    background: #1A1612;
    color: #F0EAD6;
    border-color: transparent;
  }
  :root[data-theme="light"] .sidebar-aux button#logout-btn:hover,
  :root[data-theme="light"] .sidebar-aux button#reset-conv-btn:hover {
    background: #2C2521;
    border-color: transparent;
  }

  .sidebar-footer {
    margin-top: 12px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-text {
    font-size: 10px;
    color: var(--text-mute);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.05em;
  }
  .theme-toggle {
    background: transparent;
    border: 1px solid var(--gold-line);
    color: var(--text-dim);
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .theme-toggle:hover { border-color: var(--gold); color: var(--gold); }

  /* Footer cluster: font-size controls + theme toggle. */
  .footer-actions { display: flex; align-items: center; gap: 6px; }
  .font-btn {
    background: transparent;
    border: 1px solid var(--gold-line);
    color: var(--text-dim);
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 0;
    line-height: 1;
  }
  .font-btn:hover { border-color: var(--gold); color: var(--gold); }
  .font-btn:disabled { opacity: 0.35; cursor: not-allowed; border-color: var(--gold-line); color: var(--text-mute); }
  .font-btn.font-larger { font-size: 13px; } /* slightly larger "A+" reads better */

  /* Main */
  .main {
    flex: 1; display: flex; flex-direction: column;
    min-width: 0; min-height: 0;
    background: var(--bg);
  }
  .main-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
  }
  .main-header-title {
    font-size: 14px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 600;
  }
  .main-header-sub {
    font-size: 11px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin-top: 2px;
  }
  .day-chip {
    display: inline-block;
    vertical-align: middle;
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
    font-size: 10px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
  }
  /* Tiny "save your work" CTA shown only on Day 3 — discrete companion to the
     day-chip. Same chip silhouette but slightly subtler to keep the chip
     primary. */
  .save-work-btn {
    margin-left: 8px;
    padding: 6px 12px;
    border-radius: 20px;
    background: transparent;
    border: 1px solid var(--gold-line);
    font-size: 10px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text);
    text-transform: uppercase;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .save-work-btn:hover { border-color: var(--gold); background: var(--gold-soft); }

  .messages-wrap {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    /* iOS momentum scrolling — without this, touch scroll can get "stuck"
       inside the messages container on mobile Safari. */
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    padding: 24px 0;
  }
  .messages-wrap::-webkit-scrollbar { width: 6px; }
  .messages-wrap::-webkit-scrollbar-thumb {
    background: var(--gold-strong); border-radius: 3px;
  }
  .messages {
    max-width: 760px; margin: 0 auto;
    padding: 0 28px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .msg-row { display: flex; animation: fadeIn 0.3s ease; }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }
  .msg {
    max-width: 78%;
    padding: 13px 18px;
    color: var(--text);
    /* Reader scale — adjustable via the A−/A+ buttons in the sidebar footer. */
    font-size: calc(15px * var(--msg-scale, 1));
    line-height: 1.75;
  }
  .msg-row.user .msg {
    padding: 11px 16px;
    background: var(--user-msg-bg);
    border: 1px solid var(--user-msg-border);
    border-radius: 14px 14px 3px 14px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    white-space: pre-wrap;
  }
  .msg-row.assistant .msg {
    background: var(--assistant-msg-bg);
    border: 1px solid var(--assistant-msg-border);
    border-radius: 14px 14px 14px 3px;
    font-family: Georgia, "Times New Roman", serif;
  }
  /* Markdown rendering inside assistant messages */
  .msg p { margin: 0 0 0.7em 0; }
  .msg p:last-child { margin-bottom: 0; }
  .msg-row.assistant .msg strong { font-weight: 700; color: var(--text); }
  .msg-row.assistant .msg em { font-style: italic; }
  .msg-row.assistant .msg code { background: var(--gold-soft); padding: 1px 6px; border-radius: 4px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 0.9em; color: var(--gold); }
  /* List + paragraph styling applies to both user and assistant messages
     so users typing `- one` get real bullets, not silent list markup. */
  .msg ul, .msg ol { margin: 0.4em 0 0.7em 1.4em; padding: 0; }
  .msg li { margin-bottom: 0.35em; line-height: 1.6; }
  .msg li:last-child { margin-bottom: 0; }
  .msg ul li { list-style-type: disc; }
  .msg ol li { list-style-type: decimal; }
  /* In-brand CTA button, rendered from [[button:Label|url]] in AI messages. */
  .msg-cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0 2px;
    padding: 11px 22px;
    background: var(--gold);
    color: var(--bg);
    border-radius: 999px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    transition: opacity 0.15s ease, transform 0.05s ease;
  }
  .msg-cta-btn:hover { opacity: 0.88; }
  .msg-cta-btn:active { transform: scale(0.98); }
  .msg-cta-arrow { font-size: 14px; line-height: 1; }

  /* ===== MP3 audio download card (Day 3 Living Power Declaration) =====
     The AI emits a [[mp3:Title|Text]] token after the participant has read
     the declaration. The card renders in two states: loading (spinner +
     "Generating in Shimrit's voice...") and ready (download icon + duration
     + Download button). Generation auto-fires when the card mounts. */
  .mp3-card {
    display: block;
    margin: 14px 0 4px;
    border-radius: 14px;
    border: 1px solid var(--gold-line);
    background: var(--gold-soft);
    padding: 14px 16px;
    max-width: 440px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .mp3-card-inner {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .mp3-orb {
    width: 44px; height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .mp3-orb.loading {
    background: transparent;
    border: 2px solid var(--gold-line);
    border-top-color: var(--gold);
    animation: mp3spin 0.9s linear infinite;
  }
  .mp3-orb.ready {
    background: var(--gold);
    color: var(--bg);
  }
  .mp3-orb.error {
    background: transparent;
    border: 2px solid var(--text-mute);
  }
  .mp3-orb-arrow { font-size: 18px; font-weight: 700; line-height: 1; }
  @keyframes mp3spin { to { transform: rotate(360deg); } }
  .mp3-info { flex: 1; min-width: 0; }
  .mp3-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
  }
  .mp3-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 3px;
    letter-spacing: 0.02em;
  }
  .mp3-download-btn {
    padding: 8px 14px;
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s ease;
  }
  .mp3-download-btn:hover { opacity: 0.9; }
  .mp3-download-btn:disabled { opacity: 0.5; cursor: default; }

  /* Inline player UI — top row has play button + title + download; bottom row
     has the scrubber, time, and speed pills. */
  .mp3-player { display: flex; flex-direction: column; gap: 10px; }
  .mp3-player-top {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .mp3-play-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    flex-shrink: 0;
    border: none;
    background: var(--gold);
    color: var(--bg);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s ease;
  }
  .mp3-play-btn:hover { opacity: 0.9; }
  .mp3-play-btn svg { width: 16px; height: 16px; display: block; }
  .mp3-player-title {
    flex: 1; min-width: 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .mp3-scrubber-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mp3-scrubber {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: var(--gold-line);
    border-radius: 999px;
    outline: none;
    cursor: pointer;
    margin: 0;
  }
  .mp3-scrubber::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    border: none;
  }
  .mp3-scrubber::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    border: none;
  }
  .mp3-time {
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    white-space: nowrap;
    min-width: 84px;
    text-align: right;
  }
  .mp3-speed-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .mp3-speed-group {
    display: inline-flex;
    gap: 4px;
    background: transparent;
    padding: 0;
    border-radius: 999px;
  }
  .mp3-speed-btn {
    padding: 5px 12px;
    background: transparent;
    border: 1px solid var(--gold-line);
    color: var(--text-dim);
    border-radius: 999px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .mp3-speed-btn:hover { color: var(--text); border-color: var(--gold); }
  .mp3-speed-btn.active {
    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
  }

  .typing {
    display: flex; gap: 5px; align-items: center;
    padding: 12px 16px;
    background: var(--assistant-msg-bg);
    border-radius: 14px 14px 14px 3px;
    width: fit-content;
    border: 1px solid var(--assistant-msg-border);
  }

  /* Skeleton lines shown while a chat's messages are loading. Mimics the
     paragraph shape of incoming content so the wait reads as "filling in"
     rather than "stuck". Width values are inlined per-line below. */
  .chat-loading {
    display: flex;
    flex-direction: column;
    gap: 11px;
    padding: 20px 8px;
    max-width: 760px;
    margin: 0 auto;
    width: 100%;
  }
  .skeleton-line {
    height: 10px;
    background: var(--text);
    opacity: 0.08;
    border-radius: 999px;
    animation: skeleton-pulse 1.4s ease-in-out infinite;
  }
  .skeleton-line.skel-title { height: 14px; opacity: 0.10; margin-bottom: 10px; }
  .skeleton-line.skel-gap { margin-top: 18px; }
  @keyframes skeleton-pulse {
    0%, 100% { opacity: 0.06; }
    50% { opacity: 0.18; }
  }
  @media (max-width: 560px) {
    .chat-loading { padding: 16px 6px; gap: 10px; }
    .skeleton-line { height: 9px; }
    .skeleton-line.skel-title { height: 12px; }
  }
  .typing .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.7;
    animation: bounce 1.2s infinite;
  }
  .typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .typing .dot:nth-child(3) { animation-delay: 0.4s; }

  .composer-wrap {
    border-top: 1px solid var(--border);
    padding: 16px 28px 20px;
  }

  /* ===== Expired Reset state =====
     Shown when a preview-tier user's 96h Power Reset window has elapsed.
     Their conversation history remains visible (so they can re-read and
     export it from the Account modal) but new chat is blocked. */
  .expired-banner {
    margin: 18px auto 4px;
    max-width: 680px;
    padding: 18px 22px;
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
    border-radius: 14px;
    text-align: center;
  }
  .expired-banner-title {
    margin: 0 0 6px;
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-size: 18px;
    color: var(--gold);
    line-height: 1.3;
  }
  .expired-banner-text {
    margin: 0 0 14px;
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.55;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .expired-banner-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 22px;
    background: var(--gold);
    color: var(--bg);
    border-radius: 8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    transition: opacity 0.15s ease;
  }
  .expired-banner-btn:hover { opacity: 0.9; }
  .expired-composer-card {
    border-top: 1px solid var(--border);
    padding: 22px 28px 24px;
    text-align: center;
    background: var(--bg);
  }
  .expired-composer-card-text {
    color: var(--text-dim);
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-size: 14px;
    margin: 0 0 14px;
  }
  .expired-composer-card-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 11px 24px;
    background: var(--gold);
    color: var(--bg);
    border-radius: 8px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    transition: opacity 0.15s ease;
  }
  .expired-composer-card-btn:hover { opacity: 0.9; }
  @media (max-width: 560px) {
    .expired-banner { margin: 12px 14px 4px; padding: 16px 18px; }
    .expired-banner-title { font-size: 16px; }
    .expired-composer-card { padding: 16px 18px 18px; }
  }
  .composer {
    max-width: 760px; margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 8px 6px 14px;
    display: flex; align-items: flex-end; gap: 10px;
    position: relative;
  }
  .composer:focus-within { border-color: var(--gold-line); }
  textarea {
    flex: 1; background: transparent; border: none;
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    font-size: 15px; line-height: 1.6;
    padding: 12px 4px;
    max-height: 200px; overflow-y: auto;
    resize: none;
  }
  textarea:focus { outline: none; }
  textarea::placeholder { color: var(--text-mute); }
  .send-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--gold-soft);
    border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    color: var(--text-mute);
    cursor: default;
    margin-bottom: 4px;
  }
  .send-btn.active {
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    color: var(--bg);
    cursor: pointer;
  }

  /* Voice input */
  .mic-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    border: none;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--bg);
    cursor: pointer;
    margin-bottom: 4px;
    transition: filter 0.15s ease, transform 0.1s ease;
    padding: 0;
  }
  .mic-btn:hover { filter: brightness(1.1); }
  .mic-btn:active { transform: scale(0.95); }
  .mic-btn svg { width: 22px; height: 22px; display: block; }
  .mic-btn.recording {
    background: linear-gradient(135deg, #e57373, #b94a4a);
    color: var(--bg);
    animation: pulse-record 1.4s ease-in-out infinite;
  }
  .mic-btn.transcribing { cursor: wait; }
  .mic-btn.transcribing svg { display: none; }
  .mic-btn.transcribing::after {
    content: "";
    width: 14px; height: 14px;
    border: 2px solid rgba(8, 8, 8, 0.25);
    border-top-color: #080808;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes pulse-record {
    0%, 100% { box-shadow: 0 0 0 0 rgba(228, 87, 87, 0.35); }
    50% { box-shadow: 0 0 0 8px rgba(228, 87, 87, 0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .recording-indicator {
    position: absolute;
    top: -30px;
    right: 14px;
    background: var(--panel);
    border: 1px solid var(--gold-line);
    border-radius: 12px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    white-space: nowrap;
    pointer-events: none;
    z-index: 5;
  }
  .recording-indicator .red-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #e57373;
    margin-right: 5px;
    vertical-align: middle;
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Speaker (Shimrit voice playback) */
  .msg-row.assistant { flex-direction: column; align-items: flex-start; }
  .speak-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: var(--gold);
    cursor: pointer;
    padding: 0;
    margin-top: 6px;
    margin-left: 4px;
    transition: background 0.15s ease, transform 0.1s ease, border-color 0.15s ease;
  }
  .speak-btn:hover { background: rgba(201, 168, 76, 0.18); }
  .speak-btn:active { transform: scale(0.92); }
  .speak-btn svg { width: 14px; height: 14px; display: block; }
  .speak-btn.loading svg { display: none; }
  .speak-btn.loading::after {
    content: "";
    width: 10px; height: 10px;
    border: 1.5px solid var(--gold-line);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .speak-btn.playing {
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    color: var(--bg);
    border-color: transparent;
  }
  .autoplay-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 4px;
    margin-top: 6px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    cursor: pointer;
  }
  .autoplay-toggle input { margin: 0; accent-color: var(--gold); cursor: pointer; }
  .autoplay-toggle:hover { color: var(--text); }

  /* Unlimited section in sidebar */
  .sidebar-divider { height: 1px; background: var(--gold-line); margin: 16px 4px; opacity: 0.5; }
  .unl-action-row { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; }
  .new-chat-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 12px; background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black)); color: var(--bg); border-radius: 8px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; border: none; cursor: pointer; }
  .new-chat-btn svg { width: 14px; height: 14px; }
  .magnifier-btn { width: 36px; height: 36px; flex-shrink: 0; background: var(--gold-soft); border: 1px solid var(--gold-line); color: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; }
  .magnifier-btn svg { width: 14px; height: 14px; }
  .magnifier-btn.active { background: var(--gold-line); }
  .unl-search-wrap { margin-bottom: 8px; display: none; }
  .unl-search-wrap.open { display: block; }
  .unl-search-wrap input { width: 100%; background: var(--panel); border: 1px solid var(--gold-line); color: var(--text); padding: 7px 10px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; border-radius: 6px; outline: none; }
  .unl-search-wrap input::placeholder { color: var(--text-mute); }
  .unl-chat-list { max-height: 280px; overflow-y: auto; }
  .unl-chat-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; border: 1px solid transparent; transition: background 0.15s ease, border-color 0.15s ease; }
  .unl-chat-item:hover { background: var(--gold-soft); }
  .unl-chat-item.active { background: var(--gold-soft); border-color: var(--gold-line); }
  .unl-chat-title { font-size: 11px; color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 500; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .unl-chat-time { font-size: 9px; color: var(--text-mute); margin-top: 2px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .unl-chat-empty { padding: 10px 8px; font-size: 11px; color: var(--text-mute); font-style: italic; font-family: Georgia, serif; }

  /* Guided-process dropdown in the Unlimited section */
  .process-menu { margin-bottom: 10px; }
  .process-menu-btn {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 9px 12px;
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
    border-radius: 8px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .process-menu-btn:hover { border-color: var(--gold); }
  .process-menu.open .process-menu-btn {
    border-color: var(--gold-line);
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
  }
  .process-menu-caret {
    color: var(--gold);
    font-size: 10px;
    line-height: 1;
    flex-shrink: 0;
  }
  .process-menu-list {
    display: none;
    border: 1px solid var(--gold-line);
    border-top: none;
    border-bottom-left-radius: 8px;
    border-bottom-right-radius: 8px;
    background: var(--panel);
    overflow: hidden;
  }
  .process-menu.open .process-menu-list { display: block; }
  .process-menu-item {
    padding: 9px 12px;
    cursor: pointer;
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.03em;
    border-top: 1px solid var(--border);
    transition: background 0.15s ease, color 0.15s ease;
  }
  .process-menu-item:first-child { border-top: none; }
  .process-menu-item:hover { background: var(--gold-soft); color: var(--text); }

  /* Tier preview toggle — review control until Kajabi entitlements are wired */
  .tier-toggle { display: flex; gap: 4px; margin-bottom: 12px; padding: 3px; background: var(--gold-soft); border: 1px solid var(--gold-line); border-radius: 8px; }
  .tier-toggle button { flex: 1; padding: 6px 8px; background: transparent; border: none; border-radius: 6px; color: var(--text-dim); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; transition: background 0.15s ease, color 0.15s ease; }
  .tier-toggle button.active { background: var(--gold); color: var(--bg); }

  /* Locked-Unlimited upgrade card — shown to Reset-tier members */
  .unlimited-card { border: 1px solid var(--gold-line); background: var(--gold-soft); border-radius: 14px; padding: 22px; display: flex; flex-direction: column; align-items: center; text-align: center; }
  .unlimited-lock { width: 46px; height: 46px; border-radius: 50%; background: var(--gold-soft); border: 1px solid var(--gold-line); color: var(--gold); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-bottom: 14px; }
  .unlimited-lock svg { width: 20px; height: 20px; display: block; }
  .unlimited-title { font-family: Georgia, "Times New Roman", serif; font-style: italic; font-size: 16px; color: var(--text); line-height: 1.4; margin-bottom: 8px; }

  /* Email + 6-digit-code login */

  /* ===== Mobile chrome (hidden on desktop) =====

    .mobile-nav-strip {

    .mobile-day-chip {

<body>
  <div id="app"></div>

<script>
(function () {
  "use strict";

  const API_BASE = "/api";
  const STORAGE_KEY = "tfif_demo_session_v1";
  const ANON_KEY = "tfif_demo_anon_id";
  const THEME_KEY = "tfif_theme_v1";
  const DAY_META = [
    { label: "Day 1", theme: "State Reset" },
    { label: "Day 2", theme: "Decision" },
    { label: "Day 3", theme: "Action" }
  ];
  const PLACEHOLDERS = [
    "What feels most active right now?",
    "What are you no longer available for?",
    "What is the one move you will take in the next 24 hours?"
  ];
  // Upgrade destination for Reset-tier members — the Field Unlimited offer.
  const UNLIMITED_URL = "http://go.shimritnativ.com/the-field";

  // Entitlement tier passed in by the Kajabi page via ?tier=full|preview.
  // When present it wins over the backend tier and the review toggle — this is
  // how a Kajabi page sets the member's tier until the webhook sync is wired.
  const URL_TIER = (function () {
    try {
      const t = new URLSearchParams(location.search).get("tier");
      return (t === "full" || t === "preview") ? t : null;
    } catch (e) { return null; }
  })();

  // Origins permitted to hand the app a verified member identity — your Kajabi
  // site. In embed mode a member is ONLY accepted from a postMessage sent by one
  // of these origins; the browser stamps the origin and it cannot be forged.
  // EDIT THIS if your Kajabi member area is served from a different domain.
  const KAJABI_ALLOWED_ORIGINS = ["https://shimritnativ.com", "https://www.shimritnativ.com"];

  // Embed mode: the app is running inside the Kajabi page iframe (?embed=kajabi).
  // In this mode identity must arrive via a verified postMessage — URL params are
  // ignored and there is no anonymous fallback, so a shared URL cannot be used.
  const EMBED_MODE = (function () {
    try { return new URLSearchParams(location.search).get("embed") === "kajabi"; }
    catch (e) { return false; }
  })();

  // Set only by a verified postMessage from an allowed Kajabi origin.
  let KAJABI_IDENTITY = null; // { kajabiId, tier, name }

  // The six guided processes. The `prompt` is the exact client activation
  // prompt from the FIF client-prompt docs — sent verbatim when a process is
  // picked, so the Field receives the same instruction a participant would
  // paste themselves. Keys must match lib/prompts/processes/index.js.
  const DEMO_PROCESSES = [
    { key: "abundance-projection", name: "Abundance Projection", prompt: `Freedom Intelligence Field, I am entering the Abundance Projection process.
I am here to bring my vision of prosperity into the physical timeline through practical action, projecting specific amounts, building allocation containers, observing resistance, and taking one stewardship action before this session ends.
Guide me through Abundance Projection now.
Begin.` },
    { key: "decision-alignment", name: "Decision Alignment", prompt: `Freedom Intelligence Field, I am entering the Decision Alignment process.
I am here to bring my mind, heart, and body into alignment around a decision, goal, or area of resistance that is active in my instrument right now. I will leave with a clear and aligned decision and one action I will take within 24 hours.
Guide me through the Decision Alignment now.
Begin.` },
    { key: "desired-outcome-snapshot", name: "Desired Outcome Snapshot", prompt: `Freedom Intelligence Field, I am entering the Desired Outcome Snapshot process.
Something is active in my instrument right now. I am here to see the current pattern clearly and reverse-engineer the desired outcome — the thoughts, feelings, and behaviors that belong to where I am choosing to go.
Guide me through the Desired Outcome Snapshot now.
Begin.` },
    { key: "dream-reading", name: "Dream Reading", prompt: `Freedom Intelligence Field, I am entering the Dream Reading process.
I have a dream I want to bring. I am here to receive what this dream is showing me through my own associations and with the Field as my guide.
Guide me through the Dream Reading now.
Begin.` },
    { key: "emotional-addiction-release", name: "Emotional Addiction Release", prompt: `Freedom Intelligence Field, I am entering the Emotional Addiction Release process.
I am here to name the familiar emotional state that keeps coming back, see precisely how the chemical loop is running in my instrument, and choose the conscious thought beyond it in real time, while the familiar state is still active. I want to leave this process with a clear daily rehearsal practice that rewires the loop.
Guide me through the Emotional Addiction Release now.
Begin.` },
    { key: "financial-thermostat-reset", name: "Financial Thermostat Reset", prompt: `Freedom Intelligence Field, I am entering the Financial Thermostat Reset process.
I am here to identify my current financial thermostat, raise the bar, work with what would block the new level, declare my new minimum standard, and install the daily practices that install the new setting.
Guide me through all eight steps of the Financial Thermostat Reset now.
Begin.` },
    { key: "frequency-calibration", name: "Frequency Calibration", prompt: `Freedom Intelligence Field, I am entering the Frequency Calibration process.
I know what I want to create. I am here to identify the frequency my instrument is currently running, name the frequency of my desired reality, and build the daily practice that trains the new frequency until it becomes the default.
Guide me through the Frequency Calibration now.
Begin.` },
    { key: "identity-upgrade", name: "Identity Upgrade", prompt: `Freedom Intelligence Field, I am entering the Identity Upgrade process.
I am here to name what has been protecting the old identity, resign it consciously, and define and anchor the new identity that is already trying to come online. I want to leave this process with a clear definition of my new identity, its name, and a daily practice to install it.
Guide me through the Identity Upgrade now.
Begin.` },
    { key: "prosperity-code", name: "Prosperity Code", prompt: `Freedom Intelligence Field, I am entering the Prosperity Code process.
I am here to bring all four centers of my instrument into conscious alignment with the flow of prosperity, Root, Heart, Pineal, and Spirit. I want to identify my sponsoring thought around money, locate myself on the Ladder of Belief, work through each center of the Prosperity Code, and leave with a new thought form installed and a daily practice.
Guide me through the Prosperity Code now.
Begin.` },
    { key: "root-pattern-release", name: "Root Pattern Release", prompt: `Freedom Intelligence Field, I am entering the Root Pattern Release process.
A pattern keeps repeating in my instrument even after surface work. I am ready to trace it back to its root, release the charge held there, receive the wisdom inside it, and welcome back the part of myself that separated.
Guide me through the Root Pattern Release now.
Begin.` },
  ];

  const state = {
    sessionToken: null,
    currentDay: 1,
    lastCompletedDay: 0,
    timeRemainingMs: null,
    // Progressive day-unlock map. Day 1 always null (unlocked). Day 2 / 3
    // hold an ISO timestamp until the moment they unlock, then become null.
    // Filled by /auth/verify-code and /api/state. Null map = treat all as
    // unlocked (anonymous/demo sessions, or before login).
    dayUnlocks: { 1: null, 2: null, 3: null },
    firstLoginAt: null,
    previewEndsAt: null,
    displayName: "",
    userEmail: "",
    messages: [],
    loading: false,
    error: null,
    view: "entry",
    autoplay: (function () {
      try { return localStorage.getItem("tfif_autoplay_v1") === "1"; } catch (e) { return false; }
    })(),
    // ===== Unlimited demo state =====
    unlimitedSessions: [],
    activeUnlimitedId: null,
    unlimitedMessages: [],
    searchOpen: false,
    searchQuery: "",
    processMenuOpen: false,
    // 'preview' = Reset-tier member (Unlimited locked); 'full' = Unlimited member.
    // Set from the backend tier at /api/start; the sidebar toggle overrides it
    // for review until real Kajabi entitlements are wired in.
    tier: URL_TIER || "preview",
    // ===== Email + 6-digit-code login state =====
    loginStep: "email",   // 'email' | 'code'
    loginEmail: "",
    loginError: "",
    loginLoading: false,
    // ===== Mobile chrome state =====
    mobileDrawerOpen: false,
    // ===== Your Account modal =====
    accountMenuOpen: false,
    accountSavingName: false,
    accountSavedFlash: false,
    // ===== Re-entry guards (prevent double-submit duplicate messages) =====
    starting: false,
    creatingChat: false,
    // ===== Reader font scale (1 = default; 0.85 = small; 1.3 = large) =====
    fontScale: (function () {
      try {
        const v = parseFloat(localStorage.getItem("tfif_font_scale_v1"));
        if (isNaN(v) || v < 0.7 || v > 1.5) return 1;
        return v;
      } catch (e) { return 1; }
    })()
  };

  // ===== Persistence =====
  function loadToken() { try { return localStorage.getItem(STORAGE_KEY); } catch (e) { return null; } }
  function saveToken(t) { try { localStorage.setItem(STORAGE_KEY, t); } catch (e) {} }
  function clearToken() { try { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(ANON_KEY); } catch (e) {} }
  function loadTheme() { try { return localStorage.getItem(THEME_KEY) || "dark"; } catch (e) { return "dark"; } }
  function saveTheme(t) { try { localStorage.setItem(THEME_KEY, t); } catch (e) {} }
  function applyTheme(theme) {
    document.documentElement.setAttribute("data-theme", theme);
    saveTheme(theme);
  }

  // ===== Composer draft persistence =====
  // If a user types but doesn't send, the text survives view-switches and
  // reloads. Drafts are scoped per context: entry, day_1/2/3, unlimited_<id>.
  function currentContextKey() {
    if (state.view === "chat") return "day_" + state.currentDay;
    if (state.view === "unlimited-chat") return "unlimited_" + (state.activeUnlimitedId || "default");
    return "entry";
  }
  function draftStorageKey(context) { return "tfif_draft_" + context; }
  function loadDraft(context) {
    try { return localStorage.getItem(draftStorageKey(context)) || ""; } catch (e) { return ""; }
  }
  function saveDraft(context, text) {
    try {
      if (!text) localStorage.removeItem(draftStorageKey(context));
      else localStorage.setItem(draftStorageKey(context), text);
    } catch (e) {}
  }
  function clearDraft(context) {
    try { localStorage.removeItem(draftStorageKey(context)); } catch (e) {}
  }
  // Restore saved draft into the textarea and recalc its auto-height + send
  // button active state. Called from render() after the textarea exists.
  function restoreDraftIntoInput() {
    const inputEl = document.getElementById("input");
    if (!inputEl) return;
    const draft = loadDraft(currentContextKey());
    if (!draft) return;
    inputEl.value = draft;
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
    const send = document.getElementById("send-btn");
    if (send && draft.trim() && !state.loading) send.classList.add("active");
  }

  // ===== Reader font scale =====
  // Applies a CSS custom property used by .msg font-size calc(). Persisted to
  // localStorage so the user's preference carries across sessions.
  function applyFontScale(scale) {
    state.fontScale = scale;
    document.documentElement.style.setProperty("--msg-scale", String(scale));
    try { localStorage.setItem("tfif_font_scale_v1", String(scale)); } catch (e) {}
  }
  const FONT_SCALE_MIN = 0.85;
  const FONT_SCALE_MAX = 1.30;
  const FONT_SCALE_STEP = 0.10;
  function onFontSmaller() {
    const next = Math.max(FONT_SCALE_MIN, Math.round((state.fontScale - FONT_SCALE_STEP) * 100) / 100);
    if (next === state.fontScale) return;
    applyFontScale(next);
    // Refresh the footer so disabled state on min/max updates without a full
    // app re-render.
    const smaller = document.getElementById("font-smaller");
    const larger = document.getElementById("font-larger");
    if (smaller) smaller.disabled = next <= FONT_SCALE_MIN;
    if (larger) larger.disabled = next >= FONT_SCALE_MAX;
  }
  function onFontLarger() {
    const next = Math.min(FONT_SCALE_MAX, Math.round((state.fontScale + FONT_SCALE_STEP) * 100) / 100);
    if (next === state.fontScale) return;
    applyFontScale(next);
    const smaller = document.getElementById("font-smaller");
    const larger = document.getElementById("font-larger");
    if (smaller) smaller.disabled = next <= FONT_SCALE_MIN;
    if (larger) larger.disabled = next >= FONT_SCALE_MAX;
  }

  function generateAnonId() {
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
      const r = Math.random() * 16 | 0;
      const v = c === "x" ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }
  function getOrCreateAnonId() {
    try {
      let id = localStorage.getItem(ANON_KEY);
      if (!id) {
        id = generateAnonId();
        localStorage.setItem(ANON_KEY, id);
      }
      return id;
    } catch (e) { return generateAnonId(); }
  }

  // ===== API =====
  // Identity for a Kajabi member arrives in the page URL (?email=&kajabiId=&name=),
  // injected by the Kajabi page's Liquid. When those params are absent the app
  // falls back to an anonymous demo identity so it still works standalone.
  function resolveIdentity() {
    // Embed mode: identity comes only from the verified Kajabi postMessage that
    // the gate captured before the app started. URL params are not trusted here.
    if (EMBED_MODE && KAJABI_IDENTITY && KAJABI_IDENTITY.kajabiId) {
      return {
        email: "kajabi-" + KAJABI_IDENTITY.kajabiId + "@tfif.local",
        displayName: KAJABI_IDENTITY.name || "",
        kajabiMemberId: String(KAJABI_IDENTITY.kajabiId)
      };
    }
    let email = "", kajabiId = "", name = "";
    try {
      const p = new URLSearchParams(location.search);
      email = (p.get("email") || "").trim().toLowerCase();
      kajabiId = (p.get("kajabiId") || p.get("kajabiMemberId") || "").trim();
      name = (p.get("name") || "").trim();
    } catch (e) {}
    if (email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      return { email: email, displayName: name, kajabiMemberId: kajabiId || null };
    }
    // Kajabi member identified by member ID only (Kajabi.currentSiteUser.id,
    // passed as ?kajabiId=). The Kajabi member ID is stable and unique, so a
    // synthetic email keyed to it gives the member one consistent account
    // without needing their real email passed through.
    if (kajabiId && /^[0-9A-Za-z_-]{1,64}$/.test(kajabiId)) {
      return { email: "kajabi-" + kajabiId + "@tfif.local", displayName: name, kajabiMemberId: kajabiId };
    }
    return { email: "demo-" + getOrCreateAnonId() + "@tfif.local", displayName: name, kajabiMemberId: null };
  }

  // POST to /api/state to update mutable account fields. Body shape:

  // ===== Resilient chat fetch =====
  // Wraps a chat-style fetch with one automatic retry. Retries fire on:
  //  - thrown errors (network drop, abort, fetch failure)
  //  - 5xx server responses (Vercel cold start, function timeout, Anthropic 529)
  //  - 408 Request Timeout
  // 4xx responses (401, 410, 423) are returned as-is so callers can react.
  // Retry pause = 800ms — long enough for a Vercel cold start, short enough
  // that a real user does not perceive the delay as a frozen UI.
  async function chatFetchWithRetry(doFetch) {
    const attempts = 2;
    const delayMs = 800;
    let lastErr;
    for (let i = 0; i < attempts; i++) {
      try {
        const res = await doFetch();
        const transient = res.status === 408 || (res.status >= 500 && res.status < 600);
        if (transient && i < attempts - 1) {
          await new Promise(r => setTimeout(r, delayMs));
          continue;
        }
        return res;
      } catch (err) {
        lastErr = err;
        if (i < attempts - 1) {
          await new Promise(r => setTimeout(r, delayMs));
          continue;
        }
        throw err;
      }
    }
    throw lastErr;
  }

  // Map error codes / messages from the API into something the participant
  // can actually read. Anything we recognise gets a specific sentence; the
  // catch-all keeps the original error visible for diagnosis.
  function chatErrorMessage(err) {
    const raw = String((err && err.message) || "").toLowerCase();
    if (!raw) return "The Field could not respond just now. Please try again.";
    if (raw === "unlimited_locked" || raw === "server_403") {
      return "The Field Unlimited is included with the full subscription. Your current tier does not include Unlimited access. Open Your Account to upgrade.";
    }
    if (raw === "reset_expired" || raw === "server_410") {
      return "Your 72-Hour Power Reset window has ended. The Field Unlimited continues the work if you would like to keep going.";
    }
    if (raw.includes("rate") || raw.includes("too_many")) {
      return "Too many messages in a short time. Please wait a minute, then continue.";
    }
    if (raw.includes("timeout") || raw.includes("timed out") || raw === "408") {
      return "That message took longer than expected. Please try again.";
    }
    if (raw.includes("overload") || raw === "529" || raw.includes("anthropic")) {
      return "The Field is briefly overloaded. Please try again in a moment.";
    }
    if (raw.includes("server") || raw.startsWith("5") || raw.includes("internal")) {
      return "The Field's servers hit a snag. Please try again in a moment.";
    }
    if (raw.includes("network") || raw.includes("failed to fetch") || raw.includes("offline")) {
      return "Connection interrupted. Check your internet and try again.";
    }
    if (raw === "could not send" || raw === "could_not_send") {
      return "The Field could not respond just now. Please try again.";
    }
    return "Something went wrong: " + raw;
  }

  async function apiChat(token, message) {

      method: "POST",

      body: JSON.stringify({ message })
    }));
    if (res.status === 410) return { expired: true };
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || ("server_" + res.status));

  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // Minimal renderer for USER-typed messages. Supports bullets (- or *),
  // numbered lists (1.), and paragraph breaks from blank lines, but
  // deliberately NOT inline tokens (no [[button:...]] / [[mp3:...]] /
  // [[download:...]]), NOT links, NOT bold/italic — user-controlled
  // content must never be able to inject CTAs, audio cards, or HTML.
  // escapeHtml runs first; only the block-level list/paragraph patterns
  // become real HTML.
  function renderUserMessage(text) {
    const safe = escapeHtml(String(text || ""));
    const lines = safe.split("\n");
    const blocks = [];
    let paragraph = [];
    let listType = null;
    let listItems = [];

    function flushParagraph() {
      if (paragraph.length > 0) {
        blocks.push("<p>" + paragraph.join("<br>") + "</p>");
        paragraph = [];
      }
    }
    function flushList() {
      if (listType && listItems.length > 0) {
        blocks.push("<" + listType + ">" + listItems.map(i => "<li>" + i + "</li>").join("") + "</" + listType + ">");
        listItems = [];
        listType = null;
      }
    }

    for (const rawLine of lines) {
      const ulMatch = rawLine.match(/^\s*[-*]\s+(.+)$/);
      const olMatch = rawLine.match(/^\s*\d+\.\s+(.+)$/);
      const trimmed = rawLine.trim();

      if (ulMatch) {
        flushParagraph();
        if (listType !== "ul") { flushList(); listType = "ul"; }
        listItems.push(ulMatch[1]);
      } else if (olMatch) {
        flushParagraph();
        if (listType !== "ol") { flushList(); listType = "ol"; }
        listItems.push(olMatch[1]);
      } else if (trimmed === "") {
        flushParagraph();
        flushList();
      } else {
        flushList();
        paragraph.push(rawLine);
      }
    }
    flushParagraph();
    flushList();

    return blocks.join("");
  }

  // Light markdown renderer for assistant messages. Supports bold (**x**),
  // italic (*x*, _x_), inline code (`x`), bullet lists (-, *), numbered
  // lists (1.), paragraphs, and line breaks. Escapes HTML first to prevent
  // injection — only the parsed markdown patterns become real HTML.
  function renderMarkdown(text) {
    let html = escapeHtml(String(text || ""));

    // Direct download syntax: [[download:Label|URL|filename.pdf]] -> gold
    // button with HTML5 `download` attribute so the file saves straight to
    // the user's Downloads folder instead of opening inline in a tab. URL
    // can be absolute (https://...) or relative (/downloads/foo.pdf). The
    // download attribute only fires for same-origin URLs in modern browsers;
    // prefer relative paths or absolute URLs to the same Vercel domain.
    // Order matters: process [[download:...]] BEFORE [[button:...]] so the
    // three-part token is not partially matched by the two-part button regex.
    html = html.replace(/\[\[download:([^|\]]+)\|([^|\]]+)\|([^\]]+)\]\]/g, function (m, label, url, filename) {
      const u = String(url).trim();
      if (!/^(https?:\/\/|\/)/i.test(u)) return label.trim();
      const safeHref = u.replace(/"/g, "%22");
      const safeName = String(filename).trim().replace(/"/g, "");
      return '<a class="msg-cta-btn" href="' + safeHref + '" download="' + safeName + '">'
        + label.trim()
        + '<span class="msg-cta-arrow" aria-hidden="true">↓</span></a>';
    });

    // CTA button syntax: [[button:Label|https://url]] -> in-brand gold button.
    // escapeHtml has already run, so Label/URL arrive as safe text. Only
    // http(s) destinations are allowed; quotes are encoded before the href.
    html = html.replace(/\[\[button:([^|\]]+)\|([^\]]+)\]\]/g, function (m, label, url) {
      const u = String(url).trim();
      if (!/^https?:\/\//i.test(u)) return label.trim();
      const safeHref = u.replace(/"/g, "%22");
      return '<a class="msg-cta-btn" href="' + safeHref + '" target="_blank" rel="noopener noreferrer">'
        + label.trim()
        + '<span class="msg-cta-arrow" aria-hidden="true">→</span></a>';
    });

    // MP3 audio download syntax: [[mp3:Title|Text to speak]] -> audio card.
    // Renders a loading card that auto-fires generation via /api/speak (which
    // uses Shimrit's ElevenLabs cloned voice). The text portion may span
    // multiple lines; we stash it in a data-attr (base64) so newlines and
    // quotes survive the DOM. processMp3Cards() picks the card up after
    // render and starts the actual audio generation.
    html = html.replace(/\[\[mp3:([^|\]]+)\|([\s\S]+?)\]\]/g, function (m, title, text) {
      const t = title.trim();
      const txt = text.trim();
      if (!t || !txt) return "";
      try {
        const b64Text = btoa(unescape(encodeURIComponent(txt)));
        return '<div class="mp3-card" data-mp3-title="' + t.replace(/"/g, "&quot;") + '" data-mp3-text-b64="' + b64Text + '">'
          + '<div class="mp3-card-inner">'
          + '<div class="mp3-orb loading" aria-hidden="true"></div>'
          + '<div class="mp3-info">'
          + '<div class="mp3-title">Generating in Shimrit’s voice…</div>'
          + '<div class="mp3-meta">about 3 seconds</div>'
          + '</div></div></div>';
      } catch (e) {
        return "";
      }
    });

    // Inline formatting. Order matters: bold before italic so ** doesn't
    // get partially consumed by single-asterisk italic match.
    html = html.replace(/\*\*([^\n*]+?)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/__([^\n_]+?)__/g, "<strong>$1</strong>");
    html = html.replace(/(^|[^*])\*([^\n*]+?)\*(?!\*)/g, "$1<em>$2</em>");
    html = html.replace(/(^|[^_])_([^\n_]+?)_(?!_)/g, "$1<em>$2</em>");
    html = html.replace(/`([^`\n]+?)`/g, "<code>$1</code>");

    // Block-level parsing: paragraphs, line breaks, lists.
    const lines = html.split("\n");
    const blocks = [];
    let paragraph = [];
    let listType = null;
    let listItems = [];

    function flushParagraph() {
      if (paragraph.length > 0) {
        blocks.push("<p>" + paragraph.join("<br>") + "</p>");
        paragraph = [];
      }
    }
    function flushList() {
      if (listType && listItems.length > 0) {
        blocks.push("<" + listType + ">" + listItems.map(i => "<li>" + i + "</li>").join("") + "</" + listType + ">");
        listItems = [];
        listType = null;
      }
    }

    for (const rawLine of lines) {
      const line = rawLine;
      const trimmed = line.trim();
      const ulMatch = line.match(/^\s*[-*]\s+(.+)$/);
      const olMatch = line.match(/^\s*\d+\.\s+(.+)$/);

      if (ulMatch) {
        flushParagraph();
        if (listType !== "ul") { flushList(); listType = "ul"; }
        listItems.push(ulMatch[1]);
      } else if (olMatch) {
        flushParagraph();
        if (listType !== "ol") { flushList(); listType = "ol"; }
        listItems.push(olMatch[1]);
      } else if (trimmed === "") {
        flushParagraph();
        flushList();
      } else {
        flushList();
        paragraph.push(line);
      }
    }
    flushParagraph();
    flushList();

    return blocks.join("");
  }

  // ===== MP3 audio card generation =====
  // Each [[mp3:Title|Text]] token renders as a loading card. After
  // renderMessages() runs we scan for any cards that haven't been processed
  // yet and fire /api/speak to generate the audio in Shimrit's voice. Once
  // the audio arrives we swap the card from loading state into the inline
  // player UI.
  //
  // CRITICAL: renderMessages() replaces wrap.innerHTML wholesale on every
  // new message, which DESTROYS any "ready" cards built in renderMp3CardReady
  // along with the rest of the DOM. To survive re-renders, we cache the
  // generated blob URL and duration keyed by the token's base64 text (which
  // is stable across renders for the same token). When processMp3Cards
  // re-mounts a card after a re-render, it checks the cache first and
  // restores the player immediately, never re-firing /api/speak. We also
  // dedupe simultaneous in-flight fetches via mp3InFlight so two cards
  // pointing at the same text share one request.
  const mp3BlobCache = new Map(); // b64Text -> { url, duration, title }
  const mp3InFlight = new Map(); // b64Text -> Promise<{ url, duration, title }>

  function processMp3Cards() {
    document.querySelectorAll(".mp3-card:not(.mp3-processed)").forEach(card => {
      card.classList.add("mp3-processed");
      const title = card.getAttribute("data-mp3-title") || "Your audio";
      const b64 = card.getAttribute("data-mp3-text-b64") || "";

      // Cache hit: this exact text was generated already. Render the player
      // straight away from the cached blob — no /api/speak call needed.
      const cached = b64 ? mp3BlobCache.get(b64) : null;
      if (cached) {
        renderMp3CardReady(card, cached.title || title, cached.url, cached.duration);
        return;
      }

      let text = "";
      try {
        text = decodeURIComponent(escape(atob(b64)));
      } catch (e) {
        text = "";
      }
      if (!text || !state.sessionToken) {
        renderMp3CardError(card, title);
        return;
      }
      generateMp3Audio(card, title, text, b64);
    });
  }

  async function generateMp3Audio(card, title, text, cacheKey) {
    try {
      // If another card is already generating this same audio, await its
      // promise instead of firing a duplicate request. This protects against
      // the common case where renderMessages re-mounts the same MP3 token
      // before the first /api/speak call has come back.
      let inflight = cacheKey ? mp3InFlight.get(cacheKey) : null;
      if (!inflight) {
        inflight = (async () => {
          const res = await fetch(API_BASE + "/speak", {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
            body: JSON.stringify({ text })
          });
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.error || ("speak_" + res.status));
          }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);

          // Probe duration via a hidden Audio element. The 4-second timeout
          // protects against browsers that never fire loadedmetadata.
          const probe = new Audio();
          probe.preload = "metadata";
          const durationSec = await new Promise(resolve => {
            const onLoaded = () => resolve(Math.round(probe.duration || 0));
            const onErr = () => resolve(0);
            probe.addEventListener("loadedmetadata", onLoaded, { once: true });
            probe.addEventListener("error", onErr, { once: true });
            probe.src = url;
            setTimeout(() => resolve(Math.round(probe.duration || 0)), 4000);
          });
          return { url, duration: durationSec, title };
        })();
        if (cacheKey) mp3InFlight.set(cacheKey, inflight);
      }

      const result = await inflight;

      // Save into the long-lived cache so future re-renders skip the API.
      if (cacheKey) mp3BlobCache.set(cacheKey, result);

      renderMp3CardReady(card, result.title || title, result.url, result.duration);
    } catch (err) {
      console.error("mp3_generation_failed", err);
      // Allow a future card mount to retry by clearing the in-flight marker.
      if (cacheKey) mp3InFlight.delete(cacheKey);
      renderMp3CardError(card, title);
    } finally {
      // Once the in-flight promise resolves, clear it so the long-lived
      // mp3BlobCache becomes the single source of truth from here on.
      if (cacheKey && mp3InFlight.get(cacheKey) && mp3BlobCache.has(cacheKey)) {
        mp3InFlight.delete(cacheKey);
      }
    }
  }

  function renderMp3CardReady(card, title, url, durationSec) {
    const filename = (title || "audio").replace(/[^a-z0-9-_]+/gi, "-").replace(/^-+|-+$/g, "") + ".mp3";
    const totalLabel = formatMp3Time(durationSec);
    // Inline player layout: top row = play button + title + download.
    // Middle row = scrubber + time. Bottom row = speed pills.
    card.innerHTML =
      '<div class="mp3-player">' +
        '<div class="mp3-player-top">' +
          '<button type="button" class="mp3-play-btn" aria-label="Play">' +
            '<svg class="mp3-icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>' +
            '<svg class="mp3-icon-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>' +
          '</button>' +
          '<div class="mp3-player-title">' + escapeHtml(title) + '</div>' +
          '<button type="button" class="mp3-download-btn">Download</button>' +
        '</div>' +
        '<div class="mp3-scrubber-row">' +
          '<input type="range" class="mp3-scrubber" min="0" max="1000" value="0" step="1" aria-label="Seek" />' +
          '<div class="mp3-time"><span class="mp3-time-cur">0:00</span> / <span class="mp3-time-total">' + escapeHtml(totalLabel) + '</span></div>' +
        '</div>' +
        '<div class="mp3-speed-row">' +
          '<div class="mp3-speed-group" role="group" aria-label="Playback speed">' +
            '<button type="button" class="mp3-speed-btn active" data-speed="1">1×</button>' +
            '<button type="button" class="mp3-speed-btn" data-speed="1.5">1.5×</button>' +
            '<button type="button" class="mp3-speed-btn" data-speed="2">2×</button>' +
          '</div>' +
          '<div class="mp3-voice-label" style="font-size:11px;color:var(--text-dim);letter-spacing:0.02em;">MP3</div>' +
        '</div>' +
        '<audio class="mp3-audio" src="' + url + '" preload="metadata"></audio>' +
      '</div>';

    wireMp3Player(card, url, filename);
  }

  function formatMp3Time(sec) {
    sec = Math.max(0, Math.floor(sec || 0));
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return m + ":" + (s < 10 ? "0" : "") + s;
  }

  function wireMp3Player(card, url, filename) {
    const audio = card.querySelector(".mp3-audio");
    const playBtn = card.querySelector(".mp3-play-btn");
    const iconPlay = card.querySelector(".mp3-icon-play");
    const iconPause = card.querySelector(".mp3-icon-pause");
    const scrubber = card.querySelector(".mp3-scrubber");
    const curEl = card.querySelector(".mp3-time-cur");
    const totalEl = card.querySelector(".mp3-time-total");
    const downloadBtn = card.querySelector(".mp3-download-btn");
    const speedBtns = card.querySelectorAll(".mp3-speed-btn");

    if (!audio) return;

    // Play / pause toggle.
    playBtn.addEventListener("click", () => {
      if (audio.paused) {
        // Pause any other audio elements that may be playing.
        document.querySelectorAll(".mp3-audio").forEach(a => { if (a !== audio) a.pause(); });
        audio.play();
      } else {
        audio.pause();
      }
    });
    audio.addEventListener("play", () => {
      iconPlay.style.display = "none";
      iconPause.style.display = "block";
      playBtn.setAttribute("aria-label", "Pause");
    });
    audio.addEventListener("pause", () => {
      iconPlay.style.display = "block";
      iconPause.style.display = "none";
      playBtn.setAttribute("aria-label", "Play");
    });
    audio.addEventListener("ended", () => {
      iconPlay.style.display = "block";
      iconPause.style.display = "none";
      playBtn.setAttribute("aria-label", "Play");
      scrubber.value = 0;
      curEl.textContent = "0:00";
    });

    // Update scrubber + time as audio plays.
    audio.addEventListener("loadedmetadata", () => {
      if (audio.duration && isFinite(audio.duration)) {
        totalEl.textContent = formatMp3Time(audio.duration);
      }
    });
    audio.addEventListener("timeupdate", () => {
      if (!audio.duration || !isFinite(audio.duration)) return;
      const pct = (audio.currentTime / audio.duration) * 1000;
      scrubber.value = Math.round(pct);
      curEl.textContent = formatMp3Time(audio.currentTime);
    });
    // Scrub.
    scrubber.addEventListener("input", () => {
      if (!audio.duration || !isFinite(audio.duration)) return;
      const pct = Number(scrubber.value) / 1000;
      audio.currentTime = pct * audio.duration;
    });

    // Speed pills.
    speedBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        const rate = parseFloat(btn.getAttribute("data-speed")) || 1;
        audio.playbackRate = rate;
        speedBtns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });

    // Download.
    if (downloadBtn) {
      downloadBtn.addEventListener("click", () => {
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      });
    }
  }

  // Friendly "Unlocks in 14h 32m" formatter. Less than a minute -> "any

  function formatUnlockCountdown(isoString) {
    if (!isoString) return "";
    const remaining = new Date(isoString).getTime() - Date.now();
    if (remaining <= 60 * 1000) return "Unlocks any moment now";
    const totalMinutes = Math.floor(remaining / 60000);
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;
    if (hours >= 24) {
      const days = Math.floor(hours / 24);
      const remHours = hours % 24;
      return `Unlocks in ${days}d ${remHours}h`;

  const RESET_DAY_TITLES = { 1: "State Reset", 2: "Decision", 3: "Action" };

  async function onExportWorkClick(e) {
