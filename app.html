        Talk to Shimrit's team
      </a>
    </div>
  `;

  document.body.appendChild(fab);
  document.body.appendChild(panel);

  const msgsEl = panel.querySelector("#support-messages");
  const inputEl = panel.querySelector("#support-input");
  const sendBtn = panel.querySelector("#support-send");
  const closeBtn = panel.querySelector(".support-header-close");
  const escalateBtn = panel.querySelector("#support-escalate");
  const attachBtn = panel.querySelector("#support-attach-btn");
  const attachInput = panel.querySelector("#support-attach-input");
  const pendingImageEl = panel.querySelector("#support-pending-image");
  const pendingThumbEl = panel.querySelector("#support-pending-thumb");
  const pendingNameEl = panel.querySelector("#support-pending-name");
  const pendingRemoveBtn = panel.querySelector("#support-pending-remove");

  // Limits for screenshot attachments. Anthropic accepts up to 5MB
  // base64-encoded; staying under 3MB raw keeps us safely below that
  // and bounds the cost of vision tokens (Haiku charges per image).
  const MAX_IMAGE_BYTES = 3 * 1024 * 1024;
  const ALLOWED_IMAGE_TYPES = ["image/png", "image/jpeg", "image/webp", "image/gif"];

  // ----- Render messages list -----
  // Bot messages get minimal markdown rendering (bold, italic, inline
  // code) so Haiku's natural ** ** and * * formatting actually looks
  // formatted instead of showing literal asterisks. We escape HTML
  // first to keep the rendering safe from injection. User messages
  // stay as plain textContent — no formatting needed from the user.
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
  function renderBotMarkdown(text) {
    // Escape first, then apply tiny markdown subset on the escaped text.
    let html = escapeHtml(text);
    // Bold: **word** → <strong>word</strong>. Non-greedy so multiple
    // bold runs in the same paragraph work. Disallow whitespace
    // immediately inside the markers so a stray "** " doesn't match.
    html = html.replace(/\*\*(\S.*?\S|\S)\*\*/g, "<strong>$1</strong>");
    // Italic: *word* → <em>word</em>. Same care, and don't match
    // anything that started as ** (handled above).
    html = html.replace(/(^|[^*])\*(\S.*?\S|\S)\*(?!\*)/g, "$1<em>$2</em>");
    // Inline code: `word` → <code>word</code>
    html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
    // Preserve paragraph line breaks
    html = html.replace(/\n/g, "<br>");
    return html;
  }
  function renderMessages() {
    msgsEl.innerHTML = "";
    for (const m of widgetState.messages) {
      const div = document.createElement("div");
      div.className = "support-msg " + (m.role === "user" ? "user" : "bot");
      if (m.role === "user") {
        // User messages may carry an attached image (data URL). Render
        // the image above the text in the bubble.
        if (m.image && m.image.dataUrl) {
          const img = document.createElement("img");
          img.src = m.image.dataUrl;
          img.alt = m.image.name || "Screenshot";
          div.appendChild(img);
        }
        if (m.content) {
          const txt = document.createElement("div");
          txt.textContent = m.content;
          div.appendChild(txt);
        }
      } else {
        div.innerHTML = renderBotMarkdown(m.content);
      }
      msgsEl.appendChild(div);
    }
    if (widgetState.loading) {
      const t = document.createElement("div");
      t.className = "support-typing";
      t.innerHTML = '<span class="support-spinner"></span> Thinking…';
      msgsEl.appendChild(t);
    }
    // Scroll to bottom on every update
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }
  renderMessages();

  // ----- Image attachment handling -----
  // widgetState.pendingImage holds the not-yet-sent attachment:
  //   { name, type, dataUrl, base64 }
  // dataUrl is used for previews + bubble rendering, base64 is what
  // the backend forwards to Anthropic's vision API.
  function readFileAsDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result || ""));
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
  function showPendingImage() {
    if (!widgetState.pendingImage) {
      pendingImageEl.style.display = "none";
      return;
    }
    pendingImageEl.style.display = "flex";
    pendingThumbEl.src = widgetState.pendingImage.dataUrl;
    pendingNameEl.textContent = widgetState.pendingImage.name;
  }
  function clearPendingImage() {
    widgetState.pendingImage = null;
    showPendingImage();
    // Reset the file input so the user can re-select the same file later
    attachInput.value = "";
  }
  async function handleFileSelect(file) {
    if (!file) return;
    if (!ALLOWED_IMAGE_TYPES.includes(file.type)) {
      alert("Please attach a PNG, JPG, WEBP, or GIF image.");
      return;
    }
    if (file.size > MAX_IMAGE_BYTES) {
      alert("That image is too large (max 3MB). Try cropping or compressing it first.");
      return;
    }
    try {
      const dataUrl = await readFileAsDataUrl(file);
      // Split "data:image/png;base64,iVBORw..." into mime + base64
      const match = /^data:([^;]+);base64,(.+)$/.exec(dataUrl);
      if (!match) {
        alert("Couldn't read that file. Try a different one.");
        return;
      }
      widgetState.pendingImage = {
        name: file.name,
        type: match[1],
        dataUrl: dataUrl,
        base64: match[2],
      };
      showPendingImage();
      inputEl.focus();
    } catch (e) {
      alert("Couldn't read that file. Try a different one.");
    }
  }

  // ----- Build the WhatsApp escalation URL with user context -----
  // Keeps it short: just identifies the member and surfaces their
  // latest question. Geo doesn't want the full bot transcript pasted
  // into WhatsApp — too noisy. The user can elaborate in WhatsApp
  // directly if needed.
  function buildEscalationUrl() {
    if (!WHATSAPP_NUMBER) {
      return "#"; // not configured; click handler will alert instead
    }
    const email = widgetState.userEmail || "(not logged in)";
    // Find the LAST thing the user actually typed in the bot. That's
    // their main question — way more useful for Shimrit than the
    // full back-and-forth with the bot.
    const lastUserMessage = (() => {
      for (let i = widgetState.messages.length - 1; i >= 0; i--) {
        const m = widgetState.messages[i];
        if (m.role === "user" && m.content) {
          return String(m.content).slice(0, 500);
        }
      }
      return null;
    })();
    let body = `Hi Shimrit, I need help with The Field.\n\nMy email: ${email}`;
    if (lastUserMessage) {
      body += `\n\nMy question: ${lastUserMessage}`;
    }
    return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(body)}`;
  }

  // ----- Event handlers -----
  function openPanel() {
    widgetState.open = true;
    panel.classList.add("open");
    fab.classList.add("open");
    fab.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
    fab.setAttribute("aria-label", "Close help");
    setTimeout(() => inputEl.focus(), 50);
    // Pre-fetch the user's email from /api/state if we don't already
    // have it, so the WhatsApp escalation URL is populated even if
    // they tap "Talk to Shimrit's team" without chatting with the bot
    // first. Best-effort — silent failure if not logged in.
    if (!widgetState.userEmail) {
      const token = (function () {
        try { return localStorage.getItem("tfif_session_v1") || ""; } catch (e) { return ""; }
      })();
      if (token) {
        fetch("/api/state", { headers: { "x-session-token": token } })
          .then(r => r.json())
          .then(d => {
            if (d && d.email) {
              widgetState.userEmail = d.email;
              refreshEscalateUrl();
            }
          })
          .catch(() => { /* silent */ });
      }
    }
    refreshEscalateUrl();
  }
  function closePanel() {
    widgetState.open = false;
    panel.classList.remove("open");
    fab.classList.remove("open");
    fab.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>`;
    fab.setAttribute("aria-label", "Open help");
  }
  function toggle() {
    if (widgetState.open) closePanel(); else openPanel();
  }
  function refreshEscalateUrl() {
    escalateBtn.href = buildEscalationUrl();
  }
  async function sendMessage() {
    const text = (inputEl.value || "").trim();
    const hasImage = !!widgetState.pendingImage;
    // Allow sending if there's text OR an image (image alone is a
    // valid "look at this" prompt that Haiku can describe).
    if ((!text && !hasImage) || widgetState.loading) return;
    // Push the new user message into history, attaching the image
    // metadata so the bubble renders it AND the backend gets it.
    const userMsg = { role: "user", content: text || "What is happening here?" };
    if (hasImage) {
      userMsg.image = {
        name: widgetState.pendingImage.name,
        type: widgetState.pendingImage.type,
        dataUrl: widgetState.pendingImage.dataUrl,
        base64: widgetState.pendingImage.base64,
      };
    }
    widgetState.messages.push(userMsg);
    inputEl.value = "";
    inputEl.style.height = "auto";
    clearPendingImage();
    widgetState.loading = true;
    renderMessages();
    try {
      // Send the FULL conversation each turn so Haiku has context.
      const token = (function () {
        try { return localStorage.getItem("tfif_session_v1") || ""; } catch (e) { return ""; }
      })();
      const res = await fetch("/api/support-chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(token ? { "x-session-token": token } : {}),
        },
        body: JSON.stringify({
          messages: widgetState.messages
            .filter(m => m.role === "user" || m.role === "assistant")
            .map(m => {
              // The backend expects a normalized shape per message:
              //   { role, content, image?: { type, base64 } }
              // We strip dataUrl from the wire payload to save bytes
              // (only base64 is needed for the API call). We keep
              // dataUrl in the local state for rendering.
              if (m.image) {
                return {
                  role: m.role,
                  content: m.content,
                  image: { type: m.image.type, base64: m.image.base64 },
                };
              }
              return { role: m.role, content: m.content };
            }),
        }),
      });
      const data = await res.json().catch(() => ({}));
      const reply = data.reply || "Sorry, I'm having trouble right now. Tap 'Talk to Shimrit's team' below to message us on WhatsApp.";
      widgetState.messages.push({ role: "assistant", content: reply });
      if (data.suggestEscalation) widgetState.suggestEscalation = true;
      // Cache the user's email so the WhatsApp escalation URL can
      // pre-fill it. Returned by the API once we have a session.
      if (data.userEmail) widgetState.userEmail = data.userEmail;
    } catch (err) {
      widgetState.messages.push({
        role: "assistant",
        content: "I couldn't reach the support service. Tap 'Talk to Shimrit's team' below to message us on WhatsApp.",
      });
    } finally {
      widgetState.loading = false;
      renderMessages();
      refreshEscalateUrl();
    }
  }

  fab.addEventListener("click", toggle);
  closeBtn.addEventListener("click", closePanel);

  // Allow any element with [data-open-support] to open the panel. This
  // is how the sidebar/hamburger "Help" button hooks in — render() can
  // rebuild that button on every view change and the listener still
  // works because it's delegated through document.body. Also closes
  // the mobile drawer if it's open, so the user sees the panel cleanly.
  document.body.addEventListener("click", (e) => {
    const trigger = e.target && e.target.closest && e.target.closest("[data-open-support]");
    if (!trigger) return;
    e.preventDefault();
    e.stopPropagation();
    openPanel();
    // If the mobile drawer wraps the trigger, close it so the panel
    // isn't hidden behind the drawer. Safe no-op if the drawer is closed.
    try {
      const sidebar = document.querySelector(".sidebar.mobile-open");
      if (sidebar) sidebar.classList.remove("mobile-open");
    } catch (err) {}
  });
  sendBtn.addEventListener("click", sendMessage);
  inputEl.addEventListener("keydown", (e) => {
    // Enter sends, Shift+Enter inserts newline
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  inputEl.addEventListener("input", (e) => {
    // Auto-grow up to max-height
    e.target.style.height = "auto";
    e.target.style.height = Math.min(e.target.scrollHeight, 100) + "px";
  });
  attachBtn.addEventListener("click", () => attachInput.click());
  attachInput.addEventListener("change", (e) => {
    const file = e.target.files && e.target.files[0];
    if (file) handleFileSelect(file);
  });
  pendingRemoveBtn.addEventListener("click", clearPendingImage);
  // Allow paste-to-attach: if the user copies a screenshot (Cmd+Shift+4
  // on macOS, Print Screen on Windows) then pastes in the textarea,
  // pick up the clipboard image automatically. Big quality-of-life win.
  inputEl.addEventListener("paste", (e) => {
    if (!e.clipboardData) return;
    for (const item of e.clipboardData.items) {
      if (item.kind === "file" && item.type.startsWith("image/")) {
        const file = item.getAsFile();
        if (file) {
          e.preventDefault();
          handleFileSelect(file);
          return;
        }
      }
    }
  });
  escalateBtn.addEventListener("click", (e) => {
    if (!WHATSAPP_NUMBER) {
      e.preventDefault();
      alert("WhatsApp support is not configured yet. Please email support@shimritnativ.com.");
    }
  });
})();
</script>

<!-- ─── Coach Carmen intercom popup ───────────────────────────────── -->
<div id="cp-popup" class="cp-popup" role="dialog" aria-label="Message from Coach Carmen">
  <button class="cp-close" type="button" data-cp-action="dismiss" aria-label="Close">×</button>
  <div class="cp-head">
    <img class="cp-avatar" id="cp-avatar" src="/coach%20carmen.jpg" alt="Coach Carmen" />
    <div>
      <div class="cp-name">Coach Carmen</div>
      <div class="cp-role">Shimrit's team</div>
    </div>
  </div>
  <p class="cp-msg">Hey, this is coach Carmen from Shimrit's team. I'd love to know how your experience with The Field has been so far.</p>
  <p class="cp-msg">Do you have some time this week for a quick and <strong>free orientation call</strong> with me?</p>
  <div class="cp-cta-row">
    <a class="cp-cta primary" href="https://api.leadconnectorhq.com/widget/bookings/connectcall-masteryourpath" target="_blank" rel="noopener noreferrer" data-cp-action="book">Book a free session ✨</a>
    <button class="cp-cta secondary" type="button" data-cp-action="dismiss">Maybe later</button>
  </div>
</div>

<script>
(function initCarmenPopup() {
  // Popup re-appears on a weekly cadence. If the member saw it more
  // than COOLDOWN_MS ago (7 days), show again next time they open the
  // Field. Any interaction (dismiss / book) updates the timestamp so
  // the clock restarts from that moment.
  const SEEN_KEY = "myp_carmen_popup_v2";
  const COOLDOWN_MS = 7 * 24 * 60 * 60 * 1000;
  // Bump SEEN_KEY to _v2 if we want to force everyone to see a refreshed
  // version immediately regardless of their cooldown state.

  // Skip staff / test accounts. Read the current member's email from
  // the same localStorage key used elsewhere in app.html if available.
  function currentEmail() {
    try {
      const cached = localStorage.getItem("tfif_member_email_v1")
                 || localStorage.getItem("tfif_member_email")
                 || "";
      return cached.toLowerCase();
    } catch { return ""; }
  }
  function isStaff(email) {
    if (!email) return false;
    return email.endsWith("@shimritnativ.com")
        || email.endsWith("@masteryourpath.com")
        || email.includes("+test")
        || email.startsWith("ge.amaral")
        || email.startsWith("geoamaral")
        || email.startsWith("airabueno.va")
        || email.startsWith("carmen.faunback");
  }

  function playChime() {
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      const ctx = new Ctx();
      const now = ctx.currentTime;
      // Soft two-note ping: C6 → E6, short decay.
      const notes = [1046.5, 1318.5];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        const start = now + i * 0.09;
        gain.gain.setValueAtTime(0, start);
        gain.gain.linearRampToValueAtTime(0.06, start + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, start + 0.35);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(start);
        osc.stop(start + 0.4);
      });
    } catch { /* silent */ }
  }

  function showPopup() {
    const popup = document.getElementById("cp-popup");
    if (!popup) return;
    popup.classList.add("show");
    playChime();
    try {
      localStorage.setItem(SEEN_KEY, JSON.stringify({ shown_at: new Date().toISOString() }));
    } catch { /* ignore quota errors */ }
  }

  function markInteraction(action) {
    try {
      const prev = JSON.parse(localStorage.getItem(SEEN_KEY) || "{}");
      prev[action + "_at"] = new Date().toISOString();
      localStorage.setItem(SEEN_KEY, JSON.stringify(prev));
    } catch {}
  }

  function dismissPopup() {
    const popup = document.getElementById("cp-popup");
    if (popup) popup.classList.remove("show");
    markInteraction("dismissed");
  }

  // Session-token key used by the Field to remember a logged-in member.
  // Same constant as the top of app.html (STORAGE_KEY = "tfif_session_v1").
  const MEMBER_SESSION_KEY = "tfif_session_v1";

  function isLoggedIn() {
    try { return !!localStorage.getItem(MEMBER_SESSION_KEY); } catch { return false; }
  }

  // Server-side check: does this member already have the GHL tag
  // that fires when they book a connect call? If yes, we permanently
  // suppress the popup. Returns true when we should proceed with
  // showing, false when we should skip. Fails-open (defaults to true)
  // if the endpoint errors so a Neon blip doesn't kill outreach.
  async function isEligibleServerSide() {
    try {
      const token = localStorage.getItem(MEMBER_SESSION_KEY);
      if (!token) return false;
      const res = await fetch("/api/carmen-popup-status", {
        headers: { "x-session-token": token },
      });
      if (!res.ok) return true; // fail-open
      const data = await res.json();
      return data && data.should_show !== false;
    } catch {
      return true; // fail-open
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    const popup = document.getElementById("cp-popup");
    if (!popup) return;

    // Delegated click handler for buttons inside the popup.
    popup.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-cp-action]");
      if (!btn) return;
      const action = btn.dataset.cpAction;
      if (action === "dismiss") {
        dismissPopup();
      } else if (action === "book") {
        markInteraction("booked");
        // Also close so the popup doesn't hover over the booking widget.
        setTimeout(() => {
          const p = document.getElementById("cp-popup");
          if (p) p.classList.remove("show");
        }, 250);
      }
    });

    // ── Gating logic ──────────────────────────────────────────────
    // Only show when the member is signed in. The sign-in screen and
    // the Field share the same HTML page — without this check, the
    // popup would fire on the sign-in screen too.
    if (!isLoggedIn()) return;
    if (isStaff(currentEmail())) return;
    // Weekly cadence — respect the cooldown from the last time we
    // showed or the last time they interacted.
    let existing = null;
    try { existing = JSON.parse(localStorage.getItem(SEEN_KEY) || "null"); } catch {}
    if (existing) {
      const lastTouch = existing.shown_at || existing.dismissed_at || existing.booked_at;
      if (lastTouch) {
        const ago = Date.now() - new Date(lastTouch).getTime();
        if (Number.isFinite(ago) && ago < COOLDOWN_MS) return; // still in cooldown
      }
    }

    // Delay entrance so the member sees the Field first and the pop-in
    // feels intentional rather than pushy.
    setTimeout(async () => {
      // Re-check login state in case the session was cleared mid-delay
      // (e.g. by the auto-logout flow).
      if (!isLoggedIn()) return;
      // Server-side check: skip if this member already booked a call
      // (tag "connect call - new form" fires automatically on booking).
      const eligible = await isEligibleServerSide();
      if (!eligible) return;
      showPopup();
    }, 6000);
  });
})();
</script>
