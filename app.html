  // Create a hidden iframe, write the branded HTML into it, wait for it to
  // load, then trigger the browser's print dialog from inside the iframe.
  // The document.title becomes the default filename the browser suggests
  // when the user picks "Save as PDF".
  // Open the browser's native print dialog with the conversation content
  // pre-rendered in a hidden iframe. The user picks "Save as PDF" from the
  // dialog and gets a real vector PDF with selectable text.
  //
  // Why this approach (and why we came back to it):
  //   We tried two direct-download alternatives during the July 2026 launch
  //   week and both failed:
  //     1. html2pdf.js → PDFs had rasterized text, users couldn't copy.
  //     2. Server-side Puppeteer + @sparticuz/chromium → hit Vercel's
  //        libnss3.so runtime break, endpoint returned 500 on every call.
  //   The browser's native print dialog is unfashionable but bulletproof:
  //   real vector PDF, selectable text, works offline, no dependencies,
  //   no infrastructure. The "Save as PDF" step is a minor UX cost but
  //   the output quality is exactly what members need.
  //
  // Implementation notes:
  //   • Iframe is offscreen (0×0 at bottom-right) so the print CSS applies
  //     without disturbing the visible page.
  //   • We wait for load/readyState before calling print() — some browsers
  //     render blank on the first call if fonts haven't loaded yet.
  //   • We hook afterprint to clean up as soon as the dialog closes, so
  //     re-exporting doesn't accumulate leaked iframes.
  //   • 60s safety timeout removes the iframe if afterprint never fires
  //     (some browsers don't fire it when the user cancels).
  function openPrintDialog(htmlString, docTitle) {
    return new Promise((resolve) => {
      const iframe = document.createElement("iframe");
      iframe.style.position = "fixed";
      iframe.style.right = "0";
      iframe.style.bottom = "0";
      iframe.style.width = "0";
      iframe.style.height = "0";
      iframe.style.border = "0";
      document.body.appendChild(iframe);

      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open();
      doc.write(
        "<!DOCTYPE html><html><head><meta charset=\"utf-8\"><title>" +
        escapeHtml(docTitle) +
        "</title><style>" +
        "@page { size: A4; margin: 15mm 15mm 18mm 15mm; }" +
        "body { margin: 0; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }" +
        "</style></head><body>" +
        htmlString +
        "</body></html>"
      );
      doc.close();

      let cleaned = false;
      const cleanup = () => {
        if (cleaned) return;
        cleaned = true;
        if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
        resolve();
      };
      const triggerPrint = () => {
        try {
          try {
            iframe.contentWindow.addEventListener("afterprint", cleanup, { once: true });
          } catch (err) { /* iframe may not support events; rely on timeout */ }
          iframe.contentWindow.focus();
          iframe.contentWindow.print();
        } catch (err) {
          console.error("print_failed", err);
        }
        setTimeout(cleanup, 60000);
      };
      if (doc.readyState === "complete") {
        setTimeout(triggerPrint, 200);
      } else {
        iframe.addEventListener("load", () => setTimeout(triggerPrint, 200), { once: true });
        setTimeout(triggerPrint, 1200);
      }
    });
  }

  // Try direct PDF download via /api/export-pdf (which calls PDFShift server-
  // side and returns a real vector PDF). If that fails for any reason
  // (endpoint missing, PDFSHIFT_API_KEY not set, free tier exhausted,
  // network hiccup), fall back to the browser's native print dialog so the
  // member still gets their conversation as a PDF.
  //
  // This is the entry point the Export buttons call. It replaces the direct
  // openPrintDialog call so we get a two-tier experience: cleanest UX first
  // (direct download), reliable fallback second (Save as PDF dialog).
  async function downloadConversationPdf(htmlString, docTitle) {
    const safeTitle = (docTitle || "conversation").replace(/[\\/:*?"<>|]/g, "-");

    try {
      let token = "";
      try { token = localStorage.getItem("tfif_session_v1") || ""; }
      catch (err) { /* storage blocked — server will 401, we fall through */ }

      const resp = await fetch("/api/export-pdf", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-session-token": token,
        },
        body: JSON.stringify({ html: htmlString, title: safeTitle }),
      });

      if (!resp.ok) {
        // Any non-2xx (503 no API key, 502 PDFShift error, 401 auth) →
        // fall back to print dialog. Log for debugging but don't surface
        // the error to the user.
        const errText = await resp.text().catch(() => "");
        console.warn("export-pdf server failed, falling back to print dialog", resp.status, errText.slice(0, 200));
        return openPrintDialog(htmlString, docTitle);
      }

      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = safeTitle + ".pdf";
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        try { if (a.parentNode) a.parentNode.removeChild(a); } catch (err) { /* ignore */ }
        URL.revokeObjectURL(url);
      }, 400);
    } catch (err) {
      console.warn("export-pdf request threw, falling back to print dialog", err);
      return openPrintDialog(htmlString, docTitle);
    }
  }

  function buildResetExportHtml(messages, displayName, tier) {
    // Tier passed explicitly so the upsell decision uses the server-reported
    // tier from /api/state rather than state.tier (which can drift in demo).
    const effectiveTier = tier || state.tier;
    const now = new Date();
    const dateStr = now.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    const owner = displayName ? escapeHtml(displayName) + "'s" : "Your";

    const byDay = { 1: [], 2: [], 3: [] };
    messages.forEach(m => {
      const d = Number(m.dayAtSend);
      if (d === 1 || d === 2 || d === 3) byDay[d].push(m);
    });

    // Convert the AI's markdown output (**bold**, _italic_, lists, paragraphs)
    // into inline-styled HTML appropriate for PDF rendering. Mirrors the
    // in-app renderMarkdown logic so PDF output matches the chat exactly.
    function renderMessageBodyHtml(content) {
      let html = escapeHtml(content);
      // Inline marks. Order matters: bold before italic so ** isn't partially
      // consumed by single-asterisk italic.
      html = html.replace(/\*\*([^\n*]+?)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/__([^\n_]+?)__/g, "<strong>$1</strong>");
      html = html.replace(/(^|[^*])\*([^\n*]+?)\*(?!\*)/g, "$1<em>$2</em>");
      html = html.replace(/(^|[^_])_([^\n_]+?)_(?!_)/g, "$1<em>$2</em>");
      html = html.replace(/`([^`\n]+?)`/g, '<code style="background:rgba(201,168,76,0.12); padding:1px 5px; border-radius:3px; font-family:Menlo,Consolas,monospace; font-size:0.92em;">$1</code>');

      // Block parsing: paragraphs, line breaks, bullet & numbered lists.
      const lines = html.split("\n");
      const blocks = [];
      let para = [];
      let listType = null;
      let listItems = [];
      const flushPara = () => {
        if (para.length > 0) {
          blocks.push('<p style="margin:0 0 8px 0;">' + para.join("<br/>") + '</p>');
          para = [];
        }
      };
      const flushList = () => {
        if (listType && listItems.length > 0) {
          const tag = listType === "ul" ? "ul" : "ol";
          blocks.push('<' + tag + ' style="margin:6px 0 10px 0; padding-left:22px;">' +
            listItems.map(i => '<li style="margin-bottom:4px;">' + i + '</li>').join("") +
            '</' + tag + '>');
          listItems = [];
          listType = null;
        }
      };
      for (const rawLine of lines) {
        const trimmed = rawLine.trim();
        const ulMatch = rawLine.match(/^\s*[-*]\s+(.+)$/);
        const olMatch = rawLine.match(/^\s*\d+\.\s+(.+)$/);
        if (ulMatch) {
          flushPara();
          if (listType !== "ul") { flushList(); listType = "ul"; }
          listItems.push(ulMatch[1]);
        } else if (olMatch) {
          flushPara();
          if (listType !== "ol") { flushList(); listType = "ol"; }
          listItems.push(olMatch[1]);
        } else if (trimmed === "") {
          flushPara();
          flushList();
        } else {
          flushList();
          para.push(rawLine);
        }
      }
      flushPara();
      flushList();
      return blocks.join("");
    }

    function messageBlock(m) {
      const speaker = m.role === "user" ? "You" : "The Field";
      const speakerColor = m.role === "user" ? "#1A1612" : "#9A6E10";
      let content = String(m.content || "")
        .replace(/\[\[button:[^\]]+\]\]/g, "")
        .replace(/\[\[mp3:[^|\]]+\|[\s\S]+?\]\]/g, "")
        .trim();
      if (!content) return "";
      const body = renderMessageBodyHtml(content);
      return `
        <div style="margin:0 0 18px 0; page-break-inside:avoid;">
          <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-weight:700; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:${speakerColor}; margin-bottom:5px;">${speaker}</div>
          <div style="font-family:Georgia,'Times New Roman',serif; font-size:13px; line-height:1.65; color:#1A1612;">${body}</div>
        </div>`;
    }

    let daysHtml = "";
    let anyContent = false;
    for (const d of [1, 2, 3]) {
      if (byDay[d].length === 0) continue;
      anyContent = true;
      const msgsHtml = byDay[d].map(messageBlock).join("");
      daysHtml += `
        <div style="${d === 1 ? "" : "page-break-before:always;"} padding-top:${d === 1 ? "8px" : "20px"};">
          <div style="border-bottom:1.5px solid #C9A84C; padding-bottom:10px; margin-bottom:22px;">
            <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.22em; color:#C9A84C; text-transform:uppercase;">Day ${d}</div>
            <div style="font-family:Georgia,'Times New Roman',serif; font-style:italic; font-size:26px; color:#1A1612; margin-top:4px;">${RESET_DAY_TITLES[d]}</div>
          </div>
          ${msgsHtml}
        </div>`;
    }

    const emptyBlock = `<div style="text-align:center; color:rgba(26,22,18,0.55); padding:60px 20px; font-family:Georgia,'Times New Roman',serif; font-style:italic;">No conversations recorded yet. Come back after a session.</div>`;

    // Upsell to Unlimited — preview tier only. Full-tier members already
    // have unlimited access; showing them this would be confusing. The URL
    // is displayed on a separate line so it works on paper, and wrapped in
    // an anchor so PDF readers can make it tappable on phones.
    const upsellBlock = (effectiveTier === "preview") ? `
      <div style="margin:36px 0 18px; padding:26px 24px; background:rgba(201,168,76,0.06); border:1.5px solid #C9A84C; border-radius:12px; text-align:center; page-break-inside:avoid;">
        <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.22em; color:#C9A84C; text-transform:uppercase; margin-bottom:12px;">The Field — Unlimited</div>
        <div style="font-family:Georgia,'Times New Roman',serif; font-style:italic; font-size:24px; color:#1A1612; margin-bottom:10px;">Continue the work.</div>
        <div style="font-family:Georgia,'Times New Roman',serif; font-size:14px; color:rgba(26,22,18,0.75); line-height:1.6; max-width:480px; margin:0 auto 18px;">Unlimited conversations with the Field, plus the six guided processes &mdash; mind, heart, and body, anytime.</div>
        <a href="${escapeHtml(UNLIMITED_URL)}" style="display:inline-block; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.12em; color:#1A1612; text-transform:uppercase; text-decoration:none; padding:11px 22px; background:#C9A84C; border-radius:8px;">Unlock The Field</a>
        <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:11px; color:rgba(26,22,18,0.55); margin-top:14px; word-break:break-all;">${escapeHtml(UNLIMITED_URL.replace(/^https?:\/\//, ""))}</div>
      </div>` : "";

    return `
      <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#1A1612; background:#FFFFFF;">
        <div style="text-align:center; padding:24px 20px 28px;">
          <div style="font-size:10px; font-weight:700; letter-spacing:0.22em; color:#C9A84C; text-transform:uppercase;">Master Your Path</div>
          <div style="font-family:Georgia,'Times New Roman',serif; font-style:italic; font-size:30px; color:#1A1612; margin-top:10px; line-height:1.25;">${owner}<br/>Freedom Intelligence Field</div>
          <div style="font-size:13px; color:rgba(26,22,18,0.65); margin-top:14px;">72-Hour Power Reset</div>
          <div style="font-size:11px; color:rgba(26,22,18,0.4); margin-top:6px; letter-spacing:0.04em;">Saved ${escapeHtml(dateStr)}</div>
        </div>
        ${anyContent ? daysHtml : emptyBlock}
        ${upsellBlock}
        <div style="text-align:center; padding:28px 20px 14px; margin-top:${effectiveTier === "preview" ? "20" : "30"}px; border-top:1px solid rgba(26,22,18,0.15);">
          <div style="font-family:Georgia,'Times New Roman',serif; font-size:11px; color:rgba(26,22,18,0.5); font-style:italic; line-height:1.6;">A record of your work with the Freedom Intelligence Field<br/>Master Your Path</div>
        </div>
      </div>`;
  }

  // ===== Unlimited export — single chat and all conversations =====
  // Mirrors the Reset export pattern: build branded HTML, drop it into a
  // hidden iframe, trigger window.print(). Browser renders to PDF natively.
  // We reuse the markdown-to-HTML conversion and the [[token:...]] stripping
  // from the Reset export so PDF output matches the chat exactly.

  // Shared helpers extracted so both single-chat and all-conversations
  // builders can render messages identically.
  function unlimitedExportRenderMessageBody(content) {
    let html = escapeHtml(content);
    html = html.replace(/\*\*([^\n*]+?)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/__([^\n_]+?)__/g, "<strong>$1</strong>");
    html = html.replace(/(^|[^*])\*([^\n*]+?)\*(?!\*)/g, "$1<em>$2</em>");
    html = html.replace(/(^|[^_])_([^\n_]+?)_(?!_)/g, "$1<em>$2</em>");
    html = html.replace(/`([^`\n]+?)`/g, '<code style="background:rgba(201,168,76,0.12); padding:1px 5px; border-radius:3px; font-family:Menlo,Consolas,monospace; font-size:0.92em;">$1</code>');
    const lines = html.split("\n");
    const blocks = [];
    let para = [];
    let listType = null;
    let listItems = [];
    const flushPara = () => {
      if (para.length > 0) { blocks.push('<p style="margin:0 0 8px 0;">' + para.join("<br/>") + '</p>'); para = []; }
    };
    const flushList = () => {
      if (listType && listItems.length > 0) {
        const tag = listType === "ul" ? "ul" : "ol";
        blocks.push('<' + tag + ' style="margin:6px 0 10px 0; padding-left:22px;">' +
          listItems.map(i => '<li style="margin-bottom:4px;">' + i + '</li>').join("") + '</' + tag + '>');
        listItems = []; listType = null;
      }
    };
    for (const rawLine of lines) {
      const trimmed = rawLine.trim();
      const ulMatch = rawLine.match(/^\s*[-*]\s+(.+)$/);
      const olMatch = rawLine.match(/^\s*\d+\.\s+(.+)$/);
      if (ulMatch) {
        flushPara();
        if (listType !== "ul") { flushList(); listType = "ul"; }
        listItems.push(ulMatch[1]);
      } else if (olMatch) {
        flushPara();
        if (listType !== "ol") { flushList(); listType = "ol"; }
        listItems.push(olMatch[1]);
      } else if (trimmed === "") {
        flushPara(); flushList();
      } else {
        flushList(); para.push(rawLine);
      }
    }
    flushPara(); flushList();
    return blocks.join("");
  }

  function unlimitedExportMessageBlock(m) {
    const speaker = m.role === "user" ? "You" : "The Field";
    const speakerColor = m.role === "user" ? "#1A1612" : "#9A6E10";
    let content = String(m.content || "")
      .replace(/\[\[button:[^\]]+\]\]/g, "")
      .replace(/\[\[download:[^\]]+\]\]/g, "")
      .replace(/\[\[mp3:[^|\]]+\|[\s\S]+?\]\]/g, "")
      .trim();
    if (!content) return "";
    const body = unlimitedExportRenderMessageBody(content);
    return `
      <div style="margin:0 0 18px 0; page-break-inside:avoid;">
        <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-weight:700; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:${speakerColor}; margin-bottom:5px;">${speaker}</div>
        <div style="font-family:Georgia,'Times New Roman',serif; font-size:13px; line-height:1.65; color:#1A1612;">${body}</div>
      </div>`;
  }

  function unlimitedExportChatHeader(session) {
    // Render the chat title + dates as a section divider. Matches the Day
    // dividers in the Reset export visually so the two PDFs feel like one
    // family of documents.
    const title = (session && session.title) || "Conversation";
    const startedAt = session && session.startedAt
      ? new Date(session.startedAt).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })
      : "";
    const lastAt = session && session.lastMessageAt
      ? new Date(session.lastMessageAt).toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" })
      : "";
    const dateLine = (startedAt && lastAt && startedAt !== lastAt)
      ? `${startedAt} to ${lastAt}`
      : (startedAt || lastAt);
    return `
      <div style="border-bottom:1.5px solid #C9A84C; padding-bottom:10px; margin-bottom:22px;">
        <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:10px; font-weight:700; letter-spacing:0.22em; color:#C9A84C; text-transform:uppercase;">The Field — Unlimited</div>
        <div style="font-family:Georgia,'Times New Roman',serif; font-style:italic; font-size:22px; color:#1A1612; margin-top:4px; line-height:1.25;">${escapeHtml(title)}</div>
        ${dateLine ? `<div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:11px; color:rgba(26,22,18,0.55); margin-top:6px; letter-spacing:0.04em;">${escapeHtml(dateLine)}</div>` : ""}
      </div>`;

  function unlimitedExportDocumentWrapper(innerHtml, displayName, subtitle) {
    const owner = displayName ? escapeHtml(displayName) + "'s" : "Your";
    const dateStr = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
    return `
      <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; color:#1A1612; background:#FFFFFF;">
        <div style="text-align:center; padding:24px 20px 28px;">
          <div style="font-size:10px; font-weight:700; letter-spacing:0.22em; color:#C9A84C; text-transform:uppercase;">Master Your Path</div>
          <div style="font-family:Georgia,'Times New Roman',serif; font-style:italic; font-size:30px; color:#1A1612; margin-top:10px; line-height:1.25;">${owner}<br/>Freedom Intelligence Field</div>
          <div style="font-size:13px; color:rgba(26,22,18,0.65); margin-top:14px;">${escapeHtml(subtitle)}</div>

        </div>

  function buildUnlimitedSingleChatExportHtml(session, messages, displayName) {
    const msgsHtml = (messages || []).map(unlimitedExportMessageBlock).join("");
    const emptyBlock = `<div style="text-align:center; color:rgba(26,22,18,0.55); padding:60px 20px; font-family:Georgia,'Times New Roman',serif; font-style:italic;">This conversation has no messages yet.</div>`;
    const inner = `
      <div style="padding-top:8px;">
        ${unlimitedExportChatHeader(session)}
        ${msgsHtml || emptyBlock}
      </div>`;
    return unlimitedExportDocumentWrapper(inner, displayName, "The Field — Unlimited");
  }

  function buildUnlimitedAllExportHtml(chats, displayName) {
    if (!chats || chats.length === 0) {
      const inner = `<div style="text-align:center; color:rgba(26,22,18,0.55); padding:60px 20px; font-family:Georgia,'Times New Roman',serif; font-style:italic;">No conversations recorded yet.</div>`;
      return unlimitedExportDocumentWrapper(inner, displayName, "The Field — Unlimited");
    }
    // Each chat gets its own page-break so they read as separate sections.
    // Pinned chats first, then recent — same ordering the sidebar uses.
    const ordered = chats.slice().sort((a, b) => {
      const ap = a.session && a.session.pinnedAt;
      const bp = b.session && b.session.pinnedAt;
      if (ap && !bp) return -1;
      if (!ap && bp) return 1;
      if (ap && bp) return new Date(bp).getTime() - new Date(ap).getTime();
      const aT = new Date((a.session && (a.session.lastMessageAt || a.session.startedAt)) || 0).getTime();
      const bT = new Date((b.session && (b.session.lastMessageAt || b.session.startedAt)) || 0).getTime();
      return bT - aT;
    });
    const sections = ordered.map((chat, i) => {
      const msgsHtml = (chat.messages || []).map(unlimitedExportMessageBlock).join("");
      if (!msgsHtml) return ""; // skip empty chats
      return `
        <div style="${i === 0 ? "" : "page-break-before:always;"} padding-top:${i === 0 ? "8px" : "20px"};">
          ${unlimitedExportChatHeader(chat.session)}
          ${msgsHtml}
        </div>`;
    }).join("");
    return unlimitedExportDocumentWrapper(sections, displayName, "The Field — Unlimited");
  }

  async function onExportUnlimitedChatClick(sessionId) {
    if (!state.sessionToken || !sessionId) return;
    const session = state.unlimitedSessions.find(s => s.id === sessionId);
    if (!session) return;
    state.openChatMenuId = null;
    state.openChatMenuOrigin = null;
    render();
    try {
      // If this is the currently active chat, use the in-memory messages so
      // the export reflects exactly what the user sees on screen (including
      // anything they just sent). Otherwise fetch fresh from the API.
      let messages;
      if (state.activeUnlimitedId === sessionId && state.unlimitedMessages.length > 0) {
        messages = state.unlimitedMessages;
      } else {
        const data = await apiLoadUnlimited(sessionId);
        messages = data.messages || [];
      }
      const htmlString = buildUnlimitedSingleChatExportHtml(session, messages, state.displayName);
      const safeTitle = String(session.title || "conversation").replace(/[^a-z0-9-_]+/gi, "-").replace(/^-+|-+$/g, "").toLowerCase();
      const dateSuffix = new Date().toISOString().slice(0, 10);
      const docTitle = "field-" + (safeTitle || "conversation") + "-" + dateSuffix;
      await downloadConversationPdf(htmlString, docTitle);
    } catch (err) {
      console.error("export_unlimited_chat_failed", err);
      alert("Could not export this conversation right now. Please try again in a moment.");
    }
  }

  async function onExportAllUnlimitedClick(e) {
    if (e && e.preventDefault) e.preventDefault();
    if (!state.sessionToken) return;
    if (!state.unlimitedSessions || state.unlimitedSessions.length === 0) {
      alert("No conversations to export yet. Start one first.");
      return;
    }
    const btn = e && e.currentTarget;
    const originalLabel = btn ? btn.innerHTML : null;
    if (btn) {
      btn.disabled = true;
      btn.innerHTML = "Preparing…";
    }
    try {
      // Fetch messages for every chat sequentially. This is intentionally
      // simple — for the typical user (5-30 chats) it completes in a few
      // seconds. If a future heavy user complains about wait time, we can
      // add a server-side "/api/unlimited/export-all" that returns
      // everything in one round-trip.
      const chats = [];
      for (const session of state.unlimitedSessions) {
        try {
          const data = await apiLoadUnlimited(session.id);
          chats.push({ session: Object.assign({}, session, data.session || {}), messages: data.messages || [] });
        } catch (err) {
          // Skip chats that fail to load rather than failing the whole export.
          console.warn("export_skip_chat", session.id, err && err.message);
        }
      }
      const htmlString = buildUnlimitedAllExportHtml(chats, state.displayName);
      const dateSuffix = new Date().toISOString().slice(0, 10);
      const docTitle = "field-unlimited-conversations-" + dateSuffix;
      await downloadConversationPdf(htmlString, docTitle);
    } catch (err) {
      console.error("export_all_unlimited_failed", err);
      alert("Could not export your conversations right now. Please try again in a moment.");
    } finally {
      if (btn && originalLabel != null) { btn.disabled = false; btn.innerHTML = originalLabel; }
    }
  }

  // Renders the "Complete Day X" affordance below the composer on the
  // Reset days. Shows only when:
  //   - User is preview-tier (Reset member)
  //   - Currently on Day 1/2/3
  //   - That day is NOT already marked complete (last_completed_day < day)
  //   - Not the demo / unlimited path
  // Clicking it bumps last_completed_day server-side, fires the day_completed
  // webhook to GHL, and instantly unlocks the next day (whichever-first logic).
  function renderCompleteDayBar() {
    if (state.tier !== "preview") return "";
    const day = Number(state.currentDay || 0);
    if (![1, 2, 3].includes(day)) return "";
    const lastCompleted = Number(state.lastCompletedDay || 0);
    if (lastCompleted >= day) return ""; // already done
    const labels = { 1: "State Reset", 2: "Decision & Action", 3: "Frequency Calibration" };
    // Make the tradeoff explicit — completing the day fast-tracks the next
    // one, skipping the intentional 24h pause. Members who don't want that
    // can simply not press this button and wait for the natural unlock.
    const next = day < 3
      ? `This opens Day ${day + 1} immediately, skipping the 24h pause between days.`
      : "You've completed the full Reset.";
    return `
      <div class="complete-day-bar" id="complete-day-bar">
        <div class="complete-day-text">
          <strong>Finished Day ${day} — ${labels[day]}?</strong>
          <span>${next}</span>
        </div>
        <button type="button" class="complete-day-btn" id="complete-day-btn-${day}" data-day="${day}">Complete Day ${day} →</button>
      </div>
    `;
  }

  // Fast-track tip — banner that appears at the top of Day 2 or Day 3
  // when the member got there via the Complete Day button BEFORE the
  // natural 24h clock. Meant to say: "yes you can move fast, but the
  // pause was there on purpose — you can also close this and come back
  // tomorrow if you'd rather let Day X settle." Dismissable per day.
  //
  // Fast-track detection: the natural unlock moment for the current day
  // is first_login_at + (dayNum - 1) * 24h. If that moment is still in
  // the future, they got here via completion (not by waiting).
  function renderFastTrackTip() {
    if (state.tier !== "preview") return "";
    const day = Number(state.currentDay || 0);
    if (![2, 3].includes(day)) return ""; // Day 1 has nothing to skip
    if (!state.firstLoginAt) return "";
    const naturalUnlockMs = new Date(state.firstLoginAt).getTime() + (day - 1) * 24 * 60 * 60 * 1000;
    if (naturalUnlockMs <= Date.now()) return ""; // clock already passed, they didn't fast-track
    // Per-day dismiss so it doesn't nag once acknowledged
    try {
      if (localStorage.getItem(`tfif_fasttrack_dismissed_day${day}`) === "1") return "";
    } catch (_) { /* private mode etc — show it */ }
    const labels = { 2: "Decision & Action", 3: "Frequency Calibration" };
    return `
      <div class="fasttrack-tip" data-fasttrack-day="${day}">
        <div class="fasttrack-tip-body">
          <strong>You opened Day ${day} early.</strong>
          <span>The 24h pause between days is optional but recommended — it lets what shifted actually settle. If you'd rather come back tomorrow, close this and return when you're ready. Day ${day} — ${labels[day]} — will still be here.</span>
        </div>

    `;
  }
  // Dismiss handler — remembers per-day so it doesn't reappear.

    const btn = e.target.closest("[data-fasttrack-close]");
    if (!btn) return;
    const day = btn.getAttribute("data-fasttrack-close");
    try { localStorage.setItem(`tfif_fasttrack_dismissed_day${day}`, "1"); } catch (_) {}
    const banner = btn.closest(".fasttrack-tip");
    if (banner) banner.remove();
  });

  // Wire up the Complete Day button(s) — delegated so the listener
  // survives re-renders of the chat area.
  document.body.addEventListener("click", async (e) => {
    const btn = e.target.closest(".complete-day-btn");
    if (!btn) return;
    const day = Number(btn.dataset.day || 0);
    if (![1, 2, 3].includes(day)) return;
    if (btn.disabled) return;
    btn.disabled = true;
    btn.textContent = "Saving…";
    let httpStatus = 0;
    let serverError = null;
    try {
      const token = localStorage.getItem(STORAGE_KEY);
      if (!token) {
        alert("Your session expired. Refresh the page and log in again to save your progress.");
        btn.disabled = false;
        btn.textContent = `Complete Day ${day} →`;
        return;
      }
      const r = await fetch("/api/complete-day", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-session-token": token,
        },
        body: JSON.stringify({ day }),
      });
      httpStatus = r.status;
      const data = await r.json().catch(() => ({}));
      serverError = data && data.error;
      if (!r.ok) throw new Error(serverError || `http_${httpStatus}`);
      // Update state with fresh values from server
      state.lastCompletedDay = data.last_completed_day;
      state.currentDay = data.current_day;
      state.dayUnlocks = data.day_unlocks || state.dayUnlocks;
      // Re-render so the button disappears + sidebar reflects the new unlock
      if (typeof render === "function") render();
    } catch (err) {
      console.warn("complete_day_failed", { status: httpStatus, error: serverError, err: err && err.message });
      btn.disabled = false;
      btn.textContent = `Complete Day ${day} →`;
      // Show a specific, actionable message based on what actually
      // failed. Session issues (401) tell them exactly what to do.
      // Server errors surface the reason so support can see it in a
      // screenshot. Network / offline gets a distinct message.
      if (httpStatus === 401 || serverError === "unauthorized") {
        alert("Your session expired. Refresh the page and log in again to save your progress.");
      } else if (httpStatus === 400 && serverError === "invalid_day") {
        alert("Something went wrong with the day tracker. Refresh the page and try again.");
      } else if (httpStatus === 0) {
        alert("You seem to be offline. Check your internet connection and try again.");
      } else if (httpStatus >= 500) {
        alert("The Field's servers are having a moment. Please try again in 30 seconds. If this keeps happening, tell support and share this code: " + (serverError || "server_" + httpStatus) + ".");
      } else {
        alert("Couldn't save right now. Please try again in a moment. Error: " + (serverError || "http_" + httpStatus));
      }
    }
  });

  function formatRelativeTime(iso) {
    if (!iso) return "";
    const t = new Date(iso); const now = new Date();
    const diffMs = now - t; const diffMin = Math.floor(diffMs / 60000); const diffHr = Math.floor(diffMs / 3600000); const diffDay = Math.floor(diffMs / 86400000);
    if (diffMin < 2) return "Just now";
    if (diffMin < 60) return diffMin + "m ago";
    if (diffHr < 24) return diffHr + "h ago";
    if (diffDay < 7) return diffDay + "d ago";
    return t.toLocaleDateString();
  }

      const loginParticlesHtml = (function () {
        const anims = ['drift-1', 'drift-2', 'drift-3', 'pulse'];

            '" style="top:' + top + '%;left:' + left + '%;width:' + size +

              </div>
              <div class="composer-note">Your conversation is private. No one else has access to it.</div>
              ${renderFastTrackTip()}
              ${renderCompleteDayBar()}
            </div>
          </main>
        </div>
        ${renderMobileOverlay()}
        ${renderAccountModal()}
        ${renderDeleteConfirmModal()}
        ${renderRenameModal()}
        ${renderFloatingChatMenu()}
        ${renderInstallModal()}
        ${renderNotifPromptModal()}
      `;
      renderUnlimitedMessages();
      document.getElementById("input").addEventListener("input", onInputChange);
      document.getElementById("input").addEventListener("keydown", onUnlimitedKeyDown);
      document.getElementById("send-btn").addEventListener("click", onUnlimitedSendClick);
      const micBtn = document.getElementById("mic-btn");
      if (micBtn) {
        if (!micSupported()) micBtn.style.display = "none";
        else micBtn.addEventListener("click", onMicClick);
      }
      const messagesWrap = document.getElementById("messages-wrap");
      if (messagesWrap) messagesWrap.addEventListener("click", onUnlimitedSpeakerClick);
      restoreDraftIntoInput();
      setTimeout(() => { if (!state.searchOpen) document.getElementById("input")?.focus(); }, 50);
      }
    }

    // Wire up controls present in every view.
    const themeBtn = document.getElementById("theme-toggle");
    if (themeBtn) themeBtn.addEventListener("click", onThemeToggle);
    const fontSmallerBtn = document.getElementById("font-smaller");
    if (fontSmallerBtn) fontSmallerBtn.addEventListener("click", onFontSmaller);
    const fontLargerBtn = document.getElementById("font-larger");
    if (fontLargerBtn) fontLargerBtn.addEventListener("click", onFontLarger);
    const resetBtn = document.getElementById("reset-btn");
    if (resetBtn) resetBtn.addEventListener("click", onReset);
    const autoplayCheckbox = document.getElementById("autoplay-checkbox");
    if (autoplayCheckbox) autoplayCheckbox.addEventListener("change", onAutoplayChange);
    // Day items should be clickable in ANY view (entry, chat, unlimited-chat)
    // so users can navigate freely between days and Unlimited.
    document.querySelectorAll(".day-item").forEach(el => {
      el.addEventListener("click", () => onDayClick(parseInt(el.dataset.day, 10)));
    });

    // ===== Mobile chrome wiring =====
    const mobileMenuBtn = document.getElementById("mobile-menu-btn");
    if (mobileMenuBtn) mobileMenuBtn.addEventListener("click", onMobileMenuClick);
    const mobileThemeBtn = document.getElementById("mobile-theme-btn");
    if (mobileThemeBtn) mobileThemeBtn.addEventListener("click", onThemeToggle);
    const mobileExportBtn = document.getElementById("mobile-export-btn");
    if (mobileExportBtn) mobileExportBtn.addEventListener("click", onExportWorkClick);
    const mobileOverlay = document.getElementById("mobile-overlay");
    if (mobileOverlay) mobileOverlay.addEventListener("click", onMobileOverlayClick);
    const mobileNewChat = document.getElementById("mobile-new-chat-btn");
    if (mobileNewChat) mobileNewChat.addEventListener("click", onNewChatClick);
    document.querySelectorAll(".mobile-day-chip").forEach(el => {
      el.addEventListener("click", () => onDayClick(parseInt(el.dataset.mobileDay, 10)));
    });
    document.querySelectorAll(".mobile-tab").forEach(el => {
      el.addEventListener("click", () => onMobileTabClick(el.dataset.mobileTab));
    });
    // Unlimited sidebar wires (present whenever sidebar is rendered).
    const newChatBtn = document.getElementById("new-chat-btn");
    if (newChatBtn) newChatBtn.addEventListener("click", onNewChatClick);
    const magBtn = document.getElementById("magnifier-btn");
    if (magBtn) magBtn.addEventListener("click", onMagnifierClick);
    const processMenuBtn = document.getElementById("process-menu-btn");
    if (processMenuBtn) processMenuBtn.addEventListener("click", onProcessMenuToggle);
    // Dropdown items are now CATEGORIES (data-category) — clicking one opens
    // the category view in the main pane. Process selection happens there,
    // on a card click that fires onProcessPick.
    document.querySelectorAll(".process-menu-category").forEach(el => {
      el.addEventListener("click", () => onCategoryClick(el.dataset.category));
    });
    const logoutBtn = document.getElementById("logout-btn");
    if (logoutBtn) logoutBtn.addEventListener("click", onLogout);
    const accountBtn = document.getElementById("account-btn");
    if (accountBtn) accountBtn.addEventListener("click", onAccountOpen);
    // Notifications bell — opens the inbox panel and auto-marks-as-read.
    const notifBtn = document.getElementById("notif-btn");
    if (notifBtn) notifBtn.addEventListener("click", onNotifBellClick);
    const notifClose = document.getElementById("notif-panel-close");
    if (notifClose) notifClose.addEventListener("click", closeNotifPanel);
    // ===== Account modal wiring (only present when state.accountMenuOpen) =====
    const acctOverlay = document.getElementById("acct-overlay");
    if (acctOverlay) {
      acctOverlay.addEventListener("click", (e) => {
        // Click on the overlay backdrop (not the modal itself) closes it.
        if (e.target === acctOverlay) onAccountClose();
      });
    }
    const acctCloseBtn = document.getElementById("acct-close-btn");
    if (acctCloseBtn) acctCloseBtn.addEventListener("click", onAccountClose);
    const acctNameForm = document.getElementById("acct-name-form");
    if (acctNameForm) acctNameForm.addEventListener("submit", onAccountSaveName);
    const acctSignoutBtn = document.getElementById("acct-signout-btn");
    if (acctSignoutBtn) acctSignoutBtn.addEventListener("click", () => {
      // Close the modal first so the confirm dialog isn't behind the overlay.
      state.accountMenuOpen = false;
      onLogout();
    });
    const acctExportBtn = document.getElementById("acct-export-btn");
    if (acctExportBtn) acctExportBtn.addEventListener("click", onExportWorkClick);
    const acctExportUnlimitedBtn = document.getElementById("acct-export-unlimited-btn");
    if (acctExportUnlimitedBtn) acctExportUnlimitedBtn.addEventListener("click", onExportAllUnlimitedClick);
    const acctInstallBtn = document.getElementById("acct-install-btn");
    if (acctInstallBtn) acctInstallBtn.addEventListener("click", onInstallOpen);
    // Preferences → Day 2 & 3 reminders card. Only clickable when permission
    // is in the default state (never asked). When granted, the card displays
    // a confirmation pill. When denied, the desc points to browser settings.
    // Both terminal states bind no click — prevents the "tapped, nothing
    // happened" mobile bug from the previous attached-but-no-op handler.
    // The toggle is the new single source of truth for ON/OFF state. Click
    // anywhere on it (or press space/enter while focused) to flip.
    const prefNotifToggle = document.getElementById("pref-notif-toggle");
    if (prefNotifToggle) {
      prefNotifToggle.addEventListener("click", onPushTogglePress);
      prefNotifToggle.addEventListener("keydown", (e) => {
        if (e.key === " " || e.key === "Enter") {
          e.preventDefault();
          onPushTogglePress();
        }
      });
    }
    // Refresh the server-side subscription state for THIS account, then
    // paint the toggle. This is the fix for the bug where a different
    // logged-in account showed "Enabled" because the browser permission was
    // still granted from the previous account.
    updatePushButtonState();
    refreshPushServerState().then(updatePushButtonState);
    // Sidebar "Add to Home Screen" button — same install modal popup.
    const sidebarInstallBtn = document.getElementById("sidebar-install-btn");
    if (sidebarInstallBtn) sidebarInstallBtn.addEventListener("click", onInstallOpen);
    // Notification opt-in pre-prompt modal buttons
    const notifAcceptBtn = document.getElementById("notif-accept-btn");
    if (notifAcceptBtn) notifAcceptBtn.addEventListener("click", onNotifPromptAccept);
    const notifDismissBtn = document.getElementById("notif-dismiss-btn");
    if (notifDismissBtn) notifDismissBtn.addEventListener("click", onNotifPromptDismiss);
    // Install modal overlay click + close button
    const installOverlay = document.getElementById("install-overlay");
    if (installOverlay) {
      installOverlay.addEventListener("click", (e) => {
        if (e.target === installOverlay) onInstallClose();
      });
    }
    const installCloseBtn = document.getElementById("install-close-btn");
    if (installCloseBtn) installCloseBtn.addEventListener("click", onInstallClose);
    const unlSearch = document.getElementById("unl-search-input");
    if (unlSearch) {
      // Update ONLY the chat list as the user types — full render would
      // re-create the chat textarea and steal focus away from this input.
      unlSearch.addEventListener("input", (e) => {
        state.searchQuery = e.target.value;
        renderUnlimitedChatList();
      });
      if (state.searchOpen && document.activeElement !== unlSearch) {
        setTimeout(() => unlSearch.focus(), 30);
      }
    }
    wireUnlimitedChatItems();
    wireResetSectionToggle();
    wireChatMenus();
    wireDeleteConfirm();
    wireRenameModal();
    wireOutsideMenuClose();
  }

  // Generate the inner HTML of the .unl-chat-list container. Single
  // source of truth for the conversation list rendering — used by both
  // the initial sidebar template render and the partial-render path
  // (renderUnlimitedChatList) that fires on every search keystroke
  // without destroying the input field.
  function buildUnlimitedChatListHtml() {
    const filtered = state.searchQuery
      ? state.unlimitedSessions.filter(s => (s.title || "").toLowerCase().includes(state.searchQuery.toLowerCase()))
      : state.unlimitedSessions;
    if (filtered.length === 0) {
      return '<div class="unl-chat-empty">' + (state.searchQuery ? "No matches." : "No conversations yet.") + '</div>';
    }
    const pinned = filtered.filter(s => !!s.pinnedAt);
    const recent = filtered.filter(s => !s.pinnedAt);
    const renderItem = (s) => {
      const isActive = s.id === state.activeUnlimitedId;
      return `
        <div class="unl-chat-item ${isActive ? "active" : ""} ${s.pinnedAt ? "pinned" : ""}" data-unl-id="${s.id}">
          ${s.pinnedAt ? '<span class="unl-chat-pin" aria-hidden="true">' + pinIconSvg() + '</span>' : ""}
          <div class="unl-chat-body">
            <div class="unl-chat-title">${escapeHtml(s.title || "New chat")}</div>
            <div class="unl-chat-time">${escapeHtml(formatRelativeTime(s.lastMessageAt || s.startedAt))}</div>
          </div>
          <button class="unl-chat-menu-btn" data-chat-menu-id="${s.id}" data-chat-menu-origin="sidebar" type="button" aria-label="Chat options">
            ${dotsIconSvg()}
          </button>
        </div>
      `;
    };
    let html = "";
    if (pinned.length > 0) {
      html += '<div class="unl-chat-section-label">PINNED</div>';
      html += pinned.map(renderItem).join("");
    }
    if (recent.length > 0) {
      if (pinned.length > 0) html += '<div class="unl-chat-section-label">RECENT</div>';
      html += recent.map(renderItem).join("");
    }
    return html;
  }

  // Re-render just the .unl-chat-list section. Used by search input changes
  // so the search input keeps focus while the list filters live.
  //
  // Bug history: previously this called full render() on every keystroke,
  // which destroyed and re-created the search input element. On desktop
  // that lost the cursor position; on mobile it dismissed the keyboard
  // and the input "jumped" away from the user mid-type. The user gave
  // up trying to search because they couldn't keep typing.
  //
  // Now we do a true partial render — innerHTML swap on just the chat
  // list container, then re-wire the click handlers on the new items.
  // Falls back to full render() only when interactive UI is mounted
  // inside the list (rename in progress, menu open) and the partial
  // swap would unmount it mid-interaction.
  function renderUnlimitedChatList() {
    if (state.openChatMenuId || state.renamingChatId) {
      render();
      return;
    }
    const listEl = document.querySelector(".unl-chat-list");
    if (!listEl) {
      // List container missing for whatever reason — fall back to full
      // render to recover. Should be rare.
      render();
      return;
    }
    listEl.innerHTML = buildUnlimitedChatListHtml();
    // Click handlers on the new <div class="unl-chat-item"> nodes need
    // to be re-bound since innerHTML replaced them.
    wireUnlimitedChatItems();
    wireChatMenus();
  }

  function wireUnlimitedChatItems() {
    document.querySelectorAll(".unl-chat-item").forEach(el => {
      el.addEventListener("click", (e) => {
        // Ignore clicks on the menu button, floating dropdown, or anywhere
        // inside the editable title while a rename is in progress.
        if (e.target.closest('[data-chat-menu-id]')) return;
        if (e.target.closest('[data-menu-dropdown]')) return;
        if (e.target.closest('.unl-chat-title.editing')) return;
        // Skip entirely when this chat is being renamed — prevents any
        // accidental navigation while the user is editing.
        if (state.renamingChatId === el.dataset.unlId) return;
        onUnlimitedChatClick(el.dataset.unlId);
      });
      // Long-press for mobile: 500ms hold opens the menu
      let pressTimer = null;
      el.addEventListener("touchstart", (e) => {
        if (e.target.closest('[data-chat-menu-id]')) return;
        if (e.target.closest('.unl-chat-title.editing')) return;
        if (state.renamingChatId === el.dataset.unlId) return;
        const chatId = el.dataset.unlId;
        pressTimer = setTimeout(() => {
          onChatMenuToggle(chatId, "sidebar");
          if (navigator.vibrate) navigator.vibrate(10);
        }, 500);
      }, { passive: true });
      const cancelPress = () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } };
      el.addEventListener("touchend", cancelPress);
      el.addEventListener("touchmove", cancelPress);
      el.addEventListener("touchcancel", cancelPress);
    });
  }

  // Reset section collapse/expand toggle (Unlimited members only)
  function wireResetSectionToggle() {
    const btn = document.getElementById("reset-section-toggle");
    if (btn) btn.addEventListener("click", onResetSectionToggle);
  }

  // 3-dot menu buttons (both sidebar and header) and their dropdown items
  function wireChatMenus() {
    document.querySelectorAll("[data-chat-menu-id]").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = btn.dataset.chatMenuId;
        const origin = btn.dataset.chatMenuOrigin || "sidebar";
        // Pass the button itself so positioning math uses its rect even
        // when the click bubbles from an inner SVG and currentTarget shifts.
        onChatMenuToggle(id, origin, e, btn);
      });
    });
    document.querySelectorAll("[data-menu-action]").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        e.preventDefault();
        const action = btn.dataset.menuAction;
        const id = btn.dataset.chatId;
        if (action === "rename") onChatRenameStart(id);
        else if (action === "pin") onChatPinToggle(id, true);
        else if (action === "unpin") onChatPinToggle(id, false);
        else if (action === "export") onExportUnlimitedChatClick(id);
        else if (action === "delete") onChatDeleteRequest(id);
      });
    });
  }

  // Rename modal wiring. Enter saves, Escape cancels, click on the dim
  // backdrop closes without saving.
  function wireRenameModal() {
    if (!state.renamingChatId) return;
    const overlay = document.getElementById("rename-overlay");
    const input = document.getElementById("rename-modal-input");
    const form = document.getElementById("rename-form");
    const cancelBtn = document.getElementById("rename-cancel-btn");
    const chatId = state.renamingChatId;
    if (overlay) {
      overlay.addEventListener("click", (e) => {
        if (e.target === overlay) onChatRenameCancel();
      });
    }
    if (cancelBtn) cancelBtn.addEventListener("click", onChatRenameCancel);
    if (input) {
      input.addEventListener("input", (e) => { state.renamingChatDraft = e.target.value; });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Escape") { e.preventDefault(); onChatRenameCancel(); }
      });
    }
    if (form) {
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const value = input ? input.value : state.renamingChatDraft;
        onChatRenameSubmit(chatId, value);
      });
    }
  }

  // Delete confirmation modal wiring
  function wireDeleteConfirm() {
    const overlay = document.getElementById("delete-confirm-overlay");
    if (overlay) {
      overlay.addEventListener("click", (e) => {
        if (e.target === overlay) onChatDeleteCancel();
      });
    }
    const cancelBtn = document.getElementById("delete-cancel-btn");
    if (cancelBtn) cancelBtn.addEventListener("click", onChatDeleteCancel);
    const confirmBtn = document.getElementById("delete-confirm-btn");
    if (confirmBtn) confirmBtn.addEventListener("click", onChatDeleteConfirm);
  }

  // Click anywhere outside an open menu closes it
  function wireOutsideMenuClose() {
    if (!state.openChatMenuId) return;
    const handler = (e) => {
      if (e.target.closest('[data-chat-menu-id]')) return;
      if (e.target.closest('[data-menu-dropdown]')) return;
      closeAllChatMenus();
      document.removeEventListener("click", handler);
    };
    // Attach on the next tick so the click that opened the menu doesn't
    // immediately close it.
    setTimeout(() => document.addEventListener("click", handler), 50);
  }

  // Skeleton placeholder shown while a chat's messages stream in. Widths
  // vary to feel like incoming paragraphs rather than a static block.
  function renderSkeletonLoading() {
    return `
      <div class="chat-loading" aria-label="Loading conversation" role="status">
        <div class="skeleton-line skel-title" style="width: 32%"></div>
        <div class="skeleton-line" style="width: 88%"></div>
        <div class="skeleton-line" style="width: 94%"></div>
        <div class="skeleton-line" style="width: 76%"></div>
        <div class="skeleton-line" style="width: 64%"></div>
        <div class="skeleton-line skel-gap" style="width: 70%"></div>
        <div class="skeleton-line" style="width: 86%"></div>
        <div class="skeleton-line" style="width: 80%"></div>
        <div class="skeleton-line" style="width: 50%"></div>
      </div>
    `;
  }

  // Render the Category view in the main pane. Shows the active category's
  // title, tagline, and process cards. Real processes are buttons that fire
  // onProcessPick(processKey) to start a guided chat — same flow as the old
  // dropdown. Coming-soon entries render as static, dimmed cards.
  function renderCategoryView() {
    const category = PROCESS_CATEGORIES.find(c => c.key === state.activeCategoryKey) || PROCESS_CATEGORIES[0];
    if (!category) return "";
    // Same deterministic gold-particle scatter as the Welcome + Library views
    // so every space in the Field feels like the same living field. Seed
    // varies by category key so no two categories have the same twinkle
    // pattern, but any given category always looks the same to the member.
    const categoryParticlesHtml = (function () {
      const anims = ['drift-1', 'drift-2', 'drift-3', 'pulse'];
      const parts = [];
      const seed = (category.key || '').split('').reduce((s, ch) => s + ch.charCodeAt(0), 0) || 7;
      for (let i = 0; i < 25; i++) {
        const top = 4 + ((i * 137 + 11 + seed) % 92);
        const left = 4 + ((i * 251 + 40 + seed * 3) % 92);
        const size = 4 + ((i * 3 + seed) % 7);
        const cls = anims[i % 4];
        const delay = -((i * 1.3) % 12).toFixed(1);
        parts.push(
          '<span class="welcome-particle ' + cls +
          '" style="top:' + top + '%;left:' + left + '%;width:' + size +
          'px;height:' + size + 'px;animation-delay:' + delay + 's;"></span>'
        );
      }
      return parts.join('');
    })();
    const cards = category.processes.map(p => {
      if (p.comingSoon) {
        return `
          <div class="category-card category-card--coming-soon">
            <div class="category-card-eyebrow">Coming Soon</div>
            <div class="category-card-title">${escapeHtml(p.name)}</div>
          </div>
        `;
      }
      return `
        <button class="category-card" data-process="${p.processKey}" type="button">
          <div class="category-card-eyebrow">${p.steps} Steps · ${escapeHtml(p.time)}</div>
          <div class="category-card-title">${escapeHtml(p.name)}</div>
          <div class="category-card-desc">${escapeHtml(p.desc)}</div>
          <span class="category-card-arrow" aria-hidden="true">→</span>
        </button>
      `;
    }).join("");
    return `
      <main class="main category-main">
        <div class="category-view">
          <button class="category-back-btn" id="category-back-btn" type="button">
            <span class="category-back-btn-arrow" aria-hidden="true">←</span>
            <span>Back to all categories</span>
          </button>
          <div class="category-eyebrow">A Category of The Field</div>
          <h1 class="category-title">${escapeHtml(category.name)}</h1>
          <div class="category-divider"></div>
          <div class="category-tagline">${escapeHtml(category.tagline)}</div>
          <div class="category-grid">${cards}</div>
          <div class="category-footer">Choose a process to begin · the Field will guide you from there.</div>
        </div>
      </main>
    `;
  }

  // Render the Library Hub view — all 8 categories shown together as cards.
  // This is what the Welcome view's "Open a guided process" button lands on
  // (previously it dropped straight into a single category, which felt like
  // skipping the introduction). Clicking a card from here drills into that
  // category's detail page via onCategoryClick(key).
  function renderLibraryView() {
    // Deterministic gold-particle scatter matching the Welcome pane — 25
    // particles spread by a small hash across the full main area, four
    // animation profiles cycled by index, negative delays desync loops.
    const libraryParticlesHtml = (function () {
      const anims = ['drift-1', 'drift-2', 'drift-3', 'pulse'];
      const parts = [];
      for (let i = 0; i < 25; i++) {
        const top = 4 + ((i * 137 + 11) % 92);
        const left = 4 + ((i * 251 + 40) % 92);
        const size = 4 + ((i * 3) % 7);
        const cls = anims[i % 4];
        const delay = -(i * 1.3).toFixed(1);
        parts.push(
          '<span class="welcome-particle ' + cls +
          '" style="top:' + top + '%;left:' + left + '%;width:' + size +
          'px;height:' + size + 'px;animation-delay:' + delay + 's;"></span>'
        );
      }
      return parts.join('');
    })();
    const cards = PROCESS_CATEGORIES.map(c => {
      const builtCount = c.processes.filter(p => !p.comingSoon).length;
      const totalCount = c.processes.length;
      const allComingSoon = builtCount === 0;
      const footer = allComingSoon
        ? `<div class="library-card-meta library-card-meta--coming-soon">COMING SOON</div>`
        : `<div class="library-card-meta">${totalCount} ${totalCount === 1 ? "PROCESS" : "PROCESSES"}</div>
           <div class="library-card-arrow" aria-hidden="true">→</div>`;
      const tag = allComingSoon ? "div" : "button";
      const attrs = allComingSoon
        ? `class="library-card library-card--coming-soon"`
        : `class="library-card" data-category="${c.key}" type="button"`;
      return `
        <${tag} ${attrs}>
          <div class="library-card-head">
            <div class="library-card-icon">${categoryIconSvg(c.key)}</div>
            <div class="library-card-title">${escapeHtml(c.name)}</div>
          </div>
          <div class="library-card-desc">${escapeHtml(c.hubDesc || c.tagline || "")}</div>
          <div class="library-card-footer">${footer}</div>
        </${tag}>
      `;
    }).join("");
    return `
      <main class="main library-main">
        <div class="library-view">
          <div class="library-eyebrow">The Field Library</div>
          <h1 class="library-title">Start a guided process</h1>
          <div class="library-divider"></div>
          <div class="library-tagline">Each one is a calibrated pathway. Choose the work that meets you where you are.</div>
          <div class="library-grid">${cards}</div>
          <div class="library-footer">Choose a category to see the processes inside.</div>
        </div>
      </main>
    `;
  }

  function renderMessages() {
    const wrap = document.getElementById("messages");
    if (!wrap) return;
    // Empty + loading = switched into a chat whose messages haven't arrived
    // yet. Render skeleton lines that mimic paragraph shapes so the wait
    // reads as "content filling in" rather than "stuck".
    if (state.loading && state.messages.length === 0) {
      wrap.innerHTML = renderSkeletonLoading();
      return;
    }
    let html = state.messages.map((m, i) => {
      if (m.role === "user") {
        return `
          <div class="msg-row ${m.role}">
            <div class="msg">${renderUserMessage(m.content)}</div>
          </div>
        `;
      }
      return `
        <div class="msg-row ${m.role}">
          <div class="msg">${renderMarkdown(m.content)}</div>
          <button class="speak-btn" data-msg-index="${i}" type="button" aria-label="Play in Shimrit's voice" title="Play in Shimrit's voice">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M3 9v6h4l5 5V4L7 9H3z"/>
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
              <path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          </button>
        </div>
      `;
    }).join("");
    if (state.loading) {
      html += `
        <div class="msg-row assistant">
          <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
      `;
    }
    // Prepend the expired banner at the top of the conversation so the
    // participant sees the locked state immediately on load. The full
    // conversation stays visible underneath so they can re-read and
    // export it from the Account modal.
    if (isResetExpired()) {
      html = renderExpiredBanner() + html;
    }
    wrap.innerHTML = html;
    const wrapper = document.getElementById("messages-wrap");
    if (wrapper) wrapper.scrollTop = wrapper.scrollHeight;
    // Scan any newly rendered [[mp3:...]] cards and start audio generation.
    processMp3Cards();
  }

  // ===== Mobile chrome handlers =====
  // Toggle the drawer by mutating classes on the existing DOM nodes — calling
  // render() would replace the sidebar element, and the browser only animates
  // CSS transitions on elements that already exist when a property changes.
  function onMobileMenuClick() {
    state.mobileDrawerOpen = true;
    const sidebar = document.querySelector(".sidebar");
    const overlay = document.getElementById("mobile-overlay");
    if (sidebar) sidebar.classList.add("mobile-open");
    if (overlay) overlay.classList.add("open");
  }
  function onMobileOverlayClick() {
    state.mobileDrawerOpen = false;
    const sidebar = document.querySelector(".sidebar");
    const overlay = document.getElementById("mobile-overlay");
    if (sidebar) sidebar.classList.remove("mobile-open");
    if (overlay) overlay.classList.remove("open");
  }
  // Bottom-tab navigation. Reset → switch to current day's Reset chat.
  // Unlimited → open the most recent chat, or start a new one if none exist.
  function onMobileTabClick(tab) {
    state.mobileDrawerOpen = false; // close drawer if it happened to be open
    if (tab === "reset") {
      if (state.view === "chat") { render(); return; }
      onDayClick(state.currentDay || 1);
      return;
    }
    if (tab === "unlimited") {
      if (!unlimitedUnlocked()) { state.view = "unlimited-chat"; render(); return; }
      if (state.view === "unlimited-chat") { render(); return; }
      if (state.unlimitedSessions.length > 0) {
        onUnlimitedChatClick(state.unlimitedSessions[0].id);
      } else {
        onNewChatClick();
      }
    }
  }

  // ===== Handlers =====
  function onThemeToggle() {
    const current = document.documentElement.getAttribute("data-theme") || "dark";
    const next = current === "dark" ? "light" : "dark";
    applyTheme(next);
    render();
  }

  // ===== Login (email + 6-digit code) =====
  function loginErrorMessage(code) {
    switch (code) {
      case "not_a_member":
        return "We couldn't find a Master Your Path membership for that email. Use the email from your purchase.";
      case "too_many_requests":
        return "Too many code requests. Please wait a few minutes, then try again.";
      case "too_many_attempts":
        return "Too many incorrect tries. Request a new code.";
      case "wrong_code":
        return "That code isn't right. Check your email and try again.";
      case "code_expired":
        return "That code has expired. Request a new one.";
      case "invalid_email":
        return "Please enter a valid email address.";
      default:
        return "Something went wrong. Please try again in a moment.";
    }
  }

  async function onRequestCode(e) {
    if (e) e.preventDefault();
    if (state.loginLoading) return;
    const input = document.getElementById("login-email-input");
    const email = ((input && input.value) || "").trim().toLowerCase();
    if (!email) return;
    state.loginEmail = email;
    state.loginError = "";
    state.loginLoading = true;
    render();
    try {
      await apiRequestCode(email);
      state.loginLoading = false;
      state.loginStep = "code";
      render();
    } catch (err) {
      state.loginLoading = false;
      state.loginError = loginErrorMessage(err && err.message);
      render();
    }
  }

  async function onVerifyCode(e) {
    if (e) e.preventDefault();
    if (state.loginLoading) return;
    const input = document.getElementById("login-code-input");
    const code = ((input && input.value) || "").trim();
    if (!/^[0-9]{6}$/.test(code)) {
      state.loginError = "Enter the 6-digit code from your email.";
      render();
      return;
    }
    state.loginError = "";
    state.loginLoading = true;
    render();
    try {
      const data = await apiVerifyCode(state.loginEmail, code);
      state.sessionToken = data.sessionToken;
      saveToken(data.sessionToken);
      state.tier = data.tier || "preview";
      state.subscriptionPlan = data.subscriptionPlan || null;
      // Match the loadFullState rule: collapsed for full, expanded for preview.
      state.resetSectionExpanded = state.tier !== "full";
      state.dayUnlocks = data.dayUnlocks || state.dayUnlocks;
      state.firstLoginAt = data.firstLoginAt || null;
      state.previewEndsAt = data.previewEndsAt || null;
      state.displayName = data.displayName || "";
      state.userEmail = data.email || state.loginEmail || "";
      state.timeRemainingMs = data.timeRemainingMs;
      state.loginLoading = false;
      state.loginStep = "email";
      state.loginError = "";
      loadFullState().then(() => loadUnlimitedSessions().then(() => {
        render();
        // Fresh login — check whether to surface the notification opt-in,
        // and self-heal any stale push subscription state.
        maybeShowNotifPrompt();
        syncPushSubscription();
        // Pull the inbox so the bell badge shows the unread count from
        // the very first paint. Errors are swallowed inside.
        fetchNotifications();
      }));
    } catch (err) {
      state.loginLoading = false;
      state.loginError = loginErrorMessage(err && err.message);
      render();
    }
  }

  function onLoginBack() {
    state.loginStep = "email";
    state.loginError = "";
    state.loginLoading = false;
    state.loginResendStatus = "";
    state.loginResendError = "";
    render();
  }
  // Resend the 6-digit code to the same email that was used for the original
  // request. Used when the member doesn't receive the first code (delayed
  // delivery, spam folder, etc.). The backend rate-limits at 4 per 15 minutes
  // per email; if the user hits that, we surface the friendly error inline.
  // We deliberately do NOT add a client-side cooldown so the user can resend
  // again right away if they wanted (and the backend lets them). The button
  // briefly shows a confirmation, then returns to idle.
  async function onResendCode() {
    if (!state.loginEmail || state.loginResendStatus === "sending") return;
    state.loginResendStatus = "sending";
    state.loginResendError = "";
    render();
    try {
      await apiRequestCode(state.loginEmail);
      state.loginResendStatus = "sent";
      render();
      // Auto-clear the confirmation after a moment so the button is ready
      // for another use if the new code also doesn't arrive.
      setTimeout(() => {
        if (state.loginResendStatus === "sent") {
          state.loginResendStatus = "";
          render();
        }
      }, 4000);
    } catch (err) {
      state.loginResendStatus = "";
      state.loginResendError = loginErrorMessage(err && err.message);
      render();
    }
  }

  // ===== Notifications inbox =====
  // Fetches the user's notification feed, renders the panel, and tracks
  // unread count for the bell badge. Auto-marks-as-read on panel open.
  let notifState = { items: [], unreadCount: 0, lastFetchAt: 0 };

  async function fetchNotifications() {
    if (!state.sessionToken) return;
    try {
      const r = await fetch("/api/notifications", {
        headers: { "x-session-token": state.sessionToken },
      });
      if (!r.ok) return;
      const data = await r.json();
      notifState.items = data.notifications || [];
      notifState.unreadCount = data.unreadCount || 0;
      notifState.lastFetchAt = Date.now();
      renderNotifBadge();
      renderNotifList();
    } catch (err) {
      console.warn("notif_fetch_failed", err);
    }
  }

  function renderNotifBadge() {
    const badge = document.getElementById("notif-btn-badge");
    if (!badge) return;
    if (notifState.unreadCount > 0) {
      badge.textContent = notifState.unreadCount > 9 ? "9+" : String(notifState.unreadCount);
      badge.hidden = false;
    } else {
      badge.hidden = true;
    }
  }

  // ===== Notification inbox sectioning =====
  // Groups notifications into three buckets so the panel stays readable
  // as the message history grows:
  //   NEW    — unread + everything from the last 24 hours
  //   RECENT — 1-7 days old, read
  //   OLDER  — >7 days old, collapsed by default (one click to expand)
  // Each section header shows an unread count when applicable, so the
  // member knows whether anything in a collapsed section needs attention.
  function categorizeNotifications(items) {
    const now = Date.now();
    const oneDayAgo = now - 24 * 60 * 60 * 1000;
    const sevenDaysAgo = now - 7 * 24 * 60 * 60 * 1000;
    const sections = { new: [], recent: [], older: [] };
    items.forEach(n => {
      const t = n.created_at ? new Date(n.created_at).getTime() : now;
      if (!n.is_read || t >= oneDayAgo) sections.new.push(n);
      else if (t >= sevenDaysAgo) sections.recent.push(n);
      else sections.older.push(n);
    });
    return sections;
  }

  // Track whether the older section is expanded — sticky via localStorage
  // so a member who opened it stays in expanded mode next time the panel
  // is shown. Defaults to collapsed.
  function isOlderExpanded() {
    try { return localStorage.getItem("tfif_notif_older_expanded") === "1"; }
    catch { return false; }
  }
  function toggleOlderSection() {
    const next = !isOlderExpanded();
    try { localStorage.setItem("tfif_notif_older_expanded", next ? "1" : "0"); } catch {}
    renderNotifList();
  }
  window.toggleOlderSection = toggleOlderSection;

  // Renders one notification row. Used by every section so the card
  // layout stays consistent. The "is-read" class fades the gold tint.
  function renderNotifCard(n) {
    const ctaBtn = n.cta_url
      ? `<button class="notif-item-cta" type="button" data-cta-url="${escapeHtml(n.cta_url)}" onclick="onNotifCtaClick(event)">${escapeHtml(n.cta_label || "Open")}</button>`
      : "";
    return `
      <li class="notif-item ${n.is_read ? 'is-read' : ''}">
        <div class="notif-item-head">
          <div class="notif-item-title">${escapeHtml(n.title || '')}</div>
          <div class="notif-item-time">${notifFmtRelative(n.created_at)}</div>
        </div>
        ${n.body ? `<div class="notif-item-body">${escapeHtml(n.body)}</div>` : ''}
        ${ctaBtn}
      </li>
    `;
  }

  function renderSectionHeader(label, items) {
    const unread = items.filter(n => !n.is_read).length;
    const unreadBadge = unread > 0
      ? `<span class="notif-section-unread">${unread} unread</span>`
      : "";
    return `<div class="notif-section-header">${label}${unreadBadge}</div>`;
  }

  function renderNotifList() {
    const list = document.getElementById("notif-list");
    if (!list) return;
    if (!notifState.items.length) {
      list.innerHTML = `
        <li class="notif-empty">
          <div class="notif-empty-icon">✦</div>
          Nothing new yet. The Field is quiet — check back when something arrives.
        </li>
      `;
      return;
    }

    const sections = categorizeNotifications(notifState.items);
    const olderExpanded = isOlderExpanded();
    const olderUnread = sections.older.filter(n => !n.is_read).length;

    let html = "";

    // NEW section — always visible. Includes unread + last 24h.
    if (sections.new.length > 0) {
      html += renderSectionHeader("New", sections.new);
      html += sections.new.map(renderNotifCard).join("");
    }

    // RECENT section — read, 1-7 days old. Always visible.
    if (sections.recent.length > 0) {
      html += renderSectionHeader("Recent", sections.recent);
      html += sections.recent.map(renderNotifCard).join("");
    }

    // OLDER section — collapsible, click-to-expand. Unread badge always
    // surfaces in the collapsed header so members never miss something.
    if (sections.older.length > 0) {
      const olderLabel = `Older (${sections.older.length})`;
      const olderUnreadBadge = olderUnread > 0
        ? `<span class="notif-section-unread">${olderUnread} unread</span>`
        : "";
      const chevron = olderExpanded ? "▴" : "▾";
      html += `
        <button class="notif-section-toggle" type="button" onclick="toggleOlderSection()">
          <span>${olderLabel}${olderUnreadBadge}</span>
          <span class="notif-section-chevron">${chevron}</span>
        </button>
      `;
      if (olderExpanded) {
        html += sections.older.map(renderNotifCard).join("");
        // Clear-all-read button: collapses the older section back so the
        // inbox declutters in one tap. Doesn't delete data — older
        // messages remain available next time someone expands.
        html += `
          <button class="notif-clear-all" type="button" onclick="toggleOlderSection()">
            Done — collapse older
          </button>
        `;
      }
    }

    list.innerHTML = html;
  }

  // Handle a click on a notification's tap-to-go button. Closes the inbox
  // panel and dispatches the action: internal Field routes (?process=X,
  // ?day=N, ?continue=last) are handled in-page so the experience is
  // instant; external https:// URLs open in a new tab.
  function onNotifCtaClick(ev) {
    if (ev) ev.preventDefault();
    const btn = ev && ev.currentTarget;
    const url = btn && btn.getAttribute("data-cta-url");
    if (!url) return;
    closeNotifPanel();
    dispatchNotifCta(url);
  }
  window.onNotifCtaClick = onNotifCtaClick;

  // Resolves a cta_url into an actual action inside the Field. Internal
  // routes use known query params; everything else is treated as a real
  // URL and opened in a new tab. Kept tolerant — if anything is off we
  // silently no-op rather than break the inbox.
  function dispatchNotifCta(url) {
    if (!url) return;
    try {
      // Relative URLs we own — parse the query string locally without
      // navigating, so the action happens in-place.
      if (url.startsWith("/app.html") || url.startsWith("?")) {
        const qs = url.includes("?") ? url.slice(url.indexOf("?") + 1) : "";
        const params = new URLSearchParams(qs);
        const processKey = params.get("process");
        const dayParam = params.get("day");
        const continueParam = params.get("continue");
        if (processKey && typeof onProcessPick === "function") {
          onProcessPick(processKey);
          return;
        }
        if (dayParam) {
          // Best effort — scroll the matching day section into view.
          const target = document.querySelector(`[data-day="${dayParam}"]`);
          if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
          return;
        }
        if (continueParam === "last") {
          // Resume the user's last Unlimited session if one exists.
          if (state && state.lastUnlimitedSessionId && typeof onUnlimitedSessionPick === "function") {
            onUnlimitedSessionPick(state.lastUnlimitedSessionId);
          } else if (typeof onProcessPick === "function") {
            // Fallback: drop them into a fresh Unlimited chat.
            onProcessPick("unlimited");
          }
          return;
        }
      }
      // Anything else: treat as a real URL and open externally.
      if (/^https?:\/\//i.test(url)) {
        window.open(url, "_blank", "noopener");
      }
    } catch (err) {
      console.warn("notif_cta_dispatch_failed", err);
    }
  }
  window.dispatchNotifCta = dispatchNotifCta;

  // Boot-time CTA handler: if the page was opened with ?process=X /
  // ?day=N / ?continue=last in the URL (e.g. a member tapped a notification
  // CTA on another device and the link opened the Field fresh), dispatch
  // the same action and then clean the query string so a reload doesn't
  // re-fire. Runs once a few hundred ms after the dashboard paints so the
  // process menu is ready.
  function maybeHandleBootCtaParam() {
    try {
      const params = new URLSearchParams(window.location.search || "");
      const processKey = params.get("process");
      const dayParam = params.get("day");
      const continueParam = params.get("continue");
      let dispatched = false;
      if (processKey && typeof onProcessPick === "function") {
        onProcessPick(processKey);
        dispatched = true;
      } else if (dayParam) {
        const target = document.querySelector(`[data-day="${dayParam}"]`);
        if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
        dispatched = true;
      } else if (continueParam === "last") {
        if (state && state.lastUnlimitedSessionId && typeof onUnlimitedSessionPick === "function") {
          onUnlimitedSessionPick(state.lastUnlimitedSessionId);
          dispatched = true;
        }
      }
      if (dispatched) {
        // Strip the params so reloads or back-button don't re-trigger.
        const cleanUrl = window.location.pathname;
        try { window.history.replaceState({}, document.title, cleanUrl); } catch {}
      }
    } catch (err) {
      console.warn("boot_cta_dispatch_failed", err);
    }
  }

  // Tiny relative-time formatter scoped to the notifications panel.
  // Avoids reaching for a date library — covers the buckets that matter
  // (just now / Xh ago / yesterday / Xd ago / dated).
  // Smart timestamp that gets progressively coarser as messages age.
  // Keeps the row visually consistent — recent items get precise minutes,
  // older ones collapse to short dates so they read at a glance:
  //   < 2 min      → "just now"
  //   < 1 hour     → "Xm ago"
  //   < 24 hours   → "Xh ago"
  //   1 - 2 days   → "yesterday"
  //   2 - 7 days   → "Xd ago"
  //   8 days - this year → "Jun 12"
  //   prior years  → "Jun 12, 2025"
  function notifFmtRelative(iso) {
    if (!iso) return "";
    const then = new Date(iso).getTime();
    if (isNaN(then)) return "";
    const diffMs = Date.now() - then;
    const mins = Math.floor(diffMs / 60000);
    if (mins < 2) return "just now";
    if (mins < 60) return mins + "m ago";
    const hours = Math.floor(mins / 60);
    if (hours < 24) return hours + "h ago";
    if (hours < 48) return "yesterday";
    const days = Math.floor(hours / 24);
    if (days < 7) return days + "d ago";
    const d = new Date(iso);
    const now = new Date();
    if (d.getFullYear() === now.getFullYear()) {
      return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
    }
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
  }

  async function onNotifBellClick(ev) {
    if (ev) ev.stopPropagation();
    const panel = document.getElementById("notif-panel");
    if (!panel) return;
    const isOpen = panel.classList.contains("is-open");
    if (isOpen) {
      closeNotifPanel();
    } else {
      openNotifPanel();
    }
  }

  async function openNotifPanel() {
    const panel = document.getElementById("notif-panel");
    if (!panel) return;
    // Refresh the list when opening so the user sees the latest. We
    // already render whatever we have cached first so the UI feels
    // instant, then update if the network response changes anything.
    renderNotifList();
    panel.classList.add("is-open");
    panel.setAttribute("aria-hidden", "false");
    // Auto-mark-as-read: fire-and-forget POST to mark everything read.
    // Clears the badge optimistically; server is authoritative on next
    // fetch but we don't want the badge to linger while the request flies.
    if (notifState.unreadCount > 0) {
      notifState.unreadCount = 0;
      renderNotifBadge();
      try {
        await fetch("/api/notifications?action=mark-all-read", {
          method: "POST",
          headers: { "x-session-token": state.sessionToken },
        });
        // Update local items so the panel reflects read state on next render.
        notifState.items = notifState.items.map(n => ({ ...n, is_read: true }));
      } catch (err) {
        console.warn("notif_mark_read_failed", err);
      }
    }
    // Re-fetch latest in the background so any new notifications appear.
    fetchNotifications();
    // Click outside to close.
    setTimeout(() => document.addEventListener("click", outsideNotifClickHandler), 0);
    // Esc to close.
    document.addEventListener("keydown", notifEscHandler);
  }

  function closeNotifPanel() {
    const panel = document.getElementById("notif-panel");
    if (!panel) return;
    panel.classList.remove("is-open");
    panel.setAttribute("aria-hidden", "true");
