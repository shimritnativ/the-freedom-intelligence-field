  // ===== Push notifications =====
  // Day 2 & Day 3 unlock reminders, plus a 12-hour-before-expiry nudge.
  // Works on iOS 16.4+ when the PWA is installed via "Add to Home Screen"
  // (the modal above), on Android Chrome, and on desktop browsers.
  //
  // Flow:
  //   1. registerServiceWorker() runs once on app load — installs /sw.js
  //   2. Sidebar "Get reminders" button calls enablePushNotifications()
  //   3. Browser shows the native permission prompt
  //   4. If granted, subscribe via the Push API and POST the subscription
  //      to /api/push?action=subscribe so the server can fire reminders
  //   5. Button label updates to "Reminders enabled" and stays for context
  //
  // The button visibility is managed by updatePushButtonState() which runs
  // after each render. It hides on devices that don't support push.
  function pushSupported() {
    return (
      "serviceWorker" in navigator &&
      "PushManager" in window &&
      "Notification" in window
    );
  }

  async function registerServiceWorker() {
    if (!("serviceWorker" in navigator)) return null;
    try {
      const reg = await navigator.serviceWorker.register("/sw.js", { scope: "/" });
      return reg;
    } catch (err) {
      console.warn("sw_register_failed", err);
      return null;
    }
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
    const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
    const raw = atob(base64);
    const out = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
    return out;
  }

  // Silently push the existing browser subscription up to the server. Called
  // on every app load when permission is already granted. Self-heals cases
  // where the initial subscription save failed (VAPID not yet configured,
  // migration not yet run, network blip, etc.) — next load tries again.
  async function syncPushSubscription() {
    if (!pushSupported() || !state.sessionToken) return;
    if (Notification.permission !== "granted") return;
    try {
      const reg = await navigator.serviceWorker.ready;
      let existing = await reg.pushManager.getSubscription();
      if (!existing) {
        // Browser doesn't have a subscription either — do the full flow.
        const keyRes = await fetch("/api/push?action=public-key");
        if (!keyRes.ok) {
          console.warn("push_sync_vapid_unavailable");
          return;
        }
        const { publicKey } = await keyRes.json();
        if (!publicKey) {
          console.warn("push_sync_no_vapid_key");
          return;
        }
        existing = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(publicKey),
        });
      }
      const saveRes = await fetch("/api/push?action=subscribe", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-session-token": state.sessionToken,
        },
        body: JSON.stringify({ subscription: existing.toJSON() }),
      });
      if (!saveRes.ok) {
        const body = await saveRes.text().catch(() => "");
        console.warn("push_sync_save_failed", saveRes.status, body.slice(0, 200));
      } else {
        console.log("push_sync_ok");
      }
    } catch (err) {
      console.warn("push_sync_error", err?.message || err);
    }
  }

  async function enablePushNotifications() {
    if (!pushSupported() || !state.sessionToken) return;

    let permission = Notification.permission;
    if (permission === "default") {
      permission = await Notification.requestPermission();
    }
    if (permission !== "granted") {
      // User said no in the OS prompt — sync the card to show the new state.
      updatePushButtonState();
      return;
    }

    try {
      const reg = await navigator.serviceWorker.ready;
      // Pull the VAPID public key from the server (it's set once via env vars
      // — we don't hardcode it on the client so rotation is server-only).
      const keyRes = await fetch("/api/push?action=public-key");
      if (!keyRes.ok) throw new Error("vapid_key_unavailable");
      const { publicKey } = await keyRes.json();

      const existing = await reg.pushManager.getSubscription();
      const sub = existing || (await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(publicKey),
      }));

      // Push subscription up so the server can target this device.
      const saveRes = await fetch("/api/push?action=subscribe", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-session-token": state.sessionToken,
        },
        body: JSON.stringify({ subscription: sub.toJSON() }),
      });
      if (!saveRes.ok) throw new Error("subscription_save_failed");

      // Refresh the Preferences card so it shows "✓ Enabled" immediately.
      updatePushButtonState();
    } catch (err) {
      console.warn("enable_push_failed", err);
    }
  }

  // Decide whether to auto-show the notif opt-in pre-prompt.
  // Conditions: push is supported, browser hasn't been asked yet
  // (permission === "default"), AND we haven't already shown this user
  // the prompt (tracked in localStorage so reload doesn't re-prompt).
  // Bumped to v2 when the prompt copy was generalized from "Day 2/3 reminders"
  // to "notifications from The Field." Existing members who hit "Maybe later"
  // on v1 will see the new prompt once on their next visit. Members who
  // already granted permission won't be re-prompted (Notification.permission
  // check catches them).
  const NOTIF_PROMPT_KEY = "tfif_notif_prompt_shown_v2";

  function maybeShowNotifPrompt() {
    if (!pushSupported()) return;
    if (!state.sessionToken) return; // wait until logged in

    // Force-show via URL param. Bypasses both the permission check and the
    // localStorage "already prompted" flag. Designed for team UX review on
    // accounts that already granted notifications — without this, the prompt
    // would never appear because the early-return on permission === "granted"
    // would catch it. Append `?show_notif_prompt=1` to any Field URL to use.
    let forced = false;
    try {
      const url = new URL(window.location.href);
      forced = url.searchParams.get("show_notif_prompt") === "1";
    } catch {}

    if (!forced) {
      if (Notification.permission !== "default") return; // already granted or blocked
      try {
        if (localStorage.getItem(NOTIF_PROMPT_KEY)) return; // already prompted this user
      } catch {}
    }

    // Small delay so the dashboard paints first — the modal landing on a
    // blank page feels jarring.
    setTimeout(() => {
      state.notifPromptOpen = true;
      render();
    }, 1500);
  }

  function onNotifPromptAccept() {
    try { localStorage.setItem(NOTIF_PROMPT_KEY, String(Date.now())); } catch {}
    state.notifPromptOpen = false;
    render();
    // Now trigger the real OS permission flow + subscription save.
    enablePushNotifications();
  }

  function onNotifPromptDismiss() {
    try { localStorage.setItem(NOTIF_PROMPT_KEY, String(Date.now())); } catch {}
    state.notifPromptOpen = false;
    render();
  }

  // The Preferences toggle reflects PER-ACCOUNT subscription state, not the
  // browser's permission alone. We confirm with the server whether THIS user
  // currently has a saved subscription — that closes the bug where switching
  // accounts in the same browser made the card lie about "Enabled".
  let pushUserHasSubscription = false;
  let pushStateRefreshing = false;

  async function refreshPushServerState() {
    if (!state.sessionToken || !pushSupported()) {
      pushUserHasSubscription = false;
      return;
    }
    try {
      const r = await fetch("/api/push?action=my-subscription", {
        method: "POST",
        headers: { "x-session-token": state.sessionToken },
      });
      if (!r.ok) { pushUserHasSubscription = false; return; }
      const data = await r.json();
      pushUserHasSubscription = !!data.hasSubscription;
    } catch {
      pushUserHasSubscription = false;
    }
  }

  function updatePushButtonState() {
    const card = document.getElementById("pref-notif-card");
    const section = document.getElementById("acct-section-prefs");
    const desc = document.getElementById("pref-notif-desc");
    const toggle = document.getElementById("pref-notif-toggle");
    if (!card || !section || !toggle) return;

    if (!pushSupported()) {
      section.style.display = "none";
      return;
    }
    section.style.display = "";

    toggle.classList.remove("pref-toggle--on", "pref-toggle--disabled", "pref-toggle--loading");
    if (pushStateRefreshing) toggle.classList.add("pref-toggle--loading");

    if (Notification.permission === "denied") {
      if (desc) desc.textContent = "Notifications are blocked. Unblock thefieldai.app in your browser settings, then come back to turn this on.";
      toggle.classList.add("pref-toggle--disabled");
      toggle.setAttribute("aria-checked", "false");
      return;
    }

    // Treat "ON" as: permission granted AND this user has a server-side
    // subscription record. Anything else is OFF.
    const isOn = Notification.permission === "granted" && pushUserHasSubscription;
    if (isOn) {
      if (desc) desc.textContent = "You're set to receive Reset milestones, new features, and the occasional update from The Field. Toggle off any time.";
      toggle.classList.add("pref-toggle--on");
      toggle.setAttribute("aria-checked", "true");
    } else {
      if (desc) desc.textContent = "Reset milestones, new features, and the occasional update from The Field. Toggle on whenever you want them.";
      toggle.setAttribute("aria-checked", "false");
    }
  }

  // Click handler for the toggle. Subscribes if OFF, unsubscribes if ON.
  // Blocks the click if the permission is denied at the browser level (only
  // the user can unblock that, from browser settings).
  async function onPushTogglePress() {
    if (!pushSupported()) return;
    if (Notification.permission === "denied") return;
    if (pushStateRefreshing) return;

    const currentlyOn = Notification.permission === "granted" && pushUserHasSubscription;
    pushStateRefreshing = true;
    updatePushButtonState();

    try {
      if (currentlyOn) {
        // Toggle OFF: remove this user's subscription from the server.
        // We don't revoke the browser permission (can't programmatically),
        // we just stop sending pushes to this account.
        await fetch("/api/push?action=unsubscribe", {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
          body: JSON.stringify({}),
        });
        pushUserHasSubscription = false;
      } else {
        // Toggle ON: request permission (no-op if already granted) and
        // save the subscription under THIS account's user_id.
        await enablePushNotifications();
        await refreshPushServerState();
      }
    } finally {
      pushStateRefreshing = false;
      updatePushButtonState();
    }
  }

  async function onProcessPick(processKey) {
    if (state.creatingChat) return;
    const proc = DEMO_PROCESSES.find(p => p.key === processKey);
    if (!proc) return;
    state.creatingChat = true;
    // Close the process menu and the mobile drawer.
    state.processMenuOpen = false;
    state.mobileDrawerOpen = false;
    // Optimistic switch to the Unlimited chat view with a loading state.
    const prevView = state.view;
    const prevActiveId = state.activeUnlimitedId;
    state.view = "unlimited-chat";
    state.activeUnlimitedId = null;
    state.unlimitedMessages = [];
    state.loading = true;
    render();
    try {
      const ok = await ensureDemoSession();
      if (!ok) throw new Error("could_not_bootstrap_session");
      const session = await createUnlimitedWithRetry(processKey);
      state.unlimitedSessions.unshift(session);
      state.activeUnlimitedId = session.id;
      // Auto-send a first message so The Field opens the process.
      const activationMessage = proc.prompt || ("I am entering the " + proc.name + " process. Begin.");
      state.unlimitedMessages = [{ role: "user", content: activationMessage }];
      state.loading = true;
      render();
      const data = await apiUnlimitedChat(session.id, activationMessage);
      state.unlimitedMessages.push({ role: "assistant", content: data.reply });
      state.loading = false;
      const idx = state.unlimitedSessions.findIndex(s => s.id === session.id);
      if (idx >= 0) {
        const updated = Object.assign({}, state.unlimitedSessions[idx], { lastMessageAt: new Date().toISOString() });
        if (data.title) updated.title = data.title;
        state.unlimitedSessions[idx] = updated;
      }
      render();
      maybeAutoplayLastUnlimitedAssistant();
    } catch (e) {
      console.error("start_process_failed", e);
      state.loading = false;
      state.view = prevView;
      state.activeUnlimitedId = prevActiveId;
      render();
      alert("Could not start the process. Try again.");
    } finally {
      state.creatingChat = false;
    }
  }

  function onMagnifierClick() {
    state.searchOpen = !state.searchOpen;
    if (!state.searchOpen) state.searchQuery = "";
    render();
  }

  // ===== Reset section collapse/expand (Unlimited members only) =====
  function onResetSectionToggle() {
    state.resetSectionExpanded = !state.resetSectionExpanded;
    render();
  }

  // ===== Chat 3-dot menu open/close =====
  // Clicking the dots toggles the dropdown. Clicking anywhere else closes it.
  // triggerEl is the button that was clicked; used to position the floating
  // dropdown next to it using getBoundingClientRect().
  function onChatMenuToggle(chatId, origin, evt, triggerEl) {
    if (evt) { evt.stopPropagation(); evt.preventDefault(); }
    if (state.openChatMenuId === chatId && state.openChatMenuOrigin === origin) {
      state.openChatMenuId = null;
      state.openChatMenuOrigin = null;
    } else {
      state.openChatMenuId = chatId;
      state.openChatMenuOrigin = origin;
      // Calculate where to anchor the floating dropdown.
      const btn = triggerEl || (evt && evt.currentTarget);
      if (btn && btn.getBoundingClientRect) {
        const rect = btn.getBoundingClientRect();
        const menuWidth = 180;
        const menuHeight = 144; // approx — 3 items at ~48px each
        // Default: drop below + align right edge of menu with right edge of trigger
        let top = rect.bottom + 4;
        let left = rect.right - menuWidth;
        // Flip up if too close to viewport bottom
        if (top + menuHeight > window.innerHeight - 10) {
          top = rect.top - menuHeight - 4;
        }
        // Clamp left so menu never bleeds off-screen
        if (left < 10) left = 10;
        if (left + menuWidth > window.innerWidth - 10) left = window.innerWidth - menuWidth - 10;
        state.menuPosition = { top: top, left: left };
      }
    }
    render();
  }
  function closeAllChatMenus() {
    if (state.openChatMenuId || state.openChatMenuOrigin) {
      state.openChatMenuId = null;
      state.openChatMenuOrigin = null;
      render();
    }
  }

  // ===== Rename (modal) =====
  // Inline edit kept losing the rename war with browser focus quirks and
  // touch event noise, so we use a small, calm modal instead. Same warm
  // cream and gold styling as the rest of the Field — feels less like a
  // system dialog and more like a quiet pause.
  function onChatRenameStart(chatId) {
    const session = state.unlimitedSessions.find(s => s.id === chatId);
    if (!session) return;
    state.openChatMenuId = null;
    state.openChatMenuOrigin = null;
    state.renamingChatId = chatId;
    state.renamingChatDraft = session.title || "";
    render();
    // Synchronous focus + select on the modal input. No setTimeout needed
    // because render() is sync and the input is unambiguously the only
    // interactive surface on screen.
    const input = document.getElementById("rename-modal-input");
    if (input) { input.focus(); input.select(); }
  }
  async function onChatRenameSubmit(chatId, newTitle) {
    const trimmed = (newTitle || "").trim();
    const original = state.unlimitedSessions.find(s => s.id === chatId);
    if (trimmed.length === 0 || !original || trimmed === (original.title || "")) {
      onChatRenameCancel();
      return;
    }
    const idx = state.unlimitedSessions.findIndex(s => s.id === chatId);
    if (idx >= 0) {
      state.unlimitedSessions[idx] = Object.assign({}, state.unlimitedSessions[idx], { title: trimmed });
    }
    state.renamingChatId = null;
    state.renamingChatDraft = "";
    render();
    try {
      const updated = await apiRenameUnlimited(chatId, trimmed);
      if (idx >= 0) state.unlimitedSessions[idx] = Object.assign({}, state.unlimitedSessions[idx], updated);
      render();
    } catch (e) {
      console.error("rename_failed", e);
      if (idx >= 0 && original) {
        state.unlimitedSessions[idx] = Object.assign({}, state.unlimitedSessions[idx], { title: original.title });
        render();
      }
    }
  }
  function onChatRenameCancel() {
    state.renamingChatId = null;
    state.renamingChatDraft = "";
    render();
  }

  // ===== Pin / Unpin =====
  async function onChatPinToggle(chatId, pin) {
    state.openChatMenuId = null;
    state.openChatMenuOrigin = null;
    render();
    try {
      const updated = await apiPinUnlimited(chatId, pin);
      const idx = state.unlimitedSessions.findIndex(s => s.id === chatId);
      if (idx >= 0) state.unlimitedSessions[idx] = Object.assign({}, state.unlimitedSessions[idx], updated);
      // Re-sort: pinned (newest first) then unpinned (most recent first)
      state.unlimitedSessions.sort(function (a, b) {
        if (a.pinnedAt && !b.pinnedAt) return -1;
        if (!a.pinnedAt && b.pinnedAt) return 1;
        if (a.pinnedAt && b.pinnedAt) return new Date(b.pinnedAt) - new Date(a.pinnedAt);
        const aT = new Date(a.lastMessageAt || a.startedAt).getTime();
        const bT = new Date(b.lastMessageAt || b.startedAt).getTime();
        return bT - aT;
      });
      state.pinLimitError = "";
      render();
    } catch (e) {
      if (e && e.code === "pin_limit_reached") {
        state.pinLimitError = "You can pin up to " + (e.limit || 5) + " chats. Unpin one first.";
        render();
        setTimeout(function () {
          if (state.pinLimitError) { state.pinLimitError = ""; render(); }
        }, 4000);
      } else {
        console.error("pin_failed", e);
      }
    }
  }

  // ===== Delete: open confirmation, then commit on confirm =====
  function onChatDeleteRequest(chatId) {
    state.deleteConfirmChatId = chatId;
    state.openChatMenuId = null;
    state.openChatMenuOrigin = null;
    render();
  }
  function onChatDeleteCancel() {
    state.deleteConfirmChatId = null;
    render();
  }
  async function onChatDeleteConfirm() {
    const chatId = state.deleteConfirmChatId;
    if (!chatId) return;
    state.deleteConfirmChatId = null;
    render();
    try {
      await apiDeleteUnlimited(chatId);
      // Remove from local list. If the deleted chat was active, fall back to
      // the new most-recent chat (if any) or back to the unlimited landing.
      const wasActive = state.activeUnlimitedId === chatId;
      state.unlimitedSessions = state.unlimitedSessions.filter(s => s.id !== chatId);
      if (wasActive) {
        if (state.unlimitedSessions.length > 0) {
          await onUnlimitedChatClick(state.unlimitedSessions[0].id);
        } else {
          state.activeUnlimitedId = null;
          state.unlimitedMessages = [];
          render();
        }
      } else {
        render();
      }
    } catch (e) {
      console.error("delete_failed", e);
      alert("Could not delete that conversation. Try again.");
    }
  }

  async function onUnlimitedChatClick(sessionId) {
    if (!sessionId) return;
    state.mobileDrawerOpen = false;
    if (sessionId === state.activeUnlimitedId && state.view === "unlimited-chat") return;
    // Optimistic switch — header + chat-list highlight + loading visual update
    // immediately so the click feels instant. Messages stream in after fetch.
    state.activeUnlimitedId = sessionId;
    state.unlimitedMessages = [];
    state.view = "unlimited-chat";
    state.loading = true;
    render();
    try {
      const data = await apiLoadUnlimited(sessionId);
      state.unlimitedMessages = data.messages || [];
      state.loading = false;
      const idx = state.unlimitedSessions.findIndex(s => s.id === sessionId);
      if (idx >= 0) state.unlimitedSessions[idx] = Object.assign({}, state.unlimitedSessions[idx], data.session);
      render();
    } catch (e) {
      console.error("load_unl_failed", e);
      state.loading = false;
      render();
      alert("Could not load that conversation.");
    }
  }

  function renderUnlimitedMessages() {
    const wrap = document.getElementById("messages");
    if (!wrap) return;
    if (state.loading && state.unlimitedMessages.length === 0) {
      wrap.innerHTML = renderSkeletonLoading();
      return;
    }
    let html = state.unlimitedMessages.map((m, i) => {
      if (m.role === "user") return '<div class="msg-row user"><div class="msg">' + renderUserMessage(m.content) + '</div></div>';
      return '<div class="msg-row assistant"><div class="msg">' + renderMarkdown(m.content) + '</div>'
        + '<button class="speak-btn" data-unl-msg-index="' + i + '" type="button" aria-label="Play in Shimrit\'s voice">'
        + '<svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/><path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>'
        + '</button></div>';
    }).join("");
    if (state.loading) html += '<div class="msg-row assistant"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
    wrap.innerHTML = html;
    const wrapper = document.getElementById("messages-wrap");
    if (wrapper) wrapper.scrollTop = wrapper.scrollHeight;
    // Scan any newly rendered [[mp3:...]] cards and start audio generation.
    // Frequency Calibration, Desired Outcome Snapshot, Root Pattern Release
    // and any future Unlimited process that emits an MP3 token relies on this
    // call to actually fire /api/speak — without it the card sits in loading
    // state forever.
    processMp3Cards();
  }

  function onUnlimitedKeyDown(e) {
    if (e.key !== "Enter" || e.shiftKey) return;
    // On mobile (touch devices with no fine pointer), Enter inserts a line
    // break — matches user expectations from iMessage and WhatsApp where the
    // Return key newlines and the send arrow sends. On desktop, Enter still
    // sends (the explicit pattern people learn from chat apps).
    const isMobile = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
    if (isMobile) return; // let the browser insert a newline naturally
    e.preventDefault();
    onUnlimitedSendClick();
  }

  async function onUnlimitedSendClick() {
    const inputEl = document.getElementById("input");
    if (!inputEl) return;
    const text = inputEl.value.trim();
    if (!text || state.loading || !state.activeUnlimitedId) return;
    state.unlimitedMessages.push({ role: "user", content: text });
    inputEl.value = "";
    inputEl.style.height = "auto";
    state.loading = true;
    document.getElementById("send-btn").classList.remove("active");
    clearDraft(currentContextKey());
    renderUnlimitedMessages();
    try {
      const data = await apiUnlimitedChat(state.activeUnlimitedId, text);
      state.unlimitedMessages.push({ role: "assistant", content: data.reply });
      state.loading = false;
      const idx = state.unlimitedSessions.findIndex(s => s.id === state.activeUnlimitedId);
      if (idx >= 0) {
        const updated = Object.assign({}, state.unlimitedSessions[idx], { lastMessageAt: new Date().toISOString() });
        if (data.title) updated.title = data.title;
        state.unlimitedSessions.splice(idx, 1);
        state.unlimitedSessions.unshift(updated);
      }
      render();
      maybeAutoplayLastUnlimitedAssistant();
    } catch (err) {
      state.unlimitedMessages.push({ role: "assistant", content: chatErrorMessage(err) });
      state.loading = false;
      renderUnlimitedMessages();
    }
  }

  function onUnlimitedSpeakerClick(e) {
    const btn = e.target.closest(".speak-btn");
    if (!btn) return;
    const idx = parseInt(btn.dataset.unlMsgIndex, 10);
    if (Number.isNaN(idx)) return;
    playUnlimitedMessageAudio(idx, btn);
  }

  async function playUnlimitedMessageAudio(idx, btnEl) {
    if (speakerState.currentIndex === idx && speakerState.currentAudio) { stopCurrentAudio(); return; }
    stopCurrentAudio();
    const msg = state.unlimitedMessages[idx];
    if (!msg || msg.role !== "assistant" || !msg.content) return;
    speakerState.currentBtnEl = btnEl;
    speakerState.currentIndex = idx;
    setSpeakerBtnState(btnEl, "loading");
    try {
      const res = await fetch(API_BASE + "/speak", { method: "POST", headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken }, body: JSON.stringify({ text: msg.content }) });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || "tts_failed"); }
      const blob = await res.blob();
      const audio = new Audio(URL.createObjectURL(blob));
      speakerState.currentAudio = audio;
      audio.onended = () => { if (speakerState.currentAudio === audio) stopCurrentAudio(); };
      audio.onerror = () => { if (speakerState.currentAudio === audio) stopCurrentAudio(); };
      setSpeakerBtnState(btnEl, "playing");
      await audio.play();
    } catch (err) {
      console.error("speak_failed", err);
      setSpeakerBtnState(btnEl, "idle");
      speakerState.currentAudio = null; speakerState.currentBtnEl = null; speakerState.currentIndex = -1;
    }
  }

  function maybeAutoplayLastUnlimitedAssistant() {
    if (!state.autoplay) return;
    const last = state.unlimitedMessages.length - 1; if (last < 0) return;
    const m = state.unlimitedMessages[last]; if (!m || m.role !== "assistant") return;
    setTimeout(() => { const btn = document.querySelector('.speak-btn[data-unl-msg-index="' + last + '"]'); if (btn) playUnlimitedMessageAudio(last, btn); }, 50);
  }

  async function loadFullState() {
    try {
      const data = await apiState(state.sessionToken);
      if (data.expired) { state.view = "login"; render(); return; }
      state.currentDay = data.currentDay || 1;
      state.lastCompletedDay = data.lastCompletedDay || 0;
      state.timeRemainingMs = data.timeRemainingMs;
      state.dayUnlocks = data.dayUnlocks || state.dayUnlocks;
      state.firstLoginAt = data.firstLoginAt || state.firstLoginAt;
      state.previewEndsAt = data.previewEndsAt || state.previewEndsAt;
      state.displayName = data.displayName || state.displayName;
      state.userEmail = data.email || state.userEmail;
      // CRITICAL: rehydrate tier from the server on every page open.
      // Without this, state.tier resets to its default ("preview") on every
      // page load and never reflects entitlement changes (e.g. a customer
      // who buys Unlimited after their first login would keep seeing the
      // expired Reset state until they manually logged out and back in).
      // Trust whatever the server says: if data.tier is missing, fall back
      // to the existing client value rather than silently downgrading.
      if (data.tier === "full" || data.tier === "preview") {
        state.tier = data.tier;
      }
      // Same rehydration discipline for subscription plan so the Your
      // Account modal shows the right copy after a monthly to yearly upgrade.
      if (data.subscriptionPlan === "monthly" || data.subscriptionPlan === "yearly") {
        state.subscriptionPlan = data.subscriptionPlan;
      }
      // Reset section default: collapsed for Unlimited members (the Reset is
      // behind them, the Field library is the daily work), expanded for
      // preview members (the Reset IS their current practice). User toggling
      // overrides on next click.
      state.resetSectionExpanded = state.tier !== "full";
      // Filter to messages for the CURRENT day only. Each day is its own
      // thread in the demo. Falls back to all messages if no day metadata
      // is present (older sessions).
      const allMessages = data.messages || [];
      const filtered = allMessages.filter(m => {
        if (m.dayAtSend == null) return true;
        return Number(m.dayAtSend) === Number(state.currentDay);
      });
      state.messages = filtered.length > 0 ? filtered : allMessages;
      // Landing view by tier:
      //   full:    Welcome view (quote of the day + action cards). They
      //            actively pick what to do — no auto-resume of a stale chat.
      //   preview: Direct to Day 1/2/3 of the Reset (their current practice).
      state.view = state.tier === "full" ? "welcome" : "chat";
      render();
    } catch (err) {
      clearToken();
      state.sessionToken = null;
      state.view = "login";
      state.loginStep = "email";
      render();
    }
  }

  async function loadUnlimitedSessions() {
    try { state.unlimitedSessions = await apiListUnlimited(); }
    catch (e) { console.warn("could_not_load_unlimited_sessions", e?.message); state.unlimitedSessions = []; }
  }

  // The normal app startup. In embed mode this runs only AFTER the identity
  // gate has verified the member.
  function initApp() {
    // Register the push notification service worker. Fire-and-forget — this
    // is the only thing the SW does in this app, so failing silently is fine.
    // The "Get reminders" button in the sidebar handles permission + subscribe.
    if (pushSupported()) {
      registerServiceWorker();
    }
    // Embed mode never resumes a saved token — identity is always re-established
    // from the verified Kajabi member, so one browser cannot carry another
    // member's session.
    const existing = EMBED_MODE ? null : loadToken();
    if (existing) {
      state.sessionToken = existing;
      loadFullState().then(() => loadUnlimitedSessions().then(() => {
        render();
        // After the dashboard is loaded, decide whether to show the
        // notification opt-in pre-prompt. No-op for members who've already
        // granted, blocked, or dismissed it.
        maybeShowNotifPrompt();
        // Self-heal: if permission is already granted but the server may not
        // have a record of this device, silently re-save the subscription.
        syncPushSubscription();
      }));
    } else {
      state.view = "login";
      state.loginStep = "email";
      render();
    }
    startUnlockTicker();
  }

  // ===== Locked-day countdown ticker =====
  // Refreshes the "Unlocks in 14h 32m" text every 30s. When a day flips from
  // locked to unlocked we trigger a full render() so the lock styling, click
  // wiring, and chip status all update at once. Only one timer is ever live.
  let unlockTickerId = null;
  function startUnlockTicker() {
    if (unlockTickerId) clearInterval(unlockTickerId);
    unlockTickerId = setInterval(refreshUnlockUI, 30 * 1000);
  }
  function refreshUnlockUI() {
    const unlocks = state.dayUnlocks || {};
    let flippedToUnlocked = false;
    // Update each visible countdown line in place. If any locked day's
    // unlock time has now passed, mark for full re-render at the end.
    document.querySelectorAll("[data-day-countdown]").forEach(el => {
      const dayNum = Number(el.getAttribute("data-day-countdown"));
      const at = unlocks[dayNum];
      if (!at) {
        // Already unlocked or no clock yet — schedule a full re-render so
        // the locked state disappears entirely.
        flippedToUnlocked = true;
        return;
      }
      const remaining = new Date(at).getTime() - Date.now();
      if (remaining <= 0) {
        flippedToUnlocked = true;
        return;
      }
      el.textContent = formatUnlockCountdown(at);
    });
    if (flippedToUnlocked) render();
    // Also refresh the "X remaining" text inside the Your Account modal if open.
    const remEl = document.getElementById("acct-remaining");
    if (remEl && state.previewEndsAt) {
      const ms = new Date(state.previewEndsAt).getTime() - Date.now();
      remEl.textContent = formatTimeRemaining(Math.max(0, ms));
    }
  }

  // ===== Kajabi embed identity gate =====
  // In embed mode the app will not start until it receives the member's
  // identity in a postMessage from an allowed Kajabi origin. A visitor who opens
  // the app URL outside Kajabi never receives that message and sees a locked
  // screen instead — this is what makes a shared URL useless.
  function renderEmbedGate(message) {
    const app = document.getElementById("app");
    if (!app) return;
    app.innerHTML = `
      <div class="embed-gate">
        <div class="embed-gate-card">
          <div class="embed-gate-mark"><img src="https://kajabi-storefronts-production.kajabi-cdn.com/kajabi-storefronts-production/file-uploads/themes/2161454568/settings_images/d2126ef-2bee-6f2c-8c2-d1357db52300_myp_logo.png" alt="Master Your Path" /></div>
          <div class="embed-gate-title">${escapeHtml(message)}</div>
        </div>
      </div>`;
  }

  function startEmbedGate() {
    renderEmbedGate("Connecting to your member area…");
    let settled = false;

    window.addEventListener("message", function (event) {
      if (settled) return;
      // Only a message from your Kajabi site is trusted. The browser sets
      // event.origin; the sender cannot forge it.
      if (KAJABI_ALLOWED_ORIGINS.indexOf(event.origin) === -1) return;
      const d = event.data || {};
      if (!d || d.type !== "tfif-identity") return;
      const kajabiId = String(d.kajabiId == null ? "" : d.kajabiId).trim();
      if (!/^[0-9A-Za-z_-]{1,64}$/.test(kajabiId)) return;
      settled = true;
      KAJABI_IDENTITY = {
        kajabiId: kajabiId,
        tier: d.tier === "full" ? "full" : "preview",
        name: typeof d.name === "string" ? d.name.slice(0, 80) : ""
      };
      state.tier = KAJABI_IDENTITY.tier;
      initApp();
    });

    // Tell the Kajabi parent page the app is loaded and ready for the identity.
    try { window.parent.postMessage({ type: "tfif-ready" }, "*"); } catch (e) {}

    // If no valid identity arrives, lock the screen. Fails closed by design.
    setTimeout(function () {
      if (settled) return;
      settled = true;
      renderEmbedGate("Please open The Field from your Master Your Path member area.");
    }, 8000);
  }

  function init() {
    // Initial theme = stored preference (if any) → system preference → dark.
    // persist:false so we don't accidentally lock in the system value as a
    // "user preference" the user never actually made.
    applyTheme(loadTheme(), { persist: false });
    subscribeSystemTheme();
    applyFontScale(state.fontScale);
    if (EMBED_MODE) { startEmbedGate(); return; }
    initApp();
  }

  init();
})();
</script>
</body>
</html>
