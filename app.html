  /* Unlimited section in sidebar */
  .sidebar-divider { height: 1px; background: var(--gold-line); margin: 16px 4px; opacity: 0.5; }
  .unl-action-row { display: flex; gap: 6px; align-items: center; margin-bottom: 10px; }
  .new-chat-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 12px; background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black)); color: var(--bg); border-radius: 8px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; border: none; cursor: pointer; }
  .new-chat-btn svg { width: 14px; height: 14px; }
  .magnifier-btn { width: 36px; height: 36px; flex-shrink: 0; background: var(--gold-soft); border: 1px solid var(--gold-line); color: var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; }
  .magnifier-btn svg { width: 14px; height: 14px; }
  .magnifier-btn.active { background: var(--gold-line); }
  .unl-search-wrap { margin-bottom: 8px; display: none; }
  .unl-search-wrap.open { display: block; }
  .unl-search-wrap input { width: 100%; background: var(--panel); border: 1px solid var(--gold-line); color: var(--text); padding: 7px 10px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; border-radius: 6px; outline: none; }
  .unl-search-wrap input::placeholder { color: var(--text-mute); }
  .unl-chat-list { max-height: 320px; overflow-y: auto; }
  .unl-chat-section-label { font-size: 8px; font-weight: 700; letter-spacing: 0.15em; color: var(--text-mute); padding: 8px 10px 4px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; text-transform: uppercase; }
  .unl-chat-item { position: relative; padding: 8px 32px 8px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; border: 1px solid transparent; transition: background 0.15s ease, border-color 0.15s ease; display: flex; align-items: center; gap: 6px; }
  .unl-chat-item:hover { background: var(--gold-soft); }
  .unl-chat-item.active { background: var(--gold-soft); border-color: var(--gold-line); }
  .unl-chat-item.pinned { padding-left: 6px; }
  .unl-chat-pin { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; color: var(--gold); flex-shrink: 0; }
  .unl-chat-pin svg { width: 12px; height: 12px; }
  .unl-chat-body { flex: 1; min-width: 0; }
  .unl-chat-title { font-size: 11px; color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 500; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .unl-chat-time { font-size: 9px; color: var(--text-mute); margin-top: 2px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  /* Calm rename modal. Warm cream, italic serif title, soft fade-in. */
  .rename-overlay { position: fixed; inset: 0; background: rgba(31, 27, 18, 0.45); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; z-index: 9100; padding: 24px; animation: rename-fade 0.18s ease-out; }
  .rename-modal { background: var(--bg); border: 1px solid rgba(201, 168, 76, 0.35); border-radius: 18px; padding: 36px 36px 28px; max-width: 460px; width: 100%; box-shadow: 0 24px 60px rgba(0,0,0,0.35); animation: rename-rise 0.22s cubic-bezier(0.22, 1, 0.36, 1); }
  .rename-eyebrow { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.32em; color: var(--gold); margin-bottom: 10px; }
  .rename-title { font-family: Georgia, "Times New Roman", serif; font-style: italic; font-size: 22px; line-height: 1.3; color: var(--text); margin-bottom: 26px; opacity: 0.85; }
  .rename-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(201, 168, 76, 0.4); border-radius: 0; color: var(--text); font-family: Georgia, "Times New Roman", serif; font-style: italic; font-size: 20px; padding: 8px 2px 12px; outline: none; box-sizing: border-box; transition: border-color 0.2s ease; }
  .rename-input::placeholder { color: var(--text-mute); font-style: italic; opacity: 0.6; }
  .rename-input:focus { border-bottom-color: var(--gold); }
  .rename-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }
  .rename-btn { padding: 9px 18px; border-radius: 8px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; cursor: pointer; border: 1px solid transparent; transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease; }
  .rename-btn--cancel { background: transparent; color: var(--text-mute); border-color: transparent; }
  .rename-btn--cancel:hover { color: var(--text); }
  .rename-btn--save { background: transparent; color: var(--gold); border-color: rgba(201, 168, 76, 0.5); }
  .rename-btn--save:hover { background: rgba(201, 168, 76, 0.12); border-color: var(--gold); }
  @keyframes rename-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes rename-rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ===== Welcome view (Unlimited members' landing on every app open) ===== */
  .welcome-main {
    display: flex; align-items: center; justify-content: center;
    padding: 40px 28px; overflow-y: auto;
    position: relative; /* anchor for absolutely-positioned particles */
  }
  .welcome-wrap { max-width: 880px; width: 100%; text-align: center; padding: 20px 0 40px; animation: welcome-rise 0.4s cubic-bezier(0.22, 1, 0.36, 1); position: relative; z-index: 2; }
  /* Drifting gold particles behind the welcome content. Same visual
     language as the login split-screen + marketing site hero, so members
     feel the brand aesthetic follow them through the whole product.
     Sizes 4-10px, glow via box-shadow, positions scattered by inline
     style at render time. Opacity tuned lower on light theme so they
     don't overpower the cream background. */
  .welcome-particle {
    position: absolute;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    box-shadow: 0 0 12px rgba(201, 168, 76, 0.55);
  }
  .welcome-particle.drift-1 { animation: welcomeDrift1 10s ease-in-out infinite; }
  .welcome-particle.drift-2 { animation: welcomeDrift2 13s ease-in-out infinite; }
  .welcome-particle.drift-3 { animation: welcomeDrift3 16s ease-in-out infinite; }
  .welcome-particle.pulse   { animation: welcomePulse 7s ease-in-out infinite; }
  @keyframes welcomeDrift1 { 0%,100% { transform: translate(0,0); opacity: 0.35; } 50% { transform: translate(52px,-68px); opacity: 0.85; } }
  @keyframes welcomeDrift2 { 0%,100% { transform: translate(0,0); opacity: 0.4; } 50% { transform: translate(-58px,46px); opacity: 0.9; } }
  @keyframes welcomeDrift3 { 0%,100% { transform: translate(0,0); opacity: 0.3; } 50% { transform: translate(38px,-72px); opacity: 0.8; } }
  @keyframes welcomePulse   { 0%,100% { opacity: 0.45; transform: scale(1); } 50% { opacity: 0.95; transform: scale(1.5); } }
  /* Light theme dials particles WAY down so they sit as gold shimmer
     rather than dominating the cream background. Keep the same motion,
     just softer presence. */
  html[data-theme="light"] .welcome-particle {
    box-shadow: 0 0 10px rgba(201, 168, 76, 0.35);
  }
  html[data-theme="light"] @keyframes welcomeDrift1 { 0%,100% { transform: translate(0,0); opacity: 0.15; } 50% { transform: translate(30px,-40px); opacity: 0.4; } }
  html[data-theme="light"] .welcome-particle.drift-1 { opacity: 0.4; }
  html[data-theme="light"] .welcome-particle.drift-2 { opacity: 0.4; }
  html[data-theme="light"] .welcome-particle.drift-3 { opacity: 0.4; }
  html[data-theme="light"] .welcome-particle.pulse { opacity: 0.4; }
  .welcome-eyebrow { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.32em; color: var(--gold); margin-bottom: 28px; opacity: 0.85; }
  .welcome-greeting { font-family: Georgia, "Times New Roman", serif; font-style: italic; font-weight: 400; font-size: 44px; line-height: 1.15; color: var(--text); margin: 0 0 22px; }
  .welcome-divider { width: 80px; height: 1.5px; background: var(--gold); margin: 0 auto 56px; opacity: 0.7; }
  .welcome-quote-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.3em; color: var(--text-mute); margin-bottom: 22px; }
  .welcome-quote { font-family: Georgia, "Times New Roman", serif; font-style: italic; font-weight: 400; font-size: 28px; line-height: 1.45; color: var(--text); margin: 0 auto 18px; max-width: 720px; opacity: 0.92; }
  .welcome-quote-source { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-style: italic; font-size: 13px; color: var(--text-mute); margin-bottom: 56px; }
  .welcome-prompt { font-family: Georgia, "Times New Roman", serif; font-style: italic; font-size: 19px; color: var(--text-mute); margin-bottom: 28px; opacity: 0.9; }
  .welcome-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 880px; margin: 0 auto; }
  .welcome-card { position: relative; padding: 22px 22px 26px; background: var(--bg); border: 1px solid rgba(201, 168, 76, 0.25); border-radius: 14px; cursor: pointer; text-align: left; font-family: inherit; transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
  .welcome-card:hover { border-color: var(--gold); background: rgba(201, 168, 76, 0.06); transform: translateY(-2px); }
  .welcome-card-title { font-family: Georgia, "Times New Roman", serif; font-style: italic; font-size: 17px; color: var(--text); margin-bottom: 6px; }
  .welcome-card-desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; color: var(--text-mute); line-height: 1.4; padding-right: 18px; }
  .welcome-card-arrow { position: absolute; right: 18px; bottom: 18px; color: var(--gold); font-size: 18px; transition: transform 0.18s ease; }
  .welcome-card:hover .welcome-card-arrow { transform: translateX(3px); }
  @keyframes welcome-rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 720px) {
    .welcome-cards { grid-template-columns: 1fr; gap: 10px; }
    .welcome-greeting { font-size: 32px; }
    .welcome-quote { font-size: 22px; }
    .welcome-prompt { font-size: 17px; }
    .welcome-divider { margin-bottom: 40px; }
    .welcome-quote-source { margin-bottom: 40px; }
  }
  .unl-chat-empty { padding: 10px 8px; font-size: 11px; color: var(--text-mute); font-style: italic; font-family: Georgia, serif; }
  .unl-pin-limit-error { margin-top: 6px; padding: 8px 10px; background: rgba(220, 80, 80, 0.12); border: 1px solid rgba(220, 80, 80, 0.4); border-radius: 6px; color: #C03A2B; font-size: 10px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-style: italic; }

  /* 3-dot menu trigger button (sidebar). Always visible on mobile so long-press
     is discoverable. On desktop, fade-in on hover keeps the list visually calm. */
  .unl-chat-menu-btn { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); width: 26px; height: 26px; padding: 0; background: transparent; border: none; color: var(--text-mute); cursor: pointer; opacity: 0; transition: opacity 0.15s ease, color 0.15s ease, background 0.15s ease; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .unl-chat-item:hover .unl-chat-menu-btn,
  .unl-chat-item.active .unl-chat-menu-btn { opacity: 1; }
  .unl-chat-menu-btn:hover { color: var(--gold); background: rgba(0,0,0,0.18); }
  .unl-chat-menu-btn svg { width: 16px; height: 16px; }
  /* Touch devices have no hover, so always show the menu button. Also bumped
     the tap target to 32px for thumb-friendly hits. */
  @media (hover: none), (pointer: coarse), (max-width: 900px) {
    .unl-chat-menu-btn { opacity: 1; width: 32px; height: 32px; right: 4px; }
    .unl-chat-menu-btn svg { width: 18px; height: 18px; }
    .unl-chat-item { padding-right: 40px; }
  }

  /* Header-anchored chat menu button — always visible, both desktop and mobile */
  .header-chat-menu-btn { width: 36px; height: 36px; padding: 0; background: transparent; border: 1px solid var(--gold-line); border-radius: 8px; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s ease, border-color 0.15s ease; }
  .header-chat-menu-btn:hover { background: var(--gold-soft); border-color: var(--gold); }
  .header-chat-menu-btn svg { width: 20px; height: 20px; }
  .main-header-actions { position: relative; display: flex; align-items: center; gap: 8px; }
  /* Header lays out title and actions side by side */
  .main-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; }

  /* Floating chat menu (body-level fixed position so it never gets clipped) */
  .floating-chat-menu { position: fixed; min-width: 180px; background: #FAF6EC; border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); padding: 4px; z-index: 9999; }
  .chat-menu-item { display: flex; align-items: center; gap: 10px; width: 100%; padding: 11px 14px; background: transparent; border: none; cursor: pointer; border-radius: 8px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; color: #1F1B12; text-align: left; transition: background 0.1s ease; }
  .chat-menu-item:hover { background: rgba(0,0,0,0.06); }
  .chat-menu-item--danger { color: #C03A2B; }
  .chat-menu-item--danger:hover { background: rgba(192, 58, 43, 0.08); }
  .chat-menu-icon { display: inline-flex; width: 18px; height: 18px; align-items: center; justify-content: center; }
  .chat-menu-icon svg { width: 16px; height: 16px; }

  /* Reset section collapsible — now visibly GOLD so it stands apart from the
     chat list below it. Matches the .sidebar-cta-btn family. */
  .reset-section-toggle { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 8px; padding: 10px 14px; background: rgba(201, 168, 76, 0.22); border: 1px solid rgba(201, 168, 76, 0.55); border-radius: 8px; cursor: pointer; color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; white-space: nowrap; margin-bottom: 12px; transition: background 0.15s ease, border-color 0.15s ease; }
  .reset-section-toggle:hover { border-color: var(--gold); background: rgba(201, 168, 76, 0.32); }
  .reset-section-toggle.expanded { background: rgba(201, 168, 76, 0.3); border-color: var(--gold); }
  .reset-section-label { flex: 1; text-align: left; }
  .reset-section-caret { color: var(--gold); font-size: 11px; }

  /* Delete confirmation modal */
  /* ===== Install on iPhone modal ===== */
  .install-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.55);
    display: flex; align-items: flex-start; justify-content: center;
    z-index: 9050;
    padding: 24px 20px;
    overflow-y: auto;
    animation: acctFadeIn 0.24s ease-out;
  }
  .install-modal {
    background: var(--sidebar-bg);
    color: var(--text);
    border-radius: 18px;
    border: 1px solid var(--gold-line);
    max-width: 780px;
    width: 100%;
    padding: 26px 28px 22px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    position: relative;
    box-shadow: var(--shadow);
    animation: acctSlideUp 0.32s cubic-bezier(0.16, 1, 0.3, 1);
    margin: auto;
  }
  .install-close {
    position: absolute; top: 14px; right: 14px;
    width: 28px; height: 28px;
    background: var(--panel);
    border: 1px solid var(--gold-line);
    color: var(--text);
    border-radius: 50%;
    font-size: 12px; line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .install-close:hover { border-color: var(--gold); }
  .install-eyebrow {
    font-size: 10px; font-weight: 700; letter-spacing: 0.22em;
    color: var(--gold); text-transform: uppercase;
    margin-bottom: 6px;
  }
  .install-title {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-size: 22px;
    color: var(--text);
    line-height: 1.25;
    margin-bottom: 8px;
  }
  .install-sub {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 18px;
  }
  .install-steps {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    align-items: stretch;
  }
  /* Three steps sit side-by-side on desktop, stack on mobile. Each step is a
     compact card with the number + title up top, a short description, and a
     small screenshot. */
  .install-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 14px 12px 16px;
    background: var(--gold-soft);
    border: 1px solid var(--gold-line);
    border-radius: 12px;
  }
  .install-step-head {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .install-step-num {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 12px;
    flex-shrink: 0;
  }
  .install-step-title {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }
  .install-step-desc {
    font-size: 11.5px;
    color: var(--text-dim);
    line-height: 1.45;
    margin-bottom: 10px;
    max-width: 220px;
  }
  .install-step-images {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    width: 100%;
    max-width: 170px;
  }
  /* Wrap around each screenshot so we can absolutely-position a pulsing
     gold ring on top, pointing to exactly where the user should tap. */
  .install-step-image-wrap {
    position: relative;
    display: inline-block;
    width: 100%;
    line-height: 0;
  }
  .install-step-image-wrap--narrow {
    max-width: 220px;
  }
  .install-step-img {
    max-width: 100%;
    height: auto;
    display: block;
    border-radius: 10px;
    box-shadow: 0 4px 18px rgba(0, 0, 0, 0.30);
    border: 1px solid rgba(255, 255, 255, 0.06);
  }
  .install-step-img--wide { width: 100%; }
  .install-step-img--narrow { max-width: 130px; }
  /* Gold ring overlay that pulses on top of each screenshot, drawing the
     eye to the exact tap target. Positioned with left/top percentages on
     the wrapper so it scales with the image. The transform centers the
     ring on the coordinate and the box-shadow animation creates a ripple
     effect outward, like an iOS tap indicator. */
  .install-step-highlight {
    position: absolute;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid #C9A84C;
    background: transparent;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: install-highlight-pulse 1.6s ease-in-out infinite;
  }
  /* Small ring — for the tiny ⋯ menu button on the URL bar. */
  .install-step-highlight--small {
    width: 20px;
    height: 20px;
    border-width: 1.8px;
  }
  /* Medium ring — for menu icons (Share, Add to Home Screen).
     Sized to the icon itself, not the whole row. */
  .install-step-highlight--medium {
    width: 28px;
    height: 28px;
    border-width: 2px;
  }
  @keyframes install-highlight-pulse {
    0%, 100% {
      box-shadow: 0 0 0 0 rgba(201, 168, 76, 0.55);
    }
    50% {
      box-shadow: 0 0 0 8px rgba(201, 168, 76, 0);
    }
  }
  /* Step 1 "look here" emphasis: the whole row breathes with a soft gold
     glow so the eye lands on it first. */
  .install-step--active {
    animation: install-row-pulse 2.2s ease-in-out infinite;
  }
  @keyframes install-row-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201, 168, 76, 0); border-color: var(--gold-line); }
    50%      { box-shadow: 0 0 0 4px rgba(201, 168, 76, 0.18); border-color: var(--gold); }
  }
  /* Floating "look down here" arrow that hangs below the modal and gently
     bobs while pulsing in opacity. Anchors the member's eye downward
     toward where Safari's actual share button lives. */
  .install-floating-arrow {
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    animation: install-arrow-bob 1.8s ease-in-out infinite;
    pointer-events: none;
  }
  .install-floating-arrow-label {

    font-size: 12px;
    color: var(--gold);
    letter-spacing: 0.02em;
    background: rgba(201, 168, 76, 0.12);
    border: 1px solid var(--gold);
    border-radius: 999px;
    padding: 5px 14px;
    white-space: nowrap;
  }
  .install-floating-arrow-icon {
    color: var(--gold);
    animation: install-arrow-pulse 1.4s ease-in-out infinite;
  }
  .install-floating-arrow-icon svg {
    width: 26px; height: 26px;
    display: block;
  }
  @keyframes install-arrow-bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(6px); }
  }
  @keyframes install-arrow-pulse {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1; }

  .unlimited-lock svg { width: 20px; height: 20px; display: block; }

  .unlimited-desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-bottom: 16px; }
  .unlimited-btn { display: inline-flex; align-items: center; gap: 7px; padding: 11px 20px; background: var(--gold); color: var(--bg); border-radius: 999px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none; transition: opacity 0.15s ease, transform 0.05s ease; }
  .unlimited-btn:hover { opacity: 0.88; }
  .unlimited-btn:active { transform: scale(0.98); }
  .unlimited-btn-arrow { font-size: 13px; line-height: 1; }
  /* Upsell panel shown in the main area when a Reset-tier member opens Unlimited */
  .unl-upsell-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
  .unl-upsell-main .unlimited-card { max-width: 420px; padding: 32px; }
  .unl-upsell-main .unlimited-title { font-size: 20px; }
  .unl-upsell-main .unlimited-desc { font-size: 13px; }

  /* Kajabi embed identity gate — connecting / locked screen */
  .embed-gate { flex: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px; background: var(--bg); }
  .embed-gate-card { max-width: 400px; text-align: center; }
  .embed-gate-mark { width: 54px; height: 54px; margin: 0 auto 20px; }
  .embed-gate-mark img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .embed-gate-title { font-family: Georgia, "Times New Roman", serif; font-size: 17px; font-style: italic; color: var(--text-dim); line-height: 1.6; }

  /* Email + 6-digit-code login (legacy classes, kept for any other place
     that references them) */
  .login-code-input { text-align: center; font-size: 26px; letter-spacing: 0.4em; font-weight: 700; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .login-back { margin-top: 14px; background: none; border: none; color: var(--text-dim); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; text-decoration: underline; cursor: pointer; }
  .login-back:hover { color: var(--text); }

  /* ===== Split-screen login (July 2026 redesign) =====
     Full-viewport dark-left / cream-right layout with drifting gold
     particles behind the brand statement. Colours are fixed regardless of
     the user's theme choice — the login is a brand moment, not app chrome.
     On mobile the left brand panel hides and the form takes the full
     screen so nothing gets in the way of typing an email. */
  .login-split { display: flex; min-height: 100vh; width: 100%; font-family: Georgia, "Times New Roman", serif; }
  .login-split-left {
    flex: 1; background: #080808; color: #f0ead6;
    padding: 8vh 6vw;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden; min-width: 0;
  }
  .login-split-right {
    flex: 1; background: #F7F1E1;
    padding: 8vh 6vw;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    position: relative; min-width: 0;
  }
  .login-brand-content { position: relative; z-index: 2; max-width: 460px; }
  .login-brand-logo {
    width: 44px; height: 44px; display: block; margin-bottom: 22px;
    object-fit: contain;
    opacity: 0; animation: loginFadeIn 0.9s ease-out forwards;
  }
  .login-brand-bar {
    width: 44px; height: 2px; background: #C9A84C; margin-bottom: 24px;
    opacity: 0; animation: loginFadeIn 0.9s ease-out 0.05s forwards;
  }
  .login-brand-eyebrow {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px; letter-spacing: 0.24em; color: #C9A84C; font-weight: 700;
    margin-bottom: 32px;
    opacity: 0; animation: loginFadeIn 0.9s ease-out 0.1s forwards;
  }
  .login-brand-title {
    font-family: Georgia, serif; font-style: italic;
    font-size: clamp(40px, 6vw, 60px); line-height: 1.02; color: #f0ead6; margin: 0;
    opacity: 0; animation: loginFadeIn 0.9s ease-out forwards;
  }
  .login-brand-title-1 { animation-delay: 0.2s; }
  .login-brand-title-2 { animation-delay: 0.4s; margin-bottom: 36px; }
  .login-brand-divider {
    width: 120px; height: 1px; background: rgba(201, 168, 76, 0.35); margin-bottom: 24px;
    opacity: 0; animation: loginFadeIn 0.9s ease-out 0.7s forwards;
  }
  .login-brand-subtitle {
    font-family: Georgia, serif; font-size: 15px; line-height: 1.7;
    color: rgba(240, 234, 214, 0.72); max-width: 380px; margin: 0;
    opacity: 0; animation: loginFadeIn 0.9s ease-out 0.9s forwards;
  }
  /* Discovery footer — sits at the bottom of the dark panel with two
     pill buttons (destination links) + a row of social icon buttons.
     Lost visitors find their way to Shimrit's work or the marketing site
     without having to squint at tiny text. Primary member logging in on
     the right side isn't distracted because these live at the bottom. */
  .login-brand-footer {
    position: absolute;
    bottom: 5vh;
    left: 6vw;
    right: 6vw;
    z-index: 3;
    opacity: 0;
    animation: loginFadeIn 0.9s ease-out 1.15s forwards;
  }
  .login-brand-links {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .login-brand-links a {
    display: inline-block;
    padding: 8px 16px;
    border: 1px solid rgba(201, 168, 76, 0.3);
    border-radius: 22px;
    color: rgba(240, 234, 214, 0.85);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-decoration: none;
    transition: all 0.2s;
    background: rgba(0, 0, 0, 0.3);
  }
  .login-brand-links a:hover {
    border-color: #C9A84C;
    color: #C9A84C;
    background: rgba(201, 168, 76, 0.1);
  }
  .login-brand-socials {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .login-brand-socials a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    border: 1px solid rgba(201, 168, 76, 0.3);
    border-radius: 50%;
    color: rgba(240, 234, 214, 0.75);
    background: rgba(0, 0, 0, 0.3);
    text-decoration: none;
    transition: all 0.2s;
  }
  .login-brand-socials a:hover {
    border-color: #C9A84C;
    color: #C9A84C;
    background: rgba(201, 168, 76, 0.12);
    transform: translateY(-1px);
  }
  .login-brand-socials svg {
    width: 15px;
    height: 15px;
    display: block;
    fill: currentColor;
  }
  @keyframes loginFadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Drifting gold particles. 4 animation profiles cycled across 25
     particles positioned by inline style. Deterministic seed so they
     don't jitter between renders. Sizes + opacity bumped July 2026 for
     stronger presence — was too subtle at 2-5px / 0.45 peak opacity;
     new range is 4-10px / up to 0.85 peak. Also added glow shadow so
     each particle reads as a soft point of light instead of a hard dot. */
  .login-particle {
    position: absolute;
    background: #C9A84C;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    box-shadow: 0 0 12px rgba(201, 168, 76, 0.55);
  }
  .login-particle.drift-1 { animation: loginDrift1 12s ease-in-out infinite; }
  .login-particle.drift-2 { animation: loginDrift2 15s ease-in-out infinite; }
  .login-particle.drift-3 { animation: loginDrift3 18s ease-in-out infinite; }
  .login-particle.pulse    { animation: loginPulse 7s ease-in-out infinite; }
  @keyframes loginDrift1 { 0%,100% { transform: translate(0,0); opacity: 0.35; } 50% { transform: translate(40px,-52px); opacity: 0.85; } }
  @keyframes loginDrift2 { 0%,100% { transform: translate(0,0); opacity: 0.4; } 50% { transform: translate(-48px,36px); opacity: 0.9; } }
  @keyframes loginDrift3 { 0%,100% { transform: translate(0,0); opacity: 0.3; } 50% { transform: translate(28px,-60px); opacity: 0.8; } }
  @keyframes loginPulse    { 0%,100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 0.95; transform: scale(1.5); } }

  /* Right side form */
  .login-form-wrap { max-width: 400px; width: 100%; }
  .login-form-eyebrow {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px; letter-spacing: 0.24em; color: #C9A84C; font-weight: 700; margin-bottom: 22px;
  }
  .login-form-title {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-size: clamp(32px, 3.6vw, 40px);
    line-height: 1.12;
    color: #1a1a1a;
    margin: 0 0 14px;
  }
  .login-form-subtitle { font-family: Georgia, serif; font-size: 15px; line-height: 1.65; color: rgba(0,0,0,0.58); margin-bottom: 30px; }
  .login-form-subtitle strong { color: #1a1a1a; font-weight: 600; }
  .login-form-label {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 10px; letter-spacing: 0.22em; color: rgba(0,0,0,0.5); font-weight: 700;
    margin-bottom: 8px; display: block;
  }
  .login-input {
    width: 100%; background: #ffffff; border: 1px solid rgba(201, 168, 76, 0.35);
    color: #1a1a1a; padding: 15px 16px; border-radius: 6px;
    font-family: Georgia, serif; font-size: 15px; margin-bottom: 18px;
    box-sizing: border-box; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .login-input:focus { border-color: #C9A84C; box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15); }
  .login-input.login-code-input { text-align: center; font-size: 26px; letter-spacing: 0.4em; font-weight: 700; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .login-submit {
    background: #C9A84C; border: none; color: #080808; padding: 15px 20px; border-radius: 6px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 0.18em; cursor: pointer;
    width: 100%; text-transform: uppercase; transition: background 0.2s;
  }
  .login-submit:hover:not(:disabled) { background: #d4b559; }
  .login-submit:disabled { background: rgba(201, 168, 76, 0.5); cursor: default; }
  .login-error {
    color: #B45454; font-family: Georgia, serif; font-size: 13px; line-height: 1.4;
    margin: -6px 0 12px;
  }
  .login-footer {
    text-align: center; margin-top: 28px; padding-top: 22px;
    border-top: 1px solid rgba(201, 168, 76, 0.2);
    font-family: Georgia, serif; font-style: italic; font-size: 13px;
    color: rgba(0,0,0,0.55); line-height: 1.6;
  }
  .login-footer a { color: #C9A84C; text-decoration: none; font-weight: 500; }
  .login-footer a:hover { text-decoration: underline; }
  .login-back-btn {
    margin-top: 14px; background: none; border: none; color: rgba(0,0,0,0.55);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px; text-decoration: underline; cursor: pointer;
  }
  .login-back-btn:hover { color: #1a1a1a; }

  /* Mobile: stack the two panels vertically. Dark hero band on top,
     cream form below. Compressed brand statement (no divider, no long
     subtitle) so the form stays close to the top of the screen for
     one-thumb typing. Particles + logo + title still present so the
     brand moment doesn't disappear. */
  @media (max-width: 800px) {
    .login-split { flex-direction: column; min-height: auto; }
    .login-split-left {
      padding: 40px 26px 34px;
      justify-content: flex-start;
      min-height: 0;
    }
    .login-brand-content { max-width: none; }
    .login-brand-logo { width: 40px; height: 40px; margin-bottom: 18px; }
    .login-brand-bar { margin-bottom: 16px; }
    .login-brand-eyebrow { font-size: 10px; margin-bottom: 18px; }
    .login-brand-title { font-size: 34px; line-height: 1.05; }
    .login-brand-title-2 { margin-bottom: 4px; }
    .login-brand-divider { display: none; }
    .login-brand-subtitle { display: none; }
    .login-brand-footer {
      position: static;
      margin-top: 20px;
      left: auto; right: auto; bottom: auto;
    }
    .login-brand-links { margin-bottom: 12px; gap: 8px; }
    .login-brand-links a { padding: 7px 13px; font-size: 10px; }
    .login-brand-socials { gap: 8px; }
    .login-brand-socials a { width: 30px; height: 30px; }
    .login-brand-socials svg { width: 13px; height: 13px; }
    .login-split-right {
      padding: 32px 24px 40px;
      min-height: auto;
      align-items: stretch;
    }
    .login-form-wrap { max-width: none; }
    .login-form-title { font-size: 28px; }
    .login-form-subtitle { font-size: 14px; margin-bottom: 24px; }
  }

  .composer-note {
    max-width: 760px; margin: 8px auto 0;
    text-align: center;
    font-size: 11px;
    color: var(--text-mute);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  /* Entry */
  .entry-screen { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .entry-card {
    max-width: 460px; width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 44px 38px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .entry-label {
    font-size: 10px;
    color: var(--text-mute);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin-bottom: 22px;
  }
  .entry-title {
    font-size: 26px;
    color: var(--text);
    font-style: italic;
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .entry-sub {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.8;
    margin: 0 auto 28px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    text-align: left;
  }
  .entry-input {
    width: 100%;
    padding: 13px 17px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .entry-input:focus { outline: none; border-color: var(--gold-line); }
  .btn-primary {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--gold), color-mix(in srgb, var(--gold) 70%, black));
    border: none;
    border-radius: 8px;
    color: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .error-text {
    color: #e57373;
    font-size: 12px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin-bottom: 10px;
    text-align: left;
  }

  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 720px) {
    .sidebar { width: 220px; padding: 16px 12px; }
    .messages, .composer { padding-left: 16px; padding-right: 16px; }
  }

  /* ===== Mobile chrome (hidden on desktop) =====
     Top bar with hamburger + brand + theme, horizontal day-strip / chat-header
     nav, bottom Reset/Unlimited tabs, slide-out drawer for the full sidebar. */
  .mobile-top-bar,
  .mobile-nav-strip,
  .mobile-bottom-tabs,
  .mobile-overlay { display: none; }

  @media (max-width: 560px) {
    #app {
      height: 100vh;
      height: 100dvh;
      max-height: 100vh;
      max-height: 100dvh;
      overflow: hidden;
    }

    /* Demo banner — compact on mobile */
    .demo-banner { font-size: 10px; padding: 6px 12px; letter-spacing: 0.1em; }

    /* Sidebar becomes a slide-in drawer from the left */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 86%;
      max-width: 320px;
      border-right: 1px solid var(--gold-line);
      border-bottom: none;
      padding: 18px 16px;
      overflow-y: auto;
      z-index: 70;
      transform: translateX(-100%);
      transition: transform 0.28s cubic-bezier(0.22, 0.61, 0.36, 1);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
    }
    .sidebar.mobile-open { transform: translateX(0); }
    .brand { padding-bottom: 12px; margin-bottom: 12px; }
    .brand-mark { width: 40px; height: 40px; }
    .day-list { flex-direction: column; gap: 6px; margin-bottom: 12px; overflow-x: visible; }
    .day-item { padding: 10px 12px; gap: 10px; }

    /* Overlay backdrop behind drawer */
    .mobile-overlay {
      display: block;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 65;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .mobile-overlay.open { opacity: 1; pointer-events: auto; }

    /* Top bar (always visible on mobile). Position sticky + z-index keeps it
       pinned even if iOS Safari momentarily lets the layout shift while the
       address bar collapses/expands. */
    .mobile-top-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 52px;
      position: sticky;
      top: 0;
      z-index: 60;
    }
    .mobile-menu-btn,
    .mobile-theme-btn,
    .mobile-export-btn,
    .mobile-chat-menu-btn {
      width: 36px; height: 36px;
      background: transparent;
      border: 1px solid var(--gold-line);
      border-radius: 9px;
      color: var(--gold);
      font-size: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      cursor: pointer;
      padding: 0;
    }
    .mobile-menu-btn:active,
    .mobile-theme-btn:active,
    .mobile-export-btn:active,
    .mobile-chat-menu-btn:active { background: var(--gold-soft); }
    .mobile-export-btn svg { width: 18px; height: 18px; }
    .mobile-chat-menu-btn svg { width: 20px; height: 20px; }
    /* The chat-header version of the 3-dot menu lives in the main pane on
       desktop. On mobile the same action is on the top bar, so hide the
       desktop one to avoid duplicate entry points. */
    .header-chat-menu-btn { display: none; }
    .mobile-export-btn .export-spinner { animation: export-spin 0.9s linear infinite; transform-origin: center; }
    @keyframes export-spin { to { transform: rotate(360deg); } }

    /* At-a-glance section indicator: DAY 1 / 2 / 3 or UNLIMITED. */
    .mobile-section-pill {
      flex-shrink: 0;
      padding: 5px 10px;
      border-radius: 999px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border: 1px solid transparent;
      white-space: nowrap;
      line-height: 1;
      display: inline-flex;
      align-items: center;
    }
    .mobile-section-reset {
      background: var(--gold-soft);
      border-color: var(--gold-strong);
      color: var(--gold);
    }
    .mobile-section-unlimited {
      background: rgba(140, 110, 220, 0.14);
      border-color: rgba(160, 130, 230, 0.42);
      color: rgba(200, 175, 245, 0.98);
    }
    html[data-theme="light"] .mobile-section-unlimited {
      background: rgba(95, 65, 175, 0.10);
      border-color: rgba(95, 65, 175, 0.32);
      color: rgba(85, 55, 165, 1);
    }

    .mobile-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }
    .mobile-brand img {
      width: 26px; height: 26px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .mobile-brand-text {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 0.03em;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1;
    }
    .mobile-brand-text .mobile-brand-sub {
      display: block;
      font-size: 9px;
      letter-spacing: 0.16em;
      color: var(--text-mute);
      text-transform: uppercase;
      margin-top: 2px;
      font-family: -apple-system, sans-serif;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Nav strip — day chips (Reset) or chat header (Unlimited) */
    .mobile-nav-strip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .mobile-nav-strip::-webkit-scrollbar { display: none; }
    .mobile-day-chip {
      flex-shrink: 0;
      padding: 7px 13px;
      border-radius: 999px;
      border: 1px solid var(--gold-line);
      background: transparent;
      color: var(--text-dim);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      white-space: nowrap;
      cursor: pointer;
    }
    .mobile-day-chip.active {
      background: var(--gold-soft);
      border-color: var(--gold-strong);
      color: var(--gold);
    }
    .mobile-chat-title {
      flex: 1;
      min-width: 0;

  // ===== Persistence =====
  function loadToken() { try { return localStorage.getItem(STORAGE_KEY); } catch (e) { return null; } }
  function saveToken(t) { try { localStorage.setItem(STORAGE_KEY, t); } catch (e) {} }
  function clearToken() { try { localStorage.removeItem(STORAGE_KEY); localStorage.removeItem(ANON_KEY); } catch (e) {} }
  // Returns the system's preferred color scheme. Falls back to dark if the
  // browser doesn't support the media query.
  function getSystemTheme() {
    try {
      return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
        ? "dark"
        : "light";
    } catch (e) { return "dark"; }
  }
  // Theme always follows the device's system preference. The desktop sidebar
  // theme toggle still works as a SESSION-only override (no persistence), so
  // someone can flip light/dark for a single visit if they want. On the next
  // system change or next page load, the system preference wins again.
  //
  // We deliberately clear any legacy stored preference here so previously
  // toggled users immediately start following system again. If we kept it,
  // anyone who toggled before would stay locked on whichever theme they had
  // picked, which defeats the goal of "follow the device."
  function loadTheme() {
    try { localStorage.removeItem(THEME_KEY); } catch (e) {}
    return getSystemTheme();
  }
  // Session-only saves (no localStorage). Kept as a function for the
  // existing call sites; just becomes a no-op.
  function saveTheme(t) { /* intentionally no-op — theme follows system */ }
  function applyTheme(theme, options) {
    document.documentElement.setAttribute("data-theme", theme);
  }
  // Subscribe to system theme changes. Always updates the website to match
  // the device. Fires in real time when the user's phone or computer flips
  // between light and dark mode (e.g., iOS auto-switching at sunset).
  function subscribeSystemTheme() {
    if (!window.matchMedia) return;
    let mq;
    try { mq = window.matchMedia("(prefers-color-scheme: dark)"); } catch (e) { return; }
    const onChange = () => {
      applyTheme(mq.matches ? "dark" : "light");
    };
    if (mq.addEventListener) mq.addEventListener("change", onChange);
    else if (mq.addListener) mq.addListener(onChange); // Safari < 14
  }

  // ===== Composer draft persistence =====
  // If a user types but doesn't send, the text survives view-switches and
  // reloads. Drafts are scoped per context: entry, day_1/2/3, unlimited_<id>.
  function currentContextKey() {
    if (state.view === "chat") return "day_" + state.currentDay;
    if (state.view === "unlimited-chat") return "unlimited_" + (state.activeUnlimitedId || "default");
    return "entry";
  }
  function draftStorageKey(context) { return "tfif_draft_" + context; }
  function loadDraft(context) {
    try { return localStorage.getItem(draftStorageKey(context)) || ""; } catch (e) { return ""; }
  }
  function saveDraft(context, text) {
    try {
      if (!text) localStorage.removeItem(draftStorageKey(context));
      else localStorage.setItem(draftStorageKey(context), text);
    } catch (e) {}
  }
  function clearDraft(context) {
    try { localStorage.removeItem(draftStorageKey(context)); } catch (e) {}
  }
  // Restore saved draft into the textarea and recalc its auto-height + send
  // button active state. Called from render() after the textarea exists.
  function restoreDraftIntoInput() {
    const inputEl = document.getElementById("input");
    if (!inputEl) return;
    const draft = loadDraft(currentContextKey());
    if (!draft) return;
    inputEl.value = draft;
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
    const send = document.getElementById("send-btn");
    if (send && draft.trim() && !state.loading) send.classList.add("active");
  }

  // ===== Reader font scale =====
  // Applies a CSS custom property used by .msg font-size calc(). Persisted to
  // localStorage so the user's preference carries across sessions.
  function applyFontScale(scale) {
    state.fontScale = scale;
    document.documentElement.style.setProperty("--msg-scale", String(scale));
    try { localStorage.setItem("tfif_font_scale_v1", String(scale)); } catch (e) {}
  }
  const FONT_SCALE_MIN = 0.85;
  const FONT_SCALE_MAX = 1.30;
  const FONT_SCALE_STEP = 0.10;
  function onFontSmaller() {
    const next = Math.max(FONT_SCALE_MIN, Math.round((state.fontScale - FONT_SCALE_STEP) * 100) / 100);
    if (next === state.fontScale) return;
    applyFontScale(next);
    // Refresh the footer so disabled state on min/max updates without a full
    // app re-render.
    const smaller = document.getElementById("font-smaller");
    const larger = document.getElementById("font-larger");
    if (smaller) smaller.disabled = next <= FONT_SCALE_MIN;
    if (larger) larger.disabled = next >= FONT_SCALE_MAX;
  }
  function onFontLarger() {
    const next = Math.min(FONT_SCALE_MAX, Math.round((state.fontScale + FONT_SCALE_STEP) * 100) / 100);
    if (next === state.fontScale) return;
    applyFontScale(next);
    const smaller = document.getElementById("font-smaller");
    const larger = document.getElementById("font-larger");
    if (smaller) smaller.disabled = next <= FONT_SCALE_MIN;
    if (larger) larger.disabled = next >= FONT_SCALE_MAX;
  }

  function generateAnonId() {
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function (c) {
      const r = Math.random() * 16 | 0;
      const v = c === "x" ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
  }
  function getOrCreateAnonId() {
    try {
      let id = localStorage.getItem(ANON_KEY);
      if (!id) {
        id = generateAnonId();
        localStorage.setItem(ANON_KEY, id);
      }
      return id;
    } catch (e) { return generateAnonId(); }
  }

  // ===== API =====
  // Identity for a Kajabi member arrives in the page URL (?email=&kajabiId=&name=),
  // injected by the Kajabi page's Liquid. When those params are absent the app
  // falls back to an anonymous demo identity so it still works standalone.
  function resolveIdentity() {
    // Embed mode: identity comes only from the verified Kajabi postMessage that
    // the gate captured before the app started. URL params are not trusted here.
    if (EMBED_MODE && KAJABI_IDENTITY && KAJABI_IDENTITY.kajabiId) {
      return {
        email: "kajabi-" + KAJABI_IDENTITY.kajabiId + "@tfif.local",
        displayName: KAJABI_IDENTITY.name || "",
        kajabiMemberId: String(KAJABI_IDENTITY.kajabiId)
      };
    }
    let email = "", kajabiId = "", name = "";
    try {
      const p = new URLSearchParams(location.search);
      email = (p.get("email") || "").trim().toLowerCase();
      kajabiId = (p.get("kajabiId") || p.get("kajabiMemberId") || "").trim();
      name = (p.get("name") || "").trim();
    } catch (e) {}
    if (email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      return { email: email, displayName: name, kajabiMemberId: kajabiId || null };
    }
    // Kajabi member identified by member ID only (Kajabi.currentSiteUser.id,
    // passed as ?kajabiId=). The Kajabi member ID is stable and unique, so a
    // synthetic email keyed to it gives the member one consistent account
    // without needing their real email passed through.
    if (kajabiId && /^[0-9A-Za-z_-]{1,64}$/.test(kajabiId)) {
      return { email: "kajabi-" + kajabiId + "@tfif.local", displayName: name, kajabiMemberId: kajabiId };
    }
    return { email: "demo-" + getOrCreateAnonId() + "@tfif.local", displayName: name, kajabiMemberId: null };
  }

  // ===== Resilient chat fetch =====
  // Wraps a chat-style fetch with one automatic retry. Retries fire on:
  //  - thrown errors (network drop, abort, fetch failure)
  //  - 5xx server responses (Vercel cold start, function timeout, Anthropic 529)
  //  - 408 Request Timeout
  // 4xx responses (401, 410, 423) are returned as-is so callers can react.
  // Retry pause = 800ms — long enough for a Vercel cold start, short enough
  // that a real user does not perceive the delay as a frozen UI.
  async function chatFetchWithRetry(doFetch) {
    const attempts = 2;
    const delayMs = 800;
    let lastErr;
    for (let i = 0; i < attempts; i++) {
      try {
        const res = await doFetch();
        const transient = res.status === 408 || (res.status >= 500 && res.status < 600);
        if (transient && i < attempts - 1) {
          await new Promise(r => setTimeout(r, delayMs));
          continue;
        }
        return res;
      } catch (err) {
        lastErr = err;
        if (i < attempts - 1) {
          await new Promise(r => setTimeout(r, delayMs));
          continue;
        }
        throw err;
      }
    }
    throw lastErr;
  }

  // Map error codes / messages from the API into something the participant
  // can actually read. Anything we recognise gets a specific sentence; the
  // catch-all keeps the original error visible for diagnosis.
  function chatErrorMessage(err) {
    const raw = String((err && err.message) || "").toLowerCase();
    if (!raw) return "The Field could not respond just now. Please try again.";
    if (raw === "unlimited_locked" || raw === "server_403") {
      return "The Field Unlimited is included with the full subscription. Your current tier does not include Unlimited access. Open Your Account to upgrade.";
    }
    if (raw === "reset_expired" || raw === "server_410") {
      return "Your 72-Hour Power Reset window has ended. The Field Unlimited continues the work if you would like to keep going.";
    }
    if (raw.includes("rate") || raw.includes("too_many")) {
      return "Too many messages in a short time. Please wait a minute, then continue.";
    }
    if (raw.includes("timeout") || raw.includes("timed out") || raw === "408") {
      return "That message took longer than expected. Please try again.";
    }
    if (raw.includes("overload") || raw === "529" || raw.includes("anthropic")) {
      return "The Field is briefly overloaded. Please try again in a moment.";
    }
    if (raw.includes("server") || raw.startsWith("5") || raw.includes("internal")) {
      return "The Field's servers hit a snag. Please try again in a moment.";
    }
    if (raw.includes("network") || raw.includes("failed to fetch") || raw.includes("offline")) {
      return "Connection interrupted. Check your internet and try again.";
    }
    if (raw === "could not send" || raw === "could_not_send") {
      return "The Field could not respond just now. Please try again.";
    }
    return "Something went wrong: " + raw;
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // Minimal renderer for USER-typed messages. Supports bullets (- or *),
  // numbered lists (1.), and paragraph breaks from blank lines, but
  // deliberately NOT inline tokens (no [[button:...]] / [[mp3:...]] /
  // [[download:...]]), NOT links, NOT bold/italic — user-controlled
  // content must never be able to inject CTAs, audio cards, or HTML.
  // escapeHtml runs first; only the block-level list/paragraph patterns
  // become real HTML.
  function renderUserMessage(text) {
    const safe = escapeHtml(String(text || ""));
    const lines = safe.split("\n");
    const blocks = [];
    let paragraph = [];
    let listType = null;
    let listItems = [];

    function flushParagraph() {
      if (paragraph.length > 0) {
        blocks.push("<p>" + paragraph.join("<br>") + "</p>");
        paragraph = [];
      }
    }
    function flushList() {
      if (listType && listItems.length > 0) {
        blocks.push("<" + listType + ">" + listItems.map(i => "<li>" + i + "</li>").join("") + "</" + listType + ">");
        listItems = [];
        listType = null;
      }
    }

    for (const rawLine of lines) {
      const ulMatch = rawLine.match(/^\s*[-*]\s+(.+)$/);
      const olMatch = rawLine.match(/^\s*\d+\.\s+(.+)$/);
      const trimmed = rawLine.trim();

      if (ulMatch) {
        flushParagraph();
        if (listType !== "ul") { flushList(); listType = "ul"; }
        listItems.push(ulMatch[1]);
      } else if (olMatch) {
        flushParagraph();
        if (listType !== "ol") { flushList(); listType = "ol"; }
        listItems.push(olMatch[1]);
      } else if (trimmed === "") {
        flushParagraph();
        flushList();
      } else {
        flushList();
        paragraph.push(rawLine);
      }
    }
    flushParagraph();
    flushList();

    return blocks.join("");
  }

  // Light markdown renderer for assistant messages. Supports bold (**x**),
  // italic (*x*, _x_), inline code (`x`), bullet lists (-, *), numbered
  // lists (1.), paragraphs, and line breaks. Escapes HTML first to prevent
  // injection — only the parsed markdown patterns become real HTML.
  function renderMarkdown(text) {
    let html = escapeHtml(String(text || ""));

    // Direct download syntax: [[download:Label|URL|filename.pdf]] -> gold
    // button with HTML5 `download` attribute so the file saves straight to
    // the user's Downloads folder instead of opening inline in a tab. URL
    // can be absolute (https://...) or relative (/downloads/foo.pdf). The
    // download attribute only fires for same-origin URLs in modern browsers;
    // prefer relative paths or absolute URLs to the same Vercel domain.
    // Order matters: process [[download:...]] BEFORE [[button:...]] so the
    // three-part token is not partially matched by the two-part button regex.
    html = html.replace(/\[\[download:([^|\]]+)\|([^|\]]+)\|([^\]]+)\]\]/g, function (m, label, url, filename) {
      const u = String(url).trim();
      if (!/^(https?:\/\/|\/)/i.test(u)) return label.trim();
      const safeHref = u.replace(/"/g, "%22");
      const safeName = String(filename).trim().replace(/"/g, "");
      return '<a class="msg-cta-btn" href="' + safeHref + '" download="' + safeName + '">'
        + label.trim()
        + '<span class="msg-cta-arrow" aria-hidden="true">↓</span></a>';
    });

    // CTA button syntax: [[button:Label|https://url]] -> in-brand gold button.
    // escapeHtml has already run, so Label/URL arrive as safe text. Only
    // http(s) destinations are allowed; quotes are encoded before the href.
    html = html.replace(/\[\[button:([^|\]]+)\|([^\]]+)\]\]/g, function (m, label, url) {
      const u = String(url).trim();
      if (!/^https?:\/\//i.test(u)) return label.trim();
      const safeHref = u.replace(/"/g, "%22");
      return '<a class="msg-cta-btn" href="' + safeHref + '" target="_blank" rel="noopener noreferrer">'
        + label.trim()
        + '<span class="msg-cta-arrow" aria-hidden="true">→</span></a>';
    });

    // MP3 audio download syntax: [[mp3:Title|Text to speak]] -> audio card.
    // Renders a loading card that auto-fires generation via /api/speak (which
    // uses Shimrit's ElevenLabs cloned voice). The text portion may span
    // multiple lines; we stash it in a data-attr (base64) so newlines and
    // quotes survive the DOM. processMp3Cards() picks the card up after
    // render and starts the actual audio generation.
    html = html.replace(/\[\[mp3:([^|\]]+)\|([\s\S]+?)\]\]/g, function (m, title, text) {
      const t = title.trim();
      const txt = text.trim();
      if (!t || !txt) return "";
      try {
        const b64Text = btoa(unescape(encodeURIComponent(txt)));
        return '<div class="mp3-card" data-mp3-title="' + t.replace(/"/g, "&quot;") + '" data-mp3-text-b64="' + b64Text + '">'
          + '<div class="mp3-card-inner">'
          + '<div class="mp3-orb loading" aria-hidden="true"></div>'
          + '<div class="mp3-info">'
          + '<div class="mp3-title">Generating in Shimrit’s voice…</div>'
          + '<div class="mp3-meta">about 3 seconds</div>'
          + '</div></div></div>';
      } catch (e) {
        return "";
      }
    });

    // Inline formatting. Order matters: bold before italic so ** doesn't
    // get partially consumed by single-asterisk italic match.
    html = html.replace(/\*\*([^\n*]+?)\*\*/g, "<strong>$1</strong>");
    html = html.replace(/__([^\n_]+?)__/g, "<strong>$1</strong>");
    html = html.replace(/(^|[^*])\*([^\n*]+?)\*(?!\*)/g, "$1<em>$2</em>");
    html = html.replace(/(^|[^_])_([^\n_]+?)_(?!_)/g, "$1<em>$2</em>");
    html = html.replace(/`([^`\n]+?)`/g, "<code>$1</code>");

    // Block-level parsing: paragraphs, line breaks, lists.
    const lines = html.split("\n");
    const blocks = [];
    let paragraph = [];
    let listType = null;
    let listItems = [];

    function flushParagraph() {
      if (paragraph.length > 0) {
        blocks.push("<p>" + paragraph.join("<br>") + "</p>");
        paragraph = [];
      }
    }
    function flushList() {
      if (listType && listItems.length > 0) {
        blocks.push("<" + listType + ">" + listItems.map(i => "<li>" + i + "</li>").join("") + "</" + listType + ">");
        listItems = [];
        listType = null;
      }
    }

    for (const rawLine of lines) {
      const line = rawLine;
      const trimmed = line.trim();
      const ulMatch = line.match(/^\s*[-*]\s+(.+)$/);
      const olMatch = line.match(/^\s*\d+\.\s+(.+)$/);

      if (ulMatch) {
        flushParagraph();
        if (listType !== "ul") { flushList(); listType = "ul"; }
        listItems.push(ulMatch[1]);
      } else if (olMatch) {
        flushParagraph();
        if (listType !== "ol") { flushList(); listType = "ol"; }
        listItems.push(olMatch[1]);
      } else if (trimmed === "") {
        flushParagraph();
        flushList();
      } else {
        flushList();
        paragraph.push(line);
      }
    }
    flushParagraph();
    flushList();

    return blocks.join("");
  }

  // ===== MP3 audio card generation =====
  // Each [[mp3:Title|Text]] token renders as a loading card. After
  // renderMessages() runs we scan for any cards that haven't been processed
  // yet and fire /api/speak to generate the audio in Shimrit's voice. Once
  // the audio arrives we swap the card from loading state into the inline
  // player UI.
  //
  // CRITICAL: renderMessages() replaces wrap.innerHTML wholesale on every
  // new message, which DESTROYS any "ready" cards built in renderMp3CardReady
  // along with the rest of the DOM. To survive re-renders, we cache the
  // generated blob URL and duration keyed by the token's base64 text (which
  // is stable across renders for the same token). When processMp3Cards
  // re-mounts a card after a re-render, it checks the cache first and
  // restores the player immediately, never re-firing /api/speak. We also
  // dedupe simultaneous in-flight fetches via mp3InFlight so two cards
  // pointing at the same text share one request.
  const mp3BlobCache = new Map(); // b64Text -> { url, duration, title }
  const mp3InFlight = new Map(); // b64Text -> Promise<{ url, duration, title }>

  function processMp3Cards() {
    document.querySelectorAll(".mp3-card:not(.mp3-processed)").forEach(card => {
      card.classList.add("mp3-processed");
      const title = card.getAttribute("data-mp3-title") || "Your audio";
      const b64 = card.getAttribute("data-mp3-text-b64") || "";

      // Cache hit: this exact text was generated already. Render the player
      // straight away from the cached blob — no /api/speak call needed.
      const cached = b64 ? mp3BlobCache.get(b64) : null;
      if (cached) {
        renderMp3CardReady(card, cached.title || title, cached.url, cached.duration);
        return;
      }

      let text = "";
      try {
        text = decodeURIComponent(escape(atob(b64)));
      } catch (e) {
        text = "";
      }
      if (!text || !state.sessionToken) {
        renderMp3CardError(card, title);
        return;
      }
      generateMp3Audio(card, title, text, b64);
    });
  }

  async function generateMp3Audio(card, title, text, cacheKey) {
    try {
      // If another card is already generating this same audio, await its
      // promise instead of firing a duplicate request. This protects against
      // the common case where renderMessages re-mounts the same MP3 token
      // before the first /api/speak call has come back.
      let inflight = cacheKey ? mp3InFlight.get(cacheKey) : null;
      if (!inflight) {
        inflight = (async () => {
          const res = await fetch(API_BASE + "/speak", {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
            body: JSON.stringify({ text })
          });
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.error || ("speak_" + res.status));
          }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);

          // Probe duration via a hidden Audio element. The 4-second timeout
          // protects against browsers that never fire loadedmetadata.
          const probe = new Audio();
          probe.preload = "metadata";
          const durationSec = await new Promise(resolve => {
            const onLoaded = () => resolve(Math.round(probe.duration || 0));
            const onErr = () => resolve(0);
            probe.addEventListener("loadedmetadata", onLoaded, { once: true });
            probe.addEventListener("error", onErr, { once: true });
            probe.src = url;
            setTimeout(() => resolve(Math.round(probe.duration || 0)), 4000);
          });
          return { url, duration: durationSec, title };
        })();
        if (cacheKey) mp3InFlight.set(cacheKey, inflight);
      }

      const result = await inflight;

      // Save into the long-lived cache so future re-renders skip the API.
      if (cacheKey) mp3BlobCache.set(cacheKey, result);

      renderMp3CardReady(card, result.title || title, result.url, result.duration);
    } catch (err) {
      console.error("mp3_generation_failed", err);
      // Allow a future card mount to retry by clearing the in-flight marker.
      if (cacheKey) mp3InFlight.delete(cacheKey);
      renderMp3CardError(card, title);
    } finally {
      // Once the in-flight promise resolves, clear it so the long-lived
      // mp3BlobCache becomes the single source of truth from here on.
      if (cacheKey && mp3InFlight.get(cacheKey) && mp3BlobCache.has(cacheKey)) {
        mp3InFlight.delete(cacheKey);
      }
    }
  }

  function renderMp3CardReady(card, title, url, durationSec) {
    const filename = (title || "audio").replace(/[^a-z0-9-_]+/gi, "-").replace(/^-+|-+$/g, "") + ".mp3";
    const totalLabel = formatMp3Time(durationSec);
    // Inline player layout: top row = play button + title + download.
    // Middle row = scrubber + time. Bottom row = speed pills.
    card.innerHTML =
      '<div class="mp3-player">' +
        '<div class="mp3-player-top">' +
          '<button type="button" class="mp3-play-btn" aria-label="Play">' +
            '<svg class="mp3-icon-play" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>' +
            '<svg class="mp3-icon-pause" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>' +
          '</button>' +
          '<div class="mp3-player-title">' + escapeHtml(title) + '</div>' +
          '<button type="button" class="mp3-download-btn">Download</button>' +
        '</div>' +
        '<div class="mp3-scrubber-row">' +
          '<input type="range" class="mp3-scrubber" min="0" max="1000" value="0" step="1" aria-label="Seek" />' +
          '<div class="mp3-time"><span class="mp3-time-cur">0:00</span> / <span class="mp3-time-total">' + escapeHtml(totalLabel) + '</span></div>' +
        '</div>' +
        '<div class="mp3-speed-row">' +
          '<div class="mp3-speed-group" role="group" aria-label="Playback speed">' +
            '<button type="button" class="mp3-speed-btn active" data-speed="1">1×</button>' +
            '<button type="button" class="mp3-speed-btn" data-speed="1.5">1.5×</button>' +
            '<button type="button" class="mp3-speed-btn" data-speed="2">2×</button>' +
          '</div>' +
          '<div class="mp3-voice-label" style="font-size:11px;color:var(--text-dim);letter-spacing:0.02em;">MP3</div>' +
        '</div>' +
        '<audio class="mp3-audio" src="' + url + '" preload="metadata"></audio>' +
      '</div>';

    wireMp3Player(card, url, filename);
  }

  function formatMp3Time(sec) {
    sec = Math.max(0, Math.floor(sec || 0));
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return m + ":" + (s < 10 ? "0" : "") + s;
  }

  function wireMp3Player(card, url, filename) {
    const audio = card.querySelector(".mp3-audio");
    const playBtn = card.querySelector(".mp3-play-btn");
    const iconPlay = card.querySelector(".mp3-icon-play");
    const iconPause = card.querySelector(".mp3-icon-pause");
    const scrubber = card.querySelector(".mp3-scrubber");
    const curEl = card.querySelector(".mp3-time-cur");
    const totalEl = card.querySelector(".mp3-time-total");
    const downloadBtn = card.querySelector(".mp3-download-btn");
    const speedBtns = card.querySelectorAll(".mp3-speed-btn");

    if (!audio) return;

    // Play / pause toggle.
    playBtn.addEventListener("click", () => {
      if (audio.paused) {
        // Pause any other audio elements that may be playing.
        document.querySelectorAll(".mp3-audio").forEach(a => { if (a !== audio) a.pause(); });
        audio.play();
      } else {
        audio.pause();
      }
    });
    audio.addEventListener("play", () => {
      iconPlay.style.display = "none";
      iconPause.style.display = "block";
      playBtn.setAttribute("aria-label", "Pause");
    });
    audio.addEventListener("pause", () => {
      iconPlay.style.display = "block";
      iconPause.style.display = "none";
      playBtn.setAttribute("aria-label", "Play");
    });
    audio.addEventListener("ended", () => {
      iconPlay.style.display = "block";
      iconPause.style.display = "none";
      playBtn.setAttribute("aria-label", "Play");
      scrubber.value = 0;
      curEl.textContent = "0:00";
    });

    // Update scrubber + time as audio plays.
    audio.addEventListener("loadedmetadata", () => {
      if (audio.duration && isFinite(audio.duration)) {
        totalEl.textContent = formatMp3Time(audio.duration);
      }
    });
    audio.addEventListener("timeupdate", () => {
      if (!audio.duration || !isFinite(audio.duration)) return;
      const pct = (audio.currentTime / audio.duration) * 1000;
      scrubber.value = Math.round(pct);
      curEl.textContent = formatMp3Time(audio.currentTime);
    });
    // Scrub.
    scrubber.addEventListener("input", () => {
      if (!audio.duration || !isFinite(audio.duration)) return;
      const pct = Number(scrubber.value) / 1000;
      audio.currentTime = pct * audio.duration;
    });

    // Speed pills.
    speedBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        const rate = parseFloat(btn.getAttribute("data-speed")) || 1;
        audio.playbackRate = rate;
        speedBtns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });

    // Download.
    if (downloadBtn) {
      downloadBtn.addEventListener("click", () => {
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      });
    }
  }

  function renderMp3CardError(card, title) {

  // ===== Export your work — native browser print =====

  // Uses the browser's built-in PDF engine so rendering is always correct

  const RESET_DAY_TITLES = { 1: "State Reset", 2: "Decision & Action", 3: "Frequency Calibration" };

  async function onExportWorkClick(e) {
    if (e && e.preventDefault) e.preventDefault();
