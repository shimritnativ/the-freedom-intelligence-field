        ${renderFloatingChatMenu()}
        ${renderInstallModal()}
        ${renderNotifPromptModal()}
      `;
      // Common sidebar wiring (mobile menu, account, logout, theme, etc.)
      // runs unconditionally at the bottom of render() for every view, so
      // we don't need a separate helper here. Only welcome-specific action
      // card wiring goes below.
      // Welcome action card wiring
      const newChatBtn = document.getElementById("welcome-newchat-btn");
      if (newChatBtn) newChatBtn.addEventListener("click", () => onNewChatClick());
      const processBtn = document.getElementById("welcome-process-btn");
      if (processBtn) processBtn.addEventListener("click", () => {
        // Open the Library Hub showing all 8 categories together. The
        // member then drills into whichever one calls to them, rather than
        // being dropped into a category they didn't choose.
        onLibraryClick();
      });
      const continueBtn = document.getElementById("welcome-continue-btn");
      if (continueBtn) continueBtn.addEventListener("click", () => {
        const id = continueBtn.dataset.recentId;
        if (id) onUnlimitedChatClick(id);
      });
    } else if (state.view === "unlimited-chat") {
      if (!unlimitedUnlocked()) {
        app.innerHTML = `
          ${renderMobileTopBar()}
          <div class="main-row">
            ${renderSidebar()}
            <main class="main">
              <div class="unl-upsell-main">
                <div class="unlimited-card">
                  <div class="unlimited-lock">${lockIconSvg()}</div>
                  <div class="unlimited-title">The Field — Unlimited</div>
                  <div class="unlimited-desc">Unlimited conversations with the Field, plus the six guided processes. Continue the work whenever life asks you to shift, choose, create, or return to your power.</div>
                  <a class="unlimited-btn" href="${UNLIMITED_URL}" target="_blank" rel="noopener noreferrer">Unlock The Field <span class="unlimited-btn-arrow" aria-hidden="true">↗</span></a>
                </div>
              </div>
            </main>
          </div>
          ${renderMobileOverlay()}
        `;
      } else {
      const activeUnl = state.unlimitedSessions.find(s => s.id === state.activeUnlimitedId);
      const headerTitle = activeUnl ? (activeUnl.title || "New chat") : "The Field";
      const headerSub = activeUnl
        ? (activeUnl.lastMessageAt
            ? "Last active " + formatRelativeTime(activeUnl.lastMessageAt)
            : "Started " + formatRelativeTime(activeUnl.startedAt))
        : "";
      app.innerHTML = `
        ${renderMobileTopBar()}
        <div class="main-row">
          ${renderSidebar()}
          <main class="main">
            <div class="main-header">
              <div>
                <div class="main-header-title">${escapeHtml(headerTitle)}</div>
                ${headerSub ? `<div class="main-header-sub">${escapeHtml(headerSub)}</div>` : ""}
              </div>
              ${activeUnl ? `
                <div class="main-header-actions">
                  <button class="header-chat-menu-btn" data-chat-menu-id="${activeUnl.id}" data-chat-menu-origin="header" type="button" aria-label="Chat options">
                    ${dotsIconSvg()}
                  </button>
                </div>
              ` : ""}
            </div>
            <div class="messages-wrap" id="messages-wrap">
              <div class="messages" id="messages"></div>
            </div>
            <div class="composer-wrap">
              <div class="composer">
                <textarea id="input" rows="1" placeholder="Interact with The Field"></textarea>
                <button class="mic-btn" id="mic-btn" type="button" aria-label="Record voice message" title="Record voice message">
                  <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <rect x="9" y="3" width="6" height="11" rx="3"/>
                    <path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.93V20H9a1 1 0 1 0 0 2h6a1 1 0 1 0 0-2h-2v-2.07A7 7 0 0 0 19 11z"/>
                  </svg>
                </button>
                <button class="send-btn" id="send-btn" type="button">↑</button>
              </div>
              <div class="composer-note">Your conversation is private. No one else has access to it.</div>
            </div>
          </main>
        </div>
        ${renderMobileOverlay()}
        ${renderAccountModal()}
        ${renderDeleteConfirmModal()}
        ${renderRenameModal()}
        ${renderFloatingChatMenu()}
        ${renderInstallModal()}
        ${renderNotifPromptModal()}
      `;
      renderUnlimitedMessages();
      document.getElementById("input").addEventListener("input", onInputChange);
      document.getElementById("input").addEventListener("keydown", onUnlimitedKeyDown);
      document.getElementById("send-btn").addEventListener("click", onUnlimitedSendClick);
      const micBtn = document.getElementById("mic-btn");
      if (micBtn) {
        if (!micSupported()) micBtn.style.display = "none";
        else micBtn.addEventListener("click", onMicClick);
      }
      const messagesWrap = document.getElementById("messages-wrap");
      if (messagesWrap) messagesWrap.addEventListener("click", onUnlimitedSpeakerClick);
      restoreDraftIntoInput();
      setTimeout(() => { if (!state.searchOpen) document.getElementById("input")?.focus(); }, 50);
      }
    }

    // Wire up controls present in every view.
    const themeBtn = document.getElementById("theme-toggle");
    if (themeBtn) themeBtn.addEventListener("click", onThemeToggle);
    const fontSmallerBtn = document.getElementById("font-smaller");
    if (fontSmallerBtn) fontSmallerBtn.addEventListener("click", onFontSmaller);
    const fontLargerBtn = document.getElementById("font-larger");
    if (fontLargerBtn) fontLargerBtn.addEventListener("click", onFontLarger);
    const resetBtn = document.getElementById("reset-btn");
    if (resetBtn) resetBtn.addEventListener("click", onReset);
    const autoplayCheckbox = document.getElementById("autoplay-checkbox");
    if (autoplayCheckbox) autoplayCheckbox.addEventListener("change", onAutoplayChange);
    // Day items should be clickable in ANY view (entry, chat, unlimited-chat)
    // so users can navigate freely between days and Unlimited.
    document.querySelectorAll(".day-item").forEach(el => {
      el.addEventListener("click", () => onDayClick(parseInt(el.dataset.day, 10)));
    });

    // ===== Mobile chrome wiring =====
    const mobileMenuBtn = document.getElementById("mobile-menu-btn");
    if (mobileMenuBtn) mobileMenuBtn.addEventListener("click", onMobileMenuClick);
    const mobileThemeBtn = document.getElementById("mobile-theme-btn");
    if (mobileThemeBtn) mobileThemeBtn.addEventListener("click", onThemeToggle);
    const mobileExportBtn = document.getElementById("mobile-export-btn");
    if (mobileExportBtn) mobileExportBtn.addEventListener("click", onExportWorkClick);
    const mobileOverlay = document.getElementById("mobile-overlay");
    if (mobileOverlay) mobileOverlay.addEventListener("click", onMobileOverlayClick);
    const mobileNewChat = document.getElementById("mobile-new-chat-btn");
    if (mobileNewChat) mobileNewChat.addEventListener("click", onNewChatClick);
    document.querySelectorAll(".mobile-day-chip").forEach(el => {
      el.addEventListener("click", () => onDayClick(parseInt(el.dataset.mobileDay, 10)));
    });
    document.querySelectorAll(".mobile-tab").forEach(el => {
      el.addEventListener("click", () => onMobileTabClick(el.dataset.mobileTab));
    });
    // Unlimited sidebar wires (present whenever sidebar is rendered).
    const newChatBtn = document.getElementById("new-chat-btn");
    if (newChatBtn) newChatBtn.addEventListener("click", onNewChatClick);
    const magBtn = document.getElementById("magnifier-btn");
    if (magBtn) magBtn.addEventListener("click", onMagnifierClick);
    const processMenuBtn = document.getElementById("process-menu-btn");
    if (processMenuBtn) processMenuBtn.addEventListener("click", onProcessMenuToggle);
    // Dropdown items are now CATEGORIES (data-category) — clicking one opens
    // the category view in the main pane. Process selection happens there,
    // on a card click that fires onProcessPick.
    document.querySelectorAll(".process-menu-category").forEach(el => {
      el.addEventListener("click", () => onCategoryClick(el.dataset.category));
    });
    const logoutBtn = document.getElementById("logout-btn");
    if (logoutBtn) logoutBtn.addEventListener("click", onLogout);
    const accountBtn = document.getElementById("account-btn");
    if (accountBtn) accountBtn.addEventListener("click", onAccountOpen);
    // ===== Account modal wiring (only present when state.accountMenuOpen) =====
    const acctOverlay = document.getElementById("acct-overlay");
    if (acctOverlay) {
      acctOverlay.addEventListener("click", (e) => {
        // Click on the overlay backdrop (not the modal itself) closes it.
        if (e.target === acctOverlay) onAccountClose();
      });
    }
    const acctCloseBtn = document.getElementById("acct-close-btn");
    if (acctCloseBtn) acctCloseBtn.addEventListener("click", onAccountClose);
    const acctNameForm = document.getElementById("acct-name-form");
    if (acctNameForm) acctNameForm.addEventListener("submit", onAccountSaveName);
    const acctSignoutBtn = document.getElementById("acct-signout-btn");
    if (acctSignoutBtn) acctSignoutBtn.addEventListener("click", () => {
      // Close the modal first so the confirm dialog isn't behind the overlay.
      state.accountMenuOpen = false;
      onLogout();
    });
    const acctExportBtn = document.getElementById("acct-export-btn");
    if (acctExportBtn) acctExportBtn.addEventListener("click", onExportWorkClick);
    const acctExportUnlimitedBtn = document.getElementById("acct-export-unlimited-btn");
    if (acctExportUnlimitedBtn) acctExportUnlimitedBtn.addEventListener("click", onExportAllUnlimitedClick);
    const acctInstallBtn = document.getElementById("acct-install-btn");
    if (acctInstallBtn) acctInstallBtn.addEventListener("click", onInstallOpen);
    // Preferences → Day 2 & 3 reminders card. Only clickable when permission
    // is in the default state (never asked). When granted, the card displays
    // a confirmation pill. When denied, the desc points to browser settings.
    // Both terminal states bind no click — prevents the "tapped, nothing
    // happened" mobile bug from the previous attached-but-no-op handler.
    // The toggle is the new single source of truth for ON/OFF state. Click
    // anywhere on it (or press space/enter while focused) to flip.
    const prefNotifToggle = document.getElementById("pref-notif-toggle");
    if (prefNotifToggle) {
      prefNotifToggle.addEventListener("click", onPushTogglePress);
      prefNotifToggle.addEventListener("keydown", (e) => {
        if (e.key === " " || e.key === "Enter") {
          e.preventDefault();
          onPushTogglePress();
        }
      });
    }
    // Refresh the server-side subscription state for THIS account, then
    // paint the toggle. This is the fix for the bug where a different
    // logged-in account showed "Enabled" because the browser permission was
    // still granted from the previous account.
    updatePushButtonState();
    refreshPushServerState().then(updatePushButtonState);
    // Sidebar "Add to Home Screen" button — same install modal popup.
    const sidebarInstallBtn = document.getElementById("sidebar-install-btn");
    if (sidebarInstallBtn) sidebarInstallBtn.addEventListener("click", onInstallOpen);
    // Notification opt-in pre-prompt modal buttons
    const notifAcceptBtn = document.getElementById("notif-accept-btn");
    if (notifAcceptBtn) notifAcceptBtn.addEventListener("click", onNotifPromptAccept);
    const notifDismissBtn = document.getElementById("notif-dismiss-btn");
    if (notifDismissBtn) notifDismissBtn.addEventListener("click", onNotifPromptDismiss);
    // Install modal overlay click + close button
    const installOverlay = document.getElementById("install-overlay");
    if (installOverlay) {
      installOverlay.addEventListener("click", (e) => {
        if (e.target === installOverlay) onInstallClose();
      });
    }
    const installCloseBtn = document.getElementById("install-close-btn");
    if (installCloseBtn) installCloseBtn.addEventListener("click", onInstallClose);
    const unlSearch = document.getElementById("unl-search-input");
    if (unlSearch) {
      // Update ONLY the chat list as the user types — full render would
      // re-create the chat textarea and steal focus away from this input.
      unlSearch.addEventListener("input", (e) => {
        state.searchQuery = e.target.value;
        renderUnlimitedChatList();
      });
      if (state.searchOpen && document.activeElement !== unlSearch) {
        setTimeout(() => unlSearch.focus(), 30);
      }
    }
    wireUnlimitedChatItems();
    wireResetSectionToggle();
    wireChatMenus();
    wireDeleteConfirm();
    wireRenameModal();
    wireOutsideMenuClose();
  }

  // Re-render just the .unl-chat-list section. Used by search input changes
  // so the search input keeps focus while the list filters live. Falls back
  // to a full render() if the structure is too complex to patch (rename in
  // progress, menu open, etc).
  function renderUnlimitedChatList() {
    if (state.openChatMenuId || state.renamingChatId) {
      // Don't partial-render when interactive UI is mounted — would unmount it.
      render();
      return;
    }
    render();
  }

  function wireUnlimitedChatItems() {
    document.querySelectorAll(".unl-chat-item").forEach(el => {
      el.addEventListener("click", (e) => {
        // Ignore clicks on the menu button, floating dropdown, or anywhere
        // inside the editable title while a rename is in progress.
        if (e.target.closest('[data-chat-menu-id]')) return;
        if (e.target.closest('[data-menu-dropdown]')) return;
        if (e.target.closest('.unl-chat-title.editing')) return;
        // Skip entirely when this chat is being renamed — prevents any
        // accidental navigation while the user is editing.
        if (state.renamingChatId === el.dataset.unlId) return;
        onUnlimitedChatClick(el.dataset.unlId);
      });
      // Long-press for mobile: 500ms hold opens the menu
      let pressTimer = null;
      el.addEventListener("touchstart", (e) => {
        if (e.target.closest('[data-chat-menu-id]')) return;
        if (e.target.closest('.unl-chat-title.editing')) return;
        if (state.renamingChatId === el.dataset.unlId) return;
        const chatId = el.dataset.unlId;
        pressTimer = setTimeout(() => {
          onChatMenuToggle(chatId, "sidebar");
          if (navigator.vibrate) navigator.vibrate(10);
        }, 500);
      }, { passive: true });
      const cancelPress = () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } };
      el.addEventListener("touchend", cancelPress);
      el.addEventListener("touchmove", cancelPress);
      el.addEventListener("touchcancel", cancelPress);
    });
  }

  // Reset section collapse/expand toggle (Unlimited members only)
  function wireResetSectionToggle() {
    const btn = document.getElementById("reset-section-toggle");
    if (btn) btn.addEventListener("click", onResetSectionToggle);
  }

  // 3-dot menu buttons (both sidebar and header) and their dropdown items
  function wireChatMenus() {
    document.querySelectorAll("[data-chat-menu-id]").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = btn.dataset.chatMenuId;
        const origin = btn.dataset.chatMenuOrigin || "sidebar";
        // Pass the button itself so positioning math uses its rect even
        // when the click bubbles from an inner SVG and currentTarget shifts.
        onChatMenuToggle(id, origin, e, btn);
      });
    });
    document.querySelectorAll("[data-menu-action]").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        e.preventDefault();
        const action = btn.dataset.menuAction;
        const id = btn.dataset.chatId;
        if (action === "rename") onChatRenameStart(id);
        else if (action === "pin") onChatPinToggle(id, true);
        else if (action === "unpin") onChatPinToggle(id, false);
        else if (action === "export") onExportUnlimitedChatClick(id);
        else if (action === "delete") onChatDeleteRequest(id);
      });
    });
  }

  // Rename modal wiring. Enter saves, Escape cancels, click on the dim
  // backdrop closes without saving.
  function wireRenameModal() {
    if (!state.renamingChatId) return;
    const overlay = document.getElementById("rename-overlay");
    const input = document.getElementById("rename-modal-input");
    const form = document.getElementById("rename-form");
    const cancelBtn = document.getElementById("rename-cancel-btn");
    const chatId = state.renamingChatId;
    if (overlay) {
      overlay.addEventListener("click", (e) => {
        if (e.target === overlay) onChatRenameCancel();
      });
    }
    if (cancelBtn) cancelBtn.addEventListener("click", onChatRenameCancel);
    if (input) {
      input.addEventListener("input", (e) => { state.renamingChatDraft = e.target.value; });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Escape") { e.preventDefault(); onChatRenameCancel(); }
      });
    }
    if (form) {
      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const value = input ? input.value : state.renamingChatDraft;
        onChatRenameSubmit(chatId, value);
      });
    }
  }

  // Delete confirmation modal wiring
  function wireDeleteConfirm() {
    const overlay = document.getElementById("delete-confirm-overlay");
    if (overlay) {
      overlay.addEventListener("click", (e) => {
        if (e.target === overlay) onChatDeleteCancel();
      });
    }
    const cancelBtn = document.getElementById("delete-cancel-btn");
    if (cancelBtn) cancelBtn.addEventListener("click", onChatDeleteCancel);
    const confirmBtn = document.getElementById("delete-confirm-btn");
    if (confirmBtn) confirmBtn.addEventListener("click", onChatDeleteConfirm);
  }

  // Click anywhere outside an open menu closes it
  function wireOutsideMenuClose() {
    if (!state.openChatMenuId) return;
    const handler = (e) => {
      if (e.target.closest('[data-chat-menu-id]')) return;
      if (e.target.closest('[data-menu-dropdown]')) return;
      closeAllChatMenus();
      document.removeEventListener("click", handler);
    };
    // Attach on the next tick so the click that opened the menu doesn't
    // immediately close it.
    setTimeout(() => document.addEventListener("click", handler), 50);
  }

  // Skeleton placeholder shown while a chat's messages stream in. Widths
  // vary to feel like incoming paragraphs rather than a static block.
  function renderSkeletonLoading() {
    return `
      <div class="chat-loading" aria-label="Loading conversation" role="status">
        <div class="skeleton-line skel-title" style="width: 32%"></div>
        <div class="skeleton-line" style="width: 88%"></div>
        <div class="skeleton-line" style="width: 94%"></div>
        <div class="skeleton-line" style="width: 76%"></div>
        <div class="skeleton-line" style="width: 64%"></div>
        <div class="skeleton-line skel-gap" style="width: 70%"></div>
        <div class="skeleton-line" style="width: 86%"></div>
        <div class="skeleton-line" style="width: 80%"></div>
        <div class="skeleton-line" style="width: 50%"></div>
      </div>
    `;
  }

  // Render the Category view in the main pane. Shows the active category's
  // title, tagline, and process cards. Real processes are buttons that fire
  // onProcessPick(processKey) to start a guided chat — same flow as the old
  // dropdown. Coming-soon entries render as static, dimmed cards.
  function renderCategoryView() {
    const category = PROCESS_CATEGORIES.find(c => c.key === state.activeCategoryKey) || PROCESS_CATEGORIES[0];
    if (!category) return "";
    const cards = category.processes.map(p => {
      if (p.comingSoon) {
        return `
          <div class="category-card category-card--coming-soon">
            <div class="category-card-eyebrow">Coming Soon</div>
            <div class="category-card-title">${escapeHtml(p.name)}</div>
          </div>
        `;
      }
      return `
        <button class="category-card" data-process="${p.processKey}" type="button">
          <div class="category-card-eyebrow">${p.steps} Steps · ${escapeHtml(p.time)}</div>
          <div class="category-card-title">${escapeHtml(p.name)}</div>
          <div class="category-card-desc">${escapeHtml(p.desc)}</div>
          <span class="category-card-arrow" aria-hidden="true">→</span>
        </button>
      `;
    }).join("");
    return `
      <main class="main category-main">
        <div class="category-view">
          <button class="category-back-btn" id="category-back-btn" type="button">
            <span class="category-back-btn-arrow" aria-hidden="true">←</span>
            <span>Back to all categories</span>
          </button>
          <div class="category-eyebrow">A Category of The Field</div>
          <h1 class="category-title">${escapeHtml(category.name)}</h1>
          <div class="category-divider"></div>
          <div class="category-tagline">${escapeHtml(category.tagline)}</div>
          <div class="category-grid">${cards}</div>
          <div class="category-footer">Choose a process to begin · the Field will guide you from there.</div>
        </div>
      </main>
    `;
  }

  // Render the Library Hub view — all 8 categories shown together as cards.
  // This is what the Welcome view's "Open a guided process" button lands on
  // (previously it dropped straight into a single category, which felt like
  // skipping the introduction). Clicking a card from here drills into that
  // category's detail page via onCategoryClick(key).
  function renderLibraryView() {
    const cards = PROCESS_CATEGORIES.map(c => {
      const builtCount = c.processes.filter(p => !p.comingSoon).length;
      const totalCount = c.processes.length;
      const allComingSoon = builtCount === 0;
      const footer = allComingSoon
        ? `<div class="library-card-meta library-card-meta--coming-soon">COMING SOON</div>`
        : `<div class="library-card-meta">${totalCount} ${totalCount === 1 ? "PROCESS" : "PROCESSES"}</div>
           <div class="library-card-arrow" aria-hidden="true">→</div>`;
      const tag = allComingSoon ? "div" : "button";
      const attrs = allComingSoon
        ? `class="library-card library-card--coming-soon"`
        : `class="library-card" data-category="${c.key}" type="button"`;
      return `
        <${tag} ${attrs}>
          <div class="library-card-head">
            <div class="library-card-icon">${categoryIconSvg(c.key)}</div>
            <div class="library-card-title">${escapeHtml(c.name)}</div>
          </div>
          <div class="library-card-desc">${escapeHtml(c.hubDesc || c.tagline || "")}</div>
          <div class="library-card-footer">${footer}</div>
        </${tag}>
      `;
    }).join("");
    return `
      <main class="main library-main">
        <div class="library-view">
          <div class="library-eyebrow">The Field Library</div>
          <h1 class="library-title">Start a guided process</h1>
          <div class="library-divider"></div>
          <div class="library-tagline">Each one is a calibrated pathway. Choose the work that meets you where you are.</div>
          <div class="library-grid">${cards}</div>
          <div class="library-footer">Choose a category to see the processes inside.</div>
        </div>
      </main>
    `;
  }

  function renderMessages() {
    const wrap = document.getElementById("messages");
    if (!wrap) return;
    // Empty + loading = switched into a chat whose messages haven't arrived
    // yet. Render skeleton lines that mimic paragraph shapes so the wait
    // reads as "content filling in" rather than "stuck".
    if (state.loading && state.messages.length === 0) {
      wrap.innerHTML = renderSkeletonLoading();
      return;
    }
    let html = state.messages.map((m, i) => {
      if (m.role === "user") {
        return `
          <div class="msg-row ${m.role}">
            <div class="msg">${renderUserMessage(m.content)}</div>
          </div>
        `;
      }
      return `
        <div class="msg-row ${m.role}">
          <div class="msg">${renderMarkdown(m.content)}</div>
          <button class="speak-btn" data-msg-index="${i}" type="button" aria-label="Play in Shimrit's voice" title="Play in Shimrit's voice">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M3 9v6h4l5 5V4L7 9H3z"/>
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
              <path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          </button>
        </div>
      `;
    }).join("");
    if (state.loading) {
      html += `
        <div class="msg-row assistant">
          <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>
      `;
    }
    // Prepend the expired banner at the top of the conversation so the
    // participant sees the locked state immediately on load. The full
    // conversation stays visible underneath so they can re-read and
    // export it from the Account modal.
    if (isResetExpired()) {
      html = renderExpiredBanner() + html;
    }
    wrap.innerHTML = html;
    const wrapper = document.getElementById("messages-wrap");
    if (wrapper) wrapper.scrollTop = wrapper.scrollHeight;
    // Scan any newly rendered [[mp3:...]] cards and start audio generation.
    processMp3Cards();
  }

  // ===== Mobile chrome handlers =====
  // Toggle the drawer by mutating classes on the existing DOM nodes — calling
  // render() would replace the sidebar element, and the browser only animates
  // CSS transitions on elements that already exist when a property changes.
  function onMobileMenuClick() {
    state.mobileDrawerOpen = true;
    const sidebar = document.querySelector(".sidebar");
    const overlay = document.getElementById("mobile-overlay");
    if (sidebar) sidebar.classList.add("mobile-open");
    if (overlay) overlay.classList.add("open");
  }
  function onMobileOverlayClick() {
    state.mobileDrawerOpen = false;
    const sidebar = document.querySelector(".sidebar");
    const overlay = document.getElementById("mobile-overlay");
    if (sidebar) sidebar.classList.remove("mobile-open");
    if (overlay) overlay.classList.remove("open");
  }
  // Bottom-tab navigation. Reset → switch to current day's Reset chat.
  // Unlimited → open the most recent chat, or start a new one if none exist.
  function onMobileTabClick(tab) {
    state.mobileDrawerOpen = false; // close drawer if it happened to be open
    if (tab === "reset") {
      if (state.view === "chat") { render(); return; }
      onDayClick(state.currentDay || 1);
      return;
    }
    if (tab === "unlimited") {
      if (!unlimitedUnlocked()) { state.view = "unlimited-chat"; render(); return; }
      if (state.view === "unlimited-chat") { render(); return; }
      if (state.unlimitedSessions.length > 0) {
        onUnlimitedChatClick(state.unlimitedSessions[0].id);
      } else {
        onNewChatClick();
      }
    }
  }

  // ===== Handlers =====
  function onThemeToggle() {
    const current = document.documentElement.getAttribute("data-theme") || "dark";
    const next = current === "dark" ? "light" : "dark";
    applyTheme(next);
    render();
  }

  // ===== Login (email + 6-digit code) =====
  function loginErrorMessage(code) {
    switch (code) {
      case "not_a_member":
        return "We couldn't find a Master Your Path membership for that email. Use the email from your purchase.";
      case "too_many_requests":
        return "Too many code requests. Please wait a few minutes, then try again.";
      case "too_many_attempts":
        return "Too many incorrect tries. Request a new code.";
      case "wrong_code":
        return "That code isn't right. Check your email and try again.";
      case "code_expired":
        return "That code has expired. Request a new one.";
      case "invalid_email":
        return "Please enter a valid email address.";
      default:
        return "Something went wrong. Please try again in a moment.";
    }
  }

  async function onRequestCode(e) {
    if (e) e.preventDefault();
    if (state.loginLoading) return;
    const input = document.getElementById("login-email-input");
    const email = ((input && input.value) || "").trim().toLowerCase();
    if (!email) return;
    state.loginEmail = email;
    state.loginError = "";
    state.loginLoading = true;
    render();
    try {
      await apiRequestCode(email);
      state.loginLoading = false;
      state.loginStep = "code";
      render();
    } catch (err) {
      state.loginLoading = false;
      state.loginError = loginErrorMessage(err && err.message);
      render();
    }
  }

  async function onVerifyCode(e) {
    if (e) e.preventDefault();
    if (state.loginLoading) return;
    const input = document.getElementById("login-code-input");
    const code = ((input && input.value) || "").trim();
    if (!/^[0-9]{6}$/.test(code)) {
      state.loginError = "Enter the 6-digit code from your email.";
      render();
      return;
    }
    state.loginError = "";
    state.loginLoading = true;
    render();
    try {
      const data = await apiVerifyCode(state.loginEmail, code);
      state.sessionToken = data.sessionToken;
      saveToken(data.sessionToken);
      state.tier = data.tier || "preview";
      state.subscriptionPlan = data.subscriptionPlan || null;
      // Match the loadFullState rule: collapsed for full, expanded for preview.
      state.resetSectionExpanded = state.tier !== "full";
      state.dayUnlocks = data.dayUnlocks || state.dayUnlocks;
      state.firstLoginAt = data.firstLoginAt || null;
      state.previewEndsAt = data.previewEndsAt || null;
      state.displayName = data.displayName || "";
      state.userEmail = data.email || state.loginEmail || "";
      state.timeRemainingMs = data.timeRemainingMs;
      state.loginLoading = false;
      state.loginStep = "email";
      state.loginError = "";
      loadFullState().then(() => loadUnlimitedSessions().then(() => {
        render();
        // Fresh login — check whether to surface the notification opt-in,
        // and self-heal any stale push subscription state.
        maybeShowNotifPrompt();
        syncPushSubscription();
      }));
    } catch (err) {
      state.loginLoading = false;
      state.loginError = loginErrorMessage(err && err.message);
      render();
    }
  }

  function onLoginBack() {
    state.loginStep = "email";
    state.loginError = "";
    state.loginLoading = false;
    state.loginResendStatus = "";
    state.loginResendError = "";
    render();
  }
  // Resend the 6-digit code to the same email that was used for the original
  // request. Used when the member doesn't receive the first code (delayed
  // delivery, spam folder, etc.). The backend rate-limits at 4 per 15 minutes
  // per email; if the user hits that, we surface the friendly error inline.
  // We deliberately do NOT add a client-side cooldown so the user can resend
  // again right away if they wanted (and the backend lets them). The button
  // briefly shows a confirmation, then returns to idle.
  async function onResendCode() {
    if (!state.loginEmail || state.loginResendStatus === "sending") return;
    state.loginResendStatus = "sending";
    state.loginResendError = "";
    render();
    try {
      await apiRequestCode(state.loginEmail);
      state.loginResendStatus = "sent";
      render();
      // Auto-clear the confirmation after a moment so the button is ready
      // for another use if the new code also doesn't arrive.
      setTimeout(() => {
        if (state.loginResendStatus === "sent") {
          state.loginResendStatus = "";
          render();
        }
      }, 4000);
    } catch (err) {
      state.loginResendStatus = "";
      state.loginResendError = loginErrorMessage(err && err.message);
      render();
    }
  }

  // ===== Account modal handlers =====
  function onAccountOpen() {
    state.accountMenuOpen = true;
    state.accountSavedFlash = false;
    state.mobileDrawerOpen = false; // close drawer if it was open
    // accountJustOpened controls whether the modal entrance animation plays
    // on this render. We set it true here so the first render shows the
    // slide-in animation, then flip it to false immediately after, so any
    // subsequent render triggered by the silent background refresh below
    // does NOT re-trigger the animation. That re-trigger was the visible
    // 1-second flicker users were noticing every time they opened the modal.
    state.accountJustOpened = true;
    render();
    state.accountJustOpened = false;
    // Silent background refresh so the modal always shows the current tier,
    // subscription plan, and reset window. Without this, a user who just
    // upgraded from monthly to yearly would still see the old plan label
    // until they reloaded the page. Failures are swallowed on purpose.
    if (state.sessionToken) {
      loadFullState().catch(function () { /* swallow */ });
    }
  }
  function onAccountClose() {
    state.accountMenuOpen = false;
    state.accountSavingName = false;
    state.accountSavedFlash = false;
    render();
  }
  async function onAccountSaveName(e) {
    if (e) e.preventDefault();
    if (state.accountSavingName) return;
    const input = document.getElementById("acct-name-input");
    const name = input ? String(input.value || "").trim().slice(0, 80) : "";
    state.accountSavingName = true;
    state.accountSavedFlash = false;
    render();
    try {
      const data = await apiSaveAccount(state.sessionToken, { displayName: name });
      // Server is the source of truth — it returns the saved value.
      state.displayName = (data && data.displayName) || name;
      state.accountSavingName = false;
      state.accountSavedFlash = true;
      render();
      // Drop the "Saved" flash back to "Save" after a moment.
      setTimeout(() => {
        if (!state.accountMenuOpen) return;
        state.accountSavedFlash = false;
        render();
      }, 1800);
    } catch (err) {
      state.accountSavingName = false;
      state.accountSavedFlash = false;
      alert("Could not save your name. Please try again.");
      render();
    }
  }

  // Clear the session and return the visitor to the login screen.
  function onLogout() {
    if (!confirm("Sign out of The Field?")) return;
    clearToken();
    state.sessionToken = null;
    state.messages = [];
    state.unlimitedSessions = [];
    state.activeUnlimitedId = null;
    state.unlimitedMessages = [];
    state.searchOpen = false;
    state.searchQuery = "";
    state.processMenuOpen = false;
    state.view = "login";
    state.loginStep = "email";
    state.loginEmail = "";
    state.loginError = "";
    state.loginLoading = false;
    render();
  }

  async function onStartSubmit(e) {
    e.preventDefault();
    // Re-entry guard. The first await below is apiStart — without this flag,
    // a fast double-tap on "Begin Day 1" fires onStartSubmit twice before
    // either render() runs, producing two apiChat calls and a duplicated
    // opening exchange in the database. Set synchronously, before any await.
    if (state.starting) return;
    const name = (document.getElementById("name-input").value || "").trim();
    const opening = (document.getElementById("opening-input").value || "").trim();
    if (!opening) return;
    state.starting = true;
    state.error = null;
    // Visually disable the submit button for the brief window before render().
    const submitBtn = e.target && e.target.querySelector(".btn-primary");
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = "Beginning…"; }
    try {
      const ident = resolveIdentity();
      const data = await apiStart(ident.email, ident.displayName || name, ident.kajabiMemberId);
      state.sessionToken = data.sessionToken;
      saveToken(data.sessionToken);
      state.currentDay = data.currentDay || 1;
      state.timeRemainingMs = data.timeRemainingMs;
      if (EMBED_MODE) {
        // Tier was set from the verified Kajabi message; a 'full' from the
        // backend (once the webhook feeds it) also promotes.
        if (data.tier === "full") state.tier = "full";
      } else {
        state.tier = URL_TIER || data.tier || "preview";
      }
      state.view = "chat";
      state.messages = [{ role: "user", content: opening }];
      state.loading = true;
      clearDraft("entry");
      clearDraft("entry_name");
      render();
      const chatData = await apiChat(state.sessionToken, opening);
      if (chatData.expired) { state.view = "login"; state.error = "Window expired."; state.loading = false; render(); return; }
      state.messages.push({ role: "assistant", content: chatData.reply });
      state.currentDay = chatData.currentDay;
      state.loading = false;
      render();
      maybeAutoplayLastAssistant();
    } catch (err) {
      state.error = err.message || "Could not start.";
      state.loading = false;
      state.view = "login";
      render();
    } finally {
      state.starting = false;
    }
  }

  function onInputChange(e) {
    e.target.style.height = "auto";
    e.target.style.height = Math.min(e.target.scrollHeight, 200) + "px";
    const send = document.getElementById("send-btn");
    if (e.target.value.trim() && !state.loading) send.classList.add("active");
    else send.classList.remove("active");
    // Persist draft so the text survives view changes / reloads.
    saveDraft(currentContextKey(), e.target.value);
  }

  function onInputKeyDown(e) {
    if (e.key !== "Enter" || e.shiftKey) return;
    // On mobile (touch devices with no fine pointer), Enter inserts a line
    // break — matches user expectations from iMessage / WhatsApp where the
    // Return key newlines and the send arrow sends. On desktop, Enter still
    // sends (the explicit pattern people learn from chat apps).
    const isMobile = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
    if (isMobile) return; // let the browser insert a newline naturally
    e.preventDefault();
    onSendClick();
  }

  async function onSendClick() {
    const inputEl = document.getElementById("input");
    if (!inputEl) return;
    const text = inputEl.value.trim();
    if (!text || state.loading) return;
    state.messages.push({ role: "user", content: text });
    inputEl.value = "";
    inputEl.style.height = "auto";
    state.loading = true;
    document.getElementById("send-btn").classList.remove("active");
    clearDraft(currentContextKey());
    renderMessages();
    try {
      const data = await apiChat(state.sessionToken, text);
      if (data.expired) { state.error = "Window expired."; state.loading = false; render(); return; }
      state.messages.push({ role: "assistant", content: data.reply });
      state.currentDay = data.currentDay;
      state.loading = false;
      render();
      maybeAutoplayLastAssistant();
    } catch (err) {
      state.messages.push({ role: "assistant", content: chatErrorMessage(err) });
      state.loading = false;
      renderMessages();
    }
  }

  async function onDayClick(day) {
    if (!state.sessionToken) return;
    // Defensive: locked days should not be clickable (we don't wire the
    // listener on them) but if a stale state ever calls this, no-op.
    if (!isDayUnlocked(day)) return;
    state.mobileDrawerOpen = false; // close mobile drawer once a day is picked
    // Only skip if we're ALREADY viewing this exact day in the Reset chat
    // view. If the user is in Unlimited and clicks back to their current
    // day, we still need to switch views and reload the day's messages.
    if (day === state.currentDay && state.view === "chat") return;
    // Optimistic switch — header (day pill + title) and message area update
    // instantly so the click feels responsive; real messages stream in after.
    state.currentDay = day;
    state.messages = [];
    state.view = "chat";
    state.loading = true;
    state.activeUnlimitedId = null; // deactivate any unlimited chat highlight
    render();
    try {
      const data = await apiSetDay(state.sessionToken, day);
      state.currentDay = data.currentDay;
      state.lastCompletedDay = data.lastCompletedDay;
      // Replace messages with this day's own conversation history. Each day
      // is its own thread; switching loads that thread fresh.
      state.messages = data.messages || [];
      state.loading = false;
      render();
    } catch (err) {
      // 423 Locked from the server (race condition: clock changed mid-click).
      // Refresh state so the sidebar re-renders with the latest unlock map.
      if (err && err.message === "day_locked") {
        state.loading = false;
        loadFullState();
        return;
      }
      state.messages.push({ role: "assistant", content: "Something went wrong: " + (err.message || "could not switch day.") });
      state.loading = false;
      renderMessages();
    }
  }

  function onReset() {
    if (!confirm("Reset this demo conversation? A fresh anonymous user will be created on next message.")) return;
    clearToken();
    state.sessionToken = null;
    state.currentDay = 1;
    state.lastCompletedDay = 0;
    state.messages = [];
    state.view = "login";
    // Purge any saved drafts so the fresh session starts clean.
    try {
      for (let i = localStorage.length - 1; i >= 0; i--) {
        const k = localStorage.key(i);
        if (k && k.indexOf("tfif_draft_") === 0) localStorage.removeItem(k);
      }
    } catch (e) {}
    render();
  }

  // ===== Voice input =====
  // 5 minutes. Whisper-1 cost is ~$0.006/min so a max clip is still <4¢.
  // The transcribe endpoint's bodyParser is 10mb; a 5-minute Opus clip
  // base64-encoded is roughly 1.5mb, well within the cap.
  const MAX_RECORDING_MS = 5 * 60 * 1000;
  const voiceState = {
    mediaRecorder: null, audioChunks: [], stream: null, mimeType: "",
    startedAt: 0, timerInterval: null, autoStopTimer: null, indicatorEl: null
  };

  function micSupported() {
    return !!(typeof navigator !== "undefined" && navigator.mediaDevices &&
      navigator.mediaDevices.getUserMedia && typeof window.MediaRecorder !== "undefined");
  }

  async function onMicClick() {
    if (state.loading) return;
    if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === "recording") {
      stopRecording();
      return;
    }
    await startRecording();
  }

  async function startRecording() {
    const micBtn = document.getElementById("mic-btn");
    if (!micBtn) return;
    try {
      voiceState.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const candidates = ["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg;codecs=opus"];
      let mimeType = "";
      for (const m of candidates) {
        if (window.MediaRecorder.isTypeSupported && window.MediaRecorder.isTypeSupported(m)) {
          mimeType = m;
          break;
        }
      }
      voiceState.mimeType = mimeType || "audio/webm";
      voiceState.mediaRecorder = mimeType
        ? new MediaRecorder(voiceState.stream, { mimeType })
        : new MediaRecorder(voiceState.stream);
      voiceState.audioChunks = [];
      voiceState.mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0) voiceState.audioChunks.push(e.data);
      };
      voiceState.mediaRecorder.onstop = async () => {
        cleanupRecording();
        micBtn.classList.remove("recording");
        const blob = new Blob(voiceState.audioChunks, { type: voiceState.mimeType });
        voiceState.audioChunks = [];
        if (blob.size < 1000) return;
        await transcribeBlob(blob, voiceState.mimeType);
      };
      voiceState.mediaRecorder.start();
      voiceState.startedAt = Date.now();
      micBtn.classList.add("recording");
      showRecordingIndicator();
      voiceState.timerInterval = setInterval(updateRecordingIndicator, 250);
      voiceState.autoStopTimer = setTimeout(() => {
        if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === "recording") {
          stopRecording();
        }
      }, MAX_RECORDING_MS);
    } catch (err) {
      console.error("mic_permission_or_error", err);
      cleanupRecording();
      micBtn.classList.remove("recording");
      alert("Could not access your microphone. Please allow microphone access and try again.");
    }
  }

  function stopRecording() {
    if (voiceState.mediaRecorder && voiceState.mediaRecorder.state === "recording") {
      voiceState.mediaRecorder.stop();
    }
  }

  function cleanupRecording() {
    if (voiceState.timerInterval) { clearInterval(voiceState.timerInterval); voiceState.timerInterval = null; }
    if (voiceState.autoStopTimer) { clearTimeout(voiceState.autoStopTimer); voiceState.autoStopTimer = null; }
    if (voiceState.stream) { voiceState.stream.getTracks().forEach((t) => t.stop()); voiceState.stream = null; }
    removeRecordingIndicator();
  }

  function showRecordingIndicator() {
    const composer = document.querySelector(".composer");
    if (!composer) return;
    voiceState.indicatorEl = document.createElement("div");
    voiceState.indicatorEl.className = "recording-indicator";
    voiceState.indicatorEl.innerHTML = '<span class="red-dot"></span><span class="rec-time">0:00</span> / 5:00';
    composer.appendChild(voiceState.indicatorEl);
  }

  function updateRecordingIndicator() {
    if (!voiceState.indicatorEl) return;
    const elapsedMs = Date.now() - voiceState.startedAt;
    const totalSec = Math.floor(elapsedMs / 1000);
    const min = Math.floor(totalSec / 60);
    const sec = totalSec % 60;
    const timeEl = voiceState.indicatorEl.querySelector(".rec-time");
    if (timeEl) timeEl.textContent = `${min}:${String(sec).padStart(2, "0")}`;
  }

  function removeRecordingIndicator() {
    if (voiceState.indicatorEl) { voiceState.indicatorEl.remove(); voiceState.indicatorEl = null; }
  }

  function blobToBase64(blob) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onloadend = () => {
        const result = reader.result || "";
        const idx = String(result).indexOf(",");
        resolve(idx >= 0 ? String(result).slice(idx + 1) : "");
      };
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });
  }

  async function transcribeBlob(blob, mimeType) {
    const micBtn = document.getElementById("mic-btn");
    if (micBtn) micBtn.classList.add("transcribing");
    try {
      const audioBase64 = await blobToBase64(blob);
      const res = await fetch(API_BASE + "/transcribe", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
        body: JSON.stringify({ audioBase64, mimeType })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || "transcription_failed");
      const text = (data.text || "").trim();
      if (text) {
        const inputEl = document.getElementById("input");
        if (inputEl) {
          const existing = inputEl.value.trim();
          inputEl.value = existing ? `${existing} ${text}` : text;
          inputEl.style.height = "auto";
          inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + "px";
          inputEl.focus();
          inputEl.dispatchEvent(new Event("input", { bubbles: true }));
        }
      }
    } catch (err) {
      console.error("transcribe_failed", err);
      alert("Could not transcribe your message. Please try again or type instead.");
    } finally {
      if (micBtn) micBtn.classList.remove("transcribing");
    }
  }

  // ===== Speaker (Shimrit voice playback) =====
  const speakerState = {
    currentAudio: null,
    currentBtnEl: null,
    currentIndex: -1
  };

  function setSpeakerBtnState(btnEl, stateName) {
    if (!btnEl) return;
    btnEl.classList.remove("loading", "playing");
    if (stateName === "loading") btnEl.classList.add("loading");
    else if (stateName === "playing") btnEl.classList.add("playing");
  }

  function stopCurrentAudio() {
    if (speakerState.currentAudio) {
      try { speakerState.currentAudio.pause(); } catch (e) {}
      try { URL.revokeObjectURL(speakerState.currentAudio.src); } catch (e) {}
      speakerState.currentAudio = null;
    }
    if (speakerState.currentBtnEl) {
      setSpeakerBtnState(speakerState.currentBtnEl, "idle");
      speakerState.currentBtnEl = null;
    }
    speakerState.currentIndex = -1;
  }

  async function playMessageAudio(msgIndex, btnEl) {
    if (speakerState.currentIndex === msgIndex && speakerState.currentAudio) {
      stopCurrentAudio();
      return;
    }
    stopCurrentAudio();

    const msg = state.messages[msgIndex];
    if (!msg || msg.role !== "assistant" || !msg.content) return;

    speakerState.currentBtnEl = btnEl;
    speakerState.currentIndex = msgIndex;
    setSpeakerBtnState(btnEl, "loading");

    try {
      const res = await fetch(API_BASE + "/speak", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-session-token": state.sessionToken
        },
        body: JSON.stringify({ text: msg.content })
      });
      if (!res.ok) {
        const errData = await res.json().catch(() => ({}));
        throw new Error(errData.error || "tts_failed");
      }
      const audioBlob = await res.blob();
      const audioUrl = URL.createObjectURL(audioBlob);
      const audio = new Audio(audioUrl);
      speakerState.currentAudio = audio;
      audio.onended = () => {
        if (speakerState.currentAudio === audio) stopCurrentAudio();
      };
      audio.onerror = () => {
        if (speakerState.currentAudio === audio) stopCurrentAudio();
      };
      setSpeakerBtnState(btnEl, "playing");
      await audio.play();
    } catch (err) {
      console.error("speak_failed", err);
      setSpeakerBtnState(btnEl, "idle");
      speakerState.currentAudio = null;
      speakerState.currentBtnEl = null;
      speakerState.currentIndex = -1;
    }
  }

  function onSpeakerClick(e) {
    const btn = e.target.closest(".speak-btn");
    if (!btn) return;
    const idx = parseInt(btn.dataset.msgIndex, 10);
    if (Number.isNaN(idx)) return;
    playMessageAudio(idx, btn);
  }

  function maybeAutoplayLastAssistant() {
    if (!state.autoplay) return;
    const lastIdx = state.messages.length - 1;
    if (lastIdx < 0) return;
    const last = state.messages[lastIdx];
    if (!last || last.role !== "assistant") return;
    setTimeout(() => {
      const btn = document.querySelector(`.speak-btn[data-msg-index="${lastIdx}"]`);
      if (btn) playMessageAudio(lastIdx, btn);
    }, 50);
  }

  function onAutoplayChange(e) {
    state.autoplay = !!e.target.checked;
    try { localStorage.setItem("tfif_autoplay_v1", state.autoplay ? "1" : "0"); } catch (err) {}
  }

  // ===== Unlimited API =====
  async function apiListUnlimited() {
    const res = await fetch(API_BASE + "/unlimited/sessions", { method: "GET", headers: { "x-session-token": state.sessionToken } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_list");
    return data.sessions || [];
  }
  async function apiCreateUnlimited(processKey) {
    const res = await fetch(API_BASE + "/unlimited/sessions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
      body: JSON.stringify(processKey ? { process: processKey } : {})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_create");
    return data.session;
  }
  async function apiLoadUnlimited(id) {
    const res = await fetch(API_BASE + "/unlimited/session?id=" + encodeURIComponent(id), { method: "GET", headers: { "x-session-token": state.sessionToken } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_load");
    return data;
  }
  // Rename a chat. `title` is the new title; trimmed and validated server-side.
  async function apiRenameUnlimited(id, title) {
    const res = await fetch(API_BASE + "/unlimited/session?id=" + encodeURIComponent(id), {
      method: "PATCH",
      headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
      body: JSON.stringify({ title: title })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_rename");
    return data.session;
  }
  // Pin (true) or unpin (false) a chat. Server enforces the 5-pin limit and
  // returns 409 pin_limit_reached if you try to pin a 6th.
  async function apiPinUnlimited(id, pin) {
    const res = await fetch(API_BASE + "/unlimited/session?id=" + encodeURIComponent(id), {
      method: "PATCH",
      headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
      body: JSON.stringify({ pin: !!pin })
    });
    const data = await res.json();
    if (!res.ok) {
      const err = new Error(data.error || "could_not_pin");
      err.code = data.error;
      err.limit = data.limit;
      throw err;
    }
    return data.session;
  }
  async function apiDeleteUnlimited(id) {
    const res = await fetch(API_BASE + "/unlimited/session?id=" + encodeURIComponent(id), {
      method: "DELETE",
      headers: { "x-session-token": state.sessionToken }
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "could_not_delete");
    return data;
  }
  async function apiUnlimitedChat(sessionId, message) {
    const res = await chatFetchWithRetry(() => fetch(API_BASE + "/unlimited/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-session-token": state.sessionToken },
      body: JSON.stringify({ sessionId, message })
    }));
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || ("server_" + res.status));
    return data;
  }

  // ===== Unlimited handlers =====
  // Silently bootstrap a demo session if one doesn't exist yet — this lets a
  // visitor preview The Field — Unlimited without first completing the Day 1
  // entry form. Same anonymous identity flow as onStartSubmit.
  async function ensureDemoSession() {
    if (state.sessionToken) return true;
    try {
      const ident = resolveIdentity();
      const data = await apiStart(ident.email, ident.displayName, ident.kajabiMemberId);
      state.sessionToken = data.sessionToken;
      saveToken(data.sessionToken);
      state.currentDay = data.currentDay || 1;
      state.timeRemainingMs = data.timeRemainingMs;
      return true;
    } catch (e) {
      console.error("auto_start_failed", e);
      return false;
    }
  }

  // Cross-deploy recovery: if a request fails because the token is stale (DB
  // was reset, schema changed, session expired), purge the token, mint a fresh
  // anonymous session, and retry once.
  async function createUnlimitedWithRetry(processKey) {
    try {
      return await apiCreateUnlimited(processKey);
    } catch (e) {
      console.warn("create_unl_first_try_failed_resetting_session", e?.message);
      clearToken();
      state.sessionToken = null;
      state.unlimitedSessions = [];
      const ok = await ensureDemoSession();
      if (!ok) throw new Error("could_not_bootstrap_session");
      return await apiCreateUnlimited(processKey);
    }
  }

  async function onNewChatClick() {
    // Re-entry guard — a double-tap on "+ New chat" would otherwise create
    // two empty Unlimited sessions. Set synchronously, before any await.
    if (state.creatingChat) return;
    state.creatingChat = true;
    state.mobileDrawerOpen = false;
    // Optimistic switch: jump to the Unlimited chat view with a loading state
    // the instant the button is clicked, instead of waiting for the API to
    // create the session. The click registers immediately.
    const prevView = state.view;
    const prevActiveId = state.activeUnlimitedId;
    state.view = "unlimited-chat";
    state.activeUnlimitedId = null;
    state.unlimitedMessages = [];
    state.loading = true;
    render();
    try {
      const ok = await ensureDemoSession();
      if (!ok) throw new Error("could_not_bootstrap_session");
      const session = await createUnlimitedWithRetry();
      state.unlimitedSessions.unshift(session);
      state.activeUnlimitedId = session.id;
      state.unlimitedMessages = [];
      state.loading = false;
      render();
    } catch (e) {
      console.error("create_unl_failed", e);
      // Restore the view the user came from so they aren't stranded.
      state.loading = false;
      state.view = prevView;
      state.activeUnlimitedId = prevActiveId;
      render();
      alert("Could not start a new chat. Try again.");
    } finally {
      state.creatingChat = false;
    }
  }
